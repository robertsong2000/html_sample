<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光束隧道 | Light Tunnel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body>
    <canvas id="tunnel"></canvas>
    <div class="title">Light Tunnel</div>
    <div class="info">移动鼠标控制方向 | 点击切换配色 | 滚轮调整速度</div>
    
    <script>
        const canvas = document.getElementById('tunnel');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        let speed = 1;
        let colorScheme = 0;
        let time = 0;
        
        const colorSchemes = [
            { ring: ['#ff0080', '#00ffff', '#ffff00', '#ff00ff'], beam: '#ff00ff' },
            { ring: ['#00ff88', '#0088ff', '#8800ff', '#00ffff'], beam: '#00ffff' },
            { ring: ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3'], beam: '#ffffff' },
            { ring: ['#a55eea', '#45aaf2', '#26de81', '#fd79a8'], beam: '#a55eea' },
        ];
        
        // 隧道环
        class TunnelRing {
            constructor(z) {
                this.z = z;
                this.radius = 50;
                this.rotation = Math.random() * Math.PI * 2;
            }
            
            update() {
                this.z -= 5 * speed;
                this.rotation += 0.01 * speed;
                
                if (this.z < 1) {
                    this.z = 1000;
                }
            }
            
            draw() {
                const perspective = 500;
                const scale = perspective / this.z;
                const radius = this.radius * scale * 5;
                const alpha = Math.max(0, Math.min(1, 1 - this.z / 1000));
                
                if (radius < 1 || radius > 2000) return;
                
                const centerX = width / 2 + (mouseX - width / 2) * (1 - this.z / 1000) * 0.3;
                const centerY = height / 2 + (mouseY - height / 2) * (1 - this.z / 1000) * 0.3;
                
                const colors = colorSchemes[colorScheme];
                const colorIndex = Math.floor((this.z / 200) % colors.ring.length);
                const color = colors.ring[colorIndex];
                
                ctx.save();
                ctx.globalAlpha = alpha * 0.8;
                ctx.strokeStyle = color;
                ctx.lineWidth = 2 * scale;
                ctx.shadowBlur = 20;
                ctx.shadowColor = color;
                
                // 绘制多边形环
                const sides = 6 + Math.floor((1000 - this.z) / 200);
                ctx.beginPath();
                for (let i = 0; i <= sides; i++) {
                    const angle = (i / sides) * Math.PI * 2 + this.rotation;
                    const x = centerX + Math.cos(angle) * radius;
                    const y = centerY + Math.sin(angle) * radius;
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.stroke();
                
                ctx.restore();
            }
        }
        
        // 光束
        class LightBeam {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.angle = Math.random() * Math.PI * 2;
                this.z = 1000;
                this.speed = 10 + Math.random() * 10;
                this.width = 2 + Math.random() * 4;
                this.color = colorSchemes[colorScheme].beam;
            }
            
            update() {
                this.z -= this.speed * speed;
                if (this.z < 1) {
                    this.reset();
                }
            }
            
            draw() {
                const perspective = 500;
                const scale = perspective / this.z;
                const alpha = Math.max(0, Math.min(1, 1 - this.z / 1000));
                
                const centerX = width / 2 + (mouseX - width / 2) * (1 - this.z / 1000) * 0.2;
                const centerY = height / 2 + (mouseY - height / 2) * (1 - this.z / 1000) * 0.2;
                
                const innerRadius = 50 * scale;
                const outerRadius = Math.max(width, height) * 2;
                
                const x1 = centerX + Math.cos(this.angle) * innerRadius;
                const y1 = centerY + Math.sin(this.angle) * innerRadius;
                const x2 = centerX + Math.cos(this.angle) * outerRadius;
                const y2 = centerY + Math.sin(this.angle) * outerRadius;
                
                ctx.save();
                ctx.globalAlpha = alpha * 0.6;
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.width * scale;
                ctx.shadowBlur = 30;
                ctx.shadowColor = this.color;
                ctx.lineCap = 'round';
                
                const gradient = ctx.createLinearGradient(x1, y1, x2, y2);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(0.3, this.color + '80');
                gradient.addColorStop(1, 'transparent');
                
                ctx.strokeStyle = gradient;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
                
                ctx.restore();
            }
        }
        
        // 粒子（星尘效果）
        class Particle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.angle = Math.random() * Math.PI * 2;
                this.z = Math.random() * 1000;
                this.speed = 2 + Math.random() * 3;
                this.size = Math.random() * 2 + 1;
            }
            
            update() {
                this.z -= this.speed * speed;
                if (this.z < 1) {
                    this.reset();
                    this.z = 1000;
                }
            }
            
            draw() {
                const perspective = 500;
                const scale = perspective / this.z;
                const alpha = Math.max(0, Math.min(1, 1 - this.z / 1000));
                
                const centerX = width / 2 + (mouseX - width / 2) * (1 - this.z / 1000) * 0.3;
                const centerY = height / 2 + (mouseY - height / 2) * (1 - this.z / 1000) * 0.3;
                
                const distance = 100 + (1000 - this.z) * 0.5;
                const x = centerX + Math.cos(this.angle) * distance * scale;
                const y = centerY + Math.sin(this.angle) * distance * scale;
                const size = this.size * scale;
                
                ctx.save();
                ctx.globalAlpha = alpha * 0.8;
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#fff';
                ctx.beginPath();
                ctx.arc(x, y, Math.max(0.5, size), 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        let rings = [];
        let beams = [];
        let particles = [];
        
        function init() {
            resize();
            
            // 创建隧道环
            for (let i = 0; i < 50; i++) {
                rings.push(new TunnelRing(i * 20 + 20));
            }
            
            // 创建光束
            for (let i = 0; i < 20; i++) {
                const beam = new LightBeam();
                beam.z = Math.random() * 1000;
                beams.push(beam);
            }
            
            // 创建粒子
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle());
            }
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        function draw() {
            // 清除画布
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, width, height);
            
            // 中心光晕
            const colors = colorSchemes[colorScheme];
            const gradient = ctx.createRadialGradient(
                width / 2, height / 2, 0,
                width / 2, height / 2, 300
            );
            gradient.addColorStop(0, colors.beam + '30');
            gradient.addColorStop(0.5, colors.beam + '10');
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            // 按z排序（远到近）
            rings.sort((a, b) => b.z - a.z);
            beams.sort((a, b) => b.z - a.z);
            particles.sort((a, b) => b.z - a.z);
            
            // 更新和绘制光束
            beams.forEach(beam => {
                beam.update();
                beam.draw();
            });
            
            // 更新和绘制隧道环
            rings.forEach(ring => {
                ring.update();
                ring.draw();
            });
            
            // 更新和绘制粒子
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            
            time += 0.016 * speed;
            
            requestAnimationFrame(draw);
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        window.addEventListener('click', () => {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
            beams.forEach(b => b.color = colorSchemes[colorScheme].beam);
        });
        
        window.addEventListener('wheel', (e) => {
            speed += e.deltaY > 0 ? -0.2 : 0.2;
            speed = Math.max(0.2, Math.min(3, speed));
        });
        
        // 触摸支持
        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });
        
        window.addEventListener('touchstart', () => {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
            beams.forEach(b => b.color = colorSchemes[colorScheme].beam);
        });
        
        // 键盘控制
        window.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                e.preventDefault();
                colorScheme = (colorScheme + 1) % colorSchemes.length;
                beams.forEach(b => b.color = colorSchemes[colorScheme].beam);
            } else if (e.key === 'ArrowUp') {
                speed = Math.min(3, speed + 0.2);
            } else if (e.key === 'ArrowDown') {
                speed = Math.max(0.2, speed - 0.2);
            }
        });
        
        init();
        draw();
    </script>
</body>
</html>
