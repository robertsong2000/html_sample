<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火焰效果 - Fire Effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #0a0505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 180, 100, 0.9);
            font-size: 14px;
            z-index: 10;
            background: rgba(20, 10, 5, 0.8);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 120, 50, 0.3);
            max-width: 280px;
        }
        
        .info h3 {
            margin-bottom: 10px;
            font-size: 16px;
            color: #ff8844;
            text-shadow: 0 0 15px rgba(255, 136, 68, 0.6);
        }
        
        .info p {
            margin: 5px 0;
            font-size: 12px;
            line-height: 1.6;
        }
        
        .info .key {
            color: #ffaa66;
            font-weight: bold;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            z-index: 10;
            background: rgba(20, 10, 5, 0.8);
            padding: 10px 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
        }
        
        @media (max-width: 600px) {
            .info {
                font-size: 12px;
                padding: 10px 15px;
                max-width: 220px;
            }
        }
    </style>
</head>
<body>
    <canvas id="fire"></canvas>
    
    <div class="info">
        <h3>🔥 火焰效果</h3>
        <p><span class="key">移动鼠标</span> - 控制火焰方向</p>
        <p><span class="key">点击</span> - 产生火焰爆发</p>
        <p><span class="key">滚轮</span> - 调整火焰强度</p>
        <p><span class="key">空格</span> - 切换火焰颜色</p>
    </div>
    
    <div class="stats" id="stats">
        FPS: 60 | 粒子: 0
    </div>

    <script>
        const canvas = document.getElementById('fire');
        const ctx = canvas.getContext('2d');
        const statsEl = document.getElementById('stats');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        let fireIntensity = 1;
        let fireColorMode = 0;
        
        // 火焰颜色模式
        const fireColorModes = [
            { name: '经典火焰', colors: ['#ff2200', '#ff6600', '#ffaa00', '#ffdd44', '#ffffaa'] },
            { name: '蓝色火焰', colors: ['#0044ff', '#0088ff', '#00ccff', '#66eeff', '#aaffff'] },
            { name: '绿色火焰', colors: ['#006600', '#00aa00', '#00ff00', '#66ff66', '#aaffaa'] },
            { name: '紫色火焰', colors: ['#660066', '#aa00aa', '#ff00ff', '#ff66ff', '#ffaaff'] },
            { name: '白色火焰', colors: ['#666666', '#999999', '#cccccc', '#eeeeee', '#ffffff'] }
        ];
        
        // 火焰粒子类
        class FireParticle {
            constructor(x, y, isBurst = false) {
                this.reset(x, y, isBurst);
            }
            
            reset(x, y, isBurst = false) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * (isBurst ? 8 : 2);
                this.vy = -(2 + Math.random() * 4) * fireIntensity * (isBurst ? 2 : 1);
                this.life = 1;
                this.decay = 0.01 + Math.random() * 0.02;
                this.size = 3 + Math.random() * 8;
                this.colorIndex = 0;
                this.isBurst = isBurst;
                
                // 添加湍流
                this.turbulenceX = Math.random() * 0.5;
                this.turbulencePhase = Math.random() * Math.PI * 2;
            }
            
            update(windX) {
                // 湍流效果
                this.turbulencePhase += 0.1;
                this.vx += Math.sin(this.turbulencePhase) * this.turbulenceX * 0.1;
                
                // 风的影响
                this.vx += windX * 0.01;
                
                // 上升减速
                this.vy *= 0.99;
                this.vy += 0.02; // 轻微重力
                
                this.x += this.vx;
                this.y += this.vy;
                
                // 生命衰减
                this.life -= this.decay;
                
                // 颜色根据生命值变化
                const colors = fireColorModes[fireColorMode].colors;
                this.colorIndex = Math.floor((1 - this.life) * (colors.length - 1));
                
                // 尺寸随生命减小
                this.currentSize = this.size * this.life;
                
                return this.life > 0;
            }
            
            draw(ctx) {
                const colors = fireColorModes[fireColorMode].colors;
                const color = colors[Math.min(this.colorIndex, colors.length - 1)];
                
                // 发光效果
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.currentSize * 2
                );
                gradient.addColorStop(0, this.hexToRgba(color, this.life));
                gradient.addColorStop(0.5, this.hexToRgba(color, this.life * 0.5));
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.currentSize * 2, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
            
            hexToRgba(hex, alpha) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            }
        }
        
        // 烟雾粒子
        class SmokeParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = -0.5 - Math.random() * 0.5;
                this.life = 1;
                this.decay = 0.005 + Math.random() * 0.005;
                this.size = 10 + Math.random() * 20;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy *= 1.01;
                this.life -= this.decay;
                this.rotation += this.rotationSpeed;
                this.currentSize = this.size * (2 - this.life);
                return this.life > 0;
            }
            
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                const alpha = this.life * 0.3;
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.currentSize);
                gradient.addColorStop(0, `rgba(80, 80, 80, ${alpha})`);
                gradient.addColorStop(0.5, `rgba(60, 60, 60, ${alpha * 0.5})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(0, 0, this.currentSize, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        // 火花粒子
        class SparkParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI;
                const speed = 3 + Math.random() * 5;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.02;
                this.size = 1 + Math.random() * 2;
            }
            
            update() {
                this.vy += 0.1;
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                return this.life > 0;
            }
            
            draw(ctx) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 200, ${this.life})`;
                ctx.fill();
                
                // 拖尾
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - this.vx * 2, this.y - this.vy * 2);
                ctx.strokeStyle = `rgba(255, 200, 100, ${this.life * 0.5})`;
                ctx.lineWidth = this.size * 0.5;
                ctx.stroke();
            }
        }
        
        let fireParticles = [];
        let smokeParticles = [];
        let sparkParticles = [];
        let time = 0;
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        
        function init() {
            resize();
        }
        
        function resize() {
            const dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            
            ctx.scale(dpr, dpr);
        }
        
        function createFireBurst(x, y) {
            // 火焰粒子
            for (let i = 0; i < 50; i++) {
                fireParticles.push(new FireParticle(x, y, true));
            }
            // 火花
            for (let i = 0; i < 20; i++) {
                sparkParticles.push(new SparkParticle(x, y));
            }
        }
        
        function animate(currentTime) {
            // FPS
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
            }
            
            time++;
            
            // 清除（带残影）
            ctx.fillStyle = 'rgba(10, 5, 5, 0.15)';
            ctx.fillRect(0, 0, width, height);
            
            // 计算风向（基于鼠标位置）
            const windX = (mouseX - width / 2) / width * 2;
            
            // 持续产生火焰粒子
            const fireSources = Math.floor(3 * fireIntensity);
            for (let s = 0; s < fireSources; s++) {
                const sourceX = width / 2 + (Math.random() - 0.5) * 100;
                const sourceY = height - 50;
                
                if (time % 2 === 0) {
                    fireParticles.push(new FireParticle(sourceX, sourceY));
                }
                
                // 烟雾
                if (time % 10 === 0) {
                    smokeParticles.push(new SmokeParticle(sourceX, sourceY - 100));
                }
                
                // 火花
                if (Math.random() < 0.02 * fireIntensity) {
                    sparkParticles.push(new SparkParticle(sourceX, sourceY));
                }
            }
            
            // 更新和绘制烟雾
            smokeParticles = smokeParticles.filter(p => {
                const alive = p.update();
                if (alive) p.draw(ctx);
                return alive;
            });
            
            // 更新和绘制火焰粒子
            fireParticles = fireParticles.filter(p => {
                const alive = p.update(windX);
                if (alive) p.draw(ctx);
                return alive;
            });
            
            // 更新和绘制火花
            sparkParticles = sparkParticles.filter(p => {
                const alive = p.update();
                if (alive) p.draw(ctx);
                return alive;
            });
            
            // 限制粒子数量
            if (fireParticles.length > 1000) {
                fireParticles = fireParticles.slice(-1000);
            }
            if (smokeParticles.length > 100) {
                smokeParticles = smokeParticles.slice(-100);
            }
            if (sparkParticles.length > 50) {
                sparkParticles = sparkParticles.slice(-50);
            }
            
            // 底部发光
            const glowGradient = ctx.createRadialGradient(
                width / 2, height, 0,
                width / 2, height, 200 * fireIntensity
            );
            const colors = fireColorModes[fireColorMode].colors;
            glowGradient.addColorStop(0, this.hexToRgba(colors[1], 0.3));
            glowGradient.addColorStop(0.5, this.hexToRgba(colors[0], 0.1));
            glowGradient.addColorStop(1, 'transparent');
            
            ctx.fillStyle = glowGradient;
            ctx.fillRect(0, height - 300, width, 300);
            
            // 更新统计
            const totalParticles = fireParticles.length + smokeParticles.length + sparkParticles.length;
            statsEl.textContent = `FPS: ${fps} | 粒子: ${totalParticles}`;
            
            requestAnimationFrame(animate);
        }
        
        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('click', (e) => {
            createFireBurst(e.clientX, e.clientY);
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            fireIntensity = Math.max(0.3, Math.min(2.5, fireIntensity - e.deltaY * 0.001));
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                fireColorMode = (fireColorMode + 1) % fireColorModes.length;
            }
        });
        
        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            createFireBurst(touch.clientX, touch.clientY);
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        });
        
        // 启动
        init();
        animate(performance.now());
    </script>
</body>
</html>
