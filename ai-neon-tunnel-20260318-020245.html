<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹隧道 - Neon Tunnel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
        .info {
            position: fixed; bottom: 20px; left: 20px; color: rgba(255,100,255,0.9);
            font-size: 14px; z-index: 10; background: rgba(0,0,0,0.8);
            padding: 15px 20px; border-radius: 10px;
            border: 1px solid rgba(255,0,255,0.3); max-width: 280px;
        }
        .info h3 { margin-bottom: 10px; font-size: 16px; color: #ff00ff; text-shadow: 0 0 20px #ff00ff; }
        .info p { margin: 5px 0; font-size: 12px; line-height: 1.6; }
        .info .key { color: #00ffff; font-weight: bold; }
        .stats {
            position: fixed; top: 20px; right: 20px; color: rgba(255,255,255,0.7);
            font-size: 12px; z-index: 10; background: rgba(0,0,0,0.8);
            padding: 10px 15px; border-radius: 8px; font-family: monospace;
        }
    </style>
</head>
<body>
    <canvas id="tunnel"></canvas>
    <div class="info">
        <h3>🌈 霓虹隧道</h3>
        <p><span class="key">移动鼠标</span> - 控制隧道弯曲</p>
        <p><span class="key">点击</span> - 加速穿越</p>
        <p><span class="key">滚轮</span> - 调整隧道深度</p>
        <p><span class="key">空格</span> - 切换颜色主题</p>
    </div>
    <div class="stats" id="stats">FPS: 60 | 环数: 0</div>

    <script>
        const canvas = document.getElementById('tunnel');
        const ctx = canvas.getContext('2d');
        const statsEl = document.getElementById('stats');
        
        let width, height, centerX, centerY;
        let mouseX = 0, mouseY = 0;
        let tunnelSpeed = 1;
        let depthLevel = 20;
        let colorTheme = 0;
        let time = 0;
        let boostMode = false;
        
        const colorThemes = [
            { name: '赛博', colors: ['#ff00ff', '#00ffff', '#ff0088', '#00ff88'] },
            { name: '日落', colors: ['#ff6600', '#ffcc00', '#ff4400', '#ffaa00'] },
            { name: '极光', colors: ['#00ff88', '#00ffff', '#88ff00', '#00ffcc'] },
            { name: '紫晶', colors: ['#8800ff', '#ff00ff', '#4400ff', '#cc00ff'] }
        ];
        
        class TunnelRing {
            constructor(z) {
                this.z = z;
                this.rotation = 0;
            }
            
            update(speed) {
                this.z -= speed * 5;
                this.rotation += 0.02;
                
                if (this.z < 0) {
                    this.z = depthLevel;
                }
            }
            
            draw(ctx, offsetX, offsetY, colors) {
                const scale = 500 / (this.z + 1);
                const x = centerX + offsetX * (this.z / depthLevel);
                const y = centerY + offsetY * (this.z / depthLevel);
                const radius = 100 * scale;
                const alpha = 1 - (this.z / depthLevel);
                
                if (alpha <= 0 || radius < 5) return;
                
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(this.rotation);
                
                const colorIndex = Math.floor(this.z + time * 0.1) % colors.length;
                const color = colors[colorIndex];
                
                // 外发光
                ctx.beginPath();
                ctx.arc(0, 0, radius + 10, 0, Math.PI * 2);
                ctx.strokeStyle = color.replace(')', `, ${alpha * 0.3})`).replace('rgb', 'rgba').replace('#', '');
                const gradient = ctx.createRadialGradient(0, 0, radius, 0, 0, radius + 20);
                gradient.addColorStop(0, `rgba(${this.hexToRgb(color)}, ${alpha * 0.5})`);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // 主环
                ctx.beginPath();
                ctx.arc(0, 0, radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(${this.hexToRgb(color)}, ${alpha})`;
                ctx.lineWidth = 3;
                ctx.stroke();
                
                // 内环
                ctx.beginPath();
                ctx.arc(0, 0, radius * 0.7, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(${this.hexToRgb(color)}, ${alpha * 0.5})`;
                ctx.lineWidth = 1;
                ctx.stroke();
                
                ctx.restore();
            }
            
            hexToRgb(hex) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return `${r}, ${g}, ${b}`;
            }
        }
        
        let rings = [];
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        
        function init() {
            resize();
            createRings();
        }
        
        function resize() {
            const dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            ctx.scale(dpr, dpr);
            centerX = width / 2;
            centerY = height / 2;
        }
        
        function createRings() {
            rings = [];
            for (let i = 0; i < depthLevel; i++) {
                rings.push(new TunnelRing(i));
            }
        }
        
        function drawVignette() {
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, Math.max(width, height) / 2);
            gradient.addColorStop(0, 'transparent');
            gradient.addColorStop(0.8, 'transparent');
            gradient.addColorStop(1, 'rgba(0,0,0,0.8)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }
        
        function animate(currentTime) {
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
            }
            
            time++;
            
            // 速度
            let speed = tunnelSpeed;
            if (boostMode) {
                speed *= 3;
                boostMode = false;
            }
            
            // 清除
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, width, height);
            
            // 鼠标偏移
            const offsetX = (mouseX - centerX) * 0.1;
            const offsetY = (mouseY - centerY) * 0.1;
            const colors = colorThemes[colorTheme].colors;
            
            // 绘制隧道环（从远到近）
            rings.sort((a, b) => b.z - a.z);
            rings.forEach(ring => {
                ring.update(speed);
                ring.draw(ctx, offsetX, offsetY, colors);
            });
            
            // 中心光点
            const centerGlow = ctx.createRadialGradient(centerX + offsetX, centerY + offsetY, 0, centerX + offsetX, centerY + offsetY, 50);
            centerGlow.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
            centerGlow.addColorStop(0.5, 'rgba(255, 255, 255, 0.2)');
            centerGlow.addColorStop(1, 'transparent');
            ctx.fillStyle = centerGlow;
            ctx.beginPath();
            ctx.arc(centerX + offsetX, centerY + offsetY, 50, 0, Math.PI * 2);
            ctx.fill();
            
            drawVignette();
            
            statsEl.textContent = `FPS: ${fps} | 环数: ${rings.length} | ${colorThemes[colorTheme].name}`;
            requestAnimationFrame(animate);
        }
        
        window.addEventListener('resize', resize);
        canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
        canvas.addEventListener('click', () => { boostMode = true; });
        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            depthLevel = Math.max(10, Math.min(40, depthLevel - Math.sign(e.deltaY) * 2));
            createRings();
        });
        document.addEventListener('keydown', e => {
            if (e.code === 'Space') { e.preventDefault(); colorTheme = (colorTheme + 1) % colorThemes.length; }
        });
        canvas.addEventListener('touchstart', e => { e.preventDefault(); boostMode = true; });
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const t = e.touches[0];
            mouseX = t.clientX; mouseY = t.clientY;
        });
        
        init();
        animate(performance.now());
    </script>
</body>
</html>
