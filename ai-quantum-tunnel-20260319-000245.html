<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量子隧道 - Quantum Tunnel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(0, 255, 255, 0.9);
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 10px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 
                0 0 20px rgba(0, 255, 255, 1),
                0 0 40px rgba(0, 200, 255, 0.8),
                0 0 60px rgba(0, 150, 255, 0.6);
            animation: quantumPulse 2s ease-in-out infinite;
        }
        
        @keyframes quantumPulse {
            0%, 100% { 
                letter-spacing: 10px;
                text-shadow: 0 0 20px rgba(0, 255, 255, 1), 0 0 40px rgba(0, 200, 255, 0.8);
            }
            50% { 
                letter-spacing: 12px;
                text-shadow: 0 0 30px rgba(0, 255, 255, 1), 0 0 60px rgba(0, 200, 255, 0.9);
            }
        }
        
        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 10;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90%;
        }
        
        .btn {
            padding: 10px 20px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.4);
            color: rgba(0, 255, 255, 0.9);
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .btn:hover {
            background: rgba(0, 255, 255, 0.2);
            border-color: rgba(0, 255, 255, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 255, 0.4);
        }
        
        .btn.active {
            background: rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
        }
        
        .info {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(0, 255, 255, 0.5);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
            text-align: center;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(0, 255, 255, 0.4);
            font-size: 11px;
            z-index: 10;
            pointer-events: none;
            text-align: right;
            font-family: 'Courier New', monospace;
        }
        
        .tunnel-info {
            position: fixed;
            bottom: 90px;
            left: 20px;
            color: rgba(0, 255, 255, 0.4);
            font-size: 11px;
            z-index: 10;
            pointer-events: none;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="title">⚡ QUANTUM ⚡</div>
    
    <div class="info">
        🖱️ 移动鼠标 - 控制隧道方向 | 🎨 点击 - 能量脉冲 | ⚙️ 滚轮 - 调整速度
    </div>
    
    <div class="stats" id="stats">
        粒子: 0 | 速度: 1.0x | FPS: 60
    </div>
    
    <div class="tunnel-info" id="tunnelInfo">
        模式: 经典 | 深度: 100
    </div>
    
    <div class="controls">
        <button class="btn" onclick="changeTunnelMode()">🌀 隧道模式</button>
        <button class="btn" onclick="changeColorScheme()">🎨 配色方案</button>
        <button class="btn" onclick="toggleRings()">⭕ 光环效果</button>
        <button class="btn" onclick="toggleFlash()">⚡ 能量闪光</button>
        <button class="btn" onclick="toggleGrid()">📐 网格线</button>
        <button class="btn" onclick="resetTunnel()">🔄 重置隧道</button>
    </div>
    
    <canvas id="canvas"></canvas>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height, centerX, centerY;
        let mouseX = 0, mouseY = 0;
        let targetMouseX = 0, targetMouseY = 0;
        let speed = 1;
        let time = 0;
        let depth = 100;
        
        // 性能监控
        let frameCount = 0;
        let lastFpsUpdate = Date.now();
        let currentFps = 60;
        
        // 隧道模式
        const tunnelModes = [
            { name: '经典', type: 'classic' },
            { name: '螺旋', type: 'spiral' },
            { name: '波纹', type: 'ripple' },
            { name: '分形', type: 'fractal' }
        ];
        let currentMode = 0;
        
        // 配色方案
        const colorSchemes = [
            { name: '量子蓝', primary: '#00ffff', secondary: '#0088ff', accent: '#0044ff' },
            { name: '能量紫', primary: '#ff00ff', secondary: '#aa00ff', accent: '#6600ff' },
            { name: '等离子绿', primary: '#00ff88', secondary: '#00ff44', accent: '#00cc00' },
            { name: '超新星', primary: '#ffff00', secondary: '#ff8800', accent: '#ff4400' },
            { name: '多维', primary: '#ff0088', secondary: '#00ff88', accent: '#8800ff' }
        ];
        let currentColorScheme = 0;
        
        let ringsEnabled = true;
        let flashEnabled = true;
        let gridEnabled = true;
        
        // 隧道粒子
        class TunnelParticle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.z = depth;
                this.angle = Math.random() * Math.PI * 2;
                this.radius = 50 + Math.random() * 150;
                this.speed = 0.5 + Math.random() * 1.5;
                this.size = 1 + Math.random() * 2;
                this.color = colorSchemes[currentColorScheme].primary;
            }
            
            update() {
                this.z -= this.speed * speed;
                
                if (this.z <= 0) {
                    this.reset();
                }
            }
            
            draw() {
                const scale = 100 / this.z;
                const x = centerX + Math.cos(this.angle) * this.radius * scale;
                const y = centerY + Math.sin(this.angle) * this.radius * scale;
                const size = this.size * scale;
                
                if (x < 0 || x > width || y < 0 || y > height) return;
                
                const alpha = Math.max(0, 1 - this.z / depth);
                
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = alpha;
                ctx.fill();
                
                // 发光
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            }
        }
        
        // 隧道环
        class TunnelRing {
            constructor(z) {
                this.z = z;
                this.segments = 32;
                this.color = colorSchemes[currentColorScheme].primary;
            }
            
            update() {
                this.z -= 1.5 * speed;
                
                if (this.z <= 0) {
                    this.z = depth;
                }
            }
            
            draw() {
                if (!ringsEnabled) return;
                
                const scale = 100 / this.z;
                const alpha = Math.max(0, 1 - this.z / depth) * 0.5;
                
                ctx.beginPath();
                
                for (let i = 0; i <= this.segments; i++) {
                    const angle = (i / this.segments) * Math.PI * 2;
                    const radius = 150 * scale;
                    const x = centerX + Math.cos(angle) * radius;
                    const y = centerY + Math.sin(angle) * radius;
                    
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                
                ctx.strokeStyle = this.color;
                ctx.globalAlpha = alpha;
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
        }
        
        let particles = [];
        let rings = [];
        
        // 初始化
        function init() {
            resize();
            
            // 创建粒子
            for (let i = 0; i < 200; i++) {
                const p = new TunnelParticle();
                p.z = Math.random() * depth;
                particles.push(p);
            }
            
            // 创建环
            for (let i = 0; i < 20; i++) {
                rings.push(new TunnelRing(i * (depth / 20)));
            }
            
            window.addEventListener('resize', resize);
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }
        
        // 绘制网格线
        function drawGrid() {
            if (!gridEnabled) return;
            
            const scheme = colorSchemes[currentColorScheme];
            
            // 径向网格
            for (let i = 0; i < 12; i++) {
                const angle = (i / 12) * Math.PI * 2;
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(
                    centerX + Math.cos(angle) * Math.max(width, height),
                    centerY + Math.sin(angle) * Math.max(width, height)
                );
                
                ctx.strokeStyle = scheme.secondary;
                ctx.globalAlpha = 0.1;
                ctx.lineWidth = 1;
                ctx.stroke();
            }
            
            ctx.globalAlpha = 1;
        }
        
        // 绘制中心光晕
        function drawCenterGlow() {
            const scheme = colorSchemes[currentColorScheme];
            
            const gradient = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, 300
            );
            gradient.addColorStop(0, scheme.primary + '44');
            gradient.addColorStop(0.5, scheme.secondary + '22');
            gradient.addColorStop(1, 'transparent');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }
        
        // 绘制能量闪光
        function drawFlash() {
            if (!flashEnabled) return;
            
            const flash = Math.sin(time * 3) * 0.1 + 0.1;
            ctx.fillStyle = `rgba(255, 255, 255, ${flash})`;
            ctx.fillRect(0, 0, width, height);
        }
        
        // 动画循环
        let lastTime = 0;
        const targetFPS = 60;
        const interval = 1000 / targetFPS;
        
        function animate(currentTime) {
            requestAnimationFrame(animate);
            
            const delta = currentTime - lastTime;
            if (delta < interval) return;
            lastTime = currentTime - (delta % interval);
            
            // FPS计算
            frameCount++;
            if (currentTime - lastFpsUpdate >= 1000) {
                currentFps = frameCount;
                frameCount = 0;
                lastFpsUpdate = currentTime;
                updateStats();
            }
            
            time += 0.016 * speed;
            
            // 平滑鼠标
            mouseX += (targetMouseX - mouseX) * 0.05;
            mouseY += (targetMouseY - mouseY) * 0.05;
            
            // 鼠标偏移中心
            centerX = width / 2 + (mouseX - width / 2) * 0.1;
            centerY = height / 2 + (mouseY - height / 2) * 0.1;
            
            // 清除画布
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制网格
            drawGrid();
            
            // 绘制中心光晕
            drawCenterGlow();
            
            // 更新和绘制环
            rings.forEach(ring => {
                ring.update();
                ring.draw();
            });
            
            // 更新和绘制粒子
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            
            // 绘制能量闪光
            drawFlash();
        }
        
        function updateStats() {
            document.getElementById('stats').textContent = 
                `粒子: ${particles.length} | 速度: ${speed.toFixed(1)}x | FPS: ${currentFps}`;
            
            const modeName = tunnelModes[currentMode].name;
            document.getElementById('tunnelInfo').textContent = 
                `模式: ${modeName} | 深度: ${depth}`;
        }
        
        // 事件处理
        canvas.addEventListener('mousemove', (e) => {
            targetMouseX = e.clientX;
            targetMouseY = e.clientY;
        });
        
        canvas.addEventListener('click', () => {
            // 能量脉冲
            for (let i = 0; i < 50; i++) {
                const p = new TunnelParticle();
                p.z = depth;
                p.radius = Math.random() * 200;
                particles.push(p);
            }
            
            // 限制粒子数量
            if (particles.length > 400) {
                particles = particles.slice(-400);
            }
            
            updateStats();
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            speed = Math.max(0.3, Math.min(3, speed - e.deltaY * 0.001));
            updateStats();
        });
        
        // 控制函数
        function changeTunnelMode() {
            currentMode = (currentMode + 1) % tunnelModes.length;
            updateStats();
        }
        
        function changeColorScheme() {
            currentColorScheme = (currentColorScheme + 1) % colorSchemes.length;
            
            // 更新粒子和环的颜色
            particles.forEach(p => {
                p.color = colorSchemes[currentColorScheme].primary;
            });
            
            rings.forEach(r => {
                r.color = colorSchemes[currentColorScheme].primary;
            });
        }
        
        function toggleRings() {
            ringsEnabled = !ringsEnabled;
            event.target.classList.toggle('active', !ringsEnabled);
        }
        
        function toggleFlash() {
            flashEnabled = !flashEnabled;
            event.target.classList.toggle('active', !flashEnabled);
        }
        
        function toggleGrid() {
            gridEnabled = !gridEnabled;
            event.target.classList.toggle('active', !gridEnabled);
        }
        
        function resetTunnel() {
            speed = 1;
            currentMode = 0;
            currentColorScheme = 0;
            ringsEnabled = true;
            flashEnabled = true;
            gridEnabled = true;
            
            particles = [];
            rings = [];
            
            for (let i = 0; i < 200; i++) {
                const p = new TunnelParticle();
                p.z = Math.random() * depth;
                particles.push(p);
            }
            
            for (let i = 0; i < 20; i++) {
                rings.push(new TunnelRing(i * (depth / 20)));
            }
            
            document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
            updateStats();
        }
        
        // 启动
        init();
        animate(0);
    </script>
</body>
</html>
