<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火焰效果 | Fire Effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .ui {
            position: fixed;
            z-index: 10;
            color: rgba(255, 200, 100, 0.9);
            pointer-events: none;
        }
        
        .title {
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 10px;
            text-shadow: 
                0 0 20px rgba(255, 100, 0, 0.8),
                0 0 40px rgba(255, 50, 0, 0.4);
        }
        
        .info {
            bottom: 25px;
            left: 25px;
            font-size: 13px;
            line-height: 1.8;
            text-shadow: 0 0 10px rgba(255, 100, 0, 0.5);
            opacity: 0.7;
        }
        
        .stats {
            top: 25px;
            right: 25px;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            text-align: right;
            text-shadow: 0 0 5px rgba(255, 100, 0, 0.5);
            opacity: 0.6;
        }
        
        .glow {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: radial-gradient(ellipse at bottom, rgba(255, 50, 0, 0.3) 0%, transparent 70%);
            pointer-events: none;
            z-index: 5;
        }
        
        @media (max-width: 768px) {
            .title {
                font-size: 18px;
                letter-spacing: 5px;
            }
            .info {
                font-size: 11px;
                bottom: 15px;
                left: 15px;
            }
            .stats {
                font-size: 9px;
                top: 15px;
                right: 15px;
            }
        }
    </style>
</head>
<body>
    <canvas id="fire"></canvas>
    <div class="glow"></div>
    
    <div class="ui title">FIRE EFFECT</div>
    
    <div class="ui stats">
        <div id="particles">Particles: 0</div>
        <div id="fps">FPS: 60</div>
    </div>
    
    <div class="ui info">
        移动鼠标控制火焰方向<br>
        点击产生火焰爆发
    </div>
    
    <script>
        const canvas = document.getElementById('fire');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let time = 0;
        let lastTime = performance.now();
        let fps = 60;
        
        // 火焰粒子数组
        let particles = [];
        let maxParticles = 800;
        
        // 火花粒子
        let sparks = [];
        
        // 烟雾粒子
        let smoke = [];
        
        // 鼠标位置
        let mouseX = 0, mouseY = 0;
        let windX = 0;
        
        // 火焰粒子类
        class FireParticle {
            constructor(x, y, isExplosion = false) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * (isExplosion ? 8 : 2);
                this.vy = -(Math.random() * 5 + 3) * (isExplosion ? 1.5 : 1);
                this.size = Math.random() * 20 + 10;
                this.life = 1;
                this.decay = 0.01 + Math.random() * 0.02;
                this.hue = Math.random() * 60; // 0-60 (红到黄)
            }
            
            update() {
                // 风的影响
                this.vx += windX * 0.1;
                
                // 上升力
                this.vy -= 0.05;
                
                // 随机抖动
                this.vx += (Math.random() - 0.5) * 0.3;
                
                // 阻力
                this.vx *= 0.99;
                this.vy *= 0.99;
                
                this.x += this.vx;
                this.y += this.vy;
                
                // 尺寸减小
                this.size *= 0.98;
                
                // 生命衰减
                this.life -= this.decay;
                
                // 颜色变化（从黄到红到暗）
                this.hue = Math.max(0, this.hue - 0.5);
                
                return this.life > 0 && this.size > 0.5;
            }
            
            draw() {
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size
                );
                
                const alpha = this.life * 0.8;
                const hue = this.hue;
                
                // 火焰颜色：白->黄->橙->红->暗红
                gradient.addColorStop(0, `hsla(${hue + 30}, 100%, 90%, ${alpha})`);
                gradient.addColorStop(0.3, `hsla(${hue + 15}, 100%, 70%, ${alpha * 0.8})`);
                gradient.addColorStop(0.6, `hsla(${hue}, 100%, 50%, ${alpha * 0.5})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }
        
        // 火花类
        class Spark {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 10 + 5;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed - 5;
                this.life = 1;
                this.decay = 0.03 + Math.random() * 0.03;
                this.size = Math.random() * 3 + 1;
            }
            
            update() {
                this.vy += 0.2; // 重力
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                return this.life > 0;
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 200, ${this.life})`;
                ctx.fill();
                
                // 拖尾
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - this.vx * 0.5, this.y - this.vy * 0.5);
                ctx.strokeStyle = `rgba(255, 200, 100, ${this.life * 0.5})`;
                ctx.lineWidth = this.size * this.life;
                ctx.stroke();
            }
        }
        
        // 烟雾类
        class Smoke {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 1;
                this.vy = -(Math.random() * 2 + 1);
                this.size = Math.random() * 30 + 20;
                this.life = 1;
                this.decay = 0.005 + Math.random() * 0.005;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.05;
            }
            
            update() {
                this.vx += windX * 0.05;
                this.x += this.vx;
                this.y += this.vy;
                this.size *= 1.01;
                this.life -= this.decay;
                this.rotation += this.rotationSpeed;
                return this.life > 0;
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size);
                const alpha = this.life * 0.3;
                gradient.addColorStop(0, `rgba(100, 100, 100, ${alpha})`);
                gradient.addColorStop(0.5, `rgba(50, 50, 50, ${alpha * 0.5})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        function createFireParticle(x, y, isExplosion = false) {
            if (particles.length < maxParticles) {
                particles.push(new FireParticle(x, y, isExplosion));
            }
        }
        
        function createExplosion(x, y) {
            // 火焰爆发
            for (let i = 0; i < 50; i++) {
                createFireParticle(x, y, true);
            }
            
            // 火花
            for (let i = 0; i < 30; i++) {
                sparks.push(new Spark(x, y));
            }
        }
        
        // 绘制火焰源
        function drawFireSource() {
            const sourceY = height - 50;
            const sources = 3;
            
            for (let i = 0; i < sources; i++) {
                const sourceX = width / 2 + (i - 1) * 100;
                
                // 基础火焰粒子
                if (Math.random() < 0.8) {
                    createFireParticle(
                        sourceX + (Math.random() - 0.5) * 60,
                        sourceY + Math.random() * 20
                    );
                }
                
                // 烟雾
                if (Math.random() < 0.1) {
                    smoke.push(new Smoke(
                        sourceX + (Math.random() - 0.5) * 40,
                        sourceY - 100
                    ));
                }
                
                // 底部发光
                const gradient = ctx.createRadialGradient(
                    sourceX, sourceY, 0,
                    sourceX, sourceY, 150
                );
                gradient.addColorStop(0, 'rgba(255, 100, 0, 0.5)');
                gradient.addColorStop(0.5, 'rgba(255, 50, 0, 0.2)');
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(sourceX, sourceY, 150, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }
        
        // 绘制背景
        function drawBackground() {
            // 渐变背景
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#0a0000');
            gradient.addColorStop(0.5, '#1a0505');
            gradient.addColorStop(1, '#200a00');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }
        
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            mouseX = width / 2;
            mouseY = height / 2;
        }
        
        function updateFPS() {
            const now = performance.now();
            const delta = now - lastTime;
            lastTime = now;
            fps = Math.round(1000 / delta);
            document.getElementById('fps').textContent = `FPS: ${fps}`;
            document.getElementById('particles').textContent = `Particles: ${particles.length + sparks.length + smoke.length}`;
        }
        
        function animate() {
            time++;
            
            // 更新风向
            const targetWindX = (mouseX - width / 2) / width * 3;
            windX += (targetWindX - windX) * 0.05;
            
            // 半透明清除（拖尾效果）
            ctx.fillStyle = 'rgba(10, 0, 0, 0.15)';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制背景
            if (time % 60 === 0) {
                drawBackground();
            }
            
            // 绘制火焰源
            drawFireSource();
            
            // 更新和绘制烟雾（最底层）
            smoke = smoke.filter(s => {
                const alive = s.update();
                s.draw();
                return alive;
            });
            
            // 更新和绘制火焰粒子
            particles = particles.filter(p => {
                const alive = p.update();
                p.draw();
                return alive;
            });
            
            // 更新和绘制火花（最上层）
            sparks = sparks.filter(s => {
                const alive = s.update();
                s.draw();
                return alive;
            });
            
            // 添加整体发光效果
            ctx.globalCompositeOperation = 'screen';
            const glowGradient = ctx.createRadialGradient(
                width / 2, height, 0,
                width / 2, height, height * 0.8
            );
            glowGradient.addColorStop(0, 'rgba(255, 50, 0, 0.1)');
            glowGradient.addColorStop(0.5, 'rgba(255, 100, 0, 0.05)');
            glowGradient.addColorStop(1, 'transparent');
            
            ctx.fillStyle = glowGradient;
            ctx.fillRect(0, 0, width, height);
            ctx.globalCompositeOperation = 'source-over';
            
            updateFPS();
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        window.addEventListener('resize', init);
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('click', (e) => {
            createExplosion(e.clientX, e.clientY);
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (e.touches.length > 0) {
                createExplosion(e.touches[0].clientX, e.touches[0].clientY);
            }
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        });
        
        // 键盘控制
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                createExplosion(width / 2, height - 100);
            }
        });
        
        // 初始化
        init();
        animate();
    </script>
</body>
</html>
