<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>气泡漂浮 | Floating Bubbles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="bubbles"></canvas>
    <div class="title">Floating Bubbles</div>
    <div class="info">点击创建气泡 | 拖动产生气泡流 | 滚轮调整大小 | 双击切换配色</div>
    
    <script>
        const canvas = document.getElementById('bubbles');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        let bubbleSize = 40;
        let colorScheme = 0;
        let time = 0;
        let isDrawing = false;
        
        const colorSchemes = [
            ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96ceb4', '#ffeaa7', '#dfe6e9'],
            ['#a55eea', '#45aaf2', '#26de81', '#fd79a8', '#fdcb6e', '#6c5ce7'],
            ['#ff9f43', '#ee5a24', '#00d2d3', '#54a0ff', '#5f27cd', '#ff6b81'],
            ['#00b894', '#00cec9', '#0984e3', '#6c5ce7', '#fd79a8', '#e17055'],
        ];
        
        // 气泡类
        class Bubble {
            constructor(x, y, size) {
                this.x = x;
                this.y = y;
                this.size = size || (20 + Math.random() * 40);
                this.originalSize = this.size;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = -1 - Math.random() * 2;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0.02 + Math.random() * 0.03;
                this.wobbleAmount = 0.5 + Math.random() * 1;
                this.colorIndex = Math.floor(Math.random() * 6);
                this.alpha = 0.6 + Math.random() * 0.3;
                this.life = 1;
                this.pulsePhase = Math.random() * Math.PI * 2;
                this.pulseSpeed = 0.05 + Math.random() * 0.05;
            }
            
            update() {
                // 上升
                this.y += this.vy;
                
                // 摇摆
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * this.wobbleAmount;
                
                // 脉动
                this.pulsePhase += this.pulseSpeed;
                this.size = this.originalSize * (1 + Math.sin(this.pulsePhase) * 0.1);
                
                // 边界
                if (this.x < this.size) this.x = this.size;
                if (this.x > width - this.size) this.x = width - this.size;
                
                // 生命衰减
                if (this.y < -this.size * 2) {
                    this.life -= 0.05;
                }
                
                return this.life > 0;
            }
            
            draw() {
                const colors = colorSchemes[colorScheme];
                const color = colors[this.colorIndex];
                
                ctx.save();
                ctx.globalAlpha = this.alpha * this.life;
                
                // 气泡主体
                const gradient = ctx.createRadialGradient(
                    this.x - this.size * 0.3, this.y - this.size * 0.3, 0,
                    this.x, this.y, this.size
                );
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0.4)');
                gradient.addColorStop(0.3, color + '80');
                gradient.addColorStop(0.7, color + '40');
                gradient.addColorStop(1, color + '20');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                
                // 气泡边缘
                ctx.strokeStyle = color + '60';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.stroke();
                
                // 高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.beginPath();
                ctx.ellipse(
                    this.x - this.size * 0.3,
                    this.y - this.size * 0.3,
                    this.size * 0.2,
                    this.size * 0.15,
                    -Math.PI / 4,
                    0, Math.PI * 2
                );
                ctx.fill();
                
                // 次高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.beginPath();
                ctx.arc(
                    this.x + this.size * 0.2,
                    this.y + this.size * 0.3,
                    this.size * 0.1,
                    0, Math.PI * 2
                );
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        // 小气泡（背景装饰）
        class SmallBubble {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = height + Math.random() * 100;
                this.size = 3 + Math.random() * 8;
                this.speed = 0.5 + Math.random() * 1;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0.01 + Math.random() * 0.02;
                this.alpha = 0.2 + Math.random() * 0.3;
            }
            
            update() {
                this.y -= this.speed;
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * 0.5;
                
                if (this.y < -this.size) {
                    this.reset();
                }
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        let bubbles = [];
        let smallBubbles = [];
        
        function init() {
            resize();
            
            // 创建背景小气泡
            for (let i = 0; i < 30; i++) {
                const bubble = new SmallBubble();
                bubble.y = Math.random() * height;
                smallBubbles.push(bubble);
            }
            
            // 初始气泡
            for (let i = 0; i < 15; i++) {
                bubbles.push(new Bubble(
                    Math.random() * width,
                    height + Math.random() * 200
                ));
            }
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        function draw() {
            // 清除画布
            const gradient = ctx.createLinearGradient(0, 0, width, height);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(0.5, '#16213e');
            gradient.addColorStop(1, '#0f3460');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            // 更新和绘制小气泡
            smallBubbles.forEach(b => {
                b.update();
                b.draw();
            });
            
            // 更新和绘制大气泡
            bubbles = bubbles.filter(b => {
                b.update();
                b.draw();
                return b.update();
            });
            
            // 补充气泡
            if (bubbles.length < 20 && Math.random() > 0.95) {
                bubbles.push(new Bubble(
                    Math.random() * width,
                    height + 50
                ));
            }
            
            // 拖动时产生气泡
            if (isDrawing && Math.random() > 0.5) {
                bubbles.push(new Bubble(
                    mouseX + (Math.random() - 0.5) * 50,
                    mouseY + (Math.random() - 0.5) * 50,
                    bubbleSize * (0.5 + Math.random() * 0.5)
                ));
            }
            
            time += 0.016;
            
            requestAnimationFrame(draw);
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            for (let i = 0; i < 5; i++) {
                bubbles.push(new Bubble(
                    e.clientX + (Math.random() - 0.5) * 60,
                    e.clientY + (Math.random() - 0.5) * 60,
                    bubbleSize * (0.5 + Math.random() * 0.5)
                ));
            }
        });
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('mouseup', () => {
            isDrawing = false;
        });
        
        canvas.addEventListener('mouseleave', () => {
            isDrawing = false;
        });
        
        canvas.addEventListener('dblclick', () => {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            bubbleSize += e.deltaY > 0 ? -5 : 5;
            bubbleSize = Math.max(15, Math.min(100, bubbleSize));
        }, { passive: false });
        
        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            isDrawing = true;
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            for (let i = 0; i < 5; i++) {
                bubbles.push(new Bubble(
                    touch.clientX + (Math.random() - 0.5) * 60,
                    touch.clientY + (Math.random() - 0.5) * 60,
                    bubbleSize * (0.5 + Math.random() * 0.5)
                ));
            }
        }, { passive: false });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        }, { passive: false });
        
        canvas.addEventListener('touchend', () => {
            isDrawing = false;
        });
        
        // 键盘控制
        window.addEventListener('keydown', (e) => {
            if (e.key === 'c' || e.key === 'C') {
                colorScheme = (colorScheme + 1) % colorSchemes.length;
            } else if (e.key === ' ') {
                e.preventDefault();
                // 爆发气泡
                for (let i = 0; i < 20; i++) {
                    bubbles.push(new Bubble(
                        width / 2 + (Math.random() - 0.5) * 200,
                        height + Math.random() * 100,
                        bubbleSize * (0.5 + Math.random())
                    ));
                }
            }
        });
        
        init();
        draw();
    </script>
</body>
</html>
