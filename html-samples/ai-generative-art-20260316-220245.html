<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generative Art - 生成艺术</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255, 150, 200, 0.8);
            pointer-events: none;
        }

        .info span {
            display: block;
            margin: 5px 0;
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                bottom: 10px;
                left: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="generative"></canvas>
    <div class="info">
        <span>🖱️ 移动鼠标 - 影响图案生成</span>
        <span>👆 点击 - 重新生成图案</span>
    </div>

    <script>
        const canvas = document.getElementById('generative');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Mouse tracking
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });

        // Pattern elements
        let elements = [];
        let connections = [];

        // Click to regenerate
        canvas.addEventListener('click', () => {
            generatePattern();
        });

        canvas.addEventListener('touchstart', () => {
            generatePattern();
        });

        // Element class
        class Element {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.originX = x;
                this.originY = y;
                this.type = type || ['circle', 'square', 'triangle', 'line'][Math.floor(Math.random() * 4)];
                this.size = 10 + Math.random() * 30;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
                this.hue = Math.random() * 360;
                this.alpha = 0.3 + Math.random() * 0.5;
                this.pulse = Math.random() * Math.PI * 2;
                this.pulseSpeed = 0.02 + Math.random() * 0.03;
                this.vx = 0;
                this.vy = 0;
                this.orbitRadius = Math.random() * 100;
                this.orbitSpeed = (Math.random() - 0.5) * 0.01;
                this.orbitAngle = Math.random() * Math.PI * 2;
            }

            update(time) {
                this.pulse += this.pulseSpeed;
                this.rotation += this.rotationSpeed;
                this.hue = (this.hue + 0.2) % 360;

                // Orbit around origin
                this.orbitAngle += this.orbitSpeed;
                const targetX = this.originX + Math.cos(this.orbitAngle) * this.orbitRadius;
                const targetY = this.originY + Math.sin(this.orbitAngle) * this.orbitRadius;

                // Mouse influence
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const influence = 200;

                if (distance < influence) {
                    const force = (influence - distance) / influence;
                    this.vx += (Math.random() - 0.5) * force * 2;
                    this.vy += (Math.random() - 0.5) * force * 2;
                }

                // Move towards target
                this.vx += (targetX - this.x) * 0.01;
                this.vy += (targetY - this.y) * 0.01;

                // Damping
                this.vx *= 0.95;
                this.vy *= 0.95;

                this.x += this.vx;
                this.y += this.vy;
            }

            draw() {
                const pulseSize = this.size + Math.sin(this.pulse) * this.size * 0.2;
                const pulseAlpha = this.alpha + Math.sin(this.pulse) * 0.1;

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = pulseAlpha;

                // Glow
                ctx.shadowBlur = 15;
                ctx.shadowColor = `hsl(${this.hue}, 80%, 60%)`;

                switch (this.type) {
                    case 'circle':
                        this.drawCircle(pulseSize);
                        break;
                    case 'square':
                        this.drawSquare(pulseSize);
                        break;
                    case 'triangle':
                        this.drawTriangle(pulseSize);
                        break;
                    case 'line':
                        this.drawLine(pulseSize);
                        break;
                }

                ctx.restore();
            }

            drawCircle(size) {
                ctx.beginPath();
                ctx.arc(0, 0, size, 0, Math.PI * 2);
                ctx.strokeStyle = `hsl(${this.hue}, 80%, 60%)`;
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.beginPath();
                ctx.arc(0, 0, size * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, 0.3)`;
                ctx.fill();
            }

            drawSquare(size) {
                ctx.strokeStyle = `hsl(${this.hue}, 80%, 60%)`;
                ctx.lineWidth = 2;
                ctx.strokeRect(-size, -size, size * 2, size * 2);
                
                ctx.fillStyle = `hsla(${this.hue}, 80%, 60%, 0.2)`;
                ctx.fillRect(-size * 0.5, -size * 0.5, size, size);
            }

            drawTriangle(size) {
                ctx.beginPath();
                ctx.moveTo(0, -size);
                ctx.lineTo(size * 0.866, size * 0.5);
                ctx.lineTo(-size * 0.866, size * 0.5);
                ctx.closePath();
                ctx.strokeStyle = `hsl(${this.hue}, 80%, 60%)`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            drawLine(size) {
                ctx.beginPath();
                ctx.moveTo(-size, 0);
                ctx.lineTo(size, 0);
                ctx.strokeStyle = `hsl(${this.hue}, 80%, 60%)`;
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.stroke();
            }
        }

        // Generate pattern
        function generatePattern() {
            elements = [];
            connections = [];

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const patterns = ['spiral', 'grid', 'radial', 'random'];
            const pattern = patterns[Math.floor(Math.random() * patterns.length)];

            switch (pattern) {
                case 'spiral':
                    generateSpiral(centerX, centerY);
                    break;
                case 'grid':
                    generateGrid(centerX, centerY);
                    break;
                case 'radial':
                    generateRadial(centerX, centerY);
                    break;
                case 'random':
                    generateRandom();
                    break;
            }

            // Generate connections
            generateConnections();
        }

        function generateSpiral(cx, cy) {
            const count = 50;
            for (let i = 0; i < count; i++) {
                const angle = i * 0.5;
                const radius = i * 8;
                const x = cx + Math.cos(angle) * radius;
                const y = cy + Math.sin(angle) * radius;
                elements.push(new Element(x, y));
            }
        }

        function generateGrid(cx, cy) {
            const cols = 8;
            const rows = 6;
            const spacing = 80;
            const startX = cx - (cols - 1) * spacing / 2;
            const startY = cy - (rows - 1) * spacing / 2;

            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    const x = startX + col * spacing + (Math.random() - 0.5) * 20;
                    const y = startY + row * spacing + (Math.random() - 0.5) * 20;
                    elements.push(new Element(x, y));
                }
            }
        }

        function generateRadial(cx, cy) {
            const rings = 4;
            const elementsPerRing = 12;

            // Center element
            elements.push(new Element(cx, cy));

            for (let ring = 1; ring <= rings; ring++) {
                const radius = ring * 80;
                for (let i = 0; i < elementsPerRing; i++) {
                    const angle = (i / elementsPerRing) * Math.PI * 2;
                    const x = cx + Math.cos(angle) * radius;
                    const y = cy + Math.sin(angle) * radius;
                    elements.push(new Element(x, y));
                }
            }
        }

        function generateRandom() {
            const count = 40;
            for (let i = 0; i < count; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                elements.push(new Element(x, y));
            }
        }

        function generateConnections() {
            const maxDistance = 150;

            for (let i = 0; i < elements.length; i++) {
                for (let j = i + 1; j < elements.length; j++) {
                    const dx = elements[i].x - elements[j].x;
                    const dy = elements[i].y - elements[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < maxDistance) {
                        connections.push({
                            from: i,
                            to: j,
                            maxDistance: maxDistance
                        });
                    }
                }
            }
        }

        function drawConnections() {
            connections.forEach(conn => {
                const from = elements[conn.from];
                const to = elements[conn.to];

                const dx = from.x - to.x;
                const dy = from.y - to.y;
                const distance = Math.sqrt(dx * dx + dy * dy);

                const alpha = (1 - distance / conn.maxDistance) * 0.3;
                const hue = (from.hue + to.hue) / 2;

                ctx.beginPath();
                ctx.moveTo(from.x, from.y);
                ctx.lineTo(to.x, to.y);
                ctx.strokeStyle = `hsla(${hue}, 70%, 60%, ${alpha})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            });
        }

        // Background particles
        const bgParticles = [];
        for (let i = 0; i < 50; i++) {
            bgParticles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                alpha: Math.random() * 0.3
            });
        }

        function updateBgParticles() {
            bgParticles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 200, 255, ${p.alpha})`;
                ctx.fill();
            });
        }

        // Animation loop
        let time = 0;

        function animate() {
            time++;

            // Clear with fade
            ctx.fillStyle = 'rgba(5, 5, 15, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Background particles
            updateBgParticles();

            // Draw connections
            drawConnections();

            // Update and draw elements
            elements.forEach(element => {
                element.update(time);
                element.draw();
            });

            // Mouse glow
            const glowGradient = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 150);
            glowGradient.addColorStop(0, 'rgba(255, 150, 200, 0.1)');
            glowGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = glowGradient;
            ctx.fillRect(mouseX - 150, mouseY - 150, 300, 300);

            requestAnimationFrame(animate);
        }

        // Generate initial pattern
        generatePattern();

        // Initial clear
        ctx.fillStyle = '#05050f';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        animate();
    </script>
</body>
</html>
