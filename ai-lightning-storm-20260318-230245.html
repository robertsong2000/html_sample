<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>闪电风暴 - Lightning Storm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a2e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(200, 220, 255, 0.9);
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 10px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 
                0 0 20px rgba(100, 150, 255, 1),
                0 0 40px rgba(150, 200, 255, 0.8);
            animation: flicker 0.1s infinite;
        }
        
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.95; }
        }
        
        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 10;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90%;
        }
        
        .btn {
            padding: 10px 20px;
            background: rgba(100, 150, 255, 0.15);
            border: 1px solid rgba(100, 150, 255, 0.4);
            color: rgba(200, 220, 255, 0.9);
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .btn:hover {
            background: rgba(100, 150, 255, 0.25);
            border-color: rgba(100, 150, 255, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(100, 150, 255, 0.4);
        }
        
        .btn.active {
            background: rgba(100, 150, 255, 0.3);
            box-shadow: 0 0 20px rgba(100, 150, 255, 0.6);
        }
        
        .info {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(200, 220, 255, 0.5);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
            text-align: center;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(200, 220, 255, 0.4);
            font-size: 11px;
            z-index: 10;
            pointer-events: none;
            text-align: right;
        }
        
        .storm-info {
            position: fixed;
            bottom: 90px;
            left: 20px;
            color: rgba(200, 220, 255, 0.4);
            font-size: 11px;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="title">⚡ 闪电 ⚡</div>
    
    <div class="info">
        🖱️ 点击 - 生成闪电 | 🎨 移动鼠标 - 引导闪电 | ⚙️ 滚轮 - 调整频率
    </div>
    
    <div class="stats" id="stats">
        闪电: 0 | 频率: 1.0x | FPS: 60
    </div>
    
    <div class="storm-info" id="stormInfo">
        模式: 随机 | 强度: 中等
    </div>
    
    <div class="controls">
        <button class="btn" onclick="changeLightningType()">⚡ 闪电类型</button>
        <button class="btn" onclick="changeColorScheme()">🎨 配色方案</button>
        <button class="btn" onclick="toggleAutoStorm()">🌩️ 自动风暴</button>
        <button class="btn" onclick="toggleClouds()">☁️ 云层效果</button>
        <button class="btn" onclick="toggleRain()">🌧️ 暴雨效果</button>
        <button class="btn" onclick="resetStorm()">🔄 重置风暴</button>
    </div>
    
    <canvas id="canvas"></canvas>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        let lightningFrequency = 1;
        let time = 0;
        
        // 性能监控
        let frameCount = 0;
        let lastFpsUpdate = Date.now();
        let currentFps = 60;
        
        // 闪电类型
        const lightningTypes = [
            { name: '随机', type: 'random' },
            { name: '分支', type: 'branching' },
            { name: '球状', type: 'ball' },
            { name: '片状', type: 'sheet' }
        ];
        let currentType = 0;
        
        // 配色方案
        const colorSchemes = [
            { name: '蓝白', core: '#ffffff', glow: '#00aaff', outer: '#0044aa' },
            { name: '紫白', core: '#ffffff', glow: '#aa00ff', outer: '#4400aa' },
            { name: '红白', core: '#ffffff', glow: '#ff4444', outer: '#aa0000' },
            { name: '绿白', core: '#ffffff', glow: '#00ff44', outer: '#00aa00' },
            { name: '金白', core: '#ffffff', glow: '#ffaa00', outer: '#aa6600' }
        ];
        let currentColorScheme = 0;
        
        let autoStormEnabled = true;
        let cloudsEnabled = true;
        let rainEnabled = false;
        
        // 闪电类
        class Lightning {
            constructor(startX, startY, endX, endY) {
                this.startX = startX;
                this.startY = startY;
                this.endX = endX;
                this.endY = endY;
                this.segments = [];
                this.branches = [];
                this.alpha = 1;
                this.decay = 0.05;
                this.generateSegments();
            }
            
            generateSegments() {
                const type = lightningTypes[currentType].type;
                
                if (type === 'ball') {
                    this.generateBallLightning();
                } else if (type === 'sheet') {
                    this.generateSheetLightning();
                } else {
                    this.generateBolt(type === 'branching');
                }
            }
            
            generateBolt(hasBranches) {
                let x = this.startX;
                let y = this.startY;
                this.segments.push({ x, y });
                
                const steps = 20 + Math.floor(Math.random() * 20);
                const dx = (this.endX - this.startX) / steps;
                const dy = (this.endY - this.startY) / steps;
                
                for (let i = 0; i < steps; i++) {
                    x += dx + (Math.random() - 0.5) * 40;
                    y += dy + (Math.random() - 0.5) * 20;
                    this.segments.push({ x, y });
                    
                    // 生成分支
                    if (hasBranches && Math.random() > 0.7) {
                        this.generateBranch(x, y, 3 + Math.floor(Math.random() * 5));
                    }
                }
            }
            
            generateBranch(startX, startY, depth) {
                if (depth <= 0) return;
                
                const branch = [];
                let x = startX;
                let y = startY;
                const angle = (Math.random() - 0.5) * Math.PI;
                const length = 30 + Math.random() * 50;
                
                for (let i = 0; i < 10; i++) {
                    x += Math.cos(angle) * length / 10 + (Math.random() - 0.5) * 20;
                    y += Math.abs(Math.sin(angle) * length / 10) + (Math.random() - 0.5) * 10;
                    branch.push({ x, y });
                    
                    if (Math.random() > 0.8) {
                        this.generateBranch(x, y, depth - 1);
                    }
                }
                
                this.branches.push(branch);
            }
            
            generateBallLightning() {
                const centerX = (this.startX + this.endX) / 2;
                const centerY = (this.startY + this.endY) / 2;
                const radius = 50 + Math.random() * 100;
                
                for (let i = 0; i < 20; i++) {
                    const angle = (i / 20) * Math.PI * 2;
                    const r = radius * (0.8 + Math.random() * 0.4);
                    const x = centerX + Math.cos(angle) * r;
                    const y = centerY + Math.sin(angle) * r;
                    this.segments.push({ x, y });
                }
            }
            
            generateSheetLightning() {
                const width = 200 + Math.random() * 200;
                const startX = this.startX - width / 2;
                
                for (let i = 0; i < 30; i++) {
                    const x = startX + (i / 30) * width;
                    const y = this.startY + Math.random() * 100;
                    this.segments.push({ x, y });
                }
            }
            
            update() {
                this.alpha -= this.decay;
                return this.alpha > 0;
            }
            
            draw() {
                const scheme = colorSchemes[currentColorScheme];
                
                // 绘制主闪电
                if (this.segments.length > 1) {
                    this.drawBolt(this.segments, scheme, this.alpha);
                }
                
                // 绘制分支
                this.branches.forEach(branch => {
                    this.drawBolt(branch, scheme, this.alpha * 0.6);
                });
            }
            
            drawBolt(segments, scheme, alpha) {
                if (segments.length < 2) return;
                
                // 外发光
                ctx.beginPath();
                ctx.moveTo(segments[0].x, segments[0].y);
                for (let i = 1; i < segments.length; i++) {
                    ctx.lineTo(segments[i].x, segments[i].y);
                }
                ctx.strokeStyle = scheme.outer;
                ctx.globalAlpha = alpha * 0.3;
                ctx.lineWidth = 8;
                ctx.stroke();
                
                // 中间发光
                ctx.strokeStyle = scheme.glow;
                ctx.globalAlpha = alpha * 0.6;
                ctx.lineWidth = 4;
                ctx.stroke();
                
                // 核心白光
                ctx.strokeStyle = scheme.core;
                ctx.globalAlpha = alpha;
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.globalAlpha = 1;
            }
        }
        
        // 雨滴类
        class Raindrop {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = -10;
                this.speed = 15 + Math.random() * 10;
                this.length = 15 + Math.random() * 25;
            }
            
            update() {
                this.y += this.speed;
                this.x -= 2; // 风
                
                if (this.y > height) {
                    this.reset();
                }
            }
            
            draw() {
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - 2, this.y + this.length);
                ctx.strokeStyle = 'rgba(150, 180, 220, 0.3)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }
        
        // 云朵类
        class Cloud {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height * 0.3;
                this.width = 150 + Math.random() * 200;
                this.height = 60 + Math.random() * 40;
                this.speed = 0.3 + Math.random() * 0.5;
                this.alpha = 0.3 + Math.random() * 0.2;
            }
            
            update() {
                this.x += this.speed;
                if (this.x > width + this.width) {
                    this.x = -this.width;
                }
            }
            
            draw() {
                if (!cloudsEnabled) return;
                
                ctx.fillStyle = `rgba(50, 60, 80, ${this.alpha})`;
                
                // 绘制多个椭圆组成云朵
                const ellipses = [
                    { x: 0, y: 0, w: this.width, h: this.height },
                    { x: this.width * 0.2, y: -this.height * 0.2, w: this.width * 0.7, h: this.height * 0.8 },
                    { x: this.width * 0.5, y: 0, w: this.width * 0.6, h: this.height * 0.9 }
                ];
                
                ellipses.forEach(e => {
                    ctx.beginPath();
                    ctx.ellipse(this.x + e.x, this.y + e.y, e.w / 2, e.h / 2, 0, 0, Math.PI * 2);
                    ctx.fill();
                });
            }
        }
        
        let lightnings = [];
        let raindrops = [];
        let clouds = [];
        
        // 初始化
        function init() {
            resize();
            
            // 创建云朵
            for (let i = 0; i < 8; i++) {
                clouds.push(new Cloud());
            }
            
            // 创建雨滴
            for (let i = 0; i < 150; i++) {
                const drop = new Raindrop();
                drop.y = Math.random() * height;
                raindrops.push(drop);
            }
            
            window.addEventListener('resize', resize);
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        // 绘制背景
        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#0a0a1a');
            gradient.addColorStop(0.5, '#1a1a2e');
            gradient.addColorStop(1, '#0a0a1a');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            // 闪电闪光效果
            if (lightnings.length > 0) {
                const flashAlpha = Math.max(...lightnings.map(l => l.alpha)) * 0.2;
                ctx.fillStyle = `rgba(200, 220, 255, ${flashAlpha})`;
                ctx.fillRect(0, 0, width, height);
            }
        }
        
        // 创建闪电
        function createLightning(startX, startY, endX, endY) {
            lightnings.push(new Lightning(startX, startY, endX, endY));
        }
        
        // 动画循环
        let lastTime = 0;
        const targetFPS = 60;
        const interval = 1000 / targetFPS;
        
        function animate(currentTime) {
            requestAnimationFrame(animate);
            
            const delta = currentTime - lastTime;
            if (delta < interval) return;
            lastTime = currentTime - (delta % interval);
            
            // FPS计算
            frameCount++;
            if (currentTime - lastFpsUpdate >= 1000) {
                currentFps = frameCount;
                frameCount = 0;
                lastFpsUpdate = currentTime;
                updateStats();
            }
            
            time += 0.016;
            
            // 绘制背景
            drawBackground();
            
            // 更新和绘制云朵
            clouds.forEach(cloud => {
                cloud.update();
                cloud.draw();
            });
            
            // 自动生成闪电
            if (autoStormEnabled && Math.random() > 0.99 / lightningFrequency) {
                const startX = Math.random() * width;
                const startY = Math.random() * height * 0.2;
                const endX = startX + (Math.random() - 0.5) * 200;
                const endY = height * 0.6 + Math.random() * height * 0.3;
                createLightning(startX, startY, endX, endY);
            }
            
            // 更新和绘制闪电
            lightnings = lightnings.filter(l => {
                const alive = l.update();
                if (alive) l.draw();
                return alive;
            });
            
            // 更新和绘制雨滴
            if (rainEnabled) {
                raindrops.forEach(drop => {
                    drop.update();
                    drop.draw();
                });
            }
            
            updateStats();
        }
        
        function updateStats() {
            document.getElementById('stats').textContent = 
                `闪电: ${lightnings.length} | 频率: ${lightningFrequency.toFixed(1)}x | FPS: ${currentFps}`;
            
            const typeName = lightningTypes[currentType].name;
            const intensity = lightningFrequency < 0.7 ? '微弱' : 
                             lightningFrequency < 1.3 ? '中等' : '强烈';
            document.getElementById('stormInfo').textContent = 
                `模式: ${typeName} | 强度: ${intensity}`;
        }
        
        // 事件处理
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('click', (e) => {
            createLightning(
                e.clientX + (Math.random() - 0.5) * 100,
                0,
                e.clientX,
                e.clientY
            );
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            lightningFrequency = Math.max(0.3, Math.min(3, lightningFrequency - e.deltaY * 0.001));
            updateStats();
        });
        
        // 控制函数
        function changeLightningType() {
            currentType = (currentType + 1) % lightningTypes.length;
            updateStats();
        }
        
        function changeColorScheme() {
            currentColorScheme = (currentColorScheme + 1) % colorSchemes.length;
        }
        
        function toggleAutoStorm() {
            autoStormEnabled = !autoStormEnabled;
            event.target.classList.toggle('active', !autoStormEnabled);
        }
        
        function toggleClouds() {
            cloudsEnabled = !cloudsEnabled;
            event.target.classList.toggle('active', !cloudsEnabled);
        }
        
        function toggleRain() {
            rainEnabled = !rainEnabled;
            event.target.classList.toggle('active', rainEnabled);
            updateStats();
        }
        
        function resetStorm() {
            lightningFrequency = 1;
            currentType = 0;
            currentColorScheme = 0;
            autoStormEnabled = true;
            cloudsEnabled = true;
            rainEnabled = false;
            lightnings = [];
            
            document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
            updateStats();
        }
        
        // 启动
        init();
        animate(0);
    </script>
</body>
</html>
