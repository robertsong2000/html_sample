<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极光效果 - Aurora Borealis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0, 255, 128, 0.5);
        }
        
        .info span {
            display: block;
            margin: 5px 0;
        }
        
        .fps-counter {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="aurora"></canvas>
    <div class="info">
        <span>✨ 移动鼠标影响极光方向</span>
        <span>🖱️ 点击产生能量涟漪</span>
        <span>🔄 长按改变颜色模式</span>
    </div>
    <div class="fps-counter" id="fps">FPS: 60</div>

    <script>
        // 性能优化配置
        const CONFIG = {
            AURORA_LAYERS: 5,
            STARS_COUNT: 200,
            RIPPLE_MAX: 10,
            PARTICLE_COUNT: 50
        };

        // Canvas 设置
        const canvas = document.getElementById('aurora');
        const ctx = canvas.getContext('2d');
        let width, height;
        
        // 性能监控
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        
        // 鼠标状态
        let mouseX = 0;
        let mouseY = 0;
        let targetMouseX = 0;
        let targetMouseY = 0;
        let isPressed = false;
        let pressStartTime = 0;
        
        // 颜色模式
        let colorMode = 0;
        const colorModes = [
            // 经典极光色
            [
                { r: 0, g: 255, b: 128 },
                { r: 0, g: 200, b: 255 },
                { r: 128, g: 0, b: 255 },
                { r: 0, g: 255, b: 200 },
                { r: 100, g: 255, b: 100 }
            ],
            // 北极光
            [
                { r: 0, g: 255, b: 150 },
                { r: 50, g: 200, b: 255 },
                { r: 0, g: 150, b: 255 },
                { r: 100, g: 255, b: 200 },
                { r: 0, g: 200, b: 180 }
            ],
            // 幻彩极光
            [
                { r: 255, g: 0, b: 128 },
                { r: 128, g: 0, b: 255 },
                { r: 0, g: 128, b: 255 },
                { r: 0, g: 255, b: 255 },
                { r: 255, g: 0, b: 255 }
            ]
        ];

        // 极光层
        class AuroraLayer {
            constructor(index) {
                this.index = index;
                this.points = [];
                this.numPoints = 20;
                this.time = Math.random() * 1000;
                this.speed = 0.0005 + Math.random() * 0.001;
                this.amplitude = 50 + Math.random() * 100;
                this.baseY = 0.2 + (index * 0.12);
                
                for (let i = 0; i < this.numPoints; i++) {
                    this.points.push({
                        x: i / (this.numPoints - 1),
                        y: 0,
                        offset: Math.random() * Math.PI * 2
                    });
                }
            }

            update(time, mouseInfluence) {
                this.time += this.speed * 16;
                
                this.points.forEach((point, i) => {
                    const wave1 = Math.sin(this.time + point.offset + i * 0.3) * this.amplitude;
                    const wave2 = Math.sin(this.time * 0.7 + i * 0.2) * this.amplitude * 0.5;
                    const wave3 = Math.cos(this.time * 0.5 + point.offset) * this.amplitude * 0.3;
                    
                    // 鼠标影响
                    const distToMouse = Math.abs(point.x - mouseInfluence.x / width);
                    const mouseEffect = Math.max(0, 1 - distToMouse * 3) * mouseInfluence.strength * 50;
                    
                    point.y = wave1 + wave2 + wave3 + mouseEffect * Math.sin(this.time * 2);
                });
            }

            draw(ctx, colors) {
                const color = colors[this.index % colors.length];
                const baseY = height * this.baseY;
                
                ctx.beginPath();
                ctx.moveTo(0, baseY + this.points[0].y);
                
                // 使用贝塞尔曲线平滑
                for (let i = 1; i < this.points.length - 1; i++) {
                    const xc = (this.points[i].x + this.points[i + 1].x) / 2 * width;
                    const yc = baseY + (this.points[i].y + this.points[i + 1].y) / 2;
                    ctx.quadraticCurveTo(
                        this.points[i].x * width,
                        baseY + this.points[i].y,
                        xc, yc
                    );
                }
                
                ctx.lineTo(width, baseY + this.points[this.points.length - 1].y);
                ctx.lineTo(width, 0);
                ctx.lineTo(0, 0);
                ctx.closePath();
                
                // 创建渐变
                const gradient = ctx.createLinearGradient(0, baseY - 200, 0, baseY + 100);
                gradient.addColorStop(0, `rgba(${color.r}, ${color.g}, ${color.b}, 0)`);
                gradient.addColorStop(0.3, `rgba(${color.r}, ${color.g}, ${color.b}, 0.1)`);
                gradient.addColorStop(0.5, `rgba(${color.r}, ${color.g}, ${color.b}, 0.3)`);
                gradient.addColorStop(0.7, `rgba(${color.r}, ${color.g}, ${color.b}, 0.1)`);
                gradient.addColorStop(1, `rgba(${color.r}, ${color.g}, ${color.b}, 0)`);
                
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // 发光效果
                ctx.shadowBlur = 30;
                ctx.shadowColor = `rgba(${color.r}, ${color.g}, ${color.b}, 0.5)`;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // 星星
        class Star {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height * 0.7;
                this.size = Math.random() * 2 + 0.5;
                this.twinkleSpeed = Math.random() * 0.02 + 0.01;
                this.twinkleOffset = Math.random() * Math.PI * 2;
                this.brightness = Math.random();
            }
            
            update(time) {
                this.brightness = 0.3 + Math.sin(time * this.twinkleSpeed + this.twinkleOffset) * 0.7;
            }
            
            draw(ctx) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.brightness})`;
                ctx.fill();
            }
        }

        // 涟漪效果
        class Ripple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = 200;
                this.speed = 5;
                this.alpha = 1;
                this.color = colorModes[colorMode][Math.floor(Math.random() * 5)];
            }
            
            update() {
                this.radius += this.speed;
                this.alpha = 1 - this.radius / this.maxRadius;
                return this.radius < this.maxRadius;
            }
            
            draw(ctx) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha * 0.5})`;
                ctx.lineWidth = 3;
                ctx.stroke();
                
                // 内圈
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.7, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha * 0.3})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        // 粒子
        class Particle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height * 0.5;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = Math.random() * 0.5 + 0.2;
                this.size = Math.random() * 3 + 1;
                this.alpha = Math.random() * 0.5 + 0.2;
                this.color = colorModes[colorMode][Math.floor(Math.random() * 5)];
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                if (this.y > height * 0.7 || this.x < 0 || this.x > width) {
                    this.reset();
                    this.y = 0;
                }
            }
            
            draw(ctx) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${this.alpha})`;
                ctx.fill();
            }
        }

        // 初始化对象
        let auroraLayers = [];
        let stars = [];
        let ripples = [];
        let particles = [];

        function init() {
            resize();
            
            auroraLayers = [];
            for (let i = 0; i < CONFIG.AURORA_LAYERS; i++) {
                auroraLayers.push(new AuroraLayer(i));
            }
            
            stars = [];
            for (let i = 0; i < CONFIG.STARS_COUNT; i++) {
                stars.push(new Star());
            }
            
            particles = [];
            for (let i = 0; i < CONFIG.PARTICLE_COUNT; i++) {
                particles.push(new Particle());
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            mouseX = width / 2;
            mouseY = height / 2;
            targetMouseX = mouseX;
            targetMouseY = mouseY;
        }

        // 绘制背景
        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#000011');
            gradient.addColorStop(0.3, '#001122');
            gradient.addColorStop(0.6, '#002244');
            gradient.addColorStop(1, '#001133');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }

        // 主动画循环
        function animate(currentTime) {
            // FPS 计算
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
                document.getElementById('fps').textContent = `FPS: ${fps}`;
            }
            
            // 平滑鼠标移动
            mouseX += (targetMouseX - mouseX) * 0.1;
            mouseY += (targetMouseY - mouseY) * 0.1;
            
            const mouseInfluence = {
                x: mouseX,
                y: mouseY,
                strength: isPressed ? 2 : 1
            };
            
            // 清空画布
            drawBackground();
            
            // 绘制星星
            stars.forEach(star => {
                star.update(currentTime);
                star.draw(ctx);
            });
            
            // 绘制极光层
            ctx.globalCompositeOperation = 'lighter';
            auroraLayers.forEach(layer => {
                layer.update(currentTime, mouseInfluence);
                layer.draw(ctx, colorModes[colorMode]);
            });
            ctx.globalCompositeOperation = 'source-over';
            
            // 绘制粒子
            particles.forEach(particle => {
                particle.update();
                particle.draw(ctx);
            });
            
            // 绘制涟漪
            ripples = ripples.filter(ripple => {
                const alive = ripple.update();
                if (alive) ripple.draw(ctx);
                return alive;
            });
            
            requestAnimationFrame(animate);
        }

        // 事件监听
        window.addEventListener('resize', () => {
            resize();
            stars.forEach(star => star.reset());
        });

        canvas.addEventListener('mousemove', (e) => {
            targetMouseX = e.clientX;
            targetMouseY = e.clientY;
        });

        canvas.addEventListener('mousedown', (e) => {
            isPressed = true;
            pressStartTime = Date.now();
            
            // 添加涟漪
            if (ripples.length < CONFIG.RIPPLE_MAX) {
                ripples.push(new Ripple(e.clientX, e.clientY));
            }
        });

        canvas.addEventListener('mouseup', () => {
            const pressDuration = Date.now() - pressStartTime;
            
            // 长按切换颜色模式
            if (pressDuration > 1000) {
                colorMode = (colorMode + 1) % colorModes.length;
                particles.forEach(p => p.reset());
            }
            
            isPressed = false;
        });

        canvas.addEventListener('mouseleave', () => {
            isPressed = false;
        });

        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            targetMouseX = touch.clientX;
            targetMouseY = touch.clientY;
            isPressed = true;
            pressStartTime = Date.now();
            
            if (ripples.length < CONFIG.RIPPLE_MAX) {
                ripples.push(new Ripple(touch.clientX, touch.clientY));
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            targetMouseX = touch.clientX;
            targetMouseY = touch.clientY;
        });

        canvas.addEventListener('touchend', () => {
            const pressDuration = Date.now() - pressStartTime;
            if (pressDuration > 1000) {
                colorMode = (colorMode + 1) % colorModes.length;
                particles.forEach(p => p.reset());
            }
            isPressed = false;
        });

        // 启动
        init();
        animate(0);
    </script>
</body>
</html>
