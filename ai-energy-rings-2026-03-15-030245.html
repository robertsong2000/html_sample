<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>能量环 | Energy Rings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        canvas { display: block; position: fixed; top: 0; left: 0; }
        .info { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(0,255,255,0.7); font-size: 14px; text-align: center; pointer-events: none; z-index: 10; }
        .title { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); color: rgba(0,255,255,0.9); font-size: 28px; font-weight: 300; letter-spacing: 6px; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>
    <canvas id="rings"></canvas>
    <div class="title">Energy Rings</div>
    <div class="info">移动鼠标影响能量场 | 点击产生脉冲 | 滚轮调整环数</div>
    <script>
        const canvas = document.getElementById('rings');
        const ctx = canvas.getContext('2d');
        let width, height, mouseX = 0, mouseY = 0, ringCount = 8, colorMode = 0, time = 0;
        const palettes = [
            ['#00ffff','#ff00ff','#ffff00'],
            ['#00ff88','#ff6b6b','#4ecdc4'],
            ['#a55eea','#45aaf2','#26de81']
        ];
        let rings = [];
        class Ring {
            constructor(index) {
                this.index = index;
                this.radius = 50 + index * 40;
                this.rotation = 0;
                this.rotSpeed = 0.02 - index * 0.002;
                this.segments = 60;
                this.energy = 0.5;
                this.pulsePhase = Math.random() * Math.PI * 2;
            }
            update() {
                const dx = mouseX - width / 2;
                const dy = mouseY - height / 2;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const influence = 1 - Math.min(1, Math.abs(dist - this.radius) / 100);
                this.energy = 0.3 + influence * 0.7;
                this.rotation += this.rotSpeed * (0.5 + this.energy);
                this.pulsePhase += 0.05;
            }
            draw() {
                const cx = width / 2, cy = height / 2;
                const pulse = Math.sin(this.pulsePhase) * 5;
                const r = this.radius + pulse;
                const colors = palettes[colorMode];
                const color = colors[this.index % colors.length];
                ctx.save();
                ctx.globalAlpha = this.energy * 0.8;
                ctx.strokeStyle = color;
                ctx.lineWidth = 2 + this.energy * 2;
                ctx.shadowBlur = 20;
                ctx.shadowColor = color;
                ctx.beginPath();
                for (let i = 0; i <= this.segments; i++) {
                    const angle = (i / this.segments) * Math.PI * 2 + this.rotation;
                    const wobble = Math.sin(angle * 6 + time * 3) * 10 * this.energy;
                    const x = cx + Math.cos(angle) * (r + wobble);
                    const y = cy + Math.sin(angle) * (r + wobble);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();
                ctx.restore();
            }
        }
        let particles = [];
        class EP {
            constructor(x, y, angle) {
                this.x = x; this.y = y;
                this.vx = Math.cos(angle) * 3;
                this.vy = Math.sin(angle) * 3;
                this.size = 2;
                this.alpha = 1;
                this.color = palettes[colorMode][Math.floor(Math.random() * 3)];
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.alpha -= 0.02;
                return this.alpha > 0;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        function init() {
            resize();
            generateRings();
        }
        function generateRings() {
            rings = [];
            for (let i = 0; i < ringCount; i++) rings.push(new Ring(i));
        }
        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        function createPulse() {
            const cx = width / 2, cy = height / 2;
            for (let i = 0; i < 30; i++) {
                const angle = (i / 30) * Math.PI * 2;
                particles.push(new EP(cx, cy, angle));
            }
        }
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.fillRect(0, 0, width, height);
            const gradient = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, 300);
            gradient.addColorStop(0, palettes[colorMode][0] + '30');
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            rings.forEach(r => { r.update(); r.draw(); });
            particles = particles.filter(p => { p.draw(); return p.update(); });
            time += 0.016;
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
        window.addEventListener('click', () => { createPulse(); colorMode = (colorMode + 1) % palettes.length; });
        window.addEventListener('wheel', e => {
            ringCount += e.deltaY > 0 ? -1 : 1;
            ringCount = Math.max(3, Math.min(15, ringCount));
            generateRings();
        });
        init(); draw();
    </script>
</body>
</html>
