<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极光效果 - Aurora Borealis</title>
    <style>
        /* ========== 全局样式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #0a0a12;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        /* ========== Canvas 容器 ========== */
        #auroraCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* ========== 星星层 ========== */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* ========== 信息面板 ========== */
        .info-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 18, 0.7);
            backdrop-filter: blur(10px);
            padding: 20px 25px;
            border-radius: 12px;
            color: #e0e0e0;
            z-index: 100;
            border: 1px solid rgba(100, 255, 200, 0.2);
            max-width: 280px;
            box-shadow: 0 0 30px rgba(100, 255, 200, 0.1);
        }

        .info-panel h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #64ffda, #00bcd4, #ab47bc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .info-panel p {
            font-size: 14px;
            line-height: 1.6;
            opacity: 0.85;
        }

        .info-panel .hint {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(100, 255, 200, 0.15);
            font-size: 12px;
            opacity: 0.7;
        }

        /* ========== 强度指示器 ========== */
        .intensity-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 18, 0.7);
            backdrop-filter: blur(10px);
            padding: 12px 25px;
            border-radius: 25px;
            color: #64ffda;
            font-size: 14px;
            z-index: 100;
            border: 1px solid rgba(100, 255, 200, 0.2);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .intensity-bar .bar {
            width: 100px;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
        }

        .intensity-bar .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #64ffda, #ab47bc);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        /* ========== 移动端适配 ========== */
        @media (max-width: 480px) {
            .info-panel {
                top: 10px;
                left: 10px;
                right: 10px;
                max-width: none;
                padding: 15px 18px;
            }
            .info-panel h1 {
                font-size: 20px;
            }
            .info-panel p {
                font-size: 13px;
            }
            .intensity-bar {
                bottom: 15px;
                padding: 10px 20px;
                font-size: 12px;
            }
            .intensity-bar .bar {
                width: 60px;
            }
        }
    </style>
</head>
<body>
    <!-- 信息面板 -->
    <div class="info-panel">
        <h1>🌌 极光之舞</h1>
        <p>北极光在夜空中缓缓舞动，绿色与紫色的光带交织，如同宇宙的呼吸。</p>
        <div class="hint">
            💡 移动鼠标引导极光方向<br>
            💡 点击增强极光强度
        </div>
    </div>

    <!-- 强度指示器 -->
    <div class="intensity-bar">
        <span>✨ 强度</span>
        <div class="bar">
            <div class="bar-fill" id="intensityFill" style="width: 50%"></div>
        </div>
        <span id="intensityValue">50%</span>
    </div>

    <!-- 主画布 -->
    <canvas id="auroraCanvas"></canvas>

    <script>
        // ========== 画布初始化 ==========
        const canvas = document.getElementById('auroraCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ========== 配置参数 ==========
        const CONFIG = {
            starCount: 200,
            auroraBands: 5,
            baseIntensity: 0.5,
            maxIntensity: 1.0,
            intensityDecay: 0.005,
            mouseInfluence: 0.3
        };

        // ========== 状态变量 ==========
        let intensity = CONFIG.baseIntensity;
        let targetIntensity = CONFIG.baseIntensity;
        let mousePos = { x: canvas.width / 2, y: canvas.height / 3 };
        let targetMousePos = { x: canvas.width / 2, y: canvas.height / 3 };
        let time = 0;

        // ========== 星星类 ==========
        class Star {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height * 0.7;
                this.size = Math.random() * 2 + 0.5;
                this.twinkleSpeed = 0.02 + Math.random() * 0.03;
                this.twinkleOffset = Math.random() * Math.PI * 2;
                this.baseOpacity = 0.3 + Math.random() * 0.5;
            }

            update() {
                this.opacity = this.baseOpacity + Math.sin(time * this.twinkleSpeed + this.twinkleOffset) * 0.3;
            }

            draw() {
                ctx.beginPath();
                ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, this.opacity)})`;
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ========== 极光带类 ==========
        class AuroraBand {
            constructor(index, total) {
                this.index = index;
                this.total = total;
                this.reset();
            }

            reset() {
                // 颜色渐变 - 从绿色到紫色
                const hue = 140 + (this.index / this.total) * 100; // 140-240 (绿到紫)
                this.color = `hsla(${hue}, 80%, 60%, `;
                this.points = [];
                this.numPoints = 8;
                this.speed = 0.0005 + Math.random() * 0.001;
                this.offset = Math.random() * 1000;
                this.amplitude = 30 + Math.random() * 50;
                this.baseY = canvas.height * (0.15 + this.index * 0.08);
            }

            update() {
                this.points = [];
                for (let i = 0; i <= this.numPoints; i++) {
                    const x = (i / this.numPoints) * canvas.width;
                    const wave1 = Math.sin(time * this.speed + this.offset + i * 0.5) * this.amplitude;
                    const wave2 = Math.sin(time * this.speed * 1.5 + this.offset + i * 0.3) * this.amplitude * 0.5;
                    
                    // 鼠标影响
                    const distFromMouse = Math.abs(x - mousePos.x) / canvas.width;
                    const mouseEffect = (1 - distFromMouse) * (mousePos.y / canvas.height - 0.3) * 100 * intensity;
                    
                    const y = this.baseY + wave1 + wave2 + mouseEffect;
                    this.points.push({ x, y });
                }
            }

            draw() {
                if (this.points.length < 2) return;

                // 绘制极光带
                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);

                // 使用贝塞尔曲线平滑
                for (let i = 1; i < this.points.length - 1; i++) {
                    const xc = (this.points[i].x + this.points[i + 1].x) / 2;
                    const yc = (this.points[i].y + this.points[i + 1].y) / 2;
                    ctx.quadraticCurveTo(this.points[i].x, this.points[i].y, xc, yc);
                }

                // 完成路径到底部
                ctx.lineTo(canvas.width, canvas.height);
                ctx.lineTo(0, canvas.height);
                ctx.closePath();

                // 创建渐变
                const gradient = ctx.createLinearGradient(0, this.baseY - 100, 0, canvas.height);
                const alpha = (0.15 + intensity * 0.25) * (1 - this.index / this.total * 0.5);
                gradient.addColorStop(0, `${this.color}${alpha})`);
                gradient.addColorStop(0.3, `${this.color}${alpha * 0.5})`);
                gradient.addColorStop(1, `${this.color}0)`);

                ctx.fillStyle = gradient;
                ctx.fill();

                // 绘制光晕边缘
                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);
                for (let i = 1; i < this.points.length - 1; i++) {
                    const xc = (this.points[i].x + this.points[i + 1].x) / 2;
                    const yc = (this.points[i].y + this.points[i + 1].y) / 2;
                    ctx.quadraticCurveTo(this.points[i].x, this.points[i].y, xc, yc);
                }

                ctx.strokeStyle = `${this.color}${0.3 + intensity * 0.3})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }

        // ========== 粒子效果（极光微粒） ==========
        class AuroraParticle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height * 0.5;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = Math.random() * 0.3;
                this.life = Math.random();
                this.maxLife = 0.5 + Math.random() * 0.5;
                this.hue = 140 + Math.random() * 100;
            }

            update() {
                this.x += this.speedX + (mousePos.x - canvas.width / 2) / canvas.width * 0.5;
                this.y += this.speedY;
                this.life += 0.005;

                if (this.life > this.maxLife || this.y > canvas.height * 0.7) {
                    this.reset();
                }
            }

            draw() {
                const alpha = (1 - this.life / this.maxLife) * intensity * 0.6;
                ctx.beginPath();
                ctx.fillStyle = `hsla(${this.hue}, 80%, 70%, ${alpha})`;
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ========== 初始化对象 ==========
        const stars = [];
        const auroraBands = [];
        const particles = [];

        for (let i = 0; i < CONFIG.starCount; i++) {
            stars.push(new Star());
        }

        for (let i = 0; i < CONFIG.auroraBands; i++) {
            auroraBands.push(new AuroraBand(i, CONFIG.auroraBands));
        }

        for (let i = 0; i < 50; i++) {
            particles.push(new AuroraParticle());
        }

        // ========== 鼠标交互 ==========
        document.addEventListener('mousemove', (e) => {
            targetMousePos.x = e.clientX;
            targetMousePos.y = e.clientY;
        });

        // 点击增强极光强度
        document.addEventListener('click', () => {
            targetIntensity = Math.min(CONFIG.maxIntensity, targetIntensity + 0.2);
        });

        // 触摸支持
        document.addEventListener('touchmove', (e) => {
            e.preventDefault();
            targetMousePos.x = e.touches[0].clientX;
            targetMousePos.y = e.touches[0].clientY;
        });

        document.addEventListener('touchstart', () => {
            targetIntensity = Math.min(CONFIG.maxIntensity, targetIntensity + 0.2);
        });

        // ========== 更新强度指示器 ==========
        function updateIntensityUI() {
            const fill = document.getElementById('intensityFill');
            const value = document.getElementById('intensityValue');
            const percent = Math.round(intensity * 100);
            fill.style.width = `${percent}%`;
            value.textContent = `${percent}%`;
        }

        // ========== 绘制背景渐变 ==========
        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0a0a12');
            gradient.addColorStop(0.5, '#0d1520');
            gradient.addColorStop(1, '#0a0a12');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // ========== 主动画循环 ==========
        function animate() {
            time++;

            // 平滑过渡
            mousePos.x += (targetMousePos.x - mousePos.x) * 0.05;
            mousePos.y += (targetMousePos.y - mousePos.y) * 0.05;
            intensity += (targetIntensity - intensity) * 0.02;

            // 强度自然衰减
            if (targetIntensity > CONFIG.baseIntensity) {
                targetIntensity -= CONFIG.intensityDecay;
            }

            // 绘制背景
            drawBackground();

            // 绘制星星
            stars.forEach(star => {
                star.update();
                star.draw();
            });

            // 绘制极光带（从后到前）
            auroraBands.forEach(band => {
                band.update();
                band.draw();
            });

            // 绘制粒子
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            // 更新UI
            updateIntensityUI();

            requestAnimationFrame(animate);
        }

        // 启动动画
        animate();

        // 窗口大小改变时重置
        window.addEventListener('resize', () => {
            resizeCanvas();
            stars.forEach(star => star.reset());
            auroraBands.forEach(band => band.reset());
            particles.forEach(particle => particle.reset());
        });
    </script>
</body>
</html>
