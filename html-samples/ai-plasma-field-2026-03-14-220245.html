<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>等离子能量场 | Plasma Energy Field</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(100, 200, 255, 0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 10px rgba(100, 200, 255, 0.5);
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(100, 200, 255, 0.9);
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.8);
        }
    </style>
</head>
<body>
    <canvas id="plasma"></canvas>
    <div class="title">Plasma Field</div>
    <div class="info">点击创建能量爆发 | 移动鼠标引导能量流 | 滚轮调整强度</div>
    
    <script>
        const canvas = document.getElementById('plasma');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        let intensity = 1;
        let time = 0;
        
        // 能量粒子
        let particles = [];
        
        class Particle {
            constructor(x, y, angle, speed, color) {
                this.x = x;
                this.y = y;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.size = 2 + Math.random() * 3;
                this.color = color;
                this.life = 1;
                this.decay = 0.005 + Math.random() * 0.01;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.99;
                this.vy *= 0.99;
                this.life -= this.decay;
                return this.life > 0;
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = this.life * 0.8;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        // 能量场节点
        let nodes = [];
        
        class EnergyNode {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 30 + Math.random() * 50;
                this.energy = 0.5 + Math.random() * 0.5;
                this.phase = Math.random() * Math.PI * 2;
                this.pulseSpeed = 0.02 + Math.random() * 0.03;
                this.hue = Math.random() * 60 + 180; // 蓝色到青色
            }
            
            update() {
                this.phase += this.pulseSpeed;
                this.energy = 0.3 + Math.sin(this.phase) * 0.3;
                
                // 鼠标影响
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 200) {
                    this.energy += (200 - dist) / 200 * 0.3;
                }
            }
            
            draw() {
                const pulse = Math.sin(this.phase) * 10;
                const radius = this.radius + pulse;
                
                ctx.save();
                
                // 外层光晕
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, radius * 2
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 70%, ${this.energy * 0.5})`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, 100%, 50%, ${this.energy * 0.3})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, radius * 2, 0, Math.PI * 2);
                ctx.fill();
                
                // 核心光点
                ctx.fillStyle = `hsla(${this.hue}, 100%, 80%, ${this.energy})`;
                ctx.shadowBlur = 20;
                ctx.shadowColor = `hsla(${this.hue}, 100%, 70%, 0.8)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, radius * 0.3, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
            
            emitParticles() {
                if (Math.random() > 0.9) {
                    const count = Math.floor(this.energy * 5);
                    for (let i = 0; i < count; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const speed = 1 + Math.random() * 2;
                        particles.push(new Particle(
                            this.x, this.y, angle, speed,
                            `hsla(${this.hue}, 100%, 70%, 1)`
                        ));
                    }
                }
            }
        }
        
        // 能量连接线
        function drawConnections() {
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const dx = nodes[i].x - nodes[j].x;
                    const dy = nodes[i].y - nodes[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < 200) {
                        const alpha = (1 - dist / 200) * 0.3;
                        const hue = (nodes[i].hue + nodes[j].hue) / 2;
                        
                        ctx.save();
                        ctx.globalAlpha = alpha * intensity;
                        ctx.strokeStyle = `hsla(${hue}, 100%, 60%, 1)`;
                        ctx.lineWidth = 1;
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = `hsla(${hue}, 100%, 60%, 0.5)`;
                        
                        // 波浪线
                        ctx.beginPath();
                        ctx.moveTo(nodes[i].x, nodes[i].y);
                        
                        const midX = (nodes[i].x + nodes[j].x) / 2;
                        const midY = (nodes[i].y + nodes[j].y) / 2;
                        const offset = Math.sin(time * 3 + i + j) * 20;
                        
                        ctx.quadraticCurveTo(
                            midX + offset,
                            midY + offset,
                            nodes[j].x, nodes[j].y
                        );
                        ctx.stroke();
                        
                        ctx.restore();
                    }
                }
            }
        }
        
        function init() {
            resize();
            
            // 创建能量节点
            for (let i = 0; i < 15; i++) {
                nodes.push(new EnergyNode(
                    Math.random() * width,
                    Math.random() * height
                ));
            }
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        function draw() {
            // 淡出背景
            ctx.fillStyle = 'rgba(0, 0, 10, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // 更新和绘制连接线
            drawConnections();
            
            // 更新和绘制节点
            nodes.forEach(node => {
                node.update();
                node.draw();
                node.emitParticles();
            });
            
            // 更新和绘制粒子
            particles = particles.filter(p => {
                p.draw();
                return p.update();
            });
            
            // 限制粒子数量
            if (particles.length > 500) {
                particles = particles.slice(-500);
            }
            
            time += 0.016;
            
            requestAnimationFrame(draw);
        }
        
        // 创建爆发效果
        function createBurst(x, y) {
            const hue = Math.random() * 60 + 180;
            for (let i = 0; i < 50; i++) {
                const angle = (i / 50) * Math.PI * 2;
                const speed = 3 + Math.random() * 5;
                particles.push(new Particle(
                    x, y, angle, speed,
                    `hsla(${hue + Math.random() * 30}, 100%, 70%, 1)`
                ));
            }
            
            // 添加新节点
            if (nodes.length < 25) {
                nodes.push(new EnergyNode(x, y));
            }
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        window.addEventListener('click', (e) => {
            createBurst(e.clientX, e.clientY);
        });
        
        window.addEventListener('wheel', (e) => {
            intensity += e.deltaY > 0 ? -0.1 : 0.1;
            intensity = Math.max(0.3, Math.min(2, intensity));
        });
        
        // 触摸支持
        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });
        
        window.addEventListener('touchstart', (e) => {
            createBurst(e.touches[0].clientX, e.touches[0].clientY);
        });
        
        // 键盘控制
        window.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                e.preventDefault();
                createBurst(width / 2, height / 2);
            }
        });
        
        init();
        draw();
    </script>
</body>
</html>
