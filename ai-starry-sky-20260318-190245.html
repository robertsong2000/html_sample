<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星空效果 - Starry Sky</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 48px;
            font-weight: 300;
            letter-spacing: 15px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 
                0 0 10px rgba(255, 255, 255, 0.8),
                0 0 20px rgba(200, 220, 255, 0.6),
                0 0 30px rgba(150, 180, 255, 0.4);
            animation: twinkle 2s ease-in-out infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 1; }
        }
        
        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 10;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90%;
        }
        
        .btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.9);
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(200, 220, 255, 0.4);
        }
        
        .btn.active {
            background: rgba(200, 220, 255, 0.3);
            box-shadow: 0 0 20px rgba(200, 220, 255, 0.6);
        }
        
        .info {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
            text-align: center;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            z-index: 10;
            pointer-events: none;
            text-align: right;
        }
        
        .star-info {
            position: fixed;
            bottom: 90px;
            left: 20px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="title">✨ 星空 ✨</div>
    
    <div class="info">
        🖱️ 移动鼠标 - 望远镜视角 | 🎨 点击 - 生成流星 | ⚙️ 滚轮 - 调整星星密度
    </div>
    
    <div class="stats" id="stats">
        星星: 0 | 流星: 0 | FPS: 60
    </div>
    
    <div class="star-info" id="starInfo">
        星座连线: 开启 | 亮度: 中等
    </div>
    
    <div class="controls">
        <button class="btn" onclick="changeSkyTheme()">🌌 天空主题</button>
        <button class="btn" onclick="toggleConstellations()">⭐ 星座连线</button>
        <button class="btn" onclick="toggleNebula()">🌠 星云效果</button>
        <button class="btn" onclick="createMeteorShower()">☄️ 流星雨</button>
        <button class="btn" onclick="toggleShootingStars()">💫 自动流星</button>
        <button class="btn" onclick="resetSky()">🔄 重置星空</button>
    </div>
    
    <canvas id="canvas"></canvas>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        let starDensity = 1;
        
        // 性能监控
        let frameCount = 0;
        let lastFpsUpdate = Date.now();
        let currentFps = 60;
        
        // 天空主题
        const skyThemes = [
            { name: '深空', bg: '#000000', starColor: '#ffffff' },
            { name: '黄昏', bg: '#1a0a2e', starColor: '#ffddaa' },
            { name: '极光', bg: '#0a1a2e', starColor: '#aaddff' },
            { name: '星云', bg: '#1a0a1e', starColor: '#ffaaff' },
            { name: '银河', bg: '#050510', starColor: '#ffffff' }
        ];
        let currentTheme = 0;
        
        let constellationsEnabled = true;
        let nebulaEnabled = true;
        let autoShootingStars = true;
        
        // 星星类
        class Star {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = 0.5 + Math.random() * 2.5;
                this.brightness = 0.3 + Math.random() * 0.7;
                this.twinkleSpeed = 0.02 + Math.random() * 0.05;
                this.twinklePhase = Math.random() * Math.PI * 2;
                this.color = this.getStarColor();
                this.hasGlow = Math.random() > 0.7;
            }
            
            getStarColor() {
                const colors = ['#ffffff', '#ffddaa', '#aaddff', '#ffaaff', '#aaffaa'];
                return colors[Math.floor(Math.random() * colors.length)];
            }
            
            update() {
                this.twinklePhase += this.twinkleSpeed;
                this.currentBrightness = this.brightness * (0.5 + 0.5 * Math.sin(this.twinklePhase));
            }
            
            draw() {
                const alpha = this.currentBrightness;
                
                // 发光效果
                if (this.hasGlow && this.size > 1.5) {
                    const gradient = ctx.createRadialGradient(
                        this.x, this.y, 0,
                        this.x, this.y, this.size * 4
                    );
                    gradient.addColorStop(0, this.color);
                    gradient.addColorStop(0.5, this.color.replace(')', `, ${alpha * 0.3})`).replace('rgb', 'rgba').replace('#', 'rgba(').replace(/([a-f0-9]{2})([a-f0-9]{2})([a-f0-9]{2})/i, (m, r, g, b) => 
                        `${parseInt(r, 16)}, ${parseInt(g, 16)}, ${parseInt(b, 16)}`));
                    gradient.addColorStop(1, 'transparent');
                    
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 4, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                }
                
                // 星星本体
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = alpha;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        // 流星类
        class ShootingStar {
            constructor(startX, startY) {
                this.x = startX || Math.random() * width;
                this.y = startY || Math.random() * height * 0.3;
                this.length = 50 + Math.random() * 100;
                this.speed = 10 + Math.random() * 10;
                this.angle = Math.PI / 4 + (Math.random() - 0.5) * 0.3;
                this.alpha = 1;
                this.trail = [];
                this.maxTrail = 20;
            }
            
            update() {
                this.trail.push({ x: this.x, y: this.y, alpha: this.alpha });
                if (this.trail.length > this.maxTrail) {
                    this.trail.shift();
                }
                
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                this.alpha -= 0.01;
                
                return this.alpha > 0 && this.x < width && this.y < height;
            }
            
            draw() {
                // 绘制尾迹
                for (let i = 0; i < this.trail.length; i++) {
                    const point = this.trail[i];
                    const trailAlpha = (i / this.trail.length) * point.alpha;
                    const trailLength = (i / this.trail.length) * 3;
                    
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, trailLength, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${trailAlpha})`;
                    ctx.fill();
                }
                
                // 绘制流星头部
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, 8
                );
                gradient.addColorStop(0, `rgba(255, 255, 255, ${this.alpha})`);
                gradient.addColorStop(0.5, `rgba(200, 220, 255, ${this.alpha * 0.5})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, 8, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }
        
        // 星云类
        class Nebula {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.radius = 100 + Math.random() * 200;
                this.color = this.getNebulaColor();
                this.alpha = 0.05 + Math.random() * 0.1;
                this.phase = Math.random() * Math.PI * 2;
                this.pulseSpeed = 0.01 + Math.random() * 0.02;
            }
            
            getNebulaColor() {
                const colors = ['#ff00ff', '#0088ff', '#ff4400', '#00ff88', '#8800ff'];
                return colors[Math.floor(Math.random() * colors.length)];
            }
            
            update() {
                this.phase += this.pulseSpeed;
                this.currentAlpha = this.alpha * (0.8 + 0.2 * Math.sin(this.phase));
            }
            
            draw() {
                if (!nebulaEnabled) return;
                
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius
                );
                
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(0.5, this.color + '44');
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.globalAlpha = this.currentAlpha;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        // 星座连线
        class Constellation {
            constructor() {
                this.stars = [];
                this.generateConstellation();
            }
            
            generateConstellation() {
                const centerX = Math.random() * width;
                const centerY = Math.random() * height * 0.6;
                const numStars = 3 + Math.floor(Math.random() * 5);
                
                for (let i = 0; i < numStars; i++) {
                    this.stars.push({
                        x: centerX + (Math.random() - 0.5) * 200,
                        y: centerY + (Math.random() - 0.5) * 200,
                        size: 2 + Math.random() * 2
                    });
                }
            }
            
            draw() {
                if (!constellationsEnabled || this.stars.length < 2) return;
                
                // 绘制连线
                ctx.beginPath();
                ctx.moveTo(this.stars[0].x, this.stars[0].y);
                
                for (let i = 1; i < this.stars.length; i++) {
                    ctx.lineTo(this.stars[i].x, this.stars[i].y);
                }
                
                ctx.strokeStyle = 'rgba(150, 180, 255, 0.2)';
                ctx.lineWidth = 1;
                ctx.stroke();
                
                // 绘制星星
                this.stars.forEach(star => {
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                    ctx.fill();
                });
            }
        }
        
        let stars = [];
        let shootingStars = [];
        let nebulae = [];
        let constellations = [];
        
        // 初始化星空
        function initSky() {
            const starCount = Math.floor(500 * starDensity);
            
            stars = [];
            for (let i = 0; i < starCount; i++) {
                stars.push(new Star());
            }
            
            nebulae = [];
            for (let i = 0; i < 5; i++) {
                nebulae.push(new Nebula());
            }
            
            constellations = [];
            for (let i = 0; i < 8; i++) {
                constellations.push(new Constellation());
            }
        }
        
        // 绘制背景
        function drawBackground() {
            const theme = skyThemes[currentTheme];
            
            // 渐变背景
            const gradient = ctx.createRadialGradient(
                width / 2, height / 2, 0,
                width / 2, height / 2, Math.max(width, height)
            );
            gradient.addColorStop(0, theme.bg);
            gradient.addColorStop(1, '#000000');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }
        
        // 初始化
        function init() {
            resize();
            initSky();
            window.addEventListener('resize', resize);
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initSky();
        }
        
        // 动画循环
        let lastTime = 0;
        const targetFPS = 60;
        const interval = 1000 / targetFPS;
        
        function animate(currentTime) {
            requestAnimationFrame(animate);
            
            const delta = currentTime - lastTime;
            if (delta < interval) return;
            lastTime = currentTime - (delta % interval);
            
            // FPS计算
            frameCount++;
            if (currentTime - lastFpsUpdate >= 1000) {
                currentFps = frameCount;
                frameCount = 0;
                lastFpsUpdate = currentTime;
                updateStats();
            }
            
            // 绘制背景
            drawBackground();
            
            // 绘制星云
            nebulae.forEach(nebula => {
                nebula.update();
                nebula.draw();
            });
            
            // 绘制星座
            constellations.forEach(constellation => constellation.draw());
            
            // 更新和绘制星星
            stars.forEach(star => {
                star.update();
                star.draw();
            });
            
            // 自动生成流星
            if (autoShootingStars && Math.random() > 0.995) {
                shootingStars.push(new ShootingStar());
            }
            
            // 更新和绘制流星
            shootingStars = shootingStars.filter(star => {
                const alive = star.update();
                if (alive) star.draw();
                return alive;
            });
            
            updateStats();
        }
        
        function updateStats() {
            document.getElementById('stats').textContent = 
                `星星: ${stars.length} | 流星: ${shootingStars.length} | FPS: ${currentFps}`;
            
            const constText = constellationsEnabled ? '开启' : '关闭';
            const brightness = starDensity < 0.7 ? '暗淡' : starDensity < 1.3 ? '中等' : '明亮';
            document.getElementById('starInfo').textContent = 
                `星座连线: ${constText} | 亮度: ${brightness}`;
        }
        
        // 事件处理
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('click', (e) => {
            shootingStars.push(new ShootingStar(e.clientX, e.clientY));
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            starDensity = Math.max(0.3, Math.min(2, starDensity - e.deltaY * 0.001));
            initSky();
            updateStats();
        });
        
        // 控制函数
        function changeSkyTheme() {
            currentTheme = (currentTheme + 1) % skyThemes.length;
        }
        
        function toggleConstellations() {
            constellationsEnabled = !constellationsEnabled;
            event.target.classList.toggle('active', !constellationsEnabled);
            updateStats();
        }
        
        function toggleNebula() {
            nebulaEnabled = !nebulaEnabled;
            event.target.classList.toggle('active', !nebulaEnabled);
        }
        
        function createMeteorShower() {
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    shootingStars.push(new ShootingStar());
                }, i * 200);
            }
        }
        
        function toggleShootingStars() {
            autoShootingStars = !autoShootingStars;
            event.target.classList.toggle('active', autoShootingStars);
        }
        
        function resetSky() {
            starDensity = 1;
            currentTheme = 0;
            constellationsEnabled = true;
            nebulaEnabled = true;
            autoShootingStars = true;
            shootingStars = [];
            initSky();
            
            document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
            updateStats();
        }
        
        // 启动
        init();
        animate(0);
    </script>
</body>
</html>
