<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星空效果 - Starry Sky</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
        .info {
            position: fixed; bottom: 20px; left: 20px; color: rgba(255,255,255,0.9);
            font-size: 14px; z-index: 10; background: rgba(0,0,30,0.7);
            padding: 15px 20px; border-radius: 10px;
            border: 1px solid rgba(100,150,255,0.3); max-width: 280px;
        }
        .info h3 { margin-bottom: 10px; font-size: 16px; color: #aaccff; text-shadow: 0 0 15px rgba(170,204,255,0.6); }
        .info p { margin: 5px 0; font-size: 12px; line-height: 1.6; }
        .info .key { color: #88aaff; font-weight: bold; }
        .stats {
            position: fixed; top: 20px; right: 20px; color: rgba(255,255,255,0.7);
            font-size: 12px; z-index: 10; background: rgba(0,0,30,0.7);
            padding: 10px 15px; border-radius: 8px; font-family: monospace;
        }
    </style>
</head>
<body>
    <canvas id="stars"></canvas>
    <div class="info">
        <h3>⭐ 星空效果</h3>
        <p><span class="key">移动鼠标</span> - 视差效果</p>
        <p><span class="key">点击</span> - 产生流星</p>
        <p><span class="key">滚轮</span> - 调整星星密度</p>
        <p><span class="key">空格</span> - 切换星空模式</p>
    </div>
    <div class="stats" id="stats">FPS: 60 | 星星: 0</div>

    <script>
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        const statsEl = document.getElementById('stats');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        let starDensity = 1;
        let skyMode = 0;
        let time = 0;
        
        const skyModes = [
            { name: '静谧夜空', nebula: false, aurora: false },
            { name: '星云缭绕', nebula: true, aurora: false },
            { name: '极光之夜', nebula: false, aurora: true }
        ];
        
        // 星星类
        class Star {
            constructor(layer) {
                this.layer = layer;
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = (3 - this.layer) * (0.5 + Math.random() * 1.5);
                this.baseAlpha = 0.3 + Math.random() * 0.7;
                this.twinkleSpeed = 0.02 + Math.random() * 0.05;
                this.twinklePhase = Math.random() * Math.PI * 2;
                this.color = this.getStarColor();
            }
            
            getStarColor() {
                const colors = ['#ffffff', '#ffeedd', '#ddddff', '#ffffdd', '#ddffff'];
                return colors[Math.floor(Math.random() * colors.length)];
            }
            
            update(parallaxX, parallaxY) {
                this.twinklePhase += this.twinkleSpeed;
                this.alpha = this.baseAlpha * (0.5 + Math.sin(this.twinklePhase) * 0.5);
                
                // 视差偏移
                const parallaxFactor = (this.layer + 1) * 0.02;
                this.offsetX = parallaxX * width * parallaxFactor;
                this.offsetY = parallaxY * height * parallaxFactor;
            }
            
            draw(ctx) {
                const x = this.x + this.offsetX;
                const y = this.y + this.offsetY;
                
                // 发光效果
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, this.size * 4);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(0.1, this.hexToRgba(this.color, this.alpha));
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(x, y, this.size * 4, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // 十字光芒
                if (this.size > 1.5) {
                    ctx.strokeStyle = `rgba(255, 255, 255, ${this.alpha * 0.3})`;
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(x - this.size * 3, y);
                    ctx.lineTo(x + this.size * 3, y);
                    ctx.moveTo(x, y - this.size * 3);
                    ctx.lineTo(x, y + this.size * 3);
                    ctx.stroke();
                }
            }
            
            hexToRgba(hex, alpha) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            }
        }
        
        // 流星类
        class Meteor {
            constructor() {
                this.x = Math.random() * width;
                this.y = -10;
                this.vx = 8 + Math.random() * 8;
                this.vy = 4 + Math.random() * 6;
                this.length = 80 + Math.random() * 120;
                this.alpha = 1;
                this.active = true;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= 0.01;
                
                if (this.x > width + 100 || this.y > height + 100 || this.alpha <= 0) {
                    this.active = false;
                }
            }
            
            draw(ctx) {
                if (!this.active) return;
                
                const tailX = this.x - this.vx * (this.length / 10);
                const tailY = this.y - this.vy * (this.length / 10);
                
                const gradient = ctx.createLinearGradient(tailX, tailY, this.x, this.y);
                gradient.addColorStop(0, 'transparent');
                gradient.addColorStop(0.8, `rgba(255, 255, 255, ${this.alpha * 0.5})`);
                gradient.addColorStop(1, `rgba(255, 255, 255, ${this.alpha})`);
                
                ctx.beginPath();
                ctx.moveTo(tailX, tailY);
                ctx.lineTo(this.x, this.y);
                ctx.strokeStyle = gradient;
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // 流星头部发光
                const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 10);
                glow.addColorStop(0, `rgba(255, 255, 255, ${this.alpha})`);
                glow.addColorStop(1, 'transparent');
                ctx.beginPath();
                ctx.arc(this.x, this.y, 10, 0, Math.PI * 2);
                ctx.fillStyle = glow;
                ctx.fill();
            }
        }
        
        // 星云类
        class Nebula {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = 100 + Math.random() * 200;
                this.hue = Math.random() * 60 + 200; // 蓝紫色系
            }
            
            draw(ctx, px, py) {
                const x = this.x + px * 30;
                const y = this.y + py * 30;
                
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, this.size);
                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 50%, 0.1)`);
                gradient.addColorStop(0.5, `hsla(${this.hue + 20}, 60%, 40%, 0.05)`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(x, y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }
        
        // 极光类
        class Aurora {
            constructor() {
                this.y = height * (0.1 + Math.random() * 0.3);
                this.phase = Math.random() * Math.PI * 2;
                this.hue = 120 + Math.random() * 60; // 绿色系
            }
            
            draw(ctx) {
                this.phase += 0.01;
                
                ctx.beginPath();
                ctx.moveTo(0, height * 0.5);
                
                for (let x = 0; x <= width; x += 10) {
                    const y = this.y + Math.sin(x * 0.005 + this.phase) * 50 + Math.sin(x * 0.01 + this.phase * 1.5) * 30;
                    ctx.lineTo(x, y);
                }
                
                ctx.lineTo(width, 0);
                ctx.lineTo(0, 0);
                ctx.closePath();
                
                const gradient = ctx.createLinearGradient(0, 0, 0, height * 0.5);
                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 60%, 0.1)`);
                gradient.addColorStop(0.5, `hsla(${this.hue + 30}, 80%, 50%, 0.05)`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }
        
        let stars = [];
        let meteors = [];
        let nebulae = [];
        let auroras = [];
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        
        function init() {
            resize();
            createStars();
            createNebulae();
            createAuroras();
        }
        
        function resize() {
            const dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            ctx.scale(dpr, dpr);
        }
        
        function createStars() {
            stars = [];
            const layers = 3;
            const baseCount = 100;
            
            for (let layer = 0; layer < layers; layer++) {
                const count = Math.floor(baseCount * starDensity * (layer + 1));
                for (let i = 0; i < count; i++) {
                    stars.push(new Star(layer));
                }
            }
        }
        
        function createNebulae() {
            nebulae = [];
            for (let i = 0; i < 5; i++) nebulae.push(new Nebula());
        }
        
        function createAuroras() {
            auroras = [];
            for (let i = 0; i < 3; i++) auroras.push(new Aurora());
        }
        
        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#000011');
            gradient.addColorStop(0.5, '#000822');
            gradient.addColorStop(1, '#001133');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            // 银河带
            const milkyWay = ctx.createLinearGradient(0, 0, width, height);
            milkyWay.addColorStop(0, 'transparent');
            milkyWay.addColorStop(0.4, 'rgba(100,100,150,0.06)');
            milkyWay.addColorStop(0.6, 'rgba(150,150,200,0.08)');
            milkyWay.addColorStop(1, 'transparent');
            ctx.fillStyle = milkyWay;
            ctx.fillRect(0, 0, width, height);
        }
        
        function animate(currentTime) {
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
            }
            
            time++;
            const parallaxX = (mouseX - width / 2) / width;
            const parallaxY = (mouseY - height / 2) / height;
            const mode = skyModes[skyMode];
            
            drawBackground();
            
            if (mode.nebula) nebulae.forEach(n => n.draw(ctx, parallaxX, parallaxY));
            if (mode.aurora) auroras.forEach(a => a.draw(ctx));
            
            stars.forEach(s => { s.update(parallaxX, parallaxY); s.draw(ctx); });
            
            if (Math.random() < 0.003) meteors.push(new Meteor());
            meteors = meteors.filter(m => { m.update(); m.draw(ctx); return m.active; });
            
            statsEl.textContent = `FPS: ${fps} | 星星: ${stars.length} | ${mode.name}`;
            requestAnimationFrame(animate);
        }
        
        window.addEventListener('resize', () => { resize(); createStars(); });
        canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
        canvas.addEventListener('click', () => { meteors.push(new Meteor()); });
        canvas.addEventListener('wheel', e => { e.preventDefault(); starDensity = Math.max(0.3, Math.min(2, starDensity - e.deltaY * 0.001)); createStars(); });
        document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); skyMode = (skyMode + 1) % skyModes.length; } });
        canvas.addEventListener('touchstart', e => { e.preventDefault(); const t = e.touches[0]; mouseX = t.clientX; mouseY = t.clientY; meteors.push(new Meteor()); });
        canvas.addEventListener('touchmove', e => { e.preventDefault(); const t = e.touches[0]; mouseX = t.clientX; mouseY = t.clientY; });
        
        init();
        animate(performance.now());
    </script>
</body>
</html>
