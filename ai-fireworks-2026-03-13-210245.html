<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>烟花盛宴 | Fireworks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a3a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .ui {
            position: fixed;
            z-index: 10;
            color: rgba(255, 255, 255, 0.9);
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255, 200, 100, 0.5);
        }
        
        .title {
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 12px;
            text-shadow: 
                0 0 20px rgba(255, 150, 50, 0.8),
                0 0 40px rgba(255, 100, 50, 0.4);
        }
        
        .info {
            bottom: 25px;
            left: 25px;
            font-size: 13px;
            line-height: 1.8;
            opacity: 0.7;
        }
        
        .stats {
            top: 25px;
            right: 25px;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            text-align: right;
            opacity: 0.6;
        }
        
        @media (max-width: 768px) {
            .title {
                font-size: 18px;
                letter-spacing: 6px;
            }
            .info {
                font-size: 11px;
                bottom: 15px;
                left: 15px;
            }
            .stats {
                font-size: 9px;
                top: 15px;
                right: 15px;
            }
        }
    </style>
</head>
<body>
    <canvas id="fireworks"></canvas>
    
    <div class="ui title">FIREWORKS</div>
    
    <div class="ui stats">
        <div id="particles">Particles: 0</div>
        <div id="fireworksCount">Fireworks: 0</div>
        <div id="fps">FPS: 60</div>
    </div>
    
    <div class="ui info">
        点击发射烟花<br>
        移动鼠标影响风向<br>
        空格键触发烟花雨
    </div>
    
    <script>
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let time = 0;
        let lastTime = performance.now();
        let fps = 60;
        
        // 烟花和粒子数组
        let rockets = [];
        let particles = [];
        let stars = [];
        
        // 鼠标和风
        let mouseX = 0, mouseY = 0;
        let windX = 0;
        
        // 颜色主题
        const colorPalettes = [
            ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff'],
            ['#ff9f43', '#ee5a24', '#f8c291', '#e55039', '#eb4d4b'],
            ['#00d2d3', '#54a0ff', '#5f27cd', '#a29bfe', '#6c5ce7'],
            ['#ffeaa7', '#fdcb6e', '#f39c12', '#e17055', '#d63031'],
            ['#55efc4', '#00b894', '#00cec9', '#81ecec', '#74b9ff']
        ];
        
        // 星星类
        class Star {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height * 0.7;
                this.size = Math.random() * 2 + 0.5;
                this.twinkle = Math.random() * Math.PI * 2;
                this.speed = 0.02 + Math.random() * 0.05;
            }
            
            update() {
                this.twinkle += this.speed;
            }
            
            draw() {
                const alpha = 0.3 + Math.sin(this.twinkle) * 0.4;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fill();
            }
        }
        
        // 火箭类（上升的烟花）
        class Rocket {
            constructor(x, targetY) {
                this.x = x;
                this.y = height;
                this.targetY = targetY;
                this.speed = 8 + Math.random() * 4;
                this.angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.3;
                this.trail = [];
                this.palette = colorPalettes[Math.floor(Math.random() * colorPalettes.length)];
                this.exploded = false;
            }
            
            update() {
                // 添加尾迹
                this.trail.push({ x: this.x, y: this.y, alpha: 1 });
                if (this.trail.length > 15) {
                    this.trail.shift();
                }
                
                // 更新尾迹透明度
                this.trail.forEach((point, i) => {
                    point.alpha = i / this.trail.length;
                });
                
                // 移动
                this.x += Math.cos(this.angle) * this.speed + windX * 0.5;
                this.y += Math.sin(this.angle) * this.speed;
                
                // 检查是否到达目标
                if (this.y <= this.targetY) {
                    this.explode();
                    return false;
                }
                
                return true;
            }
            
            draw() {
                // 绘制尾迹
                this.trail.forEach((point, i) => {
                    const size = 2 * point.alpha;
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 200, 100, ${point.alpha * 0.8})`;
                    ctx.fill();
                });
                
                // 绘制火箭头
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
                
                // 发光效果
                ctx.beginPath();
                ctx.arc(this.x, this.y, 8, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 8);
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.fill();
            }
            
            explode() {
                const particleCount = 80 + Math.floor(Math.random() * 60);
                const explosionType = Math.floor(Math.random() * 4);
                
                for (let i = 0; i < particleCount; i++) {
                    let angle, speed, color;
                    
                    switch (explosionType) {
                        case 0: // 圆形爆炸
                            angle = (Math.PI * 2 / particleCount) * i + Math.random() * 0.2;
                            speed = 2 + Math.random() * 6;
                            break;
                        case 1: // 心形
                            const t = (i / particleCount) * Math.PI * 2;
                            angle = t;
                            speed = 4 * (1 + Math.sin(t) * Math.sin(t)) + Math.random() * 2;
                            break;
                        case 2: // 双环
                            angle = Math.random() * Math.PI * 2;
                            speed = i % 2 === 0 ? 3 + Math.random() * 2 : 6 + Math.random() * 3;
                            break;
                        case 3: // 随机散射
                            angle = Math.random() * Math.PI * 2;
                            speed = 1 + Math.random() * 8;
                            break;
                    }
                    
                    color = this.palette[Math.floor(Math.random() * this.palette.length)];
                    
                    particles.push(new Particle(
                        this.x, this.y, angle, speed, color
                    ));
                }
                
                // 添加闪光中心
                for (let i = 0; i < 20; i++) {
                    particles.push(new Particle(
                        this.x, this.y,
                        Math.random() * Math.PI * 2,
                        Math.random() * 3,
                        '#ffffff',
                        true
                    ));
                }
            }
        }
        
        // 粒子类
        class Particle {
            constructor(x, y, angle, speed, color, isCore = false) {
                this.x = x;
                this.y = y;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.color = color;
                this.alpha = 1;
                this.decay = isCore ? 0.05 : 0.015 + Math.random() * 0.01;
                this.gravity = 0.08;
                this.friction = 0.98;
                this.size = isCore ? 3 + Math.random() * 3 : 2 + Math.random() * 2;
                this.trail = [];
                this.maxTrail = isCore ? 3 : 8;
            }
            
            update() {
                // 添加尾迹
                this.trail.push({ x: this.x, y: this.y, alpha: this.alpha });
                if (this.trail.length > this.maxTrail) {
                    this.trail.shift();
                }
                
                // 应用物理
                this.vx += windX * 0.02;
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                
                this.x += this.vx;
                this.y += this.vy;
                
                this.alpha -= this.decay;
                
                return this.alpha > 0;
            }
            
            draw() {
                // 绘制尾迹
                this.trail.forEach((point, i) => {
                    const trailAlpha = point.alpha * (i / this.trail.length) * 0.5;
                    const trailSize = this.size * (i / this.trail.length);
                    
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, trailSize, 0, Math.PI * 2);
                    ctx.fillStyle = this.hexToRgba(this.color, trailAlpha);
                    ctx.fill();
                });
                
                // 绘制粒子
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.hexToRgba(this.color, this.alpha);
                ctx.fill();
                
                // 发光效果
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 2
                );
                gradient.addColorStop(0, this.hexToRgba(this.color, this.alpha * 0.5));
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.fill();
            }
            
            hexToRgba(hex, alpha) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            }
        }
        
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            // 初始化星星
            stars = [];
            const starCount = Math.min(200, Math.floor(width * height / 5000));
            for (let i = 0; i < starCount; i++) {
                stars.push(new Star());
            }
            
            mouseX = width / 2;
            mouseY = height / 2;
        }
        
        function launchFirework(x, y) {
            const targetY = y || height * 0.2 + Math.random() * height * 0.3;
            rockets.push(new Rocket(x || Math.random() * width, targetY));
        }
        
        function launchFireworkRain() {
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    launchFirework(
                        width * 0.1 + Math.random() * width * 0.8,
                        height * 0.15 + Math.random() * height * 0.25
                    );
                }, i * 200);
            }
        }
        
        function updateFPS() {
            const now = performance.now();
            const delta = now - lastTime;
            lastTime = now;
            fps = Math.round(1000 / delta);
            
            document.getElementById('fps').textContent = `FPS: ${fps}`;
            document.getElementById('particles').textContent = `Particles: ${particles.length}`;
            document.getElementById('fireworksCount').textContent = `Fireworks: ${rockets.length}`;
        }
        
        function animate() {
            time++;
            
            // 半透明背景产生拖尾
            ctx.fillStyle = 'rgba(10, 10, 26, 0.2)';
            ctx.fillRect(0, 0, width, height);
            
            // 更新风向
            const targetWindX = (mouseX - width / 2) / width * 3;
            windX += (targetWindX - windX) * 0.02;
            
            // 绘制星星
            stars.forEach(star => {
                star.update();
                star.draw();
            });
            
            // 自动发射烟花
            if (Math.random() < 0.02) {
                launchFirework();
            }
            
            // 更新和绘制火箭
            rockets = rockets.filter(rocket => {
                const alive = rocket.update();
                if (alive) rocket.draw();
                return alive;
            });
            
            // 更新和绘制粒子
            particles = particles.filter(particle => {
                const alive = particle.update();
                if (alive) particle.draw();
                return alive;
            });
            
            updateFPS();
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        window.addEventListener('resize', init);
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('click', (e) => {
            launchFirework(e.clientX, e.clientY);
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (e.touches.length > 0) {
                launchFirework(e.touches[0].clientX, e.touches[0].clientY);
            }
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        });
        
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                launchFireworkRain();
            }
        });
        
        // 初始化
        init();
        animate();
        
        // 初始烟花
        setTimeout(() => launchFireworkRain(), 500);
    </script>
</body>
</html>
