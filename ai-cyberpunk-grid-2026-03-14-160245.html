<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赛博朋克网格 | Cyberpunk Grid</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(0, 255, 255, 0.8);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
            font-family: 'Courier New', monospace;
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 0, 128, 0.9);
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 8px;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 10;
            text-shadow: 
                0 0 10px rgba(255, 0, 128, 0.8),
                0 0 20px rgba(255, 0, 128, 0.6),
                0 0 40px rgba(255, 0, 128, 0.4);
            font-family: 'Courier New', monospace;
        }
        
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1),
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>
    <canvas id="cyber"></canvas>
    <div class="scanline"></div>
    <div class="title">CYBERPUNK</div>
    <div class="info">移动鼠标控制太阳 | 点击切换配色 | 滚轮调整速度</div>
    
    <script>
        const canvas = document.getElementById('cyber');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        let speed = 1;
        let colorScheme = 0;
        let time = 0;
        
        const colorSchemes = [
            { grid: '#ff0080', sun: '#ff0080', sky: ['#0a0015', '#1a0030', '#2a0045'], ground: '#00ffff' },
            { grid: '#00ff88', sun: '#00ff88', sky: ['#001a0a', '#003a1a', '#005a2a'], ground: '#ff00ff' },
            { grid: '#ffff00', sun: '#ffff00', sky: ['#1a1a00', '#3a3a00', '#5a5a00'], ground: '#00ffff' },
            { grid: '#00ffff', sun: '#00ffff', sky: ['#001a1a', '#003a3a', '#005a5a'], ground: '#ff0080' },
        ];
        
        // 山脉
        let mountains = [];
        
        function generateMountains() {
            mountains = [];
            const segments = 50;
            for (let i = 0; i <= segments; i++) {
                const x = (i / segments) * width;
                const baseHeight = height * 0.4;
                const variation = 
                    Math.sin(i * 0.3) * 50 +
                    Math.sin(i * 0.1) * 80 +
                    Math.sin(i * 0.5) * 30;
                mountains.push({
                    x: x,
                    y: baseHeight + variation
                });
            }
        }
        
        // 网格线
        function drawGrid() {
            const colors = colorSchemes[colorScheme];
            const horizonY = height * 0.5;
            const gridSpacing = 40;
            
            ctx.save();
            
            // 水平线（透视）
            for (let i = 0; i < 30; i++) {
                const progress = i / 30;
                const y = horizonY + progress * (height - horizonY);
                const alpha = 0.3 + progress * 0.5;
                
                ctx.strokeStyle = colors.grid;
                ctx.globalAlpha = alpha;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
            
            // 垂直线（透视汇聚）
            const centerX = width / 2;
            const lineCount = 30;
            
            for (let i = -lineCount; i <= lineCount; i++) {
                const offset = i * gridSpacing * 3;
                const startX = centerX + offset * 0.1;
                const endX = centerX + offset;
                
                ctx.strokeStyle = colors.grid;
                ctx.globalAlpha = 0.5;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(startX, horizonY);
                ctx.lineTo(endX, height);
                ctx.stroke();
            }
            
            ctx.restore();
        }
        
        // 太阳
        function drawSun() {
            const colors = colorSchemes[colorScheme];
            const sunX = mouseX || width / 2;
            const sunY = Math.min(mouseY, height * 0.45) || height * 0.3;
            const sunRadius = 60;
            
            ctx.save();
            
            // 太阳光晕
            const glowGradient = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, sunRadius * 4);
            glowGradient.addColorStop(0, colors.sun + '60');
            glowGradient.addColorStop(0.5, colors.sun + '20');
            glowGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = glowGradient;
            ctx.fillRect(sunX - sunRadius * 4, sunY - sunRadius * 4, sunRadius * 8, sunRadius * 8);
            
            // 太阳条纹
            ctx.globalCompositeOperation = 'source-over';
            const stripeCount = 8;
            for (let i = 0; i < stripeCount; i++) {
                const stripeY = sunY - sunRadius + (i * sunRadius * 2 / stripeCount);
                const stripeHeight = sunRadius / stripeCount * 0.6;
                
                // 计算圆的边界
                const dy = Math.abs(stripeY - sunY);
                if (dy < sunRadius) {
                    const halfWidth = Math.sqrt(sunRadius * sunRadius - dy * dy);
                    
                    ctx.fillStyle = i % 2 === 0 ? colors.sun : 'transparent';
                    ctx.fillRect(sunX - halfWidth, stripeY, halfWidth * 2, stripeHeight);
                }
            }
            
            // 太阳轮廓
            ctx.globalAlpha = 1;
            ctx.strokeStyle = colors.sun;
            ctx.lineWidth = 3;
            ctx.shadowBlur = 20;
            ctx.shadowColor = colors.sun;
            ctx.beginPath();
            ctx.arc(sunX, sunY, sunRadius, 0, Math.PI * 2);
            ctx.stroke();
            
            ctx.restore();
        }
        
        // 山脉
        function drawMountains() {
            if (mountains.length === 0) return;
            
            const colors = colorSchemes[colorScheme];
            
            ctx.save();
            
            // 山脉填充
            ctx.fillStyle = '#0a0015';
            ctx.beginPath();
            ctx.moveTo(0, height * 0.5);
            mountains.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.lineTo(width, height * 0.5);
            ctx.closePath();
            ctx.fill();
            
            // 山脉轮廓
            ctx.strokeStyle = colors.grid;
            ctx.lineWidth = 2;
            ctx.shadowBlur = 10;
            ctx.shadowColor = colors.grid;
            ctx.beginPath();
            ctx.moveTo(0, height * 0.5);
            mountains.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.stroke();
            
            ctx.restore();
        }
        
        // 星星
        let stars = [];
        
        class Star {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height * 0.4;
                this.size = Math.random() * 2;
                this.twinkle = Math.random() * Math.PI * 2;
                this.twinkleSpeed = Math.random() * 0.1 + 0.05;
            }
            
            draw() {
                this.twinkle += this.twinkleSpeed;
                const alpha = (Math.sin(this.twinkle) + 1) / 2 * 0.8 + 0.2;
                
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#fff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        // 闪电
        let lightnings = [];
        
        class Lightning {
            constructor() {
                this.x = Math.random() * width;
                this.segments = [];
                this.alpha = 1;
                this.generateSegments();
            }
            
            generateSegments() {
                let y = 0;
                let x = this.x;
                
                while (y < height * 0.5) {
                    this.segments.push({ x, y });
                    y += 20 + Math.random() * 30;
                    x += (Math.random() - 0.5) * 60;
                }
            }
            
            update() {
                this.alpha -= 0.05;
                return this.alpha > 0;
            }
            
            draw() {
                if (this.segments.length < 2) return;
                
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#00ffff';
                
                ctx.beginPath();
                ctx.moveTo(this.segments[0].x, this.segments[0].y);
                for (let i = 1; i < this.segments.length; i++) {
                    ctx.lineTo(this.segments[i].x, this.segments[i].y);
                }
                ctx.stroke();
                
                // 光晕
                ctx.lineWidth = 6;
                ctx.globalAlpha = this.alpha * 0.3;
                ctx.stroke();
                
                ctx.restore();
            }
        }
        
        function init() {
            resize();
            generateMountains();
            
            for (let i = 0; i < 100; i++) {
                stars.push(new Star());
            }
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            generateMountains();
        }
        
        function draw() {
            const colors = colorSchemes[colorScheme];
            
            // 天空渐变
            const skyGradient = ctx.createLinearGradient(0, 0, 0, height);
            skyGradient.addColorStop(0, colors.sky[0]);
            skyGradient.addColorStop(0.4, colors.sky[1]);
            skyGradient.addColorStop(0.5, colors.sky[2]);
            skyGradient.addColorStop(0.5, '#000');
            skyGradient.addColorStop(1, '#000');
            
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, width, height);
            
            // 星星
            stars.forEach(s => s.draw());
            
            // 太阳
            drawSun();
            
            // 山脉
            drawMountains();
            
            // 网格
            drawGrid();
            
            // 闪电
            if (Math.random() > 0.995) {
                lightnings.push(new Lightning());
            }
            lightnings = lightnings.filter(l => {
                l.draw();
                return l.update();
            });
            
            // 地平线发光
            ctx.save();
            const horizonGlow = ctx.createLinearGradient(0, height * 0.45, 0, height * 0.55);
            horizonGlow.addColorStop(0, 'transparent');
            horizonGlow.addColorStop(0.5, colors.ground + '40');
            horizonGlow.addColorStop(1, 'transparent');
            ctx.fillStyle = horizonGlow;
            ctx.fillRect(0, height * 0.45, width, height * 0.1);
            ctx.restore();
            
            time += 0.016 * speed;
            
            requestAnimationFrame(draw);
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        window.addEventListener('click', () => {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
            lightnings.push(new Lightning());
        });
        
        window.addEventListener('wheel', (e) => {
            speed += e.deltaY > 0 ? -0.2 : 0.2;
            speed = Math.max(0.2, Math.min(3, speed));
        });
        
        // 触摸支持
        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });
        
        window.addEventListener('touchstart', () => {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
            lightnings.push(new Lightning());
        });
        
        init();
        draw();
    </script>
</body>
</html>
