<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神经网络 | Neural Network</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #050510;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            cursor: pointer;
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(100, 200, 255, 0.9);
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 10px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 
                0 0 20px rgba(100, 200, 255, 0.8),
                0 0 40px rgba(100, 200, 255, 0.4);
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
            text-align: center;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(100, 200, 255, 0.5);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
            text-align: right;
            line-height: 1.8;
        }
        
        @media (max-width: 768px) {
            .title {
                font-size: 22px;
                letter-spacing: 5px;
            }
            .info {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="title">神经网络</div>
    <canvas id="neural"></canvas>
    <div class="stats">
        <div>节点: <span id="nodeCount">0</span></div>
        <div>连接: <span id="connectionCount">0</span></div>
    </div>
    <div class="info">移动鼠标激活节点 · 点击发送信号脉冲 · 滚轮调整密度</div>
    
    <script>
        const canvas = document.getElementById('neural');
        const ctx = canvas.getContext('2d');
        const nodeCountEl = document.getElementById('nodeCount');
        const connectionCountEl = document.getElementById('connectionCount');
        
        let width, height;
        let nodes = [];
        let connections = [];
        let signals = [];
        let mouseX = 0, mouseY = 0;
        let time = 0;
        let density = 1;
        
        // 节点类
        class Node {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.baseRadius = 4;
                this.radius = this.baseRadius;
                this.activation = 0;
                this.pulseOffset = Math.random() * Math.PI * 2;
                this.connections = [];
            }
            
            update() {
                // 激活衰减
                this.activation *= 0.95;
                
                // 脉动效果
                const pulse = Math.sin(time * 0.05 + this.pulseOffset) * 0.2;
                this.radius = this.baseRadius + this.activation * 8 + pulse;
                
                // 鼠标激活
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.hypot(dx, dy);
                
                if (dist < 100) {
                    this.activation = Math.min(1, this.activation + 0.1);
                }
            }
            
            draw() {
                // 发光效果
                if (this.activation > 0.1) {
                    const glow = ctx.createRadialGradient(
                        this.x, this.y, 0,
                        this.x, this.y, 30 + this.activation * 20
                    );
                    glow.addColorStop(0, `rgba(100, 200, 255, ${this.activation * 0.3})`);
                    glow.addColorStop(1, 'transparent');
                    
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, 30 + this.activation * 20, 0, Math.PI * 2);
                    ctx.fillStyle = glow;
                    ctx.fill();
                }
                
                // 节点本体
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                
                const brightness = 150 + this.activation * 105;
                ctx.fillStyle = `rgb(${brightness * 0.4}, ${brightness * 0.8}, ${brightness})`;
                ctx.fill();
            }
            
            activate() {
                this.activation = 1;
            }
        }
        
        // 连接类
        class Connection {
            constructor(nodeA, nodeB) {
                this.nodeA = nodeA;
                this.nodeB = nodeB;
                this.strength = 0;
                this.maxStrength = 0.5 + Math.random() * 0.5;
            }
            
            update() {
                // 传递激活
                const transfer = 0.02;
                
                if (this.nodeA.activation > this.nodeB.activation + 0.1) {
                    this.nodeB.activation += transfer * this.nodeA.activation;
                    this.strength = Math.min(this.maxStrength, this.strength + 0.1);
                }
                
                if (this.nodeB.activation > this.nodeA.activation + 0.1) {
                    this.nodeA.activation += transfer * this.nodeB.activation;
                    this.strength = Math.min(this.maxStrength, this.strength + 0.1);
                }
                
                // 强度衰减
                this.strength *= 0.98;
            }
            
            draw() {
                const baseAlpha = 0.1 + this.strength * 0.5;
                const avgActivation = (this.nodeA.activation + this.nodeB.activation) / 2;
                
                ctx.beginPath();
                ctx.moveTo(this.nodeA.x, this.nodeA.y);
                ctx.lineTo(this.nodeB.x, this.nodeB.y);
                ctx.strokeStyle = `rgba(100, 200, 255, ${baseAlpha + avgActivation * 0.3})`;
                ctx.lineWidth = 1 + this.strength * 2;
                ctx.stroke();
                
                // 发光
                if (this.strength > 0.3 || avgActivation > 0.3) {
                    ctx.strokeStyle = `rgba(100, 200, 255, ${(this.strength + avgActivation) * 0.2})`;
                    ctx.lineWidth = 4;
                    ctx.stroke();
                }
            }
        }
        
        // 信号类
        class Signal {
            constructor(connection) {
                this.connection = connection;
                this.progress = 0;
                this.speed = 0.03 + Math.random() * 0.02;
                this.direction = Math.random() > 0.5 ? 1 : -1;
                this.active = true;
            }
            
            update() {
                this.progress += this.speed;
                
                if (this.progress >= 1) {
                    // 激活目标节点
                    if (this.direction > 0) {
                        this.connection.nodeB.activate();
                    } else {
                        this.connection.nodeA.activate();
                    }
                    this.active = false;
                }
            }
            
            draw() {
                if (!this.active) return;
                
                const x = this.connection.nodeA.x + 
                    (this.connection.nodeB.x - this.connection.nodeA.x) * 
                    (this.direction > 0 ? this.progress : 1 - this.progress);
                const y = this.connection.nodeA.y + 
                    (this.connection.nodeB.y - this.connection.nodeA.y) * 
                    (this.direction > 0 ? this.progress : 1 - this.progress);
                
                // 信号光点
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.fill();
                
                // 拖尾
                ctx.beginPath();
                ctx.arc(x, y, 8, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, 8);
                gradient.addColorStop(0, 'rgba(100, 200, 255, 0.5)');
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initNetwork();
        }
        
        function initNetwork() {
            nodes = [];
            connections = [];
            signals = [];
            
            // 创建节点
            const nodeCount = Math.floor((width * height) / 15000 * density);
            const cols = Math.ceil(Math.sqrt(nodeCount * width / height));
            const rows = Math.ceil(nodeCount / cols);
            const spacingX = width / (cols + 1);
            const spacingY = height / (rows + 1);
            
            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    if (nodes.length >= nodeCount) break;
                    
                    const x = spacingX * (col + 1) + (Math.random() - 0.5) * spacingX * 0.5;
                    const y = spacingY * (row + 1) + (Math.random() - 0.5) * spacingY * 0.5;
                    
                    nodes.push(new Node(x, y));
                }
            }
            
            // 创建连接
            const maxDistance = Math.min(width, height) * 0.15;
            
            for (let i = 0; i < nodes.length; i++) {
                for (let j = i + 1; j < nodes.length; j++) {
                    const dist = Math.hypot(
                        nodes[i].x - nodes[j].x,
                        nodes[i].y - nodes[j].y
                    );
                    
                    if (dist < maxDistance && Math.random() < 0.6) {
                        const connection = new Connection(nodes[i], nodes[j]);
                        connections.push(connection);
                        nodes[i].connections.push(connection);
                        nodes[j].connections.push(connection);
                    }
                }
            }
            
            nodeCountEl.textContent = nodes.length;
            connectionCountEl.textContent = connections.length;
        }
        
        function sendSignal() {
            // 从随机激活的节点发送信号
            const activeNodes = nodes.filter(n => n.activation > 0.3);
            
            if (activeNodes.length > 0 && connections.length > 0) {
                const sourceNode = activeNodes[Math.floor(Math.random() * activeNodes.length)];
                
                if (sourceNode.connections.length > 0) {
                    const connection = sourceNode.connections[
                        Math.floor(Math.random() * sourceNode.connections.length)
                    ];
                    signals.push(new Signal(connection));
                }
            } else if (connections.length > 0) {
                // 随机发送
                const connection = connections[Math.floor(Math.random() * connections.length)];
                signals.push(new Signal(connection));
            }
        }
        
        function drawBackground() {
            ctx.fillStyle = '#050510';
            ctx.fillRect(0, 0, width, height);
            
            // 微弱的网格
            ctx.strokeStyle = 'rgba(50, 100, 150, 0.05)';
            ctx.lineWidth = 1;
            
            const gridSize = 50;
            for (let x = 0; x < width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            for (let y = 0; y < height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
        }
        
        function animate() {
            drawBackground();
            
            // 更新连接
            connections.forEach(conn => conn.update());
            
            // 绘制连接
            connections.forEach(conn => conn.draw());
            
            // 更新和绘制信号
            for (let i = signals.length - 1; i >= 0; i--) {
                signals[i].update();
                signals[i].draw();
                
                if (!signals[i].active) {
                    signals.splice(i, 1);
                }
            }
            
            // 更新和绘制节点
            nodes.forEach(node => {
                node.update();
                node.draw();
            });
            
            // 随机信号
            if (Math.random() < 0.05) {
                sendSignal();
            }
            
            time++;
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        function handleMouseMove(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
        }
        
        function handleTouchMove(e) {
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        }
        
        function handleClick(e) {
            // 激活最近的节点
            let minDist = Infinity;
            let nearestNode = null;
            
            nodes.forEach(node => {
                const dist = Math.hypot(node.x - e.clientX, node.y - e.clientY);
                if (dist < minDist) {
                    minDist = dist;
                    nearestNode = node;
                }
            });
            
            if (nearestNode) {
                nearestNode.activate();
                
                // 发送多个信号
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => sendSignal(), i * 100);
                }
            }
        }
        
        function handleWheel(e) {
            e.preventDefault();
            density = Math.max(0.3, Math.min(2, density - e.deltaY * 0.001));
            initNetwork();
        }
        
        function handleTouchStart(e) {
            if (e.touches.length > 0) {
                handleClick({ clientX: e.touches[0].clientX, clientY: e.touches[0].clientY });
            }
        }
        
        // 初始化
        function init() {
            resize();
            
            window.addEventListener('resize', resize);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('touchmove', handleTouchMove, { passive: true });
            canvas.addEventListener('click', handleClick);
            canvas.addEventListener('wheel', handleWheel, { passive: false });
            canvas.addEventListener('touchstart', handleTouchStart, { passive: true });
            
            // 检测 prefers-reduced-motion
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
            if (!prefersReducedMotion.matches) {
                animate();
            } else {
                // 静态渲染
                drawBackground();
                connections.forEach(conn => conn.draw());
                nodes.forEach(node => node.draw());
            }
        }
        
        init();
    </script>
</body>
</html>
