<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火焰效果 | Fire Effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .ui {
            position: fixed;
            z-index: 10;
            color: rgba(255, 200, 100, 0.9);
            pointer-events: none;
        }
        
        .title {
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 12px;
            text-shadow: 
                0 0 20px rgba(255, 100, 0, 0.8),
                0 0 40px rgba(255, 50, 0, 0.6),
                0 0 60px rgba(255, 0, 0, 0.4);
        }
        
        .info {
            bottom: 25px;
            left: 25px;
            font-size: 13px;
            line-height: 1.8;
            text-shadow: 0 0 10px rgba(255, 100, 0, 0.5);
            opacity: 0.7;
        }
        
        .stats {
            top: 25px;
            right: 25px;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            text-align: right;
            text-shadow: 0 0 5px rgba(255, 100, 0, 0.5);
            opacity: 0.6;
        }
        
        .glow {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: radial-gradient(ellipse at 50% 100%, 
                rgba(255, 50, 0, 0.2) 0%, 
                rgba(255, 100, 0, 0.1) 30%, 
                transparent 70%);
            pointer-events: none;
            z-index: 5;
        }
        
        @media (max-width: 768px) {
            .title {
                font-size: 20px;
                letter-spacing: 6px;
            }
            .info {
                font-size: 11px;
                bottom: 15px;
                left: 15px;
            }
            .stats {
                font-size: 9px;
                top: 15px;
                right: 15px;
            }
        }
    </style>
</head>
<body>
    <canvas id="fire"></canvas>
    <div class="glow"></div>
    
    <div class="ui title">FIRE</div>
    
    <div class="ui stats">
        <div id="particles">Particles: 0</div>
        <div id="fps">FPS: 60</div>
    </div>
    
    <div class="ui info">
        移动鼠标控制火源位置<br>
        点击产生火焰爆发
    </div>
    
    <script>
        const canvas = document.getElementById('fire');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let time = 0;
        let lastTime = performance.now();
        let fps = 60;
        
        // 火焰粒子数组
        let fireParticles = [];
        
        // 火花粒子
        let sparks = [];
        
        // 烟雾粒子
        let smoke = [];
        
        // 鼠标位置（火源）
        let fireX = 0, fireY = 0;
        let mouseX = 0, mouseY = 0;
        
        // 火焰粒子类
        class FireParticle {
            constructor(x, y, burst = false) {
                this.x = x + (Math.random() - 0.5) * 30;
                this.y = y;
                this.vx = (Math.random() - 0.5) * (burst ? 8 : 2);
                this.vy = -(Math.random() * (burst ? 15 : 8) + 3);
                this.size = burst ? 8 + Math.random() * 12 : 4 + Math.random() * 8;
                this.life = 1;
                this.decay = 0.01 + Math.random() * 0.02;
                this.gravity = -0.05; // 轻微向上
                this.turbulence = Math.random() * 0.5;
            }
            
            update() {
                // 湍流效果
                this.vx += Math.sin(time * 0.1 + this.turbulence * 10) * this.turbulence * 0.3;
                
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.vx *= 0.99;
                this.life -= this.decay;
                this.size *= 0.99;
                
                return this.life > 0 && this.size > 0.5;
            }
            
            draw() {
                const alpha = this.life;
                const lifeStage = 1 - this.life;
                
                // 颜色从白->黄->橙->红->暗红渐变
                let r, g, b;
                if (lifeStage < 0.2) {
                    // 白到黄
                    r = 255;
                    g = 255 - lifeStage * 5 * 55;
                    b = 200 * (1 - lifeStage * 5);
                } else if (lifeStage < 0.5) {
                    // 黄到橙
                    r = 255;
                    g = 200 - (lifeStage - 0.2) * 3.33 * 130;
                    b = 0;
                } else if (lifeStage < 0.8) {
                    // 橙到红
                    r = 255;
                    g = 70 - (lifeStage - 0.5) * 3.33 * 70;
                    b = 0;
                } else {
                    // 红到暗红
                    r = 255 - (lifeStage - 0.8) * 5 * 155;
                    g = 0;
                    b = 0;
                }
                
                // 发光效果
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 2
                );
                gradient.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${alpha})`);
                gradient.addColorStop(0.4, `rgba(${r * 0.8}, ${g * 0.5}, ${b}, ${alpha * 0.5})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }
        
        // 火花类
        class Spark {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = 3 + Math.random() * 8;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed - 5;
                this.size = 1 + Math.random() * 2;
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.03;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.2; // 重力
                this.vx *= 0.98;
                this.life -= this.decay;
                
                return this.life > 0;
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, ${200 + Math.random() * 55}, 100, ${this.life})`;
                ctx.fill();
                
                // 拖尾
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - this.vx * 2, this.y - this.vy * 2);
                ctx.strokeStyle = `rgba(255, 150, 50, ${this.life * 0.5})`;
                ctx.lineWidth = this.size * 0.5;
                ctx.stroke();
            }
        }
        
        // 烟雾类
        class Smoke {
            constructor(x, y) {
                this.x = x + (Math.random() - 0.5) * 20;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = -Math.random() * 2 - 1;
                this.size = 10 + Math.random() * 20;
                this.life = 1;
                this.decay = 0.005 + Math.random() * 0.01;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.05;
            }
            
            update() {
                this.x += this.vx + Math.sin(time * 0.02 + this.x * 0.01) * 0.5;
                this.y += this.vy;
                this.size += 0.5;
                this.life -= this.decay;
                this.rotation += this.rotationSpeed;
                
                return this.life > 0;
            }
            
            draw() {
                const alpha = this.life * 0.3;
                const gray = 80 + (1 - this.life) * 40;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${gray}, ${gray}, ${gray}, ${alpha})`;
                ctx.fill();
            }
        }
        
        // 绘制底座火焰光晕
        function drawBaseGlow() {
            const gradient = ctx.createRadialGradient(
                fireX, fireY, 0,
                fireX, fireY, 150
            );
            gradient.addColorStop(0, 'rgba(255, 100, 0, 0.3)');
            gradient.addColorStop(0.5, 'rgba(255, 50, 0, 0.15)');
            gradient.addColorStop(1, 'transparent');
            
            ctx.beginPath();
            ctx.arc(fireX, fireY, 150, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
        }
        
        // 绘制木炭/燃料基座
        function drawFuelBase() {
            const baseWidth = 80;
            const baseHeight = 20;
            
            // 发光的木炭
            for (let i = 0; i < 5; i++) {
                const x = fireX + (i - 2) * 15 + Math.sin(time * 0.05 + i) * 2;
                const y = fireY + Math.sin(time * 0.03 + i * 2) * 2;
                const size = 12 + Math.sin(time * 0.1 + i) * 3;
                
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, size);
                gradient.addColorStop(0, 'rgba(255, 150, 50, 0.9)');
                gradient.addColorStop(0.5, 'rgba(255, 80, 0, 0.6)');
                gradient.addColorStop(1, 'rgba(100, 20, 0, 0.3)');
                
                ctx.beginPath();
                ctx.ellipse(x, y, size, size * 0.6, 0, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }
        
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            fireX = width / 2;
            fireY = height * 0.75;
            mouseX = fireX;
            mouseY = fireY;
        }
        
        function createFireParticles(x, y, count, burst = false) {
            for (let i = 0; i < count; i++) {
                fireParticles.push(new FireParticle(x, y, burst));
            }
        }
        
        function createSparks(x, y, count) {
            for (let i = 0; i < count; i++) {
                sparks.push(new Spark(x, y));
            }
        }
        
        function createSmoke(x, y) {
            if (Math.random() < 0.3) {
                smoke.push(new Smoke(x, y));
            }
        }
        
        function burstFire(x, y) {
            createFireParticles(x, y, 50, true);
            createSparks(x, y, 30);
        }
        
        function updateFPS() {
            const now = performance.now();
            const delta = now - lastTime;
            lastTime = now;
            fps = Math.round(1000 / delta);
            document.getElementById('fps').textContent = `FPS: ${fps}`;
            document.getElementById('particles').textContent = `Particles: ${fireParticles.length + sparks.length + smoke.length}`;
        }
        
        function animate() {
            time++;
            
            // 清除画布（带拖尾效果）
            ctx.fillStyle = 'rgba(10, 10, 10, 0.15)';
            ctx.fillRect(0, 0, width, height);
            
            // 平滑跟随鼠标
            fireX += (mouseX - fireX) * 0.05;
            fireY += (mouseY - fireY) * 0.05;
            
            // 持续产生火焰粒子
            createFireParticles(fireX, fireY, 3);
            createSmoke(fireX, fireY - 50);
            
            // 偶尔产生火花
            if (Math.random() < 0.1) {
                createSparks(fireX + (Math.random() - 0.5) * 30, fireY, 1);
            }
            
            // 绘制底座光晕
            drawBaseGlow();
            drawFuelBase();
            
            // 更新和绘制烟雾（最底层）
            smoke = smoke.filter(s => {
                const alive = s.update();
                s.draw();
                return alive;
            });
            
            // 更新和绘制火焰粒子
            fireParticles = fireParticles.filter(p => {
                const alive = p.update();
                p.draw();
                return alive;
            });
            
            // 更新和绘制火花
            sparks = sparks.filter(s => {
                const alive = s.update();
                s.draw();
                return alive;
            });
            
            updateFPS();
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        window.addEventListener('resize', init);
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('click', (e) => {
            burstFire(e.clientX, e.clientY);
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
                burstFire(mouseX, mouseY);
            }
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        });
        
        // 初始化
        init();
        animate();
    </script>
</body>
</html>
