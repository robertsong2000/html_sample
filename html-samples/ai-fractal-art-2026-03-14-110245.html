<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分形艺术 | Fractal Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        
        .controls {
            position: fixed;
            top: 80px;
            right: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            text-align: right;
            pointer-events: none;
            z-index: 10;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <canvas id="fractal"></canvas>
    <div class="title">Fractal Art</div>
    <div class="controls">
        <div>迭代: <span id="iterations">0</span></div>
        <div>缩放: <span id="zoom">1.0</span>x</div>
    </div>
    <div class="info">拖动平移 | 滚轮缩放 | 点击切换分形类型 | 双击重置</div>
    
    <script>
        const canvas = document.getElementById('fractal');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let centerX = 0, centerY = 0;
        let zoom = 1;
        let fractalType = 0;
        let maxIterations = 100;
        let colorMode = 0;
        let time = 0;
        
        // 拖动状态
        let isDragging = false;
        let lastX, lastY;
        
        const fractalNames = ['Mandelbrot', 'Julia Set', 'Burning Ship', 'Tricorn'];
        
        // Julia集参数
        let juliaC = { real: -0.7, imag: 0.27015 };
        
        // 颜色方案
        function getColor(iteration, maxIter) {
            if (iteration === maxIter) return { r: 0, g: 0, b: 0 };
            
            const schemes = [
                // 彩虹
                () => {
                    const hue = (iteration / maxIter) * 360;
                    return hslToRgb(hue, 100, 50);
                },
                // 蓝紫
                () => {
                    const t = iteration / maxIter;
                    return {
                        r: Math.floor(Math.sin(t * Math.PI) * 100),
                        g: Math.floor(Math.sin(t * Math.PI * 2) * 50 + 50),
                        b: Math.floor(255 * t)
                    };
                },
                // 火焰
                () => {
                    const t = iteration / maxIter;
                    return {
                        r: Math.floor(255 * Math.min(1, t * 3)),
                        g: Math.floor(255 * Math.max(0, Math.min(1, t * 3 - 1))),
                        b: Math.floor(255 * Math.max(0, t * 3 - 2))
                    };
                },
                // 极光
                () => {
                    const t = iteration / maxIter;
                    return {
                        r: Math.floor(Math.sin(t * Math.PI * 2) * 127 + 128),
                        g: Math.floor(Math.sin(t * Math.PI * 2 + 2) * 127 + 128),
                        b: Math.floor(Math.sin(t * Math.PI * 2 + 4) * 127 + 128)
                    };
                }
            ];
            
            return schemes[colorMode % schemes.length]();
        }
        
        function hslToRgb(h, s, l) {
            s /= 100;
            l /= 100;
            const c = (1 - Math.abs(2 * l - 1)) * s;
            const x = c * (1 - Math.abs((h / 60) % 2 - 1));
            const m = l - c / 2;
            let r, g, b;
            
            if (h < 60) { r = c; g = x; b = 0; }
            else if (h < 120) { r = x; g = c; b = 0; }
            else if (h < 180) { r = 0; g = c; b = x; }
            else if (h < 240) { r = 0; g = x; b = c; }
            else if (h < 300) { r = x; g = 0; b = c; }
            else { r = c; g = 0; b = x; }
            
            return {
                r: Math.floor((r + m) * 255),
                g: Math.floor((g + m) * 255),
                b: Math.floor((b + m) * 255)
            };
        }
        
        // Mandelbrot集
        function mandelbrot(x0, y0) {
            let x = 0, y = 0;
            let iteration = 0;
            
            while (x * x + y * y <= 4 && iteration < maxIterations) {
                const xTemp = x * x - y * y + x0;
                y = 2 * x * y + y0;
                x = xTemp;
                iteration++;
            }
            
            // 平滑着色
            if (iteration < maxIterations) {
                const logZn = Math.log(x * x + y * y) / 2;
                const nu = Math.log(logZn / Math.log(2)) / Math.log(2);
                iteration = iteration + 1 - nu;
            }
            
            return iteration;
        }
        
        // Julia集
        function julia(x, y) {
            let iteration = 0;
            
            while (x * x + y * y <= 4 && iteration < maxIterations) {
                const xTemp = x * x - y * y + juliaC.real;
                y = 2 * x * y + juliaC.imag;
                x = xTemp;
                iteration++;
            }
            
            if (iteration < maxIterations) {
                const logZn = Math.log(x * x + y * y) / 2;
                const nu = Math.log(logZn / Math.log(2)) / Math.log(2);
                iteration = iteration + 1 - nu;
            }
            
            return iteration;
        }
        
        // Burning Ship分形
        function burningShip(x0, y0) {
            let x = 0, y = 0;
            let iteration = 0;
            
            while (x * x + y * y <= 4 && iteration < maxIterations) {
                const xTemp = x * x - y * y + x0;
                y = Math.abs(2 * x * y) + y0;
                x = Math.abs(xTemp);
                iteration++;
            }
            
            return iteration;
        }
        
        // Tricorn分形
        function tricorn(x0, y0) {
            let x = 0, y = 0;
            let iteration = 0;
            
            while (x * x + y * y <= 4 && iteration < maxIterations) {
                const xTemp = x * x - y * y + x0;
                y = -2 * x * y + y0;
                x = xTemp;
                iteration++;
            }
            
            return iteration;
        }
        
        function getIteration(x, y) {
            const scale = 3 / (zoom * Math.min(width, height));
            const realX = (x - width / 2) * scale + centerX;
            const realY = (y - height / 2) * scale + centerY;
            
            switch (fractalType) {
                case 0: return mandelbrot(realX, realY);
                case 1: return julia(realX, realY);
                case 2: return burningShip(realX, realY);
                case 3: return tricorn(realX, realY);
                default: return mandelbrot(realX, realY);
            }
        }
        
        // 使用ImageData进行优化渲染
        function render() {
            const imageData = ctx.createImageData(width, height);
            const data = imageData.data;
            
            // 根据缩放调整迭代次数
            const dynamicIterations = Math.min(500, Math.floor(maxIterations + Math.log2(zoom) * 50));
            document.getElementById('iterations').textContent = dynamicIterations;
            document.getElementById('zoom').textContent = zoom.toFixed(2);
            
            for (let py = 0; py < height; py++) {
                for (let px = 0; px < width; px++) {
                    const iteration = getIteration(px, py);
                    const color = getColor(iteration, dynamicIterations);
                    
                    const idx = (py * width + px) * 4;
                    data[idx] = color.r;
                    data[idx + 1] = color.g;
                    data[idx + 2] = color.b;
                    data[idx + 3] = 255;
                }
            }
            
            ctx.putImageData(imageData, 0, 0);
        }
        
        // 动画Julia参数
        function animateJulia() {
            if (fractalType === 1) {
                juliaC.real = -0.7 + Math.sin(time * 0.5) * 0.1;
                juliaC.imag = 0.27015 + Math.cos(time * 0.3) * 0.1;
            }
        }
        
        function init() {
            resize();
            render();
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            render();
        }
        
        // 事件监听
        window.addEventListener('resize', () => {
            resize();
        });
        
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastX = e.clientX;
            lastY = e.clientY;
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const dx = e.clientX - lastX;
                const dy = e.clientY - lastY;
                const scale = 3 / (zoom * Math.min(width, height));
                centerX -= dx * scale;
                centerY -= dy * scale;
                lastX = e.clientX;
                lastY = e.clientY;
                render();
            }
        });
        
        canvas.addEventListener('mouseup', () => {
            isDragging = false;
        });
        
        canvas.addEventListener('mouseleave', () => {
            isDragging = false;
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomFactor = e.deltaY > 0 ? 0.8 : 1.25;
            zoom *= zoomFactor;
            zoom = Math.max(0.5, Math.min(100000, zoom));
            render();
        }, { passive: false });
        
        canvas.addEventListener('click', (e) => {
            if (!isDragging) {
                fractalType = (fractalType + 1) % 4;
                render();
            }
        });
        
        canvas.addEventListener('dblclick', () => {
            centerX = 0;
            centerY = 0;
            zoom = 1;
            render();
        });
        
        // 触摸支持
        let touchStartDist = 0;
        let touchStartZoom = 1;
        
        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                touchStartDist = Math.sqrt(dx * dx + dy * dy);
                touchStartZoom = zoom;
            }
        }, { passive: false });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length === 1 && isDragging) {
                const dx = e.touches[0].clientX - lastX;
                const dy = e.touches[0].clientY - lastY;
                const scale = 3 / (zoom * Math.min(width, height));
                centerX -= dx * scale;
                centerY -= dy * scale;
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
                render();
            } else if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                zoom = touchStartZoom * (dist / touchStartDist);
                zoom = Math.max(0.5, Math.min(100000, zoom));
                render();
            }
        }, { passive: false });
        
        canvas.addEventListener('touchend', (e) => {
            if (e.touches.length === 0) {
                isDragging = false;
            }
        });
        
        // 键盘控制
        window.addEventListener('keydown', (e) => {
            switch (e.key) {
                case 'c':
                case 'C':
                    colorMode = (colorMode + 1) % 4;
                    render();
                    break;
                case 'r':
                case 'R':
                    centerX = 0;
                    centerY = 0;
                    zoom = 1;
                    render();
                    break;
                case ' ':
                    e.preventDefault();
                    fractalType = (fractalType + 1) % 4;
                    render();
                    break;
            }
        });
        
        init();
    </script>
</body>
</html>
