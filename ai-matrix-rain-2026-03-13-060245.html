<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>矩阵雨 | Matrix Rain</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .title {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f0;
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 20px;
            text-shadow: 0 0 10px #0f0,
                         0 0 20px #0f0,
                         0 0 40px #0f0;
            z-index: 10;
            pointer-events: none;
            opacity: 0.3;
            animation: pulse 3s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.2; text-shadow: 0 0 10px #0f0, 0 0 20px #0f0; }
            50% { opacity: 0.4; text-shadow: 0 0 20px #0f0, 0 0 40px #0f0, 0 0 60px #0f0; }
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(0, 255, 0, 0.6);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 5px #0f0;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(0, 255, 0, 0.7);
            font-size: 11px;
            font-family: 'Courier New', monospace;
            z-index: 10;
            text-align: right;
            pointer-events: none;
        }
        
        @media (max-width: 768px) {
            .title {
                font-size: 24px;
                letter-spacing: 10px;
            }
            .info {
                font-size: 10px;
                bottom: 10px;
                left: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="title">MATRIX</div>
    <canvas id="matrix"></canvas>
    <div class="stats">
        <div id="columns">Columns: 0</div>
        <div id="fps">FPS: 60</div>
    </div>
    <div class="info">
        移动鼠标影响下落方向 | 点击产生数据爆炸
    </div>
    
    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let columns = [];
        let mouseX = 0, mouseY = 0;
        let explosions = [];
        let time = 0;
        let lastTime = performance.now();
        let fps = 60;
        
        // 字符集 - 包含日文片假名、数字和符号
        const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%^&*()+=<>?{}[]';
        const charArray = chars.split('');
        
        // 列配置
        class Column {
            constructor(x) {
                this.x = x;
                this.y = Math.random() * height;
                this.speed = 3 + Math.random() * 7;
                this.chars = [];
                this.trailLength = 15 + Math.floor(Math.random() * 20);
                this.fontSize = 14 + Math.floor(Math.random() * 8);
                this.brightness = 0.5 + Math.random() * 0.5;
                
                // 初始化字符
                for (let i = 0; i < this.trailLength; i++) {
                    this.chars.push(this.getRandomChar());
                }
            }
            
            getRandomChar() {
                return charArray[Math.floor(Math.random() * charArray.length)];
            }
            
            update(mouseInfluence) {
                // 鼠标影响下落速度和方向
                const dx = (mouseX - width / 2) / width;
                this.y += this.speed * (1 + mouseInfluence * 0.5);
                
                // 随机更改字符
                if (Math.random() < 0.05) {
                    const idx = Math.floor(Math.random() * this.chars.length);
                    this.chars[idx] = this.getRandomChar();
                }
                
                // 重置位置
                if (this.y - this.trailLength * this.fontSize > height) {
                    this.y = -this.trailLength * this.fontSize;
                    this.speed = 3 + Math.random() * 7;
                }
            }
            
            draw() {
                for (let i = 0; i < this.trailLength; i++) {
                    const charY = this.y - i * this.fontSize;
                    
                    if (charY < -this.fontSize || charY > height + this.fontSize) continue;
                    
                    // 头部字符最亮
                    if (i === 0) {
                        ctx.fillStyle = '#fff';
                        ctx.shadowBlur = 20;
                        ctx.shadowColor = '#0f0';
                    } else {
                        // 渐变淡出效果
                        const alpha = (1 - i / this.trailLength) * this.brightness;
                        const green = Math.floor(255 * (1 - i / this.trailLength * 0.5));
                        ctx.fillStyle = `rgba(0, ${green}, 0, ${alpha})`;
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = `rgba(0, 255, 0, ${alpha})`;
                    }
                    
                    ctx.font = `${this.fontSize}px Courier New`;
                    ctx.fillText(this.chars[i], this.x, charY);
                }
                
                ctx.shadowBlur = 0;
            }
        }
        
        // 爆炸效果
        class Explosion {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.particles = [];
                this.rings = [];
                this.time = 0;
                this.maxTime = 80;
                
                // 创建粒子
                for (let i = 0; i < 50; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * 8;
                    this.particles.push({
                        x: 0,
                        y: 0,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        char: charArray[Math.floor(Math.random() * charArray.length)],
                        size: 12 + Math.random() * 10,
                        life: 1
                    });
                }
                
                // 创建扩散环
                for (let i = 0; i < 3; i++) {
                    this.rings.push({
                        radius: 0,
                        maxRadius: 150 + i * 50,
                        speed: 5 + i * 2,
                        alpha: 1
                    });
                }
            }
            
            update() {
                this.time++;
                
                // 更新粒子
                this.particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.15;
                    p.vx *= 0.98;
                    p.vy *= 0.98;
                    p.life = 1 - (this.time / this.maxTime);
                    
                    if (Math.random() < 0.1) {
                        p.char = charArray[Math.floor(Math.random() * charArray.length)];
                    }
                });
                
                // 更新环
                this.rings.forEach(ring => {
                    ring.radius += ring.speed;
                    ring.alpha = 1 - ring.radius / ring.maxRadius;
                });
                
                return this.time < this.maxTime;
            }
            
            draw() {
                // 绘制扩散环
                this.rings.forEach(ring => {
                    if (ring.alpha > 0) {
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, ring.radius, 0, Math.PI * 2);
                        ctx.strokeStyle = `rgba(0, 255, 0, ${ring.alpha * 0.5})`;
                        ctx.lineWidth = 2;
                        ctx.stroke();
                    }
                });
                
                // 绘制粒子
                this.particles.forEach(p => {
                    if (p.life > 0) {
                        // 发光效果
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = `rgba(0, 255, 0, ${p.life})`;
                        
                        ctx.fillStyle = p.life > 0.5 ? '#fff' : `rgba(0, 255, 0, ${p.life})`;
                        ctx.font = `${p.size}px Courier New`;
                        ctx.fillText(p.char, this.x + p.x, this.y + p.y);
                    }
                });
                
                ctx.shadowBlur = 0;
            }
        }
        
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            // 初始化列
            columns = [];
            const fontSize = 16;
            const columnCount = Math.floor(width / fontSize);
            
            for (let i = 0; i < columnCount; i++) {
                columns.push(new Column(i * fontSize));
            }
            
            document.getElementById('columns').textContent = `Columns: ${columnCount}`;
        }
        
        function updateFPS() {
            const now = performance.now();
            const delta = now - lastTime;
            lastTime = now;
            fps = Math.round(1000 / delta);
            document.getElementById('fps').textContent = `FPS: ${fps}`;
        }
        
        function animate() {
            time++;
            
            // 半透明背景实现拖尾效果
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, width, height);
            
            // 鼠标影响因子
            const mouseInfluence = Math.sin((mouseX - width / 2) / width * Math.PI);
            
            // 更新和绘制列
            columns.forEach(col => {
                col.update(mouseInfluence);
                col.draw();
            });
            
            // 更新和绘制爆炸
            explosions = explosions.filter(exp => {
                const alive = exp.update();
                exp.draw();
                return alive;
            });
            
            updateFPS();
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        window.addEventListener('resize', init);
        
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        });
        
        window.addEventListener('click', (e) => {
            explosions.push(new Explosion(e.clientX, e.clientY));
        });
        
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) {
                explosions.push(new Explosion(e.touches[0].clientX, e.touches[0].clientY));
            }
        });
        
        // 键盘交互 - 按空格触发全屏爆炸
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        explosions.push(new Explosion(
                            Math.random() * width,
                            Math.random() * height
                        ));
                    }, i * 100);
                }
            }
        });
        
        // 初始化
        init();
        mouseX = width / 2;
        mouseY = height / 2;
        animate();
    </script>
</body>
</html>
