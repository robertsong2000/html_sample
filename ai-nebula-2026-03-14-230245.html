<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旋转星云 | Rotating Nebula</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        canvas { display: block; position: fixed; top: 0; left: 0; }
        .info { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.7); font-size: 14px; text-align: center; pointer-events: none; z-index: 10; }
        .title { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.9); font-size: 28px; font-weight: 300; letter-spacing: 6px; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>
    <canvas id="nebula"></canvas>
    <div class="title">Rotating Nebula</div>
    <div class="info">移动鼠标控制旋转 | 点击切换配色 | 滚轮调整粒子密度</div>
    <script>
        const canvas = document.getElementById('nebula');
        const ctx = canvas.getContext('2d');
        let width, height, mouseX = 0, mouseY = 0, density = 1, colorScheme = 0, time = 0;
        const colors = [['#ff6b6b','#4ecdc4','#45b7d1'],['#a55eea','#45aaf2','#26de81'],['#ff9f43','#ee5a24','#00d2d3']];
        let particles = [];
        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.angle = Math.random() * Math.PI * 2;
                this.radius = 50 + Math.random() * 250;
                this.speed = 0.002 + Math.random() * 0.005;
                this.size = Math.random() * 3 + 1;
                this.colorIdx = Math.floor(Math.random() * 3);
                this.alpha = 0.3 + Math.random() * 0.5;
                this.z = Math.random();
            }
            update() {
                this.angle += this.speed * (1 + (mouseX - width/2) / width);
                this.radius += Math.sin(time + this.angle) * 0.5;
            }
            draw() {
                const x = width/2 + Math.cos(this.angle) * this.radius;
                const y = height/2 + Math.sin(this.angle) * this.radius * 0.6;
                const scale = 0.5 + this.z * 0.5;
                ctx.save();
                ctx.globalAlpha = this.alpha * scale;
                ctx.fillStyle = colors[colorScheme][this.colorIdx];
                ctx.shadowBlur = 10;
                ctx.shadowColor = colors[colorScheme][this.colorIdx];
                ctx.beginPath();
                ctx.arc(x, y, this.size * scale, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        function init() {
            resize();
            for (let i = 0; i < 500 * density; i++) particles.push(new Particle());
        }
        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.fillRect(0, 0, width, height);
            const gradient = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, 300);
            gradient.addColorStop(0, colors[colorScheme][0] + '20');
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            time += 0.016;
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
        window.addEventListener('click', () => { colorScheme = (colorScheme + 1) % colors.length; });
        window.addEventListener('wheel', e => {
            density += e.deltaY > 0 ? -0.2 : 0.2;
            density = Math.max(0.3, Math.min(2, density));
            while (particles.length < 500 * density) particles.push(new Particle());
            while (particles.length > 500 * density) particles.pop();
        });
        init(); draw();
    </script>
</body>
</html>
