<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英语单词练习</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .generate-btn {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2em;
            border-radius: 25px;
            cursor: pointer;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .generate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .worksheet {
            display: none;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            text-align: left;
        }

        .worksheet-header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 15px;
        }

        .worksheet-title {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 5px;
        }

        .worksheet-date {
            color: #666;
            font-size: 1em;
        }

        .word-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .word-item {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            border-left: 4px solid #667eea;
        }

        .word-number {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .word-display {
            font-size: 1.5em;
            font-family: 'Courier New', monospace;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .blank {
            display: inline-block;
            width: 30px;
            height: 30px;
            border-bottom: 2px solid #333;
            margin: 0 2px;
            vertical-align: bottom;
        }

        .letter {
            color: #333;
            font-weight: bold;
        }

        .hint {
            color: #666;
            font-style: italic;
            font-size: 0.9em;
            margin-top: 10px;
        }

        .answer-section {
            margin-top: 30px;
            padding: 20px;
            background: #e8f4f8;
            border-radius: 10px;
            border: 2px dashed #667eea;
        }

        .answer-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }

        .answer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .answer-item {
            background: white;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }

        .answer-word {
            font-weight: bold;
            color: #667eea;
        }

        .print-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            margin-top: 20px;
            font-size: 1em;
        }

        .print-btn:hover {
            background: #218838;
        }

        @media print {
            .generate-btn, .print-btn {
                display: none;
            }
            
            .container {
                box-shadow: none;
                background: white;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📚 英语单词练习</h1>
        <p class="subtitle">点击生成按钮，创建单词填空练习题</p>
        
        <button class="generate-btn" onclick="generateWorksheet()">🎲 生成练习题</button>
        
        <div id="worksheet" class="worksheet">
            <div class="worksheet-header">
                <div class="worksheet-title">英语单词填空练习</div>
                <div class="worksheet-date" id="currentDate"></div>
            </div>
            
            <div id="wordGrid" class="word-grid"></div>
            
            <div class="answer-section">
                <div class="answer-title">💡 参考答案</div>
                <div id="answerGrid" class="answer-grid"></div>
            </div>
            
            <button class="print-btn" onclick="window.print()">🖨️ 打印练习</button>
        </div>
    </div>

    <script>
        const wordDatabase = [
            { word: "apple", hint: "一种红色或绿色的水果" },
            { word: "banana", hint: "黄色的热带水果" },
            { word: "cat", hint: "喜欢抓老鼠的宠物" },
            { word: "dog", hint: "人类最忠诚的朋友" },
            { word: "elephant", hint: "有长鼻子的大型动物" },
            { word: "fish", hint: "生活在水中的动物" },
            { word: "grape", hint: "成串生长的小水果" },
            { word: "house", hint: "人们居住的地方" },
            { word: "ice", hint: "水的固体形态" },
            { word: "juice", hint: "水果榨出的饮料" },
            { word: "kite", hint: "在天空中飞翔的玩具" },
            { word: "lion", hint: "草原之王" },
            { word: "moon", hint: "夜晚天空中的天体" },
            { word: "nest", hint: "鸟儿筑的家" },
            { word: "orange", hint: "橙色的柑橘类水果" },
            { word: "pencil", hint: "用来写字的工具" },
            { word: "queen", hint: "女性统治者" },
            { word: "rabbit", hint: "有长耳朵的小动物" },
            { word: "sun", hint: "给地球光和热的恒星" },
            { word: "tree", hint: "有叶子和树干的植物" },
            { word: "umbrella", hint: "下雨时用的工具" },
            { word: "violin", hint: "弦乐器" },
            { word: "water", hint: "生命之源" },
            { word: "xylophone", hint: "打击乐器" },
            { word: "yellow", hint: "明亮的颜色" },
            { word: "zoo", hint: "观赏动物的地方" },
            { word: "book", hint: "用来阅读的物品" },
            { word: "chair", hint: "用来坐的家具" },
            { word: "door", hint: "房间的出入口" },
            { word: "flower", hint: "美丽的植物" },
            { word: "garden", hint: "种植花草的地方" },
            { word: "happy", hint: "快乐的情感" },
            { word: "internet", hint: "全球网络系统" },
            { word: "keyboard", hint: "电脑输入设备" },
            { word: "library", hint: "借书的地方" },
            { word: "music", hint: "美妙的声音艺术" },
            { word: "nature", hint: "自然环境" },
            { word: "ocean", hint: "大海" },
            { word: "phone", hint: "通讯工具" },
            { word: "quiet", hint: "安静的" },
            { word: "radio", hint: "收音机" },
            { word: "school", hint: "学习的地方" },
            { word: "teacher", hint: "教书育人的人" },
            { word: "universe", hint: "宇宙" },
            { word: "video", hint: "影像" },
            { word: "window", hint: "房子的窗户" }
        ];

        function getRandomWords(count = 12) {
            const shuffled = [...wordDatabase].sort(() => 0.5 - Math.random());
            return shuffled.slice(0, count);
        }

        function createMissingLetters(word) {
            const wordArray = word.split('');
            const length = wordArray.length;
            const missingCount = Math.max(1, Math.floor(length * 0.4));
            
            const positions = [];
            while (positions.length < missingCount) {
                const pos = Math.floor(Math.random() * length);
                if (!positions.includes(pos)) {
                    positions.push(pos);
                }
            }
            
            let result = '';
            for (let i = 0; i < length; i++) {
                if (positions.includes(i)) {
                    result += '<span class="blank"></span>';
                } else {
                    result += `<span class="letter">${wordArray[i]}</span>`;
                }
            }
            
            return result;
        }

        function generateWorksheet() {
            const words = getRandomWords();
            const wordGrid = document.getElementById('wordGrid');
            const answerGrid = document.getElementById('answerGrid');
            const worksheet = document.getElementById('worksheet');
            const currentDate = document.getElementById('currentDate');
            
            currentDate.textContent = new Date().toLocaleDateString('zh-CN');
            
            wordGrid.innerHTML = '';
            answerGrid.innerHTML = '';
            
            words.forEach((item, index) => {
                const wordItem = document.createElement('div');
                wordItem.className = 'word-item';
                wordItem.innerHTML = `
                    <div class="word-number">${index + 1}.</div>
                    <div class="word-display">${createMissingLetters(item.word)}</div>
                    <div class="hint">提示：${item.hint}</div>
                `;
                wordGrid.appendChild(wordItem);
                
                const answerItem = document.createElement('div');
                answerItem.className = 'answer-item';
                answerItem.innerHTML = `
                    <div>${index + 1}. <span class="answer-word">${item.word.toUpperCase()}</span></div>
                `;
                answerGrid.appendChild(answerItem);
            });
            
            worksheet.style.display = 'block';
        }
    </script>
</body>
</html>
