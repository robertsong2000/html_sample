<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹时钟 | Neon Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #0a0a0f;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .clock-container {
            position: relative;
            z-index: 10;
            text-align: center;
        }
        
        .time-display {
            font-size: 80px;
            font-weight: 300;
            letter-spacing: 8px;
            text-shadow: 
                0 0 10px #0ff,
                0 0 20px #0ff,
                0 0 40px #0ff,
                0 0 80px #00ffffaa;
            color: #fff;
            animation: pulse 2s ease-in-out infinite;
        }
        
        .date-display {
            font-size: 18px;
            letter-spacing: 4px;
            color: rgba(255, 100, 255, 0.9);
            text-shadow: 
                0 0 10px #f0f,
                0 0 20px #f0f;
            margin-top: 20px;
        }
        
        .milliseconds {
            font-size: 24px;
            color: rgba(255, 200, 0, 0.8);
            text-shadow: 0 0 10px #ff0;
            margin-top: 10px;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.9; }
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
        }
        
        @media (max-width: 768px) {
            .time-display {
                font-size: 40px;
                letter-spacing: 4px;
            }
            .date-display {
                font-size: 14px;
            }
            .milliseconds {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <canvas id="background"></canvas>
    <div class="clock-container">
        <div class="time-display" id="time">00:00:00</div>
        <div class="date-display" id="date">2026年03月13日 星期五</div>
        <div class="milliseconds" id="ms">.000</div>
    </div>
    <div class="info">移动鼠标改变霓虹颜色 | 点击产生时钟波纹</div>
    
    <script>
        const canvas = document.getElementById('background');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        let time = 0;
        let ripples = [];
        let particles = [];
        let rings = [];
        
        // 颜色配置
        let hueShift = 0;
        const colors = {
            cyan: { h: 180, s: 100, l: 50 },
            magenta: { h: 300, s: 100, l: 50 },
            yellow: { h: 60, s: 100, l: 50 }
        };
        
        // 波纹效果
        class Ripple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = Math.max(width, height);
                this.speed = 8;
                this.life = 1;
            }
            
            update() {
                this.radius += this.speed;
                this.life = 1 - this.radius / this.maxRadius;
                return this.life > 0;
            }
            
            draw() {
                const hue = (180 + hueShift) % 360;
                
                for (let i = 0; i < 3; i++) {
                    const offset = i * 10;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius - offset, 0, Math.PI * 2);
                    ctx.strokeStyle = `hsla(${hue}, 100%, 60%, ${this.life * (1 - i * 0.3)})`;
                    ctx.lineWidth = 3 - i;
                    ctx.stroke();
                }
            }
        }
        
        // 背景粒子
        class Particle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.hue = Math.random() > 0.5 ? 180 : 300;
                this.pulse = Math.random() * Math.PI * 2;
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.pulse += 0.05;
                
                if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                    this.reset();
                }
            }
            
            draw() {
                const alpha = 0.3 + Math.sin(this.pulse) * 0.2;
                const hue = (this.hue + hueShift) % 360;
                
                // 发光效果
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 4
                );
                gradient.addColorStop(0, `hsla(${hue}, 100%, 70%, ${alpha})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 4, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // 核心
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hue}, 100%, 80%, ${alpha + 0.3})`;
                ctx.fill();
            }
        }
        
        // 时钟环
        class ClockRing {
            constructor() {
                this.rotation = 0;
                this.radius = Math.min(width, height) * 0.35;
            }
            
            update() {
                this.rotation += 0.005;
                this.radius = Math.min(width, height) * 0.35;
            }
            
            draw() {
                const centerX = width / 2;
                const centerY = height / 2;
                const now = new Date();
                const hours = now.getHours() % 12;
                const minutes = now.getMinutes();
                const seconds = now.getSeconds();
                const ms = now.getMilliseconds();
                
                // 外环 - 小时
                this.drawRing(centerX, centerY, this.radius, 12, hours, 180, 0.3);
                
                // 中环 - 分钟
                this.drawRing(centerX, centerY, this.radius * 0.8, 60, minutes, 300, 0.5);
                
                // 内环 - 秒
                this.drawRing(centerX, centerY, this.radius * 0.6, 60, seconds, 60, 0.7);
                
                // 最内环 - 毫秒
                this.drawRing(centerX, centerY, this.radius * 0.4, 100, ms / 10, 0, 0.4);
                
                // 中心点
                const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 30);
                gradient.addColorStop(0, `hsla(${(180 + hueShift) % 360}, 100%, 70%, 0.8)`);
                gradient.addColorStop(1, 'transparent');
                ctx.beginPath();
                ctx.arc(centerX, centerY, 30, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
            
            drawRing(cx, cy, radius, segments, activeIndex, hueOffset, alpha) {
                const angleStep = (Math.PI * 2) / segments;
                const hue = (hueOffset + hueShift) % 360;
                
                // 背景环
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                ctx.strokeStyle = `hsla(${hue}, 50%, 30%, 0.2)`;
                ctx.lineWidth = 2;
                ctx.stroke();
                
                // 活跃段
                for (let i = 0; i <= activeIndex; i++) {
                    const startAngle = -Math.PI / 2 + i * angleStep;
                    const endAngle = startAngle + angleStep;
                    const segmentAlpha = alpha * (0.5 + (i / segments) * 0.5);
                    
                    ctx.beginPath();
                    ctx.arc(cx, cy, radius, startAngle, endAngle);
                    ctx.strokeStyle = `hsla(${hue}, 100%, 60%, ${segmentAlpha})`;
                    ctx.lineWidth = 4;
                    ctx.stroke();
                    
                    // 刻度点
                    if (i === activeIndex) {
                        const dotX = cx + Math.cos(endAngle) * radius;
                        const dotY = cy + Math.sin(endAngle) * radius;
                        
                        const gradient = ctx.createRadialGradient(dotX, dotY, 0, dotX, dotY, 15);
                        gradient.addColorStop(0, `hsla(${hue}, 100%, 80%, 1)`);
                        gradient.addColorStop(0.5, `hsla(${hue}, 100%, 60%, 0.5)`);
                        gradient.addColorStop(1, 'transparent');
                        
                        ctx.beginPath();
                        ctx.arc(dotX, dotY, 15, 0, Math.PI * 2);
                        ctx.fillStyle = gradient;
                        ctx.fill();
                    }
                }
            }
        }
        
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            particles = [];
            const particleCount = Math.min(80, Math.floor(width * height / 15000));
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
            
            rings.push(new ClockRing());
        }
        
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const ms = String(now.getMilliseconds()).padStart(3, '0');
            
            document.getElementById('time').textContent = `${hours}:${minutes}:${seconds}`;
            document.getElementById('ms').textContent = `.${ms}`;
            
            const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const dayName = days[now.getDay()];
            const dateStr = `${now.getFullYear()}年${String(now.getMonth() + 1).padStart(2, '0')}月${String(now.getDate()).padStart(2, '0')}日 ${dayName}`;
            document.getElementById('date').textContent = dateStr;
        }
        
        function drawGrid() {
            const gridSize = 50;
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            
            for (let x = 0; x < width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
            
            for (let y = 0; y < height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
        }
        
        function animate() {
            time++;
            
            // 清除画布
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制网格
            drawGrid();
            
            // 更新和绘制粒子
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            
            // 更新和绘制时钟环
            rings.forEach(ring => {
                ring.update();
                ring.draw();
            });
            
            // 更新和绘制波纹
            ripples = ripples.filter(r => {
                const alive = r.update();
                r.draw();
                return alive;
            });
            
            updateClock();
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        window.addEventListener('resize', init);
        
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            hueShift = (mouseX / width) * 180;
        });
        
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
                hueShift = (mouseX / width) * 180;
            }
        });
        
        window.addEventListener('click', (e) => {
            ripples.push(new Ripple(e.clientX, e.clientY));
        });
        
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) {
                ripples.push(new Ripple(e.touches[0].clientX, e.touches[0].clientY));
            }
        });
        
        // 初始化
        init();
        animate();
    </script>
</body>
</html>
