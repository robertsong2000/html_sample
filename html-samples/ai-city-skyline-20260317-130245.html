<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城市天际线 - City Skyline</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 280px;
        }
        
        .info h3 {
            margin-bottom: 10px;
            font-size: 16px;
            color: #ffdd88;
            text-shadow: 0 0 10px rgba(255, 221, 136, 0.5);
        }
        
        .info p {
            margin: 5px 0;
            font-size: 12px;
            line-height: 1.6;
        }
        
        .info .key {
            color: #88ccff;
            font-weight: bold;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
        }
        
        @media (max-width: 600px) {
            .info {
                font-size: 12px;
                padding: 10px 15px;
                max-width: 220px;
            }
        }
    </style>
</head>
<body>
    <canvas id="city"></canvas>
    
    <div class="info">
        <h3>🏙️ 城市天际线</h3>
        <p><span class="key">移动鼠标</span> - 控制视差效果</p>
        <p><span class="key">点击</span> - 切换时间段</p>
        <p><span class="key">滚轮</span> - 调整建筑密度</p>
        <p><span class="key">空格</span> - 切换天气效果</p>
    </div>
    
    <div class="stats" id="stats">
        FPS: 60 | 建筑: 0
    </div>

    <script>
        const canvas = document.getElementById('city');
        const ctx = canvas.getContext('2d');
        const statsEl = document.getElementById('stats');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        let timeOfDay = 0; // 0: 日落, 1: 夜晚, 2: 黎明, 3: 白天
        let weather = 0; // 0: 晴天, 1: 下雨, 2: 下雪
        let buildingDensity = 1;
        
        // 时间段配置
        const timeConfigs = [
            { 
                name: '日落',
                sky: ['#ff6b35', '#ff8c42', '#ffd166', '#1a1a2e'],
                buildingColor: '#1a1a2e',
                windowColor: '#ffdd88',
                starAlpha: 0.3
            },
            { 
                name: '夜晚',
                sky: ['#0a0a1a', '#1a1a3a', '#2a2a4a', '#0a0a1a'],
                buildingColor: '#0a0a15',
                windowColor: '#ffdd88',
                starAlpha: 1
            },
            { 
                name: '黎明',
                sky: ['#2d3561', '#4a5899', '#ff9a8b', '#ffd89b'],
                buildingColor: '#1a1a2e',
                windowColor: '#ffeedd',
                starAlpha: 0.1
            },
            { 
                name: '白天',
                sky: ['#87ceeb', '#98d8e8', '#b0e0e6', '#f0f8ff'],
                buildingColor: '#4a5568',
                windowColor: '#e0e0e0',
                starAlpha: 0
            }
        ];
        
        // 建筑类
        class Building {
            constructor(x, layer) {
                this.x = x;
                this.layer = layer;
                this.width = 30 + Math.random() * 80;
                this.height = 80 + Math.random() * (200 + layer * 100);
                this.windows = [];
                this.generateWindows();
            }
            
            generateWindows() {
                const windowWidth = 6;
                const windowHeight = 8;
                const cols = Math.floor((this.width - 10) / 12);
                const rows = Math.floor((this.height - 20) / 15);
                
                for (let row = 0; row < rows; row++) {
                    for (let col = 0; col < cols; col++) {
                        if (Math.random() > 0.3) {
                            this.windows.push({
                                x: 5 + col * 12,
                                y: 10 + row * 15,
                                lit: Math.random() > 0.4,
                                flicker: Math.random() < 0.05
                            });
                        }
                    }
                }
            }
            
            draw(ctx, baseY, config, parallax) {
                const x = this.x + parallax * this.layer * 20;
                const y = baseY - this.height;
                
                // 建筑主体
                ctx.fillStyle = config.buildingColor;
                ctx.fillRect(x, y, this.width, this.height);
                
                // 建筑边缘高光
                ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                ctx.fillRect(x, y, 2, this.height);
                
                // 窗户
                this.windows.forEach(win => {
                    if (!win.lit && timeOfDay !== 3) return;
                    
                    const wx = x + win.x;
                    const wy = y + win.y;
                    
                    // 闪烁效果
                    let alpha = 1;
                    if (win.flicker) {
                        alpha = 0.5 + Math.sin(performance.now() * 0.005) * 0.5;
                    }
                    
                    // 窗户发光
                    const gradient = ctx.createRadialGradient(wx + 3, wy + 4, 0, wx + 3, wy + 4, 8);
                    gradient.addColorStop(0, `rgba(255, 221, 136, ${0.3 * alpha})`);
                    gradient.addColorStop(1, 'transparent');
                    ctx.fillStyle = gradient;
                    ctx.fillRect(wx - 4, wy - 4, 14, 16);
                    
                    // 窗户本体
                    ctx.fillStyle = `rgba(255, 221, 136, ${0.8 * alpha})`;
                    ctx.fillRect(wx, wy, 6, 8);
                });
                
                // 屋顶装饰
                if (this.height > 150 && Math.random() > 0.5) {
                    ctx.fillStyle = config.buildingColor;
                    ctx.fillRect(x + this.width / 2 - 5, y - 20, 10, 20);
                    
                    // 天线灯
                    if (timeOfDay !== 3) {
                        const blinkAlpha = Math.sin(performance.now() * 0.003) > 0 ? 1 : 0.3;
                        ctx.beginPath();
                        ctx.arc(x + this.width / 2, y - 20, 3, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255, 50, 50, ${blinkAlpha})`;
                        ctx.fill();
                    }
                }
            }
        }
        
        // 星星类
        class Star {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height * 0.5;
                this.size = Math.random() * 2;
                this.twinkleSpeed = 0.02 + Math.random() * 0.03;
                this.twinklePhase = Math.random() * Math.PI * 2;
            }
            
            draw(ctx, alpha) {
                if (alpha <= 0) return;
                
                this.twinklePhase += this.twinkleSpeed;
                const twinkle = 0.5 + Math.sin(this.twinklePhase) * 0.5;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha * twinkle})`;
                ctx.fill();
            }
        }
        
        // 天气粒子类
        class WeatherParticle {
            constructor(type) {
                this.type = type;
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = -10;
                
                if (this.type === 'rain') {
                    this.vy = 10 + Math.random() * 5;
                    this.vx = -2;
                    this.size = 1;
                    this.alpha = 0.5;
                } else { // snow
                    this.vy = 1 + Math.random() * 2;
                    this.vx = (Math.random() - 0.5) * 1;
                    this.size = 2 + Math.random() * 3;
                    this.alpha = 0.8;
                }
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                
                if (this.type === 'snow') {
                    this.x += Math.sin(performance.now() * 0.001 + this.y * 0.01) * 0.5;
                }
                
                if (this.y > height) {
                    this.reset();
                }
            }
            
            draw(ctx) {
                if (this.type === 'rain') {
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x + this.vx, this.y + 10);
                    ctx.strokeStyle = `rgba(150, 200, 255, ${this.alpha})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                } else {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                    ctx.fill();
                }
            }
        }
        
        let buildings = [];
        let stars = [];
        let weatherParticles = [];
        let time = 0;
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        
        function init() {
            resize();
            createBuildings();
            createStars();
        }
        
        function resize() {
            const dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            
            ctx.scale(dpr, dpr);
        }
        
        function createBuildings() {
            buildings = [];
            const layers = 3;
            
            for (let layer = 0; layer < layers; layer++) {
                const buildingCount = Math.floor((width / 60) * buildingDensity);
                let x = -50;
                
                for (let i = 0; i < buildingCount; i++) {
                    const building = new Building(x + Math.random() * 30, layer);
                    buildings.push(building);
                    x += building.width + Math.random() * 20;
                }
            }
            
            // 按层级排序（远的先画）
            buildings.sort((a, b) => a.layer - b.layer);
        }
        
        function createStars() {
            stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push(new Star());
            }
        }
        
        function createWeatherParticles() {
            weatherParticles = [];
            if (weather === 0) return;
            
            const count = weather === 1 ? 200 : 100;
            const type = weather === 1 ? 'rain' : 'snow';
            
            for (let i = 0; i < count; i++) {
                const p = new WeatherParticle(type);
                p.y = Math.random() * height;
                weatherParticles.push(p);
            }
        }
        
        function drawSky(config) {
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, config.sky[0]);
            gradient.addColorStop(0.3, config.sky[1]);
            gradient.addColorStop(0.6, config.sky[2]);
            gradient.addColorStop(1, config.sky[3]);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            // 太阳/月亮
            if (timeOfDay === 0) { // 日落 - 太阳
                const sunX = width * 0.8;
                const sunY = height * 0.3;
                const sunGradient = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 60);
                sunGradient.addColorStop(0, '#ff6b35');
                sunGradient.addColorStop(0.5, 'rgba(255, 107, 53, 0.5)');
                sunGradient.addColorStop(1, 'transparent');
                ctx.fillStyle = sunGradient;
                ctx.beginPath();
                ctx.arc(sunX, sunY, 60, 0, Math.PI * 2);
                ctx.fill();
            } else if (timeOfDay === 1) { // 夜晚 - 月亮
                const moonX = width * 0.2;
                const moonY = height * 0.15;
                ctx.beginPath();
                ctx.arc(moonX, moonY, 30, 0, Math.PI * 2);
                ctx.fillStyle = '#f5f5dc';
                ctx.fill();
                
                // 月亮光晕
                const moonGlow = ctx.createRadialGradient(moonX, moonY, 30, moonX, moonY, 80);
                moonGlow.addColorStop(0, 'rgba(245, 245, 220, 0.2)');
                moonGlow.addColorStop(1, 'transparent');
                ctx.fillStyle = moonGlow;
                ctx.beginPath();
                ctx.arc(moonX, moonY, 80, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function animate(currentTime) {
            // FPS
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
            }
            
            time++;
            
            const config = timeConfigs[timeOfDay];
            
            // 视差效果
            const parallax = (mouseX - width / 2) / width;
            
            // 绘制天空
            drawSky(config);
            
            // 绘制星星
            stars.forEach(star => star.draw(ctx, config.starAlpha));
            
            // 绘制建筑
            const baseY = height * 0.85;
            buildings.forEach(building => {
                building.draw(ctx, baseY, config, parallax);
            });
            
            // 地面
            ctx.fillStyle = '#0a0a15';
            ctx.fillRect(0, baseY, width, height - baseY);
            
            // 地面灯光反射
            const reflectionGradient = ctx.createLinearGradient(0, baseY, 0, height);
            reflectionGradient.addColorStop(0, 'rgba(255, 221, 136, 0.1)');
            reflectionGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = reflectionGradient;
            ctx.fillRect(0, baseY, width, height - baseY);
            
            // 天气效果
            weatherParticles.forEach(p => {
                p.update();
                p.draw(ctx);
            });
            
            // 更新统计
            statsEl.textContent = `FPS: ${fps} | 建筑: ${buildings.length} | ${config.name}`;
            
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        window.addEventListener('resize', () => {
            resize();
            createBuildings();
            createStars();
        });
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('click', () => {
            timeOfDay = (timeOfDay + 1) % timeConfigs.length;
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            buildingDensity = Math.max(0.5, Math.min(2, buildingDensity - e.deltaY * 0.001));
            createBuildings();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                weather = (weather + 1) % 3;
                createWeatherParticles();
            }
        });
        
        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            timeOfDay = (timeOfDay + 1) % timeConfigs.length;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        });
        
        // 启动
        init();
        animate(performance.now());
    </script>
</body>
</html>
