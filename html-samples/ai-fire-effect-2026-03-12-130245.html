<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火焰效果 - Fire Effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0505;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 150, 50, 0.8);
            font-size: 13px;
            z-index: 100;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 100, 0, 0.5);
        }
        
        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 150, 50, 0.8);
            font-size: 12px;
            z-index: 100;
            text-align: right;
        }
        
        .controls div {
            margin: 5px 0;
            padding: 5px 12px;
            background: rgba(255, 100, 0, 0.15);
            border-radius: 15px;
            border: 1px solid rgba(255, 150, 50, 0.3);
        }
        
        .fps {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 150, 50, 0.6);
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="fire"></canvas>
    
    <div class="controls">
        <div id="intensity">强度: 50%</div>
        <div id="particles">粒子: 0</div>
    </div>
    
    <div class="info">
        <span>🔥 点击产生火焰爆发 | 拖动移动火源 | 滚轮调整强度 | 双击切换火焰类型 | 右键切换颜色</span>
    </div>
    
    <div class="fps">FPS: <span id="fps">60</span></div>

    <script>
        // 配置
        const CONFIG = {
            MAX_PARTICLES: 500,
            SPAWN_RATE: 5,
            GRAVITY: -0.15,
            BASE_LIFETIME: 60,
            MIN_RADIUS: 2,
            MAX_RADIUS: 15
        };

        // 火焰类型
        const fireTypes = [
            { name: '营火', spread: 30, height: 150, turbulence: 1 },
            { name: '火炬', spread: 15, height: 200, turbulence: 0.5 },
            { name: '篝火', spread: 50, height: 180, turbulence: 1.5 },
            { name: '蜡烛', spread: 8, height: 80, turbulence: 0.3 }
        ];

        // 颜色方案
        const colorSchemes = [
            { name: '经典火焰', colors: ['#ff0000', '#ff4400', '#ff8800', '#ffcc00', '#ffff66'] },
            { name: '蓝色火焰', colors: ['#0000ff', '#0044ff', '#0088ff', '#00ccff', '#66ffff'] },
            { name: '绿色火焰', colors: ['#00ff00', '#44ff00', '#88ff00', '#ccff00', '#ffff00'] },
            { name: '紫色火焰', colors: ['#8800ff', '#aa00ff', '#cc00ff', '#ff00ff', '#ff66ff'] },
            { name: '白色火焰', colors: ['#aaaaaa', '#cccccc', '#dddddd', '#eeeeee', '#ffffff'] }
        ];

        // Canvas
        const canvas = document.getElementById('fire');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        let embers = [];
        
        let fireX, fireY;
        let intensity = 0.5;
        let currentType = 0;
        let currentScheme = 0;
        
        let mouseX = 0, mouseY = 0;
        let isMouseDown = false;

        // 粒子类
        class Particle {
            constructor(x, y, type) {
                this.reset(x, y, type);
            }

            reset(x, y, type) {
                const fireType = fireTypes[type];
                this.x = x + (Math.random() - 0.5) * fireType.spread;
                this.y = y;
                
                this.vx = (Math.random() - 0.5) * fireType.turbulence * 2;
                this.vy = -Math.random() * 3 - 2;
                
                this.lifetime = CONFIG.BASE_LIFETIME + Math.random() * 40;
                this.maxLifetime = this.lifetime;
                
                this.radius = CONFIG.MIN_RADIUS + Math.random() * (CONFIG.MAX_RADIUS - CONFIG.MIN_RADIUS) * intensity;
                this.initialRadius = this.radius;
                
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.2;
                
                this.turbulence = Math.random() * fireType.turbulence;
            }

            update() {
                // 湍流效果
                this.vx += (Math.random() - 0.5) * this.turbulence * 0.3;
                this.vx *= 0.98;
                
                // 上升
                this.vy += CONFIG.GRAVITY;
                this.vy *= 0.99;
                
                this.x += this.vx;
                this.y += this.vy;
                
                this.rotation += this.rotationSpeed;
                
                this.lifetime--;
                
                // 随时间缩小
                const lifeRatio = this.lifetime / this.maxLifetime;
                this.radius = this.initialRadius * lifeRatio;
                
                return this.lifetime > 0 && this.radius > 0.5;
            }

            draw(ctx, colors) {
                const lifeRatio = this.lifetime / this.maxLifetime;
                
                // 根据生命周期选择颜色
                const colorIndex = Math.floor((1 - lifeRatio) * (colors.length - 1));
                const nextColorIndex = Math.min(colorIndex + 1, colors.length - 1);
                const colorT = ((1 - lifeRatio) * (colors.length - 1)) % 1;
                
                const color1 = hexToRgb(colors[colorIndex]);
                const color2 = hexToRgb(colors[nextColorIndex]);
                
                const r = Math.floor(color1.r + (color2.r - color1.r) * colorT);
                const g = Math.floor(color1.g + (color2.g - color1.g) * colorT);
                const b = Math.floor(color1.b + (color2.b - color1.b) * colorT);
                
                // 发光效果
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius * 2
                );
                gradient.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${lifeRatio})`);
                gradient.addColorStop(0.4, `rgba(${r}, ${g}, ${b}, ${lifeRatio * 0.5})`);
                gradient.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 2, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // 核心
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 200, ${lifeRatio * 0.8})`;
                ctx.fill();
            }
        }

        // 火星类（余烬）
        class Ember {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = -Math.random() * 5 - 3;
                this.lifetime = 60 + Math.random() * 60;
                this.maxLifetime = this.lifetime;
                this.size = Math.random() * 3 + 1;
            }

            update() {
                this.vy += CONFIG.GRAVITY * 0.5;
                this.vx *= 0.99;
                
                this.x += this.vx;
                this.y += this.vy;
                
                this.lifetime--;
                
                return this.lifetime > 0;
            }

            draw(ctx) {
                const lifeRatio = this.lifetime / this.maxLifetime;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 200, 100, ${lifeRatio})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = `rgba(255, 150, 50, ${lifeRatio})`;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // 工具函数
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 255, g: 100, b: 0 };
        }

        // 初始化
        function init() {
            resize();
            fireX = width / 2;
            fireY = height * 0.85;
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        // 产生粒子
        function spawnParticles() {
            const count = Math.floor(CONFIG.SPAWN_RATE * intensity * 2);
            
            for (let i = 0; i < count; i++) {
                if (particles.length < CONFIG.MAX_PARTICLES) {
                    particles.push(new Particle(fireX, fireY, currentType));
                }
            }
            
            // 随机产生火星
            if (Math.random() < 0.1 * intensity) {
                embers.push(new Ember(fireX, fireY));
            }
        }

        // 绘制火焰底部光源
        function drawFireGlow() {
            const colors = colorSchemes[currentScheme].colors;
            const glowColor = hexToRgb(colors[colors.length - 1]);
            
            const gradient = ctx.createRadialGradient(
                fireX, fireY, 0,
                fireX, fireY, 200 * intensity
            );
            gradient.addColorStop(0, `rgba(${glowColor.r}, ${glowColor.g}, ${glowColor.b}, 0.3)`);
            gradient.addColorStop(0.5, `rgba(255, 100, 0, 0.1)`);
            gradient.addColorStop(1, 'rgba(255, 50, 0, 0)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }

        // 绘制木柴/燃料源
        function drawFuelSource() {
            const fireType = fireTypes[currentType];
            
            ctx.fillStyle = '#3a2a1a';
            
            // 绘制简单的木柴堆
            const logWidth = fireType.spread * 1.5;
            const logHeight = 15;
            
            // 横向木柴
            ctx.fillRect(fireX - logWidth, fireY - 5, logWidth * 2, logHeight);
            
            // 发光边缘
            ctx.strokeStyle = 'rgba(255, 100, 0, 0.5)';
            ctx.lineWidth = 2;
            ctx.strokeRect(fireX - logWidth, fireY - 5, logWidth * 2, logHeight);
        }

        // FPS计算
        let lastTime = performance.now();
        let frameCount = 0;

        // 动画循环
        function animate(currentTime) {
            // FPS
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                lastTime = currentTime;
            }

            // 如果拖动，移动火源
            if (isMouseDown) {
                fireX += (mouseX - fireX) * 0.1;
                fireY += (mouseY - fireY) * 0.1;
            }

            // 产生新粒子
            spawnParticles();

            // 清空画布（带渐隐效果）
            ctx.fillStyle = 'rgba(10, 5, 5, 0.15)';
            ctx.fillRect(0, 0, width, height);

            // 绘制火焰发光
            drawFireGlow();

            // 更新和绘制粒子
            const colors = colorSchemes[currentScheme].colors;
            particles = particles.filter(p => {
                const alive = p.update();
                if (alive) p.draw(ctx, colors);
                return alive;
            });

            // 更新和绘制火星
            embers = embers.filter(e => {
                const alive = e.update();
                if (alive) e.draw(ctx);
                return alive;
            });

            // 绘制燃料源
            drawFuelSource();

            // 更新粒子计数
            document.getElementById('particles').textContent = `粒子: ${particles.length}`;

            requestAnimationFrame(animate);
        }

        // 火焰爆发效果
        function burstFire(x, y) {
            for (let i = 0; i < 50; i++) {
                if (particles.length < CONFIG.MAX_PARTICLES) {
                    const p = new Particle(x, y, currentType);
                    p.vx = (Math.random() - 0.5) * 10;
                    p.vy = -Math.random() * 8 - 5;
                    p.radius *= 1.5;
                    p.initialRadius *= 1.5;
                    particles.push(p);
                }
            }
            // 产生大量火星
            for (let i = 0; i < 20; i++) {
                embers.push(new Ember(x, y));
            }
        }

        // 事件监听
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 0) {
                isMouseDown = true;
                mouseX = e.clientX;
                mouseY = e.clientY;
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('mouseup', (e) => {
            if (e.button === 0) {
                // 点击时产生爆发
                burstFire(e.clientX, e.clientY);
                isMouseDown = false;
            }
        });

        canvas.addEventListener('dblclick', () => {
            currentType = (currentType + 1) % fireTypes.length;
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            intensity = Math.max(0.1, Math.min(1, intensity - Math.sign(e.deltaY) * 0.05));
            document.getElementById('intensity').textContent = `强度: ${Math.round(intensity * 100)}%`;
        });

        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            currentScheme = (currentScheme + 1) % colorSchemes.length;
        });

        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            isMouseDown = true;
            burstFire(mouseX, mouseY);
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        });

        canvas.addEventListener('touchend', () => {
            isMouseDown = false;
        });

        // 键盘支持
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                burstFire(fireX, fireY);
            } else if (e.code === 'ArrowUp') {
                intensity = Math.min(1, intensity + 0.1);
                document.getElementById('intensity').textContent = `强度: ${Math.round(intensity * 100)}%`;
            } else if (e.code === 'ArrowDown') {
                intensity = Math.max(0.1, intensity - 0.1);
                document.getElementById('intensity').textContent = `强度: ${Math.round(intensity * 100)}%`;
            } else if (e.code === 'KeyC') {
                currentScheme = (currentScheme + 1) % colorSchemes.length;
            } else if (e.code === 'KeyT') {
                currentType = (currentType + 1) % fireTypes.length;
            }
        });

        // 启动
        init();
        animate(0);
    </script>
</body>
</html>
