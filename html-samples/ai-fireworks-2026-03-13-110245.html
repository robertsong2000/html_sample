<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>烟花盛宴 | Fireworks Festival</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a2e 50%, #2d1b4e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .city-silhouette {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 15%;
            background: linear-gradient(to top, #000 0%, transparent 100%);
            z-index: 5;
            pointer-events: none;
        }
        
        .ui {
            position: fixed;
            z-index: 10;
            color: #fff;
            pointer-events: none;
        }
        
        .title {
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 8px;
            text-shadow: 0 0 20px rgba(255, 200, 100, 0.8),
                         0 0 40px rgba(255, 100, 50, 0.5);
            opacity: 0.9;
        }
        
        .info {
            bottom: 25px;
            left: 20px;
            font-size: 12px;
            opacity: 0.7;
            line-height: 1.6;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            z-index: 15;
        }
        
        .stats {
            top: 20px;
            right: 20px;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            text-align: right;
            opacity: 0.6;
        }
        
        @media (max-width: 768px) {
            .title { font-size: 18px; letter-spacing: 4px; }
            .info { font-size: 10px; bottom: 15px; left: 10px; }
            .stats { font-size: 9px; top: 10px; right: 10px; }
        }
    </style>
</head>
<body>
    <canvas id="fireworks"></canvas>
    <div class="city-silhouette"></div>
    
    <div class="ui title">Fireworks Festival</div>
    
    <div class="ui stats">
        <div id="particles">Particles: 0</div>
        <div id="fireworksCount">Fireworks: 0</div>
        <div id="fps">FPS: 60</div>
    </div>
    
    <div class="ui info">
        点击发射烟花<br>
        移动鼠标影响风向
    </div>
    
    <script>
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let time = 0;
        let lastTime = performance.now();
        let fps = 60;
        
        // 物理参数
        const gravity = 0.12;
        let windX = 0;
        let mouseX = 0, mouseY = 0;
        
        // 粒子系统
        let rockets = [];
        let particles = [];
        let stars = [];
        let trails = [];
        
        // 烟花颜色方案
        const colorSchemes = [
            // 金色
            ['#FFD700', '#FFA500', '#FF8C00', '#FFE4B5'],
            // 红色
            ['#FF0000', '#FF4500', '#DC143C', '#FFB6C1'],
            // 蓝色
            ['#00BFFF', '#1E90FF', '#4169E1', '#87CEEB'],
            // 绿色
            ['#00FF00', '#32CD32', '#7CFC00', '#98FB98'],
            // 紫色
            ['#9400D3', '#8A2BE2', '#9932CC', '#DDA0DD'],
            // 彩虹
            ['#FF0000', '#FF7F00', '#FFFF00', '#00FF00', '#0000FF', '#8B00FF'],
            // 白色闪光
            ['#FFFFFF', '#F0F0F0', '#E0E0E0', '#FFFACD'],
            // 粉色
            ['#FF69B4', '#FF1493', '#DB7093', '#FFC0CB']
        ];
        
        // 火箭类
        class Rocket {
            constructor(x, targetY) {
                this.x = x;
                this.y = height;
                this.targetY = targetY;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = -12 - Math.random() * 4;
                this.trail = [];
                this.exploded = false;
                this.colorScheme = colorSchemes[Math.floor(Math.random() * colorSchemes.length)];
            }
            
            update() {
                // 记录轨迹
                this.trail.push({ x: this.x, y: this.y, alpha: 1 });
                if (this.trail.length > 20) this.trail.shift();
                
                // 更新轨迹透明度
                this.trail.forEach((t, i) => {
                    t.alpha = i / this.trail.length;
                });
                
                // 物理更新
                this.x += this.vx + windX * 0.3;
                this.y += this.vy;
                this.vy += gravity;
                
                // 到达目标高度或速度为正时爆炸
                if (this.y <= this.targetY || this.vy >= 0) {
                    this.explode();
                    return false;
                }
                
                return true;
            }
            
            draw() {
                // 绘制轨迹
                this.trail.forEach((t, i) => {
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, 2, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 200, 100, ${t.alpha * 0.6})`;
                    ctx.fill();
                });
                
                // 绘制火箭头部
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#FFF';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#FFA500';
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            
            explode() {
                const particleCount = 80 + Math.floor(Math.random() * 80);
                const type = Math.floor(Math.random() * 4);
                
                for (let i = 0; i < particleCount; i++) {
                    let vx, vy, color;
                    
                    switch (type) {
                        case 0: // 圆形爆炸
                            const angle = (Math.PI * 2 / particleCount) * i + Math.random() * 0.3;
                            const speed = 4 + Math.random() * 6;
                            vx = Math.cos(angle) * speed;
                            vy = Math.sin(angle) * speed;
                            break;
                            
                        case 1: // 心形
                            const t = (Math.PI * 2 / particleCount) * i;
                            const scale = 0.3;
                            vx = scale * 16 * Math.pow(Math.sin(t), 3);
                            vy = -scale * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                            vx *= (1 + Math.random() * 0.3);
                            vy *= (1 + Math.random() * 0.3);
                            break;
                            
                        case 2: // 星形
                            const starAngle = (Math.PI * 2 / particleCount) * i;
                            const starSpeed = (i % 5 === 0) ? 8 : 4;
                            vx = Math.cos(starAngle) * starSpeed * (1 + Math.random() * 0.3);
                            vy = Math.sin(starAngle) * starSpeed * (1 + Math.random() * 0.3);
                            break;
                            
                        case 3: // 随机爆炸
                        default:
                            const randAngle = Math.random() * Math.PI * 2;
                            const randSpeed = 2 + Math.random() * 8;
                            vx = Math.cos(randAngle) * randSpeed;
                            vy = Math.sin(randAngle) * randSpeed;
                    }
                    
                    color = this.colorScheme[Math.floor(Math.random() * this.colorScheme.length)];
                    
                    particles.push(new Particle(this.x, this.y, vx, vy, color));
                }
                
                // 添加中心闪光
                for (let i = 0; i < 20; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 2;
                    particles.push(new Particle(
                        this.x, this.y,
                        Math.cos(angle) * speed,
                        Math.sin(angle) * speed,
                        '#FFFFFF',
                        true
                    ));
                }
            }
        }
        
        // 粒子类
        class Particle {
            constructor(x, y, vx, vy, color, isFlash = false) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.alpha = 1;
                this.decay = isFlash ? 0.05 : 0.015 + Math.random() * 0.01;
                this.size = isFlash ? 4 : 2 + Math.random() * 2;
                this.isFlash = isFlash;
                this.trail = [];
            }
            
            update() {
                // 记录轨迹
                if (!this.isFlash && this.trail.length < 5) {
                    this.trail.push({ x: this.x, y: this.y });
                }
                if (this.trail.length > 5) this.trail.shift();
                
                // 物理更新
                this.x += this.vx + windX * 0.5;
                this.y += this.vy;
                this.vy += gravity;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.alpha -= this.decay;
                
                return this.alpha > 0;
            }
            
            draw() {
                // 绘制轨迹
                if (!this.isFlash) {
                    this.trail.forEach((t, i) => {
                        const trailAlpha = this.alpha * (i / this.trail.length) * 0.5;
                        ctx.beginPath();
                        ctx.arc(t.x, t.y, this.size * 0.5, 0, Math.PI * 2);
                        ctx.fillStyle = this.hexToRgba(this.color, trailAlpha);
                        ctx.fill();
                    });
                }
                
                // 绘制粒子
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.hexToRgba(this.color, this.alpha);
                
                if (!this.isFlash) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = this.color;
                }
                
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            
            hexToRgba(hex, alpha) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            }
        }
        
        // 星星类
        class Star {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height * 0.7;
                this.size = Math.random() * 1.5 + 0.5;
                this.twinkle = Math.random() * Math.PI * 2;
                this.speed = 0.02 + Math.random() * 0.03;
            }
            
            update() {
                this.twinkle += this.speed;
            }
            
            draw() {
                const alpha = 0.3 + Math.sin(this.twinkle) * 0.3;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fill();
            }
        }
        
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            // 初始化星星
            stars = [];
            const starCount = Math.min(150, Math.floor(width * height / 8000));
            for (let i = 0; i < starCount; i++) {
                stars.push(new Star());
            }
        }
        
        function launchFirework(x, y) {
            const targetY = y || height * 0.2 + Math.random() * height * 0.3;
            const startX = x || Math.random() * width;
            rockets.push(new Rocket(startX, targetY));
        }
        
        function autoLaunch() {
            if (Math.random() < 0.03) {
                launchFirework();
            }
        }
        
        function updateStats() {
            const now = performance.now();
            const delta = now - lastTime;
            lastTime = now;
            fps = Math.round(1000 / delta);
            
            document.getElementById('fps').textContent = `FPS: ${fps}`;
            document.getElementById('particles').textContent = `Particles: ${particles.length}`;
            document.getElementById('fireworksCount').textContent = `Fireworks: ${rockets.length}`;
        }
        
        function animate() {
            time++;
            
            // 清除画布（带淡出效果）
            ctx.fillStyle = 'rgba(10, 10, 26, 0.15)';
            ctx.fillRect(0, 0, width, height);
            
            // 更新风向
            const targetWindX = (mouseX - width / 2) / width * 2;
            windX += (targetWindX - windX) * 0.02;
            
            // 更新和绘制星星
            stars.forEach(star => {
                star.update();
                star.draw();
            });
            
            // 自动发射烟花
            autoLaunch();
            
            // 更新和绘制火箭
            rockets = rockets.filter(rocket => {
                const alive = rocket.update();
                if (alive) rocket.draw();
                return alive;
            });
            
            // 更新和绘制粒子
            particles = particles.filter(particle => {
                const alive = particle.update();
                if (alive) particle.draw();
                return alive;
            });
            
            updateStats();
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        window.addEventListener('resize', init);
        
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        window.addEventListener('click', (e) => {
            launchFirework(e.clientX, e.clientY);
        });
        
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        });
        
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) {
                launchFirework(e.touches[0].clientX, e.touches[0].clientY);
            }
        });
        
        // 初始化
        init();
        mouseX = width / 2;
        mouseY = height / 2;
        animate();
    </script>
</body>
</html>
