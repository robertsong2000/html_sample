<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水波纹 | Water Ripple</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: linear-gradient(180deg, #0a1628 0%, #1a3a5c 50%, #0d2840 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            cursor: pointer;
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(150, 220, 255, 0.9);
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 12px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 
                0 0 20px rgba(100, 200, 255, 0.8),
                0 0 40px rgba(100, 200, 255, 0.4);
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
            text-align: center;
            text-shadow: 0 0 10px rgba(100, 200, 255, 0.5);
        }
        
        .stats {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(150, 220, 255, 0.6);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
            line-height: 1.8;
        }
        
        @media (max-width: 768px) {
            .title {
                font-size: 24px;
                letter-spacing: 6px;
            }
            .info {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="title">水波纹</div>
    <canvas id="ripple"></canvas>
    <div class="stats">
        <div>波纹数: <span id="rippleCount">0</span></div>
        <div>雨滴: <span id="rainCount">0</span></div>
    </div>
    <div class="info">点击/拖动创建波纹 · 移动鼠标产生涟漪</div>
    
    <script>
        const canvas = document.getElementById('ripple');
        const ctx = canvas.getContext('2d');
        const rippleCountEl = document.getElementById('rippleCount');
        const rainCountEl = document.getElementById('rainCount');
        
        let width, height;
        let ripples = [];
        let raindrops = [];
        let mouseX = 0, mouseY = 0;
        let isMouseDown = false;
        let lastRippleTime = 0;
        let time = 0;
        
        // 波纹类
        class Ripple {
            constructor(x, y, maxRadius = 150, speed = 3) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = maxRadius;
                this.speed = speed;
                this.alpha = 1;
                this.lineWidth = 3;
                this.waveCount = 3; // 同心波数量
            }
            
            update() {
                this.radius += this.speed;
                this.alpha = 1 - (this.radius / this.maxRadius);
                this.lineWidth = Math.max(0.5, 3 * this.alpha);
            }
            
            draw() {
                if (this.alpha <= 0) return;
                
                // 绘制多层同心波
                for (let i = 0; i < this.waveCount; i++) {
                    const waveRadius = this.radius - i * 15;
                    if (waveRadius <= 0) continue;
                    
                    const waveAlpha = this.alpha * (1 - i * 0.3);
                    if (waveAlpha <= 0) continue;
                    
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, waveRadius, 0, Math.PI * 2);
                    
                    // 波纹渐变
                    const gradient = ctx.createRadialGradient(
                        this.x, this.y, waveRadius - 5,
                        this.x, this.y, waveRadius + 5
                    );
                    gradient.addColorStop(0, `rgba(100, 200, 255, 0)`);
                    gradient.addColorStop(0.5, `rgba(150, 220, 255, ${waveAlpha * 0.6})`);
                    gradient.addColorStop(1, `rgba(100, 200, 255, 0)`);
                    
                    ctx.strokeStyle = `rgba(150, 220, 255, ${waveAlpha})`;
                    ctx.lineWidth = this.lineWidth;
                    ctx.stroke();
                    
                    // 内发光
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, waveRadius, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(200, 240, 255, ${waveAlpha * 0.3})`;
                    ctx.lineWidth = this.lineWidth * 2;
                    ctx.stroke();
                }
            }
            
            isDead() {
                return this.radius >= this.maxRadius;
            }
        }
        
        // 雨滴类
        class Raindrop {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = -10;
                this.speed = 8 + Math.random() * 8;
                this.length = 15 + Math.random() * 20;
                this.alpha = 0.3 + Math.random() * 0.4;
            }
            
            update() {
                this.y += this.speed;
                
                // 落入水中产生波纹
                if (this.y > height * 0.6) {
                    if (Math.random() < 0.1) {
                        ripples.push(new Ripple(
                            this.x,
                            this.y,
                            50 + Math.random() * 50,
                            2 + Math.random() * 2
                        ));
                    }
                    this.reset();
                }
            }
            
            draw() {
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x, this.y - this.length);
                ctx.strokeStyle = `rgba(150, 200, 255, ${this.alpha})`;
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
        }
        
        // 水面反射效果
        function drawWaterSurface() {
            const waterY = height * 0.6;
            
            // 水面渐变
            const gradient = ctx.createLinearGradient(0, waterY, 0, height);
            gradient.addColorStop(0, 'rgba(20, 60, 100, 0.3)');
            gradient.addColorStop(0.5, 'rgba(30, 80, 120, 0.5)');
            gradient.addColorStop(1, 'rgba(10, 40, 70, 0.8)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, waterY, width, height - waterY);
            
            // 水面波纹线条
            ctx.strokeStyle = 'rgba(100, 180, 220, 0.15)';
            ctx.lineWidth = 1;
            
            for (let y = waterY; y < height; y += 8) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                
                for (let x = 0; x <= width; x += 20) {
                    const waveY = y + Math.sin((x + time * 2) * 0.02) * 3;
                    ctx.lineTo(x, waveY);
                }
                
                ctx.stroke();
            }
        }
        
        // 背景星空
        const stars = [];
        function initStars() {
            stars.length = 0;
            const count = Math.floor((width * height) / 15000);
            for (let i = 0; i < count; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height * 0.6,
                    size: Math.random() * 2 + 0.5,
                    twinkle: Math.random() * Math.PI * 2,
                    speed: Math.random() * 0.03 + 0.01
                });
            }
        }
        
        function drawStars() {
            stars.forEach(star => {
                star.twinkle += star.speed;
                const brightness = 0.5 + Math.sin(star.twinkle) * 0.5;
                
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(200, 220, 255, ${brightness * 0.6})`;
                ctx.fill();
            });
        }
        
        // 月亮反射
        function drawMoonReflection() {
            const moonX = width * 0.8;
            const moonY = height * 0.15;
            const moonRadius = 40;
            
            // 月亮
            const moonGradient = ctx.createRadialGradient(
                moonX, moonY, 0,
                moonX, moonY, moonRadius
            );
            moonGradient.addColorStop(0, 'rgba(255, 255, 240, 0.95)');
            moonGradient.addColorStop(0.7, 'rgba(255, 255, 220, 0.8)');
            moonGradient.addColorStop(1, 'rgba(255, 255, 200, 0)');
            
            ctx.beginPath();
            ctx.arc(moonX, moonY, moonRadius, 0, Math.PI * 2);
            ctx.fillStyle = moonGradient;
            ctx.fill();
            
            // 月亮光晕
            ctx.beginPath();
            ctx.arc(moonX, moonY, moonRadius * 2, 0, Math.PI * 2);
            const glowGradient = ctx.createRadialGradient(
                moonX, moonY, moonRadius,
                moonX, moonY, moonRadius * 2
            );
            glowGradient.addColorStop(0, 'rgba(255, 255, 200, 0.2)');
            glowGradient.addColorStop(1, 'rgba(255, 255, 200, 0)');
            ctx.fillStyle = glowGradient;
            ctx.fill();
            
            // 水中倒影
            const reflectionY = height * 0.75;
            const reflectionAlpha = 0.3;
            
            for (let i = 0; i < 5; i++) {
                const offset = Math.sin(time * 0.05 + i) * 5;
                const alpha = reflectionAlpha * (1 - i * 0.15);
                
                ctx.beginPath();
                ctx.ellipse(
                    moonX + offset,
                    reflectionY + i * 15,
                    moonRadius * (0.8 - i * 0.1),
                    moonRadius * 0.3,
                    0, 0, Math.PI * 2
                );
                ctx.fillStyle = `rgba(255, 255, 200, ${alpha})`;
                ctx.fill();
            }
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initStars();
        }
        
        function createRipple(x, y) {
            ripples.push(new Ripple(x, y, 100 + Math.random() * 100, 2.5 + Math.random() * 2));
        }
        
        function animate(timestamp) {
            // 清除画布
            ctx.fillStyle = '#0a1628';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制背景
            drawStars();
            drawMoonReflection();
            drawWaterSurface();
            
            // 更新和绘制雨滴
            raindrops.forEach(drop => {
                drop.update();
                drop.draw();
            });
            
            // 更新和绘制波纹
            for (let i = ripples.length - 1; i >= 0; i--) {
                ripples[i].update();
                ripples[i].draw();
                if (ripples[i].isDead()) {
                    ripples.splice(i, 1);
                }
            }
            
            // 鼠标移动产生涟漪
            if (timestamp - lastRippleTime > 100 && Math.random() < 0.3) {
                const dist = Math.hypot(mouseX - width / 2, mouseY - height * 0.7);
                if (dist < 300 && mouseY > height * 0.5) {
                    ripples.push(new Ripple(
                        mouseX + (Math.random() - 0.5) * 30,
                        mouseY + (Math.random() - 0.5) * 30,
                        30 + Math.random() * 40,
                        1.5 + Math.random()
                    ));
                    lastRippleTime = timestamp;
                }
            }
            
            // 鼠标拖动产生波纹
            if (isMouseDown && timestamp - lastRippleTime > 80) {
                createRipple(mouseX, mouseY);
                lastRippleTime = timestamp;
            }
            
            // 更新统计
            rippleCountEl.textContent = ripples.length;
            rainCountEl.textContent = raindrops.length;
            
            time++;
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        function handleMouseMove(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
        }
        
        function handleTouchMove(e) {
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        }
        
        function handleMouseDown(e) {
            isMouseDown = true;
            createRipple(e.clientX, e.clientY);
        }
        
        function handleMouseUp() {
            isMouseDown = false;
        }
        
        function handleTouchStart(e) {
            if (e.touches.length > 0) {
                createRipple(e.touches[0].clientX, e.touches[0].clientY);
            }
        }
        
        // 初始化
        function init() {
            resize();
            
            // 初始化雨滴
            const rainCount = 50;
            for (let i = 0; i < rainCount; i++) {
                const drop = new Raindrop();
                drop.y = Math.random() * height;
                raindrops.push(drop);
            }
            
            window.addEventListener('resize', resize);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('mousedown', handleMouseDown);
            canvas.addEventListener('mouseup', handleMouseUp);
            canvas.addEventListener('mouseleave', handleMouseUp);
            canvas.addEventListener('touchmove', handleTouchMove, { passive: true });
            canvas.addEventListener('touchstart', handleTouchStart, { passive: true });
            
            // 检测 prefers-reduced-motion
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
            if (!prefersReducedMotion.matches) {
                animate(0);
            } else {
                // 静态渲染
                ctx.fillStyle = '#0a1628';
                ctx.fillRect(0, 0, width, height);
                drawStars();
                drawMoonReflection();
                drawWaterSurface();
            }
        }
        
        init();
    </script>
</body>
</html>
