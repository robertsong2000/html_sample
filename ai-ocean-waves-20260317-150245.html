<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>波浪动画 - Ocean Waves</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            z-index: 10;
            background: rgba(0, 50, 100, 0.6);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(100, 200, 255, 0.3);
            max-width: 280px;
        }
        
        .info h3 {
            margin-bottom: 10px;
            font-size: 16px;
            color: #66ddff;
            text-shadow: 0 0 15px rgba(102, 221, 255, 0.6);
        }
        
        .info p {
            margin: 5px 0;
            font-size: 12px;
            line-height: 1.6;
        }
        
        .info .key {
            color: #88ffff;
            font-weight: bold;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            z-index: 10;
            background: rgba(0, 50, 100, 0.6);
            padding: 10px 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
        }
        
        @media (max-width: 600px) {
            .info {
                font-size: 12px;
                padding: 10px 15px;
                max-width: 220px;
            }
        }
    </style>
</head>
<body>
    <canvas id="waves"></canvas>
    
    <div class="info">
        <h3>🌊 波浪动画</h3>
        <p><span class="key">移动鼠标</span> - 控制风向</p>
        <p><span class="key">点击</span> - 产生涟漪</p>
        <p><span class="key">滚轮</span> - 调整波浪高度</p>
        <p><span class="key">空格</span> - 切换时间/天气</p>
    </div>
    
    <div class="stats" id="stats">
        FPS: 60 | 波浪: 5
    </div>

    <script>
        const canvas = document.getElementById('waves');
        const ctx = canvas.getContext('2d');
        const statsEl = document.getElementById('stats');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        let waveHeight = 1;
        let timeMode = 0;
        let time = 0;
        
        // 时间/天气配置
        const timeConfigs = [
            { name: '白天', sky: ['#87ceeb', '#98d8e8'], water: ['rgba(0, 100, 180, 0.8)', 'rgba(0, 60, 120, 0.9)'], sun: true },
            { name: '日落', sky: ['#ff6b35', '#ffd166'], water: ['rgba(100, 50, 100, 0.8)', 'rgba(50, 30, 80, 0.9)'], sun: false },
            { name: '夜晚', sky: ['#0a0a2a', '#1a1a4a'], water: ['rgba(10, 20, 50, 0.8)', 'rgba(5, 10, 30, 0.9)'], moon: true },
            { name: '暴风雨', sky: ['#2a2a3a', '#4a4a5a'], water: ['rgba(30, 40, 60, 0.8)', 'rgba(20, 30, 50, 0.9)'], storm: true }
        ];
        
        // 波浪类
        class Wave {
            constructor(y, amplitude, frequency, speed, color, alpha) {
                this.baseY = y;
                this.amplitude = amplitude;
                this.frequency = frequency;
                this.speed = speed;
                this.color = color;
                this.alpha = alpha;
                this.phase = Math.random() * Math.PI * 2;
                this.points = [];
            }
            
            update(windInfluence) {
                this.phase += this.speed * (1 + windInfluence * 0.5);
                
                // 生成波浪点
                this.points = [];
                const step = 5;
                for (let x = 0; x <= width + step; x += step) {
                    const y = this.baseY + 
                        Math.sin(x * this.frequency + this.phase) * this.amplitude * waveHeight +
                        Math.sin(x * this.frequency * 0.5 + this.phase * 1.3) * this.amplitude * 0.5 * waveHeight +
                        Math.sin(x * this.frequency * 2 + this.phase * 0.7) * this.amplitude * 0.25 * waveHeight;
                    
                    this.points.push({ x, y });
                }
            }
            
            draw(ctx, config) {
                if (this.points.length < 2) return;
                
                // 创建波浪渐变
                const gradient = ctx.createLinearGradient(0, this.baseY - 50, 0, height);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(1, config.water[1]);
                
                ctx.beginPath();
                ctx.moveTo(this.points[0].x, height);
                
                // 绘制平滑曲线
                for (let i = 0; i < this.points.length - 1; i++) {
                    const p0 = this.points[Math.max(0, i - 1)];
                    const p1 = this.points[i];
                    const p2 = this.points[i + 1];
                    const p3 = this.points[Math.min(this.points.length - 1, i + 2)];
                    
                    const cp1x = p1.x + (p2.x - p0.x) / 6;
                    const cp1y = p1.y + (p2.y - p0.y) / 6;
                    const cp2x = p2.x - (p3.x - p1.x) / 6;
                    const cp2y = p2.y - (p3.y - p1.y) / 6;
                    
                    ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2.x, p2.y);
                }
                
                ctx.lineTo(width, height);
                ctx.closePath();
                
                ctx.fillStyle = gradient;
                ctx.globalAlpha = this.alpha;
                ctx.fill();
                ctx.globalAlpha = 1;
                
                // 波浪顶部高光
                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);
                for (let i = 1; i < this.points.length; i++) {
                    ctx.lineTo(this.points[i].x, this.points[i].y);
                }
                ctx.strokeStyle = `rgba(255, 255, 255, ${this.alpha * 0.3})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }
        
        // 涟漪类
        class Ripple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = 100;
                this.alpha = 0.8;
            }
            
            update() {
                this.radius += 2;
                this.alpha = 0.8 * (1 - this.radius / this.maxRadius);
                return this.radius < this.maxRadius;
            }
            
            draw(ctx) {
                if (this.alpha <= 0) return;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }
        
        // 泡沫类
        class Foam {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = height * 0.5 + Math.random() * height * 0.3;
                this.size = 2 + Math.random() * 4;
                this.speed = 0.5 + Math.random() * 1;
                this.alpha = 0.3 + Math.random() * 0.4;
                this.wobble = Math.random() * Math.PI * 2;
            }
            
            update() {
                this.x += this.speed;
                this.wobble += 0.05;
                this.y += Math.sin(this.wobble) * 0.5;
                
                if (this.x > width + 10) {
                    this.reset();
                    this.x = -10;
                }
            }
            
            draw(ctx) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.fill();
            }
        }
        
        // 雨滴类（暴风雨）
        class Raindrop {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = -10;
                this.speed = 8 + Math.random() * 8;
                this.size = 10 + Math.random() * 15;
            }
            
            update() {
                this.y += this.speed;
                this.x -= 2;
                
                if (this.y > height) {
                    this.reset();
                }
            }
            
            draw(ctx) {
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x + 2, this.y + this.size);
                ctx.strokeStyle = 'rgba(200, 200, 255, 0.5)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }
        
        let waves = [];
        let ripples = [];
        let foams = [];
        let raindrops = [];
        let stars = [];
        
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        
        function init() {
            resize();
            createWaves();
            createFoam();
            createStars();
        }
        
        function resize() {
            const dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            
            ctx.scale(dpr, dpr);
        }
        
        function createWaves() {
            waves = [];
            const baseY = height * 0.5;
            const waveCount = 5;
            
            for (let i = 0; i < waveCount; i++) {
                const y = baseY + i * 40;
                const amplitude = 15 + i * 5;
                const frequency = 0.008 - i * 0.001;
                const speed = 0.02 + i * 0.005;
                const alpha = 0.3 + (waveCount - i) * 0.15;
                
                waves.push(new Wave(y, amplitude, frequency, speed, `rgba(0, ${100 + i * 20}, ${180 - i * 20}, ${alpha})`, alpha));
            }
        }
        
        function createFoam() {
            foams = [];
            for (let i = 0; i < 30; i++) {
                foams.push(new Foam());
            }
        }
        
        function createStars() {
            stars = [];
            for (let i = 0; i < 50; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height * 0.4,
                    size: Math.random() * 2,
                    twinkle: Math.random() * Math.PI * 2
                });
            }
        }
        
        function createRain() {
            raindrops = [];
            for (let i = 0; i < 100; i++) {
                const drop = new Raindrop();
                drop.y = Math.random() * height;
                raindrops.push(drop);
            }
        }
        
        function drawSky(config) {
            const gradient = ctx.createLinearGradient(0, 0, 0, height * 0.6);
            gradient.addColorStop(0, config.sky[0]);
            gradient.addColorStop(1, config.sky[1]);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            // 太阳
            if (config.sun) {
                const sunX = width * 0.8;
                const sunY = height * 0.15;
                const sunGradient = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 50);
                sunGradient.addColorStop(0, '#fff5e0');
                sunGradient.addColorStop(0.3, '#ffdd66');
                sunGradient.addColorStop(1, 'transparent');
                ctx.fillStyle = sunGradient;
                ctx.beginPath();
                ctx.arc(sunX, sunY, 50, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // 月亮
            if (config.moon) {
                const moonX = width * 0.2;
                const moonY = height * 0.1;
                
                // 星星
                stars.forEach(star => {
                    star.twinkle += 0.03;
                    const alpha = 0.5 + Math.sin(star.twinkle) * 0.5;
                    ctx.beginPath();
                    ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.fill();
                });
                
                ctx.beginPath();
                ctx.arc(moonX, moonY, 30, 0, Math.PI * 2);
                ctx.fillStyle = '#f5f5dc';
                ctx.fill();
            }
            
            // 云（暴风雨）
            if (config.storm) {
                ctx.fillStyle = 'rgba(50, 50, 60, 0.8)';
                for (let i = 0; i < 5; i++) {
                    const cloudX = (i * 250 + time * 0.3) % (width + 200) - 100;
                    const cloudY = 30 + Math.sin(i) * 20;
                    
                    for (let j = 0; j < 5; j++) {
                        ctx.beginPath();
                        ctx.arc(cloudX + j * 30, cloudY, 30 + Math.sin(j) * 10, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
        }
        
        function animate(currentTime) {
            // FPS
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
            }
            
            time++;
            
            const config = timeConfigs[timeMode];
            const windInfluence = (mouseX - width / 2) / width;
            
            // 绘制天空
            drawSky(config);
            
            // 更新和绘制波浪
            waves.forEach(wave => {
                wave.update(windInfluence);
                wave.draw(ctx, config);
            });
            
            // 泡沫
            foams.forEach(foam => {
                foam.update();
                foam.draw(ctx);
            });
            
            // 涟漪
            ripples = ripples.filter(r => {
                const alive = r.update();
                if (alive) r.draw(ctx);
                return alive;
            });
            
            // 雨（暴风雨）
            if (config.storm) {
                if (raindrops.length === 0) createRain();
                raindrops.forEach(drop => {
                    drop.update();
                    drop.draw(ctx);
                });
            } else {
                raindrops = [];
            }
            
            // 更新统计
            statsEl.textContent = `FPS: ${fps} | 波浪: ${waves.length} | ${config.name}`;
            
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        window.addEventListener('resize', () => {
            resize();
            createWaves();
        });
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('click', (e) => {
            ripples.push(new Ripple(e.clientX, e.clientY));
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            waveHeight = Math.max(0.3, Math.min(2, waveHeight - e.deltaY * 0.001));
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                timeMode = (timeMode + 1) % timeConfigs.length;
            }
        });
        
        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            ripples.push(new Ripple(touch.clientX, touch.clientY));
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        });
        
        // 启动
        init();
        animate(performance.now());
    </script>
</body>
</html>
