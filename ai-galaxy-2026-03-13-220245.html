<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>银河系 | Galaxy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .ui {
            position: fixed;
            z-index: 10;
            color: rgba(255, 255, 255, 0.9);
            pointer-events: none;
        }
        
        .title {
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 32px;
            font-weight: 200;
            letter-spacing: 15px;
            text-shadow: 
                0 0 30px rgba(180, 150, 255, 0.8),
                0 0 60px rgba(180, 150, 255, 0.4),
                0 0 90px rgba(180, 150, 255, 0.2);
            animation: glow 3s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }
        
        .info {
            bottom: 25px;
            left: 25px;
            font-size: 13px;
            line-height: 1.8;
            text-shadow: 0 0 10px rgba(180, 150, 255, 0.5);
            opacity: 0.7;
        }
        
        .stats {
            top: 25px;
            right: 25px;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            text-align: right;
            text-shadow: 0 0 5px rgba(180, 150, 255, 0.5);
            opacity: 0.6;
        }
        
        @media (max-width: 768px) {
            .title {
                font-size: 20px;
                letter-spacing: 8px;
            }
            .info {
                font-size: 11px;
                bottom: 15px;
                left: 15px;
            }
            .stats {
                font-size: 9px;
                top: 15px;
                right: 15px;
            }
        }
    </style>
</head>
<body>
    <canvas id="galaxy"></canvas>
    
    <div class="ui title">GALAXY</div>
    
    <div class="ui stats">
        <div id="stars">Stars: 0</div>
        <div id="fps">FPS: 60</div>
    </div>
    
    <div class="ui info">
        移动鼠标旋转视角<br>
        点击创建超新星爆发
    </div>
    
    <script>
        const canvas = document.getElementById('galaxy');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let time = 0;
        let lastTime = performance.now();
        let fps = 60;
        
        // 银河系参数
        let stars = [];
        let nebulae = [];
        let supernovas = [];
        
        // 鼠标交互
        let mouseX = 0, mouseY = 0;
        let rotationX = 0, rotationY = 0;
        
        // 星星类
        class Star {
            constructor(armIndex = -1) {
                this.armIndex = armIndex;
                this.reset();
            }
            
            reset() {
                if (this.armIndex >= 0) {
                    // 旋臂上的星星
                    const armAngle = (this.armIndex / 4) * Math.PI * 2;
                    const distance = Math.random() * 400 + 50;
                    const spiralAngle = armAngle + distance * 0.01;
                    const spread = (Math.random() - 0.5) * 80;
                    
                    this.baseX = Math.cos(spiralAngle) * distance + spread;
                    this.baseY = Math.sin(spiralAngle) * distance + spread;
                    this.z = (Math.random() - 0.5) * 100;
                } else {
                    // 背景星星
                    this.baseX = (Math.random() - 0.5) * width * 2;
                    this.baseY = (Math.random() - 0.5) * height * 2;
                    this.z = (Math.random() - 0.5) * 500;
                }
                
                this.size = Math.random() * 2 + 0.5;
                this.brightness = Math.random() * 0.5 + 0.5;
                this.twinkleSpeed = Math.random() * 0.05 + 0.02;
                this.twinklePhase = Math.random() * Math.PI * 2;
                this.color = this.getRandomColor();
            }
            
            getRandomColor() {
                const colors = [
                    { r: 255, g: 255, b: 255 },   // 白色
                    { r: 200, g: 220, b: 255 },   // 蓝白色
                    { r: 255, g: 240, b: 200 },   // 黄白色
                    { r: 255, g: 200, b: 180 },   // 橙白色
                    { r: 180, g: 200, b: 255 },   // 淡蓝色
                    { r: 255, g: 180, b: 255 },   // 淡紫色
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }
            
            update(centerX, centerY, rotX, rotY) {
                // 旋转
                const cosY = Math.cos(rotY);
                const sinY = Math.sin(rotY);
                const cosX = Math.cos(rotX);
                const sinX = Math.sin(rotX);
                
                let x = this.baseX;
                let y = this.baseY;
                let z = this.z;
                
                // Y轴旋转
                const x1 = x * cosY - z * sinY;
                const z1 = x * sinY + z * cosY;
                
                // X轴旋转
                const y1 = y * cosX - z1 * sinX;
                const z2 = y * sinX + z1 * cosX;
                
                // 透视投影
                const perspective = 800;
                const scale = perspective / (perspective + z2);
                
                this.screenX = centerX + x1 * scale;
                this.screenY = centerY + y1 * scale;
                this.scale = scale;
                
                // 闪烁
                this.twinklePhase += this.twinkleSpeed;
                this.currentBrightness = this.brightness * (0.7 + Math.sin(this.twinklePhase) * 0.3);
            }
            
            draw() {
                if (this.scale <= 0) return;
                
                const size = this.size * this.scale;
                const alpha = this.currentBrightness * this.scale;
                
                // 发光效果
                const gradient = ctx.createRadialGradient(
                    this.screenX, this.screenY, 0,
                    this.screenX, this.screenY, size * 4
                );
                gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`);
                gradient.addColorStop(0.5, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha * 0.3})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(this.screenX, this.screenY, size * 4, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // 核心
                ctx.beginPath();
                ctx.arc(this.screenX, this.screenY, size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`;
                ctx.fill();
            }
        }
        
        // 星云类
        class Nebula {
            constructor() {
                this.x = (Math.random() - 0.5) * 600;
                this.y = (Math.random() - 0.5) * 600;
                this.z = (Math.random() - 0.5) * 200;
                this.size = Math.random() * 150 + 80;
                this.color = this.getRandomNebulaColor();
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.001;
            }
            
            getRandomNebulaColor() {
                const colors = [
                    { r: 255, g: 100, b: 150 },   // 粉红
                    { r: 100, g: 150, b: 255 },   // 蓝色
                    { r: 200, g: 100, b: 255 },   // 紫色
                    { r: 255, g: 150, b: 100 },   // 橙色
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }
            
            update(centerX, centerY, rotX, rotY) {
                this.rotation += this.rotationSpeed;
                
                const cosY = Math.cos(rotY);
                const sinY = Math.sin(rotY);
                const cosX = Math.cos(rotX);
                const sinX = Math.sin(rotX);
                
                let x = this.x;
                let y = this.y;
                let z = this.z;
                
                const x1 = x * cosY - z * sinY;
                const z1 = x * sinY + z * cosY;
                const y1 = y * cosX - z1 * sinX;
                const z2 = y * sinX + z1 * cosX;
                
                const perspective = 800;
                const scale = perspective / (perspective + z2);
                
                this.screenX = centerX + x1 * scale;
                this.screenY = centerY + y1 * scale;
                this.scale = scale;
            }
            
            draw() {
                if (this.scale <= 0) return;
                
                const size = this.size * this.scale;
                const alpha = 0.15 * this.scale;
                
                const gradient = ctx.createRadialGradient(
                    this.screenX, this.screenY, 0,
                    this.screenX, this.screenY, size
                );
                gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`);
                gradient.addColorStop(0.5, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha * 0.5})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(this.screenX, this.screenY, size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }
        
        // 超新星爆发类
        class Supernova {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.time = 0;
                this.maxTime = 120;
                this.particles = [];
                
                // 创建爆发粒子
                for (let i = 0; i < 100; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 8 + 2;
                    this.particles.push({
                        x: 0,
                        y: 0,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        size: Math.random() * 3 + 1,
                        color: Math.random() > 0.5 ? 
                            { r: 255, g: 255, b: 255 } : 
                            { r: 255, g: 200, b: 100 },
                        life: 1
                    });
                }
            }
            
            update() {
                this.time++;
                
                this.particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vx *= 0.98;
                    p.vy *= 0.98;
                    p.life = 1 - (this.time / this.maxTime);
                });
                
                return this.time < this.maxTime;
            }
            
            draw() {
                // 中心闪光
                const flashProgress = this.time / 30;
                if (flashProgress < 1) {
                    const flashSize = 50 * (1 - flashProgress);
                    const flashAlpha = 1 - flashProgress;
                    
                    const gradient = ctx.createRadialGradient(
                        this.x, this.y, 0,
                        this.x, this.y, flashSize
                    );
                    gradient.addColorStop(0, `rgba(255, 255, 255, ${flashAlpha})`);
                    gradient.addColorStop(0.5, `rgba(255, 200, 100, ${flashAlpha * 0.5})`);
                    gradient.addColorStop(1, 'transparent');
                    
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, flashSize, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                }
                
                // 粒子
                this.particles.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(this.x + p.x, this.y + p.y, p.size * p.life, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${p.color.r}, ${p.color.g}, ${p.color.b}, ${p.life})`;
                    ctx.fill();
                });
            }
        }
        
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            stars = [];
            nebulae = [];
            
            // 创建旋臂星星
            for (let arm = 0; arm < 4; arm++) {
                const starsPerArm = Math.min(200, Math.floor(width * height / 5000));
                for (let i = 0; i < starsPerArm; i++) {
                    stars.push(new Star(arm));
                }
            }
            
            // 创建背景星星
            const bgStars = Math.min(150, Math.floor(width * height / 8000));
            for (let i = 0; i < bgStars; i++) {
                stars.push(new Star(-1));
            }
            
            // 创建星云
            const nebulaCount = Math.min(8, Math.floor(width * height / 50000));
            for (let i = 0; i < nebulaCount; i++) {
                nebulae.push(new Nebula());
            }
            
            // 中心核心星星
            for (let i = 0; i < 50; i++) {
                const star = new Star(0);
                star.baseX = (Math.random() - 0.5) * 80;
                star.baseY = (Math.random() - 0.5) * 80;
                star.z = (Math.random() - 0.5) * 30;
                star.size = Math.random() * 1.5 + 1;
                stars.push(star);
            }
            
            mouseX = width / 2;
            mouseY = height / 2;
            
            document.getElementById('stars').textContent = `Stars: ${stars.length}`;
        }
        
        function updateFPS() {
            const now = performance.now();
            const delta = now - lastTime;
            lastTime = now;
            fps = Math.round(1000 / delta);
            document.getElementById('fps').textContent = `FPS: ${fps}`;
        }
        
        function animate() {
            time++;
            
            // 清除画布
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, width, height);
            
            // 更新旋转角度
            const targetRotY = (mouseX - width / 2) / width * 0.5;
            const targetRotX = (mouseY - height / 2) / height * 0.3;
            rotationY += (targetRotY - rotationY) * 0.05;
            rotationX += (targetRotX - rotationX) * 0.05;
            
            const centerX = width / 2;
            const centerY = height / 2;
            
            // 自动缓慢旋转
            const autoRotation = time * 0.001;
            const totalRotY = rotationY + autoRotation;
            
            // 绘制星云
            nebulae.forEach(nebula => {
                nebula.update(centerX, centerY, rotationX, totalRotY);
                nebula.draw();
            });
            
            // 更新和绘制星星
            stars.forEach(star => {
                star.update(centerX, centerY, rotationX, totalRotY);
                star.draw();
            });
            
            // 绘制银河中心
            const coreGradient = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, 100
            );
            coreGradient.addColorStop(0, 'rgba(255, 240, 200, 0.3)');
            coreGradient.addColorStop(0.3, 'rgba(255, 200, 150, 0.15)');
            coreGradient.addColorStop(1, 'transparent');
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, 100, 0, Math.PI * 2);
            ctx.fillStyle = coreGradient;
            ctx.fill();
            
            // 更新和绘制超新星
            supernovas = supernovas.filter(supernova => {
                const alive = supernova.update();
                supernova.draw();
                return alive;
            });
            
            updateFPS();
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        window.addEventListener('resize', init);
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('click', (e) => {
            supernovas.push(new Supernova(e.clientX, e.clientY));
        });
        
        // 触摸支持
        canvas.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        });
        
        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) {
                supernovas.push(new Supernova(e.touches[0].clientX, e.touches[0].clientY));
            }
        });
        
        // 初始化
        init();
        animate();
    </script>
</body>
</html>
