<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极光效果 | Aurora Borealis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 20px rgba(0, 255, 200, 0.8);
            animation: titleGlow 3s ease-in-out infinite;
        }
        
        @keyframes titleGlow {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <canvas id="aurora"></canvas>
    <div class="title">Aurora Borealis</div>
    <div class="info">移动鼠标创建极光 | 点击屏幕改变颜色 | 滚轮调整强度</div>
    
    <script>
        const canvas = document.getElementById('aurora');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        let intensity = 1;
        let colorScheme = 0;
        
        const colorSchemes = [
            ['#00ff88', '#00ffff', '#ff00ff'],  // 青绿紫
            ['#ff6b6b', '#feca57', '#48dbfb'],  // 红黄蓝
            ['#a55eea', '#45aaf2', '#26de81'],  // 紫蓝绿
            ['#fd79a8', '#a29bfe', '#00cec9'],  // 粉紫青
        ];
        
        // 极光粒子系统
        class AuroraParticle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = -Math.random() * 2 - 0.5;
                this.life = Math.random() * 100 + 100;
                this.maxLife = this.life;
                this.size = Math.random() * 3 + 1;
                this.colorIndex = Math.floor(Math.random() * 3);
                this.angle = Math.random() * Math.PI * 2;
                this.angleSpeed = (Math.random() - 0.5) * 0.02;
            }
            
            update() {
                // 鼠标影响
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 200) {
                    const force = (200 - dist) / 200;
                    this.vx += (dx / dist) * force * 0.1;
                    this.vy += (dy / dist) * force * 0.1;
                }
                
                // 波动效果
                this.angle += this.angleSpeed;
                this.vx += Math.sin(this.angle) * 0.05;
                
                this.x += this.vx;
                this.y += this.vy;
                
                // 边界处理
                if (this.x < 0) this.x = width;
                if (this.x > width) this.x = 0;
                if (this.y < 0) this.y = height;
                
                this.life--;
                
                if (this.life <= 0) {
                    this.reset();
                }
            }
            
            draw() {
                const alpha = (this.life / this.maxLife) * 0.6 * intensity;
                const colors = colorSchemes[colorScheme];
                const color = colors[this.colorIndex];
                
                ctx.save();
                ctx.globalAlpha = alpha;
                
                // 发光效果
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 5
                );
                gradient.addColorStop(0, color);
                gradient.addColorStop(0.5, color + '40');
                gradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 5, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        // 极光波浪
        class AuroraWave {
            constructor(yOffset) {
                this.yOffset = yOffset;
                this.points = [];
                this.numPoints = 100;
                this.colorIndex = Math.floor(Math.random() * 3);
                this.phase = Math.random() * Math.PI * 2;
                this.speed = Math.random() * 0.02 + 0.01;
                this.amplitude = Math.random() * 50 + 30;
                
                for (let i = 0; i <= this.numPoints; i++) {
                    this.points.push({
                        x: (i / this.numPoints) * width,
                        y: yOffset,
                        originalY: yOffset,
                        phase: Math.random() * Math.PI * 2
                    });
                }
            }
            
            update() {
                this.phase += this.speed;
                
                for (let i = 0; i < this.points.length; i++) {
                    const point = this.points[i];
                    
                    // 多重正弦波叠加
                    const wave1 = Math.sin(this.phase + i * 0.05) * this.amplitude;
                    const wave2 = Math.sin(this.phase * 1.5 + i * 0.08) * this.amplitude * 0.5;
                    const wave3 = Math.sin(this.phase * 0.7 + i * 0.03) * this.amplitude * 0.3;
                    
                    // 鼠标影响
                    const dx = mouseX - point.x;
                    const dy = mouseY - point.originalY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    let mouseEffect = 0;
                    
                    if (dist < 300) {
                        mouseEffect = (300 - dist) / 300 * 100 * intensity;
                    }
                    
                    point.y = point.originalY + wave1 + wave2 + wave3 - mouseEffect;
                }
            }
            
            draw() {
                const colors = colorSchemes[colorScheme];
                const color = colors[this.colorIndex];
                
                ctx.save();
                ctx.globalAlpha = 0.3 * intensity;
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                ctx.shadowBlur = 30;
                ctx.shadowColor = color;
                
                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);
                
                // 使用贝塞尔曲线绘制平滑波浪
                for (let i = 1; i < this.points.length - 2; i++) {
                    const xc = (this.points[i].x + this.points[i + 1].x) / 2;
                    const yc = (this.points[i].y + this.points[i + 1].y) / 2;
                    ctx.quadraticCurveTo(this.points[i].x, this.points[i].y, xc, yc);
                }
                
                ctx.stroke();
                
                // 渐变填充
                ctx.globalAlpha = 0.1 * intensity;
                const gradient = ctx.createLinearGradient(0, this.yOffset - 100, 0, this.yOffset + 100);
                gradient.addColorStop(0, 'transparent');
                gradient.addColorStop(0.5, color + '40');
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                
                ctx.lineTo(width, height);
                ctx.lineTo(0, height);
                ctx.closePath();
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        // 星星
        class Star {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height * 0.7;
                this.size = Math.random() * 2;
                this.twinkleSpeed = Math.random() * 0.05 + 0.01;
                this.phase = Math.random() * Math.PI * 2;
            }
            
            draw() {
                this.phase += this.twinkleSpeed;
                const alpha = (Math.sin(this.phase) + 1) / 2 * 0.8 + 0.2;
                
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        let particles = [];
        let waves = [];
        let stars = [];
        
        function init() {
            resize();
            
            // 创建粒子
            for (let i = 0; i < 200; i++) {
                particles.push(new AuroraParticle());
            }
            
            // 创建波浪
            for (let i = 0; i < 5; i++) {
                waves.push(new AuroraWave(height * 0.3 + i * 80));
            }
            
            // 创建星星
            for (let i = 0; i < 100; i++) {
                stars.push(new Star());
            }
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        function animate() {
            // 背景渐变
            const bgGradient = ctx.createLinearGradient(0, 0, 0, height);
            bgGradient.addColorStop(0, '#0a0a1a');
            bgGradient.addColorStop(0.5, '#0f0f2a');
            bgGradient.addColorStop(1, '#1a0a1a');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, width, height);
            
            // 绘制星星
            stars.forEach(star => star.draw());
            
            // 绘制极光波浪
            waves.forEach(wave => {
                wave.update();
                wave.draw();
            });
            
            // 绘制粒子
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            
            // 添加整体光晕
            ctx.save();
            const centerGlow = ctx.createRadialGradient(
                width / 2, height * 0.4, 0,
                width / 2, height * 0.4, height * 0.6
            );
            const colors = colorSchemes[colorScheme];
            centerGlow.addColorStop(0, colors[0] + '10');
            centerGlow.addColorStop(0.5, colors[1] + '05');
            centerGlow.addColorStop(1, 'transparent');
            ctx.fillStyle = centerGlow;
            ctx.fillRect(0, 0, width, height);
            ctx.restore();
            
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        window.addEventListener('click', () => {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
        });
        
        window.addEventListener('wheel', (e) => {
            intensity += e.deltaY > 0 ? -0.1 : 0.1;
            intensity = Math.max(0.3, Math.min(2, intensity));
        });
        
        // 触摸支持
        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });
        
        window.addEventListener('touchstart', () => {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
        });
        
        // 性能监控
        let lastTime = performance.now();
        let frames = 0;
        
        function checkFPS() {
            frames++;
            const currentTime = performance.now();
            if (currentTime - lastTime >= 1000) {
                const fps = frames;
                frames = 0;
                lastTime = currentTime;
                
                // 如果FPS低于55，减少粒子数量
                if (fps < 55 && particles.length > 100) {
                    particles = particles.slice(0, particles.length - 20);
                }
            }
            requestAnimationFrame(checkFPS);
        }
        
        init();
        animate();
        checkFPS();
    </script>
</body>
</html>
