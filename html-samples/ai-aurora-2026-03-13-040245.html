<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北极光 | Aurora Borealis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 10;
            text-shadow: 0 0 10px rgba(0, 255, 128, 0.5);
            pointer-events: none;
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 8px;
            text-transform: uppercase;
            z-index: 10;
            text-shadow: 0 0 20px rgba(0, 255, 128, 0.6);
            pointer-events: none;
        }
        
        @media (max-width: 768px) {
            .title {
                font-size: 16px;
                letter-spacing: 4px;
            }
            .info {
                font-size: 12px;
                bottom: 10px;
                left: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="title">Aurora Borealis</div>
    <canvas id="aurora"></canvas>
    <div class="info">移动鼠标控制极光方向 | 点击产生光爆</div>
    
    <script>
        const canvas = document.getElementById('aurora');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        let targetMouseX = 0, targetMouseY = 0;
        let particles = [];
        let auroraWaves = [];
        let lightBursts = [];
        let time = 0;
        
        // 响应式画布
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initAuroraWaves();
        }
        
        // 初始化极光波浪
        function initAuroraWaves() {
            auroraWaves = [];
            const waveCount = Math.min(8, Math.floor(width / 150));
            
            for (let i = 0; i < waveCount; i++) {
                auroraWaves.push({
                    y: height * 0.3 + i * 30,
                    amplitude: 50 + Math.random() * 100,
                    frequency: 0.002 + Math.random() * 0.003,
                    speed: 0.0005 + Math.random() * 0.001,
                    phase: Math.random() * Math.PI * 2,
                    hue: 120 + i * 20 + Math.random() * 30,
                    alpha: 0.3 + Math.random() * 0.4,
                    thickness: 100 + Math.random() * 150
                });
            }
        }
        
        // 星星粒子
        function initStars() {
            particles = [];
            const starCount = Math.min(300, Math.floor(width * height / 5000));
            
            for (let i = 0; i < starCount; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height * 0.7,
                    size: Math.random() * 2 + 0.5,
                    twinkle: Math.random() * Math.PI * 2,
                    speed: 0.02 + Math.random() * 0.05
                });
            }
        }
        
        // 绘制星星
        function drawStars() {
            particles.forEach(star => {
                star.twinkle += star.speed;
                const alpha = 0.3 + Math.sin(star.twinkle) * 0.3;
                
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fill();
            });
        }
        
        // 绘制极光
        function drawAurora() {
            auroraWaves.forEach((wave, index) => {
                wave.phase += wave.speed;
                
                const gradient = ctx.createLinearGradient(0, wave.y - wave.thickness, 0, wave.y + wave.thickness);
                
                // 根据鼠标位置调整颜色
                const hueShift = (mouseX / width - 0.5) * 60;
                const hue = wave.hue + hueShift;
                const alpha = wave.alpha * (1 + (mouseY / height - 0.5) * 0.5);
                
                gradient.addColorStop(0, 'transparent');
                gradient.addColorStop(0.3, `hsla(${hue}, 80%, 60%, ${alpha * 0.3})`);
                gradient.addColorStop(0.5, `hsla(${hue}, 90%, 70%, ${alpha})`);
                gradient.addColorStop(0.7, `hsla(${hue + 30}, 80%, 60%, ${alpha * 0.3})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.moveTo(0, wave.y);
                
                // 绘制波浪路径
                for (let x = 0; x <= width; x += 5) {
                    const mouseInfluence = Math.sin((x - mouseX) * 0.01) * 50 * (1 - Math.abs(x - mouseX) / width);
                    const y = wave.y + 
                              Math.sin(x * wave.frequency + wave.phase) * wave.amplitude +
                              Math.sin(x * wave.frequency * 2 + wave.phase * 1.5) * (wave.amplitude * 0.3) +
                              mouseInfluence * 0.5;
                    ctx.lineTo(x, y);
                }
                
                ctx.lineTo(width, height);
                ctx.lineTo(0, height);
                ctx.closePath();
                
                ctx.fillStyle = gradient;
                ctx.fill();
            });
        }
        
        // 光爆效果
        function createLightBurst(x, y) {
            const burst = {
                x, y,
                particles: [],
                time: 0,
                maxTime: 60
            };
            
            const count = 50;
            for (let i = 0; i < count; i++) {
                const angle = (Math.PI * 2 / count) * i + Math.random() * 0.5;
                const speed = 3 + Math.random() * 8;
                burst.particles.push({
                    x: 0,
                    y: 0,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: 2 + Math.random() * 4,
                    hue: 120 + Math.random() * 60,
                    life: 1
                });
            }
            
            lightBursts.push(burst);
        }
        
        // 绘制光爆
        function drawLightBursts() {
            lightBursts = lightBursts.filter(burst => {
                burst.time++;
                const progress = burst.time / burst.maxTime;
                
                burst.particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.1; // 重力
                    p.vx *= 0.98;
                    p.vy *= 0.98;
                    p.life = 1 - progress;
                    
                    ctx.beginPath();
                    ctx.arc(burst.x + p.x, burst.y + p.y, p.size * p.life, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${p.hue}, 100%, 70%, ${p.life * 0.8})`;
                    ctx.fill();
                    
                    // 发光效果
                    ctx.beginPath();
                    ctx.arc(burst.x + p.x, burst.y + p.y, p.size * p.life * 2, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${p.hue}, 100%, 80%, ${p.life * 0.3})`;
                    ctx.fill();
                });
                
                return burst.time < burst.maxTime;
            });
        }
        
        // 绘制地面反射
        function drawGround() {
            const gradient = ctx.createLinearGradient(0, height * 0.85, 0, height);
            gradient.addColorStop(0, 'transparent');
            gradient.addColorStop(0.5, 'rgba(0, 20, 40, 0.5)');
            gradient.addColorStop(1, 'rgba(0, 10, 20, 0.8)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, height * 0.85, width, height * 0.15);
            
            // 地面线条
            ctx.beginPath();
            ctx.moveTo(0, height * 0.88);
            for (let x = 0; x <= width; x += 100) {
                const y = height * 0.88 + Math.sin(x * 0.01 + time * 0.001) * 3;
                ctx.lineTo(x, y);
            }
            ctx.strokeStyle = 'rgba(0, 255, 128, 0.2)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        
        // 主动画循环
        function animate() {
            time++;
            
            // 平滑鼠标跟随
            mouseX += (targetMouseX - mouseX) * 0.05;
            mouseY += (targetMouseY - mouseY) * 0.05;
            
            // 清除画布并绘制背景
            const bgGradient = ctx.createLinearGradient(0, 0, 0, height);
            bgGradient.addColorStop(0, '#000510');
            bgGradient.addColorStop(0.5, '#001020');
            bgGradient.addColorStop(1, '#000515');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, width, height);
            
            // 绘制各层
            drawStars();
            drawAurora();
            drawLightBursts();
            drawGround();
            
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        window.addEventListener('resize', () => {
            resize();
            initStars();
        });
        
        window.addEventListener('mousemove', (e) => {
            targetMouseX = e.clientX;
            targetMouseY = e.clientY;
        });
        
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                targetMouseX = e.touches[0].clientX;
                targetMouseY = e.touches[0].clientY;
            }
        });
        
        window.addEventListener('click', (e) => {
            createLightBurst(e.clientX, e.clientY);
        });
        
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) {
                createLightBurst(e.touches[0].clientX, e.touches[0].clientY);
            }
        });
        
        // 初始化
        resize();
        initStars();
        targetMouseX = width / 2;
        targetMouseY = height / 2;
        mouseX = targetMouseX;
        mouseY = targetMouseY;
        animate();
    </script>
</body>
</html>
