<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分形艺术 | Fractal Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            cursor: crosshair;
        }
        
        .ui {
            position: fixed;
            z-index: 10;
            color: #fff;
            pointer-events: none;
        }
        
        .title {
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 8px;
            text-shadow: 0 0 20px currentColor;
            opacity: 0.8;
        }
        
        .info {
            bottom: 20px;
            left: 20px;
            font-size: 12px;
            opacity: 0.6;
            line-height: 1.8;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        
        .stats {
            top: 20px;
            right: 20px;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            text-align: right;
            opacity: 0.7;
        }
        
        .controls {
            bottom: 20px;
            right: 20px;
            font-size: 11px;
            text-align: right;
            opacity: 0.6;
        }
        
        .controls span {
            display: inline-block;
            padding: 4px 8px;
            margin: 2px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            pointer-events: auto;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .controls span:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .controls span.active {
            background: rgba(255,255,255,0.4);
        }
        
        @media (max-width: 768px) {
            .title { font-size: 16px; letter-spacing: 4px; }
            .info { font-size: 10px; bottom: 10px; left: 10px; }
            .stats { font-size: 9px; top: 10px; right: 10px; }
            .controls { display: none; }
        }
    </style>
</head>
<body>
    <canvas id="fractal"></canvas>
    
    <div class="ui title">Fractal Art</div>
    
    <div class="ui stats">
        <div id="type">Type: Julia</div>
        <div id="iterations">Iterations: 100</div>
        <div id="fps">FPS: 60</div>
    </div>
    
    <div class="ui info">
        移动鼠标探索分形<br>
        点击放大/滚轮缩放<br>
        双击重置视图
    </div>
    
    <div class="ui controls">
        <div>
            <span id="btnJulia" class="active">Julia</span>
            <span id="btnMandelbrot">Mandelbrot</span>
            <span id="btnBurning">Burning Ship</span>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('fractal');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let imageData, pixels;
        let time = 0;
        let lastTime = performance.now();
        let fps = 60;
        
        // 分形参数
        let fractalType = 'julia';
        let zoom = 1;
        let offsetX = 0, offsetY = 0;
        let maxIterations = 100;
        
        // Julia集参数
        let juliaC = { real: -0.7, imag: 0.27015 };
        
        // 鼠标交互
        let mouseX = 0, mouseY = 0;
        let isDragging = false;
        let lastMouseX = 0, lastMouseY = 0;
        
        // 颜色方案
        const colorSchemes = [
            (i, max) => {
                if (i === max) return [0, 0, 0];
                const t = i / max;
                return [
                    Math.floor(9 * (1 - t) * t * t * t * 255),
                    Math.floor(15 * (1 - t) * (1 - t) * t * t * 255),
                    Math.floor(8.5 * (1 - t) * (1 - t) * (1 - t) * t * 255)
                ];
            },
            (i, max) => {
                if (i === max) return [0, 0, 0];
                const t = i / max;
                return [
                    Math.floor(255 * Math.sin(t * Math.PI)),
                    Math.floor(255 * Math.sin(t * Math.PI + 2)),
                    Math.floor(255 * Math.sin(t * Math.PI + 4))
                ];
            },
            (i, max) => {
                if (i === max) return [0, 0, 0];
                const t = i / max;
                return [
                    Math.floor(255 * t),
                    Math.floor(255 * (1 - Math.abs(2 * t - 1))),
                    Math.floor(255 * (1 - t))
                ];
            }
        ];
        let currentScheme = 0;
        
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            imageData = ctx.createImageData(width, height);
            pixels = imageData.data;
            
            document.getElementById('type').textContent = `Type: ${fractalType.charAt(0).toUpperCase() + fractalType.slice(1)}`;
            document.getElementById('iterations').textContent = `Iterations: ${maxIterations}`;
        }
        
        function getColor(iteration, maxIter) {
            return colorSchemes[currentScheme](iteration, maxIter);
        }
        
        function computeJulia(x, y, maxIter) {
            let zReal = x;
            let zImag = y;
            let iteration = 0;
            
            while (iteration < maxIter) {
                const zReal2 = zReal * zReal;
                const zImag2 = zImag * zImag;
                
                if (zReal2 + zImag2 > 4) break;
                
                const newReal = zReal2 - zImag2 + juliaC.real;
                const newImag = 2 * zReal * zImag + juliaC.imag;
                
                zReal = newReal;
                zImag = newImag;
                iteration++;
            }
            
            return iteration;
        }
        
        function computeMandelbrot(x, y, maxIter) {
            let zReal = 0;
            let zImag = 0;
            let iteration = 0;
            
            while (iteration < maxIter) {
                const zReal2 = zReal * zReal;
                const zImag2 = zImag * zImag;
                
                if (zReal2 + zImag2 > 4) break;
                
                zReal = zReal2 - zImag2 + x;
                zImag = 2 * zReal * zImag + y;
                iteration++;
            }
            
            return iteration;
        }
        
        function computeBurningShip(x, y, maxIter) {
            let zReal = 0;
            let zImag = 0;
            let iteration = 0;
            
            while (iteration < maxIter) {
                const zReal2 = zReal * zReal;
                const zImag2 = zImag * zImag;
                
                if (zReal2 + zImag2 > 4) break;
                
                zReal = zReal2 - zImag2 + x;
                zImag = Math.abs(2 * zReal * zImag) + y;
                iteration++;
            }
            
            return iteration;
        }
        
        function render() {
            const scale = 4 / (zoom * Math.min(width, height));
            const centerX = offsetX;
            const centerY = offsetY;
            
            // 动态Julia参数（鼠标位置影响）
            if (fractalType === 'julia') {
                juliaC.real = -0.7 + (mouseX / width - 0.5) * 0.3;
                juliaC.imag = 0.27015 + (mouseY / height - 0.5) * 0.3;
            }
            
            // 分块渲染以提高性能
            const blockSize = 4;
            
            for (let py = 0; py < height; py += blockSize) {
                for (let px = 0; px < width; px += blockSize) {
                    const x = (px - width / 2) * scale + centerX;
                    const y = (py - height / 2) * scale + centerY;
                    
                    let iteration;
                    switch (fractalType) {
                        case 'julia':
                            iteration = computeJulia(x, y, maxIterations);
                            break;
                        case 'mandelbrot':
                            iteration = computeMandelbrot(x, y, maxIterations);
                            break;
                        case 'burning':
                            iteration = computeBurningShip(x, y, maxIterations);
                            break;
                    }
                    
                    const [r, g, b] = getColor(iteration, maxIterations);
                    
                    // 填充块
                    for (let dy = 0; dy < blockSize && py + dy < height; dy++) {
                        for (let dx = 0; dx < blockSize && px + dx < width; dx++) {
                            const idx = ((py + dy) * width + (px + dx)) * 4;
                            pixels[idx] = r;
                            pixels[idx + 1] = g;
                            pixels[idx + 2] = b;
                            pixels[idx + 3] = 255;
                        }
                    }
                }
            }
            
            ctx.putImageData(imageData, 0, 0);
        }
        
        function animate() {
            time++;
            
            render();
            
            // 更新FPS
            const now = performance.now();
            const delta = now - lastTime;
            lastTime = now;
            fps = Math.round(1000 / delta);
            document.getElementById('fps').textContent = `FPS: ${fps}`;
            
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        window.addEventListener('resize', () => {
            init();
        });
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            if (isDragging) {
                const scale = 4 / (zoom * Math.min(width, height));
                offsetX -= (e.clientX - lastMouseX) * scale;
                offsetY -= (e.clientY - lastMouseY) * scale;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
            }
        });
        
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        });
        
        canvas.addEventListener('mouseup', () => {
            isDragging = false;
        });
        
        canvas.addEventListener('mouseleave', () => {
            isDragging = false;
        });
        
        canvas.addEventListener('click', (e) => {
            // 点击放大
            const scale = 4 / (zoom * Math.min(width, height));
            offsetX += (e.clientX - width / 2) * scale;
            offsetY += (e.clientY - height / 2) * scale;
            zoom *= 1.5;
        });
        
        canvas.addEventListener('dblclick', () => {
            // 双击重置
            zoom = 1;
            offsetX = 0;
            offsetY = 0;
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
            zoom *= zoomFactor;
            zoom = Math.max(0.1, Math.min(zoom, 100000));
        });
        
        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                lastMouseX = e.touches[0].clientX;
                lastMouseY = e.touches[0].clientY;
            }
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length === 1) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
                
                if (isDragging) {
                    const scale = 4 / (zoom * Math.min(width, height));
                    offsetX -= (e.touches[0].clientX - lastMouseX) * scale;
                    offsetY -= (e.touches[0].clientY - lastMouseY) * scale;
                    lastMouseX = e.touches[0].clientX;
                    lastMouseY = e.touches[0].clientY;
                }
            }
        });
        
        canvas.addEventListener('touchend', () => {
            isDragging = false;
        });
        
        // 控制按钮
        document.getElementById('btnJulia').addEventListener('click', () => {
            fractalType = 'julia';
            updateButtons();
            resetView();
        });
        
        document.getElementById('btnMandelbrot').addEventListener('click', () => {
            fractalType = 'mandelbrot';
            updateButtons();
            resetView();
        });
        
        document.getElementById('btnBurning').addEventListener('click', () => {
            fractalType = 'burning';
            updateButtons();
            resetView();
        });
        
        function updateButtons() {
            document.querySelectorAll('.controls span').forEach(btn => {
                btn.classList.remove('active');
            });
            document.getElementById('btn' + fractalType.charAt(0).toUpperCase() + fractalType.slice(1)).classList.add('active');
            document.getElementById('type').textContent = `Type: ${fractalType.charAt(0).toUpperCase() + fractalType.slice(1)}`;
        }
        
        function resetView() {
            zoom = 1;
            offsetX = 0;
            offsetY = 0;
            if (fractalType === 'burning') {
                offsetY = -0.5;
            }
        }
        
        // 键盘控制
        window.addEventListener('keydown', (e) => {
            switch (e.key) {
                case '1':
                    fractalType = 'julia';
                    updateButtons();
                    resetView();
                    break;
                case '2':
                    fractalType = 'mandelbrot';
                    updateButtons();
                    resetView();
                    break;
                case '3':
                    fractalType = 'burning';
                    updateButtons();
                    resetView();
                    break;
                case 'c':
                case 'C':
                    currentScheme = (currentScheme + 1) % colorSchemes.length;
                    break;
                case 'r':
                case 'R':
                    resetView();
                    break;
            }
        });
        
        // 初始化
        init();
        mouseX = width / 2;
        mouseY = height / 2;
        animate();
    </script>
</body>
</html>
