<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>几何万花筒 - Geometric Kaleidoscope</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 280px;
        }
        
        .info h3 {
            margin-bottom: 10px;
            font-size: 16px;
            color: #ff88ff;
            text-shadow: 0 0 15px rgba(255, 136, 255, 0.6);
        }
        
        .info p {
            margin: 5px 0;
            font-size: 12px;
            line-height: 1.6;
        }
        
        .info .key {
            color: #88ffff;
            font-weight: bold;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
        }
        
        @media (max-width: 600px) {
            .info {
                font-size: 12px;
                padding: 10px 15px;
                max-width: 220px;
            }
        }
    </style>
</head>
<body>
    <canvas id="kaleidoscope"></canvas>
    
    <div class="info">
        <h3>🔷 几何万花筒</h3>
        <p><span class="key">移动鼠标</span> - 控制图案变形</p>
        <p><span class="key">点击</span> - 产生图案爆发</p>
        <p><span class="key">滚轮</span> - 调整对称轴数</p>
        <p><span class="key">空格</span> - 切换颜色模式</p>
    </div>
    
    <div class="stats" id="stats">
        FPS: 60 | 对称轴: 8
    </div>

    <script>
        const canvas = document.getElementById('kaleidoscope');
        const ctx = canvas.getContext('2d');
        const statsEl = document.getElementById('stats');
        
        let width, height, centerX, centerY;
        let mouseX = 0, mouseY = 0;
        let segments = 8;
        let colorMode = 0;
        let time = 0;
        
        // 颜色模式
        const colorModes = [
            { name: '彩虹', base: 0, saturation: 100, lightness: 50 },
            { name: '霓虹', base: 180, saturation: 100, lightness: 60 },
            { name: '暖色', base: 30, saturation: 90, lightness: 55 },
            { name: '冷色', base: 210, saturation: 80, lightness: 50 },
            { name: '单色', base: 280, saturation: 70, lightness: 60 }
        ];
        
        // 几何形状类
        class Shape {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.type = Math.floor(Math.random() * 4); // 0: 圆, 1: 三角, 2: 方形, 3: 多边形
                this.radius = 20 + Math.random() * 60;
                this.distance = 50 + Math.random() * 150;
                this.angle = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
                this.orbitSpeed = (Math.random() - 0.5) * 0.01;
                this.colorOffset = Math.random() * 60;
                this.alpha = 0.3 + Math.random() * 0.5;
                this.sides = 3 + Math.floor(Math.random() * 5);
                this.pulsePhase = Math.random() * Math.PI * 2;
                this.pulseSpeed = 0.02 + Math.random() * 0.03;
            }
            
            update(mouseInfluence) {
                this.angle += this.orbitSpeed + mouseInfluence * 0.002;
                this.pulsePhase += this.pulseSpeed;
                this.currentRadius = this.radius * (0.8 + Math.sin(this.pulsePhase) * 0.2);
            }
            
            draw(ctx, centerX, centerY, colorMode, segmentAngle, index) {
                const mode = colorModes[colorMode];
                const hue = (mode.base + this.colorOffset + index * 10) % 360;
                const color = `hsla(${hue}, ${mode.saturation}%, ${mode.lightness}%, ${this.alpha})`;
                
                const x = centerX + Math.cos(this.angle) * this.distance;
                const y = centerY + Math.sin(this.angle) * this.distance;
                
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(this.angle * 2);
                
                ctx.fillStyle = color;
                ctx.strokeStyle = `hsla(${hue}, ${mode.saturation}%, ${mode.lightness + 20}%, ${this.alpha * 0.8})`;
                ctx.lineWidth = 2;
                
                switch (this.type) {
                    case 0: // 圆
                        ctx.beginPath();
                        ctx.arc(0, 0, this.currentRadius, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.stroke();
                        break;
                    case 1: // 三角形
                        this.drawPolygon(ctx, 3, this.currentRadius);
                        break;
                    case 2: // 方形
                        ctx.fillRect(-this.currentRadius / 2, -this.currentRadius / 2, 
                                     this.currentRadius, this.currentRadius);
                        ctx.strokeRect(-this.currentRadius / 2, -this.currentRadius / 2, 
                                       this.currentRadius, this.currentRadius);
                        break;
                    case 3: // 多边形
                        this.drawPolygon(ctx, this.sides, this.currentRadius);
                        break;
                }
                
                ctx.restore();
            }
            
            drawPolygon(ctx, sides, radius) {
                ctx.beginPath();
                for (let i = 0; i < sides; i++) {
                    const angle = (i / sides) * Math.PI * 2 - Math.PI / 2;
                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius;
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            }
        }
        
        // 粒子爆发类
        class BurstParticle {
            constructor(x, y, angle) {
                this.x = x;
                this.y = y;
                const speed = 2 + Math.random() * 4;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1;
                this.decay = 0.015 + Math.random() * 0.015;
                this.size = 3 + Math.random() * 5;
                this.hue = Math.random() * 360;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.life -= this.decay;
                return this.life > 0;
            }
            
            draw(ctx) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 60%, ${this.life})`;
                ctx.fill();
            }
        }
        
        let shapes = [];
        let burstParticles = [];
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        
        function init() {
            resize();
            createShapes();
        }
        
        function resize() {
            const dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            
            ctx.scale(dpr, dpr);
            
            centerX = width / 2;
            centerY = height / 2;
        }
        
        function createShapes() {
            shapes = [];
            const count = 15 + Math.floor(segments / 2);
            for (let i = 0; i < count; i++) {
                shapes.push(new Shape());
            }
        }
        
        function createBurst(x, y) {
            const count = 50;
            for (let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2;
                burstParticles.push(new BurstParticle(x, y, angle));
            }
        }
        
        function drawKaleidoscope() {
            const segmentAngle = (Math.PI * 2) / segments;
            const mouseInfluence = ((mouseX - centerX) / width + (mouseY - centerY) / height);
            
            // 对每个对称段进行绘制
            for (let seg = 0; seg < segments; seg++) {
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(seg * segmentAngle);
                
                // 镜像效果（奇数段）
                if (seg % 2 === 1) {
                    ctx.scale(-1, 1);
                }
                
                // 绘制所有形状
                shapes.forEach((shape, index) => {
                    shape.update(mouseInfluence);
                    shape.draw(ctx, 0, 0, colorMode, segmentAngle, index);
                });
                
                ctx.restore();
            }
            
            // 中心装饰
            const mode = colorModes[colorMode];
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 50);
            gradient.addColorStop(0, `hsla(${mode.base}, ${mode.saturation}%, ${mode.lightness}%, 0.8)`);
            gradient.addColorStop(0.5, `hsla(${mode.base + 30}, ${mode.saturation}%, ${mode.lightness}%, 0.4)`);
            gradient.addColorStop(1, 'transparent');
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, 50 + Math.sin(time * 0.02) * 10, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
        }
        
        function drawConnectingLines() {
            const mode = colorModes[colorMode];
            ctx.strokeStyle = `hsla(${mode.base}, ${mode.saturation}%, ${mode.lightness}%, 0.2)`;
            ctx.lineWidth = 1;
            
            for (let i = 0; i < segments; i++) {
                const angle = (i / segments) * Math.PI * 2;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(
                    centerX + Math.cos(angle) * Math.max(width, height),
                    centerY + Math.sin(angle) * Math.max(width, height)
                );
                ctx.stroke();
            }
        }
        
        function animate(currentTime) {
            // FPS
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
            }
            
            time++;
            
            // 清除（带残影）
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制连接线
            drawConnectingLines();
            
            // 绘制万花筒
            drawKaleidoscope();
            
            // 更新和绘制爆发粒子
            burstParticles = burstParticles.filter(p => {
                const alive = p.update();
                if (alive) p.draw(ctx);
                return alive;
            });
            
            // 限制粒子数量
            if (burstParticles.length > 500) {
                burstParticles = burstParticles.slice(-500);
            }
            
            // 更新统计
            statsEl.textContent = `FPS: ${fps} | 对称轴: ${segments} | ${colorModes[colorMode].name}`;
            
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('click', (e) => {
            createBurst(e.clientX, e.clientY);
            
            // 随机改变一些形状
            shapes.forEach(shape => {
                if (Math.random() < 0.3) {
                    shape.reset();
                }
            });
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            segments = Math.max(3, Math.min(16, segments - Math.sign(e.deltaY)));
            createShapes();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                colorMode = (colorMode + 1) % colorModes.length;
            }
        });
        
        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            createBurst(touch.clientX, touch.clientY);
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        });
        
        // 启动
        init();
        animate(performance.now());
    </script>
</body>
</html>
