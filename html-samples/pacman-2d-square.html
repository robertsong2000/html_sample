<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Pac-Man Loading Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .game-container {
            text-align: center;
            color: white;
        }

        .loading-text {
            font-size: 32px;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .progress-container {
            width: 400px;
            height: 12px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            overflow: hidden;
            margin: 0 auto 20px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ffff00, #ffa500);
            border-radius: 6px;
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 18px;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .game-board {
            width: 400px;
            height: 400px;
            background: rgba(0, 0, 0, 0.8);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            position: relative;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(20, 1fr);
            grid-template-rows: repeat(20, 1fr);
            gap: 1px;
            padding: 10px;
            box-sizing: border-box;
        }

        .cell {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s ease;
        }

        .cell:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .dot {
            width: 4px;
            height: 4px;
            background: #ffff00;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        .pacman {
            position: absolute;
            width: 18px;
            height: 18px;
            background: #ffff00;
            border-radius: 50%;
            z-index: 100;
            transition: all 0.2s ease;
        }

        .pacman::before {
            content: '';
            position: absolute;
            width: 0;
            height: 0;
            border-left: 9px solid rgba(0, 0, 0, 0.8);
            border-top: 9px solid transparent;
            border-bottom: 9px solid transparent;
            border-radius: 9px;
            top: 0;
            right: 0;
            animation: chomp 0.3s linear infinite;
        }

        .pacman.up::before {
            border-left: 9px solid transparent;
            border-right: 9px solid transparent;
            border-top: 9px solid rgba(0, 0, 0, 0.8);
            border-bottom: none;
            top: -9px;
            right: 0;
        }

        .pacman.down::before {
            border-left: 9px solid transparent;
            border-right: 9px solid transparent;
            border-top: none;
            border-bottom: 9px solid rgba(0, 0, 0, 0.8);
            top: 18px;
            right: 0;
        }

        .pacman.left::before {
            border-left: none;
            border-right: 9px solid rgba(0, 0, 0, 0.8);
            border-top: 9px solid transparent;
            border-bottom: 9px solid transparent;
            top: 0;
            right: 18px;
        }

        .eaten {
            background: rgba(255, 255, 255, 0.05) !important;
            transform: scale(0.8);
        }

        .eaten .dot {
            display: none;
        }

        @keyframes chomp {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(45deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .controls {
            margin-top: 30px;
            color: white;
        }

        .controls-text {
            font-size: 16px;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .control-buttons {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 150px;
            margin: 0 auto;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
            font-weight: bold;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .control-btn:active {
            transform: scale(0.95);
        }

        .complete-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            z-index: 2000;
        }

        .complete-screen.show {
            display: flex;
        }

        .complete-content {
            animation: fadeIn 0.5s ease-in;
        }

        .complete-content h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #ffff00;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .complete-content p {
            font-size: 24px;
            margin-bottom: 30px;
            opacity: 0.9;
        }

        .restart-btn {
            background: linear-gradient(45deg, #ffff00, #ffa500);
            color: #333;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(255, 255, 0, 0.3);
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 255, 0, 0.4);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auto-mode {
            margin-top: 20px;
        }

        .auto-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 14px;
            margin: 0 5px;
            transition: all 0.2s;
        }

        .auto-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .auto-btn.active {
            background: rgba(255, 255, 0, 0.3);
            border-color: #ffff00;
        }

        .stats {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-size: 14px;
            text-align: left;
            min-width: 150px;
        }

        .stats div {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="loading-text">🎮 吃豆人加载中...</div>
        
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div class="progress-text" id="progressText">0% (0/400)</div>
        
        <div class="game-board" id="gameBoard"></div>
        
        <div class="controls">
            <div class="controls-text">使用方向键或按钮控制吃豆人</div>
            <div class="control-buttons">
                <div></div>
                <button class="control-btn" onclick="movePacman('up')">↑</button>
                <div></div>
                <button class="control-btn" onclick="movePacman('left')">←</button>
                <button class="control-btn" onclick="movePacman('down')">↓</button>
                <button class="control-btn" onclick="movePacman('right')">→</button>
            </div>
            
            <div class="auto-mode">
                <button class="auto-btn" id="autoBtn" onclick="toggleAutoMode()">自动模式: 关</button>
                <button class="auto-btn" onclick="restartGame()">重新开始</button>
            </div>
        </div>
    </div>

    <div class="stats">
        <div><strong>游戏统计</strong></div>
        <div>剩余豆子: <span id="remainingDots">400</span></div>
        <div>已吃豆子: <span id="eatenDots">0</span></div>
        <div>当前位置: <span id="currentPos">(0, 0)</span></div>
        <div>移动次数: <span id="moveCount">0</span></div>
    </div>

    <div class="complete-screen" id="completeScreen">
        <div class="complete-content">
            <h1>🎉 加载完成！</h1>
            <p>吃豆人已经吃完了所有豆子！</p>
            <p>总共移动了 <span id="finalMoves">0</span> 步</p>
            <button class="restart-btn" onclick="restartGame()">再玩一次</button>
        </div>
    </div>

    <script>
        class PacManGame {
            constructor() {
                this.board = document.getElementById('gameBoard');
                this.pacman = document.createElement('div');
                this.pacman.className = 'pacman';
                this.progressBar = document.getElementById('progressBar');
                this.progressText = document.getElementById('progressText');
                this.completeScreen = document.getElementById('completeScreen');
                this.autoBtn = document.getElementById('autoBtn');
                
                this.gridSize = 20;
                this.totalCells = this.gridSize * this.gridSize;
                this.currentX = 0;
                this.currentY = 0;
                this.totalDots = this.totalCells;
                this.eatenDots = 0;
                this.moveCount = 0;
                this.isGameComplete = false;
                this.isAutoMode = false;
                this.autoInterval = null;
                
                this.init();
            }

            init() {
                this.createBoard();
                this.positionPacman();
                this.setupKeyboardControls();
                this.updateStats();
            }

            createBoard() {
                for (let i = 0; i < this.totalCells; i++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.index = i;
                    
                    const dot = document.createElement('div');
                    dot.className = 'dot';
                    cell.appendChild(dot);
                    
                    this.board.appendChild(cell);
                }
                
                this.board.appendChild(this.pacman);
            }

            positionPacman() {
                const cellSize = this.board.offsetWidth / this.gridSize;
                const x = this.currentX * cellSize + (cellSize / 2) - 9;
                const y = this.currentY * cellSize + (cellSize / 2) - 9;
                
                this.pacman.style.left = x + 'px';
                this.pacman.style.top = y + 'px';
                
                document.getElementById('currentPos').textContent = `(${this.currentX}, ${this.currentY})`;
            }

            updatePacmanDirection(direction) {
                this.pacman.className = `pacman ${direction}`;
            }

            movePacman(direction) {
                if (this.isGameComplete) return;
                
                let newX = this.currentX;
                let newY = this.currentY;
                
                switch (direction) {
                    case 'up':
                        newY = Math.max(0, this.currentY - 1);
                        break;
                    case 'down':
                        newY = Math.min(this.gridSize - 1, this.currentY + 1);
                        break;
                    case 'left':
                        newX = Math.max(0, this.currentX - 1);
                        break;
                    case 'right':
                        newX = Math.min(this.gridSize - 1, this.currentX + 1);
                        break;
                }
                
                // 只有在真正移动时才更新
                if (newX !== this.currentX || newY !== this.currentY) {
                    this.currentX = newX;
                    this.currentY = newY;
                    this.moveCount++;
                    
                    this.updatePacmanDirection(direction);
                    this.positionPacman();
                    this.eatDot();
                    this.updateStats();
                }
            }

            eatDot() {
                const cellIndex = this.currentY * this.gridSize + this.currentX;
                const cell = this.board.children[cellIndex];
                
                if (!cell.classList.contains('eaten')) {
                    cell.classList.add('eaten');
                    this.eatenDots++;
                    this.updateProgress();
                    
                    if (this.eatenDots >= this.totalDots) {
                        this.completeGame();
                    }
                }
            }

            updateProgress() {
                const progress = (this.eatenDots / this.totalDots) * 100;
                this.progressBar.style.width = progress + '%';
                this.progressText.textContent = `${Math.round(progress)}% (${this.eatenDots}/${this.totalDots})`;
            }

            updateStats() {
                document.getElementById('remainingDots').textContent = this.totalDots - this.eatenDots;
                document.getElementById('eatenDots').textContent = this.eatenDots;
                document.getElementById('moveCount').textContent = this.moveCount;
            }

            completeGame() {
                this.isGameComplete = true;
                this.stopAutoMode();
                
                document.getElementById('finalMoves').textContent = this.moveCount;
                
                setTimeout(() => {
                    this.completeScreen.classList.add('show');
                }, 500);
            }

            setupKeyboardControls() {
                document.addEventListener('keydown', (e) => {
                    switch (e.key) {
                        case 'ArrowUp':
                        case 'w':
                        case 'W':
                            e.preventDefault();
                            this.movePacman('up');
                            break;
                        case 'ArrowDown':
                        case 's':
                        case 'S':
                            e.preventDefault();
                            this.movePacman('down');
                            break;
                        case 'ArrowLeft':
                        case 'a':
                        case 'A':
                            e.preventDefault();
                            this.movePacman('left');
                            break;
                        case 'ArrowRight':
                        case 'd':
                        case 'D':
                            e.preventDefault();
                            this.movePacman('right');
                            break;
                    }
                });
            }

            toggleAutoMode() {
                this.isAutoMode = !this.isAutoMode;
                
                if (this.isAutoMode) {
                    this.startAutoMode();
                    this.autoBtn.textContent = '自动模式: 开';
                    this.autoBtn.classList.add('active');
                } else {
                    this.stopAutoMode();
                    this.autoBtn.textContent = '自动模式: 关';
                    this.autoBtn.classList.remove('active');
                }
            }

            startAutoMode() {
                this.autoInterval = setInterval(() => {
                    if (this.isGameComplete) {
                        this.stopAutoMode();
                        return;
                    }
                    
                    // 简单的AI：寻找最近的豆子
                    const directions = ['up', 'down', 'left', 'right'];
                    const bestDirection = this.findBestDirection();
                    
                    if (bestDirection) {
                        this.movePacman(bestDirection);
                    } else {
                        // 随机移动
                        const randomDirection = directions[Math.floor(Math.random() * directions.length)];
                        this.movePacman(randomDirection);
                    }
                }, 200);
            }

            findBestDirection() {
                const directions = [
                    { name: 'up', dx: 0, dy: -1 },
                    { name: 'down', dx: 0, dy: 1 },
                    { name: 'left', dx: -1, dy: 0 },
                    { name: 'right', dx: 1, dy: 0 }
                ];
                
                let bestDirection = null;
                let minDistance = Infinity;
                
                directions.forEach(dir => {
                    const newX = this.currentX + dir.dx;
                    const newY = this.currentY + dir.dy;
                    
                    if (newX >= 0 && newX < this.gridSize && newY >= 0 && newY < this.gridSize) {
                        const cellIndex = newY * this.gridSize + newX;
                        const cell = this.board.children[cellIndex];
                        
                        if (!cell.classList.contains('eaten')) {
                            const distance = Math.abs(newX - this.currentX) + Math.abs(newY - this.currentY);
                            if (distance < minDistance) {
                                minDistance = distance;
                                bestDirection = dir.name;
                            }
                        }
                    }
                });
                
                return bestDirection;
            }

            stopAutoMode() {
                if (this.autoInterval) {
                    clearInterval(this.autoInterval);
                    this.autoInterval = null;
                }
            }

            restart() {
                this.currentX = 0;
                this.currentY = 0;
                this.eatenDots = 0;
                this.moveCount = 0;
                this.isGameComplete = false;
                
                // 重置所有格子
                Array.from(this.board.children).forEach(cell => {
                    if (cell.classList.contains('cell')) {
                        cell.classList.remove('eaten');
                    }
                });
                
                this.updateProgress();
                this.updateStats();
                this.positionPacman();
                this.completeScreen.classList.remove('show');
                
                this.stopAutoMode();
                this.isAutoMode = false;
                this.autoBtn.textContent = '自动模式: 关';
                this.autoBtn.classList.remove('active');
            }
        }

        // 初始化游戏
        const game = new PacManGame();

        // 全局函数
        function movePacman(direction) {
            game.movePacman(direction);
        }

        function toggleAutoMode() {
            game.toggleAutoMode();
        }

        function restartGame() {
            game.restart();
        }

        // 窗口大小改变时重新定位吃豆人
        window.addEventListener('resize', () => {
            game.positionPacman();
        });
    </script>
</body>
</html>
