<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粒子动画 | Particle Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #0a0a0f;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            cursor: none;
        }
        
        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            transform: translate(-50%, -50%);
            transition: transform 0.1s ease;
            box-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
        }
        
        .cursor.active {
            transform: translate(-50%, -50%) scale(2);
            border-color: #ff6b6b;
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 12px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 30px rgba(100, 200, 255, 0.6);
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
            text-align: center;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(150, 200, 255, 0.6);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
            text-align: right;
            line-height: 1.8;
        }
        
        @media (max-width: 768px) {
            .title {
                font-size: 24px;
                letter-spacing: 6px;
            }
            .info {
                font-size: 12px;
            }
            .cursor {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="title">粒子动画</div>
    <canvas id="particles"></canvas>
    <div class="cursor" id="cursor"></div>
    <div class="stats">
        <div>粒子数: <span id="count">0</span></div>
        <div>模式: <span id="mode">吸引</span></div>
        <div>FPS: <span id="fps">60</span></div>
    </div>
    <div class="info">移动鼠标吸引粒子 · 点击切换排斥模式 · 双击爆发粒子</div>
    
    <script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('cursor');
        const countEl = document.getElementById('count');
        const modeEl = document.getElementById('mode');
        const fpsEl = document.getElementById('fps');
        
        let width, height;
        let particles = [];
        let mouseX = 0, mouseY = 0;
        let isRepelMode = false;
        let time = 0;
        let lastTime = 0;
        let frameCount = 0;
        let fps = 60;
        
        const maxParticles = 500;
        
        // 粒子类
        class Particle {
            constructor(x, y) {
                this.x = x !== undefined ? x : Math.random() * width;
                this.y = y !== undefined ? y : Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.baseSize = Math.random() * 3 + 1;
                this.size = this.baseSize;
                this.hue = Math.random() * 60 + 180; // 青蓝色调
                this.saturation = 70 + Math.random() * 30;
                this.lightness = 50 + Math.random() * 20;
                this.alpha = 0.6 + Math.random() * 0.4;
                this.life = 1;
                this.isBurst = false;
            }
        
        setBurst() {
                this.isBurst = true;
                this.life = 1;
                const angle = Math.random() * Math.PI * 2;
                const speed = 5 + Math.random() * 10;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
            }
            
            update() {
                // 鼠标交互
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.hypot(dx, dy);
                const maxDist = 200;
                
                if (dist < maxDist && dist > 0) {
                    const force = (1 - dist / maxDist) * 0.5;
                    const direction = isRepelMode ? -1 : 1;
                    
                    this.vx += (dx / dist) * force * direction;
                    this.vy += (dy / dist) * force * direction;
                    
                    // 靠近鼠标时变大
                    this.size = this.baseSize * (1 + (1 - dist / maxDist) * 2);
                } else {
                    this.size += (this.baseSize - this.size) * 0.1;
                }
                
                // 速度衰减
                this.vx *= 0.98;
                this.vy *= 0.98;
                
                // 随机漂移
                this.vx += (Math.random() - 0.5) * 0.1;
                this.vy += (Math.random() - 0.5) * 0.1;
                
                // 更新位置
                this.x += this.vx;
                this.y += this.vy;
                
                // 边界反弹
                if (this.x < 0) { this.x = 0; this.vx *= -0.8; }
                if (this.x > width) { this.x = width; this.vx *= -0.8; }
                if (this.y < 0) { this.y = 0; this.vy *= -0.8; }
                if (this.y > height) { this.y = height; this.vy *= -0.8; }
                
                // 爆发粒子衰减
                if (this.isBurst) {
                    this.life -= 0.02;
                }
                
                // 颜色随时间变化
                this.hue += 0.1;
                if (this.hue > 300) this.hue = 180;
            }
            
            draw() {
                if (this.life <= 0) return;
                
                const alpha = this.alpha * this.life;
                
                // 发光效果
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                const glowGradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 3
                );
                glowGradient.addColorStop(0, `hsla(${this.hue}, ${this.saturation}%, ${this.lightness}%, ${alpha * 0.3})`);
                glowGradient.addColorStop(1, 'transparent');
                ctx.fillStyle = glowGradient;
                ctx.fill();
                
                // 粒子本体
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, ${this.saturation}%, ${this.lightness}%, ${alpha})`;
                ctx.fill();
            }
            
            isDead() {
                return this.isBurst && this.life <= 0;
            }
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        function initParticles() {
            particles = [];
            for (let i = 0; i < maxParticles; i++) {
                particles.push(new Particle());
            }
            countEl.textContent = particles.length;
        }
        
        function burstParticles(x, y, count = 50) {
            for (let i = 0; i < count; i++) {
                const p = new Particle(x, y);
                p.setBurst();
                particles.push(p);
            }
        }
        
        function drawConnections() {
            const connectionDist = 100;
            
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.hypot(dx, dy);
                    
                    if (dist < connectionDist) {
                        const alpha = (1 - dist / connectionDist) * 0.2;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(100, 200, 255, ${alpha})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
        }
        
        function drawMouseGlow() {
            const gradient = ctx.createRadialGradient(
                mouseX, mouseY, 0,
                mouseX, mouseY, 150
            );
            
            const color = isRepelMode ? '255, 100, 100' : '100, 200, 255';
            gradient.addColorStop(0, `rgba(${color}, 0.2)`);
            gradient.addColorStop(1, 'transparent');
            
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, 150, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
        }
        
        function animate(timestamp) {
            // FPS计算
            frameCount++;
            if (timestamp - lastTime >= 1000) {
                fps = frameCount;
                fpsEl.textContent = fps;
                frameCount = 0;
                lastTime = timestamp;
            }
            
            // 清除画布（带拖尾效果）
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制鼠标光晕
            drawMouseGlow();
            
            // 绘制连接线
            drawConnections();
            
            // 更新和绘制粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                
                if (particles[i].isDead()) {
                    particles.splice(i, 1);
                }
            }
            
            // 保持粒子数量
            while (particles.length < maxParticles) {
                particles.push(new Particle());
            }
            
            countEl.textContent = particles.length;
            
            time++;
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        function handleMouseMove(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            cursor.style.left = mouseX + 'px';
            cursor.style.top = mouseY + 'px';
        }
        
        function handleTouchMove(e) {
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        }
        
        function handleClick(e) {
            isRepelMode = !isRepelMode;
            modeEl.textContent = isRepelMode ? '排斥' : '吸引';
            cursor.classList.toggle('active', isRepelMode);
        }
        
        function handleDblClick(e) {
            burstParticles(e.clientX, e.clientY, 80);
        }
        
        function handleTouchStart(e) {
            if (e.touches.length > 0) {
                burstParticles(e.touches[0].clientX, e.touches[0].clientY, 50);
            }
        }
        
        // 初始化
        function init() {
            resize();
            initParticles();
            
            window.addEventListener('resize', resize);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('touchmove', handleTouchMove, { passive: true });
            canvas.addEventListener('click', handleClick);
            canvas.addEventListener('dblclick', handleDblClick);
            canvas.addEventListener('touchstart', handleTouchStart, { passive: true });
            
            // 检测 prefers-reduced-motion
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
            if (!prefersReducedMotion.matches) {
                animate(0);
            } else {
                // 静态渲染
                ctx.fillStyle = '#0a0a0f';
                ctx.fillRect(0, 0, width, height);
                particles.forEach(p => p.draw());
            }
        }
        
        init();
    </script>
</body>
</html>
