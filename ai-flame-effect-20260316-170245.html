<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flame Effect - 火焰效果</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255, 100, 50, 0.8);
            pointer-events: none;
        }

        .info span {
            display: block;
            margin: 5px 0;
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                bottom: 10px;
                left: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="flame"></canvas>
    <div class="info">
        <span>🖱️ 移动鼠标 - 控制火焰位置和强度</span>
        <span>👆 点击 - 火焰爆发</span>
    </div>

    <script>
        const canvas = document.getElementById('flame');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Mouse tracking
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height * 0.7;
        let mouseIntensity = 1;

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });

        // Click for flame burst
        let bursts = [];

        canvas.addEventListener('click', (e) => {
            createFlameBurst(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            createFlameBurst(e.touches[0].clientX, e.touches[0].clientY);
        });

        function createFlameBurst(x, y) {
            for (let i = 0; i < 50; i++) {
                const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 0.8;
                const speed = 3 + Math.random() * 8;
                bursts.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: 5 + Math.random() * 15,
                    life: 1,
                    decay: 0.01 + Math.random() * 0.02,
                    hue: Math.random() * 60
                });
            }
        }

        // Fire particle class
        class FireParticle {
            constructor(x, y, baseHue) {
                this.x = x;
                this.y = y;
                this.baseHue = baseHue;
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = -2 - Math.random() * 4;
                this.size = 3 + Math.random() * 20;
                this.life = 1;
                this.decay = 0.005 + Math.random() * 0.015;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0.1 + Math.random() * 0.1;
            }

            update(intensity) {
                this.wobble += this.wobbleSpeed;
                this.x += this.vx + Math.sin(this.wobble) * 2;
                this.y += this.vy * intensity;
                this.vy *= 0.99;
                this.life -= this.decay;
                this.size *= 0.99;
            }

            draw() {
                if (this.life <= 0) return;

                // Color transitions from yellow to orange to red to dark red
                const hue = this.baseHue + (1 - this.life) * 30;
                const lightness = 50 + this.life * 30;
                const alpha = this.life * 0.8;

                // Main particle
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size
                );
                gradient.addColorStop(0, `hsla(${hue}, 100%, ${lightness}%, ${alpha})`);
                gradient.addColorStop(0.4, `hsla(${hue - 10}, 100%, ${lightness - 20}%, ${alpha * 0.5})`);
                gradient.addColorStop(1, 'transparent');

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // Glow effect
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hue + 10}, 100%, 80%, ${alpha * 0.3})`;
                ctx.fill();
                ctx.restore();
            }

            isDead() {
                return this.life <= 0;
            }
        }

        // Ember particle (floating sparks)
        class Ember {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = -1 - Math.random() * 3;
                this.size = 1 + Math.random() * 3;
                this.life = 1;
                this.decay = 0.005 + Math.random() * 0.01;
                this.twinkle = Math.random() * Math.PI * 2;
            }

            update() {
                this.x += this.vx + (Math.random() - 0.5) * 0.5;
                this.y += this.vy;
                this.vy *= 0.99;
                this.life -= this.decay;
                this.twinkle += 0.2;
            }

            draw() {
                if (this.life <= 0) return;

                const alpha = this.life * (0.5 + Math.sin(this.twinkle) * 0.3);
                
                ctx.save();
                ctx.shadowBlur = 10;
                ctx.shadowColor = `rgba(255, 150, 50, ${alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 200, 100, ${alpha})`;
                ctx.fill();
                ctx.restore();
            }

            isDead() {
                return this.life <= 0;
            }
        }

        // Smoke particle
        class Smoke {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 1;
                this.vy = -0.5 - Math.random() * 1;
                this.size = 10 + Math.random() * 30;
                this.life = 1;
                this.decay = 0.003 + Math.random() * 0.005;
                this.wobble = Math.random() * Math.PI * 2;
            }

            update() {
                this.wobble += 0.02;
                this.x += this.vx + Math.sin(this.wobble) * 0.5;
                this.y += this.vy;
                this.size *= 1.01;
                this.life -= this.decay;
            }

            draw() {
                if (this.life <= 0) return;

                const alpha = this.life * 0.15;
                
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size
                );
                gradient.addColorStop(0, `rgba(80, 80, 80, ${alpha})`);
                gradient.addColorStop(1, 'transparent');

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }

            isDead() {
                return this.life <= 0;
            }
        }

        // Particle arrays
        let fireParticles = [];
        let embers = [];
        let smoke = [];

        // Flame sources
        const flameSources = [];
        const sourceCount = 5;
        for (let i = 0; i < sourceCount; i++) {
            flameSources.push({
                x: canvas.width / 2 + (i - sourceCount / 2) * 40,
                y: canvas.height * 0.85,
                intensity: 0.7 + Math.random() * 0.3,
                hue: 20 + Math.random() * 20
            });
        }

        // Background gradient
        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0a0505');
            gradient.addColorStop(0.5, '#150808');
            gradient.addColorStop(1, '#1a0a0a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Draw logs/ground
        function drawLogs() {
            const groundY = canvas.height * 0.9;
            
            // Ground glow
            const glowGradient = ctx.createRadialGradient(
                mouseX, groundY, 0,
                mouseX, groundY, 300
            );
            glowGradient.addColorStop(0, 'rgba(255, 100, 50, 0.3)');
            glowGradient.addColorStop(0.5, 'rgba(255, 50, 20, 0.1)');
            glowGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = glowGradient;
            ctx.fillRect(0, groundY - 200, canvas.width, 200);

            // Logs
            ctx.save();
            ctx.shadowBlur = 30;
            ctx.shadowColor = 'rgba(255, 100, 50, 0.5)';
            
            for (let i = 0; i < 3; i++) {
                const logX = canvas.width / 2 + (i - 1) * 60;
                const logY = groundY - 10;
                const logWidth = 80;
                const logHeight = 20;
                
                const logGradient = ctx.createLinearGradient(logX - logWidth/2, logY, logX + logWidth/2, logY);
                logGradient.addColorStop(0, '#2a1a0a');
                logGradient.addColorStop(0.5, '#3a2515');
                logGradient.addColorStop(1, '#2a1a0a');
                
                ctx.fillStyle = logGradient;
                ctx.beginPath();
                ctx.ellipse(logX, logY, logWidth/2, logHeight/2, (i - 1) * 0.2, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        // Update flame sources based on mouse
        function updateFlameSources() {
            flameSources.forEach((source, i) => {
                source.x = mouseX + (i - sourceCount / 2) * 40;
                source.y = mouseY;
                source.intensity = 0.7 + Math.sin(Date.now() * 0.01 + i) * 0.3;
            });
        }

        // Spawn particles
        function spawnParticles() {
            flameSources.forEach(source => {
                // Fire particles
                if (Math.random() < 0.4 * source.intensity) {
                    fireParticles.push(new FireParticle(
                        source.x + (Math.random() - 0.5) * 30,
                        source.y,
                        source.hue
                    ));
                }

                // Embers
                if (Math.random() < 0.1 * source.intensity) {
                    embers.push(new Ember(
                        source.x + (Math.random() - 0.5) * 20,
                        source.y
                    ));
                }

                // Smoke
                if (Math.random() < 0.15) {
                    smoke.push(new Smoke(
                        source.x + (Math.random() - 0.5) * 40,
                        source.y - 50
                    ));
                }
            });
        }

        // Update burst particles
        function updateBursts() {
            bursts = bursts.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1; // gravity
                p.life -= p.decay;

                if (p.life > 0) {
                    const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
                    gradient.addColorStop(0, `hsla(${p.hue}, 100%, 70%, ${p.life})`);
                    gradient.addColorStop(1, 'transparent');
                    
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                }

                return p.life > 0;
            });
        }

        // Animation loop
        function animate() {
            drawBackground();

            // Update flame sources
            updateFlameSources();

            // Spawn new particles
            spawnParticles();

            // Update and draw smoke (behind fire)
            smoke = smoke.filter(s => {
                s.update();
                s.draw();
                return !s.isDead();
            });

            // Draw logs
            drawLogs();

            // Update and draw fire particles
            fireParticles = fireParticles.filter(p => {
                p.update(mouseIntensity);
                p.draw();
                return !p.isDead();
            });

            // Update and draw embers
            embers = embers.filter(e => {
                e.update();
                e.draw();
                return !e.isDead();
            });

            // Update bursts
            updateBursts();

            // Heat distortion effect (subtle)
            ctx.save();
            ctx.globalCompositeOperation = 'overlay';
            const heatGradient = ctx.createRadialGradient(
                mouseX, mouseY - 50, 0,
                mouseX, mouseY - 50, 150
            );
            heatGradient.addColorStop(0, 'rgba(255, 100, 50, 0.1)');
            heatGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = heatGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
