<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极光效果 - Aurora Borealis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a3a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 20px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            max-width: 300px;
        }
        
        .info h3 {
            margin-bottom: 8px;
            font-size: 16px;
            color: #a8e6cf;
        }
        
        .info p {
            margin: 4px 0;
            font-size: 12px;
            line-height: 1.5;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 15px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <canvas id="aurora"></canvas>
    
    <div class="info">
        <h3>🌌 极光效果</h3>
        <p><strong>鼠标移动:</strong> 改变极光方向</p>
        <p><strong>点击屏幕:</strong> 触发极光爆发</p>
        <p><strong>滚轮滚动:</strong> 调整极光强度</p>
    </div>
    
    <div class="stats" id="stats">
        FPS: 60 | 粒子: 0
    </div>

    <script>
        // 性能优化：使用 requestAnimationFrame 和缓存计算
        const canvas = document.getElementById('aurora');
        const ctx = canvas.getContext('2d');
        const statsEl = document.getElementById('stats');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        let targetMouseX = 0, targetMouseY = 0;
        let intensity = 1;
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        
        // 极光参数
        const auroraConfig = {
            waveCount: 5,
            baseSpeed: 0.0003,
            colorPalette: [
                { r: 72, g: 219, b: 155 },   // 青绿色
                { r: 100, g: 200, b: 255 },  // 天蓝色
                { r: 138, g: 100, b: 255 },  // 紫色
                { r: 255, g: 100, b: 200 },  // 粉色
                { r: 100, g: 255, b: 200 }   // 薄荷绿
            ]
        };
        
        // 波浪类
        class AuroraWave {
            constructor(index) {
                this.index = index;
                this.reset();
            }
            
            reset() {
                this.y = height * (0.2 + Math.random() * 0.3);
                this.amplitude = 30 + Math.random() * 50;
                this.frequency = 0.002 + Math.random() * 0.003;
                this.speed = auroraConfig.baseSpeed * (0.5 + Math.random());
                this.phase = Math.random() * Math.PI * 2;
                this.color = auroraConfig.colorPalette[
                    Math.floor(Math.random() * auroraConfig.colorPalette.length)
                ];
                this.alpha = 0.1 + Math.random() * 0.2;
                this.thickness = 100 + Math.random() * 150;
            }
            
            update(time, mouseInfluence) {
                this.phase += this.speed * intensity;
                
                // 鼠标影响
                const mouseEffect = (mouseInfluence.x - 0.5) * 50;
                this.currentAmplitude = this.amplitude + mouseEffect;
            }
            
            draw(ctx) {
                ctx.save();
                
                // 创建渐变
                const gradient = ctx.createLinearGradient(0, this.y - this.thickness, 0, this.y + this.thickness);
                const { r, g, b } = this.color;
                gradient.addColorStop(0, `rgba(${r}, ${g}, ${b}, 0)`);
                gradient.addColorStop(0.5, `rgba(${r}, ${g}, ${b}, ${this.alpha * intensity})`);
                gradient.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.moveTo(0, height);
                
                // 绘制波浪路径（性能优化：减少点数）
                const step = 5;
                for (let x = 0; x <= width; x += step) {
                    const y = this.y + 
                        Math.sin(x * this.frequency + this.phase) * this.currentAmplitude +
                        Math.sin(x * this.frequency * 2 + this.phase * 1.5) * (this.currentAmplitude * 0.5);
                    
                    if (x === 0) {
                        ctx.lineTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                
                ctx.lineTo(width, height);
                ctx.closePath();
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        // 粒子类（星星）
        class Star {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height * 0.7;
                this.size = Math.random() * 2;
                this.alpha = Math.random() * 0.8 + 0.2;
                this.twinkleSpeed = 0.02 + Math.random() * 0.03;
                this.twinklePhase = Math.random() * Math.PI * 2;
            }
            
            update() {
                this.twinklePhase += this.twinkleSpeed;
                this.currentAlpha = this.alpha * (0.5 + Math.sin(this.twinklePhase) * 0.5);
            }
            
            draw(ctx) {
                ctx.save();
                ctx.fillStyle = `rgba(255, 255, 255, ${this.currentAlpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        // 爆发粒子类
        class BurstParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8 - 2;
                this.life = 1;
                this.decay = 0.015 + Math.random() * 0.01;
                this.size = 2 + Math.random() * 4;
                this.color = auroraConfig.colorPalette[
                    Math.floor(Math.random() * auroraConfig.colorPalette.length)
                ];
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.05; // 重力
                this.life -= this.decay;
            }
            
            draw(ctx) {
                if (this.life <= 0) return;
                
                ctx.save();
                const { r, g, b } = this.color;
                ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${this.life})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        // 初始化
        let waves = [];
        let stars = [];
        let burstParticles = [];
        
        function init() {
            resize();
            
            // 创建波浪
            waves = [];
            for (let i = 0; i < auroraConfig.waveCount; i++) {
                waves.push(new AuroraWave(i));
            }
            
            // 创建星星
            stars = [];
            const starCount = Math.min(150, Math.floor((width * height) / 10000));
            for (let i = 0; i < starCount; i++) {
                stars.push(new Star());
            }
            
            burstParticles = [];
        }
        
        function resize() {
            const dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            
            ctx.scale(dpr, dpr);
        }
        
        // 触发爆发效果
        function triggerBurst(x, y) {
            const particleCount = 50;
            for (let i = 0; i < particleCount; i++) {
                burstParticles.push(new BurstParticle(x, y));
            }
            
            // 临时增加强度
            intensity = Math.min(2, intensity + 0.3);
            setTimeout(() => {
                intensity = Math.max(0.5, intensity - 0.3);
            }, 500);
        }
        
        // 动画循环
        function animate(currentTime) {
            // FPS 计算
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
            }
            
            // 平滑鼠标跟随
            mouseX += (targetMouseX - mouseX) * 0.05;
            mouseY += (targetMouseY - mouseY) * 0.05;
            
            const mouseInfluence = {
                x: mouseX / width,
                y: mouseY / height
            };
            
            // 清除画布（带残影效果）
            ctx.fillStyle = 'rgba(10, 10, 26, 0.15)';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制星星
            stars.forEach(star => {
                star.update();
                star.draw(ctx);
            });
            
            // 绘制极光波浪
            waves.forEach(wave => {
                wave.update(currentTime, mouseInfluence);
                wave.draw(ctx);
            });
            
            // 更新和绘制爆发粒子
            burstParticles = burstParticles.filter(p => p.life > 0);
            burstParticles.forEach(particle => {
                particle.update();
                particle.draw(ctx);
            });
            
            // 更新统计
            statsEl.textContent = `FPS: ${fps} | 粒子: ${burstParticles.length}`;
            
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        window.addEventListener('resize', () => {
            resize();
            init();
        });
        
        canvas.addEventListener('mousemove', (e) => {
            targetMouseX = e.clientX;
            targetMouseY = e.clientY;
        });
        
        canvas.addEventListener('click', (e) => {
            triggerBurst(e.clientX, e.clientY);
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            intensity = Math.max(0.3, Math.min(2, intensity - e.deltaY * 0.001));
        });
        
        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            targetMouseX = touch.clientX;
            targetMouseY = touch.clientY;
            triggerBurst(touch.clientX, touch.clientY);
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            targetMouseX = touch.clientX;
            targetMouseY = touch.clientY;
        });
        
        // 启动
        init();
        animate(performance.now());
    </script>
</body>
</html>
