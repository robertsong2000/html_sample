<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>彩虹漩涡 | Rainbow Vortex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        canvas { display: block; position: fixed; top: 0; left: 0; }
        .info { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.7); font-size: 14px; text-align: center; pointer-events: none; z-index: 10; }
        .title { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.9); font-size: 28px; font-weight: 300; letter-spacing: 6px; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>
    <canvas id="vortex"></canvas>
    <div class="title">Rainbow Vortex</div>
    <div class="info">移动鼠标控制漩涡中心 | 点击改变旋转方向 | 滚轮调整速度</div>
    <script>
        const canvas = document.getElementById('vortex');
        const ctx = canvas.getContext('2d');
        let width, height, mouseX = 0, mouseY = 0, speed = 1, direction = 1, time = 0;
        let spirals = [];
        class Spiral {
            constructor(hue, radius, segments) {
                this.hue = hue;
                this.baseRadius = radius;
                this.segments = segments;
                this.phase = Math.random() * Math.PI * 2;
                this.rotSpeed = 0.01 + Math.random() * 0.02;
            }
            draw() {
                const cx = mouseX || width / 2;
                const cy = mouseY || height / 2;
                ctx.save();
                ctx.strokeStyle = `hsla(${(this.hue + time * 50) % 360}, 100%, 60%, 0.8)`;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 15;
                ctx.shadowColor = ctx.strokeStyle;
                ctx.beginPath();
                for (let i = 0; i < this.segments; i++) {
                    const angle = (i / this.segments) * Math.PI * 8 + this.phase + time * direction * speed;
                    const r = this.baseRadius + i * 2;
                    const wobble = Math.sin(angle * 3 + time * 2) * 20;
                    const x = cx + Math.cos(angle) * (r + wobble);
                    const y = cy + Math.sin(angle) * (r + wobble) * 0.8;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
                ctx.restore();
            }
            update() { this.phase += this.rotSpeed * direction; }
        }
        let particles = [];
        class VParticle {
            constructor() {
                this.angle = Math.random() * Math.PI * 2;
                this.radius = Math.random() * 300 + 50;
                this.speed = 0.02 + Math.random() * 0.03;
                this.size = Math.random() * 3 + 1;
                this.hue = Math.random() * 360;
            }
            update() {
                this.angle += this.speed * direction * speed;
                this.radius -= 0.5;
                if (this.radius < 10) this.radius = 300 + Math.random() * 50;
            }
            draw() {
                const cx = mouseX || width / 2;
                const cy = mouseY || height / 2;
                const x = cx + Math.cos(this.angle) * this.radius;
                const y = cy + Math.sin(this.angle) * this.radius * 0.8;
                ctx.save();
                ctx.globalAlpha = this.radius / 350;
                ctx.fillStyle = `hsla(${(this.hue + time * 30) % 360}, 100%, 70%, 1)`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = ctx.fillStyle;
                ctx.beginPath();
                ctx.arc(x, y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        function init() {
            resize();
            for (let i = 0; i < 6; i++) spirals.push(new Spiral(i * 60, 20 + i * 30, 200));
            for (let i = 0; i < 150; i++) particles.push(new VParticle());
        }
        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        function draw() {
            ctx.fillStyle = 'rgba(0,0,0,0.1)';
            ctx.fillRect(0, 0, width, height);
            const cx = mouseX || width / 2;
            const cy = mouseY || height / 2;
            const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, 400);
            gradient.addColorStop(0, `hsla(${time * 50 % 360}, 100%, 50%, 0.2)`);
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            spirals.forEach(s => { s.update(); s.draw(); });
            particles.forEach(p => { p.update(); p.draw(); });
            time += 0.016;
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
        window.addEventListener('click', () => { direction *= -1; });
        window.addEventListener('wheel', e => { speed += e.deltaY > 0 ? -0.2 : 0.2; speed = Math.max(0.2, Math.min(3, speed)); });
        window.addEventListener('dblclick', () => { spirals.forEach(s => s.hue = Math.random() * 360); });
        init(); draw();
    </script>
</body>
</html>
