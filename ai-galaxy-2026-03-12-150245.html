<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>银河系 - Galaxy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(200, 180, 255, 0.7);
            font-size: 13px;
            z-index: 100;
            text-align: center;
            text-shadow: 0 0 10px rgba(150, 100, 255, 0.5);
        }
        
        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(200, 180, 255, 0.8);
            font-size: 12px;
            z-index: 100;
            text-align: right;
        }
        
        .controls div {
            margin: 5px 0;
            padding: 5px 12px;
            background: rgba(150, 100, 255, 0.1);
            border-radius: 15px;
            border: 1px solid rgba(200, 180, 255, 0.3);
        }
        
        .title {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(200, 180, 255, 0.8);
            font-size: 14px;
            letter-spacing: 3px;
            z-index: 100;
        }
        
        .fps {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(200, 180, 255, 0.5);
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="galaxy"></canvas>
    
    <div class="title">MILKY WAY</div>
    
    <div class="controls">
        <div id="stars">恒星: 0</div>
        <div id="mode">视角: 俯视</div>
    </div>
    
    <div class="info">
        <span>🌌 拖动旋转星系 | 滚轮缩放 | 双击切换视角 | 点击产生超新星爆发 | 右键切换配色</span>
    </div>
    
    <div class="fps">FPS: <span id="fps">60</span></div>

    <script>
        // 配置
        const CONFIG = {
            STAR_COUNT: 3000,
            SPIRAL_ARMS: 4,
            ARM_SPREAD: 0.5,
            GALAXY_RADIUS: 400,
            CORE_DENSITY: 0.3,
            ROTATION_SPEED: 0.0003
        };

        // 配色方案
        const colorSchemes = [
            { 
                name: '经典银河', 
                core: [255, 220, 180], 
                arms: [180, 200, 255],
                dust: [100, 80, 120]
            },
            { 
                name: '仙女座', 
                core: [255, 200, 150], 
                arms: [150, 180, 255],
                dust: [80, 60, 100]
            },
            { 
                name: '螺旋星系', 
                core: [255, 180, 100], 
                arms: [100, 150, 255],
                dust: [60, 50, 80]
            },
            { 
                name: '棒旋星系', 
                core: [255, 150, 200], 
                arms: [150, 255, 200],
                dust: [80, 60, 90]
            }
        ];

        // Canvas
        const canvas = document.getElementById('galaxy');
        const ctx = canvas.getContext('2d');
        
        let width, height, centerX, centerY;
        let stars = [];
        let dustClouds = [];
        let supernovas = [];
        
        let rotationX = 0.3;
        let rotationY = 0;
        let zoom = 1;
        let time = 0;
        let currentScheme = 0;
        let viewMode = 'top'; // top, side, angle
        
        let isDragging = false;
        let lastMouseX = 0, lastMouseY = 0;

        // 恒星类
        class Star {
            constructor() {
                // 螺旋臂分布
                const arm = Math.floor(Math.random() * CONFIG.SPIRAL_ARMS);
                const armAngle = (arm / CONFIG.SPIRAL_ARMS) * Math.PI * 2;
                
                // 距离中心的半径（指数分布，中心更密集）
                const r = Math.pow(Math.random(), CONFIG.CORE_DENSITY) * CONFIG.GALAXY_RADIUS;
                
                // 螺旋角度
                const spiralAngle = armAngle + (r / CONFIG.GALAXY_RADIUS) * Math.PI * 2;
                
                // 添加随机扩散
                const spreadAngle = spiralAngle + (Math.random() - 0.5) * CONFIG.ARM_SPREAD;
                const spreadR = r + (Math.random() - 0.5) * 30;
                
                this.x = Math.cos(spreadAngle) * spreadR;
                this.y = Math.sin(spreadAngle) * spreadR;
                this.z = (Math.random() - 0.5) * 20 * (1 - r / CONFIG.GALAXY_RADIUS);
                
                this.baseX = this.x;
                this.baseY = this.y;
                this.baseZ = this.z;
                
                this.size = Math.random() * 2 + 0.5;
                this.brightness = Math.random();
                this.twinkleSpeed = Math.random() * 0.1 + 0.02;
                this.twinklePhase = Math.random() * Math.PI * 2;
                
                // 颜色：核心偏黄，外围偏蓝
                const distRatio = r / CONFIG.GALAXY_RADIUS;
                const scheme = colorSchemes[currentScheme];
                this.color = this.interpolateColor(scheme.core, scheme.arms, distRatio);
            }

            interpolateColor(c1, c2, t) {
                return [
                    Math.floor(c1[0] + (c2[0] - c1[0]) * t),
                    Math.floor(c1[1] + (c2[1] - c1[1]) * t),
                    Math.floor(c1[2] + (c2[2] - c1[2]) * t)
                ];
            }

            update(time, rotation) {
                // 绕中心旋转
                const angle = time * CONFIG.ROTATION_SPEED;
                const cosA = Math.cos(angle);
                const sinA = Math.sin(angle);
                
                this.x = this.baseX * cosA - this.baseY * sinA;
                this.y = this.baseX * sinA + this.baseY * cosA;
                
                // 3D旋转
                const cosX = Math.cos(rotation.x);
                const sinX = Math.sin(rotation.x);
                const cosY = Math.cos(rotation.y);
                const sinY = Math.sin(rotation.y);
                
                // 绕Y轴
                let tempX = this.x * cosY - this.z * sinY;
                let tempZ = this.x * sinY + this.z * cosY;
                
                // 绕X轴
                this.screenY = this.y * cosX - tempZ * sinX;
                this.screenZ = this.y * sinX + tempZ * cosX;
                this.screenX = tempX;
            }

            draw(ctx, zoom) {
                const scale = (this.screenZ + 500) / 500 * zoom;
                const screenX = centerX + this.screenX * scale;
                const screenY = centerY + this.screenY * scale;
                
                if (screenX < -50 || screenX > width + 50 || screenY < -50 || screenY > height + 50) return;
                
                const twinkle = Math.sin(time * this.twinkleSpeed + this.twinklePhase) * 0.3 + 0.7;
                const alpha = this.brightness * twinkle * scale;
                const size = this.size * scale;
                
                // 发光效果
                const gradient = ctx.createRadialGradient(screenX, screenY, 0, screenX, screenY, size * 3);
                gradient.addColorStop(0, `rgba(${this.color[0]}, ${this.color[1]}, ${this.color[2]}, ${alpha})`);
                gradient.addColorStop(0.5, `rgba(${this.color[0]}, ${this.color[1]}, ${this.color[2]}, ${alpha * 0.3})`);
                gradient.addColorStop(1, `rgba(${this.color[0]}, ${this.color[1]}, ${this.color[2]}, 0)`);
                
                ctx.beginPath();
                ctx.arc(screenX, screenY, size * 3, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // 核心
                ctx.beginPath();
                ctx.arc(screenX, screenY, size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fill();
            }
        }

        // 尘埃云类
        class DustCloud {
            constructor() {
                const arm = Math.floor(Math.random() * CONFIG.SPIRAL_ARMS);
                const armAngle = (arm / CONFIG.SPIRAL_ARMS) * Math.PI * 2;
                const r = Math.pow(Math.random(), 0.5) * CONFIG.GALAXY_RADIUS * 0.8;
                const spiralAngle = armAngle + (r / CONFIG.GALAXY_RADIUS) * Math.PI * 1.5;
                
                this.x = Math.cos(spiralAngle) * r;
                this.y = Math.sin(spiralAngle) * r;
                this.z = (Math.random() - 0.5) * 10;
                
                this.baseX = this.x;
                this.baseY = this.y;
                
                this.size = Math.random() * 50 + 20;
                this.alpha = Math.random() * 0.1 + 0.05;
            }

            update(time, rotation) {
                const angle = time * CONFIG.ROTATION_SPEED;
                const cosA = Math.cos(angle);
                const sinA = Math.sin(angle);
                
                this.x = this.baseX * cosA - this.baseY * sinA;
                this.y = this.baseX * sinA + this.baseY * cosA;
                
                const cosX = Math.cos(rotation.x);
                const sinX = Math.sin(rotation.x);
                const cosY = Math.cos(rotation.y);
                const sinY = Math.sin(rotation.y);
                
                let tempX = this.x * cosY - this.z * sinY;
                let tempZ = this.x * sinY + this.z * cosY;
                
                this.screenY = this.y * cosX - tempZ * sinX;
                this.screenZ = this.y * sinX + tempZ * cosX;
                this.screenX = tempX;
            }

            draw(ctx, zoom, scheme) {
                const scale = (this.screenZ + 500) / 500 * zoom;
                const screenX = centerX + this.screenX * scale;
                const screenY = centerY + this.screenY * scale;
                const size = this.size * scale;
                
                const gradient = ctx.createRadialGradient(screenX, screenY, 0, screenX, screenY, size);
                gradient.addColorStop(0, `rgba(${scheme.dust[0]}, ${scheme.dust[1]}, ${scheme.dust[2]}, ${this.alpha * scale})`);
                gradient.addColorStop(1, `rgba(${scheme.dust[0]}, ${scheme.dust[1]}, ${scheme.dust[2]}, 0)`);
                
                ctx.beginPath();
                ctx.arc(screenX, screenY, size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }

        // 超新星爆发类
        class Supernova {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = 100;
                this.alpha = 1;
                this.rays = [];
                
                for (let i = 0; i < 8; i++) {
                    this.rays.push({
                        angle: (i / 8) * Math.PI * 2,
                        length: Math.random() * 50 + 50
                    });
                }
            }

            update() {
                this.radius += 3;
                this.alpha = 1 - this.radius / this.maxRadius;
                return this.radius < this.maxRadius;
            }

            draw(ctx) {
                // 闪光
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
                gradient.addColorStop(0, `rgba(255, 255, 255, ${this.alpha})`);
                gradient.addColorStop(0.3, `rgba(255, 200, 100, ${this.alpha * 0.8})`);
                gradient.addColorStop(1, `rgba(255, 100, 50, 0)`);
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // 光线
                this.rays.forEach(ray => {
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(
                        this.x + Math.cos(ray.angle) * ray.length * (1 - this.alpha),
                        this.y + Math.sin(ray.angle) * ray.length * (1 - this.alpha)
                    );
                    ctx.strokeStyle = `rgba(255, 255, 255, ${this.alpha * 0.5})`;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                });
            }
        }

        // 初始化
        function init() {
            resize();
            
            stars = [];
            for (let i = 0; i < CONFIG.STAR_COUNT; i++) {
                stars.push(new Star());
            }
            
            dustClouds = [];
            for (let i = 0; i < 100; i++) {
                dustClouds.push(new DustCloud());
            }
            
            document.getElementById('stars').textContent = `恒星: ${stars.length}`;
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        // 绘制银河核心
        function drawCore(zoom) {
            const scheme = colorSchemes[currentScheme];
            const coreSize = 80 * zoom;
            
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, coreSize);
            gradient.addColorStop(0, `rgba(255, 255, 240, 0.8)`);
            gradient.addColorStop(0.2, `rgba(${scheme.core[0]}, ${scheme.core[1]}, ${scheme.core[2]}, 0.5)`);
            gradient.addColorStop(0.5, `rgba(${scheme.core[0]}, ${scheme.core[1]}, ${scheme.core[2]}, 0.2)`);
            gradient.addColorStop(1, `rgba(${scheme.core[0]}, ${scheme.core[1]}, ${scheme.core[2]}, 0)`);
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, coreSize, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
        }

        // 切换视角
        function switchView() {
            const views = ['top', 'side', 'angle'];
            const currentIdx = views.indexOf(viewMode);
            viewMode = views[(currentIdx + 1) % views.length];
            
            switch(viewMode) {
                case 'top':
                    rotationX = 0;
                    rotationY = 0;
                    break;
                case 'side':
                    rotationX = Math.PI / 2;
                    rotationY = 0;
                    break;
                case 'angle':
                    rotationX = 0.5;
                    rotationY = 0.3;
                    break;
            }
            
            document.getElementById('mode').textContent = `视角: ${viewMode === 'top' ? '俯视' : viewMode === 'side' ? '侧视' : '斜视'}`;
        }

        // FPS计算
        let lastTime = performance.now();
        let frameCount = 0;

        // 动画循环
        function animate(currentTime) {
            time++;
            
            // FPS
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                lastTime = currentTime;
            }

            // 清空画布
            ctx.fillStyle = 'rgba(0, 0, 10, 0.15)';
            ctx.fillRect(0, 0, width, height);

            const rotation = { x: rotationX, y: rotationY };
            const scheme = colorSchemes[currentScheme];

            // 更新尘埃云
            dustClouds.forEach(dust => {
                dust.update(time, rotation);
                dust.draw(ctx, zoom, scheme);
            });

            // 绘制核心
            drawCore(zoom);

            // 更新和绘制恒星（按深度排序）
            stars.forEach(star => star.update(time, rotation));
            stars.sort((a, b) => a.screenZ - b.screenZ);
            stars.forEach(star => star.draw(ctx, zoom));

            // 更新和绘制超新星
            supernovas = supernovas.filter(sn => {
                const alive = sn.update();
                if (alive) sn.draw(ctx);
                return alive;
            });

            requestAnimationFrame(animate);
        }

        // 事件监听
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 0) {
                isDragging = true;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const dx = e.clientX - lastMouseX;
                const dy = e.clientY - lastMouseY;
                
                rotationY += dx * 0.005;
                rotationX += dy * 0.005;
                rotationX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, rotationX));
                
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            if (e.button === 0 && !isDragging) {
                // 点击产生超新星
                supernovas.push(new Supernova(e.clientX, e.clientY));
            }
            isDragging = false;
        });

        canvas.addEventListener('dblclick', switchView);

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            zoom = Math.max(0.3, Math.min(3, zoom - Math.sign(e.deltaY) * 0.1));
        });

        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            currentScheme = (currentScheme + 1) % colorSchemes.length;
            // 更新恒星颜色
            stars.forEach(star => {
                const scheme = colorSchemes[currentScheme];
                const r = Math.sqrt(star.baseX * star.baseX + star.baseY * star.baseY);
                const distRatio = r / CONFIG.GALAXY_RADIUS;
                star.color = star.interpolateColor(scheme.core, scheme.arms, distRatio);
            });
        });

        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDragging = true;
            lastMouseX = e.touches[0].clientX;
            lastMouseY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (isDragging) {
                const dx = e.touches[0].clientX - lastMouseX;
                const dy = e.touches[0].clientY - lastMouseY;
                
                rotationY += dx * 0.005;
                rotationX += dy * 0.005;
                rotationX = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, rotationX));
                
                lastMouseX = e.touches[0].clientX;
                lastMouseY = e.touches[0].clientY;
            }
        });

        canvas.addEventListener('touchend', () => {
            isDragging = false;
        });

        // 键盘支持
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                switchView();
            } else if (e.code === 'ArrowUp') {
                zoom = Math.min(3, zoom + 0.1);
            } else if (e.code === 'ArrowDown') {
                zoom = Math.max(0.3, zoom - 0.1);
            }
        });

        // 启动
        init();
        animate(0);
    </script>
</body>
</html>
