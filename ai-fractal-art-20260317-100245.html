<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分形艺术 - Fractal Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 200, 100, 0.9);
            font-size: 14px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 150, 50, 0.3);
            max-width: 280px;
        }
        
        .info h3 {
            margin-bottom: 10px;
            font-size: 16px;
            color: #ffc864;
            text-shadow: 0 0 15px rgba(255, 200, 100, 0.6);
        }
        
        .info p {
            margin: 5px 0;
            font-size: 12px;
            line-height: 1.6;
        }
        
        .info .key {
            color: #ff9966;
            font-weight: bold;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
        }
        
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffc864;
            font-size: 18px;
            z-index: 20;
            text-shadow: 0 0 20px rgba(255, 200, 100, 0.8);
        }
        
        @media (max-width: 600px) {
            .info {
                font-size: 12px;
                padding: 10px 15px;
                max-width: 220px;
            }
        }
    </style>
</head>
<body>
    <canvas id="fractal"></canvas>
    
    <div class="loading" id="loading">正在生成分形...</div>
    
    <div class="info">
        <h3>🔮 分形艺术</h3>
        <p><span class="key">点击拖动</span> - 平移视图</p>
        <p><span class="key">滚轮</span> - 缩放</p>
        <p><span class="key">双击</span> - 重置视图</p>
        <p><span class="key">空格</span> - 切换分形类型</p>
    </div>
    
    <div class="stats" id="stats">
        FPS: 60 | 迭代: 0
    </div>

    <script>
        const canvas = document.getElementById('fractal');
        const ctx = canvas.getContext('2d');
        const loadingEl = document.getElementById('loading');
        const statsEl = document.getElementById('stats');
        
        let width, height;
        let centerX = 0, centerY = 0;
        let zoom = 1;
        let maxIterations = 100;
        let fractalType = 0;
        let colorScheme = 0;
        
        // 分形类型
        const fractalTypes = [
            { name: 'Mandelbrot', func: mandelbrot },
            { name: 'Julia', func: julia },
            { name: 'Burning Ship', func: burningShip },
            { name: 'Tricorn', func: tricorn }
        ];
        
        // 颜色方案
        const colorSchemes = [
            // 火焰
            (i, max) => {
                if (i === max) return [0, 0, 0];
                const t = i / max;
                return [
                    Math.floor(255 * Math.min(1, t * 3)),
                    Math.floor(255 * Math.max(0, Math.min(1, t * 3 - 1))),
                    Math.floor(255 * Math.max(0, t * 3 - 2))
                ];
            },
            // 海洋
            (i, max) => {
                if (i === max) return [0, 0, 20];
                const t = i / max;
                return [
                    Math.floor(255 * Math.sin(t * Math.PI)),
                    Math.floor(255 * Math.sin(t * Math.PI + 1)),
                    Math.floor(128 + 127 * Math.sin(t * Math.PI * 2))
                ];
            },
            // 彩虹
            (i, max) => {
                if (i === max) return [0, 0, 0];
                const t = i / max;
                const h = t * 360;
                return hslToRgb(h, 100, 50);
            },
            // 极光
            (i, max) => {
                if (i === max) return [0, 0, 0];
                const t = i / max;
                return [
                    Math.floor(100 + 155 * Math.sin(t * Math.PI * 2)),
                    Math.floor(200 + 55 * Math.sin(t * Math.PI * 2 + 1)),
                    Math.floor(150 + 105 * Math.sin(t * Math.PI * 2 + 2))
                ];
            }
        ];
        
        // Julia集参数
        let juliaC = { re: -0.7, im: 0.27015 };
        
        // 拖动状态
        let isDragging = false;
        let lastMouseX = 0, lastMouseY = 0;
        
        // 性能统计
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        let needsRender = true;
        let renderTimeout = null;
        
        // HSL转RGB
        function hslToRgb(h, s, l) {
            s /= 100;
            l /= 100;
            const k = n => (n + h / 30) % 12;
            const a = s * Math.min(l, 1 - l);
            const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
            return [Math.floor(255 * f(0)), Math.floor(255 * f(8)), Math.floor(255 * f(4))];
        }
        
        // Mandelbrot集合
        function mandelbrot(x0, y0, maxIter) {
            let x = 0, y = 0;
            let iter = 0;
            
            while (x * x + y * y <= 4 && iter < maxIter) {
                const xTemp = x * x - y * y + x0;
                y = 2 * x * y + y0;
                x = xTemp;
                iter++;
            }
            
            return iter;
        }
        
        // Julia集合
        function julia(x0, y0, maxIter) {
            let x = x0, y = y0;
            let iter = 0;
            
            while (x * x + y * y <= 4 && iter < maxIter) {
                const xTemp = x * x - y * y + juliaC.re;
                y = 2 * x * y + juliaC.im;
                x = xTemp;
                iter++;
            }
            
            return iter;
        }
        
        // Burning Ship分形
        function burningShip(x0, y0, maxIter) {
            let x = 0, y = 0;
            let iter = 0;
            
            while (x * x + y * y <= 4 && iter < maxIter) {
                const xTemp = x * x - y * y + x0;
                y = Math.abs(2 * x * y) + y0;
                x = Math.abs(xTemp);
                iter++;
            }
            
            return iter;
        }
        
        // Tricorn分形
        function tricorn(x0, y0, maxIter) {
            let x = 0, y = 0;
            let iter = 0;
            
            while (x * x + y * y <= 4 && iter < maxIter) {
                const xTemp = x * x - y * y + x0;
                y = -2 * x * y + y0;
                x = xTemp;
                iter++;
            }
            
            return iter;
        }
        
        function init() {
            resize();
            render();
        }
        
        function resize() {
            const dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            
            ctx.scale(dpr, dpr);
            needsRender = true;
        }
        
        function render() {
            loadingEl.style.display = 'block';
            
            // 使用requestAnimationFrame避免阻塞
            requestAnimationFrame(() => {
                const imageData = ctx.createImageData(width, height);
                const data = imageData.data;
                
                const fractalFunc = fractalTypes[fractalType].func;
                const colorFunc = colorSchemes[colorScheme];
                
                // 缩放和偏移
                const scale = 3 / (zoom * Math.min(width, height));
                
                for (let py = 0; py < height; py++) {
                    for (let px = 0; px < width; px++) {
                        const x0 = (px - width / 2) * scale + centerX;
                        const y0 = (py - height / 2) * scale + centerY;
                        
                        const iter = fractalFunc(x0, y0, maxIterations);
                        const [r, g, b] = colorFunc(iter, maxIterations);
                        
                        const idx = (py * width + px) * 4;
                        data[idx] = r;
                        data[idx + 1] = g;
                        data[idx + 2] = b;
                        data[idx + 3] = 255;
                    }
                }
                
                ctx.putImageData(imageData, 0, 0);
                loadingEl.style.display = 'none';
                needsRender = false;
            });
        }
        
        function scheduleRender() {
            if (renderTimeout) {
                clearTimeout(renderTimeout);
            }
            renderTimeout = setTimeout(() => {
                if (needsRender) {
                    render();
                }
            }, 100);
        }
        
        function animate(currentTime) {
            // FPS
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
            }
            
            // 更新统计
            statsEl.textContent = `FPS: ${fps} | 迭代: ${maxIterations} | ${fractalTypes[fractalType].name}`;
            
            // Julia集动态参数
            if (fractalType === 1) {
                const t = currentTime * 0.0001;
                juliaC.re = -0.7 + 0.1 * Math.sin(t);
                juliaC.im = 0.27015 + 0.1 * Math.cos(t * 1.3);
                
                if (!isDragging) {
                    needsRender = true;
                    scheduleRender();
                }
            }
            
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        window.addEventListener('resize', () => {
            resize();
            render();
        });
        
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const scale = 3 / (zoom * Math.min(width, height));
                centerX -= (e.clientX - lastMouseX) * scale;
                centerY -= (e.clientY - lastMouseY) * scale;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
                needsRender = true;
                scheduleRender();
            }
        });
        
        canvas.addEventListener('mouseup', () => {
            isDragging = false;
        });
        
        canvas.addEventListener('mouseleave', () => {
            isDragging = false;
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
            zoom *= zoomFactor;
            
            // 根据缩放调整迭代次数
            maxIterations = Math.min(500, Math.max(50, Math.floor(100 + Math.log2(zoom) * 20)));
            
            needsRender = true;
            scheduleRender();
        });
        
        canvas.addEventListener('dblclick', () => {
            centerX = 0;
            centerY = 0;
            zoom = 1;
            maxIterations = 100;
            colorScheme = (colorScheme + 1) % colorSchemes.length;
            render();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                fractalType = (fractalType + 1) % fractalTypes.length;
                centerX = 0;
                centerY = 0;
                zoom = 1;
                render();
            }
        });
        
        // 触摸支持
        let lastTouchDist = 0;
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (e.touches.length === 1) {
                isDragging = true;
                lastMouseX = e.touches[0].clientX;
                lastMouseY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                lastTouchDist = Math.sqrt(dx * dx + dy * dy);
            }
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length === 1 && isDragging) {
                const scale = 3 / (zoom * Math.min(width, height));
                centerX -= (e.touches[0].clientX - lastMouseX) * scale;
                centerY -= (e.touches[0].clientY - lastMouseY) * scale;
                lastMouseX = e.touches[0].clientX;
                lastMouseY = e.touches[0].clientY;
                needsRender = true;
                scheduleRender();
            } else if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (lastTouchDist > 0) {
                    const zoomFactor = dist / lastTouchDist;
                    zoom *= zoomFactor;
                    maxIterations = Math.min(500, Math.max(50, Math.floor(100 + Math.log2(zoom) * 20)));
                    needsRender = true;
                    scheduleRender();
                }
                
                lastTouchDist = dist;
            }
        });
        
        canvas.addEventListener('touchend', (e) => {
            if (e.touches.length === 0) {
                isDragging = false;
                lastTouchDist = 0;
            }
        });
        
        // 启动
        init();
        animate(performance.now());
    </script>
</body>
</html>
