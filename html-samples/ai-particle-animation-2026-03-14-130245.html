<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粒子动画 | Particle Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    <div class="title">Particles</div>
    <div class="info">移动鼠标吸引粒子 | 点击产生爆炸 | 滚轮调整粒子数量 | 双击切换模式</div>
    
    <script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let mouseX = -1000, mouseY = -1000;
        let particleCount = 300;
        let mode = 0;
        let time = 0;
        
        const modes = ['attract', 'repel', 'orbit', 'swarm'];
        const modeNames = ['吸引', '排斥', '环绕', '群集'];
        
        // 颜色方案
        const colors = [
            '#00d4ff', '#00ff88', '#ff00ff', '#ffff00', '#ff6b6b'
        ];
        
        // 粒子类
        class Particle {
            constructor(x, y) {
                this.x = x !== undefined ? x : Math.random() * width;
                this.y = y !== undefined ? y : Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.size = Math.random() * 3 + 1;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.alpha = Math.random() * 0.5 + 0.5;
                this.life = 1;
                this.maxLife = 1;
                this.isExplosion = false;
            }
            
            update() {
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 300) {
                    const force = (300 - dist) / 300;
                    const angle = Math.atan2(dy, dx);
                    
                    switch (modes[mode]) {
                        case 'attract':
                            this.vx += Math.cos(angle) * force * 0.5;
                            this.vy += Math.sin(angle) * force * 0.5;
                            break;
                        case 'repel':
                            this.vx -= Math.cos(angle) * force * 0.8;
                            this.vy -= Math.sin(angle) * force * 0.8;
                            break;
                        case 'orbit':
                            const perpAngle = angle + Math.PI / 2;
                            this.vx += Math.cos(perpAngle) * force * 0.3;
                            this.vy += Math.sin(perpAngle) * force * 0.3;
                            this.vx += Math.cos(angle) * force * 0.1;
                            this.vy += Math.sin(angle) * force * 0.1;
                            break;
                        case 'swarm':
                            const noise = Math.sin(time * 5 + this.x * 0.01) * 0.5;
                            this.vx += Math.cos(angle + noise) * force * 0.4;
                            this.vy += Math.sin(angle + noise) * force * 0.4;
                            break;
                    }
                }
                
                // 应用速度
                this.x += this.vx;
                this.y += this.vy;
                
                // 阻尼
                this.vx *= 0.98;
                this.vy *= 0.98;
                
                // 边界处理
                if (this.x < 0) { this.x = 0; this.vx *= -0.5; }
                if (this.x > width) { this.x = width; this.vx *= -0.5; }
                if (this.y < 0) { this.y = 0; this.vy *= -0.5; }
                if (this.y > height) { this.y = height; this.vy *= -0.5; }
                
                // 爆炸粒子生命周期
                if (this.isExplosion) {
                    this.life -= 0.02;
                    this.alpha = this.life;
                }
                
                return this.life > 0;
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        // 连接线
        function drawConnections(particles) {
            const maxDist = 100;
            
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < maxDist) {
                        ctx.save();
                        ctx.globalAlpha = (1 - dist / maxDist) * 0.3;
                        ctx.strokeStyle = particles[i].color;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                        ctx.restore();
                    }
                }
            }
        }
        
        let particles = [];
        
        function init() {
            resize();
            
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        function draw() {
            // 清除画布（带拖尾效果）
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // 更新和绘制粒子
            particles = particles.filter(p => {
                const alive = p.update();
                if (alive) p.draw();
                return alive;
            });
            
            // 补充粒子
            while (particles.length < particleCount) {
                particles.push(new Particle());
            }
            
            // 绘制连接线（仅在粒子较少时）
            if (particles.length <= 200) {
                drawConnections(particles.slice(0, 100));
            }
            
            // 绘制鼠标指示器
            if (mouseX > 0 && mouseY > 0) {
                ctx.save();
                ctx.globalAlpha = 0.3;
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.arc(mouseX, mouseY, 50, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.restore();
            }
            
            // 显示当前模式
            ctx.save();
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.font = '14px Arial';
            ctx.fillText(`模式: ${modeNames[mode]} | 粒子: ${particles.length}`, 20, height - 20);
            ctx.restore();
            
            time += 0.016;
            
            requestAnimationFrame(draw);
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        window.addEventListener('mouseleave', () => {
            mouseX = -1000;
            mouseY = -1000;
        });
        
        window.addEventListener('click', (e) => {
            // 爆炸效果
            for (let i = 0; i < 30; i++) {
                const angle = (i / 30) * Math.PI * 2;
                const speed = 3 + Math.random() * 5;
                const p = new Particle(e.clientX, e.clientY);
                p.vx = Math.cos(angle) * speed;
                p.vy = Math.sin(angle) * speed;
                p.isExplosion = true;
                p.size = Math.random() * 4 + 2;
                particles.push(p);
            }
        });
        
        window.addEventListener('dblclick', () => {
            mode = (mode + 1) % modes.length;
        });
        
        window.addEventListener('wheel', (e) => {
            particleCount += e.deltaY > 0 ? -20 : 20;
            particleCount = Math.max(50, Math.min(500, particleCount));
        });
        
        // 触摸支持
        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });
        
        window.addEventListener('touchstart', (e) => {
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
            
            // 触摸爆炸
            for (let i = 0; i < 20; i++) {
                const angle = (i / 20) * Math.PI * 2;
                const speed = 2 + Math.random() * 4;
                const p = new Particle(mouseX, mouseY);
                p.vx = Math.cos(angle) * speed;
                p.vy = Math.sin(angle) * speed;
                p.isExplosion = true;
                particles.push(p);
            }
        });
        
        window.addEventListener('touchend', () => {
            mouseX = -1000;
            mouseY = -1000;
        });
        
        // 键盘控制
        window.addEventListener('keydown', (e) => {
            switch (e.key) {
                case ' ':
                    e.preventDefault();
                    mode = (mode + 1) % modes.length;
                    break;
                case 'r':
                case 'R':
                    // 重置粒子
                    particles = [];
                    for (let i = 0; i < particleCount; i++) {
                        particles.push(new Particle());
                    }
                    break;
            }
        });
        
        init();
        draw();
    </script>
</body>
</html>
