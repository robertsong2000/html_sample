<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火焰效果 | Fire Effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #0a0a0a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .ui {
            position: fixed;
            z-index: 10;
            color: #fff;
            pointer-events: none;
        }
        
        .title {
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 10px;
            text-shadow: 
                0 0 20px rgba(255, 100, 0, 0.8),
                0 0 40px rgba(255, 50, 0, 0.5),
                0 0 60px rgba(255, 0, 0, 0.3);
            animation: flicker 0.1s infinite alternate;
        }
        
        @keyframes flicker {
            0% { opacity: 0.95; }
            100% { opacity: 1; }
        }
        
        .info {
            bottom: 25px;
            left: 25px;
            font-size: 13px;
            line-height: 1.8;
            text-shadow: 0 0 10px rgba(255, 100, 0, 0.5);
            opacity: 0.7;
        }
        
        .stats {
            top: 25px;
            right: 25px;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            text-align: right;
            text-shadow: 0 0 5px rgba(255, 100, 0, 0.5);
            opacity: 0.6;
        }
        
        .glow {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40%;
            background: radial-gradient(ellipse at bottom, rgba(255, 50, 0, 0.2) 0%, transparent 70%);
            pointer-events: none;
            z-index: 5;
        }
        
        @media (max-width: 768px) {
            .title {
                font-size: 18px;
                letter-spacing: 5px;
            }
            .info {
                font-size: 11px;
                bottom: 15px;
                left: 15px;
            }
            .stats {
                font-size: 9px;
                top: 15px;
                right: 15px;
            }
        }
    </style>
</head>
<body>
    <canvas id="fire"></canvas>
    <div class="glow"></div>
    
    <div class="ui title">FIRE</div>
    
    <div class="ui stats">
        <div id="particles">Particles: 0</div>
        <div id="fps">FPS: 60</div>
    </div>
    
    <div class="ui info">
        移动鼠标控制火焰方向<br>
        点击产生火焰爆发
    </div>
    
    <script>
        const canvas = document.getElementById('fire');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let time = 0;
        let lastTime = performance.now();
        let fps = 60;
        
        // 火焰粒子
        let fireParticles = [];
        
        // 火花粒子
        let sparks = [];
        
        // 烟雾粒子
        let smoke = [];
        
        // 鼠标位置
        let mouseX = 0, mouseY = 0;
        let windX = 0;
        
        // 火焰粒子类
        class FireParticle {
            constructor(x, y, isExplosion = false) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * (isExplosion ? 8 : 2);
                this.vy = -(Math.random() * 5 + 3) * (isExplosion ? 1.5 : 1);
                this.size = isExplosion ? Math.random() * 15 + 10 : Math.random() * 20 + 10;
                this.life = 1;
                this.decay = 0.01 + Math.random() * 0.02;
                this.hue = 30 + Math.random() * 30; // 橙色到黄色
            }
            
            update() {
                // 风的影响
                this.vx += windX * 0.1;
                
                // 上升运动
                this.vy -= 0.05;
                
                // 横向摆动
                this.vx += Math.sin(time * 0.1 + this.x * 0.01) * 0.2;
                
                this.x += this.vx;
                this.y += this.vy;
                
                // 减速
                this.vx *= 0.99;
                this.vy *= 0.99;
                
                // 缩小和消逝
                this.size *= 0.98;
                this.life -= this.decay;
                
                return this.life > 0 && this.size > 0.5;
            }
            
            draw() {
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size
                );
                
                // 火焰颜色渐变：白->黄->橙->红->透明
                const alpha = this.life * 0.8;
                gradient.addColorStop(0, `rgba(255, 255, 200, ${alpha})`);
                gradient.addColorStop(0.2, `rgba(255, 200, 50, ${alpha * 0.9})`);
                gradient.addColorStop(0.5, `rgba(255, ${100 + this.hue}, 0, ${alpha * 0.7})`);
                gradient.addColorStop(0.8, `rgba(200, 50, 0, ${alpha * 0.4})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }
        
        // 火花类
        class Spark {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 6 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed - 5;
                this.size = Math.random() * 3 + 1;
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.03;
                this.trail = [];
            }
            
            update() {
                // 保存轨迹
                this.trail.push({ x: this.x, y: this.y, life: this.life });
                if (this.trail.length > 10) {
                    this.trail.shift();
                }
                
                this.vy += 0.1; // 重力
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                
                return this.life > 0;
            }
            
            draw() {
                // 绘制轨迹
                this.trail.forEach((point, i) => {
                    const trailAlpha = (i / this.trail.length) * point.life * 0.5;
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, this.size * 0.5, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 200, 50, ${trailAlpha})`;
                    ctx.fill();
                });
                
                // 绘制火花
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 200, ${this.life})`;
                ctx.fill();
            }
        }
        
        // 烟雾类
        class Smoke {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 1;
                this.vy = -(Math.random() * 2 + 1);
                this.size = Math.random() * 30 + 20;
                this.life = 1;
                this.decay = 0.005 + Math.random() * 0.01;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
            }
            
            update() {
                this.vx += windX * 0.05;
                this.x += this.vx;
                this.y += this.vy;
                this.size *= 1.01;
                this.life -= this.decay;
                this.rotation += this.rotationSpeed;
                
                return this.life > 0;
            }
            
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, this.size);
                const alpha = this.life * 0.3;
                gradient.addColorStop(0, `rgba(80, 80, 80, ${alpha})`);
                gradient.addColorStop(0.5, `rgba(60, 60, 60, ${alpha * 0.5})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        // 创建基础火焰
        function createBaseFire() {
            const fireSources = [
                { x: width * 0.3, intensity: 1 },
                { x: width * 0.5, intensity: 1.2 },
                { x: width * 0.7, intensity: 0.8 }
            ];
            
            fireSources.forEach(source => {
                const count = Math.floor(3 * source.intensity);
                for (let i = 0; i < count; i++) {
                    const x = source.x + (Math.random() - 0.5) * 100;
                    const y = height - 50 + Math.random() * 30;
                    fireParticles.push(new FireParticle(x, y));
                }
            });
        }
        
        // 创建火焰爆发
        function createFireExplosion(x, y) {
            // 火焰粒子
            for (let i = 0; i < 50; i++) {
                fireParticles.push(new FireParticle(x, y, true));
            }
            
            // 火花
            for (let i = 0; i < 30; i++) {
                sparks.push(new Spark(x, y));
            }
            
            // 烟雾
            for (let i = 0; i < 10; i++) {
                smoke.push(new Smoke(x, y));
            }
        }
        
        // 绘制背景火焰光晕
        function drawFireGlow() {
            const gradient = ctx.createRadialGradient(
                width / 2, height, 0,
                width / 2, height, height * 0.6
            );
            gradient.addColorStop(0, 'rgba(255, 50, 0, 0.15)');
            gradient.addColorStop(0.5, 'rgba(255, 100, 0, 0.05)');
            gradient.addColorStop(1, 'transparent');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }
        
        // 绘制木炭底座
        function drawEmbers() {
            const emberCount = 20;
            for (let i = 0; i < emberCount; i++) {
                const x = width * 0.2 + (width * 0.6 / emberCount) * i + Math.random() * 20;
                const y = height - 20 + Math.random() * 15;
                const size = 5 + Math.random() * 10;
                const brightness = 0.3 + Math.sin(time * 0.05 + i) * 0.2;
                
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, size);
                gradient.addColorStop(0, `rgba(255, ${100 + Math.random() * 50}, 0, ${brightness})`);
                gradient.addColorStop(0.5, `rgba(200, 50, 0, ${brightness * 0.5})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }
        
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            mouseX = width / 2;
        }
        
        function updateFPS() {
            const now = performance.now();
            const delta = now - lastTime;
            lastTime = now;
            fps = Math.round(1000 / delta);
            document.getElementById('fps').textContent = `FPS: ${fps}`;
            document.getElementById('particles').textContent = `Particles: ${fireParticles.length + sparks.length + smoke.length}`;
        }
        
        function animate() {
            time++;
            
            // 清除画布
            ctx.fillStyle = 'rgba(10, 10, 10, 0.15)';
            ctx.fillRect(0, 0, width, height);
            
            // 更新风向（基于鼠标位置）
            const targetWindX = (mouseX - width / 2) / width * 3;
            windX += (targetWindX - windX) * 0.05;
            
            // 绘制背景光晕
            drawFireGlow();
            
            // 创建基础火焰
            createBaseFire();
            
            // 更新和绘制烟雾（最底层）
            smoke = smoke.filter(s => {
                const alive = s.update();
                s.draw();
                return alive;
            });
            
            // 更新和绘制火焰粒子
            fireParticles = fireParticles.filter(p => {
                const alive = p.update();
                p.draw();
                return alive;
            });
            
            // 更新和绘制火花
            sparks = sparks.filter(s => {
                const alive = s.update();
                s.draw();
                return alive;
            });
            
            // 绘制木炭底座
            drawEmbers();
            
            // 限制粒子数量以保持性能
            if (fireParticles.length > 500) {
                fireParticles = fireParticles.slice(-400);
            }
            
            updateFPS();
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        window.addEventListener('resize', init);
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('click', (e) => {
            createFireExplosion(e.clientX, e.clientY);
        });
        
        // 触摸支持
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (e.touches.length > 0) {
                createFireExplosion(e.touches[0].clientX, e.touches[0].clientY);
            }
        });
        
        // 初始化
        init();
        animate();
    </script>
</body>
</html>
