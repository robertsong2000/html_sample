<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分形艺术 - Fractal Art</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 42px;
            font-weight: 300;
            letter-spacing: 12px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 
                0 0 20px rgba(255, 100, 200, 0.8),
                0 0 40px rgba(100, 200, 255, 0.6);
            animation: colorShift 5s ease-in-out infinite;
        }
        
        @keyframes colorShift {
            0%, 100% { 
                text-shadow: 0 0 20px rgba(255, 100, 200, 0.8), 0 0 40px rgba(100, 200, 255, 0.6); 
            }
            50% { 
                text-shadow: 0 0 20px rgba(100, 200, 255, 0.8), 0 0 40px rgba(255, 100, 200, 0.6); 
            }
        }
        
        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 10;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90%;
        }
        
        .btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 100, 200, 0.4);
        }
        
        .btn.active {
            background: rgba(255, 100, 200, 0.3);
            box-shadow: 0 0 20px rgba(255, 100, 200, 0.6);
        }
        
        .info {
            position: fixed;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
            text-align: center;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            z-index: 10;
            pointer-events: none;
            text-align: right;
        }
        
        .formula {
            position: fixed;
            bottom: 90px;
            left: 20px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 11px;
            z-index: 10;
            pointer-events: none;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="title">分形艺术</div>
    
    <div class="info">
        🖱️ 移动鼠标 - 探索分形 | 🎨 点击 - 改变配色 | ⚙️ 滚轮 - 缩放分形
    </div>
    
    <div class="stats" id="stats">
        迭代: 0 | 缩放: 1.0x | FPS: 60
    </div>
    
    <div class="formula" id="formula">
        Mandelbrot Set: z = z² + c
    </div>
    
    <div class="controls">
        <button class="btn" onclick="changeFractal()">🌀 分形类型</button>
        <button class="btn" onclick="changeColors()">🎨 配色方案</button>
        <button class="btn" onclick="toggleAnimation()">▶️ 动画效果</button>
        <button class="btn" onclick="toggleZoom()">🔍 自动缩放</button>
        <button class="btn" onclick="resetView()">🔄 重置视图</button>
        <button class="btn" onclick="saveImage()">💾 保存图片</button>
    </div>
    
    <canvas id="canvas"></canvas>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        let zoom = 1;
        let offsetX = 0;
        let offsetY = 0;
        let maxIterations = 100;
        let animationEnabled = false;
        let autoZoomEnabled = false;
        let time = 0;
        
        // 性能监控
        let frameCount = 0;
        let lastFpsUpdate = Date.now();
        let currentFps = 60;
        
        // 分形类型
        const fractalTypes = [
            { name: 'Mandelbrot', formula: 'Mandelbrot Set: z = z² + c' },
            { name: 'Julia', formula: 'Julia Set: z = z² + c' },
            { name: 'Burning Ship', formula: 'Burning Ship: z = (|Re(z)| + i|Im(z)|)² + c' },
            { name: 'Tricorn', formula: 'Tricorn: z = z̄² + c' }
        ];
        let currentFractal = 0;
        
        // 配色方案
        const colorSchemes = [
            { name: '彩虹', colors: ['#ff0000', '#ff8800', '#ffff00', '#00ff00', '#00ffff', '#0000ff', '#8800ff'] },
            { name: '火焰', colors: ['#ff0000', '#ff4400', '#ff8800', '#ffcc00', '#ffff00'] },
            { name: '海洋', colors: ['#000088', '#0000ff', '#0088ff', '#00ffff', '#ffffff'] },
            { name: '极光', colors: ['#00ff88', '#00ffcc', '#00ffff', '#00ccff', '#0088ff'] },
            { name: '紫罗兰', colors: ['#8800ff', '#aa00ff', '#cc00ff', '#ff00ff', '#ff88ff'] },
            { name: '金属', colors: ['#444444', '#888888', '#cccccc', '#ffffff', '#ffff88'] }
        ];
        let currentColorScheme = 0;
        
        // Julia集参数
        let juliaC = { real: -0.7, imag: 0.27015 };
        
        // 计算Mandelbrot集
        function mandelbrot(cReal, cImag) {
            let zReal = 0;
            let zImag = 0;
            let n = 0;
            
            while (n < maxIterations) {
                const zRealTemp = zReal * zReal - zImag * zImag + cReal;
                zImag = 2 * zReal * zImag + cImag;
                zReal = zRealTemp;
                
                if (zReal * zReal + zImag * zImag > 4) {
                    return n;
                }
                n++;
            }
            
            return maxIterations;
        }
        
        // 计算Julia集
        function julia(zReal, zImag) {
            let n = 0;
            
            while (n < maxIterations) {
                const zRealTemp = zReal * zReal - zImag * zImag + juliaC.real;
                zImag = 2 * zReal * zImag + juliaC.imag;
                zReal = zRealTemp;
                
                if (zReal * zReal + zImag * zImag > 4) {
                    return n;
                }
                n++;
            }
            
            return maxIterations;
        }
        
        // 计算Burning Ship分形
        function burningShip(cReal, cImag) {
            let zReal = 0;
            let zImag = 0;
            let n = 0;
            
            while (n < maxIterations) {
                const zRealTemp = zReal * zReal - zImag * zImag + cReal;
                zImag = Math.abs(2 * zReal * zImag) + cImag;
                zReal = Math.abs(zRealTemp);
                
                if (zReal * zReal + zImag * zImag > 4) {
                    return n;
                }
                n++;
            }
            
            return maxIterations;
        }
        
        // 计算Tricorn分形
        function tricorn(cReal, cImag) {
            let zReal = 0;
            let zImag = 0;
            let n = 0;
            
            while (n < maxIterations) {
                const zRealTemp = zReal * zReal - zImag * zImag + cReal;
                zImag = -2 * zReal * zImag + cImag;
                zReal = zRealTemp;
                
                if (zReal * zReal + zImag * zImag > 4) {
                    return n;
                }
                n++;
            }
            
            return maxIterations;
        }
        
        // 获取颜色
        function getColor(iterations) {
            if (iterations === maxIterations) {
                return '#000000';
            }
            
            const colors = colorSchemes[currentColorScheme].colors;
            const t = iterations / maxIterations;
            const index = t * (colors.length - 1);
            const i = Math.floor(index);
            const f = index - i;
            
            if (i >= colors.length - 1) {
                return colors[colors.length - 1];
            }
            
            // 线性插值
            const c1 = hexToRgb(colors[i]);
            const c2 = hexToRgb(colors[i + 1]);
            
            const r = Math.floor(c1.r + (c2.r - c1.r) * f);
            const g = Math.floor(c1.g + (c2.g - c1.g) * f);
            const b = Math.floor(c1.b + (c2.b - c1.b) * f);
            
            return `rgb(${r}, ${g}, ${b})`;
        }
        
        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : { r: 0, g: 0, b: 0 };
        }
        
        // 绘制分形
        function drawFractal() {
            const imageData = ctx.createImageData(width, height);
            const data = imageData.data;
            
            const scale = 4 / (zoom * Math.min(width, height));
            
            for (let py = 0; py < height; py++) {
                for (let px = 0; px < width; px++) {
                    const x = (px - width / 2) * scale + offsetX;
                    const y = (py - height / 2) * scale + offsetY;
                    
                    let iterations;
                    
                    switch (currentFractal) {
                        case 0:
                            iterations = mandelbrot(x, y);
                            break;
                        case 1:
                            iterations = julia(x, y);
                            break;
                        case 2:
                            iterations = burningShip(x, y);
                            break;
                        case 3:
                            iterations = tricorn(x, y);
                            break;
                    }
                    
                    const color = getColor(iterations);
                    const rgb = color.match(/\d+/g);
                    
                    const index = (py * width + px) * 4;
                    data[index] = parseInt(rgb[0]);
                    data[index + 1] = parseInt(rgb[1]);
                    data[index + 2] = parseInt(rgb[2]);
                    data[index + 3] = 255;
                }
            }
            
            ctx.putImageData(imageData, 0, 0);
        }
        
        // 优化：使用更低的分辨率进行预览
        let previewScale = 4;
        let isRendering = false;
        
        function drawFractalOptimized() {
            if (isRendering) return;
            isRendering = true;
            
            const scale = previewScale;
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = Math.floor(width / scale);
            tempCanvas.height = Math.floor(height / scale);
            const tempCtx = tempCanvas.getContext('2d');
            
            const imageData = tempCtx.createImageData(tempCanvas.width, tempCanvas.height);
            const data = imageData.data;
            
            const viewScale = 4 / (zoom * Math.min(tempCanvas.width, tempCanvas.height));
            
            for (let py = 0; py < tempCanvas.height; py++) {
                for (let px = 0; px < tempCanvas.width; px++) {
                    const x = (px - tempCanvas.width / 2) * viewScale + offsetX;
                    const y = (py - tempCanvas.height / 2) * viewScale + offsetY;
                    
                    let iterations;
                    
                    switch (currentFractal) {
                        case 0:
                            iterations = mandelbrot(x, y);
                            break;
                        case 1:
                            iterations = julia(x, y);
                            break;
                        case 2:
                            iterations = burningShip(x, y);
                            break;
                        case 3:
                            iterations = tricorn(x, y);
                            break;
                    }
                    
                    const color = getColor(iterations);
                    const rgb = color.match(/\d+/g);
                    
                    const index = (py * tempCanvas.width + px) * 4;
                    data[index] = parseInt(rgb[0]);
                    data[index + 1] = parseInt(rgb[1]);
                    data[index + 2] = parseInt(rgb[2]);
                    data[index + 3] = 255;
                }
            }
            
            tempCtx.putImageData(imageData, 0, 0);
            
            ctx.imageSmoothingEnabled = false;
            ctx.drawImage(tempCanvas, 0, 0, width, height);
            
            isRendering = false;
        }
        
        // 初始化
        function init() {
            resize();
            window.addEventListener('resize', resize);
            drawFractalOptimized();
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            drawFractalOptimized();
        }
        
        // 动画循环
        let lastTime = 0;
        const targetFPS = 30; // 降低帧率以提高性能
        const interval = 1000 / targetFPS;
        
        function animate(currentTime) {
            requestAnimationFrame(animate);
            
            const delta = currentTime - lastTime;
            if (delta < interval) return;
            lastTime = currentTime - (delta % interval);
            
            // FPS计算
            frameCount++;
            if (currentTime - lastFpsUpdate >= 1000) {
                currentFps = frameCount;
                frameCount = 0;
                lastFpsUpdate = currentTime;
                updateStats();
            }
            
            if (animationEnabled) {
                time += 0.01;
                juliaC.real = -0.7 + Math.sin(time) * 0.1;
                juliaC.imag = 0.27015 + Math.cos(time) * 0.1;
                drawFractalOptimized();
            }
            
            if (autoZoomEnabled) {
                zoom *= 1.01;
                if (zoom > 100) {
                    zoom = 1;
                }
                drawFractalOptimized();
            }
        }
        
        function updateStats() {
            document.getElementById('stats').textContent = 
                `迭代: ${maxIterations} | 缩放: ${zoom.toFixed(2)}x | FPS: ${currentFps}`;
            document.getElementById('formula').textContent = fractalTypes[currentFractal].formula;
        }
        
        // 事件处理
        canvas.addEventListener('mousemove', (e) => {
            if (e.buttons === 1) {
                const scale = 4 / (zoom * Math.min(width, height));
                offsetX -= (e.clientX - mouseX) * scale;
                offsetY -= (e.clientY - mouseY) * scale;
                drawFractalOptimized();
            }
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('click', () => {
            changeColors();
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            
            const zoomFactor = e.deltaY > 0 ? 0.9 : 1.1;
            const scale = 4 / (zoom * Math.min(width, height));
            
            // 缩放到鼠标位置
            const mouseXWorld = (mouseX - width / 2) * scale + offsetX;
            const mouseYWorld = (mouseY - height / 2) * scale + offsetY;
            
            zoom *= zoomFactor;
            zoom = Math.max(0.1, Math.min(1000, zoom));
            
            const newScale = 4 / (zoom * Math.min(width, height));
            offsetX = mouseXWorld - (mouseX - width / 2) * newScale;
            offsetY = mouseYWorld - (mouseY - height / 2) * newScale;
            
            drawFractalOptimized();
            updateStats();
        });
        
        // 控制函数
        function changeFractal() {
            currentFractal = (currentFractal + 1) % fractalTypes.length;
            resetView();
        }
        
        function changeColors() {
            currentColorScheme = (currentColorScheme + 1) % colorSchemes.length;
            drawFractalOptimized();
        }
        
        function toggleAnimation() {
            animationEnabled = !animationEnabled;
            event.target.classList.toggle('active', animationEnabled);
            event.target.textContent = animationEnabled ? '⏸️ 暂停动画' : '▶️ 动画效果';
        }
        
        function toggleZoom() {
            autoZoomEnabled = !autoZoomEnabled;
            event.target.classList.toggle('active', autoZoomEnabled);
        }
        
        function resetView() {
            zoom = 1;
            offsetX = currentFractal === 2 ? -0.5 : 0;
            offsetY = currentFractal === 2 ? -0.5 : 0;
            drawFractalOptimized();
            updateStats();
        }
        
        function saveImage() {
            // 用全分辨率渲染
            previewScale = 1;
            drawFractalOptimized();
            
            const link = document.createElement('a');
            link.download = `fractal-${fractalTypes[currentFractal].name}-${Date.now()}.png`;
            link.href = canvas.toDataURL();
            link.click();
            
            previewScale = 4;
            drawFractalOptimized();
        }
        
        // 启动
        init();
        animate(0);
    </script>
</body>
</html>
