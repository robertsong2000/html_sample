<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D室内碗具展示 - 虚拟家居体验</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            overflow-x: hidden;
            color: #f5f5f5;
        }

        .header {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .main-title {
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 8px;
            background: linear-gradient(45deg, #ffd700, #ffed4e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 16px;
            opacity: 0.8;
            font-weight: 300;
        }

        .main-container {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            gap: 20px;
            height: calc(100vh - 120px);
        }

        .viewer-section {
            flex: 3;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
        }

        .control-panel {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            min-width: 300px;
            max-width: 350px;
        }

        #viewer3d {
            width: 100%;
            flex: 1;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
            background: linear-gradient(135deg, #2c3e50, #34495e);
            border: 2px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 15px;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .control-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            min-width: 120px;
        }

        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .control-btn.active {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }

        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .section-title {
            font-size: 20px;
            color: #ffd700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-card h3 {
            font-size: 16px;
            margin-bottom: 10px;
            color: #ffd700;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .info-card p {
            font-size: 14px;
            line-height: 1.5;
            opacity: 0.9;
        }

        .feature-list {
            list-style: none;
            padding: 0;
        }

        .feature-list li {
            padding: 5px 0;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            opacity: 0.8;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 16px;
            z-index: 1000;
            border-radius: 15px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .lighting-controls {
            display: flex;
            gap: 10px;
            margin: 10px 0;
            flex-wrap: wrap;
        }

        .light-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            color: white;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .light-btn:hover,
        .light-btn.active {
            background: rgba(255, 215, 0, 0.2);
            border-color: #ffd700;
        }

        .environment-info {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            padding: 10px;
            margin-top: 10px;
        }

        .environment-info h4 {
            color: #ffd700;
            margin-bottom: 5px;
            font-size: 14px;
        }

        @media (max-width: 1024px) {
            .main-container {
                flex-direction: column;
                height: auto;
            }
            
            .control-panel {
                max-width: none;
                margin-top: 20px;
            }
            
            #viewer3d {
                height: 400px;
            }
        }

        @media (max-width: 768px) {
            .main-title {
                font-size: 28px;
            }
            
            #viewer3d {
                height: 300px;
            }
            
            .controls {
                flex-direction: column;
                align-items: center;
            }
            
            .control-btn {
                width: 100%;
                max-width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 class="main-title">🏠 3D室内碗具展示</h1>
        <p class="subtitle">在虚拟客厅中欣赏精美碗具的细节之美</p>
    </div>

    <div class="main-container">
        <div class="viewer-section">
            <div id="viewer3d">
                <div class="loading-overlay" id="loadingOverlay">
                    <div class="loading-spinner"></div>
                    <div>正在加载3D场景...</div>
                </div>
            </div>
            
            <div class="controls">
                <button class="control-btn" id="resetViewBtn">🔄 重置视角</button>
                <button class="control-btn" id="autoRotateBtn">🔄 自动旋转</button>
                <button class="control-btn" id="zoomInBtn">🔍 放大</button>
                <button class="control-btn" id="zoomOutBtn">🔍 缩小</button>
                <button class="control-btn" id="toggleWireframeBtn">📐 线框模式</button>
                <button class="control-btn" id="toggleExplodedBtn">💥 拆解视图</button>
            </div>
        </div>

        <div class="control-panel">
            <h2 class="section-title">
                <span>🎮</span>
                控制面板
            </h2>

            <div class="info-card">
                <h3>🏺 碗具信息</h3>
                <ul class="feature-list">
                    <li>📏 直径: 15.2 cm</li>
                    <li>📊 高度: 7.8 cm</li>
                    <li>🎨 材质: 陶瓷</li>
                    <li>🏺 工艺: 手工制作</li>
                    <li>🎭 风格: 现代简约</li>
                </ul>
            </div>

            <div class="info-card">
                <h3>💡 灯光控制</h3>
                <div class="lighting-controls">
                    <button class="light-btn active" data-scene="daylight">☀️ 日光</button>
                    <button class="light-btn" data-scene="warm">🕯️ 暖光</button>
                    <button class="light-btn" data-scene="spotlight">🔦 聚光</button>
                    <button class="light-btn" data-scene="ambient">🌙 环境光</button>
                </div>
            </div>

            <div class="info-card">
                <h3>🎯 观察提示</h3>
                <ul class="feature-list">
                    <li>🖱️ 左键拖拽: 旋转视角</li>
                    <li>🖱️ 右键拖拽: 平移视角</li>
                    <li>🖱️ 滚轮: 缩放大小</li>
                    <li>📱 触摸: 支持手势操作</li>
                </ul>
            </div>

            <div class="environment-info">
                <h4>🏠 虚拟场景</h4>
                <p>现代客厅环境 • 木质茶几 • 自然光照</p>
            </div>
        </div>
    </div>

    <script>
        class InteriorBowlViewer {
            constructor() {
                this.scene = null;
                this.camera = null;
                this.renderer = null;
                this.controls = null;
                this.bowlModel = null;
                this.roomModel = null;
                this.lights = {};
                this.currentLighting = 'daylight';
                this.isWireframe = false;
                this.isExploded = false;
                this.originalPositions = new Map();
                
                this.init();
            }

            init() {
                this.setupScene();
                this.setupCamera();
                this.setupRenderer();
                this.setupLighting();
                this.setupControls();
                this.createRoom();
                this.loadBowl();
                this.bindEvents();
                this.animate();
            }

            setupScene() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x1a1a2e);
                this.scene.fog = new THREE.Fog(0x1a1a2e, 10, 50);
            }

            setupCamera() {
                const container = document.getElementById('viewer3d');
                this.camera = new THREE.PerspectiveCamera(
                    50,
                    container.clientWidth / container.clientHeight,
                    0.1,
                    100
                );
                this.camera.position.set(3, 2, 3);
            }

            setupRenderer() {
                const container = document.getElementById('viewer3d');
                this.renderer = new THREE.WebGLRenderer({ 
                    antialias: true,
                    alpha: true 
                });
                this.renderer.setSize(container.clientWidth, container.clientHeight);
                this.renderer.shadowMap.enabled = true;
                this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
                this.renderer.toneMappingExposure = 1.2;
                this.renderer.outputEncoding = THREE.sRGBEncoding;
                
                container.appendChild(this.renderer.domElement);
                
                window.addEventListener('resize', () => {
                    this.camera.aspect = container.clientWidth / container.clientHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(container.clientWidth, container.clientHeight);
                });
            }

            setupLighting() {
                // 环境光
                this.lights.ambient = new THREE.AmbientLight(0x404040, 0.4);
                this.scene.add(this.lights.ambient);

                // 主光源 - 日光
                this.lights.directional = new THREE.DirectionalLight(0xffffff, 1);
                this.lights.directional.position.set(5, 10, 5);
                this.lights.directional.castShadow = true;
                this.lights.directional.shadow.mapSize.width = 2048;
                this.lights.directional.shadow.mapSize.height = 2048;
                this.scene.add(this.lights.directional);

                // 暖光
                this.lights.warm = new THREE.PointLight(0xffa500, 0.8, 20);
                this.lights.warm.position.set(-2, 3, 2);
                this.lights.warm.visible = false;
                this.scene.add(this.lights.warm);

                // 聚光灯
                this.lights.spot = new THREE.SpotLight(0xffffff, 1.5);
                this.lights.spot.position.set(0, 5, 0);
                this.lights.spot.angle = Math.PI / 6;
                this.lights.spot.penumbra = 0.1;
                this.lights.spot.visible = false;
                this.scene.add(this.lights.spot);

                // 环境光
                this.lights.soft = new THREE.HemisphereLight(0x87ceeb, 0x8b4513, 0.3);
                this.scene.add(this.lights.soft);
            }

            createRoom() {
                // 地板
                const floorGeometry = new THREE.PlaneGeometry(10, 10);
                const floorMaterial = new THREE.MeshLambertMaterial({ 
                    color: 0x8b4513,
                    transparent: true,
                    opacity: 0.8
                });
                const floor = new THREE.Mesh(floorGeometry, floorMaterial);
                floor.rotation.x = -Math.PI / 2;
                floor.position.y = -0.5;
                floor.receiveShadow = true;
                this.scene.add(floor);

                // 墙壁
                const wallGeometry = new THREE.PlaneGeometry(10, 5);
                const wallMaterial = new THREE.MeshLambertMaterial({ 
                    color: 0x2c3e50,
                    transparent: true,
                    opacity: 0.3
                });
                
                const backWall = new THREE.Mesh(wallGeometry, wallMaterial);
                backWall.position.set(0, 2, -5);
                this.scene.add(backWall);

                // 茶几
                const tableGeometry = new THREE.BoxGeometry(2, 0.1, 1);
                const tableMaterial = new THREE.MeshLambertMaterial({ color: 0x654321 });
                const table = new THREE.Mesh(tableGeometry, tableMaterial);
                table.position.set(0, 0, 0);
                table.castShadow = true;
                table.receiveShadow = true;
                this.scene.add(table);

                // 桌腿
                const legGeometry = new THREE.CylinderGeometry(0.05, 0.05, 0.5);
                const legMaterial = new THREE.MeshLambertMaterial({ color: 0x654321 });
                
                const positions = [
                    [-0.9, -0.25, 0.4],
                    [0.9, -0.25, 0.4],
                    [-0.9, -0.25, -0.4],
                    [0.9, -0.25, -0.4]
                ];
                
                positions.forEach(pos => {
                    const leg = new THREE.Mesh(legGeometry, legMaterial);
                    leg.position.set(...pos);
                    leg.castShadow = true;
                    this.scene.add(leg);
                });

                this.roomModel = { floor, table };
            }

            loadBowl() {
                const loadingOverlay = document.getElementById('loadingOverlay');
                loadingOverlay.style.display = 'flex';

                const loader = new THREE.GLTFLoader();
                
                // 使用提供的碗模型
                loader.load(
                    './model/ea161f57f687fde2af6e0d6d48514563.glb',
                    (gltf) => {
                        this.bowlModel = gltf.scene;
                        this.bowlModel.scale.set(0.5, 0.5, 0.5);
                        this.bowlModel.position.set(0, 0.15, 0);
                        this.bowlModel.traverse((child) => {
                            if (child.isMesh) {
                                child.castShadow = true;
                                child.receiveShadow = true;
                                if (this.isWireframe) {
                                    child.material.wireframe = true;
                                }
                            }
                        });
                        
                        this.scene.add(this.bowlModel);
                        loadingOverlay.style.display = 'none';
                        
                        // 自动调整相机
                        this.adjustCameraToBowl();
                    },
                    (progress) => {
                        const percent = (progress.loaded / progress.total * 100).toFixed(0);
                        loadingOverlay.querySelector('div:last-child').textContent = `加载中... ${percent}%`;
                    },
                    (error) => {
                        console.error('加载碗模型失败:', error);
                        loadingOverlay.innerHTML = `
                            <div style="color: #ff6b6b;">加载失败</div>
                            <div style="font-size: 14px; margin-top: 10px;">
                                请确保碗模型文件存在<br>
                                路径: ./model/ea161f57f687fde2af6e0d6d48514563.glb
                            </div>
                        `;
                    }
                );
            }

            adjustCameraToBowl() {
                if (!this.bowlModel) return;
                
                const box = new THREE.Box3().setFromObject(this.bowlModel);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                
                const maxDim = Math.max(size.x, size.y, size.z);
                const fov = this.camera.fov * (Math.PI / 180);
                let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
                
                cameraZ *= 1.5;
                this.camera.position.set(cameraZ, cameraZ * 0.6, cameraZ);
                this.controls.target.copy(center);
            }

            setupControls() {
                this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
                this.controls.enableDamping = true;
                this.controls.dampingFactor = 0.05;
                this.controls.maxDistance = 10;
                this.controls.minDistance = 0.5;
                this.controls.autoRotate = false;
                this.controls.autoRotateSpeed = 1.0;
                
                this.controls.enablePan = true;
                this.controls.enableZoom = true;
                this.controls.enableRotate = true;
            }

            setLighting(scene) {
                Object.keys(this.lights).forEach(key => {
                    if (key !== 'ambient' && key !== 'soft') {
                        this.lights[key].visible = false;
                    }
                });

                switch(scene) {
                    case 'daylight':
                        this.lights.directional.visible = true;
                        this.lights.directional.intensity = 1;
                        break;
                    case 'warm':
                        this.lights.warm.visible = true;
                        this.lights.directional.intensity = 0.3;
                        break;
                    case 'spotlight':
                        this.lights.spot.visible = true;
                        this.lights.spot.target = this.bowlModel;
                        break;
                    case 'ambient':
                        this.lights.directional.intensity = 0.2;
                        break;
                }
            }

            toggleWireframe() {
                this.isWireframe = !this.isWireframe;
                if (this.bowlModel) {
                    this.bowlModel.traverse((child) => {
                        if (child.isMesh) {
                            child.material.wireframe = this.isWireframe;
                        }
                    });
                }
                document.getElementById('toggleWireframeBtn').classList.toggle('active', this.isWireframe);
            }

            toggleExploded() {
                if (!this.bowlModel) return;
                
                this.isExploded = !this.isExploded;
                
                if (this.isExploded) {
                    // 简单的爆炸效果
                    this.bowlModel.scale.multiplyScalar(1.2);
                    this.bowlModel.position.y += 0.1;
                } else {
                    this.bowlModel.scale.multiplyScalar(1/1.2);
                    this.bowlModel.position.y -= 0.1;
                }
                
                document.getElementById('toggleExplodedBtn').classList.toggle('active', this.isExploded);
            }

            zoomIn() {
                const distance = this.camera.position.distanceTo(this.controls.target);
                this.camera.position.lerp(this.controls.target, 0.2);
            }

            zoomOut() {
                const direction = new THREE.Vector3().subVectors(this.camera.position, this.controls.target).normalize();
                this.camera.position.add(direction.multiplyScalar(0.5));
            }

            bindEvents() {
                document.getElementById('resetViewBtn').addEventListener('click', () => {
                    this.adjustCameraToBowl();
                });

                document.getElementById('autoRotateBtn').addEventListener('click', (e) => {
                    this.controls.autoRotate = !this.controls.autoRotate;
                    e.target.classList.toggle('active', this.controls.autoRotate);
                });

                document.getElementById('zoomInBtn').addEventListener('click', () => this.zoomIn());
                document.getElementById('zoomOutBtn').addEventListener('click', () => this.zoomOut());
                document.getElementById('toggleWireframeBtn').addEventListener('click', () => this.toggleWireframe());
                document.getElementById('toggleExplodedBtn').addEventListener('click', () => this.toggleExploded());

                // 灯光控制
                document.querySelectorAll('.light-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        document.querySelectorAll('.light-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.setLighting(e.target.dataset.scene);
                    });
                });
            }

            animate() {
                requestAnimationFrame(() => this.animate());
                this.controls.update();
                this.renderer.render(this.scene, this.camera);
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            new InteriorBowlViewer();
        });
    </script>
</body>
</html>
