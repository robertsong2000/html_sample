<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raindrop Effect - 雨滴效果</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            z-index: 10;
            text-shadow: 0 0 10px rgba(150, 200, 255, 0.8);
            pointer-events: none;
        }

        .info span {
            display: block;
            margin: 5px 0;
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                bottom: 10px;
                left: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="rain"></canvas>
    <div class="info">
        <span>🖱️ 移动鼠标 - 改变风向</span>
        <span>👆 点击 - 产生水花溅射</span>
    </div>

    <script>
        const canvas = document.getElementById('rain');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Mouse tracking
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });

        // Click splash effect
        canvas.addEventListener('click', (e) => {
            createSplash(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            createSplash(e.touches[0].clientX, e.touches[0].clientY);
        });

        // Raindrop class
        class Raindrop {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * -canvas.height;
                this.length = 15 + Math.random() * 25;
                this.speed = 12 + Math.random() * 8;
                this.thickness = 1 + Math.random() * 1.5;
                this.alpha = 0.3 + Math.random() * 0.4;
            }

            update(windX) {
                this.y += this.speed;
                this.x += windX * 0.5;

                if (this.y > canvas.height) {
                    // Create splash at bottom
                    if (Math.random() > 0.7) {
                        createRipple(this.x, canvas.height - 5);
                    }
                    this.reset();
                }

                if (this.x < -50) this.x = canvas.width + 50;
                if (this.x > canvas.width + 50) this.x = -50;
            }

            draw(windX) {
                const endX = this.x + windX * 2;
                const endY = this.y + this.length;

                const gradient = ctx.createLinearGradient(this.x, this.y, endX, endY);
                gradient.addColorStop(0, `rgba(150, 200, 255, 0)`);
                gradient.addColorStop(0.3, `rgba(150, 200, 255, ${this.alpha})`);
                gradient.addColorStop(1, `rgba(200, 230, 255, ${this.alpha * 0.5})`);

                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(endX, endY);
                ctx.strokeStyle = gradient;
                ctx.lineWidth = this.thickness;
                ctx.lineCap = 'round';
                ctx.stroke();
            }
        }

        // Splash particle class
        class SplashParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 0.8;
                const speed = 2 + Math.random() * 5;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.size = 1 + Math.random() * 2;
                this.alpha = 1;
                this.gravity = 0.15;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.alpha -= 0.025;
                this.size *= 0.98;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(180, 220, 255, ${this.alpha})`;
                ctx.fill();
            }

            isDead() {
                return this.alpha <= 0;
            }
        }

        // Ripple class
        class Ripple {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = 20 + Math.random() * 30;
                this.alpha = 0.6;
                this.speed = 1 + Math.random();
            }

            update() {
                this.radius += this.speed;
                this.alpha = 0.6 * (1 - this.radius / this.maxRadius);
            }

            draw() {
                if (this.alpha <= 0) return;

                ctx.beginPath();
                ctx.ellipse(this.x, this.y, this.radius, this.radius * 0.4, 0, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(150, 200, 255, ${this.alpha})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            isDead() {
                return this.radius >= this.maxRadius;
            }
        }

        // Create splash effect
        function createSplash(x, y) {
            for (let i = 0; i < 15; i++) {
                splashParticles.push(new SplashParticle(x, y));
            }
            // Create ripples
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    ripples.push(new Ripple(x, y));
                }, i * 50);
            }
        }

        // Create ripple
        function createRipple(x, y) {
            ripples.push(new Ripple(x, y));
        }

        // Initialize raindrops
        const raindrops = [];
        const raindropCount = 200;
        for (let i = 0; i < raindropCount; i++) {
            const drop = new Raindrop();
            drop.y = Math.random() * canvas.height; // Spread initially
            raindrops.push(drop);
        }

        // Splash particles array
        let splashParticles = [];

        // Ripples array
        let ripples = [];

        // Background lightning effect
        let lightning = {
            active: false,
            alpha: 0,
            x: 0,
            branches: []
        };

        function createLightning() {
            if (Math.random() > 0.995) {
                lightning.active = true;
                lightning.alpha = 0.8;
                lightning.x = Math.random() * canvas.width;
                lightning.branches = generateLightningBranches(lightning.x, 0, canvas.height * 0.7);
            }
        }

        function generateLightningBranches(x, y, length) {
            const branches = [];
            let currentX = x;
            let currentY = y;
            const segments = 10 + Math.floor(Math.random() * 10);

            for (let i = 0; i < segments; i++) {
                const nextX = currentX + (Math.random() - 0.5) * 80;
                const nextY = currentY + length / segments;
                branches.push({ x1: currentX, y1: currentY, x2: nextX, y2: nextY });

                // Random branch
                if (Math.random() > 0.7) {
                    const branchLength = length * 0.3 * Math.random();
                    const branchEndX = nextX + (Math.random() - 0.5) * 60;
                    const branchEndY = nextY + branchLength;
                    branches.push({ x1: nextX, y1: nextY, x2: branchEndX, y2: branchEndY, isBranch: true });
                }

                currentX = nextX;
                currentY = nextY;
            }

            return branches;
        }

        function drawLightning() {
            if (!lightning.active) return;

            lightning.alpha -= 0.05;
            if (lightning.alpha <= 0) {
                lightning.active = false;
                return;
            }

            ctx.save();
            ctx.globalAlpha = lightning.alpha;
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#fff';

            lightning.branches.forEach(branch => {
                ctx.beginPath();
                ctx.moveTo(branch.x1, branch.y1);
                ctx.lineTo(branch.x2, branch.y2);
                ctx.strokeStyle = branch.isBranch ? 'rgba(200, 220, 255, 0.6)' : '#fff';
                ctx.lineWidth = branch.isBranch ? 1 : 2;
                ctx.stroke();
            });

            ctx.restore();

            // Flash effect
            ctx.fillStyle = `rgba(200, 220, 255, ${lightning.alpha * 0.1})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Cloud effect
        class Cloud {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = 50 + Math.random() * 100;
                this.width = 200 + Math.random() * 300;
                this.height = 40 + Math.random() * 60;
                this.speed = 0.2 + Math.random() * 0.3;
                this.alpha = 0.3 + Math.random() * 0.3;
            }

            update() {
                this.x += this.speed;
                if (this.x > canvas.width + this.width) {
                    this.x = -this.width;
                }
            }

            draw() {
                const gradient = ctx.createRadialGradient(
                    this.x + this.width / 2, this.y,
                    0,
                    this.x + this.width / 2, this.y,
                    this.width / 2
                );
                gradient.addColorStop(0, `rgba(80, 100, 120, ${this.alpha})`);
                gradient.addColorStop(1, 'transparent');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.ellipse(this.x + this.width / 2, this.y, this.width / 2, this.height / 2, 0, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Create clouds
        const clouds = [];
        for (let i = 0; i < 5; i++) {
            clouds.push(new Cloud());
        }

        // Animation loop
        let time = 0;

        function animate() {
            time++;

            // Calculate wind based on mouse position
            const windX = ((mouseX - canvas.width / 2) / canvas.width) * 5;

            // Draw gradient sky
            const skyGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGradient.addColorStop(0, '#1a1a2e');
            skyGradient.addColorStop(0.3, '#16213e');
            skyGradient.addColorStop(1, '#0f0f1a');
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw clouds
            clouds.forEach(cloud => {
                cloud.update();
                cloud.draw();
            });

            // Update and draw raindrops
            raindrops.forEach(drop => {
                drop.update(windX);
                drop.draw(windX);
            });

            // Update and draw ripples
            ripples = ripples.filter(ripple => {
                ripple.update();
                ripple.draw();
                return !ripple.isDead();
            });

            // Update and draw splash particles
            splashParticles = splashParticles.filter(particle => {
                particle.update();
                particle.draw();
                return !particle.isDead();
            });

            // Lightning effect
            createLightning();
            drawLightning();

            // Ground reflection
            const groundGradient = ctx.createLinearGradient(0, canvas.height - 50, 0, canvas.height);
            groundGradient.addColorStop(0, 'transparent');
            groundGradient.addColorStop(1, 'rgba(30, 50, 70, 0.3)');
            ctx.fillStyle = groundGradient;
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);

            // Mist effect at bottom
            ctx.fillStyle = `rgba(100, 130, 160, ${0.05 + Math.sin(time * 0.02) * 0.02})`;
            ctx.fillRect(0, canvas.height - 30, canvas.width, 30);

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
