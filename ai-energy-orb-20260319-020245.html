<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>能量球 - Energy Orb</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: radial-gradient(circle at center, #0a0a2e 0%, #000000 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(0, 255, 255, 0.9);
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 12px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 
                0 0 20px rgba(0, 255, 255, 1),
                0 0 40px rgba(0, 200, 255, 0.8),
                0 0 60px rgba(0, 150, 255, 0.6);
            animation: energyPulse 2s ease-in-out infinite;
        }
        
        @keyframes energyPulse {
            0%, 100% { 
                transform: translateX(-50%) scale(1);
                text-shadow: 0 0 20px rgba(0, 255, 255, 1), 0 0 40px rgba(0, 200, 255, 0.8);
            }
            50% { 
                transform: translateX(-50%) scale(1.05);
                text-shadow: 0 0 30px rgba(0, 255, 255, 1), 0 0 60px rgba(0, 200, 255, 0.9);
            }
        }
        
        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 10;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90%;
        }
        
        .btn {
            padding: 10px 20px;
            background: rgba(0, 255, 255, 0.1);
            border: 1px solid rgba(0, 255, 255, 0.4);
            color: rgba(100, 255, 255, 0.9);
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .btn:hover {
            background: rgba(0, 255, 255, 0.2);
            border-color: rgba(0, 255, 255, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 255, 0.4);
        }
        
        .btn.active {
            background: rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
        }
        
        .info {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(100, 200, 255, 0.5);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
            text-align: center;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(100, 200, 255, 0.4);
            font-size: 11px;
            z-index: 10;
            pointer-events: none;
            text-align: right;
        }
        
        .orb-info {
            position: fixed;
            bottom: 90px;
            left: 20px;
            color: rgba(100, 200, 255, 0.4);
            font-size: 11px;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="title">⚡ ENERGY ⚡</div>
    
    <div class="info">
        🖱️ 移动鼠标 - 控制能量球 | 🎨 点击 - 能量爆发 | ⚙️ 滚轮 - 调整能量强度
    </div>
    
    <div class="stats" id="stats">
        能量: 100% | 粒子: 0 | FPS: 60
    </div>
    
    <div class="orb-info" id="orbInfo">
        模式: 等离子 | 大小: 中等
    </div>
    
    <div class="controls">
        <button class="btn" onclick="changeOrbType()">🔮 能量球类型</button>
        <button class="btn" onclick="changeColorScheme()">🎨 配色方案</button>
        <button class="btn" onclick="toggleRings()">⭕ 能量环</button>
        <button class="btn" onclick="toggleParticles()">✨ 能量粒子</button>
        <button class="btn" onclick="toggleShield()">🛡️ 护盾效果</button>
        <button class="btn" onclick="resetOrb()">🔄 重置能量球</button>
    </div>
    
    <canvas id="canvas"></canvas>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height, centerX, centerY;
        let mouseX = 0, mouseY = 0;
        let targetMouseX = 0, targetMouseY = 0;
        let energy = 1;
        let time = 0;
        
        // 性能监控
        let frameCount = 0;
        let lastFpsUpdate = Date.now();
        let currentFps = 60;
        
        // 能量球类型
        const orbTypes = [
            { name: '等离子', type: 'plasma' },
            { name: '火焰', type: 'fire' },
            { name: '冰霜', type: 'ice' },
            { name: '雷电', type: 'lightning' },
            { name: '暗物质', type: 'dark' }
        ];
        let currentType = 0;
        
        // 配色方案
        const colorSchemes = [
            { name: '量子蓝', primary: '#00ffff', secondary: '#0088ff', accent: '#0044ff' },
            { name: '能量紫', primary: '#ff00ff', secondary: '#aa00ff', accent: '#6600ff' },
            { name: '熔岩橙', primary: '#ff8800', secondary: '#ff4400', accent: '#ff0000' },
            { name: '极光绿', primary: '#00ff88', secondary: '#00ff44', accent: '#88ff00' },
            { name: '星云金', primary: '#ffdd00', secondary: '#ffaa00', accent: '#ff8800' }
        ];
        let currentColorScheme = 0;
        
        let ringsEnabled = true;
        let particlesEnabled = true;
        let shieldEnabled = true;
        
        // 能量粒子
        class EnergyParticle {
            constructor(x, y, angle) {
                this.x = x;
                this.y = y;
                this.angle = angle || Math.random() * Math.PI * 2;
                this.speed = 1 + Math.random() * 3;
                this.size = 1 + Math.random() * 2;
                this.life = 1;
                this.decay = 0.01 + Math.random() * 0.02;
                this.color = colorSchemes[currentColorScheme].primary;
            }
            
            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                this.life -= this.decay;
                return this.life > 0;
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life;
                ctx.fill();
                
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            }
        }
        
        let particles = [];
        
        // 绘制能量球核心
        function drawOrbCore(x, y) {
            const scheme = colorSchemes[currentColorScheme];
            const radius = 80 * energy;
            const pulse = Math.sin(time * 3) * 0.2 + 1;
            
            // 多层光晕
            for (let i = 5; i >= 0; i--) {
                const r = radius * (1 + i * 0.3) * pulse;
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, r);
                
                gradient.addColorStop(0, scheme.primary + 'aa');
                gradient.addColorStop(0.4, scheme.secondary + '66');
                gradient.addColorStop(0.7, scheme.accent + '33');
                gradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // 核心亮点
            const coreGradient = ctx.createRadialGradient(x, y, 0, x, y, radius * 0.3);
            coreGradient.addColorStop(0, '#ffffff');
            coreGradient.addColorStop(0.5, scheme.primary);
            coreGradient.addColorStop(1, 'transparent');
            
            ctx.fillStyle = coreGradient;
            ctx.beginPath();
            ctx.arc(x, y, radius * 0.3, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // 绘制能量环
        function drawEnergyRings(x, y) {
            if (!ringsEnabled) return;
            
            const scheme = colorSchemes[currentColorScheme];
            
            for (let i = 0; i < 3; i++) {
                const radius = (120 + i * 40) * energy;
                const rotation = time * (1 + i * 0.5);
                
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(rotation);
                
                // 绘制环
                ctx.beginPath();
                ctx.arc(0, 0, radius, 0, Math.PI * 1.5);
                ctx.strokeStyle = scheme.primary;
                ctx.lineWidth = 2;
                ctx.globalAlpha = 0.6 - i * 0.15;
                ctx.stroke();
                
                // 发光
                ctx.shadowBlur = 15;
                ctx.shadowColor = scheme.primary;
                ctx.stroke();
                ctx.shadowBlur = 0;
                
                ctx.restore();
            }
            
            ctx.globalAlpha = 1;
        }
        
        // 绘制护盾
        function drawShield(x, y) {
            if (!shieldEnabled) return;
            
            const scheme = colorSchemes[currentColorScheme];
            const radius = 200 * energy;
            
            // 护盾网格
            ctx.strokeStyle = scheme.secondary;
            ctx.lineWidth = 1;
            ctx.globalAlpha = 0.2;
            
            // 六边形网格
            for (let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2 + time * 0.5;
                
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(
                    x + Math.cos(angle) * radius,
                    y + Math.sin(angle) * radius
                );
                ctx.stroke();
            }
            
            // 护盾边缘
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.strokeStyle = scheme.primary;
            ctx.lineWidth = 2;
            ctx.globalAlpha = 0.3;
            ctx.stroke();
            
            ctx.shadowBlur = 20;
            ctx.shadowColor = scheme.primary;
            ctx.stroke();
            ctx.shadowBlur = 0;
            ctx.globalAlpha = 1;
        }
        
        // 生成能量粒子
        function generateParticles() {
            if (!particlesEnabled) return;
            
            // 从能量球中心发射粒子
            if (Math.random() > 0.7) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 80 * energy;
                const x = mouseX + Math.cos(angle) * radius;
                const y = mouseY + Math.sin(angle) * radius;
                particles.push(new EnergyParticle(x, y, angle));
            }
        }
        
        // 初始化
        function init() {
            resize();
            window.addEventListener('resize', resize);
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }
        
        // 动画循环
        let lastTime = 0;
        const targetFPS = 60;
        const interval = 1000 / targetFPS;
        
        function animate(currentTime) {
            requestAnimationFrame(animate);
            
            const delta = currentTime - lastTime;
            if (delta < interval) return;
            lastTime = currentTime - (delta % interval);
            
            // FPS计算
            frameCount++;
            if (currentTime - lastFpsUpdate >= 1000) {
                currentFps = frameCount;
                frameCount = 0;
                lastFpsUpdate = currentTime;
                updateStats();
            }
            
            time += 0.016;
            
            // 平滑鼠标
            mouseX += (targetMouseX - mouseX) * 0.1;
            mouseY += (targetMouseY - mouseY) * 0.1;
            
            // 清除画布
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // 生成粒子
            generateParticles();
            
            // 绘制护盾
            drawShield(mouseX, mouseY);
            
            // 绘制能量环
            drawEnergyRings(mouseX, mouseY);
            
            // 绘制能量球核心
            drawOrbCore(mouseX, mouseY);
            
            // 更新和绘制粒子
            particles = particles.filter(p => {
                const alive = p.update();
                if (alive) p.draw();
                return alive;
            });
            
            // 限制粒子数量
            if (particles.length > 300) {
                particles = particles.slice(-300);
            }
            
            updateStats();
        }
        
        function updateStats() {
            const energyPercent = Math.floor(energy * 100);
            document.getElementById('stats').textContent = 
                `能量: ${energyPercent}% | 粒子: ${particles.length} | FPS: ${currentFps}`;
            
            const typeName = orbTypes[currentType].name;
            const size = energy < 0.7 ? '小型' : energy < 1.3 ? '中等' : '大型';
            document.getElementById('orbInfo').textContent = 
                `模式: ${typeName} | 大小: ${size}`;
        }
        
        // 事件处理
        canvas.addEventListener('mousemove', (e) => {
            targetMouseX = e.clientX;
            targetMouseY = e.clientY;
        });
        
        canvas.addEventListener('click', (e) => {
            // 能量爆发
            for (let i = 0; i < 50; i++) {
                const angle = (i / 50) * Math.PI * 2;
                particles.push(new EnergyParticle(e.clientX, e.clientY, angle));
            }
            
            // 限制粒子数量
            if (particles.length > 400) {
                particles = particles.slice(-400);
            }
            
            updateStats();
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            energy = Math.max(0.5, Math.min(1.5, energy - e.deltaY * 0.001));
            updateStats();
        });
        
        // 控制函数
        function changeOrbType() {
            currentType = (currentType + 1) % orbTypes.length;
            updateStats();
        }
        
        function changeColorScheme() {
            currentColorScheme = (currentColorScheme + 1) % colorSchemes.length;
            particles.forEach(p => p.color = colorSchemes[currentColorScheme].primary);
        }
        
        function toggleRings() {
            ringsEnabled = !ringsEnabled;
            event.target.classList.toggle('active', !ringsEnabled);
        }
        
        function toggleParticles() {
            particlesEnabled = !particlesEnabled;
            event.target.classList.toggle('active', !particlesEnabled);
            if (!particlesEnabled) particles = [];
        }
        
        function toggleShield() {
            shieldEnabled = !shieldEnabled;
            event.target.classList.toggle('active', !shieldEnabled);
        }
        
        function resetOrb() {
            energy = 1;
            currentType = 0;
            currentColorScheme = 0;
            ringsEnabled = true;
            particlesEnabled = true;
            shieldEnabled = true;
            particles = [];
            
            document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
            updateStats();
        }
        
        // 启动
        init();
        animate(0);
    </script>
</body>
</html>
