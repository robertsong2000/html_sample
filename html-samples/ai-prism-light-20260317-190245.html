<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>棱镜光芒 - Prism Light</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0a0a15; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
        .info {
            position: fixed; bottom: 20px; left: 20px; color: rgba(255,255,255,0.9);
            font-size: 14px; z-index: 10; background: rgba(10,10,20,0.8);
            padding: 15px 20px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2); max-width: 280px;
        }
        .info h3 { margin-bottom: 10px; font-size: 16px; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.5); }
        .info p { margin: 5px 0; font-size: 12px; line-height: 1.6; }
        .info .key { color: #ff88ff; font-weight: bold; }
        .stats {
            position: fixed; top: 20px; right: 20px; color: rgba(255,255,255,0.7);
            font-size: 12px; z-index: 10; background: rgba(10,10,20,0.8);
            padding: 10px 15px; border-radius: 8px; font-family: monospace;
        }
    </style>
</head>
<body>
    <canvas id="prism"></canvas>
    <div class="info">
        <h3>💎 棱镜光芒</h3>
        <p><span class="key">移动鼠标</span> - 控制光源方向</p>
        <p><span class="key">点击</span> - 产生光芒爆发</p>
        <p><span class="key">滚轮</span> - 调整棱镜数量</p>
        <p><span class="key">空格</span> - 切换颜色模式</p>
    </div>
    <div class="stats" id="stats">FPS: 60 | 棱镜: 0</div>

    <script>
        const canvas = document.getElementById('prism');
        const ctx = canvas.getContext('2d');
        const statsEl = document.getElementById('stats');
        
        let width, height, centerX, centerY;
        let mouseX = 0, mouseY = 0;
        let prismCount = 5;
        let colorMode = 0;
        let time = 0;
        
        const colorModes = [
            { name: '彩虹', colors: ['#ff0040', '#ff8000', '#ffff00', '#00ff00', '#00ffff', '#0080ff', '#8000ff'] },
            { name: '极光', colors: ['#00ff88', '#00ffcc', '#00ffff', '#88ffff', '#ccffff'] },
            { name: '日落', colors: ['#ff4444', '#ff6644', '#ff8844', '#ffaa44', '#ffcc44'] },
            { name: '海洋', colors: ['#0044aa', '#0066cc', '#0088ee', '#00aaff', '#44ccff'] }
        ];
        
        class Prism {
            constructor() { this.reset(); }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = 30 + Math.random() * 40;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = 0.002 + Math.random() * 0.003;
                this.sides = 3 + Math.floor(Math.random() * 4);
                this.pulsePhase = Math.random() * Math.PI * 2;
                this.pulseSpeed = 0.02 + Math.random() * 0.02;
            }
            
            update() {
                this.rotation += this.rotationSpeed;
                this.pulsePhase += this.pulseSpeed;
                this.currentSize = this.size * (0.9 + Math.sin(this.pulsePhase) * 0.1);
            }
            
            draw(ctx, lightSource) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                // 光照效果
                const lightAngle = Math.atan2(lightSource.y - this.y, lightSource.x - this.x);
                const lightDist = Math.sqrt((lightSource.x - this.x) ** 2 + (lightSource.y - this.y) ** 2);
                const brightness = Math.max(0.3, 1 - lightDist / 500);
                
                // 绘制棱镜
                ctx.beginPath();
                for (let i = 0; i <= this.sides; i++) {
                    const angle = (i / this.sides) * Math.PI * 2 - Math.PI / 2;
                    const x = Math.cos(angle) * this.currentSize;
                    const y = Math.sin(angle) * this.currentSize;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                
                // 玻璃效果
                const gradient = ctx.createLinearGradient(-this.currentSize, -this.currentSize, this.currentSize, this.currentSize);
                gradient.addColorStop(0, `rgba(255,255,255,${0.3 * brightness})`);
                gradient.addColorStop(0.5, `rgba(200,200,255,${0.2 * brightness})`);
                gradient.addColorStop(1, `rgba(150,150,200,${0.1 * brightness})`);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // 边缘发光
                ctx.strokeStyle = `rgba(255,255,255,${0.5 * brightness})`;
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.restore();
            }
            
            generateRays(lightSource) {
                const colors = colorModes[colorMode].colors;
                const rayCount = colors.length;
                
                for (let i = 0; i < rayCount; i++) {
                    const angle = Math.atan2(this.y - lightSource.y, this.x - lightSource.x);
                    const rayAngle = angle + (i - rayCount / 2) * 0.3;
                    
                    lightRays.push(new LightRay(
                        this.x, this.y,
                        rayAngle,
                        colors[i],
                        100 + Math.random() * 100
                    ));
                }
            }
        }
        
        class LightRay {
            constructor(x, y, angle, color, length) {
                this.startX = x;
                this.startY = y;
                this.angle = angle;
                this.color = color;
                this.length = length;
                this.speed = 15;
                this.alpha = 1;
                this.segments = [];
                this.generateSegments();
            }
            
            generateSegments() {
                let x = this.startX;
                let y = this.startY;
                
                for (let i = 0; i < 20; i++) {
                    const progress = i / 20;
                    const currentX = x + Math.cos(this.angle) * this.length * progress;
                    const currentY = y + Math.sin(this.angle) * this.length * progress;
                    
                    this.segments.push({ x: currentX, y: currentY, alpha: this.alpha * (1 - progress * 0.8) });
                }
            }
            
            update() {
                this.startX += Math.cos(this.angle) * this.speed;
                this.startY += Math.sin(this.angle) * this.speed;
                this.alpha -= 0.02;
                
                return this.alpha > 0;
            }
            
            draw(ctx) {
                if (this.alpha <= 0) return;
                
                ctx.beginPath();
                ctx.moveTo(this.segments[0].x, this.segments[0].y);
                
                for (let i = 1; i < this.segments.length; i++) {
                    ctx.lineTo(this.segments[i].x, this.segments[i].y);
                }
                
                ctx.strokeStyle = this.hexToRgba(this.color, this.alpha * 0.8);
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.stroke();
                
                // 发光效果
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
            
            hexToRgba(hex, alpha) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            }
        }
        
        class GlowParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 4;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.size = 2 + Math.random() * 3;
                this.color = colorModes[colorMode].colors[Math.floor(Math.random() * colorModes[colorMode].colors.length)];
                this.decay = 0.02 + Math.random() * 0.02;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.1;
                this.alpha -= this.decay;
                return this.alpha > 0;
            }
            
            draw(ctx) {
                if (this.alpha <= 0) return;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.alpha, 0, Math.PI * 2);
                ctx.fillStyle = this.hexToRgba(this.color, this.alpha);
                ctx.fill();
            }
            
            hexToRgba(hex, alpha) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            }
        }
        
        let prisms = [];
        let lightRays = [];
        let glowParticles = [];
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        
        function init() {
            resize();
            createPrisms();
        }
        
        function resize() {
            const dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            ctx.scale(dpr, dpr);
            centerX = width / 2;
            centerY = height / 2;
        }
        
        function createPrisms() {
            prisms = [];
            for (let i = 0; i < prismCount; i++) {
                prisms.push(new Prism());
            }
        }
        
        function createBurst(x, y) {
            for (let i = 0; i < 30; i++) {
                glowParticles.push(new GlowParticle(x, y));
            }
        }
        
        function drawBackground() {
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, Math.max(width, height) / 2);
            gradient.addColorStop(0, '#151525');
            gradient.addColorStop(1, '#0a0a15');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }
        
        function drawCentralLight() {
            const lightX = centerX + (mouseX - centerX) * 0.1;
            const lightY = centerY + (mouseY - centerY) * 0.1;
            
            const glow = ctx.createRadialGradient(lightX, lightY, 0, lightX, lightY, 150);
            glow.addColorStop(0, 'rgba(255,255,255,0.8)');
            glow.addColorStop(0.3, 'rgba(255,255,255,0.3)');
            glow.addColorStop(1, 'transparent');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(lightX, lightY, 150, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(lightX, lightY, 20, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            
            return { x: lightX, y: lightY };
        }
        
        function generateLightRays(lightSource) {
            lightRays = [];
            const colors = colorModes[colorMode].colors;
            const rayCount = colors.length;
            
            prisms.forEach(prism => {
                const angle = Math.atan2(prism.y - lightSource.y, prism.x - lightSource.x);
                const rayAngle = angle + (Math.random() - 0.5) * 0.5;
                
                lightRays.push(new LightRay(
                    prism.x, prism.y,
                    rayAngle,
                    colors[Math.floor(Math.random() * colors.length)],
                    100 + Math.random() * 100
                ));
            });
        }
        
        function animate(currentTime) {
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
            }
            
            time++;
            
            ctx.fillStyle = 'rgba(10, 10, 21, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            const lightSource = drawCentralLight();
            
            prisms.forEach(prism => {
                prism.update();
                prism.draw(ctx, lightSource);
                prism.generateRays(lightSource);
            });
            
            lightRays = lightRays.filter(ray => {
                const alive = ray.update();
                if (alive) ray.draw(ctx);
                return alive;
            });
            
            glowParticles = glowParticles.filter(p => {
                const alive = p.update();
                if (alive) p.draw(ctx);
                return alive;
            });
            
            statsEl.textContent = `FPS: ${fps} | 棱镜: ${prisms.length} | ${colorModes[colorMode].name}`;
            requestAnimationFrame(animate);
        }
        
        window.addEventListener('resize', () => { resize(); createPrisms(); });
        canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
        canvas.addEventListener('click', e => { createBurst(e.clientX, e.clientY); });
        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            prismCount = Math.max(2, Math.min(15, prismCount - Math.sign(e.deltaY)));
            createPrisms();
        });
        document.addEventListener('keydown', e => {
            if (e.code === 'Space') { e.preventDefault(); colorMode = (colorMode + 1) % colorModes.length; }
        });
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const t = e.touches[0];
            mouseX = t.clientX;
 mouseY = t.clientY;
            createBurst(t.clientX, t.clientY);
        });
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const t = e.touches[0];
            mouseX = t.clientX; mouseY = t.clientY;
        });
        
        init();
        animate(performance.now());
    </script>
</body>
</html>
