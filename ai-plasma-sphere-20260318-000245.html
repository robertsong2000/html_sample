<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>等离子球 - Plasma Sphere</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #050510; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; position: fixed; top: 0; left: 0; width: 100%; height: 100%; }
        .info {
            position: fixed; bottom: 20px; left: 20px; color: rgba(150,200,255,0.9);
            font-size: 14px; z-index: 10; background: rgba(5,10,20,0.8);
            padding: 15px 20px; border-radius: 10px;
            border: 1px solid rgba(100,150,255,0.3); max-width: 280px;
        }
        .info h3 { margin-bottom: 10px; font-size: 16px; color: #88ccff; text-shadow: 0 0 20px rgba(100,180,255,0.6); }
        .info p { margin: 5px 0; font-size: 12px; line-height: 1.6; }
        .info .key { color: #99ddff; font-weight: bold; }
        .stats {
            position: fixed; top: 20px; right: 20px; color: rgba(255,255,255,0.7);
            font-size: 12px; z-index: 10; background: rgba(5,10,20,0.8);
            padding: 10px 15px; border-radius: 8px; font-family: monospace;
        }
    </style>
</head>
<body>
    <canvas id="plasma"></canvas>
    <div class="info">
        <h3>🔮 等离子球</h3>
        <p><span class="key">移动鼠标</span> - 控制电弧方向</p>
        <p><span class="key">点击</span> - 释放能量脉冲</p>
        <p><span class="key">滚轮</span> - 调整能量强度</p>
        <p><span class="key">空格</span> - 切换颜色模式</p>
    </div>
    <div class="stats" id="stats">FPS: 60 | 电弧: 0</div>

    <script>
        const canvas = document.getElementById('plasma');
        const ctx = canvas.getContext('2d');
        const statsEl = document.getElementById('stats');
        
        let width, height, centerX, centerY;
        let mouseX = 0, mouseY = 0;
        let energyLevel = 1;
        let colorMode = 0;
        let time = 0;
        
        const colorModes = [
            { name: '电蓝', core: '#4488ff', arc: '#88ccff', glow: '#2266dd' },
            { name: '紫电', core: '#aa44ff', arc: '#dd88ff', glow: '#8822dd' },
            { name: '青焰', core: '#00ddaa', arc: '#66ffcc', glow: '#00aa88' },
            { name: '金辉', core: '#ffaa00', arc: '#ffdd66', glow: '#dd8800' }
        ];
        
        // 电弧类
        class Arc {
            constructor(targetX, targetY) {
                this.startX = centerX;
                this.startY = centerY;
                this.targetX = targetX;
                this.targetY = targetY;
                this.segments = [];
                this.alpha = 1;
                this.decay = 0.03;
                this.generatePath();
            }
            
            generatePath() {
                const dx = this.targetX - this.startX;
                const dy = this.targetY - this.startY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const steps = Math.floor(dist / 10);
                
                let x = this.startX;
                let y = this.startY;
                
                for (let i = 0; i <= steps; i++) {
                    const progress = i / steps;
                    const baseX = this.startX + dx * progress;
                    const baseY = this.startY + dy * progress;
                    
                    // 闪电般的随机偏移
                    const offset = (1 - progress) * 30 * energyLevel;
                    const offsetX = (Math.random() - 0.5) * offset;
                    const offsetY = (Math.random() - 0.5) * offset;
                    
                    this.segments.push({
                        x: baseX + offsetX,
                        y: baseY + offsetY,
                        alpha: 1 - progress * 0.5
                    });
                }
            }
            
            update() {
                this.alpha -= this.decay;
                return this.alpha > 0;
            }
            
            draw(ctx, colors) {
                if (this.alpha <= 0 || this.segments.length < 2) return;
                
                // 外发光
                ctx.beginPath();
                ctx.moveTo(this.segments[0].x, this.segments[0].y);
                for (let i = 1; i < this.segments.length; i++) {
                    ctx.lineTo(this.segments[i].x, this.segments[i].y);
                }
                ctx.strokeStyle = `rgba(150, 200, 255, ${this.alpha * 0.3})`;
                ctx.lineWidth = 8;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.stroke();
                
                // 主线
                ctx.beginPath();
                ctx.moveTo(this.segments[0].x, this.segments[0].y);
                for (let i = 1; i < this.segments.length; i++) {
                    ctx.lineTo(this.segments[i].x, this.segments[i].y);
                }
                ctx.strokeStyle = colors.arc;
                ctx.lineWidth = 3;
                ctx.globalAlpha = this.alpha;
                ctx.stroke();
                
                // 核心
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.stroke();
                
                ctx.globalAlpha = 1;
            }
        }
        
        // 能量脉冲类
        class Pulse {
            constructor() {
                this.x = centerX;
                this.y = centerY;
                this.radius = 50;
                this.maxRadius = 300;
                this.speed = 8;
                this.alpha = 0.8;
            }
            
            update() {
                this.radius += this.speed;
                this.alpha = 0.8 * (1 - this.radius / this.maxRadius);
                return this.radius < this.maxRadius;
            }
            
            draw(ctx, colors) {
                if (this.alpha <= 0) return;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(150, 200, 255, ${this.alpha * 0.5})`;
                ctx.lineWidth = 3;
                ctx.stroke();
            }
        }
        
        // 内部粒子类
        class InnerParticle {
            constructor() { this.reset(); }
            
            reset() {
                const angle = Math.random() * Math.PI * 2;
                const dist = 20 + Math.random() * 30;
                this.x = centerX + Math.cos(angle) * dist;
                this.y = centerY + Math.sin(angle) * dist;
                this.angle = angle;
                this.speed = 0.02 + Math.random() * 0.03;
                this.size = 1 + Math.random() * 2;
                this.alpha = 0.5 + Math.random() * 0.5;
            }
            
            update() {
                this.angle += this.speed;
                const dist = 20 + Math.sin(time * 0.02 + this.angle) * 15;
                this.x = centerX + Math.cos(this.angle) * dist;
                this.y = centerY + Math.sin(this.angle) * dist;
            }
            
            draw(ctx) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.fill();
            }
        }
        
        let arcs = [];
        let pulses = [];
        let innerParticles = [];
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        let arcTimer = 0;
        
        function init() {
            resize();
            createInnerParticles();
        }
        
        function resize() {
            const dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            ctx.scale(dpr, dpr);
            centerX = width / 2;
            centerY = height / 2;
        }
        
        function createInnerParticles() {
            innerParticles = [];
            for (let i = 0; i < 30; i++) {
                innerParticles.push(new InnerParticle());
            }
        }
        
        function createArc(targetX, targetY) {
            arcs.push(new Arc(targetX, targetY));
        }
        
        function createPulse() {
            pulses.push(new Pulse());
        }
        
        function drawPlasmaSphere() {
            const colors = colorModes[colorMode];
            
            // 外部光晕
            for (let i = 3; i > 0; i--) {
                const gradient = ctx.createRadialGradient(centerX, centerY, 40, centerX, centerY, 60 + i * 20);
                gradient.addColorStop(0, 'transparent');
                gradient.addColorStop(0.5, colors.glow.replace(')', `, ${0.1 / i})`).replace('rgb', 'rgba').replace('#', 'rgba('));
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(centerX, centerY, 60 + i * 20, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(50, 100, 200, ${0.05 / i})`;
                ctx.fill();
            }
            
            // 球体边缘
            ctx.beginPath();
            ctx.arc(centerX, centerY, 60, 0, Math.PI * 2);
            ctx.strokeStyle = `rgba(100, 150, 255, 0.3)`;
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 核心发光
            const coreGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 50);
            coreGradient.addColorStop(0, '#fff');
            coreGradient.addColorStop(0.2, colors.core);
            coreGradient.addColorStop(0.5, colors.glow);
            coreGradient.addColorStop(1, 'transparent');
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, 50, 0, Math.PI * 2);
            ctx.fillStyle = coreGradient;
            ctx.fill();
            
            // 核心脉冲
            const pulseSize = 15 + Math.sin(time * 0.1) * 5 * energyLevel;
            ctx.beginPath();
            ctx.arc(centerX, centerY, pulseSize, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
        }
        
        function animate(currentTime) {
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
            }
            
            time++;
            
            ctx.fillStyle = 'rgba(5, 5, 16, 0.15)';
            ctx.fillRect(0, 0, width, height);
            
            const colors = colorModes[colorMode];
            
            // 自动生成电弧
            arcTimer++;
            if (arcTimer > 10 / energyLevel) {
                const angle = Math.atan2(mouseY - centerY, mouseX - centerX);
                const dist = 150 + Math.random() * 100;
                const targetX = centerX + Math.cos(angle + (Math.random() - 0.5)) * dist;
                const targetY = centerY + Math.sin(angle + (Math.random() - 0.5)) * dist;
                createArc(targetX, targetY);
                arcTimer = 0;
            }
            
            // 绘制等离子球
            drawPlasmaSphere();
            
            // 更新和绘制内部粒子
            innerParticles.forEach(p => {
                p.update();
                p.draw(ctx);
            });
            
            // 更新和绘制电弧
            arcs = arcs.filter(arc => {
                const alive = arc.update();
                if (alive) arc.draw(ctx, colors);
                return alive;
            });
            
            // 更新和绘制脉冲
            pulses = pulses.filter(pulse => {
                const alive = pulse.update();
                if (alive) pulse.draw(ctx, colors);
                return alive;
            });
            
            statsEl.textContent = `FPS: ${fps} | 电弧: ${arcs.length} | ${colors.name}`;
            requestAnimationFrame(animate);
        }
        
        window.addEventListener('resize', resize);
        canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
        canvas.addEventListener('click', e => {
            createPulse();
            for (let i = 0; i < 5; i++) {
                const angle = Math.atan2(e.clientY - centerY, e.clientX - centerX);
                const dist = 100 + Math.random() * 100;
                createArc(
                    centerX + Math.cos(angle + (Math.random() - 0.5)) * dist,
                    centerY + Math.sin(angle + (Math.random() - 0.5)) * dist
                );
            }
        });
        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            energyLevel = Math.max(0.3, Math.min(3, energyLevel - e.deltaY * 0.001));
        });
        document.addEventListener('keydown', e => {
            if (e.code === 'Space') { e.preventDefault(); colorMode = (colorMode + 1) % colorModes.length; }
        });
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const t = e.touches[0];
            mouseX = t.clientX; mouseY = t.clientY;
            createPulse();
        });
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const t = e.touches[0];
            mouseX = t.clientX; mouseY = t.clientY;
        });
        
        init();
        animate(performance.now());
    </script>
</body>
</html>
