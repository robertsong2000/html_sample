<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>银河系 - Galaxy Simulation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(200, 200, 255, 0.9);
            font-size: 14px;
            z-index: 10;
            background: rgba(0, 0, 20, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(100, 100, 255, 0.3);
            max-width: 280px;
        }
        
        .info h3 {
            margin-bottom: 10px;
            font-size: 16px;
            color: #a0a0ff;
            text-shadow: 0 0 15px rgba(160, 160, 255, 0.6);
        }
        
        .info p {
            margin: 5px 0;
            font-size: 12px;
            line-height: 1.6;
        }
        
        .info .key {
            color: #ffcc66;
            font-weight: bold;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            z-index: 10;
            background: rgba(0, 0, 20, 0.7);
            padding: 10px 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
        }
        
        @media (max-width: 600px) {
            .info {
                font-size: 12px;
                padding: 10px 15px;
                max-width: 220px;
            }
        }
    </style>
</head>
<body>
    <canvas id="galaxy"></canvas>
    
    <div class="info">
        <h3>🌌 银河系</h3>
        <p><span class="key">鼠标移动</span> - 控制视角旋转</p>
        <p><span class="key">点击</span> - 产生超新星爆发</p>
        <p><span class="key">滚轮</span> - 调整旋转速度</p>
        <p><span class="key">空格</span> - 切换星系类型</p>
    </div>
    
    <div class="stats" id="stats">
        FPS: 60 | 恒星: 0
    </div>

    <script>
        const canvas = document.getElementById('galaxy');
        const ctx = canvas.getContext('2d');
        const statsEl = document.getElementById('stats');
        
        let width, height, centerX, centerY;
        let mouseX = 0, mouseY = 0;
        let targetRotX = 0, targetRotY = 0;
        let rotX = 0, rotY = 0;
        let rotationSpeed = 0.001;
        let galaxyType = 0;
        
        // 星系类型
        const galaxyTypes = [
            { name: '螺旋星系', arms: 2, twist: 0.5 },
            { name: '棒旋星系', arms: 4, twist: 0.3 },
            { name: '椭圆星系', arms: 0, twist: 0 }
        ];
        
        // 恒星类
        class Star {
            constructor(type) {
                this.reset(type);
            }
            
            reset(type) {
                const config = galaxyTypes[type];
                
                if (config.arms === 0) {
                    // 椭圆星系 - 随机分布
                    const angle = Math.random() * Math.PI * 2;
                    const dist = Math.random() * Math.min(width, height) * 0.4;
                    this.armAngle = angle;
                    this.armDistance = dist;
                    this.spiralOffset = 0;
                } else {
                    // 螺旋星系
                    this.armIndex = Math.floor(Math.random() * config.arms);
                    this.armAngle = (this.armIndex / config.arms) * Math.PI * 2;
                    this.armDistance = Math.random() * Math.min(width, height) * 0.45;
                    this.spiralOffset = this.armDistance * config.twist * 0.01;
                }
                
                this.orbitSpeed = 0.0002 + Math.random() * 0.0003;
                this.z = (Math.random() - 0.5) * 50;
                this.zOffset = (Math.random() - 0.5) * 30;
                
                // 恒星颜色
                const colorTypes = [
                    { r: 255, g: 255, b: 255 },   // 白色
                    { r: 200, g: 200, b: 255 },   // 蓝白
                    { r: 255, g: 200, b: 150 },   // 黄橙
                    { r: 255, g: 150, b: 100 },   // 橙红
                    { r: 100, g: 150, b: 255 },   // 蓝色
                ];
                this.color = colorTypes[Math.floor(Math.random() * colorTypes.length)];
                this.size = 0.5 + Math.random() * 2;
                this.brightness = 0.3 + Math.random() * 0.7;
                this.twinklePhase = Math.random() * Math.PI * 2;
                this.twinkleSpeed = 0.02 + Math.random() * 0.03;
            }
            
            update(time) {
                // 轨道运动
                this.armAngle += this.orbitSpeed * (1 - this.armDistance / (Math.min(width, height) * 0.45) * 0.5);
                
                // 闪烁
                this.twinklePhase += this.twinkleSpeed;
            }
            
            get3DPosition(time) {
                const totalAngle = this.armAngle + this.spiralOffset + time * rotationSpeed;
                
                const x = Math.cos(totalAngle) * this.armDistance;
                const y = this.z + this.zOffset * Math.sin(totalAngle * 0.5);
                const z = Math.sin(totalAngle) * this.armDistance;
                
                // 应用视角旋转
                const cosX = Math.cos(rotX);
                const sinX = Math.sin(rotX);
                const cosY = Math.cos(rotY);
                const sinY = Math.sin(rotY);
                
                // 绕X轴旋转
                const y1 = y * cosX - z * sinX;
                const z1 = y * sinX + z * cosX;
                
                // 绕Y轴旋转
                const x1 = x * cosY + z1 * sinY;
                const z2 = -x * sinY + z1 * cosY;
                
                return { x: x1, y: y1, z: z2 };
            }
            
            draw(ctx, time) {
                const pos = this.get3DPosition(time);
                
                // 透视投影
                const perspective = 800;
                const scale = perspective / (perspective + pos.z);
                
                if (scale <= 0) return;
                
                const screenX = centerX + pos.x * scale;
                const screenY = centerY + pos.y * scale;
                
                // 深度衰减
                const depthFade = Math.max(0.2, 1 - pos.z / 500);
                const twinkle = 0.7 + Math.sin(this.twinklePhase) * 0.3;
                const alpha = this.brightness * depthFade * twinkle * scale;
                
                // 绘制恒星光晕
                const glowSize = this.size * scale * 3;
                if (glowSize > 0.5) {
                    const gradient = ctx.createRadialGradient(
                        screenX, screenY, 0,
                        screenX, screenY, glowSize
                    );
                    gradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha * 0.8})`);
                    gradient.addColorStop(0.5, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha * 0.2})`);
                    gradient.addColorStop(1, 'transparent');
                    
                    ctx.beginPath();
                    ctx.arc(screenX, screenY, glowSize, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                }
                
                // 绘制恒星核心
                ctx.beginPath();
                ctx.arc(screenX, screenY, Math.max(0.5, this.size * scale), 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fill();
            }
        }
        
        // 超新星爆发粒子
        class SupernovaParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 8;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.size = 1 + Math.random() * 3;
                this.decay = 0.01 + Math.random() * 0.02;
                
                const colors = ['#ffffff', '#ffffaa', '#ffaa44', '#ff6644'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.alpha -= this.decay;
                return this.alpha > 0;
            }
            
            draw(ctx) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.hexToRgba(this.color, this.alpha);
                ctx.fill();
            }
            
            hexToRgba(hex, alpha) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            }
        }
        
        // 星云背景
        class Nebula {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = 100 + Math.random() * 200;
                this.alpha = 0.02 + Math.random() * 0.03;
                
                const colors = [
                    'rgba(100, 50, 150, ',
                    'rgba(50, 100, 150, ',
                    'rgba(150, 50, 100, ',
                    'rgba(100, 100, 50, '
                ];
                this.colorBase = colors[Math.floor(Math.random() * colors.length)];
            }
            
            draw(ctx) {
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size
                );
                gradient.addColorStop(0, this.colorBase + this.alpha + ')');
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }
        
        let stars = [];
        let nebulae = [];
        let supernovaParticles = [];
        let time = 0;
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        
        function init() {
            resize();
            createGalaxy();
            createNebulae();
        }
        
        function resize() {
            const dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            
            ctx.scale(dpr, dpr);
            
            centerX = width / 2;
            centerY = height / 2;
        }
        
        function createGalaxy() {
            stars = [];
            const starCount = Math.min(3000, Math.floor((width * height) / 400));
            
            for (let i = 0; i < starCount; i++) {
                stars.push(new Star(galaxyType));
            }
        }
        
        function createNebulae() {
            nebulae = [];
            for (let i = 0; i < 8; i++) {
                nebulae.push(new Nebula());
            }
        }
        
        function triggerSupernova(x, y) {
            const count = 100;
            for (let i = 0; i < count; i++) {
                supernovaParticles.push(new SupernovaParticle(x, y));
            }
            
            // 闪光效果
            ctx.fillStyle = 'rgba(255, 255, 200, 0.5)';
            ctx.fillRect(0, 0, width, height);
        }
        
        function animate(currentTime) {
            // FPS
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
            }
            
            time++;
            
            // 平滑视角旋转
            rotX += (targetRotX - rotX) * 0.05;
            rotY += (targetRotY - rotY) * 0.05;
            
            // 自动旋转
            targetRotY += 0.002;
            
            // 清除
            ctx.fillStyle = 'rgba(0, 0, 5, 0.2)';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制星云背景
            nebulae.forEach(n => n.draw(ctx));
            
            // 绘制银河中心光晕
            const centerGradient = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, 100
            );
            centerGradient.addColorStop(0, 'rgba(255, 230, 180, 0.3)');
            centerGradient.addColorStop(0.5, 'rgba(255, 200, 150, 0.1)');
            centerGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = centerGradient;
            ctx.fillRect(0, 0, width, height);
            
            // 更新和绘制恒星（按深度排序）
            stars.forEach(star => star.update(time));
            
            // 按z深度排序绘制
            const sortedStars = [...stars].sort((a, b) => {
                const posA = a.get3DPosition(time);
                const posB = b.get3DPosition(time);
                return posA.z - posB.z;
            });
            
            sortedStars.forEach(star => star.draw(ctx, time));
            
            // 更新和绘制超新星粒子
            supernovaParticles = supernovaParticles.filter(p => {
                const alive = p.update();
                if (alive) p.draw(ctx);
                return alive;
            });
            
            // 更新统计
            statsEl.textContent = `FPS: ${fps} | 恒星: ${stars.length}`;
            
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        window.addEventListener('resize', () => {
            resize();
            createNebulae();
        });
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            targetRotX = ((mouseY - centerY) / height) * 0.5;
            targetRotY += ((mouseX - centerX) / width) * 0.001;
        });
        
        canvas.addEventListener('click', (e) => {
            triggerSupernova(e.clientX, e.clientY);
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            rotationSpeed = Math.max(0.0001, Math.min(0.01, rotationSpeed - e.deltaY * 0.00001));
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                galaxyType = (galaxyType + 1) % galaxyTypes.length;
                createGalaxy();
            }
        });
        
        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            triggerSupernova(touch.clientX, touch.clientY);
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            
            targetRotX = ((mouseY - centerY) / height) * 0.5;
            targetRotY += ((mouseX - centerX) / width) * 0.001;
        });
        
        // 启动
        init();
        animate(performance.now());
    </script>
</body>
</html>
