<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Field - 星空效果</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            z-index: 10;
            text-shadow: 0 0 10px rgba(200, 200, 255, 0.8);
            pointer-events: none;
        }

        .info span {
            display: block;
            margin: 5px 0;
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                bottom: 10px;
                left: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="starfield"></canvas>
    <div class="info">
        <span>🖱️ 移动鼠标 - 控制飞行方向</span>
        <span>👆 点击 - 跃迁加速</span>
    </div>

    <script>
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Mouse tracking
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;
        let warpSpeed = 1;
        let targetWarpSpeed = 1;

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });

        // Click for warp
        canvas.addEventListener('click', () => {
            targetWarpSpeed = 5;
            setTimeout(() => targetWarpSpeed = 1, 1000);
        });

        canvas.addEventListener('touchstart', () => {
            targetWarpSpeed = 5;
            setTimeout(() => targetWarpSpeed = 1, 1000);
        });

        // Star class
        class Star {
            constructor() {
                this.reset();
            }

            reset() {
                // Random position in 3D space
                this.x = (Math.random() - 0.5) * 2000;
                this.y = (Math.random() - 0.5) * 2000;
                this.z = Math.random() * 2000;
                this.maxZ = 2000;
                
                // Star properties
                this.size = 0.5 + Math.random() * 2;
                this.color = this.getStarColor();
                this.twinkle = Math.random() * Math.PI * 2;
                this.twinkleSpeed = 0.05 + Math.random() * 0.1;
            }

            getStarColor() {
                const colors = [
                    '#ffffff',  // White
                    '#ffeedd',  // Warm white
                    '#ddeeff',  // Cool white
                    '#ffddaa',  // Orange
                    '#aaddff',  // Blue
                    '#ffaaaa',  // Red
                    '#aaffaa'   // Green
                ];
                const weights = [0.4, 0.2, 0.15, 0.1, 0.08, 0.04, 0.03];
                let r = Math.random();
                let sum = 0;
                for (let i = 0; i < weights.length; i++) {
                    sum += weights[i];
                    if (r < sum) return colors[i];
                }
                return colors[0];
            }

            update(speed, centerX, centerY) {
                // Move star towards camera
                this.z -= speed * 10;
                this.twinkle += this.twinkleSpeed;

                // Reset if too close
                if (this.z <= 0) {
                    this.reset();
                    this.z = this.maxZ;
                }
            }

            draw(centerX, centerY) {
                // Project 3D to 2D
                const scale = 500 / this.z;
                const screenX = centerX + this.x * scale;
                const screenY = centerY + this.y * scale;

                // Check if on screen
                if (screenX < 0 || screenX > canvas.width || 
                    screenY < 0 || screenY > canvas.height) {
                    return;
                }

                // Size based on distance
                const size = this.size * scale * 2;
                const brightness = Math.min(1, (this.maxZ - this.z) / this.maxZ);
                const twinkleAlpha = 0.7 + Math.sin(this.twinkle) * 0.3;

                ctx.save();
                ctx.globalAlpha = brightness * twinkleAlpha;

                // Draw star glow
                const gradient = ctx.createRadialGradient(
                    screenX, screenY, 0,
                    screenX, screenY, size * 3
                );
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(0.3, this.color.replace(')', ', 0.5)').replace('rgb', 'rgba').replace('#', 'rgba('));
                gradient.addColorStop(1, 'transparent');

                ctx.beginPath();
                ctx.arc(screenX, screenY, size * 3, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // Draw star core
                ctx.beginPath();
                ctx.arc(screenX, screenY, size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();

                ctx.restore();

                // Store screen position for trails
                this.screenX = screenX;
                this.screenY = screenY;
                this.screenSize = size;
            }

            drawTrail(centerX, centerY, speed) {
                if (speed < 1.5 || this.z > 500) return;

                const scale = 500 / this.z;
                const screenX = centerX + this.x * scale;
                const screenY = centerY + this.y * scale;

                if (screenX < 0 || screenX > canvas.width || 
                    screenY < 0 || screenY > canvas.height) {
                    return;
                }

                // Calculate trail length based on speed
                const trailLength = Math.min(100, speed * 20);
                const prevZ = this.z + speed * 10;
                const prevScale = 500 / prevZ;
                const prevX = centerX + this.x * prevScale;
                const prevY = centerY + this.y * prevScale;

                const brightness = Math.min(1, (this.maxZ - this.z) / this.maxZ);

                // Draw trail
                const gradient = ctx.createLinearGradient(prevX, prevY, screenX, screenY);
                gradient.addColorStop(0, 'transparent');
                gradient.addColorStop(1, `rgba(255, 255, 255, ${brightness * 0.5})`);

                ctx.beginPath();
                ctx.moveTo(prevX, prevY);
                ctx.lineTo(screenX, screenY);
                ctx.strokeStyle = gradient;
                ctx.lineWidth = this.screenSize * 0.5;
                ctx.stroke();
            }
        }

        // Create stars
        const stars = [];
        const starCount = 500;
        for (let i = 0; i < starCount; i++) {
            stars.push(new Star());
        }

        // Nebula clouds
        class Nebula {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = (Math.random() - 0.5) * 3000;
                this.y = (Math.random() - 0.5) * 3000;
                this.z = Math.random() * 2000 + 500;
                this.size = 200 + Math.random() * 300;
                this.hue = Math.random() * 360;
                this.alpha = 0.05 + Math.random() * 0.1;
            }

            update(speed) {
                this.z -= speed * 5;
                if (this.z <= 0) {
                    this.reset();
                    this.z = 2500;
                }
            }

            draw(centerX, centerY) {
                const scale = 500 / this.z;
                const screenX = centerX + this.x * scale;
                const screenY = centerY + this.y * scale;
                const screenSize = this.size * scale;

                if (screenX < -screenSize || screenX > canvas.width + screenSize ||
                    screenY < -screenSize || screenY > canvas.height + screenSize) {
                    return;
                }

                const brightness = Math.min(1, (2000 - this.z) / 2000);

                const gradient = ctx.createRadialGradient(
                    screenX, screenY, 0,
                    screenX, screenY, screenSize
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 80%, 50%, ${this.alpha * brightness})`);
                gradient.addColorStop(0.5, `hsla(${this.hue + 30}, 70%, 40%, ${this.alpha * brightness * 0.5})`);
                gradient.addColorStop(1, 'transparent');

                ctx.fillStyle = gradient;
                ctx.fillRect(screenX - screenSize, screenY - screenSize, screenSize * 2, screenSize * 2);
            }
        }

        // Create nebulae
        const nebulae = [];
        for (let i = 0; i < 10; i++) {
            nebulae.push(new Nebula());
        }

        // Shooting star
        class ShootingStar {
            constructor() {
                this.reset();
            }

            reset() {
                this.active = false;
                this.x = 0;
                this.y = 0;
                this.vx = 0;
                this.vy = 0;
                this.life = 0;
            }

            activate() {
                this.active = true;
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height * 0.5;
                const angle = Math.PI / 4 + Math.random() * Math.PI / 4;
                const speed = 15 + Math.random() * 20;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1;
                this.trail = [];
            }

            update() {
                if (!this.active) return;

                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 20) this.trail.shift();

                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.02;

                if (this.life <= 0 || this.x > canvas.width || this.y > canvas.height) {
                    this.reset();
                }
            }

            draw() {
                if (!this.active) return;

                // Draw trail
                for (let i = 0; i < this.trail.length; i++) {
                    const alpha = (i / this.trail.length) * this.life;
                    const size = (i / this.trail.length) * 3;
                    ctx.beginPath();
                    ctx.arc(this.trail[i].x, this.trail[i].y, size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                    ctx.fill();
                }

                // Draw head
                ctx.save();
                ctx.shadowBlur = 20;
                ctx.shadowColor = 'white';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.life})`;
                ctx.fill();
                ctx.restore();
            }
        }

        const shootingStar = new ShootingStar();

        // Animation loop
        let time = 0;

        function animate() {
            time++;

            // Smooth warp speed transition
            warpSpeed += (targetWarpSpeed - warpSpeed) * 0.05;

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // Direction based on mouse
            const dirX = (mouseX - centerX) / centerX;
            const dirY = (mouseY - centerY) / centerY;

            // Clear with fade effect for trails
            ctx.fillStyle = 'rgba(0, 0, 10, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw nebulae (background)
            nebulae.forEach(nebula => {
                nebula.update(warpSpeed);
                nebula.draw(centerX, centerY);
            });

            // Update and draw stars
            stars.forEach(star => {
                star.update(warpSpeed, centerX + dirX * 100, centerY + dirY * 100);
                star.drawTrail(centerX + dirX * 100, centerY + dirY * 100, warpSpeed);
                star.draw(centerX + dirX * 100, centerY + dirY * 100);
            });

            // Shooting star
            if (Math.random() < 0.005 && !shootingStar.active) {
                shootingStar.activate();
            }
            shootingStar.update();
            shootingStar.draw();

            // Warp effect overlay
            if (warpSpeed > 2) {
                const warpAlpha = (warpSpeed - 2) / 3 * 0.3;
                const warpGradient = ctx.createRadialGradient(
                    centerX, centerY, 0,
                    centerX, centerY, canvas.width
                );
                warpGradient.addColorStop(0, 'transparent');
                warpGradient.addColorStop(0.5, `rgba(100, 150, 255, ${warpAlpha * 0.5})`);
                warpGradient.addColorStop(1, `rgba(50, 100, 200, ${warpAlpha})`);
                ctx.fillStyle = warpGradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // Speed indicator
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.font = '12px monospace';
            ctx.fillText(`Warp: ${warpSpeed.toFixed(1)}x`, 10, 30);
            ctx.fillText(`Stars: ${starCount}`, 10, 50);

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
