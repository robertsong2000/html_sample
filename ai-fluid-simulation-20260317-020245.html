<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluid Simulation - 流体模拟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            z-index: 10;
            text-shadow: 0 0 10px rgba(100, 200, 255, 0.8);
            pointer-events: none;
        }

        .info span {
            display: block;
            margin: 5px 0;
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                bottom: 10px;
                left: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="fluid"></canvas>
    <div class="info">
        <span>🖱️ 拖动鼠标 - 创建流体流动</span>
        <span>👆 点击 - 添加染料</span>
    </div>

    <script>
        const canvas = document.getElementById('fluid');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initFluid();
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Fluid simulation parameters
        const scale = 4;
        let cols, rows;
        let velocityX, velocityY, density;
        let velocityX0, velocityY0, density0;

        function initFluid() {
            cols = Math.floor(canvas.width / scale);
            rows = Math.floor(canvas.height / scale);
            
            velocityX = new Float32Array(cols * rows);
            velocityY = new Float32Array(cols * rows);
            density = new Float32Array(cols * rows);
            velocityX0 = new Float32Array(cols * rows);
            velocityY0 = new Float32Array(cols * rows);
            density0 = new Float32Array(cols * rows);
        }

        function IX(x, y) {
            x = Math.max(0, Math.min(cols - 1, x));
            y = Math.max(0, Math.min(rows - 1, y));
            return x + y * cols;
        }

        function addDensity(x, y, amount) {
            const i = IX(Math.floor(x / scale), Math.floor(y / scale));
            density[i] += amount;
        }

        function addVelocity(x, y, amountX, amountY) {
            const i = IX(Math.floor(x / scale), Math.floor(y / scale));
            velocityX[i] += amountX;
            velocityY[i] += amountY;
        }

        function diffuse(b, x, x0, diff, dt) {
            const a = dt * diff * (cols - 2) * (rows - 2);
            for (let k = 0; k < 20; k++) {
                for (let j = 1; j < rows - 1; j++) {
                    for (let i = 1; i < cols - 1; i++) {
                        x[IX(i, j)] = (x0[IX(i, j)] + a * (
                            x[IX(i + 1, j)] + x[IX(i - 1, j)] +
                            x[IX(i, j + 1)] + x[IX(i, j - 1)]
                        )) / (1 + 4 * a);
                    }
                }
                setBoundary(b, x);
            }
        }

        function advect(b, d, d0, velocX, velocY, dt) {
            const dtx = dt * (cols - 2);
            const dty = dt * (rows - 2);

            for (let j = 1; j < rows - 1; j++) {
                for (let i = 1; i < cols - 1; i++) {
                    let x = i - dtx * velocX[IX(i, j)];
                    let y = j - dty * velocY[IX(i, j)];

                    x = Math.max(0.5, Math.min(cols - 1.5, x));
                    y = Math.max(0.5, Math.min(rows - 1.5, y));

                    const i0 = Math.floor(x);
                    const i1 = i0 + 1;
                    const j0 = Math.floor(y);
                    const j1 = j0 + 1;

                    const s1 = x - i0;
                    const s0 = 1 - s1;
                    const t1 = y - j0;
                    const t0 = 1 - t1;

                    d[IX(i, j)] = s0 * (t0 * d0[IX(i0, j0)] + t1 * d0[IX(i0, j1)]) +
                                  s1 * (t0 * d0[IX(i1, j0)] + t1 * d0[IX(i1, j1)]);
                }
            }
            setBoundary(b, d);
        }

        function project(velocX, velocY, p, div) {
            for (let j = 1; j < rows - 1; j++) {
                for (let i = 1; i < cols - 1; i++) {
                    div[IX(i, j)] = -0.5 * (
                        velocX[IX(i + 1, j)] - velocX[IX(i - 1, j)] +
                        velocY[IX(i, j + 1)] - velocY[IX(i, j - 1)]
                    ) / Math.min(cols, rows);
                    p[IX(i, j)] = 0;
                }
            }
            setBoundary(0, div);
            setBoundary(0, p);

            for (let k = 0; k < 20; k++) {
                for (let j = 1; j < rows - 1; j++) {
                    for (let i = 1; i < cols - 1; i++) {
                        p[IX(i, j)] = (div[IX(i, j)] + 
                            p[IX(i + 1, j)] + p[IX(i - 1, j)] +
                            p[IX(i, j + 1)] + p[IX(i, j - 1)]
                        ) / 4;
                    }
                }
                setBoundary(0, p);
            }

            for (let j = 1; j < rows - 1; j++) {
                for (let i = 1; i < cols - 1; i++) {
                    velocX[IX(i, j)] -= 0.5 * (p[IX(i + 1, j)] - p[IX(i - 1, j)]) * Math.min(cols, rows);
                    velocY[IX(i, j)] -= 0.5 * (p[IX(i, j + 1)] - p[IX(i, j - 1)]) * Math.min(cols, rows);
                }
            }
            setBoundary(1, velocX);
            setBoundary(2, velocY);
        }

        function setBoundary(b, x) {
            for (let i = 1; i < cols - 1; i++) {
                x[IX(i, 0)] = b === 2 ? -x[IX(i, 1)] : x[IX(i, 1)];
                x[IX(i, rows - 1)] = b === 2 ? -x[IX(i, rows - 2)] : x[IX(i, rows - 2)];
            }
            for (let j = 1; j < rows - 1; j++) {
                x[IX(0, j)] = b === 1 ? -x[IX(1, j)] : x[IX(1, j)];
                x[IX(cols - 1, j)] = b === 1 ? -x[IX(cols - 2, j)] : x[IX(cols - 2, j)];
            }

            x[IX(0, 0)] = 0.5 * (x[IX(1, 0)] + x[IX(0, 1)]);
            x[IX(0, rows - 1)] = 0.5 * (x[IX(1, rows - 1)] + x[IX(0, rows - 2)]);
            x[IX(cols - 1, 0)] = 0.5 * (x[IX(cols - 2, 0)] + x[IX(cols - 1, 1)]);
            x[IX(cols - 1, rows - 1)] = 0.5 * (x[IX(cols - 2, rows - 1)] + x[IX(cols - 1, rows - 2)]);
        }

        function step() {
            const dt = 0.2;
            const diffusion = 0.0001;
            const viscosity = 0.0000001;

            // Diffuse velocity
            diffuse(1, velocityX0, velocityX, viscosity, dt);
            diffuse(2, velocityY0, velocityY, viscosity, dt);

            // Project
            project(velocityX0, velocityY0, velocityX, velocityY);

            // Advect velocity
            advect(1, velocityX, velocityX0, velocityX0, velocityY0, dt);
            advect(2, velocityY, velocityY0, velocityX0, velocityY0, dt);

            // Project again
            project(velocityX, velocityY, velocityX0, velocityY0);

            // Diffuse density
            diffuse(0, density0, density, diffusion, dt);
            advect(0, density, density0, velocityX, velocityY, dt);

            // Fade density
            for (let i = 0; i < density.length; i++) {
                density[i] *= 0.99;
            }
        }

        // Mouse tracking
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;
        let prevMouseX = mouseX;
        let prevMouseY = mouseY;
        let isMouseDown = false;

        canvas.addEventListener('mousedown', () => isMouseDown = true);
        canvas.addEventListener('mouseup', () => isMouseDown = false);

        canvas.addEventListener('mousemove', (e) => {
            prevMouseX = mouseX;
            prevMouseY = mouseY;
            mouseX = e.clientX;
            mouseY = e.clientY;

            if (isMouseDown) {
                const dx = mouseX - prevMouseX;
                const dy = mouseY - prevMouseY;
                addVelocity(mouseX, mouseY, dx * 5, dy * 5);
                addDensity(mouseX, mouseY, 100);
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            prevMouseX = mouseX;
            prevMouseY = mouseY;
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;

            const dx = mouseX - prevMouseX;
            const dy = mouseY - prevMouseY;
            addVelocity(mouseX, mouseY, dx * 5, dy * 5);
            addDensity(mouseX, mouseY, 100);
        }, { passive: false });

        canvas.addEventListener('click', (e) => {
            // Add burst of dye
            for (let i = 0; i < 5; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 30;
                const x = e.clientX + Math.cos(angle) * radius;
                const y = e.clientY + Math.sin(angle) * radius;
                addDensity(x, y, 150);
                addVelocity(x, y, Math.cos(angle) * 10, Math.sin(angle) * 10);
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            for (let i = 0; i < 5; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * 30;
                const x = e.touches[0].clientX + Math.cos(angle) * radius;
                const y = e.touches[0].clientY + Math.sin(angle) * radius;
                addDensity(x, y, 150);
                addVelocity(x, y, Math.cos(angle) * 10, Math.sin(angle) * 10);
            }
        });

        // Color palette
        const colors = [
            { r: 0, g: 150, b: 255 },
            { r: 100, g: 200, b: 255 },
            { r: 150, g: 100, b: 255 },
            { r: 255, g: 100, b: 150 },
            { r: 0, g: 255, b: 200 }
        ];

        function getColor(d, i) {
            const colorIndex = Math.floor((i / density.length) * colors.length);
            const color = colors[colorIndex % colors.length];
            const intensity = Math.min(1, d / 100);
            return {
                r: color.r * intensity,
                g: color.g * intensity,
                b: color.b * intensity
            };
        }

        // Animation loop
        let time = 0;

        function animate() {
            time++;

            // Step simulation
            step();

            // Create image data
            const imageData = ctx.createImageData(canvas.width, canvas.height);
            const data = imageData.data;

            // Draw density field
            for (let j = 0; j < rows; j++) {
                for (let i = 0; i < cols; i++) {
                    const d = density[IX(i, j)];
                    const color = getColor(d, IX(i, j));

                    // Fill scaled pixels
                    for (let py = 0; py < scale; py++) {
                        for (let px = 0; px < scale; px++) {
                            const x = i * scale + px;
                            const y = j * scale + py;
                            if (x < canvas.width && y < canvas.height) {
                                const idx = (y * canvas.width + x) * 4;
                                data[idx] = color.r;
                                data[idx + 1] = color.g;
                                data[idx + 2] = color.b;
                                data[idx + 3] = 255;
                            }
                        }
                    }
                }
            }

            ctx.putImageData(imageData, 0, 0);

            // Add random disturbances
            if (Math.random() < 0.02) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                addDensity(x, y, 50);
            }

            requestAnimationFrame(animate);
        }

        // Initialize
        initFluid();

        // Initial background
        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        animate();
    </script>
</body>
</html>
