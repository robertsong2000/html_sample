<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave Animation - 波浪动画</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            z-index: 10;
            text-shadow: 0 0 10px rgba(100, 200, 255, 0.8);
            pointer-events: none;
        }

        .info span {
            display: block;
            margin: 5px 0;
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                bottom: 10px;
                left: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="waves"></canvas>
    <div class="info">
        <span>🖱️ 移动鼠标 - 控制波浪方向</span>
        <span>👆 点击 - 创建波纹冲击</span>
    </div>

    <script>
        const canvas = document.getElementById('waves');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Mouse tracking
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });

        // Click for wave impact
        let impacts = [];

        canvas.addEventListener('click', (e) => {
            createImpact(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            createImpact(e.touches[0].clientX, e.touches[0].clientY);
        });

        function createImpact(x, y) {
            impacts.push({
                x: x,
                y: y,
                radius: 0,
                maxRadius: 300,
                strength: 1,
                speed: 8
            });
        }

        // Wave layer class
        class WaveLayer {
            constructor(yOffset, amplitude, frequency, speed, color, lineWidth) {
                this.yOffset = yOffset;
                this.amplitude = amplitude;
                this.frequency = frequency;
                this.speed = speed;
                this.color = color;
                this.lineWidth = lineWidth;
                this.phase = Math.random() * Math.PI * 2;
                this.points = [];
            }

            update(time, mouseInfluence) {
                this.phase += this.speed;
                this.points = [];

                const resolution = 5;
                for (let x = 0; x <= canvas.width + resolution; x += resolution) {
                    // Base wave
                    let y = canvas.height * this.yOffset;
                    
                    // Multiple wave frequencies
                    const wave1 = Math.sin(x * this.frequency + this.phase) * this.amplitude;
                    const wave2 = Math.sin(x * this.frequency * 2 + this.phase * 1.5) * this.amplitude * 0.5;
                    const wave3 = Math.sin(x * this.frequency * 0.5 + this.phase * 0.7) * this.amplitude * 1.5;
                    
                    y += wave1 + wave2 + wave3;

                    // Mouse influence
                    const dx = x - mouseX;
                    const dy = y - mouseY;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const influenceRadius = 200;
                    
                    if (distance < influenceRadius) {
                        const influence = (1 - distance / influenceRadius) * mouseInfluence;
                        y += Math.sin(distance * 0.05 - time * 0.1) * influence * 30;
                    }

                    // Impact influence
                    impacts.forEach(impact => {
                        const impactDx = x - impact.x;
                        const impactDy = y - impact.y;
                        const impactDist = Math.sqrt(impactDx * impactDx + impactDy * impactDy);
                        
                        if (Math.abs(impactDist - impact.radius) < 100) {
                            const rippleEffect = Math.sin((impactDist - impact.radius) * 0.1) * impact.strength * 20;
                            y += rippleEffect * (1 - Math.abs(impactDist - impact.radius) / 100);
                        }
                    });

                    this.points.push({ x, y });
                }
            }

            draw() {
                if (this.points.length < 2) return;

                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);

                // Smooth curve through points
                for (let i = 1; i < this.points.length - 1; i++) {
                    const p0 = this.points[i];
                    const p1 = this.points[i + 1];
                    const midX = (p0.x + p1.x) / 2;
                    const midY = (p0.y + p1.y) / 2;
                    ctx.quadraticCurveTo(p0.x, p0.y, midX, midY);
                }

                // Complete the shape for gradient fill
                ctx.lineTo(canvas.width, canvas.height);
                ctx.lineTo(0, canvas.height);
                ctx.closePath();

                // Gradient fill
                const gradient = ctx.createLinearGradient(0, canvas.height * this.yOffset - this.amplitude * 2, 0, canvas.height);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(0.3, this.color.replace(/[\d.]+\)$/, '0.4)'));
                gradient.addColorStop(1, this.color.replace(/[\d.]+\)$/, '0.1)'));

                ctx.fillStyle = gradient;
                ctx.fill();

                // Draw wave line
                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);
                for (let i = 1; i < this.points.length - 1; i++) {
                    const p0 = this.points[i];
                    const p1 = this.points[i + 1];
                    const midX = (p0.x + p1.x) / 2;
                    const midY = (p0.y + p1.y) / 2;
                    ctx.quadraticCurveTo(p0.x, p0.y, midX, midY);
                }
                ctx.strokeStyle = this.color.replace(/[\d.]+\)$/, '0.8)');
                ctx.lineWidth = this.lineWidth;
                ctx.stroke();
            }
        }

        // Create wave layers
        const waveLayers = [
            new WaveLayer(0.35, 25, 0.008, 0.02, 'rgba(0, 150, 255, 0.6)', 3),
            new WaveLayer(0.40, 30, 0.01, 0.025, 'rgba(0, 180, 255, 0.5)', 2),
            new WaveLayer(0.45, 20, 0.012, 0.03, 'rgba(50, 200, 255, 0.4)', 2),
            new WaveLayer(0.50, 35, 0.006, 0.015, 'rgba(100, 220, 255, 0.35)', 2),
            new WaveLayer(0.55, 25, 0.009, 0.022, 'rgba(150, 230, 255, 0.3)', 1),
            new WaveLayer(0.60, 15, 0.015, 0.035, 'rgba(200, 240, 255, 0.25)', 1)
        ];

        // Bubble particles
        class Bubble {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100;
                this.size = 3 + Math.random() * 8;
                this.speed = 0.5 + Math.random() * 1.5;
                this.wobble = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0.02 + Math.random() * 0.03;
                this.wobbleAmount = 20 + Math.random() * 30;
                this.alpha = 0.3 + Math.random() * 0.4;
            }

            update(time) {
                this.wobble += this.wobbleSpeed;
                this.x += Math.sin(this.wobble) * 0.5;
                this.y -= this.speed;

                // Get wave height at this x position
                const waveY = canvas.height * 0.4 + Math.sin(this.x * 0.01 + time * 0.02) * 30;
                
                if (this.y < waveY - 50) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                
                // Bubble gradient
                const gradient = ctx.createRadialGradient(
                    this.x - this.size * 0.3, this.y - this.size * 0.3, 0,
                    this.x, this.y, this.size
                );
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
                gradient.addColorStop(0.3, 'rgba(200, 230, 255, 0.4)');
                gradient.addColorStop(1, 'rgba(150, 200, 255, 0.1)');

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();

                // Highlight
                ctx.beginPath();
                ctx.arc(this.x - this.size * 0.3, this.y - this.size * 0.3, this.size * 0.3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.fill();

                ctx.restore();
            }
        }

        // Create bubbles
        const bubbles = [];
        for (let i = 0; i < 30; i++) {
            const bubble = new Bubble();
            bubble.y = Math.random() * canvas.height; // Spread initially
            bubbles.push(bubble);
        }

        // Foam particles
        class Foam {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = 2 + Math.random() * 4;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = -Math.random() * 1;
                this.life = 1;
                this.decay = 0.01 + Math.random() * 0.02;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy *= 0.98;
                this.life -= this.decay;
            }

            draw() {
                if (this.life <= 0) return;

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.life * 0.6})`;
                ctx.fill();
            }

            isDead() {
                return this.life <= 0;
            }
        }

        let foamParticles = [];

        // Sun/Moon
        function drawCelestialBody(time) {
            const sunX = canvas.width * 0.8;
            const sunY = canvas.height * 0.15;
            const sunRadius = 40;

            // Sun glow
            const glowGradient = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, sunRadius * 3);
            glowGradient.addColorStop(0, 'rgba(255, 200, 100, 0.4)');
            glowGradient.addColorStop(0.5, 'rgba(255, 150, 50, 0.1)');
            glowGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = glowGradient;
            ctx.fillRect(sunX - sunRadius * 3, sunY - sunRadius * 3, sunRadius * 6, sunRadius * 6);

            // Sun
            ctx.save();
            ctx.shadowBlur = 40;
            ctx.shadowColor = 'rgba(255, 200, 100, 0.8)';
            ctx.beginPath();
            ctx.arc(sunX, sunY, sunRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#ffd700';
            ctx.fill();
            ctx.restore();

            // Sun reflection on water
            const reflectionGradient = ctx.createLinearGradient(sunX, canvas.height * 0.35, sunX, canvas.height);
            reflectionGradient.addColorStop(0, 'rgba(255, 200, 100, 0.3)');
            reflectionGradient.addColorStop(0.5, 'rgba(255, 180, 80, 0.1)');
            reflectionGradient.addColorStop(1, 'transparent');
            
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            ctx.fillStyle = reflectionGradient;
            ctx.fillRect(sunX - 100, canvas.height * 0.35, 200, canvas.height * 0.5);
            ctx.restore();
        }

        // Clouds
        const clouds = [];
        for (let i = 0; i < 5; i++) {
            clouds.push({
                x: Math.random() * canvas.width,
                y: 50 + Math.random() * 100,
                width: 100 + Math.random() * 200,
                height: 30 + Math.random() * 40,
                speed: 0.2 + Math.random() * 0.3
            });
        }

        function drawClouds() {
            clouds.forEach(cloud => {
                cloud.x += cloud.speed;
                if (cloud.x > canvas.width + cloud.width) {
                    cloud.x = -cloud.width;
                }

                const gradient = ctx.createRadialGradient(
                    cloud.x + cloud.width / 2, cloud.y, 0,
                    cloud.x + cloud.width / 2, cloud.y, cloud.width / 2
                );
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
                gradient.addColorStop(1, 'transparent');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.ellipse(cloud.x + cloud.width / 2, cloud.y, cloud.width / 2, cloud.height / 2, 0, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // Animation loop
        let time = 0;

        function animate() {
            time++;

            // Calculate mouse influence
            const mouseInfluence = 1 - Math.min(mouseY / (canvas.height * 0.5), 1);

            // Sky gradient
            const skyGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            skyGradient.addColorStop(0, '#1a3a5c');
            skyGradient.addColorStop(0.4, '#2d6187');
            skyGradient.addColorStop(0.6, '#3d8eb9');
            skyGradient.addColorStop(1, '#1a4a6e');
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw celestial body
            drawCelestialBody(time);

            // Draw clouds
            drawClouds();

            // Update and draw wave layers
            waveLayers.forEach(layer => {
                layer.update(time, mouseInfluence);
                layer.draw();
            });

            // Update and draw bubbles
            bubbles.forEach(bubble => {
                bubble.update(time);
                bubble.draw();
            });

            // Update and draw foam
            foamParticles = foamParticles.filter(foam => {
                foam.update();
                foam.draw();
                return !foam.isDead();
            });

            // Generate foam at wave peaks
            if (Math.random() < 0.1) {
                const x = Math.random() * canvas.width;
                const waveY = canvas.height * 0.4 + Math.sin(x * 0.01 + time * 0.02) * 30;
                foamParticles.push(new Foam(x, waveY));
            }

            // Update impacts
            impacts = impacts.filter(impact => {
                impact.radius += impact.speed;
                impact.strength *= 0.95;

                // Draw impact ripple
                ctx.beginPath();
                ctx.arc(impact.x, impact.y, impact.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 255, 255, ${impact.strength * 0.5})`;
                ctx.lineWidth = 3;
                ctx.stroke();

                return impact.radius < impact.maxRadius && impact.strength > 0.01;
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
