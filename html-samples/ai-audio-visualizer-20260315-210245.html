<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐可视化 | Audio Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #0a0a0f;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            cursor: pointer;
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 10px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 30px rgba(100, 200, 255, 0.6);
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
            text-align: center;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(150, 200, 255, 0.5);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
            text-align: right;
            line-height: 1.8;
        }
        
        @media (max-width: 768px) {
            .title {
                font-size: 22px;
                letter-spacing: 5px;
            }
            .info {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="title">音乐可视化</div>
    <canvas id="visualizer"></canvas>
    <div class="stats">
        <div>模式: <span id="mode">波形</span></div>
        <div>频率: <span id="freqCount">64</span></div>
    </div>
    <div class="info">移动鼠标控制频率分布 · 点击切换可视化模式</div>
    
    <script>
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        const modeEl = document.getElementById('mode');
        const freqCountEl = document.getElementById('freqCount');
        
        let width, height, centerX, centerY;
        let mouseX = 0, mouseY = 0;
        let time = 0;
        let currentMode = 0;
        const modes = ['波形', '圆形', '频谱', '粒子'];
        
        // 模拟音频数据
        const frequencyCount = 64;
        const frequencies = [];
        const smoothedFrequencies = [];
        
        // 粒子系统
        let particles = [];
        
        function initFrequencies() {
            frequencies.length = 0;
            smoothedFrequencies.length = 0;
            
            for (let i = 0; i < frequencyCount; i++) {
                frequencies.push(0);
                smoothedFrequencies.push(0);
            }
        }
        
        function updateFrequencies() {
            // 模拟音乐节奏
            const mouseInfluence = (mouseX / width);
            const verticalInfluence = (mouseY / height);
            
            for (let i = 0; i < frequencyCount; i++) {
                // 基于时间和位置的模拟频率
                const baseFreq = Math.sin(time * 0.05 + i * 0.3) * 0.3 +
                                 Math.sin(time * 0.08 + i * 0.2) * 0.2 +
                                 Math.sin(time * 0.15 + i * 0.5) * 0.15;
                
                // 节拍效果
                const beat = Math.sin(time * 0.1) > 0.8 ? 0.4 : 0;
                const subBeat = Math.sin(time * 0.2) > 0.9 ? 0.2 : 0;
                
                // 鼠标影响频率分布
                const mouseMod = Math.sin(i * 0.2 + mouseInfluence * Math.PI * 2);
                
                frequencies[i] = Math.abs(baseFreq + beat + subBeat) * (0.5 + mouseMod * 0.3 + verticalInfluence * 0.2);
                
                // 平滑处理
                smoothedFrequencies[i] += (frequencies[i] - smoothedFrequencies[i]) * 0.3;
            }
        }
        
        // 粒子类
        class Particle {
            constructor() {
                this.reset();
            }
            
            reset() {
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 50 + 20;
                
                this.x = centerX + Math.cos(angle) * distance;
                this.y = centerY + Math.sin(angle) * distance;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.life = 1;
                this.decay = 0.005 + Math.random() * 0.01;
                this.size = Math.random() * 4 + 2;
                this.hue = Math.random() * 60 + 180;
                this.freqIndex = Math.floor(Math.random() * frequencyCount);
            }
            
            update() {
                const freq = smoothedFrequencies[this.freqIndex];
                
                // 根据频率向外扩展
                const angle = Math.atan2(this.y - centerY, this.x - centerX);
                this.vx += Math.cos(angle) * freq * 0.5;
                this.vy += Math.sin(angle) * freq * 0.5;
                
                // 阻尼
                this.vx *= 0.98;
                this.vy *= 0.98;
                
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                this.size = Math.max(1, this.size * 0.99);
            }
            
            draw() {
                if (this.life <= 0) return;
                
                const freq = smoothedFrequencies[this.freqIndex];
                const alpha = this.life * (0.5 + freq * 0.5);
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size + freq * 5, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue + freq * 60}, 100%, 60%, ${alpha})`;
                ctx.fill();
            }
            
            isDead() {
                return this.life <= 0;
            }
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }
        
        function drawWaveform() {
            ctx.beginPath();
            
            const amplitude = height * 0.3;
            const baseY = centerY;
            
            for (let i = 0; i <= width; i += 5) {
                const freqIndex = Math.floor((i / width) * frequencyCount);
                const freq = smoothedFrequencies[freqIndex];
                
                const y = baseY + Math.sin(i * 0.02 + time * 0.05) * amplitude * freq +
                          Math.sin(i * 0.01 + time * 0.03) * amplitude * 0.5 * freq;
                
                if (i === 0) {
                    ctx.moveTo(i, y);
                } else {
                    ctx.lineTo(i, y);
                }
            }
            
            ctx.strokeStyle = 'rgba(100, 200, 255, 0.8)';
            ctx.lineWidth = 3;
            ctx.shadowBlur = 20;
            ctx.shadowColor = 'rgba(100, 200, 255, 0.5)';
            ctx.stroke();
            ctx.shadowBlur = 0;
            
            // 镜像波形
            ctx.beginPath();
            
            for (let i = 0; i <= width; i += 5) {
                const freqIndex = Math.floor((i / width) * frequencyCount);
                const freq = smoothedFrequencies[freqIndex];
                
                const y = baseY - Math.sin(i * 0.02 + time * 0.05) * amplitude * freq -
                          Math.sin(i * 0.01 + time * 0.03) * amplitude * 0.5 * freq;
                
                if (i === 0) {
                    ctx.moveTo(i, y);
                } else {
                    ctx.lineTo(i, y);
                }
            }
            
            ctx.strokeStyle = 'rgba(255, 100, 200, 0.5)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        
        function drawCircular() {
            const baseRadius = Math.min(width, height) * 0.2;
            
            for (let ring = 0; ring < 3; ring++) {
                ctx.beginPath();
                
                for (let i = 0; i <= frequencyCount; i++) {
                    const freq = smoothedFrequencies[i % frequencyCount];
                    const angle = (i / frequencyCount) * Math.PI * 2 - Math.PI / 2;
                    const radius = baseRadius + ring * 30 + freq * 100;
                    
                    const x = centerX + Math.cos(angle) * radius;
                    const y = centerY + Math.sin(angle) * radius;
                    
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                
                ctx.closePath();
                ctx.strokeStyle = `hsla(${180 + ring * 40}, 100%, 60%, ${0.6 - ring * 0.15})`;
                ctx.lineWidth = 3 - ring;
                ctx.stroke();
            }
            
            // 中心圆
            const avgFreq = smoothedFrequencies.reduce((a, b) => a + b) / frequencyCount;
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, 30 + avgFreq * 50, 0, Math.PI * 2);
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 50 + avgFreq * 50);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
            gradient.addColorStop(0.5, 'rgba(100, 200, 255, 0.5)');
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.fill();
        }
        
        function drawSpectrum() {
            const barWidth = width / frequencyCount;
            
            for (let i = 0; i < frequencyCount; i++) {
                const freq = smoothedFrequencies[i];
                const barHeight = freq * height * 0.6;
                const x = i * barWidth;
                const y = centerY - barHeight / 2;
                
                // 颜色渐变
                const hue = 180 + (i / frequencyCount) * 120;
                
                // 上半部分
                ctx.fillStyle = `hsla(${hue}, 100%, 60%, 0.8)`;
                ctx.fillRect(x, y, barWidth - 2, barHeight / 2);
                
                // 下半部分（镜像）
                ctx.fillStyle = `hsla(${hue}, 100%, 60%, 0.4)`;
                ctx.fillRect(x, centerY, barWidth - 2, barHeight / 2);
                
                // 发光效果
                if (freq > 0.5) {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = `hsla(${hue}, 100%, 60%, 0.8)`;
                    ctx.fillRect(x, y, barWidth - 2, barHeight / 2);
                    ctx.shadowBlur = 0;
                }
            }
        }
        
        function drawParticles() {
            // 根据平均频率生成粒子
            const avgFreq = smoothedFrequencies.reduce((a, b) => a + b) / frequencyCount;
            
            if (avgFreq > 0.3 && particles.length < 300) {
                for (let i = 0; i < 3; i++) {
                    particles.push(new Particle());
                }
            }
            
            // 更新和绘制粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                
                if (particles[i].isDead()) {
                    particles.splice(i, 1);
                }
            }
            
            // 中心发光
            const gradient = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, 100 + avgFreq * 100
            );
            gradient.addColorStop(0, `rgba(100, 200, 255, ${avgFreq * 0.5})`);
            gradient.addColorStop(1, 'transparent');
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, 100 + avgFreq * 100, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
        }
        
        function drawBackground() {
            // 渐变背景
            const gradient = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, Math.max(width, height) * 0.7
            );
            gradient.addColorStop(0, '#151520');
            gradient.addColorStop(1, '#0a0a0f');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }
        
        function cycleMode() {
            currentMode = (currentMode + 1) % modes.length;
            modeEl.textContent = modes[currentMode];
            
            if (currentMode !== 3) {
                particles = [];
            }
        }
        
        function animate() {
            drawBackground();
            updateFrequencies();
            
            switch (currentMode) {
                case 0:
                    drawWaveform();
                    break;
                case 1:
                    drawCircular();
                    break;
                case 2:
                    drawSpectrum();
                    break;
                case 3:
                    drawParticles();
                    break;
            }
            
            time++;
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        function handleMouseMove(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
        }
        
        function handleTouchMove(e) {
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        }
        
        function handleClick() {
            cycleMode();
        }
        
        function handleTouchStart() {
            cycleMode();
        }
        
        // 初始化
        function init() {
            resize();
            initFrequencies();
            
            window.addEventListener('resize', resize);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('touchmove', handleTouchMove, { passive: true });
            canvas.addEventListener('click', handleClick);
            canvas.addEventListener('touchstart', handleTouchStart, { passive: true });
            
            freqCountEl.textContent = frequencyCount;
            modeEl.textContent = modes[currentMode];
            
            // 检测 prefers-reduced-motion
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
            if (!prefersReducedMotion.matches) {
                animate();
            } else {
                // 静态渲染
                drawBackground();
            }
        }
        
        init();
    </script>
</body>
</html>
