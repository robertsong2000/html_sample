<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹时钟 | Neon Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #0a0a0f;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .clock-container {
            position: relative;
            z-index: 10;
            text-align: center;
        }
        
        .time {
            font-size: clamp(48px, 15vw, 180px);
            font-weight: 100;
            letter-spacing: 10px;
            color: #fff;
            text-shadow: 
                0 0 10px #0ff,
                0 0 20px #0ff,
                0 0 40px #0ff,
                0 0 80px #00d4ff;
            animation: pulse 2s ease-in-out infinite;
        }
        
        .date {
            font-size: clamp(16px, 3vw, 32px);
            color: #ff00ff;
            text-shadow: 
                0 0 10px #ff00ff,
                0 0 20px #ff00ff;
            margin-top: 20px;
            letter-spacing: 5px;
        }
        
        .seconds-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.85; }
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="neon"></canvas>
    <div class="clock-container">
        <div class="time" id="time">00:00:00</div>
        <div class="date" id="date">2026年03月14日 星期六</div>
        <svg class="seconds-ring" id="secondsRing" width="600" height="600" viewBox="0 0 600 600">
            <circle cx="300" cy="300" r="280" fill="none" stroke="rgba(0,255,255,0.1)" stroke-width="2"/>
            <circle id="secondArc" cx="300" cy="300" r="280" fill="none" stroke="#0ff" stroke-width="3" 
                    stroke-dasharray="1759.29" stroke-dashoffset="1759.29" stroke-linecap="round"
                    style="filter: drop-shadow(0 0 10px #0ff)"/>
        </svg>
    </div>
    <div class="info">点击切换颜色 | 滚轮调整光晕强度</div>
    
    <script>
        const canvas = document.getElementById('neon');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let glowIntensity = 1;
        let colorScheme = 0;
        let time = 0;
        
        const colorSchemes = [
            { primary: '#00ffff', secondary: '#ff00ff', accent: '#ffff00' },
            { primary: '#ff6b6b', secondary: '#4ecdc4', accent: '#ffe66d' },
            { primary: '#a55eea', secondary: '#45aaf2', accent: '#26de81' },
            { primary: '#ff9f43', secondary: '#ee5a24', accent: '#00d2d3' },
        ];
        
        // 粒子系统
        let particles = [];
        
        class Particle {
            constructor(x, y, color) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 2;
                this.alpha = Math.random() * 0.5 + 0.3;
                this.color = color || colorSchemes[colorScheme].primary;
                this.life = 100 + Math.random() * 100;
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life--;
                this.alpha = (this.life / 200) * 0.5;
                
                if (this.x < 0 || this.x > width) this.speedX *= -1;
                if (this.y < 0 || this.y > height) this.speedY *= -1;
                
                return this.life > 0;
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha * glowIntensity;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 15 * glowIntensity;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        // 光环
        class Ring {
            constructor() {
                this.x = width / 2;
                this.y = height / 2;
                this.radius = 50 + Math.random() * 200;
                this.maxRadius = this.radius + 100;
                this.alpha = 0.3;
                this.speed = 0.5 + Math.random() * 1;
                this.colorIndex = Math.floor(Math.random() * 3);
            }
            
            update() {
                this.radius += this.speed;
                this.alpha = 0.3 * (1 - (this.radius - this.maxRadius + 100) / 100);
                return this.radius < this.maxRadius && this.alpha > 0;
            }
            
            draw() {
                const colors = colorSchemes[colorScheme];
                const color = [colors.primary, colors.secondary, colors.accent][this.colorIndex];
                
                ctx.save();
                ctx.globalAlpha = this.alpha * glowIntensity;
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 20 * glowIntensity;
                ctx.shadowColor = color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }
        }
        
        let rings = [];
        
        // 浮动线条
        class Line {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.length = 50 + Math.random() * 150;
                this.angle = Math.random() * Math.PI * 2;
                this.speed = 0.5 + Math.random() * 1;
                this.alpha = 0.1 + Math.random() * 0.2;
                this.colorIndex = Math.floor(Math.random() * 3);
            }
            
            update() {
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                
                if (this.x < -this.length || this.x > width + this.length ||
                    this.y < -this.length || this.y > height + this.length) {
                    this.reset();
                }
            }
            
            draw() {
                const colors = colorSchemes[colorScheme];
                const color = [colors.primary, colors.secondary, colors.accent][this.colorIndex];
                
                ctx.save();
                ctx.globalAlpha = this.alpha * glowIntensity;
                ctx.strokeStyle = color;
                ctx.lineWidth = 1;
                ctx.shadowBlur = 10 * glowIntensity;
                ctx.shadowColor = color;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(
                    this.x + Math.cos(this.angle) * this.length,
                    this.y + Math.sin(this.angle) * this.length
                );
                ctx.stroke();
                ctx.restore();
            }
        }
        
        let lines = [];
        
        function init() {
            resize();
            
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle());
            }
            
            for (let i = 0; i < 30; i++) {
                lines.push(new Line());
            }
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            // 调整秒环大小
            const size = Math.min(width, height) * 0.9;
            const svg = document.getElementById('secondsRing');
            svg.style.width = size + 'px';
            svg.style.height = size + 'px';
        }
        
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const ms = now.getMilliseconds();
            
            document.getElementById('time').textContent = `${hours}:${minutes}:${seconds}`;
            
            // 更新日期
            const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const dayOfWeek = days[now.getDay()];
            
            document.getElementById('date').textContent = `${year}年${month}月${day}日 ${dayOfWeek}`;
            
            // 更新秒环
            const totalSeconds = (now.getSeconds() + ms / 1000) / 60;
            const circumference = 2 * Math.PI * 280;
            const offset = circumference * (1 - totalSeconds);
            document.getElementById('secondArc').style.strokeDashoffset = offset;
            
            // 更新颜色
            const colors = colorSchemes[colorScheme];
            document.getElementById('time').style.textShadow = `
                0 0 10px ${colors.primary},
                0 0 20px ${colors.primary},
                0 0 40px ${colors.primary},
                0 0 80px ${colors.primary}
            `;
            document.getElementById('date').style.textShadow = `
                0 0 10px ${colors.secondary},
                0 0 20px ${colors.secondary}
            `;
            document.getElementById('secondArc').style.stroke = colors.primary;
            document.getElementById('secondArc').style.filter = `drop-shadow(0 0 10px ${colors.primary})`;
        }
        
        function draw() {
            // 清除画布（带淡出）
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制浮动线条
            lines.forEach(line => {
                line.update();
                line.draw();
            });
            
            // 绘制粒子
            particles = particles.filter(p => {
                p.draw();
                return p.update();
            });
            
            // 补充粒子
            while (particles.length < 80) {
                particles.push(new Particle());
            }
            
            // 绘制光环
            rings = rings.filter(r => {
                r.draw();
                return r.update();
            });
            
            // 随机添加光环
            if (Math.random() > 0.97) {
                rings.push(new Ring());
            }
            
            // 中心光晕
            const colors = colorSchemes[colorScheme];
            const gradient = ctx.createRadialGradient(
                width / 2, height / 2, 0,
                width / 2, height / 2, 300
            );
            gradient.addColorStop(0, colors.primary + '20');
            gradient.addColorStop(0.5, colors.secondary + '10');
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            time += 0.016;
            
            requestAnimationFrame(draw);
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        window.addEventListener('click', (e) => {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
            
            // 点击产生粒子爆发
            const colors = colorSchemes[colorScheme];
            for (let i = 0; i < 20; i++) {
                const color = [colors.primary, colors.secondary, colors.accent][Math.floor(Math.random() * 3)];
                particles.push(new Particle(e.clientX, e.clientY, color));
            }
            
            // 添加光环
            rings.push(new Ring());
        });
        
        window.addEventListener('mousemove', (e) => {
            if (Math.random() > 0.8) {
                const colors = colorSchemes[colorScheme];
                particles.push(new Particle(e.clientX, e.clientY, colors.accent));
            }
        });
        
        window.addEventListener('wheel', (e) => {
            glowIntensity += e.deltaY > 0 ? -0.1 : 0.1;
            glowIntensity = Math.max(0.3, Math.min(2, glowIntensity));
        });
        
        // 触摸支持
        window.addEventListener('touchstart', (e) => {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
        });
        
        // 键盘控制
        window.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                colorScheme = (colorScheme + 1) % colorSchemes.length;
            }
        });
        
        init();
        draw();
        updateClock();
        setInterval(updateClock, 50);
    </script>
</body>
</html>
