<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粒子动画 - Particle Universe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 280px;
        }
        
        .info h3 {
            margin-bottom: 10px;
            font-size: 16px;
            color: #ff88ff;
            text-shadow: 0 0 15px rgba(255, 136, 255, 0.6);
        }
        
        .info p {
            margin: 5px 0;
            font-size: 12px;
            line-height: 1.6;
        }
        
        .info .key {
            color: #88ffff;
            font-weight: bold;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
        }
        
        @media (max-width: 600px) {
            .info {
                font-size: 12px;
                padding: 10px 15px;
                max-width: 220px;
            }
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    
    <div class="info">
        <h3>✨ 粒子宇宙</h3>
        <p><span class="key">移动鼠标</span> - 吸引/排斥粒子</p>
        <p><span class="key">点击</span> - 切换吸引/排斥模式</p>
        <p><span class="key">滚轮</span> - 调整影响力范围</p>
        <p><span class="key">空格</span> - 切换粒子模式</p>
    </div>
    
    <div class="stats" id="stats">
        FPS: 60 | 粒子: 0
    </div>

    <script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        const statsEl = document.getElementById('stats');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        let attractMode = true;
        let influenceRadius = 150;
        let particleMode = 0;
        let time = 0;
        
        // 粒子模式
        const particleModes = [
            { name: '自由漂浮', behavior: 'free' },
            { name: '连线网络', behavior: 'network' },
            { name: '漩涡', behavior: 'vortex' },
            { name: '星云', behavior: 'nebula' }
        ];
        
        // 粒子类
        class Particle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.size = 1 + Math.random() * 3;
                this.baseSize = this.size;
                this.alpha = 0.3 + Math.random() * 0.7;
                this.hue = Math.random() * 360;
                this.pulsePhase = Math.random() * Math.PI * 2;
            }
            
            update() {
                const mode = particleModes[particleMode];
                
                // 脉冲效果
                this.pulsePhase += 0.05;
                this.size = this.baseSize * (0.8 + Math.sin(this.pulsePhase) * 0.2);
                
                // 根据模式更新行为
                switch (mode.behavior) {
                    case 'free':
                        this.updateFree();
                        break;
                    case 'network':
                        this.updateNetwork();
                        break;
                    case 'vortex':
                        this.updateVortex();
                        break;
                    case 'nebula':
                        this.updateNebula();
                        break;
                }
                
                // 鼠标交互
                this.handleMouseInteraction();
                
                // 边界处理
                this.handleBoundaries();
            }
            
            updateFree() {
                // 自由漂浮
                this.x += this.vx;
                this.y += this.vy;
                
                // 轻微阻力
                this.vx *= 0.99;
                this.vy *= 0.99;
                
                // 随机扰动
                this.vx += (Math.random() - 0.5) * 0.1;
                this.vy += (Math.random() - 0.5) * 0.1;
            }
            
            updateNetwork() {
                // 网络模式 - 缓慢移动
                this.x += this.vx * 0.3;
                this.y += this.vy * 0.3;
                this.vx *= 0.98;
                this.vy *= 0.98;
            }
            
            updateVortex() {
                // 漩涡模式
                const centerX = width / 2;
                const centerY = height / 2;
                const dx = this.x - centerX;
                const dy = this.y - centerY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const angle = Math.atan2(dy, dx);
                
                // 向心力和切向力
                const tangentSpeed = 0.02;
                const centerForce = 0.001;
                
                this.vx += Math.cos(angle + Math.PI / 2) * tangentSpeed - dx * centerForce;
                this.vy += Math.sin(angle + Math.PI / 2) * tangentSpeed - dy * centerForce;
                
                this.x += this.vx;
                this.y += this.vy;
                this.vx *= 0.99;
                this.vy *= 0.99;
            }
            
            updateNebula() {
                // 星云模式 - 缓慢漂移和颜色变化
                this.x += this.vx * 0.5;
                this.y += this.vy * 0.5;
                this.hue = (this.hue + 0.1) % 360;
                this.vx *= 0.995;
                this.vy *= 0.995;
            }
            
            handleMouseInteraction() {
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < influenceRadius && dist > 0) {
                    const force = (1 - dist / influenceRadius) * 0.5;
                    const angle = Math.atan2(dy, dx);
                    
                    if (attractMode) {
                        // 吸引
                        this.vx += Math.cos(angle) * force;
                        this.vy += Math.sin(angle) * force;
                    } else {
                        // 排斥
                        this.vx -= Math.cos(angle) * force;
                        this.vy -= Math.sin(angle) * force;
                    }
                    
                    // 靠近鼠标时增大
                    this.size = this.baseSize * (1 + (1 - dist / influenceRadius) * 0.5);
                }
            }
            
            handleBoundaries() {
                // 软边界 - 缓慢反弹
                const margin = 50;
                const bounceForce = 0.1;
                
                if (this.x < margin) this.vx += bounceForce;
                if (this.x > width - margin) this.vx -= bounceForce;
                if (this.y < margin) this.vy += bounceForce;
                if (this.y > height - margin) this.vy -= bounceForce;
                
                // 硬边界
                if (this.x < 0) { this.x = 0; this.vx *= -0.5; }
                if (this.x > width) { this.x = width; this.vx *= -0.5; }
                if (this.y < 0) { this.y = 0; this.vy *= -0.5; }
                if (this.y > height) { this.y = height; this.vy *= -0.5; }
            }
            
            draw(ctx) {
                // 发光效果
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size * 3
                );
                gradient.addColorStop(0, `hsla(${this.hue}, 100%, 70%, ${this.alpha})`);
                gradient.addColorStop(0.5, `hsla(${this.hue}, 100%, 50%, ${this.alpha * 0.3})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // 核心
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 80%, ${this.alpha})`;
                ctx.fill();
            }
        }
        
        let particles = [];
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        
        function init() {
            resize();
            createParticles();
        }
        
        function resize() {
            const dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            
            ctx.scale(dpr, dpr);
        }
        
        function createParticles() {
            particles = [];
            const count = Math.min(500, Math.floor((width * height) / 3000));
            
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }
        
        function drawConnections() {
            if (particleModes[particleMode].behavior !== 'network') return;
            
            const connectionDist = 100;
            
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < connectionDist) {
                        const alpha = (1 - dist / connectionDist) * 0.3;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = `rgba(150, 200, 255, ${alpha})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }
        }
        
        function drawMouseInfluence() {
            // 影响范围可视化
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, influenceRadius, 0, Math.PI * 2);
            ctx.strokeStyle = attractMode ? 
                'rgba(100, 255, 100, 0.3)' : 
                'rgba(255, 100, 100, 0.3)';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // 中心点
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, 5, 0, Math.PI * 2);
            ctx.fillStyle = attractMode ? '#66ff66' : '#ff6666';
            ctx.fill();
        }
        
        function animate(currentTime) {
            // FPS
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
            }
            
            time++;
            
            // 清除（带残影）
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制连线（网络模式）
            drawConnections();
            
            // 更新和绘制粒子
            particles.forEach(p => {
                p.update();
                p.draw(ctx);
            });
            
            // 绘制鼠标影响范围
            drawMouseInfluence();
            
            // 更新统计
            const modeName = particleModes[particleMode].name;
            statsEl.textContent = `FPS: ${fps} | 粒子: ${particles.length} | ${modeName}`;
            
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        window.addEventListener('resize', () => {
            resize();
            createParticles();
        });
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('click', () => {
            attractMode = !attractMode;
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            influenceRadius = Math.max(50, Math.min(300, influenceRadius - e.deltaY * 0.5));
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                particleMode = (particleMode + 1) % particleModes.length;
            }
        });
        
        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            attractMode = !attractMode;
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        });
        
        // 启动
        init();
        animate(performance.now());
    </script>
</body>
</html>
