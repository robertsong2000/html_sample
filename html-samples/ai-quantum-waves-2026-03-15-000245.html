<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量子波动 | Quantum Waves</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0a0a1a; font-family: Arial, sans-serif; }
        canvas { display: block; position: fixed; top: 0; left: 0; }
        .info { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(0,255,255,0.7); font-size: 14px; text-align: center; pointer-events: none; z-index: 10; }
        .title { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); color: rgba(0,255,255,0.9); font-size: 28px; font-weight: 300; letter-spacing: 6px; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>
    <canvas id="quantum"></canvas>
    <div class="title">Quantum Waves</div>
    <div class="info">移动鼠标干涉波纹 | 点击创建波包 | 滚轮调整波速</div>
    <script>
        const canvas = document.getElementById('quantum');
        const ctx = canvas.getContext('2d');
        let width, height, mouseX = 0, mouseY = 0, waveSpeed = 1, colorMode = 0, time = 0;
        const colors = [['#00ffff','#ff00ff','#ffff00'],['#00ff88','#ff6b6b','#4ecdc4'],['#a55eea','#45aaf2','#26de81']];
        let waves = [];
        class Wave {
            constructor(x, y, amp) {
                this.cx = x; this.cy = y; this.radius = 0; this.maxRadius = 400; this.amplitude = amp || 1; this.alpha = 1;
            }
            update() {
                this.radius += 3 * waveSpeed;
                this.alpha = 1 - this.radius / this.maxRadius;
                return this.alpha > 0;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha * 0.6;
                ctx.strokeStyle = colors[colorMode][Math.floor(Math.random() * 3)];
                ctx.lineWidth = 2;
                ctx.shadowBlur = 15;
                ctx.shadowColor = ctx.strokeStyle;
                ctx.beginPath();
                ctx.arc(this.cx, this.cy, this.radius, 0, Math.PI * 2);
                ctx.stroke();
                ctx.restore();
            }
        }
        let particles = [];
        class QParticle {
            constructor() {
                this.x = Math.random() * width; this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2; this.vy = (Math.random() - 0.5) * 2;
                this.size = Math.random() * 3 + 1; this.phase = Math.random() * Math.PI * 2;
            }
            update() {
                this.phase += 0.05;
                const wave1 = Math.sin(this.x * 0.02 + time) * 20;
                const wave2 = Math.cos(this.y * 0.02 + time * 1.3) * 20;
                const wave3 = Math.sin((this.x + this.y) * 0.01 + time * 0.7) * 15;
                const dx = mouseX - this.x; const dy = mouseY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const influence = dist < 200 ? (200 - dist) / 200 : 0;
                this.x += this.vx + influence * dx * 0.01 + (wave1 + wave2 + wave3) * 0.02 * waveSpeed;
                this.y += this.vy + influence * dy * 0.01 + (wave1 - wave2 + wave3) * 0.02 * waveSpeed;
                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }
            draw() {
                const alpha = (Math.sin(this.phase) + 1) / 2 * 0.5 + 0.3;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = colors[colorMode][Math.floor(this.phase) % 3];
                ctx.shadowBlur = 10;
                ctx.shadowColor = ctx.fillStyle;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        function init() {
            resize();
            for (let i = 0; i < 300; i++) particles.push(new QParticle());
        }
        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        function draw() {
            ctx.fillStyle = 'rgba(10,10,26,0.15)';
            ctx.fillRect(0, 0, width, height);
            const gradient = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 200);
            gradient.addColorStop(0, colors[colorMode][0] + '20');
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            waves = waves.filter(w => { w.draw(); return w.update(); });
            particles.forEach(p => { p.update(); p.draw(); });
            if (Math.random() > 0.97) waves.push(new Wave(Math.random() * width, Math.random() * height, 0.5));
            time += 0.016 * waveSpeed;
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
        window.addEventListener('click', e => {
            for (let i = 0; i < 5; i++) waves.push(new Wave(e.clientX + (Math.random() - 0.5) * 50, e.clientY + (Math.random() - 0.5) * 50, 1));
        });
        window.addEventListener('dblclick', () => { colorMode = (colorMode + 1) % colors.length; });
        window.addEventListener('wheel', e => { waveSpeed += e.deltaY > 0 ? -0.2 : 0.2; waveSpeed = Math.max(0.3, Math.min(2.5, waveSpeed)); });
        init(); draw();
    </script>
</body>
</html>
