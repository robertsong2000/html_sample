<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>银河系 - Galaxy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 15px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 
                0 0 20px rgba(255, 255, 255, 0.8),
                0 0 40px rgba(100, 150, 255, 0.6);
            animation: titlePulse 4s ease-in-out infinite;
        }
        
        @keyframes titlePulse {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 1; }
        }
        
        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 10;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90%;
        }
        
        .btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(100, 150, 255, 0.3);
        }
        
        .btn.active {
            background: rgba(100, 150, 255, 0.2);
            border-color: rgba(100, 150, 255, 0.5);
        }
        
        .info {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
            text-align: center;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 11px;
            z-index: 10;
            pointer-events: none;
            text-align: right;
        }
        
        .nebula-info {
            position: fixed;
            bottom: 90px;
            left: 20px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 11px;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="title">银河系</div>
    
    <div class="info">
        🖱️ 移动鼠标 - 控制视角 | 🎨 点击 - 生成新星 | ⚙️ 滚轮 - 缩放
    </div>
    
    <div class="stats" id="stats">
        星星: 0 | 旋转: 1.0x | FPS: 60
    </div>
    
    <div class="nebula-info" id="nebulaInfo">
        星云密度: 中等 | 星系类型: 旋涡星系
    </div>
    
    <div class="controls">
        <button class="btn" onclick="toggleRotation()">🔄 旋转开关</button>
        <button class="btn" onclick="changeSpeed()">⚡ 旋转速度</button>
        <button class="btn" onclick="changeNebula()">🌌 星云样式</button>
        <button class="btn" onclick="toggleArms()">🌀 旋臂显示</button>
        <button class="btn" onclick="createSupernova()">💥 超新星爆发</button>
        <button class="btn" onclick="resetGalaxy()">🔄 重置银河</button>
    </div>
    
    <canvas id="canvas"></canvas>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height, centerX, centerY;
        let mouseX = 0, mouseY = 0;
        let targetMouseX = 0, targetMouseY = 0;
        let zoom = 1;
        let rotation = 0;
        let rotationSpeed = 0.001;
        let isRotating = true;
        let showArms = true;
        
        // 性能监控
        let frameCount = 0;
        let lastFpsUpdate = Date.now();
        let currentFps = 60;
        
        // 星云配置
        const nebulaStyles = [
            { name: '蓝紫色星云', colors: ['#4a1a6b', '#1a1a4b', '#2a1a5b', '#6a2a8b'] },
            { name: '红橙色星云', colors: ['#6b1a1a', '#4b1a1a', '#8b2a2a', '#5b1a1a'] },
            { name: '青蓝色星云', colors: ['#1a4b6b', '#1a3b5b', '#2a5b7b', '#1a2b4b'] },
            { name: '金棕色星云', colors: ['#6b4a1a', '#5b3a1a', '#7b5a2a', '#4b2a1a'] },
            { name: '混合星云', colors: ['#4a1a6b', '#6b1a1a', '#1a4b6b', '#6b4a1a'] }
        ];
        let currentNebulaStyle = 0;
        
        // 星星类
        class Star {
            constructor(armIndex = -1) {
                this.reset(armIndex);
            }
            
            reset(armIndex = -1) {
                if (armIndex >= 0) {
                    // 旋臂上的星星
                    const armAngle = (armIndex / 4) * Math.PI * 2;
                    const distance = 50 + Math.random() * 350;
                    const spiralAngle = armAngle + (distance / 100) * 0.5;
                    const scatter = (Math.random() - 0.5) * 40;
                    
                    this.baseAngle = spiralAngle + (Math.random() - 0.5) * 0.3;
                    this.baseDistance = distance + scatter;
                } else {
                    // 随机分布的星星
                    this.baseAngle = Math.random() * Math.PI * 2;
                    this.baseDistance = Math.random() * 400;
                }
                
                this.angle = this.baseAngle;
                this.distance = this.baseDistance;
                
                // 颜色：根据距离和随机性
                const colorType = Math.random();
                if (colorType < 0.4) {
                    this.color = '#ffffff'; // 白色
                } else if (colorType < 0.6) {
                    this.color = '#aaccff'; // 蓝白色
                } else if (colorType < 0.8) {
                    this.color = '#ffccaa'; // 橙黄色
                } else {
                    this.color = '#ffaaaa'; // 红色
                }
                
                this.size = 0.5 + Math.random() * 2;
                this.brightness = 0.5 + Math.random() * 0.5;
                this.twinkleSpeed = 0.02 + Math.random() * 0.03;
                this.twinklePhase = Math.random() * Math.PI * 2;
            }
            
            update(time) {
                if (isRotating) {
                    // 旋转：内部转得快
                    const rotationFactor = 1 / (1 + this.distance / 200);
                    this.angle = this.baseAngle + rotation * rotationFactor;
                }
                
                // 闪烁
                this.twinklePhase += this.twinkleSpeed;
                this.currentBrightness = this.brightness * (0.7 + 0.3 * Math.sin(this.twinklePhase));
                
                // 鼠标影响（视差效果）
                const parallaxFactor = this.distance / 400;
                this.displayX = this.distance * Math.cos(this.angle) - (mouseX - centerX) * parallaxFactor * 0.1;
                this.displayY = this.distance * Math.sin(this.angle) - (mouseY - centerY) * parallaxFactor * 0.1;
            }
            
            draw() {
                const x = centerX + this.displayX * zoom;
                const y = centerY + this.displayY * zoom;
                
                if (x < -10 || x > width + 10 || y < -10 || y > height + 10) return;
                
                const size = this.size * zoom;
                const alpha = this.currentBrightness;
                
                // 发光效果
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, size * 2);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(0.5, this.color.replace(')', `, ${alpha * 0.5})`).replace('#', 'rgba(').replace(/([a-f0-9]{2})([a-f0-9]{2})([a-f0-9]{2})/i, (m, r, g, b) => 
                    `${parseInt(r, 16)}, ${parseInt(g, 16)}, ${parseInt(b, 16)}`));
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(x, y, size * 2, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.globalAlpha = alpha;
                ctx.fill();
                
                // 核心
                ctx.beginPath();
                ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        // 星云类
        class Nebula {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = (Math.random() - 0.5) * 800;
                this.y = (Math.random() - 0.5) * 600;
                this.radius = 50 + Math.random() * 150;
                this.color = nebulaStyles[currentNebulaStyle].colors[Math.floor(Math.random() * 4)];
                this.alpha = 0.1 + Math.random() * 0.2;
                this.pulsePhase = Math.random() * Math.PI * 2;
                this.pulseSpeed = 0.01 + Math.random() * 0.02;
            }
            
            update() {
                this.pulsePhase += this.pulseSpeed;
                this.currentAlpha = this.alpha * (0.8 + 0.2 * Math.sin(this.pulsePhase));
            }
            
            draw() {
                const x = centerX + (this.x - (mouseX - centerX) * 0.05) * zoom;
                const y = centerY + (this.y - (mouseY - centerY) * 0.05) * zoom;
                const radius = this.radius * zoom;
                
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
                gradient.addColorStop(0, this.color + Math.floor(this.currentAlpha * 255).toString(16).padStart(2, '0'));
                gradient.addColorStop(0.5, this.color + Math.floor(this.currentAlpha * 128).toString(16).padStart(2, '0'));
                gradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // 超新星爆发
        class Supernova {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = 300;
                this.speed = 10;
                this.alpha = 1;
                this.particles = [];
                
                // 生成爆发粒子
                for (let i = 0; i < 100; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * 5;
                    this.particles.push({
                        x: 0,
                        y: 0,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        size: 1 + Math.random() * 2,
                        alpha: 1
                    });
                }
            }
            
            update() {
                this.radius += this.speed;
                this.alpha = 1 - (this.radius / this.maxRadius);
                
                this.particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.alpha *= 0.98;
                });
                
                return this.radius < this.maxRadius;
            }
            
            draw() {
                const x = centerX + this.x * zoom;
                const y = centerY + this.y * zoom;
                
                // 冲击波
                ctx.beginPath();
                ctx.arc(x, y, this.radius * zoom, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(255, 255, 255, ${this.alpha * 0.5})`;
                ctx.lineWidth = 3;
                ctx.stroke();
                
                // 中心闪光
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, this.radius * 0.3 * zoom);
                gradient.addColorStop(0, `rgba(255, 255, 255, ${this.alpha})`);
                gradient.addColorStop(0.5, `rgba(255, 200, 100, ${this.alpha * 0.5})`);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(x, y, this.radius * 0.3 * zoom, 0, Math.PI * 2);
                ctx.fill();
                
                // 粒子
                this.particles.forEach(p => {
                    if (p.alpha > 0.01) {
                        const px = x + p.x * zoom;
                        const py = y + p.y * zoom;
                        ctx.beginPath();
                        ctx.arc(px, py, p.size * zoom, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(255, 255, 200, ${p.alpha})`;
                        ctx.fill();
                    }
                });
            }
        }
        
        let stars = [];
        let nebulae = [];
        let supernovas = [];
        
        // 初始化
        function init() {
            resize();
            createGalaxy();
            window.addEventListener('resize', resize);
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }
        
        function createGalaxy() {
            stars = [];
            nebulae = [];
            
            // 创建旋臂星星
            for (let arm = 0; arm < 4; arm++) {
                for (let i = 0; i < 200; i++) {
                    stars.push(new Star(arm));
                }
            }
            
            // 创建随机分布的星星
            for (let i = 0; i < 300; i++) {
                stars.push(new Star(-1));
            }
            
            // 创建星云
            for (let i = 0; i < 8; i++) {
                nebulae.push(new Nebula());
            }
            
            updateStats();
        }
        
        // 绘制银河核心
        function drawCore() {
            const coreGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 100 * zoom);
            coreGradient.addColorStop(0, 'rgba(255, 255, 220, 0.8)');
            coreGradient.addColorStop(0.2, 'rgba(255, 220, 180, 0.4)');
            coreGradient.addColorStop(0.5, 'rgba(200, 150, 100, 0.2)');
            coreGradient.addColorStop(1, 'transparent');
            
            ctx.fillStyle = coreGradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 100 * zoom, 0, Math.PI * 2);
            ctx.fill();
        }
        
        // 绘制旋臂（简化）
        function drawArms() {
            if (!showArms) return;
            
            ctx.strokeStyle = 'rgba(100, 150, 255, 0.1)';
            ctx.lineWidth = 20 * zoom;
            
            for (let arm = 0; arm < 4; arm++) {
                const armAngle = (arm / 4) * Math.PI * 2 + rotation;
                
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                
                for (let i = 0; i < 50; i++) {
                    const distance = (i / 50) * 350;
                    const spiralAngle = armAngle + (distance / 100) * 0.5;
                    const x = centerX + distance * Math.cos(spiralAngle) * zoom;
                    const y = centerY + distance * Math.sin(spiralAngle) * zoom;
                    ctx.lineTo(x, y);
                }
                
                ctx.stroke();
            }
        }
        
        // 动画循环
        let lastTime = 0;
        const targetFPS = 60;
        const interval = 1000 / targetFPS;
        
        function animate(currentTime) {
            requestAnimationFrame(animate);
            
            const delta = currentTime - lastTime;
            if (delta < interval) return;
            lastTime = currentTime - (delta % interval);
            
            // FPS计算
            frameCount++;
            if (currentTime - lastFpsUpdate >= 1000) {
                currentFps = frameCount;
                frameCount = 0;
                lastFpsUpdate = currentTime;
                updateStats();
            }
            
            // 清除画布
            ctx.fillStyle = 'rgba(0, 0, 5, 0.3)';
            ctx.fillRect(0, 0, width, height);
            
            // 平滑鼠标移动
            mouseX += (targetMouseX - mouseX) * 0.05;
            mouseY += (targetMouseY - mouseY) * 0.05;
            
            // 更新旋转
            if (isRotating) {
                rotation += rotationSpeed;
            }
            
            // 绘制星云
            nebulae.forEach(nebula => {
                nebula.update();
                nebula.draw();
            });
            
            // 绘制旋臂
            drawArms();
            
            // 绘制银河核心
            drawCore();
            
            // 更新和绘制星星
            stars.forEach(star => {
                star.update(currentTime);
                star.draw();
            });
            
            // 更新和绘制超新星
            supernovas = supernovas.filter(s => {
                const alive = s.update();
                if (alive) s.draw();
                return alive;
            });
        }
        
        function updateStats() {
            document.getElementById('stats').textContent = 
                `星星: ${stars.length} | 旋转: ${(rotationSpeed * 1000).toFixed(1)}x | FPS: ${currentFps}`;
            
            const densityNames = ['稀疏', '中等', '密集'];
            const density = Math.floor(nebulae.length / 3);
            document.getElementById('nebulaInfo').textContent = 
                `星云密度: ${densityNames[Math.min(density, 2)]} | 星系类型: 旋涡星系`;
        }
        
        // 事件处理
        canvas.addEventListener('mousemove', (e) => {
            targetMouseX = e.clientX;
            targetMouseY = e.clientY;
        });
        
        canvas.addEventListener('click', (e) => {
            // 在点击位置创建新星星
            const dx = e.clientX - centerX;
            const dy = e.clientY - centerY;
            const distance = Math.sqrt(dx * dx + dy * dy) / zoom;
            const angle = Math.atan2(dy, dx);
            
            const star = new Star();
            star.baseAngle = angle;
            star.baseDistance = distance;
            star.angle = angle;
            star.distance = distance;
            star.size = 3;
            star.brightness = 1;
            star.color = '#ffffff';
            stars.push(star);
            
            updateStats();
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            zoom = Math.max(0.3, Math.min(3, zoom - e.deltaY * 0.001));
        });
        
        // 控制函数
        function toggleRotation() {
            isRotating = !isRotating;
            event.target.classList.toggle('active', !isRotating);
        }
        
        function changeSpeed() {
            const speeds = [0.0005, 0.001, 0.002, 0.004];
            const currentIndex = speeds.indexOf(rotationSpeed);
            rotationSpeed = speeds[(currentIndex + 1) % speeds.length];
            updateStats();
        }
        
        function changeNebula() {
            currentNebulaStyle = (currentNebulaStyle + 1) % nebulaStyles.length;
            nebulae.forEach(n => n.color = nebulaStyles[currentNebulaStyle].colors[Math.floor(Math.random() * 4)]);
        }
        
        function toggleArms() {
            showArms = !showArms;
            event.target.classList.toggle('active', !showArms);
        }
        
        function createSupernova() {
            const x = (Math.random() - 0.5) * 400;
            const y = (Math.random() - 0.5) * 300;
            supernovas.push(new Supernova(x, y));
        }
        
        function resetGalaxy() {
            rotation = 0;
            zoom = 1;
            rotationSpeed = 0.001;
            isRotating = true;
            showArms = true;
            currentNebulaStyle = 0;
            createGalaxy();
        }
        
        // 启动
        init();
        animate(0);
    </script>
</body>
</html>
