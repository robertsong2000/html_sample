<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fireworks Festival - 烟花盛宴</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255, 200, 100, 0.8);
            pointer-events: none;
        }

        .info span {
            display: block;
            margin: 5px 0;
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                bottom: 10px;
                left: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="fireworks"></canvas>
    <div class="info">
        <span>🖱️ 移动鼠标 - 引导烟花方向</span>
        <span>👆 点击 - 发射烟花</span>
    </div>

    <script>
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');

        // Responsive canvas
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Mouse tracking
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        // Color palettes for fireworks
        const palettes = [
            ['#ff0000', '#ff4400', '#ff8800', '#ffcc00'],
            ['#00ff00', '#44ff00', '#88ff00', '#ccff00'],
            ['#0088ff', '#00ccff', '#00ffff', '#88ffff'],
            ['#ff00ff', '#ff44ff', '#ff88ff', '#ffccff'],
            ['#ffff00', '#ffcc00', '#ff8800', '#ff4400'],
            ['#ff0088', '#ff0044', '#ff4488', '#ff88cc'],
            ['#8800ff', '#aa00ff', '#cc44ff', '#ee88ff'],
            ['#ffffff', '#cccccc', '#ffcccc', '#ffffcc']
        ];

        // Particle class
        class Particle {
            constructor(x, y, color, velocity, gravity, friction, size, life) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = velocity.x;
                this.vy = velocity.y;
                this.gravity = gravity;
                this.friction = friction;
                this.size = size;
                this.life = life;
                this.maxLife = life;
                this.trail = [];
                this.trailLength = 5;
            }

            update() {
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.trailLength) {
                    this.trail.shift();
                }

                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
            }

            draw() {
                const alpha = this.life / this.maxLife;
                
                // Draw trail
                for (let i = 0; i < this.trail.length; i++) {
                    const t = this.trail[i];
                    const trailAlpha = (i / this.trail.length) * alpha * 0.5;
                    ctx.fillStyle = this.color.replace(')', `, ${trailAlpha})`).replace('rgb', 'rgba');
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, this.size * (i / this.trail.length), 0, Math.PI * 2);
                    ctx.fill();
                }

                // Draw particle
                ctx.fillStyle = this.color.replace(')', `, ${alpha})`).replace('rgb', 'rgba');
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            isDead() {
                return this.life <= 0;
            }
        }

        // Rocket class
        class Rocket {
            constructor(x, targetY) {
                this.x = x;
                this.y = canvas.height;
                this.targetY = targetY;
                this.vy = -12 - Math.random() * 4;
                this.palette = palettes[Math.floor(Math.random() * palettes.length)];
                this.trail = [];
                this.exploded = false;
            }

            update() {
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 15) {
                    this.trail.shift();
                }

                this.y += this.vy;
                this.vy += 0.15;

                // Mouse influence
                const dx = mouseX - this.x;
                const influence = dx * 0.01;
                this.x += influence;

                if (this.vy >= 0 || this.y <= this.targetY) {
                    this.exploded = true;
                    return this.explode();
                }
                return [];
            }

            draw() {
                // Draw trail
                for (let i = 0; i < this.trail.length; i++) {
                    const t = this.trail[i];
                    const alpha = i / this.trail.length;
                    ctx.fillStyle = `rgba(255, 200, 100, ${alpha * 0.8})`;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, 2 * (i / this.trail.length), 0, Math.PI * 2);
                    ctx.fill();
                }

                // Draw rocket
                ctx.fillStyle = '#fff';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#ff8800';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            explode() {
                const particles = [];
                const particleCount = 80 + Math.floor(Math.random() * 40);
                const type = Math.floor(Math.random() * 4);

                for (let i = 0; i < particleCount; i++) {
                    let vx, vy;
                    const color = this.palette[Math.floor(Math.random() * this.palette.length)];
                    const rgbColor = hexToRgb(color);

                    switch (type) {
                        case 0: // Circular explosion
                            const angle = (Math.PI * 2 * i) / particleCount + Math.random() * 0.2;
                            const speed = 4 + Math.random() * 4;
                            vx = Math.cos(angle) * speed;
                            vy = Math.sin(angle) * speed;
                            break;
                        case 1: // Star shape
                            const starAngle = (Math.PI * 2 * i) / particleCount;
                            const starSpeed = (i % 5 === 0) ? 8 : 3;
                            vx = Math.cos(starAngle) * starSpeed * (0.5 + Math.random() * 0.5);
                            vy = Math.sin(starAngle) * starSpeed * (0.5 + Math.random() * 0.5);
                            break;
                        case 2: // Willow
                            const willowAngle = Math.random() * Math.PI * 2;
                            const willowSpeed = 2 + Math.random() * 3;
                            vx = Math.cos(willowAngle) * willowSpeed;
                            vy = Math.sin(willowAngle) * willowSpeed - 2;
                            break;
                        case 3: // Ring
                            const ringAngle = Math.random() * Math.PI * 2;
                            const ringSpeed = 5 + Math.random() * 0.5;
                            vx = Math.cos(ringAngle) * ringSpeed;
                            vy = Math.sin(ringAngle) * ringSpeed;
                            break;
                    }

                    particles.push(new Particle(
                        this.x, this.y,
                        rgbColor,
                        { x: vx, y: vy },
                        0.05,
                        0.98,
                        2 + Math.random() * 2,
                        60 + Math.random() * 40
                    ));
                }

                // Add sparkles
                for (let i = 0; i < 20; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 6 + Math.random() * 4;
                    particles.push(new Particle(
                        this.x, this.y,
                        'rgba(255, 255, 255',
                        { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed },
                        0.08,
                        0.95,
                        1,
                        30 + Math.random() * 20
                    ));
                }

                return particles;
            }
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            if (result) {
                return `rgb(${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}`;
            }
            return 'rgb(255, 255, 255)';
        }

        // Game state
        let rockets = [];
        let particles = [];

        // Auto-launch rockets
        let lastAutoLaunch = 0;
        function autoLaunch(time) {
            if (time - lastAutoLaunch > 800 + Math.random() * 1500) {
                const x = Math.random() * canvas.width * 0.8 + canvas.width * 0.1;
                const targetY = canvas.height * 0.2 + Math.random() * canvas.height * 0.3;
                rockets.push(new Rocket(x, targetY));
                lastAutoLaunch = time;
            }
        }

        // Click to launch
        canvas.addEventListener('click', (e) => {
            const targetY = e.clientY;
            rockets.push(new Rocket(e.clientX, targetY));
        });

        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            rockets.push(new Rocket(touch.clientX, touch.clientY));
        });

        // Draw background with gradient
        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#000010');
            gradient.addColorStop(0.5, '#000020');
            gradient.addColorStop(1, '#000510');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Draw city silhouette
        function drawCitySilhouette() {
            ctx.fillStyle = '#0a0a15';
            const buildings = [
                { x: 0, w: 60, h: 80 },
                { x: 55, w: 40, h: 120 },
                { x: 90, w: 50, h: 90 },
                { x: 135, w: 30, h: 150 },
                { x: 160, w: 45, h: 100 },
                { x: 200, w: 55, h: 130 },
                { x: 250, w: 35, h: 85 }
            ];

            const scale = canvas.width / 280;
            buildings.forEach(b => {
                const x = b.x * scale;
                const w = b.w * scale;
                const h = b.h * (canvas.height / 600);
                ctx.fillRect(x, canvas.height - h, w, h);
                
                // Windows
                ctx.fillStyle = 'rgba(255, 200, 100, 0.3)';
                for (let wx = x + 5; wx < x + w - 5; wx += 10) {
                    for (let wy = canvas.height - h + 10; wy < canvas.height - 10; wy += 15) {
                        if (Math.random() > 0.3) {
                            ctx.fillRect(wx, wy, 5, 8);
                        }
                    }
                }
                ctx.fillStyle = '#0a0a15';
            });
        }

        // Main animation loop
        let time = 0;
        function animate(timestamp) {
            time = timestamp || 0;

            // Clear with fade effect
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Auto launch
            autoLaunch(time);

            // Update and draw rockets
            rockets = rockets.filter(rocket => {
                const newParticles = rocket.update();
                particles.push(...newParticles);
                if (!rocket.exploded) {
                    rocket.draw();
                    return true;
                }
                return false;
            });

            // Update and draw particles
            particles = particles.filter(particle => {
                particle.update();
                particle.draw();
                return !particle.isDead();
            });

            // Draw city silhouette
            drawCitySilhouette();

            requestAnimationFrame(animate);
        }

        // Initial background
        drawBackground();
        animate();
    </script>
</body>
</html>
