<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fireworks - 烟花盛宴</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            cursor: crosshair;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255, 200, 100, 0.8);
            pointer-events: none;
        }

        .info span {
            display: block;
            margin: 5px 0;
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                bottom: 10px;
                left: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="fireworks"></canvas>
    <div class="info">
        <span>👆 点击 - 发射烟花</span>
        <span>🖱️ 移动 - 引导火花轨迹</span>
    </div>

    <script>
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Mouse tracking
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });

        // Particle class
        class Particle {
            constructor(x, y, color, velocity, size, gravity, friction, fade) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = velocity.x;
                this.vy = velocity.y;
                this.size = size;
                this.gravity = gravity;
                this.friction = friction;
                this.alpha = 1;
                this.fade = fade;
                this.trail = [];
                this.maxTrail = 5;
            }

            update() {
                this.trail.push({ x: this.x, y: this.y, alpha: this.alpha });
                if (this.trail.length > this.maxTrail) {
                    this.trail.shift();
                }

                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.fade;
            }

            draw() {
                // Draw trail
                this.trail.forEach((point, index) => {
                    const trailAlpha = (index / this.trail.length) * this.alpha * 0.5;
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, this.size * 0.5, 0, Math.PI * 2);
                    ctx.fillStyle = this.color.replace(/[\d.]+\)$/, `${trailAlpha})`);
                    ctx.fill();
                });

                // Draw particle with glow
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }

            isDead() {
                return this.alpha <= 0;
            }
        }

        // Firework rocket class
        class Rocket {
            constructor(x, targetY) {
                this.x = x;
                this.y = canvas.height;
                this.targetY = targetY;
                this.vy = -12 - Math.random() * 4;
                this.vx = (Math.random() - 0.5) * 2;
                this.trail = [];
                this.maxTrail = 15;
                this.exploded = false;
                this.hue = Math.random() * 360;
            }

            update() {
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.maxTrail) {
                    this.trail.shift();
                }

                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.15;

                // Explode when reaching target or slowing down
                if (this.vy >= -2 || this.y <= this.targetY) {
                    this.exploded = true;
                }
            }

            draw() {
                // Draw trail
                this.trail.forEach((point, index) => {
                    const alpha = index / this.trail.length;
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, 2, 0, Math.PI * 2);
                    ctx.fillStyle = `hsla(${this.hue}, 100%, 70%, ${alpha})`;
                    ctx.fill();
                });

                // Draw rocket head
                ctx.save();
                ctx.shadowBlur = 20;
                ctx.shadowColor = `hsl(${this.hue}, 100%, 70%)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${this.hue}, 100%, 80%)`;
                ctx.fill();
                ctx.restore();
            }
        }

        // Arrays to hold particles and rockets
        let particles = [];
        let rockets = [];

        // Color palettes for different firework types
        const palettes = [
            ['#ff6b6b', '#ee5a5a', '#ff8787', '#ffa8a8'], // Red
            ['#4ecdc4', '#45b7aa', '#26de81', '#2bcbba'], // Teal
            ['#ffe66d', '#ffd93d', '#ffec99', '#fff3bf'], // Yellow
            ['#a55eea', '#8854d0', '#d68fff', '#e8b4ff'], // Purple
            ['#ff9ff3', '#f368e0', '#ff6b9d', '#ff85a2'], // Pink
            ['#54a0ff', '#2e86de', '#5f9ea0', '#48dbfb'], // Blue
            ['#ff9f43', '#ee5a24', '#f39c12', '#fdcb6e'], // Orange
        ];

        // Create explosion at position
        function createExplosion(x, y, hue, type) {
            const palette = palettes[Math.floor(Math.random() * palettes.length)];
            const particleCount = 80 + Math.floor(Math.random() * 60);

            switch (type) {
                case 'circle':
                    for (let i = 0; i < particleCount; i++) {
                        const angle = (Math.PI * 2 * i) / particleCount;
                        const speed = 4 + Math.random() * 4;
                        const color = `hsla(${hue + Math.random() * 30}, 100%, ${50 + Math.random() * 30}%, 1)`;
                        particles.push(new Particle(
                            x, y, color,
                            { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed },
                            2 + Math.random() * 2,
                            0.05,
                            0.98,
                            0.015 + Math.random() * 0.01
                        ));
                    }
                    break;

                case 'star':
                    const points = 5;
                    for (let i = 0; i < particleCount; i++) {
                        const angle = (Math.PI * 2 * i) / particleCount;
                        const isPoint = i % (particleCount / points) < particleCount / points / 2;
                        const speed = isPoint ? 6 + Math.random() * 3 : 2 + Math.random() * 2;
                        const color = `hsla(${hue + Math.random() * 20}, 100%, ${60 + Math.random() * 20}%, 1)`;
                        particles.push(new Particle(
                            x, y, color,
                            { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed },
                            2 + Math.random(),
                            0.03,
                            0.97,
                            0.012 + Math.random() * 0.008
                        ));
                    }
                    break;

                case 'ring':
                    for (let ring = 0; ring < 3; ring++) {
                        const ringParticles = 30 + ring * 20;
                        const baseSpeed = 3 + ring * 2;
                        for (let i = 0; i < ringParticles; i++) {
                            const angle = (Math.PI * 2 * i) / ringParticles + ring * 0.2;
                            const speed = baseSpeed + Math.random() * 1;
                            const color = `hsla(${hue + ring * 20}, 100%, ${65 - ring * 10}%, 1)`;
                            particles.push(new Particle(
                                x, y, color,
                                { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed },
                                2.5 - ring * 0.5,
                                0.04,
                                0.98,
                                0.01 + ring * 0.005
                            ));
                        }
                    }
                    break;

                case 'willow':
                    for (let i = 0; i < particleCount; i++) {
                        const angle = (Math.PI * 2 * i) / particleCount + Math.random() * 0.3;
                        const speed = 2 + Math.random() * 5;
                        const color = `hsla(${40 + Math.random() * 20}, 100%, ${60 + Math.random() * 20}%, 1)`;
                        particles.push(new Particle(
                            x, y, color,
                            { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed },
                            1.5 + Math.random(),
                            0.12,
                            0.96,
                            0.008 + Math.random() * 0.005
                        ));
                    }
                    break;

                default:
                    for (let i = 0; i < particleCount; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const speed = 2 + Math.random() * 6;
                        const color = palette[Math.floor(Math.random() * palette.length)];
                        particles.push(new Particle(
                            x, y, color,
                            { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed },
                            1 + Math.random() * 3,
                            0.06,
                            0.97,
                            0.01 + Math.random() * 0.015
                        ));
                    }
            }

            // Add sparkle particles
            for (let i = 0; i < 20; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * 8;
                particles.push(new Particle(
                    x, y, 'rgba(255, 255, 255, 1)',
                    { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed },
                    1,
                    0.05,
                    0.99,
                    0.03
                ));
            }
        }

        // Launch firework
        function launchFirework(x, targetY) {
            rockets.push(new Rocket(x, targetY));
        }

        // Click to launch
        canvas.addEventListener('click', (e) => {
            launchFirework(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            launchFirework(touch.clientX, touch.clientY);
        });

        // Auto-launch fireworks
        let autoLaunchTimer = 0;
        function autoLaunch() {
            autoLaunchTimer++;
            if (autoLaunchTimer > 60 && Math.random() < 0.03) {
                const x = Math.random() * canvas.width;
                const targetY = canvas.height * 0.15 + Math.random() * canvas.height * 0.35;
                launchFirework(x, targetY);
                autoLaunchTimer = 0;
            }
        }

        // Stars background
        const stars = [];
        for (let i = 0; i < 150; i++) {
            stars.push({
                x: Math.random() * 2000,
                y: Math.random() * 1200,
                size: Math.random() * 1.5,
                twinkle: Math.random() * Math.PI * 2
            });
        }

        function drawStars() {
            stars.forEach(star => {
                star.twinkle += 0.03;
                const alpha = 0.4 + Math.sin(star.twinkle) * 0.3;
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.beginPath();
                ctx.arc(star.x % canvas.width, star.y % canvas.height, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // City silhouette
        function drawCitySilhouette() {
            const buildings = [];
            let x = 0;
            while (x < canvas.width) {
                const width = 30 + Math.random() * 60;
                const height = 50 + Math.random() * 150;
                buildings.push({ x, width, height });
                x += width + Math.random() * 20;
            }

            ctx.fillStyle = '#0a0a0a';
            buildings.forEach(b => {
                ctx.fillRect(b.x, canvas.height - b.height, b.width, b.height);
                
                // Windows
                ctx.fillStyle = 'rgba(255, 200, 100, 0.3)';
                for (let wy = canvas.height - b.height + 10; wy < canvas.height - 10; wy += 15) {
                    for (let wx = b.x + 5; wx < b.x + b.width - 5; wx += 12) {
                        if (Math.random() > 0.3) {
                            ctx.fillRect(wx, wy, 6, 8);
                        }
                    }
                }
                ctx.fillStyle = '#0a0a0a';
            });
        }

        // Main animation loop
        function animate() {
            // Create gradient sky
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0a0015');
            gradient.addColorStop(0.5, '#1a0a2e');
            gradient.addColorStop(1, '#16213e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw stars
            drawStars();

            // Draw city
            drawCitySilhouette();

            // Auto launch
            autoLaunch();

            // Update and draw rockets
            rockets = rockets.filter(rocket => {
                rocket.update();
                rocket.draw();

                if (rocket.exploded) {
                    const types = ['circle', 'star', 'ring', 'willow', 'random'];
                    const type = types[Math.floor(Math.random() * types.length)];
                    createExplosion(rocket.x, rocket.y, rocket.hue, type);
                    return false;
                }
                return true;
            });

            // Update and draw particles
            particles = particles.filter(particle => {
                particle.update();
                particle.draw();
                return !particle.isDead();
            });

            // Mouse attraction for nearby particles
            particles.forEach(particle => {
                const dx = mouseX - particle.x;
                const dy = mouseY - particle.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                if (distance < 100) {
                    const force = (100 - distance) / 100 * 0.02;
                    particle.vx += dx * force * 0.01;
                    particle.vy += dy * force * 0.01;
                }
            });

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
