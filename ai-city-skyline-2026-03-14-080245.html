<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>城市天际线 | City Skyline</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a3a 50%, #2a1a3a 100%);
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 200, 100, 0.8);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255, 200, 100, 0.5);
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 200, 100, 0.9);
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 20px rgba(255, 200, 100, 0.5);
        }
        
        .time {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 48px;
            font-family: 'Courier New', monospace;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <canvas id="city"></canvas>
    <div class="title">City Skyline</div>
    <div class="time" id="clock">00:00</div>
    <div class="info">移动鼠标控制流星 | 点击发射烟花 | 滚轮调整灯光强度</div>
    
    <script>
        const canvas = document.getElementById('city');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        let lightIntensity = 1;
        let time = 0;
        
        // 建筑物
        let buildings = [];
        
        class Building {
            constructor(x, baseWidth) {
                this.x = x;
                this.width = baseWidth + Math.random() * 40;
                this.height = 100 + Math.random() * 300;
                this.windows = [];
                this.lights = [];
                this.antennaHeight = Math.random() > 0.5 ? 20 + Math.random() * 40 : 0;
                this.antennaLight = Math.random() > 0.3;
                
                // 生成窗户
                const windowRows = Math.floor(this.height / 25);
                const windowCols = Math.floor(this.width / 20);
                
                for (let row = 0; row < windowRows; row++) {
                    for (let col = 0; col < windowCols; col++) {
                        if (Math.random() > 0.3) {
                            this.windows.push({
                                x: col * 20 + 5,
                                y: row * 25 + 10,
                                lit: Math.random() > 0.4,
                                flicker: Math.random() > 0.9,
                                color: Math.random() > 0.7 ? 
                                    `hsl(${30 + Math.random() * 30}, 100%, 70%)` : 
                                    `hsl(${200 + Math.random() * 40}, 80%, 80%)`
                            });
                        }
                    }
                }
            }
            
            draw() {
                const baseY = height - 50;
                
                // 建筑主体
                ctx.save();
                
                const gradient = ctx.createLinearGradient(this.x, baseY, this.x, baseY - this.height);
                gradient.addColorStop(0, '#1a1a2e');
                gradient.addColorStop(1, '#16213e');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(this.x, baseY - this.height, this.width, this.height);
                
                // 建筑边框
                ctx.strokeStyle = '#2a2a4e';
                ctx.lineWidth = 1;
                ctx.strokeRect(this.x, baseY - this.height, this.width, this.height);
                
                // 窗户
                this.windows.forEach(win => {
                    if (!win.lit) return;
                    
                    const flicker = win.flicker ? Math.sin(time * 10 + win.x) * 0.3 + 0.7 : 1;
                    const intensity = lightIntensity * flicker;
                    
                    ctx.fillStyle = win.color;
                    ctx.globalAlpha = 0.8 * intensity;
                    ctx.shadowBlur = 10 * intensity;
                    ctx.shadowColor = win.color;
                    ctx.fillRect(this.x + win.x, baseY - this.height + win.y, 12, 15);
                });
                
                ctx.globalAlpha = 1;
                
                // 天线
                if (this.antennaHeight > 0) {
                    ctx.strokeStyle = '#444';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(this.x + this.width / 2, baseY - this.height);
                    ctx.lineTo(this.x + this.width / 2, baseY - this.height - this.antennaHeight);
                    ctx.stroke();
                    
                    // 天线灯
                    if (this.antennaLight) {
                        const blink = Math.sin(time * 3) > 0;
                        if (blink) {
                            ctx.fillStyle = '#ff0000';
                            ctx.shadowBlur = 15;
                            ctx.shadowColor = '#ff0000';
                            ctx.beginPath();
                            ctx.arc(this.x + this.width / 2, baseY - this.height - this.antennaHeight, 3, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                }
                
                ctx.restore();
            }
        }
        
        // 星星
        let stars = [];
        
        class Star {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height * 0.5;
                this.size = Math.random() * 2;
                this.twinkleSpeed = Math.random() * 0.05 + 0.02;
                this.phase = Math.random() * Math.PI * 2;
            }
            
            draw() {
                this.phase += this.twinkleSpeed;
                const alpha = (Math.sin(this.phase) + 1) / 2 * 0.8 + 0.2;
                
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        // 流星
        let meteors = [];
        
        class Meteor {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height * 0.3;
                this.vx = 5 + Math.random() * 5;
                this.vy = 3 + Math.random() * 3;
                this.length = 50 + Math.random() * 50;
                this.alpha = 1;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= 0.02;
                return this.alpha > 0 && this.x < width && this.y < height;
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                
                const gradient = ctx.createLinearGradient(
                    this.x, this.y,
                    this.x - this.vx * this.length / 10, this.y - this.vy * this.length / 10
                );
                gradient.addColorStop(0, '#fff');
                gradient.addColorStop(1, 'transparent');
                
                ctx.strokeStyle = gradient;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#fff';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - this.vx * this.length / 10, this.y - this.vy * this.length / 10);
                ctx.stroke();
                
                ctx.restore();
            }
        }
        
        // 烟花
        let fireworks = [];
        
        class Firework {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.particles = [];
                this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
                
                for (let i = 0; i < 50; i++) {
                    const angle = (i / 50) * Math.PI * 2;
                    const speed = 2 + Math.random() * 3;
                    this.particles.push({
                        x: this.x,
                        y: this.y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        alpha: 1,
                        size: 2 + Math.random() * 2
                    });
                }
            }
            
            update() {
                let alive = false;
                this.particles.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.05;
                    p.alpha -= 0.015;
                    if (p.alpha > 0) alive = true;
                });
                return alive;
            }
            
            draw() {
                this.particles.forEach(p => {
                    if (p.alpha <= 0) return;
                    
                    ctx.save();
                    ctx.globalAlpha = p.alpha;
                    ctx.fillStyle = this.color;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = this.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                });
            }
        }
        
        // 云朵
        let clouds = [];
        
        class Cloud {
            constructor() {
                this.x = -200;
                this.y = 50 + Math.random() * 100;
                this.speed = 0.2 + Math.random() * 0.3;
                this.opacity = 0.1 + Math.random() * 0.1;
            }
            
            update() {
                this.x += this.speed;
                if (this.x > width + 200) {
                    this.x = -200;
                    this.y = 50 + Math.random() * 100;
                }
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#fff';
                
                // 简单云朵形状
                ctx.beginPath();
                ctx.arc(this.x, this.y, 30, 0, Math.PI * 2);
                ctx.arc(this.x + 25, this.y - 10, 25, 0, Math.PI * 2);
                ctx.arc(this.x + 50, this.y, 30, 0, Math.PI * 2);
                ctx.arc(this.x + 25, this.y + 10, 20, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        // 月亮
        function drawMoon() {
            ctx.save();
            
            const moonX = width - 120;
            const moonY = 100;
            const moonRadius = 40;
            
            // 月亮光晕
            const glow = ctx.createRadialGradient(moonX, moonY, moonRadius, moonX, moonY, moonRadius * 3);
            glow.addColorStop(0, 'rgba(255, 255, 200, 0.3)');
            glow.addColorStop(1, 'transparent');
            ctx.fillStyle = glow;
            ctx.fillRect(moonX - moonRadius * 3, moonY - moonRadius * 3, moonRadius * 6, moonRadius * 6);
            
            // 月亮本体
            ctx.fillStyle = '#ffffd0';
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#ffffd0';
            ctx.beginPath();
            ctx.arc(moonX, moonY, moonRadius, 0, Math.PI * 2);
            ctx.fill();
            
            // 月亮纹理（陨石坑）
            ctx.fillStyle = 'rgba(200, 200, 150, 0.3)';
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(moonX - 10, moonY - 10, 8, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(moonX + 15, moonY + 5, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(moonX - 5, moonY + 15, 6, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }
        
        // 地面反光
        function drawGround() {
            ctx.save();
            
            const gradient = ctx.createLinearGradient(0, height - 50, 0, height);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(1, '#0a0a1e');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, height - 50, width, 50);
            
            // 地面灯光反光
            buildings.forEach(b => {
                const reflectGradient = ctx.createLinearGradient(b.x, height - 50, b.x, height);
                reflectGradient.addColorStop(0, `rgba(255, 200, 100, ${0.1 * lightIntensity})`);
                reflectGradient.addColorStop(1, 'transparent');
                ctx.fillStyle = reflectGradient;
                ctx.fillRect(b.x, height - 50, b.width, 50);
            });
            
            ctx.restore();
        }
        
        function init() {
            resize();
            
            // 生成建筑物（从后到前，从左到右）
            let x = 0;
            while (x < width + 100) {
                const widthVariation = 60 + Math.random() * 80;
                buildings.push(new Building(x, widthVariation));
                x += widthVariation + Math.random() * 20;
            }
            
            // 按高度排序（矮的在前）
            buildings.sort((a, b) => a.height - b.height);
            
            // 生成星星
            for (let i = 0; i < 150; i++) {
                stars.push(new Star());
            }
            
            // 生成云朵
            for (let i = 0; i < 5; i++) {
                const cloud = new Cloud();
                cloud.x = Math.random() * width;
                clouds.push(cloud);
            }
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;
        }
        
        function draw() {
            // 清除画布
            ctx.fillStyle = 'rgba(10, 10, 26, 0.3)';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制天空渐变
            const skyGradient = ctx.createLinearGradient(0, 0, 0, height);
            skyGradient.addColorStop(0, '#0a0a1a');
            skyGradient.addColorStop(0.5, '#1a1a3a');
            skyGradient.addColorStop(1, '#2a1a3a');
            ctx.fillStyle = skyGradient;
            ctx.fillRect(0, 0, width, height);
            
            // 月亮
            drawMoon();
            
            // 星星
            stars.forEach(star => star.draw());
            
            // 云朵
            clouds.forEach(cloud => {
                cloud.update();
                cloud.draw();
            });
            
            // 流星
            if (Math.random() > 0.995) {
                meteors.push(new Meteor());
            }
            meteors = meteors.filter(m => {
                m.draw();
                return m.update();
            });
            
            // 鼠标控制流星
            if (mouseX > 0 && mouseY > 0 && mouseY < height * 0.5 && Math.random() > 0.95) {
                meteors.push(new Meteor(mouseX, mouseY));
            }
            
            // 建筑物
            buildings.forEach(b => b.draw());
            
            // 地面
            drawGround();
            
            // 烟花
            fireworks = fireworks.filter(f => {
                f.draw();
                return f.update();
            });
            
            time += 0.016;
            
            requestAnimationFrame(draw);
        }
        
        // 事件监听
        window.addEventListener('resize', () => {
            resize();
            // 重新生成建筑
            buildings = [];
            stars = [];
            let x = 0;
            while (x < width + 100) {
                const widthVariation = 60 + Math.random() * 80;
                buildings.push(new Building(x, widthVariation));
                x += widthVariation + Math.random() * 20;
            }
            buildings.sort((a, b) => a.height - b.height);
            for (let i = 0; i < 150; i++) {
                stars.push(new Star());
            }
        });
        
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        window.addEventListener('click', (e) => {
            if (e.clientY < height * 0.7) {
                fireworks.push(new Firework(e.clientX, e.clientY));
            }
        });
        
        window.addEventListener('wheel', (e) => {
            lightIntensity += e.deltaY > 0 ? -0.1 : 0.1;
            lightIntensity = Math.max(0.3, Math.min(1.5, lightIntensity));
        });
        
        // 触摸支持
        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });
        
        window.addEventListener('touchstart', (e) => {
            if (e.touches[0].clientY < height * 0.7) {
                fireworks.push(new Firework(e.touches[0].clientX, e.touches[0].clientY));
            }
        });
        
        // 更新时钟
        setInterval(updateClock, 1000);
        updateClock();
        
        init();
        draw();
    </script>
</body>
</html>
