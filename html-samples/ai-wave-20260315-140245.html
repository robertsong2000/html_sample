<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>波浪动画 | Wave Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: linear-gradient(180deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            cursor: pointer;
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 12px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 30px rgba(100, 200, 255, 0.6);
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
            text-align: center;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(150, 200, 255, 0.6);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
            text-align: right;
            line-height: 1.8;
        }
        
        @media (max-width: 768px) {
            .title {
                font-size: 24px;
                letter-spacing: 6px;
            }
            .info {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="title">波浪动画</div>
    <canvas id="wave"></canvas>
    <div class="stats">
        <div>波浪层数: <span id="layers">5</span></div>
        <div>波速: <span id="speed">1.0</span>x</div>
    </div>
    <div class="info">移动鼠标扰动波浪 · 点击切换波浪主题 · 滚轮调整速度</div>
    
    <script>
        const canvas = document.getElementById('wave');
        const ctx = canvas.getContext('2d');
        const layersEl = document.getElementById('layers');
        const speedEl = document.getElementById('speed');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        let time = 0;
        let speed = 1;
        let currentTheme = 0;
        
        // 波浪主题
        const themes = [
            {
                name: '海洋',
                colors: [
                    'rgba(0, 119, 182, 0.8)',
                    'rgba(0, 150, 199, 0.7)',
                    'rgba(0, 180, 216, 0.6)',
                    'rgba(72, 202, 228, 0.5)',
                    'rgba(144, 224, 239, 0.4)'
                ],
                bgTop: '#1a0a2e',
                bgBottom: '#0f3460'
            },
            {
                name: '日落',
                colors: [
                    'rgba(255, 107, 107, 0.8)',
                    'rgba(255, 142, 83, 0.7)',
                    'rgba(255, 159, 67, 0.6)',
                    'rgba(254, 202, 87, 0.5)',
                    'rgba(255, 230, 109, 0.4)'
                ],
                bgTop: '#2d1b4e',
                bgBottom: '#6b2d5c'
            },
            {
                name: '极光',
                colors: [
                    'rgba(0, 255, 136, 0.7)',
                    'rgba(0, 255, 200, 0.6)',
                    'rgba(100, 255, 218, 0.5)',
                    'rgba(150, 255, 230, 0.4)',
                    'rgba(200, 255, 240, 0.3)'
                ],
                bgTop: '#0a0a1a',
                bgBottom: '#1a2a3a'
            },
            {
                name: '霓虹',
                colors: [
                    'rgba(255, 0, 255, 0.7)',
                    'rgba(0, 255, 255, 0.6)',
                    'rgba(255, 0, 128, 0.5)',
                    'rgba(128, 0, 255, 0.4)',
                    'rgba(0, 128, 255, 0.3)'
                ],
                bgTop: '#0a0a0f',
                bgBottom: '#1a0a2a'
            }
        ];
        
        // 波浪类
        class Wave {
            constructor(index, total) {
                this.index = index;
                this.total = total;
                this.baseY = height * (0.4 + (index / total) * 0.4);
                this.amplitude = 30 + Math.random() * 30;
                this.frequency = 0.005 + Math.random() * 0.005;
                this.speed = 0.02 + Math.random() * 0.02;
                this.phase = Math.random() * Math.PI * 2;
                this.color = themes[currentTheme].colors[index];
            }
            
            update() {
                this.color = themes[currentTheme].colors[this.index];
            }
            
            getY(x) {
                const mouseInfluence = this.getMouseInfluence(x);
                const wave1 = Math.sin(x * this.frequency + time * this.speed + this.phase) * this.amplitude;
                const wave2 = Math.sin(x * this.frequency * 0.5 + time * this.speed * 0.8) * this.amplitude * 0.5;
                const wave3 = Math.sin(x * this.frequency * 2 + time * this.speed * 1.5) * this.amplitude * 0.2;
                
                return this.baseY + wave1 + wave2 + wave3 + mouseInfluence;
            }
            
            getMouseInfluence(x) {
                const dx = x - mouseX;
                const dy = this.baseY - mouseY;
                const dist = Math.hypot(dx, dy);
                const maxDist = 200;
                
                if (dist < maxDist) {
                    const influence = (1 - dist / maxDist) * 50;
                    return Math.sin(dx * 0.05 + time * 0.1) * influence;
                }
                return 0;
            }
            
            draw() {
                ctx.beginPath();
                ctx.moveTo(0, height);
                
                // 绘制波浪曲线
                for (let x = 0; x <= width; x += 5) {
                    const y = this.getY(x);
                    ctx.lineTo(x, y);
                }
                
                ctx.lineTo(width, height);
                ctx.closePath();
                
                // 渐变填充
                const gradient = ctx.createLinearGradient(0, this.baseY - this.amplitude, 0, height);
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // 波浪顶部线条
                ctx.beginPath();
                for (let x = 0; x <= width; x += 5) {
                    const y = this.getY(x);
                    if (x === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.strokeStyle = this.color.replace(/[\d.]+\)$/, '0.9)');
                ctx.lineWidth = 2;
                ctx.stroke();
            }
        }
        
        // 漂浮粒子
        class Particle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height * 0.6;
                this.size = Math.random() * 4 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.alpha = Math.random() * 0.5 + 0.2;
                this.twinkle = Math.random() * Math.PI * 2;
            }
            
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.twinkle += 0.05;
                
                if (this.x < 0 || this.x > width || this.y < 0 || this.y > height * 0.6) {
                    this.reset();
                }
            }
            
            draw() {
                const alpha = this.alpha * (0.5 + Math.sin(this.twinkle) * 0.5);
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fill();
            }
        }
        
        let waves = [];
        let particles = [];
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initWaves();
        }
        
        function initWaves() {
            waves = [];
            const layerCount = 5;
            
            for (let i = 0; i < layerCount; i++) {
                waves.push(new Wave(i, layerCount));
            }
            
            layersEl.textContent = layerCount;
        }
        
        function initParticles() {
            particles = [];
            const count = Math.floor((width * height) / 20000);
            
            for (let i = 0; i < count; i++) {
                particles.push(new Particle());
            }
        }
        
        function drawBackground() {
            const theme = themes[currentTheme];
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, theme.bgTop);
            gradient.addColorStop(1, theme.bgBottom);
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }
        
        function drawMoon() {
            const moonX = width * 0.8;
            const moonY = height * 0.15;
            const moonRadius = 40;
            
            // 月亮光晕
            const glowGradient = ctx.createRadialGradient(
                moonX, moonY, moonRadius * 0.5,
                moonX, moonY, moonRadius * 3
            );
            glowGradient.addColorStop(0, 'rgba(255, 255, 200, 0.3)');
            glowGradient.addColorStop(1, 'transparent');
            
            ctx.beginPath();
            ctx.arc(moonX, moonY, moonRadius * 3, 0, Math.PI * 2);
            ctx.fillStyle = glowGradient;
            ctx.fill();
            
            // 月亮本体
            const moonGradient = ctx.createRadialGradient(
                moonX - moonRadius * 0.3, moonY - moonRadius * 0.3, 0,
                moonX, moonY, moonRadius
            );
            moonGradient.addColorStop(0, 'rgba(255, 255, 240, 1)');
            moonGradient.addColorStop(1, 'rgba(255, 255, 200, 0.9)');
            
            ctx.beginPath();
            ctx.arc(moonX, moonY, moonRadius, 0, Math.PI * 2);
            ctx.fillStyle = moonGradient;
            ctx.fill();
        }
        
        function cycleTheme() {
            currentTheme = (currentTheme + 1) % themes.length;
            waves.forEach(wave => wave.update());
        }
        
        function animate() {
            drawBackground();
            drawMoon();
            
            // 更新和绘制粒子
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            
            // 绘制波浪（从后到前）
            for (let i = waves.length - 1; i >= 0; i--) {
                waves[i].draw();
            }
            
            time += speed;
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        function handleMouseMove(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
        }
        
        function handleTouchMove(e) {
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        }
        
        function handleClick() {
            cycleTheme();
        }
        
        function handleWheel(e) {
            e.preventDefault();
            speed = Math.max(0.2, Math.min(3, speed - e.deltaY * 0.001));
            speedEl.textContent = speed.toFixed(1);
        }
        
        // 初始化
        function init() {
            resize();
            initParticles();
            
            window.addEventListener('resize', () => {
                resize();
                initParticles();
            });
            
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('touchmove', handleTouchMove, { passive: true });
            canvas.addEventListener('click', handleClick);
            canvas.addEventListener('wheel', handleWheel, { passive: false });
            
            // 检测 prefers-reduced-motion
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
            if (!prefersReducedMotion.matches) {
                animate();
            } else {
                // 静态渲染
                drawBackground();
                drawMoon();
                waves.forEach(wave => wave.draw());
            }
        }
        
        init();
    </script>
</body>
</html>
