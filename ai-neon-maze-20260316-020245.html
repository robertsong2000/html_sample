<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹迷宫 | Neon Maze</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #050510;
            font-family: 'Courier New', monospace;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            cursor: none;
        }
        
        .cursor {
            position: fixed;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 255, 255, 0.8);
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            transform: translate(-50%, -50%);
            box-shadow: 
                0 0 10px rgba(0, 255, 255, 0.8),
                0 0 20px rgba(0, 255, 255, 0.4);
            transition: transform 0.1s ease;
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 0, 255, 0.9);
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 15px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 
                0 0 10px rgba(255, 0, 255, 1),
                0 0 20px rgba(255, 0, 255, 0.8),
                0 0 40px rgba(255, 0, 255, 0.5);
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(0, 255, 255, 0.7);
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
            text-align: center;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(0, 255, 255, 0.5);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
            text-align: right;
            line-height: 1.8;
        }
        
        @media (max-width: 768px) {
            .title {
                font-size: 24px;
                letter-spacing: 8px;
            }
            .info {
                font-size: 12px;
            }
            .cursor {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="title">NEON MAZE</div>
    <canvas id="maze"></canvas>
    <div class="cursor" id="cursor"></div>
    <div class="stats">
        <div>层数: <span id="layer">1</span></div>
        <div>能量: <span id="energy">100</span>%</div>
    </div>
    <div class="info">移动鼠标探索迷宫 · 点击切换颜色主题 · 滚轮调整深度</div>
    
    <script>
        const canvas = document.getElementById('maze');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('cursor');
        const layerEl = document.getElementById('layer');
        const energyEl = document.getElementById('energy');
        
        let width, height, centerX, centerY;
        let mouseX = 0, mouseY = 0;
        let time = 0;
        let depth = 5;
        let currentTheme = 0;
        
        const themes = [
            { primary: '#ff00ff', secondary: '#00ffff', name: '赛博' },
            { primary: '#00ff88', secondary: '#ff0088', name: '霓虹' },
            { primary: '#ffff00', secondary: '#0088ff', name: '电气' },
            { primary: '#ff6600', secondary: '#00ffff', name: '烈焰' }
        ];
        
        // 迷宫单元格
        let cells = [];
        const cellSize = 60;
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
            generateMaze();
        }
        
        function generateMaze() {
            cells = [];
            const cols = Math.ceil(width / cellSize) + 2;
            const rows = Math.ceil(height / cellSize) + 2;
            
            for (let row = 0; row < rows; row++) {
                for (let col = 0; col < cols; col++) {
                    // 随机生成墙壁
                    const walls = {
                        top: Math.random() > 0.6,
                        right: Math.random() > 0.6,
                        bottom: Math.random() > 0.6,
                        left: Math.random() > 0.6
                    };
                    
                    cells.push({
                        x: col * cellSize - cellSize,
                        y: row * cellSize - cellSize,
                        walls,
                        visited: false,
                        glow: Math.random()
                    });
                }
            }
        }
        
        function drawMaze() {
            const theme = themes[currentTheme];
            
            cells.forEach((cell, index) => {
                const dx = cell.x + cellSize / 2 - mouseX;
                const dy = cell.y + cellSize / 2 - mouseY;
                const dist = Math.hypot(dx, dy);
                
                // 根据距离计算可见性
                const visibility = Math.max(0, 1 - dist / 400);
                
                if (visibility <= 0) return;
                
                ctx.globalAlpha = visibility;
                
                // 绘制墙壁
                ctx.strokeStyle = theme.primary;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 10 * visibility;
                ctx.shadowColor = theme.primary;
                
                if (cell.walls.top) {
                    ctx.beginPath();
                    ctx.moveTo(cell.x, cell.y);
                    ctx.lineTo(cell.x + cellSize, cell.y);
                    ctx.stroke();
                }
                
                if (cell.walls.right) {
                    ctx.beginPath();
                    ctx.moveTo(cell.x + cellSize, cell.y);
                    ctx.lineTo(cell.x + cellSize, cell.y + cellSize);
                    ctx.stroke();
                }
                
                if (cell.walls.bottom) {
                    ctx.beginPath();
                    ctx.moveTo(cell.x, cell.y + cellSize);
                    ctx.lineTo(cell.x + cellSize, cell.y + cellSize);
                    ctx.stroke();
                }
                
                if (cell.walls.left) {
                    ctx.beginPath();
                    ctx.moveTo(cell.x, cell.y);
                    ctx.lineTo(cell.x, cell.y + cellSize);
                    ctx.stroke();
                }
                
                // 内部发光点
                if (cell.glow > 0.8 && visibility > 0.5) {
                    const pulse = Math.sin(time * 0.05 + index) * 0.5 + 0.5;
                    ctx.beginPath();
                    ctx.arc(cell.x + cellSize / 2, cell.y + cellSize / 2, 3, 0, Math.PI * 2);
                    ctx.fillStyle = theme.secondary;
                    ctx.globalAlpha = visibility * pulse;
                    ctx.fill();
                }
                
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            });
        }
        
        function drawPlayerGlow() {
            const theme = themes[currentTheme];
            
            // 玩家周围的光晕
            const gradient = ctx.createRadialGradient(
                mouseX, mouseY, 0,
                mouseX, mouseY, 200
            );
            gradient.addColorStop(0, theme.primary + '40');
            gradient.addColorStop(0.5, theme.primary + '10');
            gradient.addColorStop(1, 'transparent');
            
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, 200, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
            
            // 脉冲环
            const pulseRadius = 50 + Math.sin(time * 0.1) * 20;
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, pulseRadius, 0, Math.PI * 2);
            ctx.strokeStyle = theme.secondary + '60';
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        
        function drawGrid() {
            const theme = themes[currentTheme];
            
            ctx.strokeStyle = theme.primary + '10';
            ctx.lineWidth = 1;
            
            // 水平线
            for (let y = 0; y < height; y += cellSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();
            }
            
            // 垂直线
            for (let x = 0; x < width; x += cellSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, height);
                ctx.stroke();
            }
        }
        
        function drawScanlines() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            for (let y = 0; y < height; y += 3) {
                ctx.fillRect(0, y, width, 1);
            }
        }
        
        function drawVignette() {
            const gradient = ctx.createRadialGradient(
                centerX, centerY, Math.min(width, height) * 0.3,
                centerX, centerY, Math.max(width, height) * 0.8
            );
            gradient.addColorStop(0, 'transparent');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0.7)');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }
        
        function cycleTheme() {
            currentTheme = (currentTheme + 1) % themes.length;
        }
        
        function updateEnergy() {
            const energy = Math.sin(time * 0.02) * 30 + 70;
            energyEl.textContent = Math.round(energy);
        }
        
        function animate() {
            // 清除画布
            ctx.fillStyle = '#050510';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制场景
            drawGrid();
            drawMaze();
            drawPlayerGlow();
            drawScanlines();
            drawVignette();
            
            // 更新能量显示
            updateEnergy();
            
            time++;
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        function handleMouseMove(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            cursor.style.left = mouseX + 'px';
            cursor.style.top = mouseY + 'px';
        }
        
        function handleTouchMove(e) {
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        }
        
        function handleClick() {
            cycleTheme();
        }
        
        function handleWheel(e) {
            e.preventDefault();
            depth = Math.max(1, Math.min(10, depth - Math.sign(e.deltaY)));
            layerEl.textContent = depth;
        }
        
        function handleTouchStart() {
            cycleTheme();
        }
        
        // 初始化
        function init() {
            resize();
            
            window.addEventListener('resize', resize);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('touchmove', handleTouchMove, { passive: true });
            canvas.addEventListener('click', handleClick);
            canvas.addEventListener('wheel', handleWheel, { passive: false });
            canvas.addEventListener('touchstart', handleTouchStart, { passive: true });
            
            layerEl.textContent = depth;
            
            // 检测 prefers-reduced-motion
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
            if (!prefersReducedMotion.matches) {
                animate();
            } else {
                // 静态渲染
                ctx.fillStyle = '#050510';
                ctx.fillRect(0, 0, width, height);
                drawGrid();
                drawMaze();
                drawVignette();
            }
        }
        
        init();
    </script>
</body>
</html>
