<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>漩涡效果 - Vortex</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(200, 150, 255, 0.8);
            font-size: 13px;
            z-index: 100;
            text-align: center;
            text-shadow: 0 0 10px rgba(150, 100, 255, 0.5);
        }
        
        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(200, 150, 255, 0.8);
            font-size: 12px;
            z-index: 100;
            text-align: right;
        }
        
        .controls div {
            margin: 5px 0;
            padding: 5px 12px;
            background: rgba(150, 100, 255, 0.1);
            border-radius: 15px;
            border: 1px solid rgba(200, 150, 255, 0.3);
        }
        
        .title {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(200, 150, 255, 0.8);
            font-size: 14px;
            letter-spacing: 5px;
            z-index: 100;
        }
        
        .fps {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(200, 150, 255, 0.5);
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="vortex"></canvas>
    
    <div class="title">VORTEX</div>
    
    <div class="controls">
        <div id="particles">粒子: 0</div>
        <div id="mode">模式: 螺旋</div>
    </div>
    
    <div class="info">
        <span>🌀 移动鼠标控制漩涡中心 | 点击切换模式 | 滚轮调整强度 | 双击重置 | 右键切换配色</span>
    </div>
    
    <div class="fps">FPS: <span id="fps">60</span></div>

    <script>
        // 配置
        const CONFIG = {
            PARTICLE_COUNT: 1000,
            MAX_PARTICLES: 2000
        };

        // 漩涡模式
        const vortexModes = [
            { name: '螺旋', force: 0.15, radial: 0.02 },
            { name: '吸入', force: 0.2, radial: -0.05 },
            { name: '扩散', force: 0.1, radial: 0.08 },
            { name: '双漩', force: 0.15, radial: 0.02, dual: true }
        ];

        // 配色方案
        const colorSchemes = [
            { name: '紫焰', colors: ['#ff00ff', '#8800ff', '#0088ff', '#00ffff'] },
            { name: '火凤', colors: ['#ff0000', '#ff4400', '#ff8800', '#ffcc00'] },
            { name: '冰霜', colors: ['#00ffff', '#0088ff', '#0044ff', '#8800ff'] },
            { name: '森灵', colors: ['#00ff00', '#44ff00', '#88ff00', '#ccff00'] },
            { name: '银河', colors: ['#ffffff', '#aaaaff', '#8888ff', '#6666ff'] }
        ];

        // Canvas
        const canvas = document.getElementById('vortex');
        const ctx = canvas.getContext('2d');
        
        let width, height, centerX, centerY;
        let particles = [];
        let mouseX, mouseY;
        let currentMode = 0;
        let currentScheme = 0;
        let intensity = 1;
        let time = 0;

        // 粒子类
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                const angle = Math.random() * Math.PI * 2;
                const radius = Math.random() * Math.max(width, height) * 0.5;
                
                this.x = centerX + Math.cos(angle) * radius;
                this.y = centerY + Math.sin(angle) * radius;
                this.vx = 0;
                this.vy = 0;
                
                this.size = Math.random() * 3 + 1;
                this.alpha = Math.random() * 0.5 + 0.5;
                this.life = Math.random() * 200 + 100;
                this.maxLife = this.life;
                
                const colors = colorSchemes[currentScheme].colors;
                this.color = colors[Math.floor(Math.random() * colors.length)];
            }

            update(vx, vy) {
                this.vx += vx;
                this.vy += vy;
                
                // 阻尼
                this.vx *= 0.98;
                this.vy *= 0.98;
                
                this.x += this.vx;
                this.y += this.vy;
                
                this.life--;
                
                // 边界检测或生命结束
                if (this.life <= 0 || 
                    this.x < -100 || this.x > width + 100 || 
                    this.y < -100 || this.y > height + 100) {
                    this.reset();
                }
            }

            draw(ctx) {
                const lifeRatio = this.life / this.maxLife;
                const alpha = this.alpha * lifeRatio;
                
                // 拖尾效果
                const tailLength = Math.sqrt(this.vx * this.vx + this.vy * this.vy) * 3;
                const angle = Math.atan2(this.vy, this.vx);
                
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(
                    this.x - Math.cos(angle) * tailLength,
                    this.y - Math.sin(angle) * tailLength
                );
                ctx.strokeStyle = this.color;
                ctx.globalAlpha = alpha * 0.3;
                ctx.lineWidth = this.size;
                ctx.lineCap = 'round';
                ctx.stroke();
                
                // 粒子本体
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = alpha;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            }
        }

        // 计算漩涡力
        function getVortexForce(px, py, cx, cy, mode) {
            const dx = px - cx;
            const dy = py - cy;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < 1) return { vx: 0, vy: 0 };
            
            const angle = Math.atan2(dy, dx);
            
            // 切向力（旋转）
            const tangentX = -Math.sin(angle) * mode.force * intensity;
            const tangentY = Math.cos(angle) * mode.force * intensity;
            
            // 径向力（吸入/扩散）
            const radialX = -Math.cos(angle) * mode.radial * intensity;
            const radialY = -Math.sin(angle) * mode.radial * intensity;
            
            // 距离衰减
            const falloff = Math.max(0.1, 1 - dist / 500);
            
            return {
                vx: (tangentX + radialX) * falloff,
                vy: (tangentY + radialY) * falloff
            };
        }

        // 初始化
        function init() {
            resize();
            
            particles = [];
            for (let i = 0; i < CONFIG.PARTICLE_COUNT; i++) {
                particles.push(new Particle());
            }
            
            mouseX = centerX;
            mouseY = centerY;
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        // FPS计算
        let lastTime = performance.now();
        let frameCount = 0;

        // 动画循环
        function animate(currentTime) {
            time++;
            
            // FPS
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                lastTime = currentTime;
            }

            const mode = vortexModes[currentMode];
            
            // 清空画布（带渐隐）
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // 更新和绘制粒子
            particles.forEach(particle => {
                let force;
                
                if (mode.dual) {
                    // 双漩涡
                    const cx1 = width * 0.35;
                    const cx2 = width * 0.65;
                    const f1 = getVortexForce(particle.x, particle.y, cx1, centerY, mode);
                    const f2 = getVortexForce(particle.x, particle.y, cx2, centerY, mode);
                    force = { vx: f1.vx + f2.vx, vy: f1.vy + f2.vy };
                } else {
                    force = getVortexForce(particle.x, particle.y, mouseX, mouseY, mode);
                }
                
                particle.update(force.vx, force.vy);
                particle.draw(ctx);
            });

            // 绘制漩涡中心
            drawVortexCenter();
            
            document.getElementById('particles').textContent = `粒子: ${particles.length}`;

            requestAnimationFrame(animate);
        }

        // 绘制漩涡中心
        function drawVortexCenter() {
            const scheme = colorSchemes[currentScheme];
            const colors = scheme.colors;
            
            const drawCenter = (cx, cy) => {
                colors.forEach((color, i) => {
                    const radius = 20 - i * 4;
                    const alpha = 0.3 + Math.sin(time * 0.05 + i) * 0.2;
                    
                    ctx.beginPath();
                    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                    ctx.strokeStyle = color;
                    ctx.globalAlpha = alpha;
                    ctx.lineWidth = 2;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = color;
                    ctx.stroke();
                    ctx.shadowBlur = 0;
                    ctx.globalAlpha = 1;
                });
            };
            
            if (vortexModes[currentMode].dual) {
                drawCenter(width * 0.35, centerY);
                drawCenter(width * 0.65, centerY);
            } else {
                drawCenter(mouseX, mouseY);
            }
        }

        // 调整粒子数量
        function adjustParticles(delta) {
            const newCount = Math.max(100, Math.min(CONFIG.MAX_PARTICLES, particles.length + delta));
            
            while (particles.length < newCount) {
                particles.push(new Particle());
            }
            while (particles.length > newCount) {
                particles.pop();
            }
        }

        // 重置
        function reset() {
            particles.forEach(p => p.reset());
        }

        // 事件监听
        window.addEventListener('resize', () => {
            resize();
            reset();
        });

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('click', () => {
            currentMode = (currentMode + 1) % vortexModes.length;
            document.getElementById('mode').textContent = `模式: ${vortexModes[currentMode].name}`;
        });

        canvas.addEventListener('dblclick', reset);

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            intensity = Math.max(0.2, Math.min(3, intensity - Math.sign(e.deltaY) * 0.1));
        });

        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            currentScheme = (currentScheme + 1) % colorSchemes.length;
            particles.forEach(p => {
                const colors = colorSchemes[currentScheme].colors;
                p.color = colors[Math.floor(Math.random() * colors.length)];
            });
        });

        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        // 键盘支持
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                currentMode = (currentMode + 1) % vortexModes.length;
                document.getElementById('mode').textContent = `模式: ${vortexModes[currentMode].name}`;
            } else if (e.code === 'KeyR') {
                reset();
            } else if (e.code === 'KeyC') {
                currentScheme = (currentScheme + 1) % colorSchemes.length;
                particles.forEach(p => {
                    const colors = colorSchemes[currentScheme].colors;
                    p.color = colors[Math.floor(Math.random() * colors.length)];
                });
            } else if (e.code === 'ArrowUp') {
                adjustParticles(100);
            } else if (e.code === 'ArrowDown') {
                adjustParticles(-100);
            }
        });

        // 启动
        init();
        animate(0);
    </script>
</body>
</html>
