<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>烟花盛宴 | Fireworks Festival</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a3a 50%, #0f0f2f 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            cursor: crosshair;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(255, 200, 100, 0.5);
            text-align: center;
            white-space: nowrap;
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 12px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(255, 150, 50, 0.8), 0 0 40px rgba(255, 100, 50, 0.5);
        }
        
        .counter {
            position: fixed;
            top: 30px;
            right: 30px;
            color: rgba(255, 220, 150, 0.8);
            font-size: 16px;
            z-index: 10;
            pointer-events: none;
        }
        
        @media (max-width: 768px) {
            .title {
                font-size: 22px;
                letter-spacing: 6px;
            }
            .info {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="title">烟花盛宴</div>
    <div class="counter">烟花数: <span id="count">0</span></div>
    <canvas id="fireworks"></canvas>
    <div class="info">点击发射烟花 · 按住拖动创建烟花轨迹</div>
    
    <script>
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        const countEl = document.getElementById('count');
        
        let width, height;
        let fireworks = [];
        let particles = [];
        let sparks = [];
        let mouseX = 0, mouseY = 0;
        let isMouseDown = false;
        let lastFireworkTime = 0;
        let fireworkCount = 0;
        let animationId;
        
        // 颜色主题
        const colorThemes = [
            ['#ff6b6b', '#ee5a5a', '#ff8787'],      // 红色
            ['#ffd93d', '#ffec85', '#ffcd00'],      // 金色
            ['#6bcb77', '#4ade80', '#22c55e'],      // 绿色
            ['#4d96ff', '#60a5fa', '#3b82f6'],      // 蓝色
            ['#ff6eb4', '#ff85c0', '#ff9ed2'],      // 粉色
            ['#a855f7', '#c084fc', '#d8b4fe'],      // 紫色
            ['#f97316', '#fb923c', '#fdba74'],      // 橙色
            ['#14b8a6', '#2dd4bf', '#5eead4'],      // 青色
            ['#ffffff', '#f0f0f0', '#e0e0e0'],      // 白色
            ['#fbbf24', '#fcd34d', '#fde68a'],      // 黄色
        ];
        
        // 烟花类
        class Firework {
            constructor(startX, startY, targetX, targetY) {
                this.x = startX;
                this.y = startY;
                this.targetX = targetX;
                this.targetY = targetY;
                
                const angle = Math.atan2(targetY - startY, targetX - startX);
                const speed = 12 + Math.random() * 4;
                
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                
                this.trail = [];
                this.trailLength = 8;
                this.alive = true;
                this.alpha = 1;
                this.theme = colorThemes[Math.floor(Math.random() * colorThemes.length)];
            }
            
            update() {
                this.trail.push({ x: this.x, y: this.y, alpha: 1 });
                if (this.trail.length > this.trailLength) {
                    this.trail.shift();
                }
                
                this.vy += 0.15; // 重力
                this.x += this.vx;
                this.y += this.vy;
                
                // 到达目标或速度过慢时爆炸
                const dist = Math.hypot(this.targetX - this.x, this.targetY - this.y);
                if (dist < 20 || this.vy >= 0) {
                    this.explode();
                    this.alive = false;
                }
                
                // 更新尾迹
                this.trail.forEach((t, i) => {
                    t.alpha = (i / this.trail.length) * 0.6;
                });
            }
            
            explode() {
                const particleCount = 80 + Math.floor(Math.random() * 60);
                const type = Math.random();
                
                if (type < 0.3) {
                    // 圆形爆炸
                    this.circularExplosion(particleCount);
                } else if (type < 0.6) {
                    // 心形爆炸
                    this.heartExplosion(particleCount);
                } else if (type < 0.8) {
                    // 双环爆炸
                    this.doubleRingExplosion(particleCount);
                } else {
                    // 星形爆炸
                    this.starExplosion(particleCount);
                }
                
                fireworkCount++;
                countEl.textContent = fireworkCount;
            }
            
            circularExplosion(count) {
                for (let i = 0; i < count; i++) {
                    const angle = (i / count) * Math.PI * 2;
                    const speed = 4 + Math.random() * 4;
                    particles.push(new Particle(
                        this.x, this.y,
                        Math.cos(angle) * speed,
                        Math.sin(angle) * speed,
                        this.theme[Math.floor(Math.random() * this.theme.length)]
                    ));
                }
            }
            
            heartExplosion(count) {
                for (let i = 0; i < count; i++) {
                    const t = (i / count) * Math.PI * 2;
                    // 心形参数方程
                    const heartX = 16 * Math.pow(Math.sin(t), 3);
                    const heartY = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                    const speed = 0.3 + Math.random() * 0.2;
                    particles.push(new Particle(
                        this.x, this.y,
                        heartX * speed,
                        heartY * speed,
                        this.theme[Math.floor(Math.random() * this.theme.length)]
                    ));
                }
            }
            
            doubleRingExplosion(count) {
                for (let i = 0; i < count / 2; i++) {
                    const angle = (i / (count / 2)) * Math.PI * 2;
                    particles.push(new Particle(
                        this.x, this.y,
                        Math.cos(angle) * 6,
                        Math.sin(angle) * 6,
                        this.theme[0]
                    ));
                    particles.push(new Particle(
                        this.x, this.y,
                        Math.cos(angle) * 3,
                        Math.sin(angle) * 3,
                        this.theme[1]
                    ));
                }
            }
            
            starExplosion(count) {
                const points = 5;
                for (let i = 0; i < count; i++) {
                    const angle = (i / count) * Math.PI * 2;
                    const starFactor = (i % 2 === 0) ? 1 : 0.5;
                    const speed = (4 + Math.random() * 2) * starFactor;
                    particles.push(new Particle(
                        this.x, this.y,
                        Math.cos(angle) * speed,
                        Math.sin(angle) * speed,
                        this.theme[Math.floor(Math.random() * this.theme.length)]
                    ));
                }
            }
            
            draw() {
                // 绘制尾迹
                this.trail.forEach((t, i) => {
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, 2, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 200, 100, ${t.alpha})`;
                    ctx.fill();
                });
                
                // 绘制烟花头部
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
                
                // 发光效果
                ctx.beginPath();
                ctx.arc(this.x, this.y, 6, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 220, 150, 0.4)';
                ctx.fill();
            }
        }
        
        // 粒子类
        class Particle {
            constructor(x, y, vx, vy, color) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.alpha = 1;
                this.decay = 0.012 + Math.random() * 0.008;
                this.size = 2 + Math.random() * 2;
                this.trail = [];
                this.trailLength = 6;
            }
            
            update() {
                this.trail.push({ x: this.x, y: this.y, alpha: this.alpha });
                if (this.trail.length > this.trailLength) {
                    this.trail.shift();
                }
                
                this.vy += 0.08; // 重力
                this.vx *= 0.98; // 空气阻力
                this.vy *= 0.98;
                
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
                this.size *= 0.98;
            }
            
            draw() {
                // 绘制尾迹
                this.trail.forEach((t, i) => {
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, this.size * 0.5, 0, Math.PI * 2);
                    ctx.fillStyle = this.hexToRgba(this.color, t.alpha * 0.4 * (i / this.trailLength));
                    ctx.fill();
                });
                
                // 绘制粒子
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.hexToRgba(this.color, this.alpha);
                ctx.fill();
            }
            
            hexToRgba(hex, alpha) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            }
        }
        
        // 火花类（用于背景装饰）
        class Spark {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height * 0.7;
                this.size = Math.random() * 1.5 + 0.5;
                this.alpha = Math.random();
                this.speed = Math.random() * 0.02 + 0.005;
                this.direction = Math.random() > 0.5 ? 1 : -1;
            }
            
            update() {
                this.alpha += this.speed * this.direction;
                if (this.alpha >= 1 || this.alpha <= 0) {
                    this.direction *= -1;
                }
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 200, ${this.alpha * 0.6})`;
                ctx.fill();
            }
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        function initSparks() {
            sparks = [];
            const sparkCount = Math.min(100, Math.floor((width * height) / 10000));
            for (let i = 0; i < sparkCount; i++) {
                sparks.push(new Spark());
            }
        }
        
        function launchFirework(targetX, targetY) {
            const startX = targetX + (Math.random() - 0.5) * 100;
            const startY = height;
            fireworks.push(new Firework(startX, startY, targetX, targetY));
        }
        
        function autoLaunch() {
            if (Math.random() < 0.03) {
                launchFirework(
                    width * 0.2 + Math.random() * width * 0.6,
                    height * 0.1 + Math.random() * height * 0.3
                );
            }
        }
        
        function animate(timestamp) {
            // 半透明黑色覆盖实现拖尾效果
            ctx.fillStyle = 'rgba(10, 10, 26, 0.2)';
            ctx.fillRect(0, 0, width, height);
            
            // 更新和绘制火花
            sparks.forEach(spark => {
                spark.update();
                spark.draw();
            });
            
            // 自动发射烟花
            autoLaunch();
            
            // 鼠标拖动时连续发射
            if (isMouseDown && timestamp - lastFireworkTime > 100) {
                launchFirework(mouseX, mouseY);
                lastFireworkTime = timestamp;
            }
            
            // 更新和绘制烟花
            for (let i = fireworks.length - 1; i >= 0; i--) {
                fireworks[i].update();
                fireworks[i].draw();
                if (!fireworks[i].alive) {
                    fireworks.splice(i, 1);
                }
            }
            
            // 更新和绘制粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                }
            }
            
            animationId = requestAnimationFrame(animate);
        }
        
        // 事件监听
        function handleMouseDown(e) {
            isMouseDown = true;
            mouseX = e.clientX;
            mouseY = e.clientY;
            launchFirework(mouseX, mouseY);
        }
        
        function handleMouseMove(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
        }
        
        function handleMouseUp() {
            isMouseDown = false;
        }
        
        function handleTouchStart(e) {
            if (e.touches.length > 0) {
                isMouseDown = true;
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
                launchFirework(mouseX, mouseY);
            }
        }
        
        function handleTouchMove(e) {
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        }
        
        function handleTouchEnd() {
            isMouseDown = false;
        }
        
        // 初始化
        function init() {
            resize();
            initSparks();
            
            window.addEventListener('resize', () => {
                resize();
                initSparks();
            });
            
            canvas.addEventListener('mousedown', handleMouseDown);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('mouseup', handleMouseUp);
            canvas.addEventListener('mouseleave', handleMouseUp);
            
            canvas.addEventListener('touchstart', handleTouchStart, { passive: true });
            canvas.addEventListener('touchmove', handleTouchMove, { passive: true });
            canvas.addEventListener('touchend', handleTouchEnd);
            
            // 检测 prefers-reduced-motion
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
            if (!prefersReducedMotion.matches) {
                animate(0);
            } else {
                // 静态模式：只显示背景
                ctx.fillStyle = 'rgba(10, 10, 26, 1)';
                ctx.fillRect(0, 0, width, height);
                sparks.forEach(spark => spark.draw());
            }
        }
        
        init();
    </script>
</body>
</html>
