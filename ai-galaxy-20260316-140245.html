<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy - 银河系</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            z-index: 10;
            text-shadow: 0 0 10px rgba(200, 150, 255, 0.8);
            pointer-events: none;
        }

        .info span {
            display: block;
            margin: 5px 0;
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                bottom: 10px;
                left: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="galaxy"></canvas>
    <div class="info">
        <span>🖱️ 移动鼠标 - 控制旋转速度</span>
        <span>👆 点击 - 生成超新星爆发</span>
    </div>

    <script>
        const canvas = document.getElementById('galaxy');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Mouse tracking
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });

        // Click for supernova
        canvas.addEventListener('click', (e) => {
            createSupernova(e.clientX, e.clientY);
        });

        canvas.addEventListener('touchstart', (e) => {
            createSupernova(e.touches[0].clientX, e.touches[0].clientY);
        });

        // Star class
        class Star {
            constructor(x, y, z) {
                this.x = x || (Math.random() - 0.5) * 2000;
                this.y = y || (Math.random() - 0.5) * 2000;
                this.z = z || Math.random() * 1000;
                this.baseX = this.x;
                this.baseY = this.y;
                this.size = Math.random() * 2;
                this.color = this.getStarColor();
                this.twinkle = Math.random() * Math.PI * 2;
                this.twinkleSpeed = 0.02 + Math.random() * 0.05;
            }

            getStarColor() {
                const colors = [
                    'rgba(255, 255, 255, 1)',    // White
                    'rgba(255, 200, 150, 1)',    // Orange
                    'rgba(150, 200, 255, 1)',    // Blue
                    'rgba(255, 255, 200, 1)',    // Yellow
                    'rgba(255, 150, 150, 1)'     // Red
                ];
                const weights = [0.5, 0.2, 0.15, 0.1, 0.05];
                let r = Math.random();
                let sum = 0;
                for (let i = 0; i < weights.length; i++) {
                    sum += weights[i];
                    if (r < sum) return colors[i];
                }
                return colors[0];
            }

            update(rotationSpeed, centerX, centerY) {
                this.twinkle += this.twinkleSpeed;
                
                // Rotate around center
                const cos = Math.cos(rotationSpeed);
                const sin = Math.sin(rotationSpeed);
                const dx = this.x - centerX;
                const dy = this.y - centerY;
                this.x = centerX + dx * cos - dy * sin;
                this.y = centerY + dx * sin + dy * cos;
            }

            draw() {
                const alpha = 0.5 + Math.sin(this.twinkle) * 0.3;
                const size = this.size * (0.8 + Math.sin(this.twinkle) * 0.2);
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
                ctx.fillStyle = this.color.replace('1)', `${alpha})`);
                ctx.fill();
            }
        }

        // Galaxy arm class
        class GalaxyArm {
            constructor(angle, armIndex) {
                this.angle = angle;
                this.armIndex = armIndex;
                this.stars = [];
                this.generateStars();
            }

            generateStars() {
                const starCount = 300;
                for (let i = 0; i < starCount; i++) {
                    const distance = Math.pow(Math.random(), 0.5) * 400;
                    const spread = (1 - distance / 400) * 50 + Math.random() * 30;
                    const angleOffset = (Math.random() - 0.5) * spread * (Math.PI / 180);
                    const spiralAngle = this.angle + (distance / 400) * Math.PI * 1.5 + angleOffset;
                    
                    const centerX = canvas.width / 2;
                    const centerY = canvas.height / 2;
                    
                    const x = centerX + Math.cos(spiralAngle) * distance;
                    const y = centerY + Math.sin(spiralAngle) * distance * 0.6; // Flatten for perspective
                    
                    this.stars.push(new Star(x, y));
                }
            }

            update(rotationSpeed, centerX, centerY) {
                this.angle += rotationSpeed;
                this.stars.forEach(star => {
                    star.update(rotationSpeed * 0.3, centerX, centerY);
                });
            }

            draw() {
                this.stars.forEach(star => star.draw());
            }
        }

        // Background stars (distant)
        const backgroundStars = [];
        for (let i = 0; i < 300; i++) {
            backgroundStars.push(new Star());
        }

        // Create galaxy arms
        const galaxyArms = [];
        const armCount = 4;
        for (let i = 0; i < armCount; i++) {
            galaxyArms.push(new GalaxyArm((i * Math.PI * 2) / armCount, i));
        }

        // Core glow
        function drawCore(centerX, centerY, time) {
            const pulseSize = 80 + Math.sin(time * 0.02) * 10;
            
            // Outer glow
            const gradient1 = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, pulseSize * 2);
            gradient1.addColorStop(0, 'rgba(255, 200, 100, 0.4)');
            gradient1.addColorStop(0.3, 'rgba(255, 150, 100, 0.2)');
            gradient1.addColorStop(0.6, 'rgba(200, 100, 150, 0.1)');
            gradient1.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient1;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Inner core
            const gradient2 = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, pulseSize);
            gradient2.addColorStop(0, 'rgba(255, 255, 220, 0.8)');
            gradient2.addColorStop(0.2, 'rgba(255, 220, 180, 0.5)');
            gradient2.addColorStop(0.5, 'rgba(255, 180, 150, 0.3)');
            gradient2.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient2;
            ctx.beginPath();
            ctx.arc(centerX, centerY, pulseSize, 0, Math.PI * 2);
            ctx.fill();
        }

        // Nebula clouds
        class Nebula {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.radius = 100 + Math.random() * 200;
                this.hue = Math.random() * 60 + 250; // Purple to pink
                this.alpha = 0.05 + Math.random() * 0.1;
                this.vx = (Math.random() - 0.5) * 0.1;
                this.vy = (Math.random() - 0.5) * 0.1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < -this.radius) this.x = canvas.width + this.radius;
                if (this.x > canvas.width + this.radius) this.x = -this.radius;
                if (this.y < -this.radius) this.y = canvas.height + this.radius;
                if (this.y > canvas.height + this.radius) this.y = -this.radius;
            }

            draw() {
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
                gradient.addColorStop(0, `hsla(${this.hue}, 70%, 50%, ${this.alpha})`);
                gradient.addColorStop(0.5, `hsla(${this.hue + 20}, 60%, 40%, ${this.alpha * 0.5})`);
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.fillRect(this.x - this.radius, this.y - this.radius, this.radius * 2, this.radius * 2);
            }
        }

        // Create nebulae
        const nebulae = [];
        for (let i = 0; i < 8; i++) {
            nebulae.push(new Nebula());
        }

        // Supernova effect
        let supernovas = [];

        function createSupernova(x, y) {
            // Create explosion particles
            for (let i = 0; i < 100; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * 8;
                supernovas.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: 2 + Math.random() * 4,
                    life: 1,
                    hue: Math.random() * 60 + 30,
                    decay: 0.01 + Math.random() * 0.02
                });
            }
            // Create shockwave
            supernovas.push({
                x: x,
                y: y,
                radius: 0,
                maxRadius: 300,
                type: 'shockwave',
                life: 1
            });
        }

        function updateSupernovas() {
            supernovas = supernovas.filter(s => {
                if (s.type === 'shockwave') {
                    s.radius += 5;
                    s.life = 1 - s.radius / s.maxRadius;
                    
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(255, 200, 100, ${s.life * 0.5})`;
                    ctx.lineWidth = 3;
                    ctx.stroke();
                    
                    return s.radius < s.maxRadius;
                } else {
                    s.x += s.vx;
                    s.y += s.vy;
                    s.vx *= 0.98;
                    s.vy *= 0.98;
                    s.life -= s.decay;
                    
                    ctx.save();
                    ctx.globalAlpha = s.life;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = `hsl(${s.hue}, 100%, 70%)`;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.size * s.life, 0, Math.PI * 2);
                    ctx.fillStyle = `hsl(${s.hue}, 100%, 70%)`;
                    ctx.fill();
                    ctx.restore();
                    
                    return s.life > 0;
                }
            });
        }

        // Shooting star
        let shootingStars = [];

        function maybeShootingStar() {
            if (Math.random() < 0.005) {
                shootingStars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height * 0.5,
                    vx: 5 + Math.random() * 10,
                    vy: 3 + Math.random() * 5,
                    life: 1,
                    length: 30 + Math.random() * 50
                });
            }
        }

        function drawShootingStars() {
            shootingStars = shootingStars.filter(s => {
                s.x += s.vx;
                s.y += s.vy;
                s.life -= 0.02;

                const gradient = ctx.createLinearGradient(
                    s.x, s.y,
                    s.x - s.vx * (s.length / 10),
                    s.y - s.vy * (s.length / 10)
                );
                gradient.addColorStop(0, `rgba(255, 255, 255, ${s.life})`);
                gradient.addColorStop(1, 'transparent');

                ctx.beginPath();
                ctx.moveTo(s.x, s.y);
                ctx.lineTo(s.x - s.vx * (s.length / 10), s.y - s.vy * (s.length / 10));
                ctx.strokeStyle = gradient;
                ctx.lineWidth = 2;
                ctx.stroke();

                return s.life > 0;
            });
        }

        // Animation loop
        let time = 0;

        function animate() {
            time++;

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // Calculate rotation speed based on mouse X
            const rotationSpeed = ((mouseX - centerX) / canvas.width) * 0.005;

            // Clear with dark background
            ctx.fillStyle = '#000005';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw nebulae
            nebulae.forEach(n => {
                n.update();
                n.draw();
            });

            // Draw background stars
            backgroundStars.forEach(star => {
                star.update(rotationSpeed * 0.1, centerX, centerY);
                star.draw();
            });

            // Draw galaxy core
            drawCore(centerX, centerY, time);

            // Update and draw galaxy arms
            galaxyArms.forEach(arm => {
                arm.update(rotationSpeed, centerX, centerY);
                arm.draw();
            });

            // Shooting stars
            maybeShootingStar();
            drawShootingStars();

            // Supernovas
            updateSupernovas();

            // Vignette effect
            const vignette = ctx.createRadialGradient(
                centerX, centerY, canvas.height * 0.3,
                centerX, centerY, canvas.height
            );
            vignette.addColorStop(0, 'transparent');
            vignette.addColorStop(1, 'rgba(0, 0, 10, 0.5)');
            ctx.fillStyle = vignette;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
