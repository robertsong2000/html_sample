<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Clock - 霓虹时钟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255, 100, 200, 0.8);
            pointer-events: none;
        }

        .info span {
            display: block;
            margin: 5px 0;
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                bottom: 10px;
                left: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="clock"></canvas>
    <div class="info">
        <span>🖱️ 移动鼠标 - 改变霓虹颜色</span>
        <span>👆 点击 - 切换时钟样式</span>
    </div>

    <script>
        const canvas = document.getElementById('clock');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Mouse tracking
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;
        let hueShift = 0;

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            hueShift = (mouseX / canvas.width) * 60;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
            hueShift = (mouseX / canvas.width) * 60;
        }, { passive: false });

        // Clock styles
        let clockStyle = 0;
        const styles = ['analog', 'digital', 'binary'];

        canvas.addEventListener('click', () => {
            clockStyle = (clockStyle + 1) % styles.length;
        });

        canvas.addEventListener('touchstart', () => {
            clockStyle = (clockStyle + 1) % styles.length;
        });

        // Particle class for effects
        class Particle {
            constructor(x, y, hue) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.02;
                this.size = 2 + Math.random() * 3;
                this.hue = hue;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.shadowBlur = 10;
                ctx.shadowColor = `hsl(${this.hue}, 100%, 50%)`;
                ctx.fillStyle = `hsl(${this.hue}, 100%, 70%)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            isDead() {
                return this.life <= 0;
            }
        }

        let particles = [];

        // Background stars
        const stars = [];
        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * 2000,
                y: Math.random() * 2000,
                size: Math.random() * 1.5,
                twinkle: Math.random() * Math.PI * 2,
                speed: 0.02 + Math.random() * 0.05
            });
        }

        function drawStars(time) {
            stars.forEach(star => {
                star.twinkle += star.speed;
                const alpha = 0.3 + Math.sin(star.twinkle) * 0.3;
                ctx.beginPath();
                ctx.arc(star.x % canvas.width, star.y % canvas.height, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fill();
            });
        }

        // Draw analog clock
        function drawAnalogClock(centerX, centerY, radius, time, hue) {
            const now = new Date();
            const hours = now.getHours() % 12;
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            const milliseconds = now.getMilliseconds();

            // Smooth seconds
            const smoothSeconds = seconds + milliseconds / 1000;
            const smoothMinutes = minutes + smoothSeconds / 60;
            const smoothHours = hours + smoothMinutes / 60;

            // Draw outer ring
            ctx.save();
            ctx.shadowBlur = 30;
            ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
            ctx.strokeStyle = `hsl(${hue}, 100%, 50%)`;
            ctx.lineWidth = 4;
            ctx.stroke();
            ctx.restore();

            // Draw inner ring
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius - 15, 0, Math.PI * 2);
            ctx.strokeStyle = `hsla(${hue}, 100%, 50%, 0.3)`;
            ctx.lineWidth = 2;
            ctx.stroke();

            // Draw hour markers
            for (let i = 0; i < 12; i++) {
                const angle = (i * Math.PI * 2) / 12 - Math.PI / 2;
                const innerRadius = radius - 25;
                const outerRadius = radius - 10;
                const x1 = centerX + Math.cos(angle) * innerRadius;
                const y1 = centerY + Math.sin(angle) * innerRadius;
                const x2 = centerX + Math.cos(angle) * outerRadius;
                const y2 = centerY + Math.sin(angle) * outerRadius;

                ctx.save();
                ctx.shadowBlur = 10;
                ctx.shadowColor = `hsl(${hue}, 100%, 70%)`;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = `hsl(${hue}, 100%, 70%)`;
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.restore();
            }

            // Draw minute markers
            for (let i = 0; i < 60; i++) {
                if (i % 5 !== 0) {
                    const angle = (i * Math.PI * 2) / 60 - Math.PI / 2;
                    const innerRadius = radius - 20;
                    const outerRadius = radius - 15;
                    const x1 = centerX + Math.cos(angle) * innerRadius;
                    const y1 = centerY + Math.sin(angle) * innerRadius;
                    const x2 = centerX + Math.cos(angle) * outerRadius;
                    const y2 = centerY + Math.sin(angle) * outerRadius;

                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.strokeStyle = `hsla(${hue}, 100%, 70%, 0.5)`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            }

            // Hour hand
            const hourAngle = (smoothHours * Math.PI * 2) / 12 - Math.PI / 2;
            drawHand(centerX, centerY, hourAngle, radius * 0.5, 8, hue);

            // Minute hand
            const minuteAngle = (smoothMinutes * Math.PI * 2) / 60 - Math.PI / 2;
            drawHand(centerX, centerY, minuteAngle, radius * 0.7, 5, hue + 30);

            // Second hand
            const secondAngle = (smoothSeconds * Math.PI * 2) / 60 - Math.PI / 2;
            drawHand(centerX, centerY, secondAngle, radius * 0.85, 2, hue + 60);

            // Center dot
            ctx.save();
            ctx.shadowBlur = 20;
            ctx.shadowColor = `hsl(${hue}, 100%, 70%)`;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 8, 0, Math.PI * 2);
            ctx.fillStyle = `hsl(${hue}, 100%, 70%)`;
            ctx.fill();
            ctx.restore();
        }

        function drawHand(cx, cy, angle, length, width, hue) {
            const x = cx + Math.cos(angle) * length;
            const y = cy + Math.sin(angle) * length;

            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(x, y);
            ctx.strokeStyle = `hsl(${hue}, 100%, 60%)`;
            ctx.lineWidth = width;
            ctx.lineCap = 'round';
            ctx.stroke();
            ctx.restore();
        }

        // Draw digital clock
        function drawDigitalClock(centerX, centerY, radius, time, hue) {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            const timeStr = `${hours}:${minutes}:${seconds}`;

            ctx.save();
            ctx.shadowBlur = 30;
            ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
            ctx.font = `bold ${radius * 0.4}px monospace`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = `hsl(${hue}, 100%, 60%)`;
            ctx.fillText(timeStr, centerX, centerY);

            // Date
            const dateStr = now.toLocaleDateString('zh-CN', { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric',
                weekday: 'long'
            });
            ctx.font = `${radius * 0.12}px sans-serif`;
            ctx.fillStyle = `hsla(${hue}, 100%, 70%, 0.7)`;
            ctx.fillText(dateStr, centerX, centerY + radius * 0.35);
            ctx.restore();

            // Decorative frame
            ctx.save();
            ctx.shadowBlur = 20;
            ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;
            ctx.strokeStyle = `hsl(${hue}, 100%, 50%)`;
            ctx.lineWidth = 3;
            
            // Rounded rectangle
            const padding = 30;
            const width = radius * 2.2;
            const height = radius * 1.2;
            roundRect(centerX - width/2, centerY - height/2, width, height, 20);
            ctx.stroke();
            ctx.restore();

            // Animated dots
            const dotCount = 8;
            for (let i = 0; i < dotCount; i++) {
                const angle = (time * 0.02) + (i * Math.PI * 2) / dotCount;
                const x = centerX + Math.cos(angle) * (radius * 0.9);
                const y = centerY + Math.sin(angle) * (radius * 0.5);
                
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${hue + i * 20}, 100%, 70%, ${0.5 + Math.sin(time * 0.1 + i) * 0.3})`;
                ctx.fill();
            }
        }

        function roundRect(x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }

        // Draw binary clock
        function drawBinaryClock(centerX, centerY, radius, time, hue) {
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();

            const binary = {
                hours: hours.toString(2).padStart(6, '0'),
                minutes: minutes.toString(2).padStart(6, '0'),
                seconds: seconds.toString(2).padStart(6, '0')
            };

            const labels = ['时', '分', '秒'];
            const values = [binary.hours, binary.minutes, binary.seconds];
            const spacing = radius * 0.5;

            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;

            values.forEach((val, row) => {
                const y = centerY - spacing + row * spacing;
                
                // Label
                ctx.font = `bold ${radius * 0.15}px sans-serif`;
                ctx.fillStyle = `hsla(${hue}, 100%, 70%, 0.8)`;
                ctx.textAlign = 'right';
                ctx.textBaseline = 'middle';
                ctx.fillText(labels[row], centerX - radius * 0.4, y);

                // Binary dots
                for (let i = 0; i < 6; i++) {
                    const x = centerX - radius * 0.2 + i * (radius * 0.15);
                    const isOn = val[i] === '1';
                    
                    ctx.beginPath();
                    ctx.arc(x, y, radius * 0.05, 0, Math.PI * 2);
                    
                    if (isOn) {
                        ctx.fillStyle = `hsl(${hue + row * 30}, 100%, 60%)`;
                        ctx.shadowBlur = 20;
                        // Add particle
                        if (Math.random() < 0.05) {
                            particles.push(new Particle(x, y, hue + row * 30));
                        }
                    } else {
                        ctx.fillStyle = `hsla(${hue}, 50%, 30%, 0.3)`;
                        ctx.shadowBlur = 0;
                    }
                    ctx.fill();
                }

                // Decimal value
                ctx.font = `${radius * 0.12}px monospace`;
                ctx.fillStyle = `hsla(${hue}, 100%, 70%, 0.6)`;
                ctx.textAlign = 'left';
                const decimal = parseInt(val, 2).toString().padStart(2, '0');
                ctx.fillText(decimal, centerX + radius * 0.8, y);
            });

            ctx.restore();
        }

        // Animation loop
        let animTime = 0;

        function animate() {
            animTime++;

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = Math.min(canvas.width, canvas.height) * 0.35;

            // Base hue changes with time and mouse
            const baseHue = 320 + hueShift + Math.sin(animTime * 0.01) * 20;

            // Clear
            ctx.fillStyle = 'rgba(0, 0, 10, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Background
            const bgGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, canvas.width);
            bgGradient.addColorStop(0, '#0a0015');
            bgGradient.addColorStop(0.5, '#050010');
            bgGradient.addColorStop(1, '#000005');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Stars
            drawStars(animTime);

            // Draw clock based on style
            switch (styles[clockStyle]) {
                case 'analog':
                    drawAnalogClock(centerX, centerY, radius, animTime, baseHue);
                    break;
                case 'digital':
                    drawDigitalClock(centerX, centerY, radius, animTime, baseHue);
                    break;
                case 'binary':
                    drawBinaryClock(centerX, centerY, radius, animTime, baseHue);
                    break;
            }

            // Update and draw particles
            particles = particles.filter(p => {
                p.update();
                p.draw();
                return !p.isDead();
            });

            // Ambient glow
            const glowGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radius * 1.5);
            glowGradient.addColorStop(0, `hsla(${baseHue}, 100%, 50%, 0.05)`);
            glowGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = glowGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
