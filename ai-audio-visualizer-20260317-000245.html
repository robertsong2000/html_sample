<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Visualizer - 音频可视化</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            z-index: 10;
            text-shadow: 0 0 10px rgba(150, 100, 255, 0.8);
            pointer-events: none;
        }

        .info span {
            display: block;
            margin: 5px 0;
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                bottom: 10px;
                left: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="visualizer"></canvas>
    <div class="info">
        <span>🖱️ 移动鼠标 - 改变可视化效果</span>
        <span>👆 点击 - 切换可视化模式</span>
    </div>

    <script>
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Mouse tracking
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });

        // Visualization modes
        let visualMode = 0;
        const modes = ['bars', 'circular', 'wave', 'particles'];

        canvas.addEventListener('click', () => {
            visualMode = (visualMode + 1) % modes.length;
        });

        canvas.addEventListener('touchstart', () => {
            visualMode = (visualMode + 1) % modes.length;
        });

        // Simulated audio data (since we can't access real audio without user permission)
        class SimulatedAudio {
            constructor() {
                this.data = new Array(64).fill(0);
                this.targetData = new Array(64).fill(0);
                this.time = 0;
            }

            update() {
                this.time += 0.05;

                // Generate simulated frequency data
                for (let i = 0; i < this.data.length; i++) {
                    // Base frequency response
                    const baseFreq = Math.sin(this.time * (1 + i * 0.1)) * 0.5 + 0.5;
                    const harmonics = Math.sin(this.time * 2.5 * (1 + i * 0.05)) * 0.3;
                    const noise = Math.random() * 0.2;
                    
                    // Mouse influence
                    const mouseInfluence = (mouseX / canvas.width) * 0.5;
                    
                    // Bass boost
                    const bassBoost = i < 8 ? 1.5 : 1;
                    
                    this.targetData[i] = (baseFreq + harmonics + noise) * bassBoost * (0.5 + mouseInfluence);
                }

                // Smooth transition
                for (let i = 0; i < this.data.length; i++) {
                    this.data[i] += (this.targetData[i] - this.data[i]) * 0.2;
                }
            }

            getFrequencyData() {
                return this.data;
            }
        }

        const audio = new SimulatedAudio();

        // Particle class for particle mode
        class VizParticle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * 3;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.size = 2 + Math.random() * 4;
                this.life = 1;
                this.decay = 0.005 + Math.random() * 0.01;
                this.hue = Math.random() * 60 + 250;
            }

            update(intensity) {
                this.x += this.vx * (1 + intensity * 2);
                this.y += this.vy * (1 + intensity * 2);
                this.life -= this.decay;

                if (this.life <= 0 || 
                    this.x < 0 || this.x > canvas.width ||
                    this.y < 0 || this.y > canvas.height) {
                    this.reset();
                }
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.shadowBlur = 10;
                ctx.shadowColor = `hsl(${this.hue}, 80%, 60%)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${this.hue}, 80%, 60%)`;
                ctx.fill();
                ctx.restore();
            }
        }

        // Create particles
        const particles = [];
        for (let i = 0; i < 200; i++) {
            particles.push(new VizParticle());
        }

        // Draw bars visualization
        function drawBars(data) {
            const barCount = data.length;
            const barWidth = canvas.width / barCount;
            const centerY = canvas.height / 2;

            for (let i = 0; i < barCount; i++) {
                const value = data[i];
                const barHeight = value * canvas.height * 0.4;
                const hue = (i / barCount) * 120 + mouseY / canvas.height * 120;
                const x = i * barWidth;

                // Top bar
                const gradient = ctx.createLinearGradient(x, centerY - barHeight, x, centerY);
                gradient.addColorStop(0, `hsla(${hue}, 80%, 60%, 0.8)`);
                gradient.addColorStop(1, `hsla(${hue}, 80%, 40%, 0.4)`);

                ctx.fillStyle = gradient;
                ctx.fillRect(x + 2, centerY - barHeight, barWidth - 4, barHeight);

                // Bottom bar (mirror)
                const gradient2 = ctx.createLinearGradient(x, centerY, x, centerY + barHeight);
                gradient2.addColorStop(0, `hsla(${hue}, 80%, 40%, 0.4)`);
                gradient2.addColorStop(1, `hsla(${hue}, 80%, 60%, 0.2)`);

                ctx.fillStyle = gradient2;
                ctx.fillRect(x + 2, centerY, barWidth - 4, barHeight);

                // Glow effect
                ctx.save();
                ctx.shadowBlur = 20;
                ctx.shadowColor = `hsl(${hue}, 80%, 60%)`;
                ctx.fillRect(x + 2, centerY - barHeight, barWidth - 4, 4);
                ctx.restore();
            }
        }

        // Draw circular visualization
        function drawCircular(data, time) {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const baseRadius = Math.min(canvas.width, canvas.height) * 0.2;

            // Inner glow
            const glowGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, baseRadius * 2);
            glowGradient.addColorStop(0, 'rgba(100, 50, 255, 0.3)');
            glowGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = glowGradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw frequency bars in circle
            const barCount = data.length;
            const angleStep = (Math.PI * 2) / barCount;

            for (let i = 0; i < barCount; i++) {
                const value = data[i];
                const angle = i * angleStep - Math.PI / 2 + time * 0.01;
                const barLength = value * baseRadius * 1.5;
                const hue = (i / barCount) * 360;

                const x1 = centerX + Math.cos(angle) * baseRadius;
                const y1 = centerY + Math.sin(angle) * baseRadius;
                const x2 = centerX + Math.cos(angle) * (baseRadius + barLength);
                const y2 = centerY + Math.sin(angle) * (baseRadius + barLength);

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = `hsla(${hue}, 80%, 60%, 0.8)`;
                ctx.lineWidth = 4;
                ctx.lineCap = 'round';
                ctx.stroke();

                // Glow dot at end
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = `hsl(${hue}, 80%, 60%)`;
                ctx.beginPath();
                ctx.arc(x2, y2, 3, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${hue}, 80%, 70%)`;
                ctx.fill();
                ctx.restore();
            }

            // Center circle
            ctx.beginPath();
            ctx.arc(centerX, centerY, baseRadius * 0.5, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(150, 100, 255, 0.5)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        // Draw wave visualization
        function drawWave(data, time) {
            const centerY = canvas.height / 2;

            // Draw multiple waves
            for (let wave = 0; wave < 3; wave++) {
                ctx.beginPath();
                ctx.moveTo(0, centerY);

                for (let x = 0; x < canvas.width; x++) {
                    const dataIndex = Math.floor((x / canvas.width) * data.length);
                    const value = data[dataIndex];
                    const waveOffset = Math.sin(x * 0.02 + time * 0.05 + wave * Math.PI / 3) * 50;
                    const y = centerY + value * canvas.height * 0.3 + waveOffset;
                    ctx.lineTo(x, y);
                }

                const hue = 250 + wave * 40;
                ctx.strokeStyle = `hsla(${hue}, 80%, 60%, ${0.8 - wave * 0.2})`;
                ctx.lineWidth = 3 - wave;
                ctx.stroke();

                // Fill below wave
                ctx.lineTo(canvas.width, canvas.height);
                ctx.lineTo(0, canvas.height);
                ctx.closePath();
                ctx.fillStyle = `hsla(${hue}, 80%, 50%, ${0.1 - wave * 0.03})`;
                ctx.fill();
            }
        }

        // Draw particles visualization
        function drawParticles(data, time) {
            const avgIntensity = data.reduce((a, b) => a + b, 0) / data.length;

            particles.forEach((particle, i) => {
                const dataIndex = i % data.length;
                const intensity = data[dataIndex];
                particle.update(intensity);
                particle.draw();
            });

            // Draw connections between nearby particles
            ctx.strokeStyle = 'rgba(150, 100, 255, 0.1)';
            ctx.lineWidth = 1;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 50) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // Background particles
        const bgParticles = [];
        for (let i = 0; i < 50; i++) {
            bgParticles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                alpha: Math.random() * 0.3
            });
        }

        function drawBackground() {
            bgParticles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(150, 150, 255, ${p.alpha})`;
                ctx.fill();
            });
        }

        // Animation loop
        let time = 0;

        function animate() {
            time++;

            // Clear with fade
            ctx.fillStyle = 'rgba(5, 5, 15, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw background
            drawBackground();

            // Update audio simulation
            audio.update();

            // Get frequency data
            const data = audio.getFrequencyData();

            // Draw based on mode
            switch (modes[visualMode]) {
                case 'bars':
                    drawBars(data);
                    break;
                case 'circular':
                    drawCircular(data, time);
                    break;
                case 'wave':
                    drawWave(data, time);
                    break;
                case 'particles':
                    drawParticles(data, time);
                    break;
            }

            // Mode indicator
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.font = '12px monospace';
            ctx.fillText(`Mode: ${modes[visualMode]}`, 10, canvas.height - 10);

            requestAnimationFrame(animate);
        }

        // Initial clear
        ctx.fillStyle = '#05050f';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        animate();
    </script>
</body>
</html>
