<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粒子动画 - Particle Animation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0a0f;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            z-index: 100;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
        
        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            z-index: 100;
            text-align: right;
        }
        
        .controls div {
            margin: 5px 0;
            padding: 5px 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .fps {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>
    
    <div class="controls">
        <div id="count">粒子: 0</div>
        <div id="mode">模式: 吸引</div>
    </div>
    
    <div class="info">
        <span>✨ 移动鼠标影响粒子 | 点击切换模式 | 滚轮调整粒子数 | 双击爆炸效果 | 右键切换配色</span>
    </div>
    
    <div class="fps">FPS: <span id="fps">60</span></div>

    <script>
        // 配置
        const CONFIG = {
            INITIAL_PARTICLES: 300,
            MAX_PARTICLES: 800,
            MIN_PARTICLES: 100,
            CONNECTION_DISTANCE: 120,
            MOUSE_RADIUS: 150
        };

        // 交互模式
        const interactionModes = [
            { name: '吸引', force: 0.08 },
            { name: '排斥', force: -0.08 },
            { name: '环绕', force: 0.05, orbit: true },
            { name: '自由', force: 0 }
        ];

        // 配色方案
        const colorSchemes = [
            { name: '星空', particle: '#ffffff', connection: 'rgba(100, 150, 255, 0.2)', glow: '#4488ff' },
            { name: '火焰', particle: '#ff8800', connection: 'rgba(255, 100, 0, 0.2)', glow: '#ff4400' },
            { name: '极光', particle: '#00ffaa', connection: 'rgba(0, 255, 170, 0.2)', glow: '#00ff88' },
            { name: '霓虹', particle: '#ff00ff', connection: 'rgba(255, 0, 255, 0.2)', glow: '#ff00ff' },
            { name: '黄金', particle: '#ffcc00', connection: 'rgba(255, 200, 0, 0.2)', glow: '#ffaa00' }
        ];

        // Canvas
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let particles = [];
        let mouseX = -1000, mouseY = -1000;
        let targetParticleCount = CONFIG.INITIAL_PARTICLES;
        let currentMode = 0;
        let currentScheme = 0;
        let time = 0;

        // 粒子类
        class Particle {
            constructor(x, y) {
                this.x = x || Math.random() * width;
                this.y = y || Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.radius = Math.random() * 3 + 1;
                this.baseRadius = this.radius;
                this.alpha = Math.random() * 0.5 + 0.5;
                this.pulseSpeed = Math.random() * 0.1 + 0.02;
                this.pulsePhase = Math.random() * Math.PI * 2;
            }

            update(mouseX, mouseY, mode) {
                // 脉冲效果
                this.radius = this.baseRadius * (0.8 + Math.sin(time * this.pulseSpeed + this.pulsePhase) * 0.2);
                
                // 鼠标交互
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < CONFIG.MOUSE_RADIUS && dist > 0) {
                    const force = (CONFIG.MOUSE_RADIUS - dist) / CONFIG.MOUSE_RADIUS;
                    
                    if (mode.orbit) {
                        // 环绕模式
                        const angle = Math.atan2(dy, dx) + Math.PI / 2;
                        this.vx += Math.cos(angle) * force * 0.3;
                        this.vy += Math.sin(angle) * force * 0.3;
                    } else {
                        // 吸引/排斥
                        this.vx += (dx / dist) * force * mode.force;
                        this.vy += (dy / dist) * force * mode.force;
                    }
                    
                    // 靠近鼠标时变大
                    this.radius = this.baseRadius * (1 + force * 0.5);
                }
                
                // 速度衰减
                this.vx *= 0.98;
                this.vy *= 0.98;
                
                // 添加随机漂移
                this.vx += (Math.random() - 0.5) * 0.1;
                this.vy += (Math.random() - 0.5) * 0.1;
                
                // 更新位置
                this.x += this.vx;
                this.y += this.vy;
                
                // 边界处理（软反弹）
                const margin = 50;
                if (this.x < margin) this.vx += 0.1;
                if (this.x > width - margin) this.vx -= 0.1;
                if (this.y < margin) this.vy += 0.1;
                if (this.y > height - margin) this.vy -= 0.1;
                
                // 硬边界
                if (this.x < 0) { this.x = 0; this.vx *= -0.5; }
                if (this.x > width) { this.x = width; this.vx *= -0.5; }
                if (this.y < 0) { this.y = 0; this.vy *= -0.5; }
                if (this.y > height) { this.y = height; this.vy *= -0.5; }
            }

            draw(ctx, scheme) {
                // 发光效果
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius * 4
                );
                gradient.addColorStop(0, scheme.particle);
                gradient.addColorStop(0.3, scheme.glow);
                gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 4, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.globalAlpha = this.alpha * 0.3;
                ctx.fill();
                
                // 核心
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = scheme.particle;
                ctx.globalAlpha = this.alpha;
                ctx.fill();
                
                ctx.globalAlpha = 1;
            }
        }

        // 绘制连线
        function drawConnections(scheme) {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < CONFIG.CONNECTION_DISTANCE) {
                        const alpha = (1 - dist / CONFIG.CONNECTION_DISTANCE) * 0.5;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = scheme.connection.replace('0.2', alpha.toString());
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }
        }

        // 绘制鼠标光环
        function drawMouseGlow(scheme) {
            if (mouseX < 0 || mouseY < 0) return;
            
            const gradient = ctx.createRadialGradient(
                mouseX, mouseY, 0,
                mouseX, mouseY, CONFIG.MOUSE_RADIUS
            );
            gradient.addColorStop(0, 'rgba(255, 255, 255, 0.1)');
            gradient.addColorStop(0.5, scheme.connection.replace('0.2', '0.05'));
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, CONFIG.MOUSE_RADIUS, 0, Math.PI * 2);
            ctx.fillStyle = gradient;
            ctx.fill();
        }

        // 爆炸效果
        function explode(x, y) {
            const explosionParticles = 50;
            for (let i = 0; i < explosionParticles; i++) {
                if (particles.length < CONFIG.MAX_PARTICLES) {
                    const particle = new Particle(x, y);
                    const angle = (i / explosionParticles) * Math.PI * 2;
                    const speed = Math.random() * 10 + 5;
                    particle.vx = Math.cos(angle) * speed;
                    particle.vy = Math.sin(angle) * speed;
                    particle.radius = Math.random() * 4 + 2;
                    particle.baseRadius = particle.radius;
                    particles.push(particle);
                }
            }
            
            // 推开现有粒子
            particles.forEach(p => {
                const dx = p.x - x;
                const dy = p.y - y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 200 && dist > 0) {
                    const force = (200 - dist) / 200 * 10;
                    p.vx += (dx / dist) * force;
                    p.vy += (dy / dist) * force;
                }
            });
        }

        // 初始化
        function init() {
            resize();
            
            particles = [];
            for (let i = 0; i < targetParticleCount; i++) {
                particles.push(new Particle());
            }
            
            updateCount();
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        function updateCount() {
            document.getElementById('count').textContent = `粒子: ${particles.length}`;
        }

        // 调整粒子数量
        function adjustParticleCount(delta) {
            targetParticleCount = Math.max(
                CONFIG.MIN_PARTICLES,
                Math.min(CONFIG.MAX_PARTICLES, targetParticleCount + delta)
            );
            
            while (particles.length < targetParticleCount) {
                particles.push(new Particle());
            }
            while (particles.length > targetParticleCount) {
                particles.pop();
            }
            
            updateCount();
        }

        // FPS计算
        let lastTime = performance.now();
        let frameCount = 0;

        // 动画循环
        function animate(currentTime) {
            time++;
            
            // FPS
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                lastTime = currentTime;
            }

            const mode = interactionModes[currentMode];
            const scheme = colorSchemes[currentScheme];
            
            // 清空画布
            ctx.fillStyle = 'rgba(10, 10, 15, 0.2)';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制鼠标光环
            drawMouseGlow(scheme);
            
            // 绘制连线
            drawConnections(scheme);
            
            // 更新和绘制粒子
            particles.forEach(particle => {
                particle.update(mouseX, mouseY, mode);
                particle.draw(ctx, scheme);
            });

            requestAnimationFrame(animate);
        }

        // 事件监听
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('mouseleave', () => {
            mouseX = -1000;
            mouseY = -1000;
        });

        canvas.addEventListener('click', (e) => {
            currentMode = (currentMode + 1) % interactionModes.length;
            document.getElementById('mode').textContent = `模式: ${interactionModes[currentMode].name}`;
        });

        canvas.addEventListener('dblclick', (e) => {
            explode(e.clientX, e.clientY);
            updateCount();
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            adjustParticleCount(-Math.sign(e.deltaY) * 20);
        });

        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            currentScheme = (currentScheme + 1) % colorSchemes.length;
        });

        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        });

        canvas.addEventListener('touchend', () => {
            mouseX = -1000;
            mouseY = -1000;
        });

        // 键盘支持
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                explode(width / 2, height / 2);
                updateCount();
            } else if (e.code === 'ArrowUp') {
                adjustParticleCount(20);
            } else if (e.code === 'ArrowDown') {
                adjustParticleCount(-20);
            } else if (e.code === 'KeyC') {
                currentScheme = (currentScheme + 1) % colorSchemes.length;
            } else if (e.code === 'KeyM') {
                currentMode = (currentMode + 1) % interactionModes.length;
                document.getElementById('mode').textContent = `模式: ${interactionModes[currentMode].name}`;
            }
        });

        // 启动
        init();
        animate(0);
    </script>
</body>
</html>
