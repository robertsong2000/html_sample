<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹城市 | Neon City</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #0a0a0f;
            font-family: 'Courier New', monospace;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            cursor: pointer;
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 0, 150, 0.9);
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 15px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 
                0 0 10px rgba(255, 0, 150, 1),
                0 0 20px rgba(255, 0, 150, 0.8),
                0 0 40px rgba(255, 0, 150, 0.5);
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(0, 255, 255, 0.7);
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
            text-align: center;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(0, 255, 255, 0.5);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
            text-align: right;
            line-height: 1.8;
        }
        
        @media (max-width: 768px) {
            .title {
                font-size: 24px;
                letter-spacing: 8px;
            }
            .info {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="title">NEON CITY</div>
    <canvas id="neoncity"></canvas>
    <div class="stats">
        <div>建筑: <span id="buildingCount">0</span></div>
        <div>雨量: <span id="rainLevel">中</span></div>
    </div>
    <div class="info">移动鼠标控制光照 · 点击切换天气 · 滚轮调整雨量</div>
    
    <script>
        const canvas = document.getElementById('neoncity');
        const ctx = canvas.getContext('2d');
        const buildingCountEl = document.getElementById('buildingCount');
        const rainLevelEl = document.getElementById('rainLevel');
        
        let width, height;
        let buildings = [];
        let raindrops = [];
        let reflections = [];
        let mouseX = 0, mouseY = 0;
        let time = 0;
        let rainLevel = 1;
        const rainLevels = ['无', '小', '中', '大'];
        const rainCounts = [0, 50, 150, 300];
        
        // 霓虹颜色
        const neonColors = [
            '#ff00ff', '#00ffff', '#ff0080', '#80ff00', 
            '#ff8000', '#0080ff', '#ff0040', '#40ff00'
        ];
        
        // 建筑类
        class Building {
            constructor(x, index) {
                this.x = x;
                this.index = index;
                this.width = 40 + Math.random() * 80;
                this.height = 100 + Math.random() * 300;
                this.windows = [];
                this.neonSign = Math.random() > 0.5;
                this.neonColor = neonColors[Math.floor(Math.random() * neonColors.length)];
                this.neonFlicker = Math.random() < 0.1;
                this.neonPhase = Math.random() * Math.PI * 2;
                
                this.generateWindows();
            }
            
            generateWindows() {
                const cols = Math.floor(this.width / 15);
                const rows = Math.floor(this.height / 20);
                
                for (let row = 0; row < rows; row++) {
                    for (let col = 0; col < cols; col++) {
                        if (Math.random() < 0.7) {
                            this.windows.push({
                                col,
                                row,
                                lit: Math.random() < 0.6,
                                color: Math.random() < 0.3 ? 
                                    neonColors[Math.floor(Math.random() * neonColors.length)] : 
                                    '#ffff99'
                            });
                        }
                    }
                }
            }
            
            draw() {
                const baseY = height * 0.7;
                
                // 建筑主体
                ctx.fillStyle = '#1a1a2a';
                ctx.fillRect(this.x, baseY - this.height, this.width, this.height);
                
                // 边框
                ctx.strokeStyle = '#2a2a4a';
                ctx.lineWidth = 1;
                ctx.strokeRect(this.x, baseY - this.height, this.width, this.height);
                
                // 窗户
                this.windows.forEach(win => {
                    const wx = this.x + 5 + win.col * 15;
                    const wy = baseY - this.height + 10 + win.row * 20;
                    
                    if (win.lit) {
                        // 鼠标光照影响
                        const dist = Math.hypot(wx - mouseX, wy - mouseY);
                        const brightness = Math.max(0.3, 1 - dist / 300);
                        
                        ctx.fillStyle = win.color;
                        ctx.globalAlpha = brightness * 0.8;
                        ctx.fillRect(wx, wy, 10, 15);
                        
                        // 窗户发光
                        ctx.shadowBlur = 5;
                        ctx.shadowColor = win.color;
                        ctx.fillRect(wx, wy, 10, 15);
                        ctx.shadowBlur = 0;
                        ctx.globalAlpha = 1;
                    } else {
                        ctx.fillStyle = '#0a0a15';
                        ctx.fillRect(wx, wy, 10, 15);
                    }
                });
                
                // 霓虹招牌
                if (this.neonSign) {
                    let alpha = 1;
                    if (this.neonFlicker) {
                        alpha = Math.sin(time * 0.1 + this.neonPhase) > 0.7 ? 1 : 0.3;
                    }
                    
                    const signY = baseY - this.height + 30;
                    const signWidth = this.width * 0.8;
                    
                    ctx.fillStyle = this.neonColor;
                    ctx.globalAlpha = alpha * 0.9;
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = this.neonColor;
                    ctx.fillRect(this.x + this.width * 0.1, signY, signWidth, 20);
                    ctx.shadowBlur = 0;
                    ctx.globalAlpha = 1;
                }
            }
        }
        
        // 雨滴类
        class Raindrop {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = -10;
                this.speed = 10 + Math.random() * 10;
                this.length = 10 + Math.random() * 20;
                this.alpha = 0.3 + Math.random() * 0.3;
            }
            
            update() {
                this.y += this.speed;
                this.x += (mouseX - width / 2) * 0.001; // 风向
                
                if (this.y > height * 0.7) {
                    // 创建水花
                    if (Math.random() < 0.3) {
                        reflections.push({
                            x: this.x,
                            y: height * 0.7 + (height * 0.3 * Math.random()),
                            radius: 0,
                            maxRadius: 5 + Math.random() * 10,
                            alpha: 0.5
                        });
                    }
                    this.reset();
                }
            }
            
            draw() {
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x, this.y + this.length);
                ctx.strokeStyle = `rgba(150, 200, 255, ${this.alpha})`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            initBuildings();
        }
        
        function initBuildings() {
            buildings = [];
            let x = 0;
            const count = Math.ceil(width / 60) + 2;
            
            for (let i = 0; i < count; i++) {
                buildings.push(new Building(x, i));
                x += 50 + Math.random() * 30;
            }
            
            buildingCountEl.textContent = buildings.length;
        }
        
        function initRain() {
            raindrops = [];
            const count = rainCounts[rainLevel];
            
            for (let i = 0; i < count; i++) {
                const drop = new Raindrop();
                drop.y = Math.random() * height;
                raindrops.push(drop);
            }
        }
        
        function drawSky() {
            const gradient = ctx.createLinearGradient(0, 0, 0, height * 0.7);
            gradient.addColorStop(0, '#0a0015');
            gradient.addColorStop(0.5, '#150025');
            gradient.addColorStop(1, '#1a0a2a');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }
        
        function drawGround() {
            const groundY = height * 0.7;
            
            // 地面
            ctx.fillStyle = '#0a0a15';
            ctx.fillRect(0, groundY, width, height * 0.3);
            
            // 湿地反射
            ctx.fillStyle = 'rgba(50, 50, 80, 0.3)';
            ctx.fillRect(0, groundY, width, height * 0.3);
            
            // 霓虹反射
            buildings.forEach(building => {
                const reflectionGradient = ctx.createLinearGradient(
                    building.x, groundY,
                    building.x + building.width, height
                );
                reflectionGradient.addColorStop(0, building.neonColor + '40');
                reflectionGradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = reflectionGradient;
                ctx.fillRect(building.x, groundY, building.width, height * 0.3);
            });
        }
        
        function drawReflections() {
            reflections.forEach((ref, i) => {
                ref.radius += 0.5;
                ref.alpha -= 0.02;
                
                if (ref.alpha > 0) {
                    ctx.beginPath();
                    ctx.ellipse(ref.x, ref.y, ref.radius, ref.radius * 0.3, 0, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(150, 200, 255, ${ref.alpha})`;
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            });
            
            // 清理消失的波纹
            reflections = reflections.filter(r => r.alpha > 0);
        }
        
        function drawFog() {
            // 底部雾气
            const fogGradient = ctx.createLinearGradient(0, height * 0.6, 0, height);
            fogGradient.addColorStop(0, 'transparent');
            fogGradient.addColorStop(0.5, 'rgba(100, 50, 150, 0.1)');
            fogGradient.addColorStop(1, 'rgba(50, 30, 80, 0.2)');
            
            ctx.fillStyle = fogGradient;
            ctx.fillRect(0, 0, width, height);
        }
        
        function cycleRain() {
            rainLevel = (rainLevel + 1) % rainLevels.length;
            rainLevelEl.textContent = rainLevels[rainLevel];
            initRain();
        }
        
        function animate() {
            drawSky();
            
            // 绘制建筑
            buildings.forEach(building => building.draw());
            
            // 绘制地面
            drawGround();
            
            // 更新和绘制雨滴
            raindrops.forEach(drop => {
                drop.update();
                drop.draw();
            });
            
            // 绘制反射
            drawReflections();
            
            // 雾气效果
            drawFog();
            
            time++;
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        function handleMouseMove(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
        }
        
        function handleTouchMove(e) {
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        }
        
        function handleClick() {
            cycleRain();
        }
        
        function handleWheel(e) {
            e.preventDefault();
            rainLevel = Math.max(0, Math.min(3, rainLevel - Math.sign(e.deltaY)));
            rainLevelEl.textContent = rainLevels[rainLevel];
            initRain();
        }
        
        // 初始化
        function init() {
            resize();
            initRain();
            
            window.addEventListener('resize', resize);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('touchmove', handleTouchMove, { passive: true });
            canvas.addEventListener('click', handleClick);
            canvas.addEventListener('wheel', handleWheel, { passive: false });
            
            rainLevelEl.textContent = rainLevels[rainLevel];
            
            // 检测 prefers-reduced-motion
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
            if (!prefersReducedMotion.matches) {
                animate();
            } else {
                // 静态渲染
                drawSky();
                buildings.forEach(b => b.draw());
                drawGround();
            }
        }
        
        init();
    </script>
</body>
</html>
