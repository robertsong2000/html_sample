<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>几何万花筒2 - Kaleidoscope 2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            z-index: 100;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
        
        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 12px;
            z-index: 100;
            text-align: right;
        }
        
        .controls div {
            margin: 5px 0;
            padding: 5px 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .title {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            letter-spacing: 3px;
            z-index: 100;
        }
        
        .fps {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="kaleidoscope"></canvas>
    
    <div class="title">KALEIDOSCOPE</div>
    
    <div class="controls">
        <div id="segments">对称: 8</div>
        <div id="mode">模式: 几何</div>
    </div>
    
    <div class="info">
        <span>🔮 移动鼠标旋转 | 点击切换模式 | 滚轮调整对称数 | 双击重置 | 右键切换配色</span>
    </div>
    
    <div class="fps">FPS: <span id="fps">60</span></div>

    <script>
        // 配置
        const CONFIG = {
            MIN_SEGMENTS: 4,
            MAX_SEGMENTS: 16,
            SHAPE_COUNT: 12
        };

        // 模式
        const modes = [
            { name: '几何', shapes: ['circle', 'triangle', 'square', 'hexagon'] },
            { name: '星形', shapes: ['star5', 'star6', 'star8'] },
            { name: '混合', shapes: ['circle', 'star5', 'triangle', 'star6', 'square', 'star8', 'hexagon'] }
        ];

        // 配色
        const colorSchemes = [
            { name: '霓虹', colors: ['#ff00ff', '#00ffff', '#ff0080', '#80ff00', '#ff8000'] },
            { name: '日落', colors: ['#ff4500', '#ff6347', '#ff7f50', '#ffa07a', '#ffd700'] },
            { name: '海洋', colors: ['#006994', '#0077be', '#00a8e8', '#00d4ff', '#40e0d0'] },
            { name: '森林', colors: ['#228b22', '#32cd32', '#00ff7f', '#7fff00', '#adff2f'] },
            { name: '极光', colors: ['#00ff88', '#00ffcc', '#00ccff', '#0088ff', '#8855ff'] }
        ];

        // Canvas
        const canvas = document.getElementById('kaleidoscope');
        const ctx = canvas.getContext('2d');
        
        let width, height, centerX, centerY;
        let segments = 8;
        let currentMode = 0;
        let currentScheme = 0;
        let shapes = [];
        let rotation = 0;
        let mouseX = 0, mouseY = 0;
        let time = 0;

        // 形状类
        class Shape {
            constructor() {
                this.reset();
            }

            reset() {
                const mode = modes[currentMode];
                this.type = mode.shapes[Math.floor(Math.random() * mode.shapes.length)];
                this.radius = 30 + Math.random() * 80;
                this.distance = 50 + Math.random() * 200;
                this.angle = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
                this.orbitSpeed = (Math.random() - 0.5) * 0.01;
                this.colorIndex = Math.floor(Math.random() * colorSchemes[currentScheme].colors.length);
                this.alpha = 0.4 + Math.random() * 0.4;
                this.pulseSpeed = Math.random() * 0.05 + 0.02;
                this.pulsePhase = Math.random() * Math.PI * 2;
            }

            update(mouseInfluence) {
                this.angle += this.orbitSpeed + mouseInfluence * 0.002;
            }

            draw(ctx, segmentAngle, colors, time) {
                const pulse = Math.sin(time * this.pulseSpeed + this.pulsePhase) * 0.3 + 0.7;
                const currentRadius = this.radius * pulse;
                const color = colors[this.colorIndex % colors.length];
                
                for (let i = 0; i < segments; i++) {
                    ctx.save();
                    ctx.translate(centerX, centerY);
                    ctx.rotate(segmentAngle * i + rotation);
                    
                    const x = Math.cos(this.angle) * this.distance;
                    const y = Math.sin(this.angle) * this.distance;
                    
                    ctx.translate(x, y);
                    ctx.rotate(this.angle + time * this.rotationSpeed);
                    
                    ctx.fillStyle = color;
                    ctx.globalAlpha = this.alpha * pulse;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = color;
                    
                    this.drawShape(ctx, currentRadius);
                    
                    ctx.fill();
                    ctx.restore();
                    
                    // 镜像
                    ctx.save();
                    ctx.translate(centerX, centerY);
                    ctx.rotate(segmentAngle * i + rotation);
                    ctx.scale(1, -1);
                    
                    ctx.translate(x, y);
                    ctx.rotate(this.angle + time * this.rotationSpeed);
                    
                    ctx.fillStyle = color;
                    ctx.globalAlpha = this.alpha * pulse * 0.6;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = color;
                    
                    this.drawShape(ctx, currentRadius * 0.8);
                    
                    ctx.fill();
                    ctx.restore();
                }
            }

            drawShape(ctx, radius) {
                ctx.beginPath();
                
                switch (this.type) {
                    case 'circle':
                        ctx.arc(0, 0, radius, 0, Math.PI * 2);
                        break;
                    case 'triangle':
                        this.polygon(ctx, 3, radius);
                        break;
                    case 'square':
                        this.polygon(ctx, 4, radius);
                        break;
                    case 'hexagon':
                        this.polygon(ctx, 6, radius);
                        break;
                    case 'star5':
                        this.star(ctx, 5, radius, radius * 0.4);
                        break;
                    case 'star6':
                        this.star(ctx, 6, radius, radius * 0.5);
                        break;
                    case 'star8':
                        this.star(ctx, 8, radius, radius * 0.5);
                        break;
                }
            }

            polygon(ctx, sides, radius) {
                ctx.moveTo(radius, 0);
                for (let i = 1; i <= sides; i++) {
                    const angle = (i * 2 * Math.PI) / sides;
                    ctx.lineTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
                }
                ctx.closePath();
            }

            star(ctx, points, outer, inner) {
                for (let i = 0; i < points * 2; i++) {
                    const r = i % 2 === 0 ? outer : inner;
                    const angle = (i * Math.PI) / points - Math.PI / 2;
                    if (i === 0) {
                        ctx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
                    } else {
                        ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
                    }
                }
                ctx.closePath();
            }
        }

        // 初始化
        function init() {
            resize();
            shapes = [];
            for (let i = 0; i < CONFIG.SHAPE_COUNT; i++) {
                shapes.push(new Shape());
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        // 绘制中心
        function drawCenter(colors) {
            const pulse = Math.sin(time * 0.03) * 0.2 + 0.8;
            
            for (let i = 0; i < segments; i++) {
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate((Math.PI * 2 / segments) * i + rotation);
                
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(150 * pulse, 0);
                ctx.strokeStyle = colors[i % colors.length];
                ctx.globalAlpha = 0.4;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 10;
                ctx.shadowColor = colors[i % colors.length];
                ctx.stroke();
                
                ctx.restore();
            }
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, 15 * pulse, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.globalAlpha = 0.9;
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#fff';
            ctx.fill();
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }

        // FPS计算
        let lastTime = performance.now();
        let frameCount = 0;

        // 动画循环
        function animate(currentTime) {
            time++;
            
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                lastTime = currentTime;
            }

            const dx = mouseX - centerX;
            const dy = mouseY - centerY;
            const mouseInfluence = Math.sqrt(dx * dx + dy * dy) / Math.max(width, height);
            
            rotation += 0.003 + mouseInfluence * 0.01;

            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            const segmentAngle = (Math.PI * 2) / segments;
            const colors = colorSchemes[currentScheme].colors;
            
            shapes.forEach(shape => {
                shape.update(mouseInfluence);
                shape.draw(ctx, segmentAngle, colors, time);
            });
            
            drawCenter(colors);

            requestAnimationFrame(animate);
        }

        // 事件监听
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('click', () => {
            currentMode = (currentMode + 1) % modes.length;
            document.getElementById('mode').textContent = `模式: ${modes[currentMode].name}`;
            shapes.forEach(s => s.reset());
        });

        canvas.addEventListener('dblclick', init);

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            segments = Math.max(CONFIG.MIN_SEGMENTS, Math.min(CONFIG.MAX_SEGMENTS, segments - Math.sign(e.deltaY)));
            document.getElementById('segments').textContent = `对称: ${segments}`;
        });

        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            currentScheme = (currentScheme + 1) % colorSchemes.length;
            shapes.forEach(s => {
                s.colorIndex = Math.floor(Math.random() * colorSchemes[currentScheme].colors.length);
            });
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                currentMode = (currentMode + 1) % modes.length;
                document.getElementById('mode').textContent = `模式: ${modes[currentMode].name}`;
                shapes.forEach(s => s.reset());
            }
        });

        // 启动
        init();
        animate(0);
    </script>
</body>
</html>
