<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>几何万花筒 | Geometric Kaleidoscope</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            cursor: pointer;
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 10px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 30px rgba(255, 100, 200, 0.6);
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
            text-align: center;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 200, 255, 0.6);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
            text-align: right;
            line-height: 1.8;
        }
        
        @media (max-width: 768px) {
            .title {
                font-size: 22px;
                letter-spacing: 5px;
            }
            .info {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="title">几何万花筒</div>
    <canvas id="kaleidoscope"></canvas>
    <div class="stats">
        <div>对称轴: <span id="symmetry">8</span></div>
        <div>图形数: <span id="shapes">0</span></div>
    </div>
    <div class="info">移动鼠标变换图案 · 点击切换对称轴数 · 滚轮调整速度</div>
    
    <script>
        const canvas = document.getElementById('kaleidoscope');
        const ctx = canvas.getContext('2d');
        const symmetryEl = document.getElementById('symmetry');
        const shapesEl = document.getElementById('shapes');
        
        let width, height, centerX, centerY;
        let mouseX = 0, mouseY = 0;
        let time = 0;
        let symmetry = 8;
        let speed = 1;
        let shapes = [];
        
        // 颜色调色板
        const palettes = [
            ['#ff006e', '#fb5607', '#ffbe0b', '#8338ec', '#3a86ff'],
            ['#f72585', '#7209b7', '#3a0ca3', '#4361ee', '#4cc9f0'],
            ['#023e8a', '#0077b6', '#0096c7', '#00b4d8', '#48cae4'],
            ['#ff595e', '#ffca3a', '#8ac926', '#1982c4', '#6a4c93'],
            ['#7400b8', '#6930c3', '#5e60ce', '#5390d9', '#4ea8de']
        ];
        
        let currentPalette = palettes[0];
        let paletteIndex = 0;
        
        // 几何形状类
        class Shape {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.radius = 50 + Math.random() * 200;
                this.angle = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
                this.sides = Math.floor(Math.random() * 4) + 3; // 3-6边形
                this.color = currentPalette[Math.floor(Math.random() * currentPalette.length)];
                this.alpha = 0.3 + Math.random() * 0.4;
                this.pulseSpeed = Math.random() * 0.02 + 0.01;
                this.pulseOffset = Math.random() * Math.PI * 2;
                this.lineWidth = 2 + Math.random() * 3;
                this.filled = Math.random() > 0.5;
            }
            
            update() {
                this.angle += this.rotationSpeed * speed;
                
                // 鼠标影响
                const dx = mouseX - centerX;
                const dy = mouseY - centerY;
                const mouseAngle = Math.atan2(dy, dx);
                const mouseDist = Math.hypot(dx, dy);
                
                this.rotationSpeed += Math.sin(mouseAngle - this.angle) * 0.0001 * (mouseDist / 100);
            }
            
            draw() {
                const pulse = Math.sin(time * this.pulseSpeed + this.pulseOffset) * 0.2 + 1;
                const currentRadius = this.radius * pulse;
                
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(this.angle);
                ctx.globalAlpha = this.alpha;
                
                // 绘制多边形
                ctx.beginPath();
                for (let i = 0; i <= this.sides; i++) {
                    const a = (i / this.sides) * Math.PI * 2;
                    const x = Math.cos(a) * currentRadius;
                    const y = Math.sin(a) * currentRadius;
                    
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.closePath();
                
                if (this.filled) {
                    ctx.fillStyle = this.color + '40';
                    ctx.fill();
                }
                
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.lineWidth;
                ctx.stroke();
                
                ctx.restore();
            }
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }
        
        function initShapes() {
            shapes = [];
            const count = 15;
            
            for (let i = 0; i < count; i++) {
                shapes.push(new Shape());
            }
            
            shapesEl.textContent = count;
        }
        
        function drawKaleidoscope() {
            const segmentAngle = (Math.PI * 2) / symmetry;
            
            for (let s = 0; s < symmetry; s++) {
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(s * segmentAngle);
                
                // 绘制每个形状
                shapes.forEach(shape => {
                    ctx.save();
                    
                    const pulse = Math.sin(time * shape.pulseSpeed + shape.pulseOffset) * 0.2 + 1;
                    const currentRadius = shape.radius * pulse;
                    
                    // 绘制多边形
                    ctx.beginPath();
                    for (let i = 0; i <= shape.sides; i++) {
                        const a = (i / shape.sides) * Math.PI * 2 + shape.angle;
                        const x = Math.cos(a) * currentRadius;
                        const y = Math.sin(a) * currentRadius;
                        
                        if (i === 0) {
                            ctx.moveTo(x, y);
                        } else {
                            ctx.lineTo(x, y);
                        }
                    }
                    ctx.closePath();
                    
                    if (shape.filled) {
                        ctx.fillStyle = shape.color + '30';
                        ctx.fill();
                    }
                    
                    ctx.strokeStyle = shape.color;
                    ctx.lineWidth = shape.lineWidth;
                    ctx.globalAlpha = shape.alpha;
                    ctx.stroke();
                    
                    ctx.restore();
                });
                
                ctx.restore();
            }
        }
        
        function drawCenterMandala() {
            const layers = 5;
            
            for (let layer = 0; layer < layers; layer++) {
                const radius = 30 + layer * 40;
                const points = symmetry * 2;
                const color = currentPalette[layer % currentPalette.length];
                
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(time * 0.01 * (layer % 2 === 0 ? 1 : -1));
                
                ctx.beginPath();
                for (let i = 0; i <= points; i++) {
                    const a = (i / points) * Math.PI * 2;
                    const r = radius + Math.sin(a * symmetry + time * 0.05) * 15;
                    const x = Math.cos(a) * r;
                    const y = Math.sin(a) * r;
                    
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.closePath();
                
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.globalAlpha = 0.6;
                ctx.stroke();
                
                ctx.restore();
            }
        }
        
        function drawDecorations() {
            // 装饰圆点
            const dotCount = symmetry * 3;
            
            for (let i = 0; i < dotCount; i++) {
                const angle = (i / dotCount) * Math.PI * 2 + time * 0.02;
                const radius = 280 + Math.sin(time * 0.03 + i) * 30;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;
                const size = 3 + Math.sin(time * 0.05 + i) * 2;
                
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = currentPalette[i % currentPalette.length];
                ctx.globalAlpha = 0.7;
                ctx.fill();
            }
        }
        
        function drawBackground() {
            // 径向渐变背景
            const gradient = ctx.createRadialGradient(
                centerX, centerY, 0,
                centerX, centerY, Math.max(width, height) * 0.7
            );
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(0.5, '#0f0f1a');
            gradient.addColorStop(1, '#000');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }
        
        function cycleSymmetry() {
            symmetry = symmetry === 12 ? 4 : symmetry + 2;
            symmetryEl.textContent = symmetry;
        }
        
        function cyclePalette() {
            paletteIndex = (paletteIndex + 1) % palettes.length;
            currentPalette = palettes[paletteIndex];
            
            // 更新形状颜色
            shapes.forEach(shape => {
                shape.color = currentPalette[Math.floor(Math.random() * currentPalette.length)];
            });
        }
        
        function animate() {
            drawBackground();
            
            // 更新形状
            shapes.forEach(shape => shape.update());
            
            // 绘制万花筒
            drawKaleidoscope();
            drawCenterMandala();
            drawDecorations();
            
            // 重置透明度
            ctx.globalAlpha = 1;
            
            time += speed;
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        function handleMouseMove(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
        }
        
        function handleTouchMove(e) {
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        }
        
        function handleClick(e) {
            cycleSymmetry();
            
            // 双击切换调色板
            if (e.detail === 2) {
                cyclePalette();
            }
        }
        
        function handleWheel(e) {
            e.preventDefault();
            speed = Math.max(0.2, Math.min(3, speed - e.deltaY * 0.001));
        }
        
        // 初始化
        function init() {
            resize();
            initShapes();
            
            window.addEventListener('resize', resize);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('touchmove', handleTouchMove, { passive: true });
            canvas.addEventListener('click', handleClick);
            canvas.addEventListener('wheel', handleWheel, { passive: false });
            
            // 检测 prefers-reduced-motion
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
            if (!prefersReducedMotion.matches) {
                animate();
            } else {
                // 静态渲染
                drawBackground();
                drawKaleidoscope();
                drawCenterMandala();
            }
        }
        
        init();
    </script>
</body>
</html>
