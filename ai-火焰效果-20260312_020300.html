<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火焰效果 - Fire Effect</title>
    <style>
        /* ========== 全局样式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #0a0505;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        /* ========== Canvas 容器 ========== */
        #fireCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* ========== 信息面板 ========== */
        .info-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(20, 10, 5, 0.7);
            backdrop-filter: blur(10px);
            padding: 18px 22px;
            border-radius: 12px;
            color: #ffcc88;
            z-index: 100;
            border: 1px solid rgba(255, 100, 50, 0.3);
            max-width: 260px;
        }

        .info-panel h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(180deg, #ffff00, #ff8800, #ff4400);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .info-panel p {
            font-size: 13px;
            line-height: 1.5;
            opacity: 0.85;
        }

        .info-panel .hint {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 100, 50, 0.2);
            font-size: 11px;
            opacity: 0.6;
        }

        /* ========== 统计面板 ========== */
        .stats-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(20, 10, 5, 0.7);
            backdrop-filter: blur(10px);
            padding: 12px 18px;
            border-radius: 12px;
            color: #ffaa66;
            z-index: 100;
            border: 1px solid rgba(255, 100, 50, 0.3);
            font-size: 12px;
        }

        .stats-panel .stat {
            margin-bottom: 6px;
        }

        .stats-panel .stat:last-child {
            margin-bottom: 0;
        }

        .stats-panel .value {
            color: #ff6633;
            font-weight: bold;
        }

        /* ========== 控制面板 ========== */
        .controls {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 10, 5, 0.8);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 25px;
            z-index: 100;
            border: 1px solid rgba(255, 100, 50, 0.3);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .controls button {
            background: transparent;
            border: 1px solid rgba(255, 150, 100, 0.5);
            color: #ffaa88;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
        }

        .controls button:hover {
            background: rgba(255, 100, 50, 0.2);
            box-shadow: 0 0 15px rgba(255, 100, 50, 0.4);
        }

        .controls button.active {
            background: linear-gradient(135deg, rgba(255, 100, 50, 0.5), rgba(255, 200, 50, 0.5));
            border-color: #ff8844;
            color: #fff;
        }

        .controls .slider-group {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ffaa88;
            font-size: 12px;
        }

        .controls input[type="range"] {
            width: 60px;
            accent-color: #ff6633;
        }

        /* ========== 移动端适配 ========== */
        @media (max-width: 600px) {
            .info-panel {
                top: 10px;
                left: 10px;
                right: 10px;
                max-width: none;
                padding: 12px 15px;
            }
            .info-panel h1 {
                font-size: 18px;
            }
            .stats-panel {
                top: auto;
                bottom: 90px;
                right: 10px;
            }
            .controls {
                bottom: 15px;
                padding: 10px 15px;
                flex-wrap: wrap;
                justify-content: center;
                gap: 6px;
            }
            .controls button {
                padding: 6px 10px;
                font-size: 11px;
            }
            .controls input[type="range"] {
                width: 50px;
            }
        }
    </style>
</head>
<body>
    <!-- 信息面板 -->
    <div class="info-panel">
        <h1>🔥 火焰效果</h1>
        <p>跳动的火焰，温暖而炽热。粒子系统模拟真实的火焰物理效果。</p>
        <div class="hint">
            💡 移动鼠标控制风向<br>
            💡 点击添加火焰源
        </div>
    </div>

    <!-- 统计面板 -->
    <div class="stats-panel">
        <div class="stat">🔥 粒子数: <span class="value" id="particleCount">0</span></div>
        <div class="stat">🌡️ 温度: <span class="value" id="temperature">正常</span></div>
        <div class="stat">💨 风向: <span class="value" id="windDirection">无风</span></div>
    </div>

    <!-- 控制面板 -->
    <div class="controls">
        <button id="modeCampfire" class="active">篝火</button>
        <button id="modeTorch">火把</button>
        <button id="modeInferno">烈焰</button>
        <div class="slider-group">
            <span>强度</span>
            <input type="range" id="intensitySlider" min="0.5" max="2" step="0.1" value="1">
        </div>
    </div>

    <!-- 主画布 -->
    <canvas id="fireCanvas"></canvas>

    <script>
        // ========== 画布初始化 ==========
        const canvas = document.getElementById('fireCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ========== 配置参数 ==========
        const CONFIG = {
            maxParticles: 800,
            intensity: 1,
            mode: 'campfire', // campfire, torch, inferno
            gravity: -0.15,
            modes: {
                campfire: { 
                    sources: () => [{ x: canvas.width / 2, y: canvas.height - 50 }],
                    particleRate: 8,
                    baseSpeed: 3,
                    sizeRange: [15, 35]
                },
                torch: {
                    sources: () => [
                        { x: canvas.width * 0.3, y: canvas.height - 50 },
                        { x: canvas.width * 0.7, y: canvas.height - 50 }
                    ],
                    particleRate: 5,
                    baseSpeed: 4,
                    sizeRange: [12, 28]
                },
                inferno: {
                    sources: () => Array.from({ length: 5 }, (_, i) => ({
                        x: canvas.width * (0.2 + i * 0.15),
                        y: canvas.height - 50
                    })),
                    particleRate: 12,
                    baseSpeed: 5,
                    sizeRange: [20, 50]
                }
            }
        };

        // ========== 状态变量 ==========
        let particles = [];
        let sparks = [];
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;
        let windX = 0;
        let targetWindX = 0;
        let time = 0;

        // ========== 火焰粒子类 ==========
        class FireParticle {
            constructor(x, y) {
                const mode = CONFIG.modes[CONFIG.mode];
                this.x = x + (Math.random() - 0.5) * 30;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = -(mode.baseSpeed + Math.random() * 2) * CONFIG.intensity;
                this.size = mode.sizeRange[0] + Math.random() * (mode.sizeRange[1] - mode.sizeRange[0]);
                this.originalSize = this.size;
                this.life = 1;
                this.decay = (0.008 + Math.random() * 0.008) / CONFIG.intensity;
                this.wobbleOffset = Math.random() * Math.PI * 2;
                this.wobbleSpeed = 0.1 + Math.random() * 0.1;
            }

            update() {
                // 风的影响
                this.vx += windX * 0.1;
                
                // 物理更新
                this.vy += CONFIG.gravity;
                this.vx *= 0.99;
                this.x += this.vx;
                this.y += this.vy;
                
                // 摇摆效果
                this.wobbleOffset += this.wobbleSpeed;
                this.x += Math.sin(this.wobbleOffset) * 0.5;
                
                // 生命衰减
                this.life -= this.decay;
                this.size = this.originalSize * this.life;
                
                // 上升时变小
                this.size *= 0.995;
            }

            draw() {
                if (this.life <= 0) return;
                
                // 颜色渐变：白->黄->橙->红->暗红
                let color;
                if (this.life > 0.8) {
                    color = this.interpolateColor('#ffffff', '#ffff88', (1 - this.life) / 0.2);
                } else if (this.life > 0.5) {
                    color = this.interpolateColor('#ffff88', '#ff8800', (0.8 - this.life) / 0.3);
                } else if (this.life > 0.2) {
                    color = this.interpolateColor('#ff8800', '#ff2200', (0.5 - this.life) / 0.3);
                } else {
                    color = this.interpolateColor('#ff2200', '#330000', (0.2 - this.life) / 0.2);
                }
                
                // 绘制发光粒子
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size
                );
                gradient.addColorStop(0, color);
                gradient.addColorStop(0.4, color);
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.fillStyle = gradient;
                ctx.globalAlpha = this.life * 0.8;
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }

            interpolateColor(color1, color2, factor) {
                const c1 = this.hexToRgb(color1);
                const c2 = this.hexToRgb(color2);
                const r = Math.round(c1.r + (c2.r - c1.r) * factor);
                const g = Math.round(c1.g + (c2.g - c1.g) * factor);
                const b = Math.round(c1.b + (c2.b - c1.b) * factor);
                return `rgb(${r}, ${g}, ${b})`;
            }

            hexToRgb(hex) {
                const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
                return result ? {
                    r: parseInt(result[1], 16),
                    g: parseInt(result[2], 16),
                    b: parseInt(result[3], 16)
                } : { r: 0, g: 0, b: 0 };
            }
        }

        // ========== 火星类 ==========
        class Spark {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                const angle = -Math.PI / 2 + (Math.random() - 0.5) * 1.5;
                const speed = 3 + Math.random() * 5;
                this.vx = Math.cos(angle) * speed + windX * 2;
                this.vy = Math.sin(angle) * speed;
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.02;
                this.size = 1 + Math.random() * 2;
            }

            update() {
                this.vy += 0.05; // 轻微重力
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }

            draw() {
                if (this.life <= 0) return;
                
                ctx.beginPath();
                ctx.fillStyle = `rgba(255, 200, 100, ${this.life})`;
                ctx.shadowColor = '#ff8800';
                ctx.shadowBlur = 5;
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // ========== 绘制木头/燃料 ==========
        function drawFuel() {
            const sources = CONFIG.modes[CONFIG.mode].sources();
            
            ctx.fillStyle = '#2a1a0a';
            
            sources.forEach(source => {
                // 绘制木头
                ctx.beginPath();
                ctx.ellipse(source.x, source.y + 10, 40, 15, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // 木头纹理
                ctx.strokeStyle = '#1a0a00';
                ctx.lineWidth = 1;
                for (let i = -30; i <= 30; i += 10) {
                    ctx.beginPath();
                    ctx.moveTo(source.x + i, source.y + 5);
                    ctx.lineTo(source.x + i, source.y + 15);
                    ctx.stroke();
                }
            });
        }

        // ========== 绘制地面光晕 ==========
        function drawGroundGlow() {
            const sources = CONFIG.modes[CONFIG.mode].sources();
            
            sources.forEach(source => {
                const gradient = ctx.createRadialGradient(
                    source.x, source.y, 0,
                    source.x, source.y, 200
                );
                gradient.addColorStop(0, 'rgba(255, 100, 50, 0.3)');
                gradient.addColorStop(0.5, 'rgba(255, 50, 20, 0.1)');
                gradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = gradient;
                ctx.fillRect(source.x - 200, source.y - 100, 400, 300);
            });
        }

        // ========== 绘制背景 ==========
        function drawBackground() {
            // 渐变夜空
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0a0508');
            gradient.addColorStop(0.7, '#0a0805');
            gradient.addColorStop(1, '#150a05');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 星星
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            for (let i = 0; i < 50; i++) {
                const x = (Math.sin(i * 123.456) * 0.5 + 0.5) * canvas.width;
                const y = (Math.cos(i * 789.012) * 0.5 + 0.5) * canvas.height * 0.6;
                const size = Math.random() * 1.5;
                const twinkle = Math.sin(time * 0.02 + i) * 0.3 + 0.7;
                ctx.globalAlpha = twinkle * 0.5;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        // ========== 生成粒子 ==========
        function emitParticles() {
            const mode = CONFIG.modes[CONFIG.mode];
            const sources = mode.sources();
            const rate = Math.floor(mode.particleRate * CONFIG.intensity);
            
            sources.forEach(source => {
                for (let i = 0; i < rate; i++) {
                    if (particles.length < CONFIG.maxParticles) {
                        particles.push(new FireParticle(source.x, source.y));
                    }
                }
                
                // 偶尔产生火星
                if (Math.random() < 0.1 * CONFIG.intensity) {
                    sparks.push(new Spark(source.x, source.y - 20));
                }
            });
        }

        // ========== 鼠标交互 ==========
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            // 鼠标位置影响风向
            targetWindX = (mouseX - canvas.width / 2) / canvas.width * 3;
        });

        document.addEventListener('click', (e) => {
            // 在点击位置添加临时火焰源
            for (let i = 0; i < 30; i++) {
                const particle = new FireParticle(e.clientX, e.clientY);
                particle.vy = -(5 + Math.random() * 5);
                particles.push(particle);
            }
            
            // 添加火星
            for (let i = 0; i < 10; i++) {
                sparks.push(new Spark(e.clientX, e.clientY));
            }
        });

        // 触摸支持
        document.addEventListener('touchmove', (e) => {
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
            targetWindX = (mouseX - canvas.width / 2) / canvas.width * 3;
        });

        document.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            for (let i = 0; i < 30; i++) {
                const particle = new FireParticle(touch.clientX, touch.clientY);
                particle.vy = -(5 + Math.random() * 5);
                particles.push(particle);
            }
        });

        // ========== 控制按钮 ==========
        document.getElementById('modeCampfire').addEventListener('click', function() {
            CONFIG.mode = 'campfire';
            updateModeButtons();
        });

        document.getElementById('modeTorch').addEventListener('click', function() {
            CONFIG.mode = 'torch';
            updateModeButtons();
        });

        document.getElementById('modeInferno').addEventListener('click', function() {
            CONFIG.mode = 'inferno';
            updateModeButtons();
        });

        document.getElementById('intensitySlider').addEventListener('input', function() {
            CONFIG.intensity = parseFloat(this.value);
        });

        function updateModeButtons() {
            document.querySelectorAll('.controls button').forEach(btn => {
                btn.classList.remove('active');
            });
            const btnMap = { 'campfire': 'modeCampfire', 'torch': 'modeTorch', 'inferno': 'modeInferno' };
            document.getElementById(btnMap[CONFIG.mode]).classList.add('active');
        }

        // ========== 更新统计 ==========
        function updateStats() {
            document.getElementById('particleCount').textContent = particles.length;
            
            // 温度根据模式变化
            const temps = { 'campfire': '温暖', 'torch': '炽热', 'inferno': '熔化' };
            document.getElementById('temperature').textContent = temps[CONFIG.mode];
            
            // 风向
            if (Math.abs(windX) < 0.3) {
                document.getElementById('windDirection').textContent = '无风';
            } else if (windX > 0) {
                document.getElementById('windDirection').textContent = '东风';
            } else {
                document.getElementById('windDirection').textContent = '西风';
            }
        }

        // ========== 主动画循环 ==========
        function animate() {
            time++;
            
            // 平滑风向过渡
            windX += (targetWindX - windX) * 0.05;
            
            // 绘制背景
            drawBackground();
            
            // 绘制地面光晕
            drawGroundGlow();
            
            // 生成新粒子
            emitParticles();
            
            // 更新和绘制火焰粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
            
            // 更新和绘制火星
            for (let i = sparks.length - 1; i >= 0; i--) {
                sparks[i].update();
                sparks[i].draw();
                if (sparks[i].life <= 0) {
                    sparks.splice(i, 1);
                }
            }
            
            // 绘制燃料
            drawFuel();
            
            // 更新统计
            updateStats();
            
            requestAnimationFrame(animate);
        }

        // 启动动画
        animate();
    </script>
</body>
</html>
