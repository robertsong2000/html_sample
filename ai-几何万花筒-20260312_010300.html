<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>几何万花筒 - Geometric Kaleidoscope</title>
    <style>
        /* ========== 全局样式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #0a0a0f;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        /* ========== Canvas 容器 ========== */
        #kaleidoscopeCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* ========== 信息面板 ========== */
        .info-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 20, 0.6);
            backdrop-filter: blur(10px);
            padding: 18px 22px;
            border-radius: 12px;
            color: #e0e0ff;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 260px;
        }

        .info-panel h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #ff6b9d, #c44dff, #6bfff8, #ff6b9d);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientMove 3s ease infinite;
        }

        @keyframes gradientMove {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .info-panel p {
            font-size: 13px;
            line-height: 1.5;
            opacity: 0.85;
        }

        .info-panel .hint {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 11px;
            opacity: 0.6;
        }

        /* ========== 控制面板 ========== */
        .controls {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 20, 0.7);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 25px;
            z-index: 100;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .controls button {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #c0c0ff;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
        }

        .controls button:hover {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(200, 100, 255, 0.3);
        }

        .controls button.active {
            background: linear-gradient(135deg, rgba(255, 107, 157, 0.4), rgba(196, 77, 255, 0.4));
            border-color: #c44dff;
            color: #fff;
        }

        .controls .slider-group {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #c0c0ff;
            font-size: 12px;
        }

        .controls input[type="range"] {
            width: 60px;
            accent-color: #c44dff;
        }

        /* ========== 移动端适配 ========== */
        @media (max-width: 600px) {
            .info-panel {
                top: 10px;
                left: 10px;
                right: 10px;
                max-width: none;
                padding: 12px 15px;
            }
            .info-panel h1 {
                font-size: 18px;
            }
            .controls {
                bottom: 15px;
                padding: 10px 15px;
                flex-wrap: wrap;
                justify-content: center;
                gap: 6px;
            }
            .controls button {
                padding: 6px 10px;
                font-size: 11px;
            }
            .controls input[type="range"] {
                width: 50px;
            }
        }
    </style>
</head>
<body>
    <!-- 信息面板 -->
    <div class="info-panel">
        <h1>🔮 几何万花筒</h1>
        <p>对称之美，几何图形在旋转中创造出无限变幻的图案，如同童年的万花筒。</p>
        <div class="hint">
            💡 移动鼠标改变图案<br>
            💡 点击切换颜色主题
        </div>
    </div>

    <!-- 控制面板 -->
    <div class="controls">
        <button id="segments6" class="active">6段</button>
        <button id="segments8">8段</button>
        <button id="segments12">12段</button>
        <div class="slider-group">
            <span>速度</span>
            <input type="range" id="speedSlider" min="0.2" max="3" step="0.1" value="1">
        </div>
        <div class="slider-group">
            <span>复杂度</span>
            <input type="range" id="complexitySlider" min="3" max="15" step="1" value="8">
        </div>
    </div>

    <!-- 主画布 -->
    <canvas id="kaleidoscopeCanvas"></canvas>

    <script>
        // ========== 画布初始化 ==========
        const canvas = document.getElementById('kaleidoscopeCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ========== 配置参数 ==========
        const CONFIG = {
            segments: 6,
            speedMultiplier: 1,
            complexity: 8,
            colorThemes: [
                ['#ff6b9d', '#c44dff', '#6bfff8', '#ffd93d'],
                ['#00d4ff', '#0099ff', '#6600ff', '#ff00ff'],
                ['#ff4444', '#ff8844', '#ffcc44', '#88ff44'],
                ['#44ff88', '#44ffcc', '#44ccff', '#4488ff']
            ],
            currentTheme: 0
        };

        // ========== 状态变量 ==========
        let time = 0;
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;
        let shapes = [];

        // ========== 几何形状类 ==========
        class Shape {
            constructor() {
                this.reset();
            }

            reset() {
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                
                this.angle = Math.random() * Math.PI * 2;
                this.distance = Math.random() * Math.min(centerX, centerY) * 0.8;
                this.size = 10 + Math.random() * 40;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
                this.orbitSpeed = (Math.random() - 0.5) * 0.01;
                this.type = Math.floor(Math.random() * 4); // 0: circle, 1: triangle, 2: square, 3: star
                this.colorIndex = Math.floor(Math.random() * 4);
                this.alpha = 0.3 + Math.random() * 0.5;
                this.pulseOffset = Math.random() * Math.PI * 2;
                this.pulseSpeed = 0.02 + Math.random() * 0.03;
            }

            update() {
                this.angle += this.orbitSpeed * CONFIG.speedMultiplier;
                this.pulseOffset += this.pulseSpeed;
            }

            draw(segmentAngle, segmentIndex) {
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                
                // 计算位置
                const x = centerX + Math.cos(this.angle + segmentAngle) * this.distance;
                const y = centerY + Math.sin(this.angle + segmentAngle) * this.distance;
                
                // 脉冲效果
                const pulse = 1 + Math.sin(this.pulseOffset) * 0.2;
                const size = this.size * pulse;
                
                // 获取颜色
                const colors = CONFIG.colorThemes[CONFIG.currentTheme];
                const color = colors[this.colorIndex % colors.length];
                
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(this.angle + time * 0.001 * CONFIG.speedMultiplier);
                
                ctx.fillStyle = color;
                ctx.globalAlpha = this.alpha;
                ctx.shadowColor = color;
                ctx.shadowBlur = 15;
                
                switch (this.type) {
                    case 0: this.drawCircle(size); break;
                    case 1: this.drawTriangle(size); break;
                    case 2: this.drawSquare(size); break;
                    case 3: this.drawStar(size); break;
                }
                
                ctx.restore();
            }

            drawCircle(size) {
                ctx.beginPath();
                ctx.arc(0, 0, size / 2, 0, Math.PI * 2);
                ctx.fill();
            }

            drawTriangle(size) {
                ctx.beginPath();
                for (let i = 0; i < 3; i++) {
                    const angle = (i / 3) * Math.PI * 2 - Math.PI / 2;
                    const x = Math.cos(angle) * size / 2;
                    const y = Math.sin(angle) * size / 2;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();
            }

            drawSquare(size) {
                ctx.fillRect(-size / 2, -size / 2, size, size);
            }

            drawStar(size) {
                ctx.beginPath();
                for (let i = 0; i < 5; i++) {
                    const outerAngle = (i / 5) * Math.PI * 2 - Math.PI / 2;
                    const innerAngle = outerAngle + Math.PI / 5;
                    
                    const outerX = Math.cos(outerAngle) * size / 2;
                    const outerY = Math.sin(outerAngle) * size / 2;
                    const innerX = Math.cos(innerAngle) * size / 4;
                    const innerY = Math.sin(innerAngle) * size / 4;
                    
                    if (i === 0) ctx.moveTo(outerX, outerY);
                    else ctx.lineTo(outerX, outerY);
                    ctx.lineTo(innerX, innerY);
                }
                ctx.closePath();
                ctx.fill();
            }
        }

        // ========== 初始化形状 ==========
        function initShapes() {
            shapes = [];
            for (let i = 0; i < CONFIG.complexity; i++) {
                shapes.push(new Shape());
            }
        }
        initShapes();

        // ========== 绘制万花筒 ==========
        function drawKaleidoscope() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const segmentAngle = (Math.PI * 2) / CONFIG.segments;
            
            // 绘制每个段
            for (let s = 0; s < CONFIG.segments; s++) {
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(s * segmentAngle);
                
                // 镜像效果（每隔一个段镜像）
                if (s % 2 === 1) {
                    ctx.scale(1, -1);
                }
                
                // 绘制所有形状
                shapes.forEach(shape => {
                    shape.draw(0, s);
                });
                
                ctx.restore();
            }
        }

        // ========== 绘制中心装饰 ==========
        function drawCenterDecoration() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const colors = CONFIG.colorThemes[CONFIG.currentTheme];
            
            // 中心旋转图案
            ctx.save();
            ctx.translate(centerX, centerY);
            
            const rotation = time * 0.001 * CONFIG.speedMultiplier;
            ctx.rotate(rotation);
            
            // 多层同心图案
            for (let ring = 0; ring < 3; ring++) {
                const radius = 30 + ring * 25;
                const segments = CONFIG.segments;
                const color = colors[ring % colors.length];
                
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.globalAlpha = 0.5;
                ctx.shadowColor = color;
                ctx.shadowBlur = 10;
                
                ctx.beginPath();
                for (let i = 0; i <= segments; i++) {
                    const angle = (i / segments) * Math.PI * 2;
                    const r = radius + Math.sin(time * 0.02 + i) * 5;
                    const x = Math.cos(angle) * r;
                    const y = Math.sin(angle) * r;
                    
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();
            }
            
            // 中心点
            ctx.beginPath();
            ctx.fillStyle = colors[0];
            ctx.globalAlpha = 0.8;
            ctx.shadowBlur = 20;
            ctx.arc(0, 0, 8, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.restore();
        }

        // ========== 绘制背景图案 ==========
        function drawBackgroundPattern() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const maxRadius = Math.sqrt(centerX * centerX + centerY * centerY);
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            
            // 同心圆
            for (let r = 50; r < maxRadius; r += 50) {
                ctx.beginPath();
                ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            // 放射线
            const segments = CONFIG.segments * 2;
            for (let i = 0; i < segments; i++) {
                const angle = (i / segments) * Math.PI * 2;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(
                    centerX + Math.cos(angle) * maxRadius,
                    centerY + Math.sin(angle) * maxRadius
                );
                ctx.stroke();
            }
        }

        // ========== 鼠标交互 ==========
        let targetMouseX = canvas.width / 2;
        let targetMouseY = canvas.height / 2;

        document.addEventListener('mousemove', (e) => {
            targetMouseX = e.clientX;
            targetMouseY = e.clientY;
            
            // 鼠标位置影响形状属性
            const dx = (e.clientX - canvas.width / 2) / canvas.width;
            const dy = (e.clientY - canvas.height / 2) / canvas.height;
            
            shapes.forEach((shape, i) => {
                shape.rotationSpeed = dx * 0.03 * (1 + i * 0.1);
                shape.orbitSpeed = dy * 0.02 * (1 + i * 0.1);
            });
        });

        document.addEventListener('click', () => {
            // 切换颜色主题
            CONFIG.currentTheme = (CONFIG.currentTheme + 1) % CONFIG.colorThemes.length;
            
            // 添加爆发效果
            shapes.forEach(shape => {
                shape.distance += 20;
                if (shape.distance > Math.min(canvas.width, canvas.height) * 0.4) {
                    shape.reset();
                }
            });
        });

        // 触摸支持
        document.addEventListener('touchmove', (e) => {
            targetMouseX = e.touches[0].clientX;
            targetMouseY = e.touches[0].clientY;
        });

        document.addEventListener('touchstart', () => {
            CONFIG.currentTheme = (CONFIG.currentTheme + 1) % CONFIG.colorThemes.length;
        });

        // ========== 控制按钮 ==========
        document.getElementById('segments6').addEventListener('click', function() {
            CONFIG.segments = 6;
            updateSegmentButtons();
        });

        document.getElementById('segments8').addEventListener('click', function() {
            CONFIG.segments = 8;
            updateSegmentButtons();
        });

        document.getElementById('segments12').addEventListener('click', function() {
            CONFIG.segments = 12;
            updateSegmentButtons();
        });

        document.getElementById('speedSlider').addEventListener('input', function() {
            CONFIG.speedMultiplier = parseFloat(this.value);
        });

        document.getElementById('complexitySlider').addEventListener('input', function() {
            CONFIG.complexity = parseInt(this.value);
            initShapes();
        });

        function updateSegmentButtons() {
            document.querySelectorAll('.controls button').forEach(btn => {
                btn.classList.remove('active');
            });
            const btnMap = { 6: 'segments6', 8: 'segments8', 12: 'segments12' };
            document.getElementById(btnMap[CONFIG.segments]).classList.add('active');
        }

        // ========== 主动画循环 ==========
        function animate() {
            time++;
            
            // 平滑鼠标跟随
            mouseX += (targetMouseX - mouseX) * 0.1;
            mouseY += (targetMouseY - mouseY) * 0.1;
            
            // 清除画布（带淡出效果）
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制背景图案
            drawBackgroundPattern();
            
            // 更新形状
            shapes.forEach(shape => shape.update());
            
            // 绘制万花筒
            drawKaleidoscope();
            
            // 绘制中心装饰
            drawCenterDecoration();
            
            requestAnimationFrame(animate);
        }

        // 启动动画
        animate();
    </script>
</body>
</html>
