<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极光奇境 | Aurora Borealis</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(100, 255, 200, 0.5);
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.8);
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 8px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(100, 255, 200, 0.6);
        }
        
        @media (max-width: 768px) {
            .title {
                font-size: 20px;
                letter-spacing: 4px;
            }
            .info {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="title">极光奇境</div>
    <canvas id="aurora"></canvas>
    <div class="info">
        移动鼠标引导极光 · 点击释放星尘
    </div>
    
    <script>
        // 性能优化：使用 requestAnimationFrame 和对象池
        const canvas = document.getElementById('aurora');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        let targetMouseX = 0, targetMouseY = 0;
        let time = 0;
        
        // 星星数组
        const stars = [];
        const starCount = 200;
        
        // 粒子数组（点击效果）
        const particles = [];
        const maxParticles = 100;
        
        // 极光波浪参数
        const waves = [];
        const waveCount = 5;
        
        // 初始化画布尺寸
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            mouseX = width / 2;
            mouseY = height / 2;
            targetMouseX = mouseX;
            targetMouseY = mouseY;
        }
        
        // 初始化星星
        function initStars() {
            stars.length = 0;
            for (let i = 0; i < starCount; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 2 + 0.5,
                    twinkle: Math.random() * Math.PI * 2,
                    speed: Math.random() * 0.02 + 0.01
                });
            }
        }
        
        // 初始化极光波浪
        function initWaves() {
            waves.length = 0;
            const colors = [
                { r: 72, g: 255, b: 196 },   // 青绿色
                { r: 100, g: 200, b: 255 },  // 天蓝色
                { r: 180, g: 100, b: 255 },  // 紫色
                { r: 255, g: 150, b: 200 },  // 粉色
                { r: 100, g: 255, b: 150 }   // 绿色
            ];
            
            for (let i = 0; i < waveCount; i++) {
                waves.push({
                    offset: i * 0.5,
                    speed: 0.0005 + Math.random() * 0.001,
                    amplitude: 50 + Math.random() * 100,
                    frequency: 0.002 + Math.random() * 0.003,
                    color: colors[i % colors.length],
                    alpha: 0.1 + Math.random() * 0.15,
                    yBase: height * (0.2 + i * 0.1)
                });
            }
        }
        
        // 绘制星星
        function drawStars() {
            for (const star of stars) {
                star.twinkle += star.speed;
                const brightness = 0.5 + Math.sin(star.twinkle) * 0.5;
                
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${brightness * 0.8})`;
                ctx.fill();
            }
        }
        
        // 绘制极光波浪
        function drawAuroraWaves() {
            for (const wave of waves) {
                ctx.beginPath();
                
                const mouseInfluenceX = (mouseX - width / 2) * 0.001;
                const mouseInfluenceY = (mouseY - height / 2) * 0.3;
                
                for (let x = 0; x <= width; x += 3) {
                    const y = wave.yBase + 
                              Math.sin((x * wave.frequency) + time * wave.speed + wave.offset) * wave.amplitude +
                              Math.sin((x * wave.frequency * 0.5) + time * wave.speed * 1.5) * (wave.amplitude * 0.5) +
                              mouseInfluenceY * Math.sin(x * 0.01 + mouseInfluenceX);
                    
                    if (x === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                
                // 完成路径并创建渐变
                ctx.lineTo(width, 0);
                ctx.lineTo(0, 0);
                ctx.closePath();
                
                const gradient = ctx.createLinearGradient(0, wave.yBase - wave.amplitude, 0, wave.yBase + wave.amplitude * 2);
                const c = wave.color;
                gradient.addColorStop(0, `rgba(${c.r}, ${c.g}, ${c.b}, 0)`);
                gradient.addColorStop(0.5, `rgba(${c.r}, ${c.g}, ${c.b}, ${wave.alpha})`);
                gradient.addColorStop(1, `rgba(${c.r}, ${c.g}, ${c.b}, 0)`);
                
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }
        
        // 绘制中心光晕
        function drawCentralGlow() {
            const gradient = ctx.createRadialGradient(
                mouseX, mouseY, 0,
                mouseX, mouseY, 300
            );
            
            const hue = (time * 0.01) % 360;
            gradient.addColorStop(0, `hsla(${hue}, 100%, 70%, 0.15)`);
            gradient.addColorStop(0.5, `hsla(${hue + 30}, 100%, 60%, 0.05)`);
            gradient.addColorStop(1, 'transparent');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }
        
        // 粒子类（点击效果）
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8 - 2;
                this.life = 1;
                this.decay = 0.01 + Math.random() * 0.02;
                this.size = Math.random() * 4 + 2;
                this.hue = Math.random() * 60 + 150; // 青绿色调
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.05; // 重力
                this.vx *= 0.99;
                this.life -= this.decay;
                this.size *= 0.99;
            }
            
            draw() {
                if (this.life <= 0) return;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 70%, ${this.life * 0.8})`;
                ctx.fill();
                
                // 发光效果
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${this.hue}, 100%, 70%, ${this.life * 0.3})`;
                ctx.fill();
            }
        }
        
        // 更新粒子
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }
        
        // 释放粒子（点击效果）
        function releaseParticles(x, y) {
            const count = 20;
            for (let i = 0; i < count && particles.length < maxParticles; i++) {
                particles.push(new Particle(x, y));
            }
        }
        
        // 主渲染循环
        function animate() {
            // 清除画布并绘制背景渐变
            const bgGradient = ctx.createLinearGradient(0, 0, 0, height);
            bgGradient.addColorStop(0, '#000510');
            bgGradient.addColorStop(0.5, '#001020');
            bgGradient.addColorStop(1, '#000515');
            ctx.fillStyle = bgGradient;
            ctx.fillRect(0, 0, width, height);
            
            // 平滑鼠标移动
            mouseX += (targetMouseX - mouseX) * 0.08;
            mouseY += (targetMouseY - mouseY) * 0.08;
            
            // 绘制各层
            drawStars();
            drawAuroraWaves();
            drawCentralGlow();
            updateParticles();
            
            time++;
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        function handleMouseMove(e) {
            targetMouseX = e.clientX;
            targetMouseY = e.clientY;
        }
        
        function handleTouchMove(e) {
            if (e.touches.length > 0) {
                targetMouseX = e.touches[0].clientX;
                targetMouseY = e.touches[0].clientY;
            }
        }
        
        function handleClick(e) {
            releaseParticles(e.clientX, e.clientY);
        }
        
        function handleTouchStart(e) {
            if (e.touches.length > 0) {
                releaseParticles(e.touches[0].clientX, e.touches[0].clientY);
            }
        }
        
        // 初始化
        function init() {
            resize();
            initStars();
            initWaves();
            
            window.addEventListener('resize', () => {
                resize();
                initStars();
                initWaves();
            });
            
            window.addEventListener('mousemove', handleMouseMove);
            window.addEventListener('touchmove', handleTouchMove, { passive: true });
            window.addEventListener('click', handleClick);
            window.addEventListener('touchstart', handleTouchStart, { passive: true });
            
            // 检测 prefers-reduced-motion
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
            if (!prefersReducedMotion.matches) {
                animate();
            } else {
                // 简化版本：只绘制静态场景
                resize();
                initStars();
                initWaves();
                const bgGradient = ctx.createLinearGradient(0, 0, 0, height);
                bgGradient.addColorStop(0, '#000510');
                bgGradient.addColorStop(0.5, '#001020');
                bgGradient.addColorStop(1, '#000515');
                ctx.fillStyle = bgGradient;
                ctx.fillRect(0, 0, width, height);
                drawStars();
                drawAuroraWaves();
            }
        }
        
        init();
    </script>
</body>
</html>
