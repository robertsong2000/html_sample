<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星空效果 | Starry Night</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        
        .stats {
            position: fixed;
            top: 80px;
            right: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            font-family: 'Courier New', monospace;
            text-align: right;
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="starry"></canvas>
    <div class="title">Starry Night</div>
    <div class="stats">
        <div>星星: <span id="starCount">0</span></div>
        <div>流星: <span id="meteorCount">0</span></div>
    </div>
    <div class="info">移动鼠标产生星座 | 点击发射流星雨 | 滚轮调整星星密度</div>
    
    <script>
        const canvas = document.getElementById('starry');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        let starDensity = 1;
        let time = 0;
        
        // 星星
        let stars = [];
        
        class Star {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.z = Math.random() * 1000;
                this.size = Math.random() * 2 + 0.5;
                this.twinkleSpeed = Math.random() * 0.05 + 0.02;
                this.twinklePhase = Math.random() * Math.PI * 2;
                this.color = this.getStarColor();
            }
            
            getStarColor() {
                const colors = [
                    '#ffffff',  // 白色
                    '#ffffcc',  // 淡黄
                    '#cce5ff',  // 淡蓝
                    '#ffe5cc',  // 淡橙
                    '#e5ccff',  // 淡紫
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }
            
            update() {
                this.twinklePhase += this.twinkleSpeed;
            }
            
            draw() {
                const twinkle = (Math.sin(this.twinklePhase) + 1) / 2;
                const alpha = 0.3 + twinkle * 0.7;
                const size = this.size * (0.8 + twinkle * 0.4);
                
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = size * 5;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        // 流星
        let meteors = [];
        
        class Meteor {
            constructor(x, y) {
                this.x = x !== undefined ? x : Math.random() * width;
                this.y = y !== undefined ? y : Math.random() * height * 0.3;
                this.vx = 8 + Math.random() * 6;
                this.vy = 4 + Math.random() * 4;
                this.length = 80 + Math.random() * 60;
                this.alpha = 1;
                this.color = '#ffffff';
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= 0.015;
                return this.alpha > 0 && this.x < width + 100 && this.y < height + 100;
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                
                const gradient = ctx.createLinearGradient(
                    this.x, this.y,
                    this.x - this.vx * this.length / 10, this.y - this.vy * this.length / 10
                );
                gradient.addColorStop(0, '#ffffff');
                gradient.addColorStop(0.3, this.color);
                gradient.addColorStop(1, 'transparent');
                
                ctx.strokeStyle = gradient;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#ffffff';
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(
                    this.x - this.vx * this.length / 10,
                    this.y - this.vy * this.length / 10
                );
                ctx.stroke();
                
                // 流星头部光点
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        // 星座连线
        let constellations = [];
        
        class Constellation {
            constructor(points) {
                this.points = points;
                this.alpha = 1;
                this.fadeSpeed = 0.02;
            }
            
            update() {
                this.alpha -= this.fadeSpeed;
                return this.alpha > 0;
            }
            
            draw() {
                if (this.points.length < 2) return;
                
                ctx.save();
                ctx.globalAlpha = this.alpha * 0.5;
                ctx.strokeStyle = '#4488ff';
                ctx.lineWidth = 1;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#4488ff';
                
                ctx.beginPath();
                ctx.moveTo(this.points[0].x, this.points[0].y);
                
                for (let i = 1; i < this.points.length; i++) {
                    ctx.lineTo(this.points[i].x, this.points[i].y);
                }
                
                ctx.stroke();
                
                // 绘制星点
                ctx.fillStyle = '#88aaff';
                this.points.forEach(p => {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                    ctx.fill();
                });
                
                ctx.restore();
            }
        }
        
        // 星云
        class Nebula {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height * 0.6;
                this.radius = 100 + Math.random() * 200;
                this.color = this.getNebulaColor();
                this.alpha = 0.05 + Math.random() * 0.1;
                this.phase = Math.random() * Math.PI * 2;
            }
            
            getNebulaColor() {
                const colors = [
                    'rgba(100, 50, 150,',  // 紫色
                    'rgba(50, 100, 150,',  // 蓝色
                    'rgba(150, 50, 100,',  // 粉色
                    'rgba(50, 150, 100,',  // 绿色
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }
            
            draw() {
                const pulse = Math.sin(time * 0.5 + this.phase) * 0.3 + 0.7;
                
                ctx.save();
                ctx.globalAlpha = this.alpha * pulse;
                
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.radius
                );
                gradient.addColorStop(0, this.color + '0.5)');
                gradient.addColorStop(0.5, this.color + '0.2)');
                gradient.addColorStop(1, 'transparent');
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.restore();
            }
        }
        
        let nebulae = [];
        
        // 鼠标轨迹点
        let trailPoints = [];
        const maxTrailLength = 10;
        
        function init() {
            resize();
            
            // 创建星星
            const starCount = Math.floor(500 * starDensity);
            for (let i = 0; i < starCount; i++) {
                stars.push(new Star());
            }
            
            // 创建星云
            for (let i = 0; i < 5; i++) {
                nebulae.push(new Nebula());
            }
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            // 重新定位星星
            stars.forEach(star => {
                star.x = Math.random() * width;
                star.y = Math.random() * height;
            });
            
            // 重新定位星云
            nebulae.forEach(n => {
                n.x = Math.random() * width;
                n.y = Math.random() * height * 0.6;
            });
        }
        
        function drawBackground() {
            // 深空渐变
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#000011');
            gradient.addColorStop(0.5, '#000822');
            gradient.addColorStop(1, '#001133');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            // 银河带
            ctx.save();
            const milkyWay = ctx.createLinearGradient(0, 0, width, height);
            milkyWay.addColorStop(0, 'transparent');
            milkyWay.addColorStop(0.3, 'rgba(100, 100, 150, 0.05)');
            milkyWay.addColorStop(0.5, 'rgba(150, 150, 200, 0.08)');
            milkyWay.addColorStop(0.7, 'rgba(100, 100, 150, 0.05)');
            milkyWay.addColorStop(1, 'transparent');
            ctx.fillStyle = milkyWay;
            ctx.fillRect(0, 0, width, height);
            ctx.restore();
        }
        
        function draw() {
            // 绘制背景
            drawBackground();
            
            // 绘制星云
            nebulae.forEach(n => n.draw());
            
            // 更新和绘制星星
            stars.forEach(star => {
                star.update();
                star.draw();
            });
            
            // 更新星座
            constellations = constellations.filter(c => {
                c.draw();
                return c.update();
            });
            
            // 更新流星
            meteors = meteors.filter(m => {
                m.draw();
                return m.update();
            });
            
            // 随机流星
            if (Math.random() > 0.995) {
                meteors.push(new Meteor());
            }
            
            // 更新统计
            document.getElementById('starCount').textContent = stars.length;
            document.getElementById('meteorCount').textContent = meteors.length;
            
            // 绘制鼠标轨迹星座
            if (trailPoints.length > 1) {
                ctx.save();
                ctx.globalAlpha = 0.3;
                ctx.strokeStyle = '#4488ff';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(trailPoints[0].x, trailPoints[0].y);
                for (let i = 1; i < trailPoints.length; i++) {
                    ctx.lineTo(trailPoints[i].x, trailPoints[i].y);
                }
                ctx.stroke();
                ctx.restore();
            }
            
            time += 0.016;
            
            requestAnimationFrame(draw);
        }
        
        // 事件监听
        window.addEventListener('resize', () => {
            resize();
        });
        
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            // 添加轨迹点
            trailPoints.push({ x: mouseX, y: mouseY });
            if (trailPoints.length > maxTrailLength) {
                trailPoints.shift();
            }
        });
        
        window.addEventListener('click', (e) => {
            // 流星雨效果
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    meteors.push(new Meteor(
                        e.clientX + (Math.random() - 0.5) * 100,
                        e.clientY + (Math.random() - 0.5) * 50
                    ));
                }, i * 100);
            }
            
            // 如果有轨迹点，创建星座
            if (trailPoints.length >= 3) {
                constellations.push(new Constellation([...trailPoints]));
            }
        });
        
        window.addEventListener('wheel', (e) => {
            starDensity += e.deltaY > 0 ? -0.1 : 0.1;
            starDensity = Math.max(0.3, Math.min(2, starDensity));
            
            const targetCount = Math.floor(500 * starDensity);
            while (stars.length < targetCount) {
                stars.push(new Star());
            }
            while (stars.length > targetCount) {
                stars.pop();
            }
        });
        
        // 触摸支持
        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
            trailPoints.push({ x: mouseX, y: mouseY });
            if (trailPoints.length > maxTrailLength) {
                trailPoints.shift();
            }
        }, { passive: false });
        
        window.addEventListener('touchstart', (e) => {
            for (let i = 0; i < 3; i++) {
                meteors.push(new Meteor(
                    e.touches[0].clientX + (Math.random() - 0.5) * 50,
                    e.touches[0].clientY + (Math.random() - 0.5) * 30
                ));
            }
        });
        
        init();
        draw();
    </script>
</body>
</html>
