<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>引力场 - Gravity Field</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 200, 100, 0.9);
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 12px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 
                0 0 20px rgba(255, 200, 100, 1),
                0 0 40px rgba(255, 150, 50, 0.8),
                0 0 60px rgba(255, 100, 0, 0.6);
            animation: gravityPulse 2s ease-in-out infinite;
        }
        
        @keyframes gravityPulse {
            0%, 100% { 
                transform: translateX(-50%) scale(1);
                opacity: 0.9;
            }
            50% { 
                transform: translateX(-50%) scale(1.02);
                opacity: 1;
            }
        }
        
        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 10;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90%;
        }
        
        .btn {
            padding: 10px 20px;
            background: rgba(255, 200, 100, 0.1);
            border: 1px solid rgba(255, 200, 100, 0.4);
            color: rgba(255, 220, 150, 0.9);
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .btn:hover {
            background: rgba(255, 200, 100, 0.2);
            border-color: rgba(255, 200, 100, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 200, 100, 0.4);
        }
        
        .btn.active {
            background: rgba(255, 200, 100, 0.3);
            box-shadow: 0 0 20px rgba(255, 200, 100, 0.6);
        }
        
        .info {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 200, 100, 0.5);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
            text-align: center;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 200, 100, 0.4);
            font-size: 11px;
            z-index: 10;
            pointer-events: none;
            text-align: right;
            font-family: 'Courier New', monospace;
        }
        
        .gravity-info {
            position: fixed;
            bottom: 90px;
            left: 20px;
            color: rgba(255, 200, 100, 0.4);
            font-size: 11px;
            z-index: 10;
            pointer-events: none;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="title">🌌 GRAVITY 🌌</div>
    
    <div class="info">
        🖱️ 点击 - 创建引力源 | 🎨 拖动 - 控制粒子 | ⚙️ 滚轮 - 调整引力强度
    </div>
    
    <div class="stats" id="stats">
        粒子: 0 | 引力源: 0 | FPS: 60
    </div>
    
    <div class="gravity-info" id="gravityInfo">
        模式: 吸引 | 强度: 1.0x
    </div>
    
    <div class="controls">
        <button class="btn" onclick="changeGravityMode()">🌀 引力模式</button>
        <button class="btn" onclick="changeColorScheme()">🎨 配色方案</button>
        <button class="btn" onclick="toggleTrails()">✨ 粒子轨迹</button>
        <button class="btn" onclick="toggleFieldLines()">📐 场线显示</button>
        <button class="btn" onclick="addMassiveObject()">⭐ 添加星体</button>
        <button class="btn" onclick="resetField()">🔄 重置引力场</button>
    </div>
    
    <canvas id="canvas"></canvas>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        let gravityStrength = 1;
        let time = 0;
        
        // 性能监控
        let frameCount = 0;
        let lastFpsUpdate = Date.now();
        let currentFps = 60;
        
        // 引力模式
        const gravityModes = [
            { name: '吸引', type: 'attract' },
            { name: '排斥', type: 'repel' },
            { name: '旋转', type: 'orbit' },
            { name: '混沌', type: 'chaos' }
        ];
        let currentMode = 0;
        
        // 配色方案
        const colorSchemes = [
            { name: '太阳', colors: ['#ffcc00', '#ff8800', '#ff4400', '#ffff88'] },
            { name: '黑洞', colors: ['#8800ff', '#aa00ff', '#ff00ff', '#ff88ff'] },
            { name: '中子星', colors: ['#00ffff', '#0088ff', '#0044ff', '#88ffff'] },
            { name: '脉冲星', colors: ['#00ff88', '#00ff44', '#88ff00', '#ccff88'] },
            { name: '类星体', colors: ['#ff0088', '#ff4488', '#ff88cc', '#ffaadd'] }
        ];
        let currentColorScheme = 0;
        
        let trailsEnabled = true;
        let fieldLinesEnabled = true;
        
        // 引力源（质量体）
        class GravitySource {
            constructor(x, y, mass) {
                this.x = x;
                this.y = y;
                this.mass = mass || 50;
                this.pulsePhase = Math.random() * Math.PI * 2;
            }
            
            draw() {
                const scheme = colorSchemes[currentColorScheme];
                const pulse = Math.sin(time * 2 + this.pulsePhase) * 0.3 + 1;
                const radius = Math.sqrt(this.mass) * 2 * pulse;
                
                // 引力场可视化
                for (let i = 5; i >= 0; i--) {
                    const r = radius * (1 + i * 0.5);
                    const gradient = ctx.createRadialGradient(
                        this.x, this.y, 0,
                        this.x, this.y, r
                    );
                    
                    gradient.addColorStop(0, scheme.colors[0] + '88');
                    gradient.addColorStop(0.5, scheme.colors[1] + '44');
                    gradient.addColorStop(1, 'transparent');
                    
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // 核心
                const coreGradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, radius
                );
                coreGradient.addColorStop(0, '#ffffff');
                coreGradient.addColorStop(0.5, scheme.colors[0]);
                coreGradient.addColorStop(1, scheme.colors[1]);
                
                ctx.fillStyle = coreGradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        // 粒子
        class GravityParticle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.mass = 1 + Math.random() * 2;
                this.color = colorSchemes[currentColorScheme].colors[
                    Math.floor(Math.random() * 4)
                ];
                this.trail = [];
                this.maxTrail = 20;
            }
            
            update(sources) {
                // 保存轨迹
                if (trailsEnabled) {
                    this.trail.push({ x: this.x, y: this.y });
                    if (this.trail.length > this.maxTrail) {
                        this.trail.shift();
                    }
                }
                
                // 计算引力
                const mode = gravityModes[currentMode].type;
                
                sources.forEach(source => {
                    const dx = source.x - this.x;
                    const dy = source.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist > 10) {
                        const force = (source.mass * gravityStrength) / (dist * dist);
                        const angle = Math.atan2(dy, dx);
                        
                        switch (mode) {
                            case 'attract':
                                this.vx += Math.cos(angle) * force;
                                this.vy += Math.sin(angle) * force;
                                break;
                            case 'repel':
                                this.vx -= Math.cos(angle) * force;
                                this.vy -= Math.sin(angle) * force;
                                break;
                            case 'orbit':
                                // 切向力 + 向心力
                                this.vx += Math.cos(angle) * force * 0.5;
                                this.vy += Math.sin(angle) * force * 0.5;
                                this.vx += Math.cos(angle + Math.PI / 2) * force * 0.3;
                                this.vy += Math.sin(angle + Math.PI / 2) * force * 0.3;
                                break;
                            case 'chaos':
                                const chaosAngle = angle + Math.sin(time * 5) * Math.PI;
                                this.vx += Math.cos(chaosAngle) * force;
                                this.vy += Math.sin(chaosAngle) * force;
                                break;
                        }
                    }
                });
                
                // 速度限制
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > 10) {
                    this.vx = (this.vx / speed) * 10;
                    this.vy = (this.vy / speed) * 10;
                }
                
                // 更新位置
                this.x += this.vx;
                this.y += this.vy;
                
                // 边界处理
                if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) {
                    this.reset();
                }
            }
            
            draw() {
                // 绘制轨迹
                if (trailsEnabled && this.trail.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let i = 1; i < this.trail.length; i++) {
                        ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    }
                    ctx.strokeStyle = this.color;
                    ctx.globalAlpha = 0.3;
                    ctx.lineWidth = this.mass * 0.5;
                    ctx.stroke();
                }
                
                // 绘制粒子
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.mass, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = 0.8;
                ctx.fill();
                
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.globalAlpha = 1;
            }
        }
        
        // 绘制场线
        function drawFieldLines(sources) {
            if (!fieldLinesEnabled || sources.length === 0) return;
            
            const scheme = colorSchemes[currentColorScheme];
            
            sources.forEach(source => {
                const numLines = 12;
                
                for (let i = 0; i < numLines; i++) {
                    const angle = (i / numLines) * Math.PI * 2;
                    let x = source.x + Math.cos(angle) * 30;
                    let y = source.y + Math.sin(angle) * 30;
                    
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    
                    // 追踪场线
                    for (let j = 0; j < 50; j++) {
                        let fx = 0, fy = 0;
                        
                        sources.forEach(s => {
                            const dx = s.x - x;
                            const dy = s.y - y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            
                            if (dist > 10) {
                                const force = s.mass / (dist * dist);
                                fx += (dx / dist) * force;
                                fy += (dy / dist) * force;
                            }
                        });
                        
                        const mag = Math.sqrt(fx * fx + fy * fy);
                        if (mag > 0) {
                            x += (fx / mag) * 5;
                            y += (fy / mag) * 5;
                        }
                        
                        ctx.lineTo(x, y);
                        
                        if (x < 0 || x > width || y < 0 || y > height) break;
                    }
                    
                    ctx.strokeStyle = scheme.colors[2] + '33';
                    ctx.lineWidth = 1;
                    ctx.stroke();
                }
            });
        }
        
        let sources = [];
        let particles = [];
        
        // 初始化
        function init() {
            resize();
            
            // 创建初始引力源
            sources.push(new GravitySource(width / 2, height / 2, 80));
            
            // 创建粒子
            for (let i = 0; i < 400; i++) {
                particles.push(new GravityParticle());
            }
            
            window.addEventListener('resize', resize);
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        // 动画循环
        let lastTime = 0;
        const targetFPS = 60;
        const interval = 1000 / targetFPS;
        
        function animate(currentTime) {
            requestAnimationFrame(animate);
            
            const delta = currentTime - lastTime;
            if (delta < interval) return;
            lastTime = currentTime - (delta % interval);
            
            // FPS计算
            frameCount++;
            if (currentTime - lastFpsUpdate >= 1000) {
                currentFps = frameCount;
                frameCount = 0;
                lastFpsUpdate = currentTime;
                updateStats();
            }
            
            time += 0.016;
            
            // 清除画布
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制场线
            drawFieldLines(sources);
            
            // 绘制引力源
            sources.forEach(source => source.draw());
            
            // 更新和绘制粒子
            particles.forEach(particle => {
                particle.update(sources);
                particle.draw();
            });
            
            updateStats();
        }
        
        function updateStats() {
            document.getElementById('stats').textContent = 
                `粒子: ${particles.length} | 引力源: ${sources.length} | FPS: ${currentFps}`;
            
            const modeName = gravityModes[currentMode].name;
            const intensity = gravityStrength < 0.7 ? '微弱' : 
                             gravityStrength < 1.3 ? '中等' : '强烈';
            document.getElementById('gravityInfo').textContent = 
                `模式: ${modeName} | 强度: ${intensity}`;
        }
        
        // 事件处理
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('click', (e) => {
            // 创建新引力源
            sources.push(new GravitySource(e.clientX, e.clientY, 50));
            
            // 限制引力源数量
            if (sources.length > 5) {
                sources.shift();
            }
            
            updateStats();
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            gravityStrength = Math.max(0.3, Math.min(2, gravityStrength - e.deltaY * 0.001));
            updateStats();
        });
        
        // 控制函数
        function changeGravityMode() {
            currentMode = (currentMode + 1) % gravityModes.length;
            updateStats();
        }
        
        function changeColorScheme() {
            currentColorScheme = (currentColorScheme + 1) % colorSchemes.length;
            
            particles.forEach(p => {
                p.color = colorSchemes[currentColorScheme].colors[
                    Math.floor(Math.random() * 4)
                ];
            });
        }
        
        function toggleTrails() {
            trailsEnabled = !trailsEnabled;
            event.target.classList.toggle('active', !trailsEnabled);
            if (!trailsEnabled) {
                particles.forEach(p => p.trail = []);
            }
        }
        
        function toggleFieldLines() {
            fieldLinesEnabled = !fieldLinesEnabled;
            event.target.classList.toggle('active', !fieldLinesEnabled);
        }
        
        function addMassiveObject() {
            const x = Math.random() * width;
            const y = Math.random() * height;
            const mass = 30 + Math.random() * 100;
            sources.push(new GravitySource(x, y, mass));
            
            if (sources.length > 5) {
                sources.shift();
            }
            
            updateStats();
        }
        
        function resetField() {
            gravityStrength = 1;
            currentMode = 0;
            currentColorScheme = 0;
            trailsEnabled = true;
            fieldLinesEnabled = true;
            
            sources = [];
            sources.push(new GravitySource(width / 2, height / 2, 80));
            
            particles = [];
            for (let i = 0; i < 400; i++) {
                particles.push(new GravityParticle());
            }
            
            document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
            updateStats();
        }
        
        // 启动
        init();
        animate(0);
    </script>
</body>
</html>
