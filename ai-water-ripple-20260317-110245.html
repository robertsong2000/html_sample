<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水波纹 - Water Ripple</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: linear-gradient(180deg, #001122 0%, #002244 50%, #003366 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(150, 220, 255, 0.9);
            font-size: 14px;
            z-index: 10;
            background: rgba(0, 30, 60, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(100, 180, 255, 0.3);
            max-width: 280px;
        }
        
        .info h3 {
            margin-bottom: 10px;
            font-size: 16px;
            color: #88ccff;
            text-shadow: 0 0 15px rgba(136, 204, 255, 0.6);
        }
        
        .info p {
            margin: 5px 0;
            font-size: 12px;
            line-height: 1.6;
        }
        
        .info .key {
            color: #66ddff;
            font-weight: bold;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            z-index: 10;
            background: rgba(0, 30, 60, 0.7);
            padding: 10px 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
        }
        
        @media (max-width: 600px) {
            .info {
                font-size: 12px;
                padding: 10px 15px;
                max-width: 220px;
            }
        }
    </style>
</head>
<body>
    <canvas id="ripple"></canvas>
    
    <div class="info">
        <h3>💧 水波纹</h3>
        <p><span class="key">点击</span> - 产生波纹</p>
        <p><span class="key">拖动</span> - 持续产生波纹</p>
        <p><span class="key">滚轮</span> - 调整波纹大小</p>
        <p><span class="key">空格</span> - 切换背景模式</p>
    </div>
    
    <div class="stats" id="stats">
        FPS: 60 | 波纹: 0
    </div>

    <script>
        const canvas = document.getElementById('ripple');
        const ctx = canvas.getContext('2d');
        const statsEl = document.getElementById('stats');
        
        let width, height;
        let ripples = [];
        let raindrops = [];
        let rippleSize = 1;
        let bgMode = 0;
        let isMouseDown = false;
        let mouseX = 0, mouseY = 0;
        
        // 背景模式
        const bgModes = [
            { name: '深海', color1: '#001122', color2: '#003366' },
            { name: '黄昏', color1: '#1a0a2e', color2: '#3d1a5c' },
            { name: '翡翠', color1: '#0a2a1a', color2: '#1a4a3a' }
        ];
        
        // 波纹类
        class Ripple {
            constructor(x, y, maxRadius) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = maxRadius || 150;
                this.speed = 3;
                this.alpha = 0.8;
                this.lineWidth = 3;
            }
            
            update() {
                this.radius += this.speed;
                this.alpha = 0.8 * (1 - this.radius / this.maxRadius);
                this.lineWidth = Math.max(1, 3 * (1 - this.radius / this.maxRadius));
                return this.radius < this.maxRadius;
            }
            
            draw(ctx) {
                if (this.alpha <= 0) return;
                
                // 主波纹
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(150, 220, 255, ${this.alpha})`;
                ctx.lineWidth = this.lineWidth;
                ctx.stroke();
                
                // 内波纹
                if (this.radius > 10) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius * 0.7, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(200, 240, 255, ${this.alpha * 0.5})`;
                    ctx.lineWidth = this.lineWidth * 0.5;
                    ctx.stroke();
                }
                
                // 外波纹
                if (this.radius > 20) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius * 1.2, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(100, 180, 255, ${this.alpha * 0.3})`;
                    ctx.lineWidth = this.lineWidth * 0.3;
                    ctx.stroke();
                }
            }
        }
        
        // 雨滴类
        class Raindrop {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = -10;
                this.speed = 5 + Math.random() * 10;
                this.size = 1 + Math.random() * 2;
                this.alpha = 0.3 + Math.random() * 0.4;
            }
            
            update() {
                this.y += this.speed;
                
                // 碰到水面产生波纹
                if (this.y >= height * 0.6) {
                    ripples.push(new Ripple(this.x, height * 0.6, 50 + Math.random() * 50));
                    this.reset();
                }
            }
            
            draw(ctx) {
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x, this.y + this.size * 5);
                ctx.strokeStyle = `rgba(180, 220, 255, ${this.alpha})`;
                ctx.lineWidth = this.size;
                ctx.lineCap = 'round';
                ctx.stroke();
            }
        }
        
        // 漂浮物（叶子等）
        class Floater {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = height * 0.6 + Math.random() * height * 0.3;
                this.size = 5 + Math.random() * 10;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
                this.driftX = (Math.random() - 0.5) * 0.5;
                this.driftY = Math.sin(Math.random() * Math.PI * 2) * 0.2;
                this.color = `hsl(${100 + Math.random() * 60}, 50%, ${30 + Math.random() * 20}%)`;
            }
            
            update() {
                this.x += this.driftX;
                this.y += Math.sin(performance.now() * 0.001 + this.x * 0.01) * 0.3;
                this.rotation += this.rotationSpeed;
                
                // 波纹影响
                ripples.forEach(r => {
                    const dx = this.x - r.x;
                    const dy = this.y - r.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (Math.abs(dist - r.radius) < 20) {
                        this.x += dx / dist * 0.5;
                        this.y += dy / dist * 0.5;
                        this.rotationSpeed += (Math.random() - 0.5) * 0.01;
                    }
                });
                
                // 边界检查
                if (this.x < -50 || this.x > width + 50) {
                    this.reset();
                }
            }
            
            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                // 绘制叶子形状
                ctx.beginPath();
                ctx.ellipse(0, 0, this.size, this.size * 0.6, 0, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                
                // 叶脉
                ctx.beginPath();
                ctx.moveTo(-this.size, 0);
                ctx.lineTo(this.size, 0);
                ctx.strokeStyle = 'rgba(0, 0, 0, 0.2)';
                ctx.lineWidth = 0.5;
                ctx.stroke();
                
                ctx.restore();
            }
        }
        
        let floaters = [];
        
        // 性能统计
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        let time = 0;
        
        function init() {
            resize();
            
            // 创建雨滴
            for (let i = 0; i < 50; i++) {
                const drop = new Raindrop();
                drop.y = Math.random() * height;
                raindrops.push(drop);
            }
            
            // 创建漂浮物
            for (let i = 0; i < 5; i++) {
                floaters.push(new Floater());
            }
        }
        
        function resize() {
            const dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            
            ctx.scale(dpr, dpr);
        }
        
        function drawBackground() {
            const mode = bgModes[bgMode];
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, mode.color1);
            gradient.addColorStop(1, mode.color2);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            // 水面线
            const waterY = height * 0.6;
            const waterGradient = ctx.createLinearGradient(0, waterY, 0, height);
            waterGradient.addColorStop(0, 'rgba(100, 180, 255, 0.3)');
            waterGradient.addColorStop(0.5, 'rgba(50, 120, 200, 0.4)');
            waterGradient.addColorStop(1, 'rgba(20, 60, 120, 0.6)');
            
            ctx.fillStyle = waterGradient;
            ctx.fillRect(0, waterY, width, height - waterY);
            
            // 水面反光
            for (let i = 0; i < 5; i++) {
                const x = (time * 0.5 + i * 200) % (width + 200) - 100;
                const y = waterY + 20 + Math.sin(time * 0.02 + i) * 5;
                
                ctx.beginPath();
                ctx.ellipse(x, y, 80, 3, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.fill();
            }
        }
        
        function animate(currentTime) {
            // FPS
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
            }
            
            time++;
            
            // 清除并绘制背景
            drawBackground();
            
            // 更新和绘制雨滴
            raindrops.forEach(drop => {
                drop.update();
                drop.draw(ctx);
            });
            
            // 更新和绘制波纹
            ripples = ripples.filter(r => {
                const alive = r.update();
                if (alive) r.draw(ctx);
                return alive;
            });
            
            // 更新和绘制漂浮物
            floaters.forEach(f => {
                f.update();
                f.draw(ctx);
            });
            
            // 鼠标拖动产生波纹
            if (isMouseDown && time % 5 === 0) {
                ripples.push(new Ripple(mouseX, mouseY, 80 * rippleSize));
            }
            
            // 更新统计
            statsEl.textContent = `FPS: ${fps} | 波纹: ${ripples.length}`;
            
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        canvas.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            mouseX = e.clientX;
            mouseY = e.clientY;
            ripples.push(new Ripple(mouseX, mouseY, 100 * rippleSize));
        });
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
        });
        
        canvas.addEventListener('mouseleave', () => {
            isMouseDown = false;
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            rippleSize = Math.max(0.5, Math.min(3, rippleSize - e.deltaY * 0.001));
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                bgMode = (bgMode + 1) % bgModes.length;
            }
        });
        
        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            isMouseDown = true;
            ripples.push(new Ripple(mouseX, mouseY, 100 * rippleSize));
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        });
        
        canvas.addEventListener('touchend', () => {
            isMouseDown = false;
        });
        
        // 启动
        init();
        animate(performance.now());
    </script>
</body>
</html>
