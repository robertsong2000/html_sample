<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹音波 | Neon Audio Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(0, 255, 255, 0.7);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 0, 255, 0.9);
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 10;
            text-shadow: 
                0 0 10px rgba(255, 0, 255, 0.8),
                0 0 20px rgba(255, 0, 255, 0.6);
        }
        
        .controls {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 10;
        }
        
        .controls button {
            background: rgba(255, 0, 255, 0.2);
            border: 1px solid #ff00ff;
            color: #ff00ff;
            padding: 8px 16px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            text-transform: uppercase;
            transition: all 0.3s;
        }
        
        .controls button:hover {
            background: rgba(255, 0, 255, 0.4);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
        }
        
        .controls button.active {
            background: rgba(255, 0, 255, 0.6);
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.8);
        }
    </style>
</head>
<body>
    <canvas id="visualizer"></canvas>
    <div class="title">Neon Visualizer</div>
    <div class="controls">
        <button id="modeBtn" class="active">Bars</button>
        <button id="colorBtn">Color</button>
    </div>
    <div class="info">模拟音乐可视化 | 点击切换模式 | 移动鼠标影响波形</div>
    
    <script>
        const canvas = document.getElementById('visualizer');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        let visualMode = 0;
        let colorScheme = 0;
        let time = 0;
        
        const modes = ['bars', 'wave', 'circle', 'particles'];
        const modeNames = ['Bars', 'Wave', 'Circle', 'Particles'];
        
        const colorSchemes = [
            ['#ff00ff', '#00ffff', '#ffff00'],
            ['#ff6b6b', '#4ecdc4', '#45b7d1'],
            ['#a55eea', '#45aaf2', '#26de81'],
            ['#ff9f43', '#ee5a24', '#f39c12'],
        ];
        
        // 模拟音频数据
        const barCount = 64;
        let audioData = [];
        let targetAudioData = [];
        
        function generateAudioData() {
            for (let i = 0; i < barCount; i++) {
                // 生成模拟音频数据
                const bass = Math.sin(time * 2) * 0.5 + 0.5;
                const mid = Math.sin(time * 3 + i * 0.2) * 0.3 + 0.3;
                const high = Math.sin(time * 5 + i * 0.5) * 0.2 + 0.2;
                
                // 频率分布
                const freq = i / barCount;
                let value = 0;
                
                if (freq < 0.3) {
                    value = bass * (1 - freq / 0.3);
                } else if (freq < 0.6) {
                    value = mid * (1 - (freq - 0.3) / 0.3);
                } else {
                    value = high * (1 - (freq - 0.6) / 0.4);
                }
                
                // 鼠标影响
                const mouseInfluence = 1 - Math.abs(mouseX - width / 2) / (width / 2) * 0.5;
                value *= mouseInfluence;
                
                // 添加随机波动
                value += (Math.random() - 0.5) * 0.1;
                value = Math.max(0.05, Math.min(1, value));
                
                targetAudioData[i] = value;
            }
        }
        
        function updateAudioData() {
            for (let i = 0; i < barCount; i++) {
                audioData[i] += (targetAudioData[i] - audioData[i]) * 0.15;
            }
        }
        
        // 粒子系统
        let particles = [];
        
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4 - 2;
                this.size = Math.random() * 4 + 2;
                this.color = color;
                this.alpha = 1;
                this.life = 1;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.05;
                this.life -= 0.02;
                this.alpha = this.life;
                return this.life > 0;
            }
            
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        function drawBars() {
            const colors = colorSchemes[colorScheme];
            const barWidth = width / barCount;
            const centerY = height / 2;
            
            for (let i = 0; i < barCount; i++) {
                const value = audioData[i];
                const barHeight = value * height * 0.4;
                const x = i * barWidth;
                const colorIndex = Math.floor((i / barCount) * colors.length);
                const color = colors[colorIndex];
                
                ctx.save();
                
                // 上半部分
                const gradient = ctx.createLinearGradient(x, centerY - barHeight, x, centerY);
                gradient.addColorStop(0, color + '40');
                gradient.addColorStop(1, color);
                
                ctx.fillStyle = gradient;
                ctx.shadowBlur = 15;
                ctx.shadowColor = color;
                ctx.fillRect(x + 2, centerY - barHeight, barWidth - 4, barHeight);
                
                // 下半部分（镜像）
                const gradient2 = ctx.createLinearGradient(x, centerY, x, centerY + barHeight);
                gradient2.addColorStop(0, color);
                gradient2.addColorStop(1, color + '40');
                
                ctx.fillStyle = gradient2;
                ctx.fillRect(x + 2, centerY, barWidth - 4, barHeight);
                
                ctx.restore();
            }
        }
        
        function drawWave() {
            const colors = colorSchemes[colorScheme];
            const centerY = height / 2;
            
            for (let layer = 0; layer < 3; layer++) {
                const color = colors[layer];
                const offset = layer * 20;
                const scale = 1 - layer * 0.2;
                
                ctx.save();
                ctx.strokeStyle = color;
                ctx.lineWidth = 3 - layer;
                ctx.shadowBlur = 20;
                ctx.shadowColor = color;
                ctx.globalAlpha = 1 - layer * 0.3;
                
                ctx.beginPath();
                
                for (let i = 0; i < barCount; i++) {
                    const x = (i / barCount) * width;
                    const value = audioData[i] * scale;
                    const y = centerY + (value - 0.5) * height * 0.6 + Math.sin(time * 2 + i * 0.1 + layer) * offset;
                    
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                
                ctx.stroke();
                ctx.restore();
            }
        }
        
        function drawCircle() {
            const colors = colorSchemes[colorScheme];
            const centerX = width / 2;
            const centerY = height / 2;
            const baseRadius = Math.min(width, height) * 0.2;
            
            for (let layer = 0; layer < 3; layer++) {
                const color = colors[layer];
                
                ctx.save();
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 20;
                ctx.shadowColor = color;
                ctx.globalAlpha = 1 - layer * 0.25;
                
                ctx.beginPath();
                
                for (let i = 0; i <= barCount; i++) {
                    const angle = (i / barCount) * Math.PI * 2 - Math.PI / 2;
                    const value = audioData[i % barCount];
                    const radius = baseRadius + value * 100 * (1 - layer * 0.2);
                    
                    const x = centerX + Math.cos(angle) * radius;
                    const y = centerY + Math.sin(angle) * radius;
                    
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                
                ctx.closePath();
                ctx.stroke();
                
                // 填充
                ctx.fillStyle = color + '10';
                ctx.fill();
                
                ctx.restore();
            }
            
            // 中心圆
            ctx.save();
            const avgValue = audioData.reduce((a, b) => a + b) / barCount;
            const pulseRadius = baseRadius * 0.3 * (1 + avgValue * 0.5);
            
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, pulseRadius);
            gradient.addColorStop(0, colors[0] + '80');
            gradient.addColorStop(1, 'transparent');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, pulseRadius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
        
        function drawParticles() {
            const colors = colorSchemes[colorScheme];
            
            // 根据音频生成粒子
            for (let i = 0; i < barCount; i++) {
                if (audioData[i] > 0.6 && Math.random() > 0.7) {
                    const x = (i / barCount) * width;
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    particles.push(new Particle(x, height, color));
                }
            }
            
            // 更新和绘制粒子
            particles = particles.filter(p => {
                p.draw();
                return p.update();
            });
            
            // 限制粒子数量
            if (particles.length > 300) {
                particles = particles.slice(-300);
            }
        }
        
        function init() {
            resize();
            
            for (let i = 0; i < barCount; i++) {
                audioData.push(0.1);
                targetAudioData.push(0.1);
            }
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        function draw() {
            // 清除画布
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, width, height);
            
            // 生成和更新音频数据
            generateAudioData();
            updateAudioData();
            
            // 根据模式绘制
            switch (modes[visualMode]) {
                case 'bars':
                    drawBars();
                    break;
                case 'wave':
                    drawWave();
                    break;
                case 'circle':
                    drawCircle();
                    break;
                case 'particles':
                    drawParticles();
                    drawBars(); // 同时显示条形作为背景
                    break;
            }
            
            time += 0.016;
            
            requestAnimationFrame(draw);
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        document.getElementById('modeBtn').addEventListener('click', () => {
            visualMode = (visualMode + 1) % modes.length;
            document.getElementById('modeBtn').textContent = modeNames[visualMode];
        });
        
        document.getElementById('colorBtn').addEventListener('click', () => {
            colorScheme = (colorScheme + 1) % colorSchemes.length;
        });
        
        // 键盘控制
        window.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                e.preventDefault();
                visualMode = (visualMode + 1) % modes.length;
                document.getElementById('modeBtn').textContent = modeNames[visualMode];
            } else if (e.key === 'c' || e.key === 'C') {
                colorScheme = (colorScheme + 1) % colorSchemes.length;
            }
        });
        
        // 触摸支持
        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });
        
        window.addEventListener('touchstart', () => {
            visualMode = (visualMode + 1) % modes.length;
            document.getElementById('modeBtn').textContent = modeNames[visualMode];
        });
        
        init();
        draw();
    </script>
</body>
</html>
