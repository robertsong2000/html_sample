<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>粒子动画 - Particle Animation</title>
    <style>
        /* ========== 全局样式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #0a0a15;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        /* ========== Canvas 容器 ========== */
        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* ========== 信息面板 ========== */
        .info-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 25, 0.7);
            backdrop-filter: blur(10px);
            padding: 18px 22px;
            border-radius: 12px;
            color: #c0d0ff;
            z-index: 100;
            border: 1px solid rgba(100, 150, 255, 0.3);
            max-width: 260px;
        }

        .info-panel h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #60aaff, #ff60aa, #aa60ff, #60ffaa);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientMove 4s ease infinite;
        }

        @keyframes gradientMove {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .info-panel p {
            font-size: 13px;
            line-height: 1.5;
            opacity: 0.85;
        }

        .info-panel .hint {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(100, 150, 255, 0.15);
            font-size: 11px;
            opacity: 0.6;
        }

        /* ========== 统计面板 ========== */
        .stats-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(10, 10, 25, 0.7);
            backdrop-filter: blur(10px);
            padding: 12px 18px;
            border-radius: 12px;
            color: #80a0ff;
            z-index: 100;
            border: 1px solid rgba(100, 150, 255, 0.3);
            font-size: 12px;
        }

        .stats-panel .stat {
            margin-bottom: 6px;
        }

        .stats-panel .stat:last-child {
            margin-bottom: 0;
        }

        .stats-panel .value {
            color: #ff80c0;
            font-weight: bold;
        }

        /* ========== 控制面板 ========== */
        .controls {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 25, 0.8);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            border-radius: 25px;
            z-index: 100;
            border: 1px solid rgba(100, 150, 255, 0.3);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .controls button {
            background: transparent;
            border: 1px solid rgba(100, 150, 255, 0.5);
            color: #a0c0ff;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 12px;
        }

        .controls button:hover {
            background: rgba(100, 150, 255, 0.2);
            box-shadow: 0 0 15px rgba(100, 150, 255, 0.3);
        }

        .controls button.active {
            background: linear-gradient(135deg, rgba(96, 170, 255, 0.4), rgba(255, 96, 170, 0.4));
            border-color: #60aaff;
            color: #fff;
        }

        .controls .slider-group {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #a0c0ff;
            font-size: 12px;
        }

        .controls input[type="range"] {
            width: 60px;
            accent-color: #ff60aa;
        }

        /* ========== 移动端适配 ========== */
        @media (max-width: 600px) {
            .info-panel {
                top: 10px;
                left: 10px;
                right: 10px;
                max-width: none;
                padding: 12px 15px;
            }
            .info-panel h1 {
                font-size: 18px;
            }
            .stats-panel {
                top: auto;
                bottom: 90px;
                right: 10px;
            }
            .controls {
                bottom: 15px;
                padding: 10px 15px;
                flex-wrap: wrap;
                justify-content: center;
                gap: 6px;
            }
            .controls button {
                padding: 6px 10px;
                font-size: 11px;
            }
            .controls input[type="range"] {
                width: 50px;
            }
        }
    </style>
</head>
<body>
    <!-- 信息面板 -->
    <div class="info-panel">
        <h1>✨ 粒子动画</h1>
        <p>数以百计的粒子在空间中舞动，相互连接形成动态网络，创造出绚丽的视觉效果。</p>
        <div class="hint">
            💡 移动鼠标吸引/排斥粒子<br>
            💡 点击产生粒子爆发
        </div>
    </div>

    <!-- 统计面板 -->
    <div class="stats-panel">
        <div class="stat">✨ 粒子数: <span class="value" id="particleCount">0</span></div>
        <div class="stat">🔗 连接数: <span class="value" id="connectionCount">0</span></div>
        <div class="stat">⚡ FPS: <span class="value" id="fpsDisplay">60</span></div>
    </div>

    <!-- 控制面板 -->
    <div class="controls">
        <button id="modeAttract" class="active">吸引</button>
        <button id="modeRepel">排斥</button>
        <button id="modeOrbit">环绕</button>
        <div class="slider-group">
            <span>数量</span>
            <input type="range" id="countSlider" min="50" max="300" step="10" value="150">
        </div>
        <div class="slider-group">
            <span>力度</span>
            <input type="range" id="forceSlider" min="1" max="10" step="0.5" value="5">
        </div>
    </div>

    <!-- 主画布 -->
    <canvas id="particleCanvas"></canvas>

    <script>
        // ========== 画布初始化 ==========
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ========== 配置参数 ==========
        const CONFIG = {
            particleCount: 150,
            connectionDistance: 120,
            mouseRadius: 150,
            forceStrength: 5,
            mode: 'attract', // attract, repel, orbit
            friction: 0.98,
            maxSpeed: 8
        };

        // ========== 状态变量 ==========
        let particles = [];
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;
        let isMouseOnCanvas = false;
        let time = 0;
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;

        // ========== 颜色生成 ==========
        function getParticleColor(index, total) {
            const hue = (index / total) * 360 + time * 0.5;
            return `hsl(${hue % 360}, 80%, 60%)`;
        }

        function getConnectionColor(alpha) {
            return `rgba(100, 150, 255, ${alpha})`;
        }

        // ========== 粒子类 ==========
        class Particle {
            constructor(x, y, burst = false) {
                this.x = x !== undefined ? x : Math.random() * canvas.width;
                this.y = y !== undefined ? y : Math.random() * canvas.height;
                this.vx = burst ? (Math.random() - 0.5) * 10 : (Math.random() - 0.5) * 2;
                this.vy = burst ? (Math.random() - 0.5) * 10 : (Math.random() - 0.5) * 2;
                this.radius = 2 + Math.random() * 3;
                this.baseRadius = this.radius;
                this.colorIndex = Math.random();
                this.pulseOffset = Math.random() * Math.PI * 2;
                this.life = burst ? 1 : Infinity;
                this.decay = burst ? 0.01 : 0;
            }

            update() {
                // 脉冲效果
                this.pulseOffset += 0.05;
                this.radius = this.baseRadius * (1 + Math.sin(this.pulseOffset) * 0.2);
                
                // 鼠标交互
                if (isMouseOnCanvas) {
                    const dx = mouseX - this.x;
                    const dy = mouseY - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < CONFIG.mouseRadius && distance > 0) {
                        const force = (CONFIG.mouseRadius - distance) / CONFIG.mouseRadius * CONFIG.forceStrength * 0.1;
                        const angle = Math.atan2(dy, dx);
                        
                        switch (CONFIG.mode) {
                            case 'attract':
                                this.vx += Math.cos(angle) * force;
                                this.vy += Math.sin(angle) * force;
                                break;
                            case 'repel':
                                this.vx -= Math.cos(angle) * force;
                                this.vy -= Math.sin(angle) * force;
                                break;
                            case 'orbit':
                                // 切向力（环绕）
                                this.vx += Math.cos(angle + Math.PI / 2) * force * 0.5;
                                this.vy += Math.sin(angle + Math.PI / 2) * force * 0.5;
                                // 轻微向心力
                                this.vx += Math.cos(angle) * force * 0.1;
                                this.vy += Math.sin(angle) * force * 0.1;
                                break;
                        }
                    }
                }
                
                // 应用摩擦力
                this.vx *= CONFIG.friction;
                this.vy *= CONFIG.friction;
                
                // 限制最大速度
                const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (speed > CONFIG.maxSpeed) {
                    this.vx = (this.vx / speed) * CONFIG.maxSpeed;
                    this.vy = (this.vy / speed) * CONFIG.maxSpeed;
                }
                
                // 更新位置
                this.x += this.vx;
                this.y += this.vy;
                
                // 边界处理（软边界）
                const margin = 50;
                if (this.x < margin) this.vx += 0.5;
                if (this.x > canvas.width - margin) this.vx -= 0.5;
                if (this.y < margin) this.vy += 0.5;
                if (this.y > canvas.height - margin) this.vy -= 0.5;
                
                // 硬边界
                if (this.x < 0) { this.x = 0; this.vx *= -0.5; }
                if (this.x > canvas.width) { this.x = canvas.width; this.vx *= -0.5; }
                if (this.y < 0) { this.y = 0; this.vy *= -0.5; }
                if (this.y > canvas.height) { this.y = canvas.height; this.vy *= -0.5; }
                
                // 生命衰减
                if (this.life !== Infinity) {
                    this.life -= this.decay;
                }
            }

            draw() {
                if (this.life !== Infinity && this.life <= 0) return;
                
                const alpha = this.life === Infinity ? 1 : this.life;
                const color = getParticleColor(this.colorIndex * 1000, 1000);
                
                // 发光效果
                ctx.beginPath();
                ctx.fillStyle = color;
                ctx.globalAlpha = alpha * 0.3;
                ctx.shadowColor = color;
                ctx.shadowBlur = 15;
                ctx.arc(this.x, this.y, this.radius * 2, 0, Math.PI * 2);
                ctx.fill();
                
                // 核心
                ctx.beginPath();
                ctx.fillStyle = '#fff';
                ctx.globalAlpha = alpha * 0.8;
                ctx.shadowBlur = 0;
                ctx.arc(this.x, this.y, this.radius * 0.5, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.globalAlpha = 1;
            }
        }

        // ========== 初始化粒子 ==========
        function initParticles() {
            particles = [];
            for (let i = 0; i < CONFIG.particleCount; i++) {
                particles.push(new Particle());
            }
        }
        initParticles();

        // ========== 绘制连接线 ==========
        function drawConnections() {
            let connectionCount = 0;
            
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    
                    if (distance < CONFIG.connectionDistance) {
                        const alpha = (1 - distance / CONFIG.connectionDistance) * 0.5;
                        
                        ctx.beginPath();
                        ctx.strokeStyle = getConnectionColor(alpha);
                        ctx.lineWidth = 1;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                        
                        connectionCount++;
                    }
                }
            }
            
            return connectionCount;
        }

        // ========== 绘制鼠标影响范围 ==========
        function drawMouseArea() {
            if (!isMouseOnCanvas) return;
            
            const gradient = ctx.createRadialGradient(
                mouseX, mouseY, 0,
                mouseX, mouseY, CONFIG.mouseRadius
            );
            
            const colors = {
                attract: 'rgba(100, 200, 255, ',
                repel: 'rgba(255, 100, 100, ',
                orbit: 'rgba(200, 100, 255, '
            };
            
            gradient.addColorStop(0, colors[CONFIG.mode] + '0.1)');
            gradient.addColorStop(0.5, colors[CONFIG.mode] + '0.05)');
            gradient.addColorStop(1, colors[CONFIG.mode] + '0)');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, CONFIG.mouseRadius, 0, Math.PI * 2);
            ctx.fill();
            
            // 中心点
            ctx.beginPath();
            ctx.fillStyle = colors[CONFIG.mode] + '0.8)';
            ctx.arc(mouseX, mouseY, 5, 0, Math.PI * 2);
            ctx.fill();
        }

        // ========== 粒子爆发 ==========
        function burst(x, y) {
            const burstCount = 30;
            for (let i = 0; i < burstCount; i++) {
                const particle = new Particle(x, y, true);
                particles.push(particle);
            }
        }

        // ========== 鼠标交互 ==========
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            isMouseOnCanvas = true;
        });

        canvas.addEventListener('mouseleave', () => {
            isMouseOnCanvas = false;
        });

        canvas.addEventListener('click', (e) => {
            burst(e.clientX, e.clientY);
        });

        // 触摸支持
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
            isMouseOnCanvas = true;
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            isMouseOnCanvas = true;
            burst(touch.clientX, touch.clientY);
        });

        canvas.addEventListener('touchend', () => {
            isMouseOnCanvas = false;
        });

        // ========== 控制按钮 ==========
        document.getElementById('modeAttract').addEventListener('click', function() {
            CONFIG.mode = 'attract';
            updateModeButtons();
        });

        document.getElementById('modeRepel').addEventListener('click', function() {
            CONFIG.mode = 'repel';
            updateModeButtons();
        });

        document.getElementById('modeOrbit').addEventListener('click', function() {
            CONFIG.mode = 'orbit';
            updateModeButtons();
        });

        document.getElementById('countSlider').addEventListener('input', function() {
            const newCount = parseInt(this.value);
            while (particles.length < newCount) {
                particles.push(new Particle());
            }
            while (particles.length > newCount) {
                // 只移除永久粒子
                const index = particles.findIndex(p => p.life === Infinity);
                if (index >= 0) {
                    particles.splice(index, 1);
                } else {
                    break;
                }
            }
            CONFIG.particleCount = newCount;
        });

        document.getElementById('forceSlider').addEventListener('input', function() {
            CONFIG.forceStrength = parseFloat(this.value);
        });

        function updateModeButtons() {
            document.querySelectorAll('.controls button').forEach(btn => {
                btn.classList.remove('active');
            });
            const btnMap = { 'attract': 'modeAttract', 'repel': 'modeRepel', 'orbit': 'modeOrbit' };
            document.getElementById(btnMap[CONFIG.mode]).classList.add('active');
        }

        // ========== 更新统计 ==========
        function updateStats(connectionCount) {
            // 过滤掉死亡的粒子
            particles = particles.filter(p => p.life === Infinity || p.life > 0);
            
            document.getElementById('particleCount').textContent = particles.length;
            document.getElementById('connectionCount').textContent = connectionCount;
            
            // FPS计算
            frameCount++;
            const now = performance.now();
            if (now - lastTime >= 1000) {
                fps = Math.round(frameCount * 1000 / (now - lastTime));
                document.getElementById('fpsDisplay').textContent = fps;
                frameCount = 0;
                lastTime = now;
            }
        }

        // ========== 主动画循环 ==========
        function animate() {
            time++;
            
            // 清除画布（带淡出效果）
            ctx.fillStyle = 'rgba(10, 10, 21, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制鼠标影响范围
            drawMouseArea();
            
            // 绘制连接线
            const connectionCount = drawConnections();
            
            // 更新和绘制粒子
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            
            // 更新统计
            updateStats(connectionCount);
            
            requestAnimationFrame(animate);
        }

        // 启动动画
        animate();
    </script>
</body>
</html>
