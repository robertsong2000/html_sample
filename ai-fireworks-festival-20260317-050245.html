<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>烟花盛宴 - Fireworks Festival</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.85);
            font-size: 14px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.4);
            padding: 15px 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 280px;
        }
        
        .info h3 {
            margin-bottom: 10px;
            font-size: 18px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        
        .info p {
            margin: 5px 0;
            font-size: 12px;
            line-height: 1.6;
            opacity: 0.9;
        }
        
        .info .key {
            display: inline-block;
            background: rgba(255, 255, 255, 0.15);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            margin-right: 5px;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 15px;
            border-radius: 8px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .city-silhouette {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 15%;
            background: linear-gradient(to top, #0a0a15 0%, transparent 100%);
            z-index: 5;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas id="fireworks"></canvas>
    <div class="city-silhouette"></div>
    
    <div class="info">
        <h3>🎆 烟花盛宴</h3>
        <p><span class="key">点击</span> 在点击位置发射烟花</p>
        <p><span class="key">移动</span> 鼠标轨迹产生火花</p>
        <p><span class="key">空格</span> 自动发射模式</p>
        <p><span class="key">滚轮</span> 调整烟花大小</p>
    </div>
    
    <div class="stats" id="stats">
        FPS: 60 | 粒子: 0 | 烟花: 0
    </div>

    <script>
        // 性能优化配置
        const CONFIG = {
            maxParticles: 3000,
            maxFireworks: 15,
            gravity: 0.05,
            friction: 0.99,
            particlePool: []
        };
        
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        const statsEl = document.getElementById('stats');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        let isMouseDown = false;
        let autoMode = true;
        let autoTimer = 0;
        let fireworkSize = 1;
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        let particleCount = 0;
        let fireworkCount = 0;
        
        // 颜色主题
        const colorThemes = [
            // 金色系
            ['#FFD700', '#FFA500', '#FF8C00', '#FFEC8B'],
            // 红色系
            ['#FF4444', '#FF6B6B', '#FF8888', '#FFAAAA'],
            // 蓝色系
            ['#4FC3F7', '#29B6F6', '#03A9F4', '#81D4FA'],
            // 绿色系
            ['#66BB6A', '#4CAF50', '#81C784', '#A5D6A7'],
            // 紫色系
            ['#BA68C8', '#AB47BC', '#9C27B0', '#CE93D8'],
            // 粉色系
            ['#F06292', '#EC407A', '#E91E63', '#F48FB1'],
            // 彩虹系
            ['#FF6B6B', '#FFE66D', '#4ECDC4', '#95E1D3', '#F38181'],
            // 白色系
            ['#FFFFFF', '#F5F5F5', '#EEEEEE', '#E0E0E0']
        ];
        
        // 粒子类
        class Particle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.active = false;
                this.x = 0;
                this.y = 0;
                this.vx = 0;
                this.vy = 0;
                this.alpha = 1;
                this.color = '#fff';
                this.size = 2;
                this.decay = 0.015;
                this.gravity = CONFIG.gravity;
                this.trail = [];
                this.trailLength = 5;
            }
            
            init(x, y, vx, vy, color, size, decay, trailLength) {
                this.active = true;
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.size = size;
                this.decay = decay || 0.015;
                this.alpha = 1;
                this.gravity = CONFIG.gravity;
                this.trail = [];
                this.trailLength = trailLength || 5;
            }
            
            update() {
                if (!this.active) return;
                
                // 保存轨迹
                this.trail.push({ x: this.x, y: this.y, alpha: this.alpha });
                if (this.trail.length > this.trailLength) {
                    this.trail.shift();
                }
                
                this.vx *= CONFIG.friction;
                this.vy *= CONFIG.friction;
                this.vy += this.gravity;
                
                this.x += this.vx;
                this.y += this.vy;
                
                this.alpha -= this.decay;
                
                if (this.alpha <= 0) {
                    this.active = false;
                }
            }
            
            draw(ctx) {
                if (!this.active) return;
                
                // 绘制轨迹
                for (let i = 0; i < this.trail.length; i++) {
                    const t = this.trail[i];
                    const trailAlpha = (i / this.trail.length) * this.alpha * 0.5;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, this.size * (i / this.trail.length), 0, Math.PI * 2);
                    ctx.fillStyle = this.hexToRgba(this.color, trailAlpha);
                    ctx.fill();
                }
                
                // 绘制粒子
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.hexToRgba(this.color, this.alpha);
                ctx.fill();
                
                // 发光效果
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2);
                gradient.addColorStop(0, this.hexToRgba(this.color, this.alpha * 0.5));
                gradient.addColorStop(1, this.hexToRgba(this.color, 0));
                ctx.fillStyle = gradient;
                ctx.fill();
            }
            
            hexToRgba(hex, alpha) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            }
        }
        
        // 烟花类
        class Firework {
            constructor(x, targetY, color, size) {
                this.x = x;
                this.y = height;
                this.targetY = targetY;
                this.color = color;
                this.size = size || 1;
                this.vy = -12 - Math.random() * 4;
                this.alpha = 1;
                this.trail = [];
                this.exploded = false;
            }
            
            update() {
                if (this.exploded) return true;
                
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 10) {
                    this.trail.shift();
                }
                
                this.vy += 0.2;
                this.y += this.vy;
                
                // 到达目标高度或速度为0时爆炸
                if (this.vy >= 0 || this.y <= this.targetY) {
                    this.explode();
                    return true;
                }
                
                return false;
            }
            
            draw(ctx) {
                if (this.exploded) return;
                
                // 绘制轨迹
                for (let i = 0; i < this.trail.length; i++) {
                    const t = this.trail[i];
                    const alpha = i / this.trail.length;
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, 2 * this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 200, 100, ${alpha * 0.5})`;
                    ctx.fill();
                }
                
                // 绘制火箭头
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3 * this.size, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
                
                // 发光
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 15 * this.size);
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0.8)');
                gradient.addColorStop(1, 'rgba(255, 200, 100, 0)');
                ctx.beginPath();
                ctx.arc(this.x, this.y, 15 * this.size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
            
            explode() {
                this.exploded = true;
                const particleCount = Math.floor(80 * this.size);
                const theme = this.color || colorThemes[Math.floor(Math.random() * colorThemes.length)];
                
                // 多层爆炸效果
                for (let layer = 0; layer < 3; layer++) {
                    const layerParticles = Math.floor(particleCount / 3);
                    const layerSpeed = (3 - layer) * 3;
                    
                    for (let i = 0; i < layerParticles; i++) {
                        const angle = (Math.PI * 2 * i) / layerParticles + Math.random() * 0.2;
                        const speed = layerSpeed + Math.random() * 2;
                        const color = theme[Math.floor(Math.random() * theme.length)];
                        
                        const particle = getParticle();
                        if (particle) {
                            particle.init(
                                this.x,
                                this.y,
                                Math.cos(angle) * speed,
                                Math.sin(angle) * speed,
                                color,
                                2 + Math.random() * 2,
                                0.008 + Math.random() * 0.01,
                                8
                            );
                        }
                    }
                }
                
                // 闪光效果
                for (let i = 0; i < 20; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 8;
                    
                    const particle = getParticle();
                    if (particle) {
                        particle.init(
                            this.x,
                            this.y,
                            Math.cos(angle) * speed,
                            Math.sin(angle) * speed,
                            '#FFFFFF',
                            1,
                            0.03,
                            3
                        );
                    }
                }
            }
        }
        
        // 粒子池
        let particles = [];
        let fireworks = [];
        
        function initParticlePool() {
            for (let i = 0; i < CONFIG.maxParticles; i++) {
                particles.push(new Particle());
            }
        }
        
        function getParticle() {
            for (let i = 0; i < particles.length; i++) {
                if (!particles[i].active) {
                    return particles[i];
                }
            }
            return null;
        }
        
        // 创建火花效果（鼠标移动时）
        function createSpark(x, y) {
            const particle = getParticle();
            if (particle) {
                const color = colorThemes[Math.floor(Math.random() * colorThemes.length)][0];
                particle.init(
                    x + (Math.random() - 0.5) * 10,
                    y + (Math.random() - 0.5) * 10,
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 2 - 1,
                    color,
                    1 + Math.random(),
                    0.02,
                    3
                );
            }
        }
        
        // 发射烟花
        function launchFirework(x, targetY) {
            if (fireworks.length < CONFIG.maxFireworks) {
                const theme = colorThemes[Math.floor(Math.random() * colorThemes.length)];
                fireworks.push(new Firework(x, targetY, theme, fireworkSize));
            }
        }
        
        // 初始化
        function init() {
            resize();
            initParticlePool();
        }
        
        function resize() {
            const dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            
            ctx.scale(dpr, dpr);
        }
        
        // 动画循环
        function animate(currentTime) {
            // FPS 计算
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
            }
            
            // 清除画布（带残影）
            ctx.fillStyle = 'rgba(10, 10, 26, 0.2)';
            ctx.fillRect(0, 0, width, height);
            
            // 自动模式
            if (autoMode) {
                autoTimer++;
                if (autoTimer > 60 + Math.random() * 60) {
                    launchFirework(
                        Math.random() * width * 0.8 + width * 0.1,
                        height * 0.2 + Math.random() * height * 0.3
                    );
                    autoTimer = 0;
                }
            }
            
            // 更新和绘制烟花
            fireworks = fireworks.filter(fw => {
                const done = fw.update();
                if (!done) fw.draw(ctx);
                return !fw.exploded;
            });
            
            // 更新和绘制粒子
            particleCount = 0;
            particles.forEach(p => {
                if (p.active) {
                    p.update();
                    p.draw(ctx);
                    particleCount++;
                }
            });
            
            fireworkCount = fireworks.length;
            
            // 更新统计
            statsEl.textContent = `FPS: ${fps} | 粒子: ${particleCount} | 烟花: ${fireworkCount}`;
            
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        canvas.addEventListener('click', (e) => {
            launchFirework(e.clientX, e.clientY);
        });
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            if (isMouseDown) {
                createSpark(mouseX, mouseY);
            }
        });
        
        canvas.addEventListener('mousedown', () => {
            isMouseDown = true;
        });
        
        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            fireworkSize = Math.max(0.5, Math.min(2, fireworkSize - e.deltaY * 0.001));
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                autoMode = !autoMode;
            }
        });
        
        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            launchFirework(touch.clientX, touch.clientY);
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            createSpark(touch.clientX, touch.clientY);
        });
        
        // 启动
        init();
        animate(performance.now());
    </script>
</body>
</html>
