<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音频可视化 - Audio Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Courier New', monospace;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 42px;
            font-weight: bold;
            letter-spacing: 8px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 
                0 0 20px rgba(255, 100, 255, 1),
                0 0 40px rgba(100, 200, 255, 0.8);
            animation: pulse 1.5s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.05); }
        }
        
        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 10;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90%;
        }
        
        .btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
        
        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }
        
        .btn.active {
            background: rgba(255, 100, 255, 0.3);
            border-color: rgba(255, 100, 255, 0.8);
            box-shadow: 0 0 25px rgba(255, 100, 255, 0.8);
        }
        
        .info {
            position: fixed;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
            text-align: center;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            z-index: 10;
            pointer-events: none;
            text-align: right;
            font-family: 'Courier New', monospace;
        }
        
        .audio-info {
            position: fixed;
            bottom: 90px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            z-index: 10;
            pointer-events: none;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="title">🎵 VISUALIZER 🎵</div>
    
    <div class="info">
        🖱️ 移动鼠标 - 影响波形 | 🎨 点击 - 切换模式 | ⚙️ 滚轮 - 调整灵敏度
    </div>
    
    <div class="stats" id="stats">
        频段: 64 | 模式: 条形 | FPS: 60
    </div>
    
    <div class="audio-info" id="audioInfo">
        灵敏度: 1.0x | 波形: 正弦
    </div>
    
    <div class="controls">
        <button class="btn" onclick="changeVisualMode()">📊 可视化模式</button>
        <button class="btn" onclick="changeColorScheme()">🎨 配色方案</button>
        <button class="btn" onclick="toggleGlow()">✨ 发光效果</button>
        <button class="btn" onclick="toggleMirror()">🪞 镜像效果</button>
        <button class="btn" onclick="toggleParticles()">💫 粒子效果</button>
        <button class="btn" onclick="resetVisualizer()">🔄 重置</button>
    </div>
    
    <canvas id="canvas"></canvas>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height, centerX, centerY;
        let mouseX = 0, mouseY = 0;
        let sensitivity = 1;
        let time = 0;
        
        // 性能监控
        let frameCount = 0;
        let lastFpsUpdate = Date.now();
        let currentFps = 60;
        
        // 可视化模式
        const visualModes = [
            { name: '条形', type: 'bars' },
            { name: '圆形', type: 'circular' },
            { name: '波形', type: 'wave' },
            { name: '频谱', type: 'spectrum' },
            { name: '粒子', type: 'particles' }
        ];
        let currentMode = 0;
        
        // 配色方案
        const colorSchemes = [
            { name: '霓虹', colors: ['#ff00ff', '#00ffff', '#ff00ff', '#00ffff'] },
            { name: '火焰', colors: ['#ff0000', '#ff8800', '#ffcc00', '#ff4400'] },
            { name: '极光', colors: ['#00ff88', '#00ffff', '#0088ff', '#00ff88'] },
            { name: '彩虹', colors: ['#ff0000', '#ff8800', '#ffff00', '#00ff00', '#00ffff', '#0000ff', '#8800ff'] },
            { name: '单色', colors: ['#ffffff', '#cccccc', '#999999', '#ffffff'] }
        ];
        let currentColorScheme = 0;
        
        let glowEnabled = true;
        let mirrorEnabled = true;
        let particlesEnabled = true;
        
        // 音频数据模拟
        const numBars = 64;
        let audioData = new Array(numBars).fill(0);
        
        // 粒子类
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = (Math.random() - 0.5) * 3 - 2;
                this.life = 1;
                this.decay = 0.01 + Math.random() * 0.02;
                this.size = 2 + Math.random() * 3;
                this.color = color;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.05;
                this.life -= this.decay;
                return this.life > 0;
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }
        
        let particles = [];
        
        // 更新音频数据（模拟）
        function updateAudioData() {
            for (let i = 0; i < numBars; i++) {
                // 模拟音频数据
                const baseFreq = i / numBars;
                const wave1 = Math.sin(time * 2 + i * 0.1) * 0.5 + 0.5;
                const wave2 = Math.sin(time * 3.5 + i * 0.15) * 0.3 + 0.5;
                const wave3 = Math.sin(time * 1.2 + i * 0.05) * 0.2 + 0.5;
                
                let value = (wave1 + wave2 + wave3) / 3;
                
                // 鼠标影响
                const mouseInfluence = Math.sin(i * 0.2 + time * 5) * 0.3 * sensitivity;
                value += mouseInfluence;
                
                // 平滑过渡
                audioData[i] = audioData[i] * 0.9 + value * 0.1;
                
                // 生成粒子
                if (particlesEnabled && audioData[i] > 0.7 && Math.random() > 0.7) {
                    const colors = colorSchemes[currentColorScheme].colors;
                    const color = colors[Math.floor(Math.random() * colors.length)];
                    
                    if (visualModes[currentMode].type === 'circular') {
                        const angle = (i / numBars) * Math.PI * 2;
                        const radius = 100 + audioData[i] * 150;
                        particles.push(new Particle(
                            centerX + Math.cos(angle) * radius,
                            centerY + Math.sin(angle) * radius,
                            color
                        ));
                    }
                }
            }
        }
        
        // 绘制条形可视化
        function drawBars() {
            const barWidth = width / numBars;
            const colors = colorSchemes[currentColorScheme].colors;
            
            for (let i = 0; i < numBars; i++) {
                const barHeight = audioData[i] * height * 0.6 * sensitivity;
                const x = i * barWidth;
                const y = height - barHeight;
                
                const color = colors[i % colors.length];
                
                // 发光效果
                if (glowEnabled) {
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = color;
                }
                
                ctx.fillStyle = color;
                ctx.fillRect(x, y, barWidth - 2, barHeight);
                
                // 镜像
                if (mirrorEnabled) {
                    ctx.globalAlpha = 0.3;
                    ctx.fillRect(x, height, barWidth - 2, barHeight * 0.3);
                    ctx.globalAlpha = 1;
                }
            }
            
            ctx.shadowBlur = 0;
        }
        
        // 绘制圆形可视化
        function drawCircular() {
            const colors = colorSchemes[currentColorScheme].colors;
            
            for (let i = 0; i < numBars; i++) {
                const angle = (i / numBars) * Math.PI * 2;
                const radius = 100 + audioData[i] * 150 * sensitivity;
                
                const x1 = centerX + Math.cos(angle) * 100;
                const y1 = centerY + Math.sin(angle) * 100;
                const x2 = centerX + Math.cos(angle) * radius;
                const y2 = centerY + Math.sin(angle) * radius;
                
                const color = colors[i % colors.length];
                
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = color;
                ctx.lineWidth = 3;
                
                if (glowEnabled) {
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = color;
                }
                
                ctx.stroke();
                
                // 镜像（反向）
                if (mirrorEnabled) {
                    ctx.globalAlpha = 0.3;
                    const x3 = centerX + Math.cos(angle + Math.PI) * 100;
                    const y3 = centerY + Math.sin(angle + Math.PI) * 100;
                    const x4 = centerX + Math.cos(angle + Math.PI) * radius;
                    const y4 = centerY + Math.sin(angle + Math.PI) * radius;
                    
                    ctx.beginPath();
                    ctx.moveTo(x3, y3);
                    ctx.lineTo(x4, y4);
                    ctx.stroke();
                    ctx.globalAlpha = 1;
                }
            }
            
            ctx.shadowBlur = 0;
        }
        
        // 绘制波形可视化
        function drawWave() {
            const colors = colorSchemes[currentColorScheme].colors;
            
            ctx.beginPath();
            ctx.moveTo(0, centerY);
            
            for (let i = 0; i < numBars; i++) {
                const x = (i / numBars) * width;
                const y = centerY + audioData[i] * 200 * sensitivity - 100;
                
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            
            const gradient = ctx.createLinearGradient(0, 0, width, 0);
            colors.forEach((color, i) => {
                gradient.addColorStop(i / (colors.length - 1), color);
            });
            
            ctx.strokeStyle = gradient;
            ctx.lineWidth = 3;
            
            if (glowEnabled) {
                ctx.shadowBlur = 20;
                ctx.shadowColor = colors[0];
            }
            
            ctx.stroke();
            
            // 镜像
            if (mirrorEnabled) {
                ctx.beginPath();
                for (let i = 0; i < numBars; i++) {
                    const x = (i / numBars) * width;
                    const y = centerY - audioData[i] * 200 * sensitivity + 100;
                    
                    if (i === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.globalAlpha = 0.5;
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
            
            ctx.shadowBlur = 0;
        }
        
        // 绘制频谱可视化
        function drawSpectrum() {
            const colors = colorSchemes[currentColorScheme].colors;
            
            for (let i = 0; i < numBars; i++) {
                const x = (i / numBars) * width;
                const barHeight = audioData[i] * height * 0.8 * sensitivity;
                
                const gradient = ctx.createLinearGradient(0, height, 0, height - barHeight);
                colors.forEach((color, j) => {
                    gradient.addColorStop(j / (colors.length - 1), color);
                });
                
                ctx.fillStyle = gradient;
                ctx.fillRect(x, height - barHeight, width / numBars - 2, barHeight);
                
                if (glowEnabled) {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = colors[0];
                    ctx.fillRect(x, height - barHeight, width / numBars - 2, barHeight);
                    ctx.shadowBlur = 0;
                }
            }
        }
        
        // 绘制背景
        function drawBackground() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, width, height);
        }
        
        // 初始化
        function init() {
            resize();
            window.addEventListener('resize', resize);
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }
        
        // 动画循环
        let lastTime = 0;
        const targetFPS = 60;
        const interval = 1000 / targetFPS;
        
        function animate(currentTime) {
            requestAnimationFrame(animate);
            
            const delta = currentTime - lastTime;
            if (delta < interval) return;
            lastTime = currentTime - (delta % interval);
            
            // FPS计算
            frameCount++;
            if (currentTime - lastFpsUpdate >= 1000) {
                currentFps = frameCount;
                frameCount = 0;
                lastFpsUpdate = currentTime;
                updateStats();
            }
            
            time += 0.016;
            
            // 绘制背景
            drawBackground();
            
            // 更新音频数据
            updateAudioData();
            
            // 根据模式绘制
            const mode = visualModes[currentMode].type;
            
            switch (mode) {
                case 'bars':
                    drawBars();
                    break;
                case 'circular':
                    drawCircular();
                    break;
                case 'wave':
                    drawWave();
                    break;
                case 'spectrum':
                    drawSpectrum();
                    break;
            }
            
            // 更新和绘制粒子
            particles = particles.filter(p => {
                const alive = p.update();
                if (alive) p.draw();
                return alive;
            });
            
            // 限制粒子数量
            if (particles.length > 200) {
                particles = particles.slice(-200);
            }
        }
        
        function updateStats() {
            const modeName = visualModes[currentMode].name;
            document.getElementById('stats').textContent = 
                `频段: ${numBars} | 模式: ${modeName} | FPS: ${currentFps}`;
            
            document.getElementById('audioInfo').textContent = 
                `灵敏度: ${sensitivity.toFixed(1)}x | 波形: 正弦`;
        }
        
        // 事件处理
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('click', () => {
            changeVisualMode();
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            sensitivity = Math.max(0.5, Math.min(2, sensitivity - e.deltaY * 0.001));
            updateStats();
        });
        
        // 控制函数
        function changeVisualMode() {
            currentMode = (currentMode + 1) % visualModes.length;
            updateStats();
        }
        
        function changeColorScheme() {
            currentColorScheme = (currentColorScheme + 1) % colorSchemes.length;
        }
        
        function toggleGlow() {
            glowEnabled = !glowEnabled;
            event.target.classList.toggle('active', !glowEnabled);
        }
        
        function toggleMirror() {
            mirrorEnabled = !mirrorEnabled;
            event.target.classList.toggle('active', !mirrorEnabled);
        }
        
        function toggleParticles() {
            particlesEnabled = !particlesEnabled;
            event.target.classList.toggle('active', !particlesEnabled);
            if (!particlesEnabled) particles = [];
        }
        
        function resetVisualizer() {
            sensitivity = 1;
            currentMode = 0;
            currentColorScheme = 0;
            glowEnabled = true;
            mirrorEnabled = true;
            particlesEnabled = true;
            particles = [];
            audioData = new Array(numBars).fill(0);
            
            document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
            updateStats();
        }
        
        // 启动
        init();
        animate(0);
    </script>
</body>
</html>
