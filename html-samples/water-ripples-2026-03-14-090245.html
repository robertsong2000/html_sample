<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水波纹 | Water Ripples</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #001122, #002244);
            font-family: 'Arial', sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(100, 200, 255, 0.8);
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 10px rgba(100, 200, 255, 0.5);
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(100, 200, 255, 0.9);
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="water"></canvas>
    <div class="title">Water Ripples</div>
    <div class="info">点击/移动创建波纹 | 滚轮调整波纹大小 | 双击切换颜色</div>
    
    <script>
        const canvas = document.getElementById('water');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let rippleSize = 1;
        let colorMode = 0;
        let time = 0;
        
        const colorModes = [
            { primary: '#00d4ff', secondary: '#0066cc', glow: '#00ffff' },
            { primary: '#ff6b9d', secondary: '#c44569', glow: '#ff8fab' },
            { primary: '#a55eea', secondary: '#8854d0', glow: '#d1a3ff' },
            { primary: '#26de81', secondary: '#20bf6b', glow: '#7bed9f' },
        ];
        
        // 波纹系统
        let ripples = [];
        
        class Ripple {
            constructor(x, y, size = 1) {
                this.x = x;
                this.y = y;
                this.radius = 0;
                this.maxRadius = 150 + 50 * size;
                this.speed = 2 + size * 0.5;
                this.alpha = 1;
                this.lineWidth = 2 + size;
                this.waves = 3 + Math.floor(size);
            }
            
            update() {
                this.radius += this.speed;
                this.alpha = 1 - (this.radius / this.maxRadius);
                return this.radius < this.maxRadius;
            }
            
            draw() {
                const colors = colorModes[colorMode];
                
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.strokeStyle = colors.primary;
                ctx.shadowBlur = 15;
                ctx.shadowColor = colors.glow;
                ctx.lineWidth = this.lineWidth;
                
                // 绘制多圈波纹
                for (let i = 0; i < this.waves; i++) {
                    const waveRadius = this.radius - i * 15;
                    if (waveRadius > 0) {
                        ctx.globalAlpha = this.alpha * (1 - i / this.waves);
                        ctx.beginPath();
                        ctx.arc(this.x, this.y, waveRadius, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                }
                
                ctx.restore();
            }
        }
        
        // 雨滴粒子
        let raindrops = [];
        
        class Raindrop {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = -10;
                this.speed = 3 + Math.random() * 5;
                this.length = 10 + Math.random() * 20;
                this.alpha = 0.3 + Math.random() * 0.3;
            }
            
            update() {
                this.y += this.speed;
                
                // 碰到水面产生波纹
                if (this.y > height * 0.6) {
                    if (Math.random() > 0.95) {
                        ripples.push(new Ripple(this.x, height * 0.6 + Math.random() * 50, 0.3));
                    }
                    this.reset();
                }
            }
            
            draw() {
                const colors = colorModes[colorMode];
                
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.strokeStyle = colors.secondary;
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x, this.y + this.length);
                ctx.stroke();
                ctx.restore();
            }
        }
        
        // 浮动粒子
        let particles = [];
        
        class Particle {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = height * 0.6 + Math.random() * height * 0.4;
                this.size = 1 + Math.random() * 2;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.3;
                this.alpha = 0.3 + Math.random() * 0.4;
                this.phase = Math.random() * Math.PI * 2;
            }
            
            update() {
                this.x += this.speedX + Math.sin(time + this.phase) * 0.3;
                this.y += this.speedY + Math.cos(time + this.phase) * 0.2;
                
                if (this.x < 0 || this.x > width || this.y < height * 0.5 || this.y > height) {
                    this.reset();
                }
            }
            
            draw() {
                const colors = colorModes[colorMode];
                
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = colors.primary;
                ctx.shadowBlur = 10;
                ctx.shadowColor = colors.glow;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        
        // 绘制水面
        function drawWaterSurface() {
            const colors = colorModes[colorMode];
            const waterY = height * 0.6;
            
            // 水面渐变
            const gradient = ctx.createLinearGradient(0, waterY, 0, height);
            gradient.addColorStop(0, colors.secondary + '40');
            gradient.addColorStop(0.3, colors.primary + '30');
            gradient.addColorStop(1, colors.secondary + '60');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, waterY, width, height - waterY);
            
            // 水面波纹线
            ctx.save();
            ctx.strokeStyle = colors.primary + '60';
            ctx.lineWidth = 1;
            
            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.globalAlpha = 0.3 - i * 0.05;
                
                for (let x = 0; x < width; x += 5) {
                    const y = waterY + i * 20 + Math.sin(x * 0.02 + time * 2 + i) * 5;
                    if (x === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }
                ctx.stroke();
            }
            ctx.restore();
            
            // 反射效果
            ctx.save();
            ctx.globalAlpha = 0.1;
            ctx.fillStyle = colors.glow;
            ctx.fillRect(0, waterY, width, 5);
            ctx.restore();
        }
        
        // 绘制背景
        function drawBackground() {
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#001122');
            gradient.addColorStop(0.6, '#002244');
            gradient.addColorStop(1, '#003366');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            // 星星/光点
            ctx.save();
            for (let i = 0; i < 50; i++) {
                const x = (i * 37) % width;
                const y = (i * 23) % (height * 0.5);
                const alpha = 0.3 + Math.sin(time * 2 + i) * 0.2;
                
                ctx.globalAlpha = alpha;
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(x, y, 1, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }
        
        function init() {
            resize();
            
            // 创建雨滴
            for (let i = 0; i < 100; i++) {
                const drop = new Raindrop();
                drop.y = Math.random() * height;
                raindrops.push(drop);
            }
            
            // 创建浮动粒子
            for (let i = 0; i < 80; i++) {
                particles.push(new Particle());
            }
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        function draw() {
            // 清除画布
            ctx.clearRect(0, 0, width, height);
            
            drawBackground();
            
            // 更新和绘制雨滴
            raindrops.forEach(drop => {
                drop.update();
                drop.draw();
            });
            
            drawWaterSurface();
            
            // 更新和绘制粒子
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            
            // 更新和绘制波纹
            ripples = ripples.filter(r => {
                r.draw();
                return r.update();
            });
            
            // 自动产生随机波纹
            if (Math.random() > 0.98) {
                ripples.push(new Ripple(
                    Math.random() * width,
                    height * 0.6 + Math.random() * 100,
                    Math.random() * 0.5
                ));
            }
            
            time += 0.016;
            
            requestAnimationFrame(draw);
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        canvas.addEventListener('click', (e) => {
            const y = e.clientY > height * 0.5 ? e.clientY : height * 0.6;
            ripples.push(new Ripple(e.clientX, y, rippleSize));
            
            // 多重波纹效果
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    ripples.push(new Ripple(
                        e.clientX + (Math.random() - 0.5) * 30,
                        y + (Math.random() - 0.5) * 30,
                        rippleSize * 0.5
                    ));
                }, i * 100);
            }
        });
        
        canvas.addEventListener('mousemove', (e) => {
            if (e.buttons === 1) {
                const y = e.clientY > height * 0.5 ? e.clientY : height * 0.6;
                ripples.push(new Ripple(e.clientX, y, rippleSize * 0.3));
            }
        });
        
        canvas.addEventListener('dblclick', () => {
            colorMode = (colorMode + 1) % colorModes.length;
        });
        
        window.addEventListener('wheel', (e) => {
            rippleSize += e.deltaY > 0 ? -0.2 : 0.2;
            rippleSize = Math.max(0.5, Math.min(3, rippleSize));
        });
        
        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const y = touch.clientY > height * 0.5 ? touch.clientY : height * 0.6;
            ripples.push(new Ripple(touch.clientX, y, rippleSize));
        }, { passive: false });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const y = touch.clientY > height * 0.5 ? touch.clientY : height * 0.6;
            if (Math.random() > 0.7) {
                ripples.push(new Ripple(touch.clientX, y, rippleSize * 0.3));
            }
        }, { passive: false });
        
        // 性能监控
        let lastTime = performance.now();
        let frames = 0;
        
        function checkFPS() {
            frames++;
            const currentTime = performance.now();
            if (currentTime - lastTime >= 1000) {
                if (frames < 55) {
                    if (raindrops.length > 50) raindrops = raindrops.slice(0, raindrops.length - 10);
                    if (particles.length > 40) particles = particles.slice(0, particles.length - 10);
                }
                frames = 0;
                lastTime = currentTime;
            }
            requestAnimationFrame(checkFPS);
        }
        
        init();
        draw();
        checkFPS();
    </script>
</body>
</html>
