<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星空效果 | Starry Sky</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            cursor: pointer;
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.9);
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 12px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 0 30px rgba(200, 220, 255, 0.8);
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
            text-align: center;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(200, 220, 255, 0.5);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
            text-align: right;
            line-height: 1.8;
        }
        
        @media (max-width: 768px) {
            .title {
                font-size: 24px;
                letter-spacing: 6px;
            }
            .info {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="title">星空效果</div>
    <canvas id="starry"></canvas>
    <div class="stats">
        <div>星星: <span id="starCount">0</span></div>
        <div>流星: <span id="meteorCount">0</span></div>
    </div>
    <div class="info">移动鼠标创造星座 · 点击触发流星雨</div>
    
    <script>
        const canvas = document.getElementById('starry');
        const ctx = canvas.getContext('2d');
        const starCountEl = document.getElementById('starCount');
        const meteorCountEl = document.getElementById('meteorCount');
        
        let width, height;
        let stars = [];
        let meteors = [];
        let constellations = [];
        let mouseX = 0, mouseY = 0;
        let time = 0;
        
        // 星星类
        class Star {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 2 + 0.5;
                this.brightness = Math.random();
                this.twinkleSpeed = Math.random() * 0.05 + 0.02;
                this.twinkleOffset = Math.random() * Math.PI * 2;
                this.layer = Math.floor(Math.random() * 3); // 0=远, 1=中, 2=近
                this.parallaxFactor = (this.layer + 1) * 0.02;
                
                // 星星颜色
                const colorTypes = [
                    { r: 255, g: 255, b: 255 },  // 白
                    { r: 255, g: 240, b: 220 },  // 暖白
                    { r: 200, g: 220, b: 255 },  // 蓝白
                    { r: 255, g: 200, b: 150 },  // 橙
                    { r: 255, g: 100, b: 100 },  // 红
                ];
                this.color = colorTypes[Math.floor(Math.random() * colorTypes.length)];
            }
            
            update() {
                // 闪烁
                this.brightness = 0.5 + Math.sin(time * this.twinkleSpeed + this.twinkleOffset) * 0.5;
                
                // 视差效果
                const parallaxX = (mouseX - width / 2) * this.parallaxFactor;
                const parallaxY = (mouseY - height / 2) * this.parallaxFactor;
                
                this.drawX = this.x + parallaxX;
                this.drawY = this.y + parallaxY;
            }
            
            draw() {
                const alpha = this.brightness * (0.5 + this.layer * 0.25);
                const size = this.size * (0.8 + this.layer * 0.2);
                
                // 光晕
                if (this.layer === 2 && this.brightness > 0.7) {
                    ctx.beginPath();
                    ctx.arc(this.drawX, this.drawY, size * 4, 0, Math.PI * 2);
                    const glowGradient = ctx.createRadialGradient(
                        this.drawX, this.drawY, 0,
                        this.drawX, this.drawY, size * 4
                    );
                    glowGradient.addColorStop(0, `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha * 0.3})`);
                    glowGradient.addColorStop(1, 'transparent');
                    ctx.fillStyle = glowGradient;
                    ctx.fill();
                }
                
                // 星星本体
                ctx.beginPath();
                ctx.arc(this.drawX, this.drawY, size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha})`;
                ctx.fill();
                
                // 十字光芒（亮星）
                if (this.layer === 2 && this.brightness > 0.8 && this.size > 1.5) {
                    const rayLength = size * 6;
                    ctx.strokeStyle = `rgba(${this.color.r}, ${this.color.g}, ${this.color.b}, ${alpha * 0.3})`;
                    ctx.lineWidth = 0.5;
                    
                    ctx.beginPath();
                    ctx.moveTo(this.drawX - rayLength, this.drawY);
                    ctx.lineTo(this.drawX + rayLength, this.drawY);
                    ctx.moveTo(this.drawX, this.drawY - rayLength);
                    ctx.lineTo(this.drawX, this.drawY + rayLength);
                    ctx.stroke();
                }
            }
        }
        
        // 流星类
        class Meteor {
            constructor() {
                this.reset();
            }
            
            reset() {
                this.x = Math.random() * width * 1.5;
                this.y = -50;
                this.length = 80 + Math.random() * 120;
                this.speed = 15 + Math.random() * 15;
                this.angle = Math.PI / 4 + (Math.random() - 0.5) * 0.3;
                this.life = 1;
                this.active = false;
            }
            
            activate() {
                this.active = true;
                this.x = Math.random() * width;
                this.y = -50;
            }
            
            update() {
                if (!this.active) return;
                
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;
                
                if (this.y > height + 100 || this.x > width + 100) {
                    this.active = false;
                    this.reset();
                }
            }
            
            draw() {
                if (!this.active) return;
                
                const endX = this.x - Math.cos(this.angle) * this.length;
                const endY = this.y - Math.sin(this.angle) * this.length;
                
                const gradient = ctx.createLinearGradient(this.x, this.y, endX, endY);
                gradient.addColorStop(0, 'rgba(255, 255, 255, 0.9)');
                gradient.addColorStop(0.3, 'rgba(200, 220, 255, 0.6)');
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(endX, endY);
                ctx.strokeStyle = gradient;
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.stroke();
                
                // 流星头部发光
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'rgba(200, 220, 255, 0.8)';
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }
        
        // 星座连线
        class Constellation {
            constructor() {
                this.stars = [];
                this.alpha = 0;
                this.fadeIn = false;
            }
            
            addStar(star) {
                if (this.stars.length < 5) {
                    this.stars.push(star);
                }
            }
            
            activate() {
                this.fadeIn = true;
            }
            
            update() {
                if (this.fadeIn) {
                    this.alpha = Math.min(1, this.alpha + 0.02);
                } else {
                    this.alpha = Math.max(0, this.alpha - 0.01);
                }
            }
            
            draw() {
                if (this.stars.length < 2 || this.alpha <= 0) return;
                
                ctx.beginPath();
                ctx.moveTo(this.stars[0].drawX, this.stars[0].drawY);
                
                for (let i = 1; i < this.stars.length; i++) {
                    ctx.lineTo(this.stars[i].drawX, this.stars[i].drawY);
                }
                
                ctx.strokeStyle = `rgba(100, 150, 255, ${this.alpha * 0.4})`;
                ctx.lineWidth = 1;
                ctx.stroke();
                
                // 节点
                this.stars.forEach(star => {
                    ctx.beginPath();
                    ctx.arc(star.drawX, star.drawY, 4, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(150, 200, 255, ${this.alpha * 0.6})`;
                    ctx.fill();
                });
            }
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        function initStars() {
            stars = [];
            const count = Math.floor((width * height) / 3000);
            
            for (let i = 0; i < count; i++) {
                stars.push(new Star());
            }
            
            starCountEl.textContent = count;
        }
        
        function initMeteors() {
            meteors = [];
            for (let i = 0; i < 10; i++) {
                meteors.push(new Meteor());
            }
        }
        
        function triggerMeteorShower() {
            let delay = 0;
            meteors.forEach((meteor, i) => {
                setTimeout(() => {
                    meteor.activate();
                }, delay);
                delay += 100 + Math.random() * 200;
            });
        }
        
        function createConstellation(x, y) {
            const constellation = new Constellation();
            
            // 找到附近的星星
            const nearbyStars = stars
                .map(star => ({
                    star,
                    dist: Math.hypot(star.x - x, star.y - y)
                }))
                .filter(s => s.dist < 200)
                .sort((a, b) => a.dist - b.dist)
                .slice(0, 4)
                .map(s => s.star);
            
            nearbyStars.forEach(star => constellation.addStar(star));
            constellation.activate();
            
            if (constellation.stars.length >= 2) {
                constellations.push(constellation);
            }
            
            // 限制星座数量
            if (constellations.length > 5) {
                constellations.shift();
            }
        }
        
        function drawBackground() {
            // 深空背景
            const gradient = ctx.createRadialGradient(
                width / 2, height / 2, 0,
                width / 2, height / 2, Math.max(width, height)
            );
            gradient.addColorStop(0, '#0a0a15');
            gradient.addColorStop(0.5, '#050510');
            gradient.addColorStop(1, '#000005');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            // 银河效果
            drawMilkyWay();
        }
        
        function drawMilkyWay() {
            const centerX = width * 0.3;
            const centerY = height * 0.4;
            
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(-Math.PI / 6);
            
            const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, Math.max(width, height) * 0.5);
            gradient.addColorStop(0, 'rgba(100, 80, 150, 0.1)');
            gradient.addColorStop(0.3, 'rgba(80, 60, 120, 0.05)');
            gradient.addColorStop(1, 'transparent');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(-width, -height * 0.2, width * 2, height * 0.4);
            
            ctx.restore();
        }
        
        function drawMoon() {
            const moonX = width * 0.85;
            const moonY = height * 0.15;
            const moonRadius = 25;
            
            // 月光
            const glowGradient = ctx.createRadialGradient(
                moonX, moonY, moonRadius,
                moonX, moonY, moonRadius * 8
            );
            glowGradient.addColorStop(0, 'rgba(255, 255, 230, 0.15)');
            glowGradient.addColorStop(1, 'transparent');
            
            ctx.beginPath();
            ctx.arc(moonX, moonY, moonRadius * 8, 0, Math.PI * 2);
            ctx.fillStyle = glowGradient;
            ctx.fill();
            
            // 月亮
            const moonGradient = ctx.createRadialGradient(
                moonX - moonRadius * 0.3, moonY - moonRadius * 0.3, 0,
                moonX, moonY, moonRadius
            );
            moonGradient.addColorStop(0, 'rgba(255, 255, 250, 1)');
            moonGradient.addColorStop(1, 'rgba(230, 230, 220, 0.9)');
            
            ctx.beginPath();
            ctx.arc(moonX, moonY, moonRadius, 0, Math.PI * 2);
            ctx.fillStyle = moonGradient;
            ctx.fill();
        }
        
        function animate() {
            drawBackground();
            drawMoon();
            
            // 更新星座
            constellations.forEach(c => {
                c.update();
                c.draw();
            });
            
            // 更新和绘制星星
            stars.forEach(star => {
                star.update();
                star.draw();
            });
            
            // 更新和绘制流星
            let activeMeteors = 0;
            meteors.forEach(meteor => {
                meteor.update();
                meteor.draw();
                if (meteor.active) activeMeteors++;
            });
            
            meteorCountEl.textContent = activeMeteors;
            
            // 随机流星
            if (Math.random() < 0.002) {
                const inactiveMeteor = meteors.find(m => !m.active);
                if (inactiveMeteor) {
                    inactiveMeteor.activate();
                }
            }
            
            time++;
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        function handleMouseMove(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
        }
        
        function handleTouchMove(e) {
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        }
        
        function handleClick(e) {
            triggerMeteorShower();
        }
        
        function handleDblClick(e) {
            createConstellation(e.clientX, e.clientY);
        }
        
        function handleTouchStart(e) {
            if (e.touches.length > 0) {
                createConstellation(e.touches[0].clientX, e.touches[0].clientY);
            }
        }
        
        // 初始化
        function init() {
            resize();
            initStars();
            initMeteors();
            
            window.addEventListener('resize', () => {
                resize();
                initStars();
            });
            
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('touchmove', handleTouchMove, { passive: true });
            canvas.addEventListener('click', handleClick);
            canvas.addEventListener('dblclick', handleDblClick);
            canvas.addEventListener('touchstart', handleTouchStart, { passive: true });
            
            // 检测 prefers-reduced-motion
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
            if (!prefersReducedMotion.matches) {
                animate();
            } else {
                // 静态渲染
                drawBackground();
                drawMoon();
                stars.forEach(star => {
                    star.drawX = star.x;
                    star.drawY = star.y;
                    star.draw();
                });
            }
        }
        
        init();
    </script>
</body>
</html>
