<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火焰效果 - Fire Effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 100, 50, 0.9);
            font-size: 48px;
            font-weight: bold;
            letter-spacing: 8px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 
                0 0 20px rgba(255, 100, 50, 1),
                0 0 40px rgba(255, 50, 0, 0.8),
                0 0 60px rgba(255, 0, 0, 0.6);
            animation: flicker 0.5s infinite alternate;
        }
        
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.95; }
            75% { opacity: 1; }
        }
        
        .controls {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 12px;
            z-index: 10;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 90%;
        }
        
        .btn {
            padding: 10px 20px;
            background: rgba(255, 100, 50, 0.2);
            border: 2px solid rgba(255, 100, 50, 0.5);
            color: rgba(255, 150, 100, 1);
            border-radius: 25px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            text-shadow: 0 0 10px rgba(255, 100, 50, 0.5);
        }
        
        .btn:hover {
            background: rgba(255, 100, 50, 0.3);
            border-color: rgba(255, 100, 50, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 100, 50, 0.5);
        }
        
        .btn.active {
            background: rgba(255, 100, 50, 0.4);
            box-shadow: 0 0 20px rgba(255, 100, 50, 0.8);
        }
        
        .info {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 200, 150, 0.6);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
            text-align: center;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 200, 150, 0.4);
            font-size: 11px;
            z-index: 10;
            pointer-events: none;
            text-align: right;
        }
        
        .intensity-display {
            position: fixed;
            bottom: 90px;
            left: 20px;
            color: rgba(255, 150, 100, 0.5);
            font-size: 11px;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="title">🔥 火焰 🔥</div>
    
    <div class="info">
        🖱️ 点击/拖动 - 点燃火焰 | 🎨 滚轮 - 调整火焰强度 | 💨 双击 - 火焰爆发
    </div>
    
    <div class="stats" id="stats">
        粒子数: 0 | 强度: 1.0x | FPS: 60
    </div>
    
    <div class="intensity-display" id="intensityDisplay">
        火焰温度: 800°C | 燃烧强度: 中等
    </div>
    
    <div class="controls">
        <button class="btn" onclick="changeFireType()">🔥 火焰类型</button>
        <button class="btn" onclick="toggleWind()">💨 风力效果</button>
        <button class="btn" onclick="toggleSparks()">✨ 火花效果</button>
        <button class="btn" onclick="toggleSmoke()">💨 烟雾效果</button>
        <button class="btn" onclick="createExplosion()">💥 火焰爆发</button>
        <button class="btn" onclick="resetFire()">🔄 重置火焰</button>
    </div>
    
    <canvas id="canvas"></canvas>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let mouseX = 0, mouseY = 0;
        let isMouseDown = false;
        let fireIntensity = 1;
        
        // 性能监控
        let frameCount = 0;
        let lastFpsUpdate = Date.now();
        let currentFps = 60;
        
        // 火焰配置
        const fireTypes = [
            { name: '经典火焰', colors: ['#ff0000', '#ff4400', '#ff8800', '#ffcc00', '#ffff66'] },
            { name: '蓝色火焰', colors: ['#0000ff', '#0066ff', '#00aaff', '#00ddff', '#aaffff'] },
            { name: '绿色火焰', colors: ['#00ff00', '#44ff00', '#88ff00', '#ccff00', '#ffff00'] },
            { name: '紫色火焰', colors: ['#8800ff', '#aa00ff', '#cc00ff', '#ff00ff', '#ff88ff'] },
            { name: '白色火焰', colors: ['#ffffff', '#ffffcc', '#ffffaa', '#ffff88', '#ffff66'] },
            { name: '彩虹火焰', colors: ['#ff0000', '#ff8800', '#ffff00', '#00ff00', '#00ffff', '#0088ff', '#8800ff'] }
        ];
        let currentFireType = 0;
        
        let windEnabled = false;
        let windStrength = 0;
        let windDirection = 1;
        
        let sparksEnabled = true;
        let smokeEnabled = true;
        
        // 火焰粒子
        class FireParticle {
            constructor(x, y, isExplosion = false) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * (isExplosion ? 10 : 2);
                this.vy = -(2 + Math.random() * 4) * fireIntensity * (isExplosion ? 2 : 1);
                this.size = 5 + Math.random() * 15 * fireIntensity;
                this.life = 1;
                this.decay = 0.01 + Math.random() * 0.02;
                this.colorIndex = 0;
                this.colors = fireTypes[currentFireType].colors;
                this.isExplosion = isExplosion;
            }
            
            update() {
                // 重力和上升力
                this.vy -= 0.05;
                
                // 风力影响
                if (windEnabled) {
                    this.vx += windStrength * windDirection * 0.1;
                }
                
                // 随机横向运动
                this.vx += (Math.random() - 0.5) * 0.3;
                
                this.x += this.vx;
                this.y += this.vy;
                
                // 减小尺寸
                this.size *= 0.98;
                
                // 生命衰减
                this.life -= this.decay;
                
                // 颜色变化（从黄到红到透明）
                this.colorIndex = Math.floor((1 - this.life) * (this.colors.length - 1));
                
                return this.life > 0 && this.size > 0.5;
            }
            
            draw() {
                const color = this.colors[Math.min(this.colorIndex, this.colors.length - 1)];
                
                // 发光效果
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size
                );
                
                gradient.addColorStop(0, color);
                gradient.addColorStop(0.5, this.adjustAlpha(color, this.life * 0.5));
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.globalAlpha = this.life;
                ctx.fill();
                ctx.globalAlpha = 1;
            }
            
            adjustAlpha(color, alpha) {
                if (color.startsWith('#')) {
                    const r = parseInt(color.slice(1, 3), 16);
                    const g = parseInt(color.slice(3, 5), 16);
                    const b = parseInt(color.slice(5, 7), 16);
                    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
                }
                return color;
            }
        }
        
        // 火花粒子
        class SparkParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 5;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed - 3;
                this.size = 1 + Math.random() * 2;
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.03;
                this.color = '#ffff00';
            }
            
            update() {
                this.vy += 0.1; // 重力
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                return this.life > 0;
            }
            
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life;
                ctx.fill();
                
                // 火花尾迹
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.x - this.vx * 2, this.y - this.vy * 2);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = this.size * 0.5;
                ctx.stroke();
                
                ctx.globalAlpha = 1;
            }
        }
        
        // 烟雾粒子
        class SmokeParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = -0.5 - Math.random() * 1;
                this.size = 10 + Math.random() * 20;
                this.life = 1;
                this.decay = 0.005 + Math.random() * 0.01;
                this.color = Math.random() > 0.5 ? '#666666' : '#888888';
            }
            
            update() {
                if (windEnabled) {
                    this.vx += windStrength * windDirection * 0.05;
                }
                
                this.x += this.vx;
                this.y += this.vy;
                this.size *= 1.01; // 慢慢扩大
                this.life -= this.decay;
                return this.life > 0;
            }
            
            draw() {
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size
                );
                
                const alpha = this.life * 0.3;
                gradient.addColorStop(0, `rgba(100, 100, 100, ${alpha})`);
                gradient.addColorStop(1, 'transparent');
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
        }
        
        let fireParticles = [];
        let sparkParticles = [];
        let smokeParticles = [];
        
        // 火焰源
        class FireSource {
            constructor(x, y, intensity = 1) {
                this.x = x;
                this.y = y;
                this.intensity = intensity;
                this.active = true;
                this.timer = 0;
            }
            
            update() {
                if (!this.active) return;
                
                this.timer++;
                
                // 生成火焰粒子
                const particleCount = Math.floor(3 * this.intensity * fireIntensity);
                for (let i = 0; i < particleCount; i++) {
                    const offsetX = (Math.random() - 0.5) * 30;
                    fireParticles.push(new FireParticle(
                        this.x + offsetX,
                        this.y
                    ));
                }
                
                // 生成火花
                if (sparksEnabled && Math.random() > 0.7) {
                    sparkParticles.push(new SparkParticle(
                        this.x + (Math.random() - 0.5) * 20,
                        this.y - 20
                    ));
                }
                
                // 生成烟雾
                if (smokeEnabled && Math.random() > 0.8) {
                    smokeParticles.push(new SmokeParticle(
                        this.x + (Math.random() - 0.5) * 30,
                        this.y - 50
                    ));
                }
            }
        }
        
        let fireSources = [];
        
        // 初始化
        function init() {
            resize();
            window.addEventListener('resize', resize);
            
            // 创建初始火焰源
            fireSources.push(new FireSource(width / 2, height - 50, 1.5));
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        // 绘制背景
        function drawBackground() {
            // 暗色渐变背景
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#000000');
            gradient.addColorStop(0.5, '#0a0500');
            gradient.addColorStop(1, '#1a0a00');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            // 火焰光晕效果
            if (fireParticles.length > 0) {
                fireSources.forEach(source => {
                    const glowGradient = ctx.createRadialGradient(
                        source.x, source.y, 0,
                        source.x, source.y, 200 * fireIntensity
                    );
                    glowGradient.addColorStop(0, 'rgba(255, 100, 50, 0.3)');
                    glowGradient.addColorStop(0.5, 'rgba(255, 50, 0, 0.1)');
                    glowGradient.addColorStop(1, 'transparent');
                    
                    ctx.fillStyle = glowGradient;
                    ctx.fillRect(0, 0, width, height);
                });
            }
        }
        
        // 动画循环
        let lastTime = 0;
        const targetFPS = 60;
        const interval = 1000 / targetFPS;
        
        function animate(currentTime) {
            requestAnimationFrame(animate);
            
            const delta = currentTime - lastTime;
            if (delta < interval) return;
            lastTime = currentTime - (delta % interval);
            
            // FPS计算
            frameCount++;
            if (currentTime - lastFpsUpdate >= 1000) {
                currentFps = frameCount;
                frameCount = 0;
                lastFpsUpdate = currentTime;
                updateStats();
            }
            
            // 更新风力
            if (windEnabled) {
                windStrength = Math.sin(currentTime * 0.001) * 2;
            }
            
            // 绘制背景
            drawBackground();
            
            // 更新和绘制烟雾（最底层）
            smokeParticles = smokeParticles.filter(p => {
                const alive = p.update();
                if (alive) p.draw();
                return alive;
            });
            
            // 更新火焰源
            fireSources.forEach(source => source.update());
            
            // 更新和绘制火焰粒子
            fireParticles = fireParticles.filter(p => {
                const alive = p.update();
                if (alive) p.draw();
                return alive;
            });
            
            // 更新和绘制火花
            sparkParticles = sparkParticles.filter(p => {
                const alive = p.update();
                if (alive) p.draw();
                return alive;
            });
            
            // 限制粒子数量
            if (fireParticles.length > 1000) {
                fireParticles = fireParticles.slice(-1000);
            }
            if (sparkParticles.length > 100) {
                sparkParticles = sparkParticles.slice(-100);
            }
            if (smokeParticles.length > 50) {
                smokeParticles = smokeParticles.slice(-50);
            }
        }
        
        function updateStats() {
            const totalParticles = fireParticles.length + sparkParticles.length + smokeParticles.length;
            document.getElementById('stats').textContent = 
                `粒子数: ${totalParticles} | 强度: ${fireIntensity.toFixed(1)}x | FPS: ${currentFps}`;
            
            const temp = Math.floor(600 + fireIntensity * 400);
            const intensityName = fireIntensity < 0.5 ? '微弱' : 
                                  fireIntensity < 1 ? '中等' : 
                                  fireIntensity < 1.5 ? '强烈' : '炽热';
            document.getElementById('intensityDisplay').textContent = 
                `火焰温度: ${temp}°C | 燃烧强度: ${intensityName}`;
        }
        
        // 创建火焰爆发
        function createExplosionAt(x, y) {
            for (let i = 0; i < 50; i++) {
                fireParticles.push(new FireParticle(x, y, true));
            }
            for (let i = 0; i < 20; i++) {
                sparkParticles.push(new SparkParticle(x, y));
            }
        }
        
        // 事件处理
        canvas.addEventListener('mousedown', (e) => {
            isMouseDown = true;
            fireSources.push(new FireSource(e.clientX, e.clientY, 0.8));
        });
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            if (isMouseDown && Math.random() > 0.7) {
                fireSources.push(new FireSource(e.clientX, e.clientY, 0.5));
            }
        });
        
        canvas.addEventListener('mouseup', () => {
            isMouseDown = false;
        });
        
        canvas.addEventListener('dblclick', (e) => {
            createExplosionAt(e.clientX, e.clientY);
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            fireIntensity = Math.max(0.3, Math.min(2.5, fireIntensity - e.deltaY * 0.001));
            updateStats();
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            fireSources.push(new FireSource(touch.clientX, touch.clientY, 0.8));
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            if (Math.random() > 0.7) {
                fireSources.push(new FireSource(touch.clientX, touch.clientY, 0.5));
            }
        });
        
        // 控制函数
        function changeFireType() {
            currentFireType = (currentFireType + 1) % fireTypes.length;
        }
        
        function toggleWind() {
            windEnabled = !windEnabled;
            event.target.classList.toggle('active', windEnabled);
        }
        
        function toggleSparks() {
            sparksEnabled = !sparksEnabled;
            event.target.classList.toggle('active', !sparksEnabled);
        }
        
        function toggleSmoke() {
            smokeEnabled = !smokeEnabled;
            event.target.classList.toggle('active', !smokeEnabled);
        }
        
        function createExplosion() {
            createExplosionAt(width / 2, height / 2);
        }
        
        function resetFire() {
            fireParticles = [];
            sparkParticles = [];
            smokeParticles = [];
            fireSources = [];
            fireIntensity = 1;
            currentFireType = 0;
            windEnabled = false;
            sparksEnabled = true;
            smokeEnabled = true;
            
            fireSources.push(new FireSource(width / 2, height - 50, 1.5));
            
            document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
            updateStats();
        }
        
        // 启动
        init();
        animate(0);
    </script>
</body>
</html>
