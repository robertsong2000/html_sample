<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometric Patterns - 几何图案</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.9);
            font-size: 14px;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255, 200, 100, 0.8);
            pointer-events: none;
        }

        .info span {
            display: block;
            margin: 5px 0;
        }

        @media (max-width: 768px) {
            .info {
                font-size: 12px;
                bottom: 10px;
                left: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="geometric"></canvas>
    <div class="info">
        <span>🖱️ 移动鼠标 - 改变图案参数</span>
        <span>👆 点击 - 生成新图案</span>
    </div>

    <script>
        const canvas = document.getElementById('geometric');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Mouse tracking
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouseX = e.touches[0].clientX;
            mouseY = e.touches[0].clientY;
        }, { passive: false });

        // Click to regenerate
        let patterns = [];
        let patternType = 0;

        canvas.addEventListener('click', () => {
            patternType = (patternType + 1) % 4;
            generatePatterns();
        });

        canvas.addEventListener('touchstart', () => {
            patternType = (patternType + 1) % 4;
            generatePatterns();
        });

        // Shape class
        class GeometricShape {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.originX = x;
                this.originY = y;
                this.type = type;
                this.size = 20 + Math.random() * 60;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
                this.hue = Math.random() * 360;
                this.sides = [3, 4, 5, 6, 8][Math.floor(Math.random() * 5)];
                this.alpha = 0.3 + Math.random() * 0.4;
                this.pulse = Math.random() * Math.PI * 2;
                this.pulseSpeed = 0.02 + Math.random() * 0.03;
                this.orbitRadius = Math.random() * 50;
                this.orbitAngle = Math.random() * Math.PI * 2;
                this.orbitSpeed = (Math.random() - 0.5) * 0.01;
            }

            update(time) {
                this.rotation += this.rotationSpeed;
                this.pulse += this.pulseSpeed;
                this.hue = (this.hue + 0.1) % 360;
                this.orbitAngle += this.orbitSpeed;

                // Orbit
                this.x = this.originX + Math.cos(this.orbitAngle) * this.orbitRadius;
                this.y = this.originY + Math.sin(this.orbitAngle) * this.orbitRadius;

                // Mouse influence
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const influence = 200;

                if (dist < influence) {
                    const force = (influence - dist) / influence;
                    this.rotationSpeed += force * 0.001;
                    this.size += force * 0.5;
                }

                // Dampen rotation
                this.rotationSpeed *= 0.99;
                this.size = Math.max(20, Math.min(100, this.size));
            }

            draw() {
                const pulseSize = this.size + Math.sin(this.pulse) * this.size * 0.1;
                const pulseAlpha = this.alpha + Math.sin(this.pulse) * 0.1;

                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                ctx.globalAlpha = pulseAlpha;

                // Glow
                ctx.shadowBlur = 15;
                ctx.shadowColor = `hsl(${this.hue}, 80%, 60%)`;

                switch (this.type) {
                    case 'polygon':
                        this.drawPolygon(pulseSize);
                        break;
                    case 'star':
                        this.drawStar(pulseSize);
                        break;
                    case 'spiral':
                        this.drawSpiral(pulseSize);
                        break;
                    case 'mandala':
                        this.drawMandala(pulseSize);
                        break;
                }

                ctx.restore();
            }

            drawPolygon(size) {
                ctx.beginPath();
                for (let i = 0; i <= this.sides; i++) {
                    const angle = (i * Math.PI * 2) / this.sides;
                    const x = Math.cos(angle) * size;
                    const y = Math.sin(angle) * size;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.strokeStyle = `hsl(${this.hue}, 80%, 60%)`;
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.fillStyle = `hsla(${this.hue}, 80%, 50%, 0.1)`;
                ctx.fill();
            }

            drawStar(size) {
                const points = this.sides;
                const innerRadius = size * 0.5;
                const outerRadius = size;

                ctx.beginPath();
                for (let i = 0; i < points * 2; i++) {
                    const radius = i % 2 === 0 ? outerRadius : innerRadius;
                    const angle = (i * Math.PI) / points;
                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.strokeStyle = `hsl(${this.hue}, 80%, 60%)`;
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.fillStyle = `hsla(${this.hue}, 80%, 50%, 0.1)`;
                ctx.fill();
            }

            drawSpiral(size) {
                ctx.beginPath();
                for (let i = 0; i < 100; i++) {
                    const angle = i * 0.2;
                    const radius = (i / 100) * size;
                    const x = Math.cos(angle) * radius;
                    const y = Math.sin(angle) * radius;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.strokeStyle = `hsl(${this.hue}, 80%, 60%)`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            drawMandala(size) {
                const layers = 3;
                for (let layer = 0; layer < layers; layer++) {
                    const layerSize = size * (1 - layer * 0.25);
                    const sides = this.sides + layer * 2;
                    
                    ctx.beginPath();
                    for (let i = 0; i <= sides; i++) {
                        const angle = (i * Math.PI * 2) / sides + layer * 0.2;
                        const x = Math.cos(angle) * layerSize;
                        const y = Math.sin(angle) * layerSize;
                        if (i === 0) ctx.moveTo(x, y);
                        else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    ctx.strokeStyle = `hsl(${this.hue + layer * 20}, 80%, 60%)`;
                    ctx.lineWidth = 1.5;
                    ctx.stroke();
                }
            }
        }

        // Generate patterns
        function generatePatterns() {
            patterns = [];
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const types = ['polygon', 'star', 'spiral', 'mandala'];

            switch (patternType) {
                case 0: // Grid
                    generateGrid(types);
                    break;
                case 1: // Radial
                    generateRadial(types);
                    break;
                case 2: // Spiral
                    generateSpiralPattern(types);
                    break;
                case 3: // Random
                    generateRandom(types);
                    break;
            }
        }

        function generateGrid(types) {
            const cols = 6;
            const rows = 4;
            const spacingX = canvas.width / (cols + 1);
            const spacingY = canvas.height / (rows + 1);

            for (let row = 1; row <= rows; row++) {
                for (let col = 1; col <= cols; col++) {
                    const x = col * spacingX;
                    const y = row * spacingY;
                    const type = types[(row + col) % types.length];
                    patterns.push(new GeometricShape(x, y, type));
                }
            }
        }

        function generateRadial(types) {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const rings = 4;
            const itemsPerRing = [1, 6, 12, 18];

            // Center
            patterns.push(new GeometricShape(centerX, centerY, 'mandala'));

            for (let ring = 1; ring <= rings; ring++) {
                const radius = ring * 80;
                const items = itemsPerRing[ring] || ring * 6;
                
                for (let i = 0; i < items; i++) {
                    const angle = (i / items) * Math.PI * 2;
                    const x = centerX + Math.cos(angle) * radius;
                    const y = centerY + Math.sin(angle) * radius;
                    const type = types[i % types.length];
                    patterns.push(new GeometricShape(x, y, type));
                }
            }
        }

        function generateSpiralPattern(types) {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const count = 30;

            for (let i = 0; i < count; i++) {
                const angle = i * 0.5;
                const radius = i * 10;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;
                const type = types[i % types.length];
                patterns.push(new GeometricShape(x, y, type));
            }
        }

        function generateRandom(types) {
            const count = 25;
            for (let i = 0; i < count; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                const type = types[Math.floor(Math.random() * types.length)];
                patterns.push(new GeometricShape(x, y, type));
            }
        }

        // Draw connections
        function drawConnections() {
            const maxDist = 150;

            for (let i = 0; i < patterns.length; i++) {
                for (let j = i + 1; j < patterns.length; j++) {
                    const dx = patterns[i].x - patterns[j].x;
                    const dy = patterns[i].y - patterns[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < maxDist) {
                        const alpha = (1 - dist / maxDist) * 0.2;
                        const hue = (patterns[i].hue + patterns[j].hue) / 2;

                        ctx.beginPath();
                        ctx.moveTo(patterns[i].x, patterns[i].y);
                        ctx.lineTo(patterns[j].x, patterns[j].y);
                        ctx.strokeStyle = `hsla(${hue}, 70%, 60%, ${alpha})`;
                        ctx.lineWidth = 1;
                        ctx.stroke();
                    }
                }
            }
        }

        // Background particles
        const bgParticles = [];
        for (let i = 0; i < 60; i++) {
            bgParticles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3,
                alpha: Math.random() * 0.3
            });
        }

        function drawBackground() {
            bgParticles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 200, 150, ${p.alpha})`;
                ctx.fill();
            });
        }

        // Animation loop
        let time = 0;

        function animate() {
            time++;

            // Clear with fade
            ctx.fillStyle = 'rgba(10, 5, 15, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Background
            drawBackground();

            // Connections
            drawConnections();

            // Update and draw patterns
            patterns.forEach(pattern => {
                pattern.update(time);
                pattern.draw();
            });

            // Mouse glow
            const glowGradient = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 100);
            glowGradient.addColorStop(0, 'rgba(255, 200, 100, 0.1)');
            glowGradient.addColorStop(1, 'transparent');
            ctx.fillStyle = glowGradient;
            ctx.fillRect(mouseX - 100, mouseY - 100, 200, 200);

            // Mode indicator
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.font = '12px monospace';
            const modeNames = ['Grid', 'Radial', 'Spiral', 'Random'];
            ctx.fillText(`Pattern: ${modeNames[patternType]}`, 10, canvas.height - 10);

            requestAnimationFrame(animate);
        }

        // Generate initial patterns
        generatePatterns();

        // Initial clear
        ctx.fillStyle = '#0a050f';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        animate();
    </script>
</body>
</html>
