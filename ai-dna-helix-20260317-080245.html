<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNA螺旋 - DNA Helix</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: radial-gradient(ellipse at center, #0d1117 0%, #010409 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(100, 255, 218, 0.9);
            font-size: 14px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(100, 255, 218, 0.3);
            max-width: 280px;
        }
        
        .info h3 {
            margin-bottom: 10px;
            font-size: 16px;
            color: #64ffda;
            text-shadow: 0 0 15px rgba(100, 255, 218, 0.6);
        }
        
        .info p {
            margin: 5px 0;
            font-size: 12px;
            line-height: 1.6;
        }
        
        .info .key {
            color: #ff79c6;
            font-weight: bold;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
        }
        
        @media (max-width: 600px) {
            .info {
                font-size: 12px;
                padding: 10px 15px;
                max-width: 220px;
            }
        }
    </style>
</head>
<body>
    <canvas id="dna"></canvas>
    
    <div class="info">
        <h3>🧬 DNA螺旋</h3>
        <p><span class="key">鼠标移动</span> - 控制旋转方向</p>
        <p><span class="key">点击</span> - 触发碱基配对动画</p>
        <p><span class="key">滚轮</span> - 调整螺旋密度</p>
        <p><span class="key">空格</span> - 切换颜色模式</p>
    </div>
    
    <div class="stats" id="stats">
        FPS: 60 | 碱基: 0
    </div>

    <script>
        const canvas = document.getElementById('dna');
        const ctx = canvas.getContext('2d');
        const statsEl = document.getElementById('stats');
        
        let width, height, centerX, centerY;
        let mouseX = 0, mouseY = 0;
        let rotationSpeed = 0.02;
        let density = 1;
        let colorMode = 0;
        
        // 颜色模式
        const colorModes = [
            {
                name: '经典生物',
                strand1: '#64ffda',
                strand2: '#ff79c6',
                baseA: '#ff6b6b',
                baseT: '#4ecdc4',
                baseG: '#ffe66d',
                baseC: '#95e1d3',
                bond: 'rgba(255, 255, 255, 0.3)'
            },
            {
                name: '赛博朋克',
                strand1: '#00ffff',
                strand2: '#ff00ff',
                baseA: '#ff3366',
                baseT: '#33ff99',
                baseG: '#ffcc00',
                baseC: '#00ccff',
                bond: 'rgba(255, 0, 255, 0.3)'
            },
            {
                name: '极光',
                strand1: '#a8e6cf',
                strand2: '#dcedc1',
                baseA: '#ffd3b6',
                baseT: '#ffaaa5',
                baseG: '#ff8b94',
                baseC: '#98ddca',
                bond: 'rgba(168, 230, 207, 0.3)'
            }
        ];
        
        // DNA节点
        class DNANode {
            constructor(index, total) {
                this.index = index;
                this.total = total;
                this.phase = (index / total) * Math.PI * 4;
                this.baseType = ['A', 'T', 'G', 'C'][Math.floor(Math.random() * 4)];
                this.paired = false;
                this.pairProgress = 0;
            }
            
            update(time, mouseInfluence) {
                // 基础旋转
                this.phase += rotationSpeed;
                
                // 鼠标影响
                this.mouseOffset = mouseInfluence * 0.5;
            }
            
            getPositions(yOffset, amplitude) {
                const x1 = Math.cos(this.phase + this.mouseOffset) * amplitude;
                const z1 = Math.sin(this.phase + this.mouseOffset);
                
                const x2 = Math.cos(this.phase + Math.PI + this.mouseOffset) * amplitude;
                const z2 = Math.sin(this.phase + Math.PI + this.mouseOffset);
                
                return { x1, z1, x2, z2 };
            }
        }
        
        // 粒子效果
        let particles = [];
        
        class Particle {
            constructor(x, y, color, vx, vy) {
                this.x = x;
                this.y = y;
                this.vx = vx || (Math.random() - 0.5) * 4;
                this.vy = vy || (Math.random() - 0.5) * 4;
                this.alpha = 1;
                this.color = color;
                this.size = Math.random() * 3 + 2;
                this.decay = 0.015 + Math.random() * 0.01;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.05;
                this.alpha -= this.decay;
                return this.alpha > 0;
            }
            
            draw(ctx) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.hexToRgba(this.color, this.alpha);
                ctx.fill();
            }
            
            hexToRgba(hex, alpha) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            }
        }
        
        // 配对动画粒子
        let pairingAnimations = [];
        
        class PairingAnimation {
            constructor(x, y, base1, base2, color) {
                this.x = x;
                this.y = y;
                this.base1 = base1;
                this.base2 = base2;
                this.color = color;
                this.progress = 0;
                this.complete = false;
            }
            
            update() {
                this.progress += 0.05;
                if (this.progress >= 1) {
                    this.complete = true;
                    // 产生粒子
                    for (let i = 0; i < 10; i++) {
                        particles.push(new Particle(this.x, this.y, this.color));
                    }
                }
                return !this.complete;
            }
            
            draw(ctx) {
                const alpha = 1 - this.progress;
                const scale = 1 + this.progress * 0.5;
                
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(scale, scale);
                ctx.globalAlpha = alpha;
                
                // 绘制连接线
                ctx.beginPath();
                ctx.moveTo(-30, 0);
                ctx.lineTo(30, 0);
                ctx.strokeStyle = this.color;
                ctx.lineWidth = 3;
                ctx.stroke();
                
                // 绘制碱基符号
                ctx.font = 'bold 16px Courier New';
                ctx.textAlign = 'center';
                ctx.fillStyle = this.color;
                ctx.fillText(this.base1 + '-' + this.base2, 0, 5);
                
                ctx.restore();
            }
        }
        
        let nodes = [];
        let time = 0;
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        
        function init() {
            resize();
            createNodes();
        }
        
        function resize() {
            const dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            
            ctx.scale(dpr, dpr);
            
            centerX = width / 2;
            centerY = height / 2;
        }
        
        function createNodes() {
            nodes = [];
            const nodeCount = Math.floor(30 * density);
            for (let i = 0; i < nodeCount; i++) {
                nodes.push(new DNANode(i, nodeCount));
            }
        }
        
        function triggerPairing(x, y) {
            const bases = ['A-T', 'T-A', 'G-C', 'C-G'];
            const colors = ['#ff6b6b', '#4ecdc4', '#ffe66d', '#95e1d3'];
            const idx = Math.floor(Math.random() * 4);
            
            pairingAnimations.push(new PairingAnimation(x, y, bases[idx][0], bases[idx][2], colors[idx]));
        }
        
        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }
        
        function animate(currentTime) {
            // FPS
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
            }
            
            time++;
            
            // 清除
            ctx.fillStyle = 'rgba(1, 4, 9, 0.15)';
            ctx.fillRect(0, 0, width, height);
            
            const colors = colorModes[colorMode];
            const mouseInfluence = ((mouseX - centerX) / width) * 2;
            const amplitude = Math.min(width, height) * 0.15;
            const nodeSpacing = height / (nodes.length + 1);
            
            // 绘制背景辉光
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, amplitude * 2);
            gradient.addColorStop(0, hexToRgba(colors.strand1, 0.1));
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            // 更新节点
            nodes.forEach(node => node.update(time, mouseInfluence));
            
            // 绘制DNA螺旋
            for (let i = 0; i < nodes.length; i++) {
                const node = nodes[i];
                const y = (i + 1) * nodeSpacing;
                const pos = node.getPositions(y, amplitude);
                
                // 深度排序
                const depth1 = (pos.z1 + 1) / 2;
                const depth2 = (pos.z2 + 1) / 2;
                
                // 绘制氢键连接
                if (pos.z1 > -0.3 && pos.z2 > -0.3) {
                    ctx.beginPath();
                    ctx.moveTo(centerX + pos.x1, y);
                    ctx.lineTo(centerX + pos.x2, y);
                    ctx.strokeStyle = colors.bond;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
                
                // 绘制链1节点
                if (pos.z1 > 0) {
                    drawNode(centerX + pos.x1, y, node.baseType, colors, 1, depth1);
                }
                
                // 绘制链2节点
                if (pos.z2 > 0) {
                    const pairedBase = getPairedBase(node.baseType);
                    drawNode(centerX + pos.x2, y, pairedBase, colors, 2, depth2);
                }
            }
            
            // 绘制被遮挡的节点（深度较小的）
            for (let i = 0; i < nodes.length; i++) {
                const node = nodes[i];
                const y = (i + 1) * nodeSpacing;
                const pos = node.getPositions(y, amplitude);
                
                const depth1 = (pos.z1 + 1) / 2;
                const depth2 = (pos.z2 + 1) / 2;
                
                if (pos.z1 <= 0) {
                    drawNode(centerX + pos.x1, y, node.baseType, colors, 1, depth1, true);
                }
                
                if (pos.z2 <= 0) {
                    const pairedBase = getPairedBase(node.baseType);
                    drawNode(centerX + pos.x2, y, pairedBase, colors, 2, depth2, true);
                }
            }
            
            // 绘制螺旋骨架线
            drawBackbone(amplitude, nodeSpacing, colors);
            
            // 更新和绘制配对动画
            pairingAnimations = pairingAnimations.filter(anim => {
                const alive = anim.update();
                if (alive) anim.draw(ctx);
                return alive;
            });
            
            // 更新和绘制粒子
            particles = particles.filter(p => {
                const alive = p.update();
                if (alive) p.draw(ctx);
                return alive;
            });
            
            // 更新统计
            statsEl.textContent = `FPS: ${fps} | 碱基: ${nodes.length * 2}`;
            
            requestAnimationFrame(animate);
        }
        
        function drawNode(x, y, baseType, colors, strand, depth, behind = false) {
            const size = 8 + depth * 8;
            const alpha = behind ? 0.3 : 0.6 + depth * 0.4;
            
            const strandColor = strand === 1 ? colors.strand1 : colors.strand2;
            const baseColor = getBaseColor(baseType, colors);
            
            // 外发光
            ctx.beginPath();
            ctx.arc(x, y, size + 5, 0, Math.PI * 2);
            ctx.fillStyle = hexToRgba(strandColor, alpha * 0.2);
            ctx.fill();
            
            // 主圆
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.fillStyle = hexToRgba(baseColor, alpha);
            ctx.fill();
            
            // 碱基标签
            if (!behind && size > 10) {
                ctx.font = `bold ${size}px Courier New`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fillText(baseType, x, y);
            }
        }
        
        function drawBackbone(amplitude, nodeSpacing, colors) {
            // 绘制两条螺旋线作为骨架
            ctx.beginPath();
            ctx.strokeStyle = hexToRgba(colors.strand1, 0.3);
            ctx.lineWidth = 3;
            
            for (let i = 0; i <= nodes.length; i++) {
                const phase = (i / nodes.length) * Math.PI * 4 + time * rotationSpeed;
                const x = centerX + Math.cos(phase) * amplitude;
                const y = (i + 0.5) * nodeSpacing;
                
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.stroke();
            
            ctx.beginPath();
            ctx.strokeStyle = hexToRgba(colors.strand2, 0.3);
            
            for (let i = 0; i <= nodes.length; i++) {
                const phase = (i / nodes.length) * Math.PI * 4 + Math.PI + time * rotationSpeed;
                const x = centerX + Math.cos(phase) * amplitude;
                const y = (i + 0.5) * nodeSpacing;
                
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.stroke();
        }
        
        function getPairedBase(base) {
            const pairs = { 'A': 'T', 'T': 'A', 'G': 'C', 'C': 'G' };
            return pairs[base];
        }
        
        function getBaseColor(base, colors) {
            const colorMap = {
                'A': colors.baseA,
                'T': colors.baseT,
                'G': colors.baseG,
                'C': colors.baseC
            };
            return colorMap[base];
        }
        
        // 事件监听
        window.addEventListener('resize', () => {
            resize();
        });
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('click', (e) => {
            triggerPairing(e.clientX, e.clientY);
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            density = Math.max(0.5, Math.min(2, density - e.deltaY * 0.001));
            createNodes();
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                colorMode = (colorMode + 1) % colorModes.length;
            }
        });
        
        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            triggerPairing(touch.clientX, touch.clientY);
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        });
        
        // 启动
        init();
        animate(performance.now());
    </script>
</body>
</html>
