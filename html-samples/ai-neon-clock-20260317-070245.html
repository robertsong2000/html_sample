<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹时钟 - Neon Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #0a0a0f;
            font-family: 'Orbitron', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            color: rgba(0, 255, 255, 0.9);
            font-size: 14px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 255, 0.3);
            max-width: 280px;
            font-family: 'Courier New', monospace;
        }
        
        .info h3 {
            margin-bottom: 10px;
            font-size: 16px;
            color: #0ff;
            text-shadow: 0 0 15px rgba(0, 255, 255, 0.8);
        }
        
        .info p {
            margin: 5px 0;
            font-size: 12px;
            line-height: 1.6;
        }
        
        .info .key {
            color: #ff00ff;
            font-weight: bold;
        }
        
        .stats {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
        }
        
        @media (max-width: 600px) {
            .info {
                font-size: 12px;
                padding: 10px 15px;
                max-width: 200px;
            }
            .info h3 {
                font-size: 14px;
            }
            .info p {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <canvas id="clock"></canvas>
    
    <div class="info">
        <h3>🕐 霓虹时钟</h3>
        <p><span class="key">移动鼠标</span> - 影响光晕方向</p>
        <p><span class="key">点击</span> - 切换颜色主题</p>
        <p><span class="key">滚轮</span> - 调整光晕强度</p>
        <p><span class="key">空格</span> - 切换显示模式</p>
    </div>
    
    <div class="stats" id="stats">
        FPS: 60 | 主题: 1
    </div>

    <script>
        const canvas = document.getElementById('clock');
        const ctx = canvas.getContext('2d');
        const statsEl = document.getElementById('stats');
        
        let width, height, centerX, centerY, radius;
        let mouseX = 0, mouseY = 0;
        let glowIntensity = 1;
        let currentTheme = 0;
        let displayMode = 0; // 0: 模拟+数字, 1: 纯模拟, 2: 纯数字
        
        // 颜色主题
        const themes = [
            { 
                name: '青色霓虹',
                primary: '#00ffff',
                secondary: '#ff00ff',
                accent: '#ffff00',
                bg: 'rgba(0, 255, 255, 0.1)'
            },
            { 
                name: '紫色梦境',
                primary: '#ff00ff',
                secondary: '#00ffff',
                accent: '#ff6600',
                bg: 'rgba(255, 0, 255, 0.1)'
            },
            { 
                name: '金色时光',
                primary: '#ffd700',
                secondary: '#ff4500',
                accent: '#00ff88',
                bg: 'rgba(255, 215, 0, 0.1)'
            },
            { 
                name: '翡翠森林',
                primary: '#00ff88',
                secondary: '#00ffcc',
                accent: '#ff00ff',
                bg: 'rgba(0, 255, 136, 0.1)'
            },
            { 
                name: '烈焰红唇',
                primary: '#ff3366',
                secondary: '#ff9900',
                accent: '#00ccff',
                bg: 'rgba(255, 51, 102, 0.1)'
            }
        ];
        
        // 粒子系统
        let particles = [];
        
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = (Math.random() - 0.5) * 3;
                this.alpha = 1;
                this.size = Math.random() * 3 + 1;
                this.color = color;
                this.decay = 0.02 + Math.random() * 0.02;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= this.decay;
                return this.alpha > 0;
            }
            
            draw(ctx) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.hexToRgba(this.color, this.alpha);
                ctx.fill();
            }
            
            hexToRgba(hex, alpha) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            }
        }
        
        // 性能统计
        let lastTime = performance.now();
        let frameCount = 0;
        let fps = 60;
        
        function init() {
            resize();
        }
        
        function resize() {
            const dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            
            ctx.scale(dpr, dpr);
            
            centerX = width / 2;
            centerY = height / 2;
            radius = Math.min(width, height) * 0.35;
        }
        
        function drawNeonCircle(x, y, r, color, lineWidth, glowSize) {
            const intensity = glowIntensity;
            
            // 外发光
            for (let i = glowSize; i > 0; i--) {
                ctx.beginPath();
                ctx.arc(x, y, r, 0, Math.PI * 2);
                ctx.strokeStyle = hexToRgba(color, 0.1 * intensity * (i / glowSize));
                ctx.lineWidth = lineWidth + i * 2;
                ctx.stroke();
            }
            
            // 主线条
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            ctx.shadowBlur = 20 * intensity;
            ctx.shadowColor = color;
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
        
        function drawNeonLine(x1, y1, x2, y2, color, lineWidth) {
            const intensity = glowIntensity;
            
            // 外发光
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = hexToRgba(color, 0.3 * intensity);
            ctx.lineWidth = lineWidth + 6;
            ctx.lineCap = 'round';
            ctx.stroke();
            
            // 主线条
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            ctx.shadowBlur = 15 * intensity;
            ctx.shadowColor = color;
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
        
        function hexToRgba(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }
        
        function drawClockFace(theme) {
            // 外圈
            drawNeonCircle(centerX, centerY, radius, theme.primary, 3, 8);
            
            // 内圈
            drawNeonCircle(centerX, centerY, radius * 0.85, hexToRgba(theme.primary, 0.3), 1, 3);
            
            // 刻度
            for (let i = 0; i < 60; i++) {
                const angle = (i * 6 - 90) * Math.PI / 180;
                const isHour = i % 5 === 0;
                
                const innerR = isHour ? radius * 0.8 : radius * 0.88;
                const outerR = radius * 0.95;
                
                const x1 = centerX + Math.cos(angle) * innerR;
                const y1 = centerY + Math.sin(angle) * innerR;
                const x2 = centerX + Math.cos(angle) * outerR;
                const y2 = centerY + Math.sin(angle) * outerR;
                
                const color = isHour ? theme.secondary : hexToRgba(theme.primary, 0.5);
                const width = isHour ? 3 : 1;
                
                drawNeonLine(x1, y1, x2, y2, color, width);
            }
            
            // 数字
            ctx.font = `bold ${radius * 0.12}px 'Courier New', monospace`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = theme.primary;
            ctx.shadowBlur = 10 * glowIntensity;
            ctx.shadowColor = theme.primary;
            
            for (let i = 1; i <= 12; i++) {
                const angle = (i * 30 - 90) * Math.PI / 180;
                const x = centerX + Math.cos(angle) * radius * 0.68;
                const y = centerY + Math.sin(angle) * radius * 0.68;
                ctx.fillText(i.toString(), x, y);
            }
            ctx.shadowBlur = 0;
        }
        
        function drawHand(angle, length, color, width, theme) {
            const rad = (angle - 90) * Math.PI / 180;
            const x = centerX + Math.cos(rad) * length;
            const y = centerY + Math.sin(rad) * length;
            
            drawNeonLine(centerX, centerY, x, y, color, width);
            
            // 指针尾部
            const tailLength = length * 0.2;
            const tailX = centerX - Math.cos(rad) * tailLength;
            const tailY = centerY - Math.sin(rad) * tailLength;
            drawNeonLine(centerX, centerY, tailX, tailY, hexToRgba(color, 0.5), width * 0.5);
        }
        
        function drawDigitalTime(hours, minutes, seconds, theme) {
            const timeStr = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            ctx.font = `bold ${radius * 0.25}px 'Courier New', monospace`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // 发光效果
            ctx.shadowBlur = 30 * glowIntensity;
            ctx.shadowColor = theme.primary;
            ctx.fillStyle = theme.primary;
            
            const yPos = displayMode === 2 ? centerY : centerY + radius * 0.5;
            ctx.fillText(timeStr, centerX, yPos);
            
            // 日期
            const date = new Date();
            const dateStr = `${date.getFullYear()}.${(date.getMonth() + 1).toString().padStart(2, '0')}.${date.getDate().toString().padStart(2, '0')}`;
            ctx.font = `${radius * 0.08}px 'Courier New', monospace`;
            ctx.fillStyle = hexToRgba(theme.secondary, 0.8);
            ctx.shadowColor = theme.secondary;
            ctx.fillText(dateStr, centerX, yPos + radius * 0.18);
            
            ctx.shadowBlur = 0;
        }
        
        function drawCenterDot(theme) {
            // 多层发光点
            const layers = [
                { r: 8, color: theme.accent, blur: 20 },
                { r: 5, color: '#fff', blur: 10 },
                { r: 3, color: '#fff', blur: 5 }
            ];
            
            layers.forEach(layer => {
                ctx.beginPath();
                ctx.arc(centerX, centerY, layer.r, 0, Math.PI * 2);
                ctx.fillStyle = layer.color;
                ctx.shadowBlur = layer.blur * glowIntensity;
                ctx.shadowColor = layer.color;
                ctx.fill();
            });
            
            ctx.shadowBlur = 0;
        }
        
        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }
        
        function animate(currentTime) {
            // FPS
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = currentTime;
            }
            
            // 清除
            ctx.fillStyle = 'rgba(10, 10, 15, 0.1)';
            ctx.fillRect(0, 0, width, height);
            
            const theme = themes[currentTheme];
            const now = new Date();
            const hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            const milliseconds = now.getMilliseconds();
            
            // 鼠标影响中心偏移
            const offsetX = (mouseX - centerX) * 0.02;
            const offsetY = (mouseY - centerY) * 0.02;
            
            // 绘制背景光晕
            const gradient = ctx.createRadialGradient(
                centerX + offsetX, centerY + offsetY, 0,
                centerX, centerY, radius * 1.5
            );
            gradient.addColorStop(0, theme.bg);
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            // 绘制时钟
            if (displayMode !== 2) {
                drawClockFace(theme);
                
                // 时针
                const hourAngle = (hours % 12) * 30 + minutes * 0.5;
                drawHand(hourAngle, radius * 0.5, theme.secondary, 6, theme);
                
                // 分针
                const minuteAngle = minutes * 6 + seconds * 0.1;
                drawHand(minuteAngle, radius * 0.7, theme.primary, 4, theme);
                
                // 秒针
                const secondAngle = seconds * 6 + milliseconds * 0.006;
                drawHand(secondAngle, radius * 0.85, theme.accent, 2, theme);
                
                // 秒针粒子效果
                if (milliseconds < 50) {
                    const rad = (secondAngle - 90) * Math.PI / 180;
                    const px = centerX + Math.cos(rad) * radius * 0.85;
                    const py = centerY + Math.sin(rad) * radius * 0.85;
                    createParticles(px, py, theme.accent, 3);
                }
                
                drawCenterDot(theme);
            }
            
            // 数字时钟
            if (displayMode !== 1) {
                drawDigitalTime(hours, minutes, seconds, theme);
            }
            
            // 更新和绘制粒子
            particles = particles.filter(p => {
                const alive = p.update();
                if (alive) p.draw(ctx);
                return alive;
            });
            
            // 限制粒子数量
            if (particles.length > 200) {
                particles = particles.slice(-200);
            }
            
            // 更新统计
            statsEl.textContent = `FPS: ${fps} | 主题: ${currentTheme + 1}`;
            
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        window.addEventListener('resize', resize);
        
        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('click', () => {
            currentTheme = (currentTheme + 1) % themes.length;
            createParticles(centerX, centerY, themes[currentTheme].primary, 30);
        });
        
        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            glowIntensity = Math.max(0.2, Math.min(2, glowIntensity - e.deltaY * 0.001));
        });
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                displayMode = (displayMode + 1) % 3;
            }
        });
        
        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            currentTheme = (currentTheme + 1) % themes.length;
            createParticles(centerX, centerY, themes[currentTheme].primary, 30);
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        });
        
        // 启动
        init();
        animate(performance.now());
    </script>
</body>
</html>
