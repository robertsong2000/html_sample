<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三体运动 - Three Body</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: radial-gradient(ellipse at center, #0a0a1a 0%, #000005 100%);
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(200, 180, 255, 0.7);
            font-size: 13px;
            z-index: 100;
            text-align: center;
            text-shadow: 0 0 10px rgba(150, 100, 255, 0.5);
        }
        
        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(200, 180, 255, 0.8);
            font-size: 12px;
            z-index: 100;
            text-align: right;
        }
        
        .controls div {
            margin: 5px 0;
            padding: 5px 12px;
            background: rgba(150, 100, 255, 0.1);
            border-radius: 15px;
            border: 1px solid rgba(200, 180, 255, 0.3);
        }
        
        .title {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(200, 180, 255, 0.8);
            font-size: 14px;
            letter-spacing: 5px;
            z-index: 100;
        }
        
        .fps {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: rgba(200, 180, 255, 0.5);
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="threeBody"></canvas>
    
    <div class="title">THREE BODY PROBLEM</div>
    
    <div class="controls">
        <div id="preset">预设: 经典</div>
        <div id="trails">轨迹: 500</div>
    </div>
    
    <div class="info">
        <span>🌌 拖动调整视角 | 滚轮缩放 | 点击重新生成 | 双击切换预设 | 右键切换颜色</span>
    </div>
    
    <div class="fps">FPS: <span id="fps">60</span></div>

    <script>
        // 配置
        const CONFIG = {
            G: 0.5,           // 引力常数
            TRAIL_LENGTH: 500,
            DT: 0.02,         // 时间步长
            SOFTENING: 10     // 软化参数，防止近距离发散
        };

        // 预设场景
        const presets = [
            { 
                name: '经典', 
                bodies: [
                    { x: 0, y: 0, vx: 0, vy: 0.3, mass: 100, color: '#ff6b6b' },
                    { x: 150, y: 0, vx: 0, vy: -0.5, mass: 100, color: '#4ecdc4' },
                    { x: -150, y: 0, vx: 0, vy: 0.2, mass: 100, color: '#ffe66d' }
                ]
            },
            { 
                name: '蝴蝶', 
                bodies: [
                    { x: -100, y: 0, vx: 0, vy: 0.5, mass: 80, color: '#ff9ff3' },
                    { x: 100, y: 0, vx: 0, vy: -0.5, mass: 80, color: '#54a0ff' },
                    { x: 0, y: 100, vx: 0.4, vy: 0, mass: 80, color: '#5f27cd' }
                ]
            },
            { 
                name: '8字形', 
                bodies: [
                    { x: -97, y: 0, vx: 0, vy: 0.466, mass: 100, color: '#00d2d3' },
                    { x: 97, y: 0, vx: 0, vy: 0.466, mass: 100, color: '#ff9f43' },
                    { x: 0, y: 0, vx: 0, vy: -0.932, mass: 100, color: '#ee5a24' }
                ]
            },
            { 
                name: '双星伴星', 
                bodies: [
                    { x: 0, y: 0, vx: 0.2, vy: 0, mass: 200, color: '#ff6b6b' },
                    { x: 0, y: 100, vx: -0.5, vy: 0, mass: 50, color: '#4ecdc4' },
                    { x: 0, y: -100, vx: 0.3, vy: 0, mass: 50, color: '#ffe66d' }
                ]
            },
            { 
                name: '混沌', 
                bodies: [
                    { x: Math.random() * 100 - 50, y: Math.random() * 100 - 50, vx: Math.random() * 0.4 - 0.2, vy: Math.random() * 0.4 - 0.2, mass: 100, color: '#ff6b6b' },
                    { x: Math.random() * 100 - 50, y: Math.random() * 100 - 50, vx: Math.random() * 0.4 - 0.2, vy: Math.random() * 0.4 - 0.2, mass: 100, color: '#4ecdc4' },
                    { x: Math.random() * 100 - 50, y: Math.random() * 100 - 50, vx: Math.random() * 0.4 - 0.2, vy: Math.random() * 0.4 - 0.2, mass: 100, color: '#ffe66d' }
                ]
            }
        ];

        // 配色方案
        const colorSchemes = [
            ['#ff6b6b', '#4ecdc4', '#ffe66d'],
            ['#a29bfe', '#fd79a8', '#00b894'],
            ['#e17055', '#74b9ff', '#00cec9'],
            ['#fdcb6e', '#6c5ce7', '#00b894'],
            ['#ff7675', '#55efc4', '#fdcb6e']
        ];

        // Canvas
        const canvas = document.getElementById('threeBody');
        const ctx = canvas.getContext('2d');
        
        let width, height, centerX, centerY;
        let bodies = [];
        let trails = [[], [], []];
        
        let currentPreset = 0;
        let currentScheme = 0;
        let scale = 1.5;
        let offsetX = 0, offsetY = 0;
        
        let isDragging = false;
        let dragStartX = 0, dragStartY = 0;
        let lastOffsetX = 0, lastOffsetY = 0;
        let time = 0;

        // 天体类
        class Body {
            constructor(config) {
                this.x = config.x;
                this.y = config.y;
                this.vx = config.vx;
                this.vy = config.vy;
                this.mass = config.mass;
                this.color = config.color;
                this.trail = [];
            }

            update(bodies, dt) {
                let ax = 0, ay = 0;
                
                bodies.forEach(other => {
                    if (other === this) return;
                    
                    const dx = other.x - this.x;
                    const dy = other.y - this.y;
                    const distSq = dx * dx + dy * dy + CONFIG.SOFTENING;
                    const dist = Math.sqrt(distSq);
                    
                    const force = CONFIG.G * other.mass / distSq;
                    ax += force * dx / dist;
                    ay += force * dy / dist;
                });
                
                this.vx += ax * dt;
                this.vy += ay * dt;
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                
                // 记录轨迹
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > CONFIG.TRAIL_LENGTH) {
                    this.trail.shift();
                }
            }

            draw(ctx, scale, offsetX, offsetY) {
                const screenX = centerX + (this.x + offsetX) * scale;
                const screenY = centerY + (this.y + offsetY) * scale;
                
                // 绘制轨迹
                if (this.trail.length > 1) {
                    ctx.beginPath();
                    for (let i = 0; i < this.trail.length; i++) {
                        const tx = centerX + (this.trail[i].x + offsetX) * scale;
                        const ty = centerY + (this.trail[i].y + offsetY) * scale;
                        
                        if (i === 0) {
                            ctx.moveTo(tx, ty);
                        } else {
                            ctx.lineTo(tx, ty);
                        }
                    }
                    
                    const gradient = ctx.createLinearGradient(
                        centerX + (this.trail[0].x + offsetX) * scale,
                        centerY + (this.trail[0].y + offsetY) * scale,
                        screenX, screenY
                    );
                    gradient.addColorStop(0, 'rgba(255, 255, 255, 0)');
                    gradient.addColorStop(1, this.color);
                    
                    ctx.strokeStyle = gradient;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
                
                // 绘制光晕
                const glowGradient = ctx.createRadialGradient(
                    screenX, screenY, 0,
                    screenX, screenY, 30 * scale
                );
                glowGradient.addColorStop(0, this.color);
                glowGradient.addColorStop(0.3, this.color.replace(')', ', 0.3)').replace('rgb', 'rgba'));
                glowGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                
                ctx.beginPath();
                ctx.arc(screenX, screenY, 30 * scale, 0, Math.PI * 2);
                ctx.fillStyle = glowGradient;
                ctx.fill();
                
                // 绘制天体
                const radius = Math.sqrt(this.mass) * 0.5;
                ctx.beginPath();
                ctx.arc(screenX, screenY, radius * scale, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 20;
                ctx.shadowColor = this.color;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // 初始化
        function init() {
            resize();
            loadPreset(currentPreset);
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        function loadPreset(index) {
            const preset = presets[index];
            const colors = colorSchemes[currentScheme];
            
            bodies = preset.bodies.map((config, i) => {
                return new Body({
                    ...config,
                    color: colors[i % colors.length]
                });
            });
            
            // 清空轨迹
            bodies.forEach(body => body.trail = []);
            
            document.getElementById('preset').textContent = `预设: ${preset.name}`;
            updateTrailCount();
        }

        function updateTrailCount() {
            const maxTrail = Math.max(...bodies.map(b => b.trail.length));
            document.getElementById('trails').textContent = `轨迹: ${maxTrail}`;
        }

        // 绘制背景星星
        let stars = [];
        function initStars() {
            stars = [];
            for (let i = 0; i < 200; i++) {
                stars.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    size: Math.random() * 1.5,
                    alpha: Math.random() * 0.5 + 0.3
                });
            }
        }

        function drawStars() {
            stars.forEach(star => {
                const twinkle = Math.sin(time * 0.05 + star.x) * 0.2 + 0.8;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha * twinkle})`;
                ctx.fill();
            });
        }

        // 绘制引力场
        function drawGravityField() {
            const gridSize = 30;
            const step = 20;
            
            for (let x = 0; x < width; x += step) {
                for (let y = 0; y < height; y += step) {
                    const worldX = (x - centerX) / scale - offsetX;
                    const worldY = (y - centerY) / scale - offsetY;
                    
                    let fx = 0, fy = 0;
                    bodies.forEach(body => {
                        const dx = body.x - worldX;
                        const dy = body.y - worldY;
                        const distSq = dx * dx + dy * dy + CONFIG.SOFTENING;
                        const dist = Math.sqrt(distSq);
                        const force = CONFIG.G * body.mass / distSq;
                        fx += force * dx / dist;
                        fy += force * dy / dist;
                    });
                    
                    const magnitude = Math.sqrt(fx * fx + fy * fy);
                    const alpha = Math.min(magnitude * 0.5, 0.3);
                    
                    if (alpha > 0.01) {
                        ctx.beginPath();
                        ctx.arc(x, y, 2, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(150, 100, 255, ${alpha})`;
                        ctx.fill();
                    }
                }
            }
        }

        // FPS计算
        let lastTime = performance.now();
        let frameCount = 0;

        // 动画循环
        function animate(currentTime) {
            time++;
            
            // FPS
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                lastTime = currentTime;
            }

            // 清空画布
            ctx.fillStyle = 'rgba(5, 5, 15, 0.3)';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制星星
            if (time % 60 === 0) initStars();
            drawStars();
            
            // 更新天体（多次迭代提高精度）
            for (let i = 0; i < 3; i++) {
                bodies.forEach(body => body.update(bodies, CONFIG.DT / 3));
            }
            
            // 绘制引力场（性能优化：间隔绘制）
            if (time % 3 === 0) {
                drawGravityField();
            }
            
            // 绘制天体
            bodies.forEach(body => body.draw(ctx, scale, offsetX, offsetY));
            
            // 更新轨迹计数
            if (time % 30 === 0) updateTrailCount();

            requestAnimationFrame(animate);
        }

        // 事件监听
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousedown', (e) => {
            if (e.button === 0) {
                isDragging = true;
                dragStartX = e.clientX;
                dragStartY = e.clientY;
                lastOffsetX = offsetX;
                lastOffsetY = offsetY;
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                offsetX = lastOffsetX + (e.clientX - dragStartX) / scale;
                offsetY = lastOffsetY + (e.clientY - dragStartY) / scale;
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            if (e.button === 0) {
                const moved = Math.abs(e.clientX - dragStartX) > 5 || Math.abs(e.clientY - dragStartY) > 5;
                if (!moved) {
                    // 点击重新生成（使用混沌模式）
                    currentPreset = 4;
                    loadPreset(currentPreset);
                }
            }
            isDragging = false;
        });

        canvas.addEventListener('dblclick', () => {
            currentPreset = (currentPreset + 1) % presets.length;
            loadPreset(currentPreset);
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            scale = Math.max(0.5, Math.min(5, scale - Math.sign(e.deltaY) * 0.1));
        });

        canvas.addEventListener('contextmenu', (e) => {
            e.preventDefault();
            currentScheme = (currentScheme + 1) % colorSchemes.length;
            loadPreset(currentPreset);
        });

        // 触摸支持
        let touchStartDist = 0;
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (e.touches.length === 1) {
                isDragging = true;
                dragStartX = e.touches[0].clientX;
                dragStartY = e.touches[0].clientY;
                lastOffsetX = offsetX;
                lastOffsetY = offsetY;
            } else if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                touchStartDist = Math.sqrt(dx * dx + dy * dy);
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length === 1 && isDragging) {
                offsetX = lastOffsetX + (e.touches[0].clientX - dragStartX) / scale;
                offsetY = lastOffsetY + (e.touches[0].clientY - dragStartY) / scale;
            } else if (e.touches.length === 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (touchStartDist > 0) {
                    scale *= dist / touchStartDist;
                    scale = Math.max(0.5, Math.min(5, scale));
                }
                touchStartDist = dist;
            }
        });

        canvas.addEventListener('touchend', () => {
            isDragging = false;
            touchStartDist = 0;
        });

        // 键盘支持
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                currentPreset = (currentPreset + 1) % presets.length;
                loadPreset(currentPreset);
            } else if (e.code === 'KeyR') {
                loadPreset(currentPreset);
            } else if (e.code === 'KeyC') {
                currentScheme = (currentScheme + 1) % colorSchemes.length;
                loadPreset(currentPreset);
            }
        });

        // 启动
        init();
        initStars();
        animate(0);
    </script>
</body>
</html>
