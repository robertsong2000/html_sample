<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>烟花盛宴 | Fireworks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .ui {
            position: fixed;
            z-index: 10;
            color: rgba(255, 255, 255, 0.8);
            pointer-events: none;
        }
        
        .title {
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 12px;
            text-shadow: 
                0 0 20px rgba(255, 200, 100, 0.8),
                0 0 40px rgba(255, 100, 50, 0.5);
            animation: glow 3s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }
        
        .info {
            bottom: 25px;
            left: 25px;
            font-size: 13px;
            line-height: 1.8;
            text-shadow: 0 0 10px rgba(255, 200, 100, 0.5);
            opacity: 0.7;
        }
        
        .stats {
            top: 25px;
            right: 25px;
            font-size: 11px;
            font-family: 'Courier New', monospace;
            text-align: right;
            text-shadow: 0 0 5px rgba(255, 200, 100, 0.5);
            opacity: 0.6;
        }
        
        .ground {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: linear-gradient(to top, rgba(20, 30, 50, 0.9), transparent);
            pointer-events: none;
            z-index: 5;
        }
        
        @media (max-width: 768px) {
            .title {
                font-size: 20px;
                letter-spacing: 6px;
            }
            .info {
                font-size: 11px;
                bottom: 15px;
                left: 15px;
            }
            .stats {
                font-size: 9px;
                top: 15px;
                right: 15px;
            }
        }
    </style>
</head>
<body>
    <canvas id="fireworks"></canvas>
    <div class="ground"></div>
    
    <div class="ui title">FIREWORKS</div>
    
    <div class="ui stats">
        <div id="particles">Particles: 0</div>
        <div id="fireworks-count">Fireworks: 0</div>
        <div id="fps">FPS: 60</div>
    </div>
    
    <div class="ui info">
        点击发射烟花<br>
        拖动连续发射<br>
        空格键自动模式
    </div>
    
    <script>
        const canvas = document.getElementById('fireworks');
        const ctx = canvas.getContext('2d');
        
        let width, height;
        let time = 0;
        let lastTime = performance.now();
        let fps = 60;
        let autoMode = false;
        
        // 烟花数组
        let fireworks = [];
        let particles = [];
        let stars = [];
        
        // 颜色方案
        const colorSchemes = [
            ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff'],
            ['#ff4757', '#ffa502', '#2ed573', '#1e90ff', '#ff6b81'],
            ['#e74c3c', '#f39c12', '#9b59b6', '#3498db', '#1abc9c'],
            ['#fd79a8', '#fdcb6e', '#6c5ce7', '#00cec9', '#e17055']
        ];
        
        // 烟花类
        class Firework {
            constructor(x, targetY) {
                this.x = x;
                this.y = height;
                this.targetY = targetY;
                this.speed = 8 + Math.random() * 4;
                this.angle = -Math.PI / 2 + (Math.random() - 0.5) * 0.3;
                this.vx = Math.cos(this.angle) * this.speed;
                this.vy = Math.sin(this.angle) * this.speed;
                this.gravity = 0.05;
                this.trail = [];
                this.trailLength = 10;
                this.color = colorSchemes[Math.floor(Math.random() * colorSchemes.length)];
                this.brightness = 0.8 + Math.random() * 0.2;
            }
            
            update() {
                // 添加尾迹
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.trailLength) {
                    this.trail.shift();
                }
                
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                
                // 到达目标高度或速度减慢时爆炸
                return this.vy >= 0 || this.y <= this.targetY;
            }
            
            draw() {
                // 绘制尾迹
                for (let i = 0; i < this.trail.length; i++) {
                    const alpha = (i / this.trail.length) * this.brightness;
                    const size = 2 + (i / this.trail.length) * 2;
                    
                    ctx.beginPath();
                    ctx.arc(this.trail[i].x, this.trail[i].y, size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 200, 100, ${alpha})`;
                    ctx.fill();
                }
                
                // 绘制头部
                ctx.beginPath();
                ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 200, ${this.brightness})`;
                ctx.fill();
                
                // 发光效果
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, 20);
                gradient.addColorStop(0, 'rgba(255, 200, 100, 0.5)');
                gradient.addColorStop(1, 'transparent');
                ctx.beginPath();
                ctx.arc(this.x, this.y, 20, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
            
            explode() {
                const particleCount = 80 + Math.floor(Math.random() * 60);
                const pattern = Math.floor(Math.random() * 4); // 0: 圆形, 1: 心形, 2: 星形, 3: 随机
                
                for (let i = 0; i < particleCount; i++) {
                    let angle, speed;
                    
                    switch (pattern) {
                        case 0: // 圆形
                            angle = (Math.PI * 2 / particleCount) * i;
                            speed = 3 + Math.random() * 5;
                            break;
                        case 1: // 心形
                            const t = (Math.PI * 2 / particleCount) * i;
                            angle = t;
                            speed = 3 + Math.random() * 3;
                            break;
                        case 2: // 星形
                            angle = (Math.PI * 2 / particleCount) * i;
                            speed = (i % 2 === 0) ? 6 + Math.random() * 3 : 2 + Math.random() * 2;
                            break;
                        default: // 随机
                            angle = Math.random() * Math.PI * 2;
                            speed = 2 + Math.random() * 6;
                    }
                    
                    const color = this.color[Math.floor(Math.random() * this.color.length)];
                    particles.push(new Particle(this.x, this.y, angle, speed, color));
                }
                
                // 添加闪光粒子
                for (let i = 0; i < 20; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 1 + Math.random() * 2;
                    particles.push(new Particle(this.x, this.y, angle, speed, '#ffffff', true));
                }
            }
        }
        
        // 粒子类
        class Particle {
            constructor(x, y, angle, speed, color, isSparkle = false) {
                this.x = x;
                this.y = y;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.color = color;
                this.alpha = 1;
                this.decay = isSparkle ? 0.05 : 0.015 + Math.random() * 0.01;
                this.gravity = 0.05;
                this.size = isSparkle ? 2 : 3 + Math.random() * 2;
                this.isSparkle = isSparkle;
                this.trail = [];
                this.trailLength = isSparkle ? 3 : 8;
            }
            
            update() {
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.trailLength) {
                    this.trail.shift();
                }
                
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.vx *= 0.99;
                this.vy *= 0.99;
                this.alpha -= this.decay;
                
                return this.alpha > 0;
            }
            
            draw() {
                // 绘制尾迹
                if (!this.isSparkle) {
                    for (let i = 0; i < this.trail.length; i++) {
                        const trailAlpha = (i / this.trail.length) * this.alpha * 0.5;
                        const trailSize = this.size * (i / this.trail.length);
                        
                        ctx.beginPath();
                        ctx.arc(this.trail[i].x, this.trail[i].y, trailSize, 0, Math.PI * 2);
                        ctx.fillStyle = this.hexToRgba(this.color, trailAlpha);
                        ctx.fill();
                    }
                }
                
                // 绘制粒子
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.hexToRgba(this.color, this.alpha);
                ctx.fill();
                
                // 发光效果
                if (!this.isSparkle) {
                    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 3);
                    gradient.addColorStop(0, this.hexToRgba(this.color, this.alpha * 0.5));
                    gradient.addColorStop(1, 'transparent');
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                    ctx.fillStyle = gradient;
                    ctx.fill();
                }
            }
            
            hexToRgba(hex, alpha) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            }
        }
        
        // 星星类
        class Star {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height * 0.6;
                this.size = Math.random() * 2 + 0.5;
                this.twinkle = Math.random() * Math.PI * 2;
                this.speed = 0.02 + Math.random() * 0.05;
            }
            
            update() {
                this.twinkle += this.speed;
            }
            
            draw() {
                const alpha = 0.3 + Math.sin(this.twinkle) * 0.3;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.fill();
            }
        }
        
        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            
            // 初始化星星
            stars = [];
            const starCount = Math.min(150, Math.floor(width * height / 8000));
            for (let i = 0; i < starCount; i++) {
                stars.push(new Star());
            }
        }
        
        function launchFirework(x, targetY) {
            if (typeof targetY === 'undefined') {
                targetY = height * 0.2 + Math.random() * height * 0.3;
            }
            fireworks.push(new Firework(x, targetY));
        }
        
        function updateStats() {
            document.getElementById('particles').textContent = `Particles: ${particles.length}`;
            document.getElementById('fireworks-count').textContent = `Fireworks: ${fireworks.length}`;
            
            const now = performance.now();
            const delta = now - lastTime;
            lastTime = now;
            fps = Math.round(1000 / delta);
            document.getElementById('fps').textContent = `FPS: ${fps}`;
        }
        
        function animate() {
            time++;
            
            // 半透明背景实现拖尾
            ctx.fillStyle = 'rgba(10, 10, 26, 0.15)';
            ctx.fillRect(0, 0, width, height);
            
            // 绘制星星
            stars.forEach(star => {
                star.update();
                star.draw();
            });
            
            // 更新和绘制烟花
            fireworks = fireworks.filter(firework => {
                const exploded = firework.update();
                firework.draw();
                
                if (exploded) {
                    firework.explode();
                    return false;
                }
                return true;
            });
            
            // 更新和绘制粒子
            particles = particles.filter(particle => {
                const alive = particle.update();
                particle.draw();
                return alive;
            });
            
            // 自动模式
            if (autoMode && Math.random() < 0.03) {
                launchFirework(Math.random() * width);
            }
            
            updateStats();
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        window.addEventListener('resize', init);
        
        canvas.addEventListener('click', (e) => {
            launchFirework(e.clientX, e.clientY);
        });
        
        let isDragging = false;
        let lastLaunchTime = 0;
        
        canvas.addEventListener('mousedown', () => isDragging = true);
        canvas.addEventListener('mouseup', () => isDragging = false);
        canvas.addEventListener('mouseleave', () => isDragging = false);
        
        canvas.addEventListener('mousemove', (e) => {
            if (isDragging && Date.now() - lastLaunchTime > 200) {
                launchFirework(e.clientX);
                lastLaunchTime = Date.now();
            }
        });
        
        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (e.touches.length > 0) {
                launchFirework(e.touches[0].clientX, e.touches[0].clientY);
            }
        });
        
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length > 0 && Date.now() - lastLaunchTime > 200) {
                launchFirework(e.touches[0].clientX);
                lastLaunchTime = Date.now();
            }
        });
        
        // 键盘控制
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                autoMode = !autoMode;
            }
        });
        
        // 初始化
        init();
        animate();
        
        // 初始烟花
        setTimeout(() => launchFirework(width / 2), 500);
        setTimeout(() => launchFirework(width / 3), 1000);
        setTimeout(() => launchFirework(width * 2 / 3), 1500);
    </script>
</body>
</html>
