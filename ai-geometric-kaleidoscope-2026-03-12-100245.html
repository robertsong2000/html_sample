<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>几何万花筒 - Geometric Kaleidoscope</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            z-index: 100;
            text-align: center;
            pointer-events: none;
        }
        
        .controls {
            position: fixed;
            top: 20px;
            right: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            z-index: 100;
            text-align: right;
        }
        
        .controls div {
            margin: 5px 0;
            padding: 5px 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            backdrop-filter: blur(5px);
        }
        
        .fps {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            font-family: monospace;
            z-index: 100;
        }
    </style>
</head>
<body>
    <canvas id="kaleidoscope"></canvas>
    
    <div class="info">
        <span>🖱️ 移动鼠标旋转万花筒 | 点击改变图案 | 滚轮调整对称轴 | 双击切换配色</span>
    </div>
    
    <div class="controls">
        <div id="segments">对称轴: 8</div>
        <div id="palette">配色: 彩虹</div>
    </div>
    
    <div class="fps">FPS: <span id="fps">60</span></div>

    <script>
        // 配置
        const CONFIG = {
            MIN_SEGMENTS: 3,
            MAX_SEGMENTS: 16,
            SHAPE_COUNT: 15,
            TRAIL_ALPHA: 0.08
        };

        // 配色方案
        const palettes = [
            { name: '彩虹', colors: ['#ff0040', '#ff8000', '#ffff00', '#00ff00', '#00ffff', '#0080ff', '#8000ff', '#ff00ff'] },
            { name: '日落', colors: ['#ff4500', '#ff6347', '#ff7f50', '#ffa07a', '#ffb347', '#ffd700', '#ff8c00', '#ff4500'] },
            { name: '海洋', colors: ['#006994', '#0077be', '#00a8e8', '#00d4ff', '#40e0d0', '#48d1cc', '#20b2aa', '#008b8b'] },
            { name: '霓虹', colors: ['#ff00ff', '#00ffff', '#ff0080', '#80ff00', '#ff8000', '#0080ff', '#ff0040', '#40ff00'] },
            { name: '极简', colors: ['#ffffff', '#f0f0f0', '#e0e0e0', '#d0d0d0', '#c0c0c0', '#b0b0b0', '#a0a0a0', '#909090'] }
        ];

        // Canvas
        const canvas = document.getElementById('kaleidoscope');
        const ctx = canvas.getContext('2d');
        
        let width, height, centerX, centerY;
        let segments = 8;
        let currentPalette = 0;
        let rotation = 0;
        let mouseX = 0, mouseY = 0;
        let shapes = [];
        let time = 0;

        // 形状类
        class Shape {
            constructor() {
                this.reset();
            }

            reset() {
                this.type = Math.floor(Math.random() * 4); // 0: 圆, 1: 三角, 2: 方, 3: 星
                this.radius = 20 + Math.random() * 100;
                this.distance = 50 + Math.random() * Math.min(width, height) * 0.3;
                this.angle = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.02;
                this.orbitSpeed = (Math.random() - 0.5) * 0.01;
                this.colorIndex = Math.floor(Math.random() * palettes[currentPalette].colors.length);
                this.alpha = 0.3 + Math.random() * 0.5;
                this.pulseSpeed = Math.random() * 0.05;
                this.pulsePhase = Math.random() * Math.PI * 2;
            }

            update(mouseInfluence) {
                this.angle += this.orbitSpeed + mouseInfluence * 0.001;
                this.rotationSpeed += (Math.random() - 0.5) * 0.001;
                this.rotationSpeed *= 0.99;
            }

            draw(ctx, segmentAngle, palette, time) {
                const pulse = Math.sin(time * this.pulseSpeed + this.pulsePhase) * 0.3 + 0.7;
                const currentRadius = this.radius * pulse;
                const color = palette.colors[this.colorIndex % palette.colors.length];
                
                for (let i = 0; i < segments; i++) {
                    ctx.save();
                    ctx.translate(centerX, centerY);
                    ctx.rotate(segmentAngle * i + rotation);
                    
                    const x = Math.cos(this.angle) * this.distance;
                    const y = Math.sin(this.angle) * this.distance;
                    
                    ctx.translate(x, y);
                    ctx.rotate(this.angle + this.rotationSpeed * time);
                    
                    ctx.fillStyle = color;
                    ctx.globalAlpha = this.alpha * pulse;
                    ctx.shadowBlur = 20;
                    ctx.shadowColor = color;
                    
                    ctx.beginPath();
                    
                    switch (this.type) {
                        case 0: // 圆
                            ctx.arc(0, 0, currentRadius, 0, Math.PI * 2);
                            break;
                        case 1: // 三角
                            this.drawPolygon(ctx, 3, currentRadius);
                            break;
                        case 2: // 方
                            this.drawPolygon(ctx, 4, currentRadius);
                            break;
                        case 3: // 星
                            this.drawStar(ctx, 5, currentRadius, currentRadius * 0.5);
                            break;
                    }
                    
                    ctx.fill();
                    ctx.restore();
                    
                    // 镜像
                    ctx.save();
                    ctx.translate(centerX, centerY);
                    ctx.rotate(segmentAngle * i + rotation);
                    ctx.scale(1, -1);
                    
                    ctx.translate(x, y);
                    ctx.rotate(this.angle + this.rotationSpeed * time);
                    
                    ctx.fillStyle = color;
                    ctx.globalAlpha = this.alpha * pulse * 0.7;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = color;
                    
                    ctx.beginPath();
                    switch (this.type) {
                        case 0:
                            ctx.arc(0, 0, currentRadius, 0, Math.PI * 2);
                            break;
                        case 1:
                            this.drawPolygon(ctx, 3, currentRadius);
                            break;
                        case 2:
                            this.drawPolygon(ctx, 4, currentRadius);
                            break;
                        case 3:
                            this.drawStar(ctx, 5, currentRadius, currentRadius * 0.5);
                            break;
                    }
                    ctx.fill();
                    ctx.restore();
                }
            }

            drawPolygon(ctx, sides, radius) {
                ctx.moveTo(radius, 0);
                for (let i = 1; i <= sides; i++) {
                    const angle = (i * 2 * Math.PI) / sides;
                    ctx.lineTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
                }
                ctx.closePath();
            }

            drawStar(ctx, points, outerRadius, innerRadius) {
                for (let i = 0; i < points * 2; i++) {
                    const radius = i % 2 === 0 ? outerRadius : innerRadius;
                    const angle = (i * Math.PI) / points - Math.PI / 2;
                    if (i === 0) {
                        ctx.moveTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
                    } else {
                        ctx.lineTo(Math.cos(angle) * radius, Math.sin(angle) * radius);
                    }
                }
                ctx.closePath();
            }
        }

        // 初始化
        function init() {
            resize();
            shapes = [];
            for (let i = 0; i < CONFIG.SHAPE_COUNT; i++) {
                shapes.push(new Shape());
            }
        }

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            centerX = width / 2;
            centerY = height / 2;
        }

        // 绘制背景装饰
        function drawBackground() {
            // 渐变背景
            const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, Math.max(width, height) / 2);
            gradient.addColorStop(0, 'rgba(20, 20, 40, 0.3)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0.1)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }

        // 绘制中心装饰
        function drawCenter() {
            const palette = palettes[currentPalette];
            const pulse = Math.sin(time * 0.03) * 0.2 + 0.8;
            
            for (let i = 0; i < segments; i++) {
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate((Math.PI * 2 / segments) * i + rotation);
                
                // 发光线
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.lineTo(200 * pulse, 0);
                ctx.strokeStyle = palette.colors[i % palette.colors.length];
                ctx.globalAlpha = 0.3;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 10;
                ctx.shadowColor = palette.colors[i % palette.colors.length];
                ctx.stroke();
                
                ctx.restore();
            }
            
            // 中心圆
            ctx.beginPath();
            ctx.arc(centerX, centerY, 20 * pulse, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.globalAlpha = 0.8;
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#fff';
            ctx.fill();
            ctx.globalAlpha = 1;
            ctx.shadowBlur = 0;
        }

        // FPS计算
        let lastTime = performance.now();
        let frameCount = 0;

        // 动画循环
        function animate(currentTime) {
            time++;
            
            // FPS
            frameCount++;
            if (currentTime - lastTime >= 1000) {
                document.getElementById('fps').textContent = frameCount;
                frameCount = 0;
                lastTime = currentTime;
            }

            // 计算鼠标影响
            const dx = mouseX - centerX;
            const dy = mouseY - centerY;
            const mouseInfluence = Math.sqrt(dx * dx + dy * dy) / Math.max(width, height);
            
            // 旋转
            rotation += 0.002 + mouseInfluence * 0.01;

            // 渐隐背景
            ctx.fillStyle = `rgba(0, 0, 0, ${CONFIG.TRAIL_ALPHA})`;
            ctx.fillRect(0, 0, width, height);
            
            drawBackground();
            
            const segmentAngle = (Math.PI * 2) / segments;
            const palette = palettes[currentPalette];
            
            // 更新和绘制形状
            shapes.forEach(shape => {
                shape.update(mouseInfluence);
                shape.draw(ctx, segmentAngle, palette, time);
            });
            
            drawCenter();

            requestAnimationFrame(animate);
        }

        // 改变图案
        function changePattern() {
            shapes.forEach(shape => {
                shape.type = Math.floor(Math.random() * 4);
                shape.colorIndex = Math.floor(Math.random() * palettes[currentPalette].colors.length);
                shape.radius = 20 + Math.random() * 100;
            });
        }

        // 事件监听
        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        canvas.addEventListener('click', changePattern);

        canvas.addEventListener('dblclick', () => {
            currentPalette = (currentPalette + 1) % palettes.length;
            document.getElementById('palette').textContent = `配色: ${palettes[currentPalette].name}`;
            shapes.forEach(shape => {
                shape.colorIndex = Math.floor(Math.random() * palettes[currentPalette].colors.length);
            });
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            segments = Math.max(CONFIG.MIN_SEGMENTS, Math.min(CONFIG.MAX_SEGMENTS, segments - Math.sign(e.deltaY)));
            document.getElementById('segments').textContent = `对称轴: ${segments}`;
        });

        // 触摸支持
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            changePattern();
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        });

        // 键盘支持
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                changePattern();
            } else if (e.code === 'ArrowUp') {
                segments = Math.min(CONFIG.MAX_SEGMENTS, segments + 1);
                document.getElementById('segments').textContent = `对称轴: ${segments}`;
            } else if (e.code === 'ArrowDown') {
                segments = Math.max(CONFIG.MIN_SEGMENTS, segments - 1);
                document.getElementById('segments').textContent = `对称轴: ${segments}`;
            } else if (e.code === 'KeyC') {
                currentPalette = (currentPalette + 1) % palettes.length;
                document.getElementById('palette').textContent = `配色: ${palettes[currentPalette].name}`;
            }
        });

        // 启动
        init();
        animate(0);
    </script>
</body>
</html>
