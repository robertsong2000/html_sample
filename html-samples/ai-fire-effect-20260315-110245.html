<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>火焰效果 | Fire Effect</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            background: #0a0505;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            cursor: none;
        }
        
        .cursor {
            position: fixed;
            width: 30px;
            height: 30px;
            border: 2px solid rgba(255, 150, 50, 0.8);
            border-radius: 50%;
            pointer-events: none;
            z-index: 100;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(255, 100, 0, 0.6);
            transition: transform 0.1s ease, border-color 0.2s ease;
        }
        
        .title {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 200, 100, 0.9);
            font-size: 36px;
            font-weight: 300;
            letter-spacing: 12px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 
                0 0 20px rgba(255, 100, 0, 0.8),
                0 0 40px rgba(255, 50, 0, 0.5);
        }
        
        .info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 200, 150, 0.7);
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 100, 0, 0.5);
        }
        
        .stats {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(255, 150, 100, 0.6);
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
            line-height: 1.8;
        }
        
        @media (max-width: 768px) {
            .title {
                font-size: 24px;
                letter-spacing: 6px;
            }
            .info {
                font-size: 12px;
            }
            .cursor {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="title">火焰效果</div>
    <canvas id="fire"></canvas>
    <div class="cursor" id="cursor"></div>
    <div class="stats">
        <div>粒子数: <span id="particleCount">0</span></div>
        <div>火源: <span id="fireSource">底部</span></div>
    </div>
    <div class="info">移动鼠标引导火焰 · 点击创建爆炸火焰</div>
    
    <script>
        const canvas = document.getElementById('fire');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('cursor');
        const particleCountEl = document.getElementById('particleCount');
        const fireSourceEl = document.getElementById('fireSource');
        
        let width, height;
        let particles = [];
        let embers = [];
        let mouseX = 0, mouseY = 0;
        let time = 0;
        const maxParticles = 800;
        
        // 火焰颜色渐变
        const fireColors = [
            { pos: 0, color: { r: 255, g: 255, b: 200 } },   // 白黄
            { pos: 0.2, color: { r: 255, g: 220, b: 100 } }, // 黄
            { pos: 0.4, color: { r: 255, g: 150, b: 50 } },  // 橙
            { pos: 0.6, color: { r: 255, g: 80, b: 20 } },   // 橙红
            { pos: 0.8, color: { r: 200, g: 30, b: 10 } },   // 红
            { pos: 1, color: { r: 80, g: 20, b: 10 } }       // 暗红
        ];
        
        function getFireColor(life) {
            const t = 1 - life;
            for (let i = 0; i < fireColors.length - 1; i++) {
                if (t >= fireColors[i].pos && t <= fireColors[i + 1].pos) {
                    const localT = (t - fireColors[i].pos) / (fireColors[i + 1].pos - fireColors[i].pos);
                    const c1 = fireColors[i].color;
                    const c2 = fireColors[i + 1].color;
                    return {
                        r: Math.round(c1.r + (c2.r - c1.r) * localT),
                        g: Math.round(c1.g + (c2.g - c1.g) * localT),
                        b: Math.round(c1.b + (c2.b - c1.b) * localT)
                    };
                }
            }
            return fireColors[fireColors.length - 1].color;
        }
        
        // 火焰粒子类
        class FireParticle {
            constructor(x, y, options = {}) {
                this.x = x;
                this.y = y;
                this.vx = options.vx || (Math.random() - 0.5) * 2;
                this.vy = options.vy || -(Math.random() * 4 + 3);
                this.life = options.life || 1;
                this.decay = options.decay || (0.008 + Math.random() * 0.012);
                this.size = options.size || (Math.random() * 15 + 10);
                this.originalSize = this.size;
                this.isExplosion = options.isExplosion || false;
            }
            
            update() {
                // 鼠标吸引
                const dx = mouseX - this.x;
                const dy = mouseY - this.y;
                const dist = Math.hypot(dx, dy);
                
                if (dist < 200 && dist > 0) {
                    const force = (1 - dist / 200) * 0.3;
                    this.vx += (dx / dist) * force;
                    this.vy += (dy / dist) * force * 0.5;
                }
                
                // 物理更新
                this.vy -= 0.05; // 上升力
                this.vx *= 0.99;
                this.vy *= 0.99;
                
                // 随机抖动
                this.vx += (Math.random() - 0.5) * 0.3;
                
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                this.size = this.originalSize * this.life;
            }
            
            draw() {
                if (this.life <= 0 || this.size <= 0) return;
                
                const color = getFireColor(this.life);
                const alpha = Math.min(1, this.life * 1.5);
                
                // 发光效果
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.size
                );
                gradient.addColorStop(0, `rgba(${color.r}, ${color.g}, ${color.b}, ${alpha})`);
                gradient.addColorStop(0.4, `rgba(${color.r}, ${color.g}, ${color.b}, ${alpha * 0.6})`);
                gradient.addColorStop(1, `rgba(${color.r}, ${color.g}, ${color.b}, 0)`);
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = gradient;
                ctx.fill();
            }
            
            isDead() {
                return this.life <= 0;
            }
        }
        
        // 火星类
        class Ember {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = -(Math.random() * 6 + 2);
                this.life = 1;
                this.decay = 0.005 + Math.random() * 0.01;
                this.size = Math.random() * 3 + 1;
            }
            
            update() {
                this.vy -= 0.02;
                this.vx *= 0.99;
                this.vy *= 0.99;
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
            }
            
            draw() {
                if (this.life <= 0) return;
                
                const alpha = this.life;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, ${150 + Math.random() * 50}, 50, ${alpha})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = `rgba(255, 100, 0, ${alpha})`;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
            
            isDead() {
                return this.life <= 0;
            }
        }
        
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }
        
        function emitFireFromBase() {
            if (particles.length >= maxParticles) return;
            
            // 从底部发射火焰粒子
            const baseCount = 3;
            for (let i = 0; i < baseCount; i++) {
                const x = width / 2 + (Math.random() - 0.5) * width * 0.4;
                const y = height - 20;
                
                particles.push(new FireParticle(x, y, {
                    vx: (Math.random() - 0.5) * 3,
                    vy: -(Math.random() * 5 + 4),
                    size: Math.random() * 20 + 15,
                    decay: 0.006 + Math.random() * 0.008
                }));
            }
            
            // 偶尔发射火星
            if (Math.random() < 0.1) {
                const x = width / 2 + (Math.random() - 0.5) * 100;
                embers.push(new Ember(x, height - 30));
            }
        }
        
        function createExplosion(x, y) {
            const count = 50;
            for (let i = 0; i < count && particles.length < maxParticles; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 8 + 4;
                
                particles.push(new FireParticle(x, y, {
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 3,
                    size: Math.random() * 25 + 15,
                    decay: 0.015 + Math.random() * 0.01,
                    isExplosion: true
                }));
            }
            
            // 火星
            for (let i = 0; i < 20; i++) {
                embers.push(new Ember(x, y));
            }
            
            fireSourceEl.textContent = '爆炸!';
            setTimeout(() => {
                fireSourceEl.textContent = '底部';
            }, 1000);
        }
        
        function drawFireGlow() {
            // 底部火光
            const gradient = ctx.createRadialGradient(
                width / 2, height, 0,
                width / 2, height, height * 0.6
            );
            gradient.addColorStop(0, 'rgba(255, 100, 30, 0.3)');
            gradient.addColorStop(0.3, 'rgba(255, 50, 10, 0.15)');
            gradient.addColorStop(1, 'transparent');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
        }
        
        function drawBackground() {
            // 深色背景
            const gradient = ctx.createLinearGradient(0, 0, 0, height);
            gradient.addColorStop(0, '#1a0a05');
            gradient.addColorStop(0.5, '#0a0505');
            gradient.addColorStop(1, '#150808');
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, width, height);
            
            // 火光环境光
            drawFireGlow();
        }
        
        function animate() {
            drawBackground();
            
            // 发射新粒子
            emitFireFromBase();
            
            // 更新和绘制粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].isDead()) {
                    particles.splice(i, 1);
                }
            }
            
            // 更新和绘制火星
            for (let i = embers.length - 1; i >= 0; i--) {
                embers[i].update();
                embers[i].draw();
                if (embers[i].isDead()) {
                    embers.splice(i, 1);
                }
            }
            
            particleCountEl.textContent = particles.length + embers.length;
            
            time++;
            requestAnimationFrame(animate);
        }
        
        // 事件监听
        function handleMouseMove(e) {
            mouseX = e.clientX;
            mouseY = e.clientY;
            
            cursor.style.left = mouseX + 'px';
            cursor.style.top = mouseY + 'px';
        }
        
        function handleTouchMove(e) {
            if (e.touches.length > 0) {
                mouseX = e.touches[0].clientX;
                mouseY = e.touches[0].clientY;
            }
        }
        
        function handleClick(e) {
            createExplosion(e.clientX, e.clientY);
        }
        
        function handleTouchStart(e) {
            if (e.touches.length > 0) {
                createExplosion(e.touches[0].clientX, e.touches[0].clientY);
            }
        }
        
        // 初始化
        function init() {
            resize();
            
            window.addEventListener('resize', resize);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('click', handleClick);
            canvas.addEventListener('touchmove', handleTouchMove, { passive: true });
            canvas.addEventListener('touchstart', handleTouchStart, { passive: true });
            
            // 检测 prefers-reduced-motion
            const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
            if (!prefersReducedMotion.matches) {
                animate();
            } else {
                // 静态火焰
                drawBackground();
                ctx.fillStyle = 'rgba(255, 100, 30, 0.5)';
                ctx.beginPath();
                ctx.ellipse(width / 2, height - 50, 100, 150, 0, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        init();
    </script>
</body>
</html>
