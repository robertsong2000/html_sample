<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水晶棱镜 | Crystal Prism</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 100%); font-family: Arial, sans-serif; }
        canvas { display: block; position: fixed; top: 0; left: 0; }
        .info { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.7); font-size: 14px; text-align: center; pointer-events: none; z-index: 10; }
        .title { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.9); font-size: 28px; font-weight: 300; letter-spacing: 6px; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>
    <canvas id="crystal"></canvas>
    <div class="title">Crystal Prism</div>
    <div class="info">移动鼠标旋转晶体 | 点击切换形状 | 滚轮调整复杂度</div>
    <script>
        const canvas = document.getElementById('crystal');
        const ctx = canvas.getContext('2d');
        let width, height, mouseX = 0, mouseY = 0, complexity = 1, shapeMode = 0, time = 0;
        const shapes = ['hexagon', 'diamond', 'star', 'octagon'];
        const palettes = [
            ['#ff6b6b','#4ecdc4','#45b7d1','#96ceb4','#ffeaa7'],
            ['#a55eea','#45aaf2','#26de81','#fd79a8','#fdcb6e'],
            ['#00b894','#00cec9','#0984e3','#6c5ce7','#e17055']
        ];
        let paletteIdx = 0;
        let facets = [];
        class Facet {
            constructor(cx, cy, size, depth) {
                this.cx = cx; this.cy = cy; this.size = size; this.depth = depth;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotSpeed = (Math.random() - 0.5) * 0.02;
                this.colorIdx = Math.floor(Math.random() * 5);
                this.alpha = 0.3 + Math.random() * 0.4;
                this.pulsePhase = Math.random() * Math.PI * 2;
            }
            getPoints() {
                const points = [];
                const sides = shapeMode === 0 ? 6 : shapeMode === 1 ? 4 : shapeMode === 2 ? 5 : 8;
                const sizeVar = this.size * (0.8 + Math.sin(this.pulsePhase) * 0.2);
                for (let i = 0; i < sides; i++) {
                    let angle = (i / sides) * Math.PI * 2 + this.rotation;
                    if (shapeMode === 1) angle += Math.PI / 4;
                    if (shapeMode === 2 && i % 2 === 1) continue;
                    const r = shapeMode === 2 && i % 2 === 0 ? sizeVar * 0.5 : sizeVar;
                    points.push({ x: this.cx + Math.cos(angle) * r, y: this.cy + Math.sin(angle) * r });
                }
                return points;
            }
            update() {
                const dx = mouseX - this.cx, dy = mouseY - this.cy;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const influence = dist < 200 ? (200 - dist) / 200 : 0;
                this.rotation += this.rotSpeed * (1 + influence * 2);
                this.pulsePhase += 0.03;
            }
            draw() {
                const points = this.getPoints();
                if (points.length < 3) return;
                ctx.save();
                ctx.globalAlpha = this.alpha * (0.5 + this.depth * 0.3);
                const color = palettes[paletteIdx][this.colorIdx];
                const gradient = ctx.createRadialGradient(this.cx, this.cy, 0, this.cx, this.cy, this.size);
                gradient.addColorStop(0, color);
                gradient.addColorStop(1, color + '40');
                ctx.fillStyle = gradient;
                ctx.strokeStyle = color;
                ctx.lineWidth = 1;
                ctx.shadowBlur = 20;
                ctx.shadowColor = color;
                ctx.beginPath();
                ctx.moveTo(points[0].x, points[0].y);
                for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                ctx.restore();
            }
        }
        let particles = [];
        class Sparkle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * 3;
                this.vy = (Math.random() - 0.5) * 3;
                this.size = Math.random() * 3 + 1;
                this.alpha = 1;
                this.color = palettes[paletteIdx][Math.floor(Math.random() * 5)];
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.alpha -= 0.02;
                return this.alpha > 0;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }
        function init() {
            resize();
            generateFacets();
        }
        function generateFacets() {
            facets = [];
            const count = Math.floor(20 * complexity);
            for (let i = 0; i < count; i++) {
                facets.push(new Facet(
                    width * 0.2 + Math.random() * width * 0.6,
                    height * 0.2 + Math.random() * height * 0.6,
                    30 + Math.random() * 60,
                    Math.random()
                ));
            }
            facets.sort((a, b) => a.depth - b.depth);
        }
        function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }
        function draw() {
            ctx.fillStyle = 'rgba(10,10,26,0.1)';
            ctx.fillRect(0, 0, width, height);
            facets.forEach(f => { f.update(); f.draw(); });
            particles = particles.filter(p => { p.draw(); return p.update(); });
            if (Math.random() > 0.95) {
                const f = facets[Math.floor(Math.random() * facets.length)];
                for (let i = 0; i < 5; i++) particles.push(new Sparkle(f.cx, f.cy));
            }
            time += 0.016;
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', () => { resize(); generateFacets(); });
        window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
        window.addEventListener('click', () => { shapeMode = (shapeMode + 1) % shapes.length; });
        window.addEventListener('dblclick', () => { paletteIdx = (paletteIdx + 1) % palettes.length; });
        window.addEventListener('wheel', e => {
            complexity += e.deltaY > 0 ? -0.2 : 0.2;
            complexity = Math.max(0.5, Math.min(2, complexity));
            generateFacets();
        });
        init(); draw();
    </script>
</body>
</html>
