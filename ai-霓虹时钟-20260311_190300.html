<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹时钟 - Neon Clock</title>
    <style>
        /* ========== 全局样式 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #0a0a0f;
            font-family: 'Microsoft YaHei', 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* ========== Canvas 容器 ========== */
        #clockCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* ========== 信息面板 ========== */
        .info-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-radius: 12px;
            color: #f0f0f0;
            z-index: 100;
            border: 1px solid rgba(0, 255, 255, 0.2);
            max-width: 260px;
        }

        .info-panel h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #0ff;
            text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
        }

        .info-panel p {
            font-size: 13px;
            line-height: 1.5;
            opacity: 0.8;
        }

        .info-panel .hint {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(0, 255, 255, 0.15);
            font-size: 11px;
            opacity: 0.6;
        }

        /* ========== 日期显示 ========== */
        .date-display {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(10px);
            padding: 12px 30px;
            border-radius: 25px;
            color: #f0f0f0;
            z-index: 100;
            border: 1px solid rgba(255, 0, 255, 0.3);
            font-size: 16px;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.5);
        }

        .date-display .day {
            color: #f0f;
            margin-right: 10px;
        }

        /* ========== 模式切换 ========== */
        .mode-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }

        .mode-toggle button {
            background: rgba(10, 10, 15, 0.8);
            border: 1px solid rgba(0, 255, 255, 0.3);
            color: #0ff;
            padding: 10px 18px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 13px;
            text-shadow: 0 0 5px #0ff;
        }

        .mode-toggle button:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        .mode-toggle button.active {
            background: linear-gradient(135deg, rgba(0, 255, 255, 0.3), rgba(255, 0, 255, 0.3));
            border-color: #f0f;
            color: #fff;
        }

        /* ========== 移动端适配 ========== */
        @media (max-width: 600px) {
            .info-panel {
                top: 10px;
                left: 10px;
                right: 10px;
                max-width: none;
                padding: 12px 15px;
            }
            .info-panel h1 {
                font-size: 16px;
            }
            .info-panel p {
                font-size: 12px;
            }
            .date-display {
                bottom: 80px;
                font-size: 14px;
                padding: 10px 20px;
            }
            .mode-toggle {
                bottom: 15px;
                right: 10px;
                left: 10px;
                flex-direction: row;
                justify-content: center;
            }
            .mode-toggle button {
                padding: 8px 12px;
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <!-- 信息面板 -->
    <div class="info-panel">
        <h1>🕰️ 霓虹时钟</h1>
        <p>数字与模拟的完美融合，霓虹光影中的时光流转。</p>
        <div class="hint">
            💡 移动鼠标改变视角<br>
            💡 点击切换颜色主题
        </div>
    </div>

    <!-- 日期显示 -->
    <div class="date-display">
        <span class="day" id="dayName">星期三</span>
        <span id="dateText">2026年3月11日</span>
    </div>

    <!-- 模式切换 -->
    <div class="mode-toggle">
        <button id="modeAnalog" class="active">模拟</button>
        <button id="modeDigital">数字</button>
        <button id="modeBoth">混合</button>
    </div>

    <!-- 主画布 -->
    <canvas id="clockCanvas"></canvas>

    <script>
        // ========== 画布初始化 ==========
        const canvas = document.getElementById('clockCanvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ========== 配置参数 ==========
        const CONFIG = {
            clockRadius: Math.min(canvas.width, canvas.height) * 0.3,
            themes: [
                { hour: '#ff0066', minute: '#00ffff', second: '#ffff00', name: '霓虹' },
                { hour: '#00ff88', minute: '#00ccff', second: '#ff00ff', name: '赛博' },
                { hour: '#ff6600', minute: '#ffcc00', second: '#ff0066', name: '日落' },
                { hour: '#00ffcc', minute: '#ff00cc', second: '#ccff00', name: '极光' },
            ],
            currentTheme: 0,
            mode: 'analog' // analog, digital, both
        };

        // ========== 状态变量 ==========
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;
        let targetMouseX = canvas.width / 2;
        let targetMouseY = canvas.height / 2;
        let particles = [];
        let time = 0;

        // ========== 颜色主题 ==========
        function getCurrentTheme() {
            return CONFIG.themes[CONFIG.currentTheme];
        }

        function cycleTheme() {
            CONFIG.currentTheme = (CONFIG.currentTheme + 1) % CONFIG.themes.length;
            // 添加主题切换粒子效果
            for (let i = 0; i < 30; i++) {
                createParticle(canvas.width / 2, canvas.height / 2);
            }
        }

        // ========== 粒子效果 ==========
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 4;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.02;
                this.size = 2 + Math.random() * 3;
                const theme = getCurrentTheme();
                this.color = [theme.hour, theme.minute, theme.second][Math.floor(Math.random() * 3)];
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                this.vx *= 0.98;
                this.vy *= 0.98;
            }

            draw() {
                if (this.life <= 0) return;
                ctx.beginPath();
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 15;
                ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
                ctx.shadowBlur = 0;
            }
        }

        function createParticle(x, y) {
            particles.push(new Particle(x, y));
        }

        // ========== 绘制霓虹圆环 ==========
        function drawNeonRing(x, y, radius, color, lineWidth, glowIntensity = 1) {
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = lineWidth;
            ctx.shadowColor = color;
            ctx.shadowBlur = 20 * glowIntensity;
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        // ========== 绘制刻度 ==========
        function drawTickMarks(centerX, centerY, radius, theme) {
            for (let i = 0; i < 60; i++) {
                const angle = (i * 6 - 90) * Math.PI / 180;
                const isHour = i % 5 === 0;
                const innerRadius = radius * (isHour ? 0.85 : 0.92);
                const outerRadius = radius * 0.95;
                
                const x1 = centerX + Math.cos(angle) * innerRadius;
                const y1 = centerY + Math.sin(angle) * innerRadius;
                const x2 = centerX + Math.cos(angle) * outerRadius;
                const y2 = centerY + Math.sin(angle) * outerRadius;
                
                ctx.beginPath();
                ctx.strokeStyle = isHour ? theme.hour : 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = isHour ? 3 : 1;
                if (isHour) {
                    ctx.shadowColor = theme.hour;
                    ctx.shadowBlur = 10;
                }
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
        }

        // ========== 绘制指针 ==========
        function drawHand(centerX, centerY, angle, length, width, color, glow = true) {
            const endX = centerX + Math.cos(angle) * length;
            const endY = centerY + Math.sin(angle) * length;
            
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.lineCap = 'round';
            if (glow) {
                ctx.shadowColor = color;
                ctx.shadowBlur = 15;
            }
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(endX, endY);
            ctx.stroke();
            ctx.shadowBlur = 0;
            
            // 指针尾部
            const tailLength = length * 0.2;
            const tailX = centerX - Math.cos(angle) * tailLength;
            const tailY = centerY - Math.sin(angle) * tailLength;
            
            ctx.beginPath();
            ctx.strokeStyle = color;
            ctx.lineWidth = width * 0.5;
            ctx.globalAlpha = 0.5;
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(tailX, tailY);
            ctx.stroke();
            ctx.globalAlpha = 1;
        }

        // ========== 绘制中心点 ==========
        function drawCenter(centerX, centerY, theme) {
            // 外圈
            ctx.beginPath();
            ctx.fillStyle = theme.second;
            ctx.shadowColor = theme.second;
            ctx.shadowBlur = 20;
            ctx.arc(centerX, centerY, 8, 0, Math.PI * 2);
            ctx.fill();
            
            // 内圈
            ctx.beginPath();
            ctx.fillStyle = '#fff';
            ctx.arc(centerX, centerY, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        // ========== 绘制数字时钟 ==========
        function drawDigitalClock(centerX, centerY, now, theme) {
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            ctx.font = 'bold 48px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // 时间字符串
            const timeStr = `${hours}:${minutes}:${seconds}`;
            
            // 发光效果
            ctx.shadowColor = theme.minute;
            ctx.shadowBlur = 30;
            ctx.fillStyle = theme.minute;
            ctx.fillText(timeStr, centerX, centerY);
            
            // 再绘制一层增强
            ctx.shadowBlur = 15;
            ctx.fillStyle = '#fff';
            ctx.fillText(timeStr, centerX, centerY);
            ctx.shadowBlur = 0;
            
            // 毫秒显示
            const ms = String(Math.floor(now.getMilliseconds() / 10)).padStart(2, '0');
            ctx.font = 'bold 20px "Courier New", monospace';
            ctx.fillStyle = theme.second;
            ctx.shadowColor = theme.second;
            ctx.shadowBlur = 10;
            ctx.fillText(`.${ms}`, centerX + 120, centerY);
            ctx.shadowBlur = 0;
        }

        // ========== 绘制模拟时钟 ==========
        function drawAnalogClock(centerX, centerY, radius, now, theme) {
            const hours = now.getHours() % 12;
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            const milliseconds = now.getMilliseconds();
            
            // 计算角度
            const secondAngle = ((seconds + milliseconds / 1000) * 6 - 90) * Math.PI / 180;
            const minuteAngle = ((minutes + seconds / 60) * 6 - 90) * Math.PI / 180;
            const hourAngle = ((hours + minutes / 60) * 30 - 90) * Math.PI / 180;
            
            // 绘制外环
            drawNeonRing(centerX, centerY, radius, theme.minute, 2);
            drawNeonRing(centerX, centerY, radius * 0.98, 'rgba(255,255,255,0.1)', 1, 0.5);
            
            // 绘制刻度
            drawTickMarks(centerX, centerY, radius, theme);
            
            // 绘制数字
            ctx.font = 'bold 20px "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = theme.hour;
            ctx.shadowColor = theme.hour;
            ctx.shadowBlur = 10;
            
            for (let i = 1; i <= 12; i++) {
                const angle = (i * 30 - 90) * Math.PI / 180;
                const x = centerX + Math.cos(angle) * radius * 0.72;
                const y = centerY + Math.sin(angle) * radius * 0.72;
                ctx.fillText(i.toString(), x, y);
            }
            ctx.shadowBlur = 0;
            
            // 绘制指针
            drawHand(centerX, centerY, hourAngle, radius * 0.5, 6, theme.hour);
            drawHand(centerX, centerY, minuteAngle, radius * 0.7, 4, theme.minute);
            drawHand(centerX, centerY, secondAngle, radius * 0.85, 2, theme.second);
            
            // 绘制中心
            drawCenter(centerX, centerY, theme);
            
            // 秒针经过时产生粒子
            if (seconds !== lastSecond) {
                const angle = secondAngle;
                const x = centerX + Math.cos(angle) * radius * 0.85;
                const y = centerY + Math.sin(angle) * radius * 0.85;
                for (let i = 0; i < 3; i++) {
                    createParticle(x, y);
                }
                lastSecond = seconds;
            }
        }

        let lastSecond = -1;

        // ========== 更新日期显示 ==========
        function updateDateDisplay() {
            const now = new Date();
            const days = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
            document.getElementById('dayName').textContent = days[now.getDay()];
            document.getElementById('dateText').textContent = 
                `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日`;
        }

        // ========== 绘制背景网格 ==========
        function drawBackgroundGrid() {
            const gridSize = 50;
            ctx.strokeStyle = 'rgba(0, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            
            // 垂直线
            for (let x = 0; x < canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }
            
            // 水平线
            for (let y = 0; y < canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.stroke();
            }
        }

        // ========== 绘制装饰元素 ==========
        function drawDecorations(centerX, centerY, radius, theme) {
            // 旋转的外圈装饰
            const rotAngle = time * 0.001;
            
            for (let i = 0; i < 8; i++) {
                const angle = rotAngle + (i * Math.PI / 4);
                const x = centerX + Math.cos(angle) * (radius + 30);
                const y = centerY + Math.sin(angle) * (radius + 30);
                
                ctx.beginPath();
                ctx.fillStyle = i % 2 === 0 ? theme.hour : theme.minute;
                ctx.shadowColor = i % 2 === 0 ? theme.hour : theme.minute;
                ctx.shadowBlur = 10;
                ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.shadowBlur = 0;
        }

        // ========== 鼠标交互 ==========
        document.addEventListener('mousemove', (e) => {
            targetMouseX = e.clientX;
            targetMouseY = e.clientY;
        });

        document.addEventListener('click', () => {
            cycleTheme();
        });

        // 触摸支持
        document.addEventListener('touchmove', (e) => {
            targetMouseX = e.touches[0].clientX;
            targetMouseY = e.touches[0].clientY;
        });

        document.addEventListener('touchstart', () => {
            cycleTheme();
        });

        // ========== 模式切换 ==========
        document.getElementById('modeAnalog').addEventListener('click', function() {
            CONFIG.mode = 'analog';
            updateModeButtons();
        });

        document.getElementById('modeDigital').addEventListener('click', function() {
            CONFIG.mode = 'digital';
            updateModeButtons();
        });

        document.getElementById('modeBoth').addEventListener('click', function() {
            CONFIG.mode = 'both';
            updateModeButtons();
        });

        function updateModeButtons() {
            document.querySelectorAll('.mode-toggle button').forEach(btn => {
                btn.classList.remove('active');
            });
            const modeMap = { 'analog': 'modeAnalog', 'digital': 'modeDigital', 'both': 'modeBoth' };
            document.getElementById(modeMap[CONFIG.mode]).classList.add('active');
        }

        // ========== 主动画循环 ==========
        function animate() {
            time++;
            
            // 平滑鼠标移动
            mouseX += (targetMouseX - mouseX) * 0.05;
            mouseY += (targetMouseY - mouseY) * 0.05;
            
            // 计算时钟中心和大小
            const centerX = canvas.width / 2 + (mouseX - canvas.width / 2) * 0.02;
            const centerY = canvas.height / 2 + (mouseY - canvas.height / 2) * 0.02;
            const radius = Math.min(canvas.width, canvas.height) * 0.28;
            
            // 清除画布
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // 绘制背景网格
            drawBackgroundGrid();
            
            const now = new Date();
            const theme = getCurrentTheme();
            
            // 根据模式绘制时钟
            if (CONFIG.mode === 'analog') {
                drawAnalogClock(centerX, centerY, radius, now, theme);
            } else if (CONFIG.mode === 'digital') {
                drawDigitalClock(centerX, centerY, now, theme);
            } else {
                // 混合模式
                drawAnalogClock(centerX, centerY - 60, radius * 0.7, now, theme);
                drawDigitalClock(centerX, centerY + radius * 0.7 + 40, now, theme);
            }
            
            // 绘制装饰
            drawDecorations(centerX, centerY, radius, theme);
            
            // 更新和绘制粒子
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
            
            // 更新日期
            updateDateDisplay();
            
            requestAnimationFrame(animate);
        }

        // 启动动画
        animate();
    </script>
</body>
</html>
